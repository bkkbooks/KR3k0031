body:
  text: 古今源流至論前集卷十宋林駉撰恤刑淑氣一動草木皆春暘谷方升萬物仰照是知初政不可無恤刑之心上醫調護元氣流暢良農不力稂莠害禾又知初政不可無恤刑之吏夫當大化圖新之初天下望澤之始窮閻蔀屋之下遐陬僻壤之所一動一植欣欣然有更生之願况吾民乎然仁出於君心而入於人心豈自能發越而自能充滿也哉推而廣之而在下不可戚狹也勤而施之而在下不可廢沮也爬搔其痛癢洗濯其瘡痍如雨澤周流於焦涸之地如陽和宣暢於沍寒之谷則仁心仁聞浹洽彌匝而無匹夫不被其澤矣且舜於嗣位之始而申之欽哉恤刑之訓孰不曰虞之恤刑者然民協于中之治則有由矣伯夷降典折民惟刑臯陶作士惟明克允此其充廣好生之德也博矣成王於立政之初而發庶獄庶謹之訓又孰不曰周之恤刑者然囹圄空虛之治則有由矣司冦蘇公欽爾由獄君陳用辟爾惟厥中此其發達忠厚之仁也廣矣或者且謂四凶之誅凜然秋霜之殺物妹邦之罰又雷霆之不及掩耳者似不免為帝王盛世之纍嗚呼孰知虞周深仁厚澤之意其在於此乎何者四凶不去則導其民於非善是縱姦也羣飲不執則淫斯民於非辜是滋惡也虞周之刑不施於民而施於吏正以警奉承宣布之職歟並書不然文帝後元元年即有決獄之問本紀太宗貞觀初年而議決罪之誅刑法志其視虞周之初意蓋異世而合轍者然釋之守法力持寬恕方推廣帝無窮之意張釋之傳釋之為廷尉持法平恕而朝錯刑名者流已蹙其脉矣朝錯傳錯習申韓刑名之學勸帝親事法宫削七國鄭公仁義潤澤生民方欲勸帝力行之功而德彞小人鍥薄之習已截其軌矣本傳吾觀虞周忠厚之治而漢唐僅有幾致之風此其刑之煩省吏之寬猛識者可以觀世道之盛衰嗟夫虞周逺矣仁意間斷五季苛虐民不見德我太祖開國之初未遑他務一洗舊習而新之立折杖之法寬常刑之典南豐太祖總序太祖立折杖法脫民榜笞死禍定著常刑一本寬大法有縱故可罪也而緩其誅罪有誤入可恕也則重其辟奏議曽鞏云宋興以來所用者鞭朴之刑然猶詳審反覆故於緩故縱之誅重議入之罪蓋未嘗用一暴刑也猗歟休哉此帝王初政之用心然所以充吾仁心廣吾德義者又有人矣京師鞫獄改用士人長編開寶六年上留意聽斷專事欽恤畿左右軍院典司案鞫開封府舊選牙校分掌其職上哀欽庶獄始詔改用士人州郡重辟覆以刑部長編建隆三年上謂宰臣曰五代諸侯跋扈多枉法殺人朝廷置而不問刑部之職幾廢乃令諸州自今決大辟訖録按聞奏委刑部詳覆之上有寬明仁恕之心下有慈祥惻怛之念良法一定萬代遵守是故仁宗即政四月庚子之詔一意恤刑然考之當時我仁宗不徒以恤刑之語見於詔令之空言獄有稽留無大過也而必劾其吏自今天下無滯獄矣類苑仁宗嘗問近臣曰比屢下約束州縣令其能盡體朝廷恤刑之意乎王欽若曰獄事之重諸路使者職在按察其稽慢者自當糾劾仁宗曰卿言甚善更以此意戒之讞有不當有常法也而不罪其吏自今天下無寃民矣寶訓天下有疑獄聽奏讞大理厭其煩以不應奏坐之自是官吏不敢復讞上奏應大辟有疑皆令奏讞讞而不當官吏不坐故休養生息一世於祥風和氣之下而使田夫野叟吟詠於山林壟畝之間孝宗嗣位三月乙卯之詔詳議寬恤然參之信史我孝宗不徒以寬恤之語見於十八事之頒聖政嗣位三月下詔有寬恤十八條巧持多端者必置於罪聖政乾道二年詔曰比年以來治獄之吏大率巧持多端隨意援引而重輕之卿等其革因習之弊明審克之公使奸不隱情罰必當罪奉行不䖍者警以常刑乾道間詔部使者奉行上意不䖍定以常刑云云故隆興乾淳之間東南之生齒繁庶吏稱民安熙然有慶厯嘉祐之治是則恤刑不寬無以推仁心飭吏不嚴無以行仁政此祖宗拳拳於訓敕之命也其亦我藝祖詒謀之善也主上新紹燕謀仁聞四達今日下詔恤刑明日下詔飭吏垂髫戴白鼓春風而沐和氣然不知奉行之吏果無愧於詔㫖丁寧乎且酷暑隆凍按囚踈決法也今日秉憲節者奉法日少慢法日多不分牒於二車則委責於丞佐按行分部而不問事情之曲折受成吏手而不知訟牒之始末其可憾一也每嵗告終例行按察法也今之典獄訟者賢明日少酷虐日多髙下輕重而與吏為奸飢寒瘐死而簿厯不明其可憾二也有犯者固已伏辜必令妄及於無罪平民之家以為誅求之計私販者不即疏決必令妄稱興販於亭户富厚之室以為計囑之媒其可憾者三也嗟夫六條有戒御製有銘湯湯乎江河之難犯昭昭乎日月之昭布士大夫其忍負之必也朝廷操信必之權臺諫公耳目之寄監司任彈劾之責則朝綱以肅吏治以振民瘼以蘇將復見太平盛觀書曰欽哉欽哉惟刑之恤哉聖天子已盡心矣又曰式敬爾由獄以長我王國士大夫盍自勉焉新法新作南門聖人所貶新開阡陌君子懼焉甚矣國家不可輕變法人臣不敢輕議法也愚嘗拜觀國史熟究新法未嘗不撫卷而興嘆焉國家自建隆至嘉祐天下似有舒緩不振之勢而根本所在則泰山而四維之猶之巨室焉上下和睦財用充足所少者屋宇未備器用未精臧獲遲鈍不及事而鄰牆有時而肆侮悶悶之政誠有不快人意者元城語録神廟必欲變法者蓋有說矣祖宗以忠厚治天下至於嘉祐天下之事似乎舒緩委靡不振當時士大夫亦有厭之其實根本牢固至神廟即位天資絶人見朝廷州縣多舒緩不及漢唐每與大臣議論竦然有不悅色當時有識者以謂方今天下正如大富家上下和睦田園開闢屋宇牢壯財用充足但屋宇少設飾器用少精巧僕妾椎魯不敢作過但有鄰舍來相侵侮不免以物贈之其來已久遂不敢承當上意改革法度王金陵揣知上意以身當之是時也何郯以總覽威柄之說進增釋慶厯中何郯言今之政令不舉蓋失於寬之漸也以陛下聖明之資加有祖宗典法具在但當總覽威柄以奮乾綱之斷余靖以自覽威權之說進增釋余靖言當今為陛下計但能天子自覽威權大臣公行賞罰沮蠻夷之氣宋綬曰覽威柄綬猶郯也長編明道二年宋綬言帝王御天下在總覽威柄頃太后朝識者謂恩出太后今恩賞雖行又謂自大臣出非人臣罔工何以致此歐陽修曰執威權修猶靖也長編慶厯二年歐陽修言內外臣庶尊陛下如天若一旦猝然執威權以臨之則萬事皆辦我仁祖深執謙德不敢自用其為天下根本慮也至矣熙寧大臣承事勢委靡之餘奮起而更張之未為不切時者然事之未舉者舉之而已矣勢之未振者振之而已矣何至棄其本根而他圖哉輸錢免役以便民也而寬剩之求多則民始以為不便矣熙寧四年十月頒募役法鄧綰言利路役錢嵗用九萬六千六百餘緡而李瑜率十三萬緡有竒均役本以裕民而瑜乃聚斂積寬剩青苗取息似未病民也而抑配之過擾則民始告病矣熙寧二年正月李常孫覺言敕㫖散青苗錢聽民從便而提舉官務以多散為功又民富者不願取而貧者乃欲得之即令隨户等髙下品配又令貧富相兼十人為保首民間喧然以為不便保甲固民兵之遺意也而團教之妨農責罰之太峻果古意乎元豐八年四月司馬光乞罷保甲云云三四年來又令河東河北陜西置都教埸無問四時每五日一教時置使者提舉一丁教閲一丁供送雖云五日而保正長託他事為名日聚教埸得賂則縱之不得則留之是三路耕耘收穫稼穡之事盡廢也淤田固重農之美意也而激水以壞民田廬果古意乎熙寧六年九月賜屯田員外郎侯叔獻太常丞楊及府界淤田各十頃叔獻等引河水淤田決清水淤畿縣澶州間壞民田廬塜墓嵗被其患他州縣淤田類如此而朝廷不知也云云經義之法行而科舉之法壞熙寧四年中書言令定貢舉新制進士罷詩賦帖經墨義各占治詩書昜周禮禮記一經兼以論語孟子每試四埸初本經次兼經並大義十道務通經義理不須盡用注疏次時務策三道禮部五道預買之法行而賦斂之法壞國初買絹帛之類先以錢付民至熙寧行預買法而錢往往不付之民彥博曰祖宗之法不必更張太過也荆公曰祖宗不足法也言行録熙寧初慶州軍亂二府入議文彥博曰朝廷施為務合人心以靜重為先不宜偏聽陛下即位以厲精求治而人情未安者更張之過耳祖宗法未必不可行但有廢墜不舉之處耳蓋荆公知彥博言為已發故力排之餘見下溫公曰祖宗之法不可變也惠卿曰一年一變法也長編邇英進讀蕭何曹參事司馬公曰曹參不變何法得守成之道由此言之祖宗之法不可變也後數日吕惠卿進講因言先王之法有一年一變者有五年一變者王吕之言勝而文潞司馬公之言不勝而祖宗之制度變更殆盡君子於此為之不滿焉程明道同學於濂溪也以不樂新法而絶程明道與介甫同學於濂溪後介甫用事行新法程諫之不從乞補外韓維與荆公同受薦於潞公也以不合新法而踈溫公瑣語皇祐中文潞公薦韓維曽公亮張瓌王安石四人恬退乞不次擢用新又韓維行狀安石用事維極論法不便不報乞補外鄭介夫師事於荆公錢景諶素交於荆公一論新法終身相棄鄭俠字介夫從學荆公後介夫極論新法神宗為罷青苗免役錢景諶因别頭試解舉本荆公考之後論新法不合遂相絶蘇子瞻素厚於荆公劉道原雅善於荆公一議新法屏迹不容蘇東坡與王安禮王安石素有文墨之契議論翰墨後荆公新法行東坡極詆之又十國紀序王介甫與劉道原有舊深愛其才熙寧中介甫參大政欲引道原修三司條例道原固辭以不習金榖之事及吕獻可得罪知鄧州道原往見介甫曰公所以致人言蓋亦有所未思因為條陳所更法令未便介甫大怒遂與之絶交故老典刑參辰相絶平生膠漆矛盾不合而荆公所與共事者以章吕曽布為腹心張琥李定為爪牙劉孝孫張商英為鷹犬元絳陳繹為厮役惜哉唐介言安石用事章吕曽布為腹心張琥李定為爪牙劉孝孫張商英為鷹犬元絳陳繹為厮役逆意者久不召還附同者雖不肖為賢又置市昜司都人有致餓死者以安石比李林甫盧杞夫勸人主以講學此荆公之本心也而三不足之惑上聽胡為有兩口舌耶上謂安石曰昨閲卿所奏書至數遍言本朝事可謂精盡試為朕詳言施設之方對曰願陛下以講學為事講學既明則施設之方不言而自諭不又元城語録曰安石云天變不足懼祖宗足法人言不足畏諫人主以變風俗此荆公之素願也而首擢不孝之小人胡為自相枘鑿耶熙寧元年二月庚子安石侍上曰朕仰慕卿道德甚至卿所施設以何為先安石曰變風俗立法度最方今所急也凡欲美風俗在長君子消小人以禮義廉恥由君子出故也又熙寧三年六月詔令朱壽昌孝行赴闕先是言者攻李定不持母喪王安石立主定因忌壽昌及壽昌至但選審官院祖宗出政安利元元此安石告君之言也而新法擾民冒行不顧公何忍為之上問安石祖宗守天下能百年無大變以何道也安石曰云云其於發政出令之間一以安利元元為事餘見上屈已夷狄安逸邊人此安石告君之論也而開邊誤國貽禍後來公又何忍行之安石上書仁宗在位日久寧屈已棄財於夷狄終不忍加兵自夏人順服蠻夷遂無大變邊人父子夫婦得免於兵死而中國之人豫逸蕃息以至今日者未嘗加兵之效也熙寧三年又從王韶李師中開邉之議推原其由安石所學者孔孟之書所友者直諒之士所談者正大之言一旦棄置如許操戈入室者此皆小人從臾之罪也觀福建子三字之書則知異日怨用小人之意荆公為惠卿下石反相顛覆至晚年鍾山題福建子三字蓋憤惠卿也觀吾昔好交游今以國事相絶之嘆則知晚年惜去君子之悔聞見録曰田承君云荆公嘗謂其姪訪曰吾昔好交游甚多皆以國事相絶公居間復欲作書相問訪欣然為設紙筆案上公屢欲下筆輒長嘆而止噫亦晚矣又嘗論之小人嗜利而附新法固可罪君子變節而附新法尤可咎方新法之始議也朝廷尚有疑二之意常秩之聘正國論去取之機召至闕庭昌言其便而法遂行矣熙寧二年詔舉遺逸潁州薦常秩以職官起時王介甫方行新法常秩賜對盛言新法之便乃除諫官至待制介甫遂亦心知之至新法之行也朝廷復有悔艾之舉閲道之問又國事興廢之機安石自罷之言一入而法卒不廢矣王介甫因新法行衆議不便介甫辭病神宗欲罷之因問趙閲道對曰候安石自罷之遂不廢及新法之盡用也三五少年略無愛惜當時故老在朝僅有曽公亮耳儻能寬之一分則民受一分之賜亮也隂助力贊無毫髮遺安石環顧無所忌憚此法終為誤國蠧民之具矣長編公亮隂助安石更張庶事一切聽之然則變法之禍此固安石之罪也尤小人之罪也固小人之罪也亦君子之罪也君子安得不為之浩歎吾觀熙寧天子安石相誤之語使安石聞之必不為也神宗與王圭因論馬監事神宗曰安石相誤豈惟此一事熙寧細民鬻妻賣子之怨使安石見之必不為也鄭介夫繪民間鬻妻賣子流離之狀詣登聞院上疏上欺其君下棄其民熙寧小人不得辭其咎元祐初元天意祚宋人曰父政不可改也君子曰東朝以母改子非以子改父也人曰神考不可改也君子曰天子改安石之政非改神考之政也罷保甲廢市昜四患之除如救焚然君子方以元祐為嘉祐而不知紹聖又轉而為熙寧矣司馬公行狀曰二聖嗣位民日引領以觀新政而進說者以為三年無改於父之道溫公爭之曰先帝之法其善者雖百世不可昜也若安石惠卿等所建為天下害非先帝本意者改之如拯溺救焚然况太后以母改子非子改父噫元豐之變熙寧未盡變也而君子喜之何者意其必有元祐也紹聖之變元祐亦未至甚也而君子傷之何者意其必有崇觀也奏議陳瑩中言自熙寧至今二十餘年天下之事已經四更改熙寧改治平元豐改熙寧元祐改神考紹聖改宣仁凡所行之事各有先後紹述一語更倡迭和莫助兩圖左次右列而天下之事去矣噫誰生厲階至今為梗往者不可諫矣不愆不忘率由舊章君子深幸其有建紹之治朝儀君臣大分也固當嚴於視朝而尤嚴於平時朝㑹盛儀也固當謹於外朝而尤謹於內庭何者平時之際其情昜狎內庭之所其分昜褻茍溺於晏安而憚於禮法不樂於檢束而自便於縱肆則上下相從事於茍且之文而近習預政之弊職此之由也嘗觀周禮一書而知周人之法度何其謹重詳密耶夫外朝之儀朝士既掌之司儀又辨之而猶未也治朝之儀司士掌之宰夫又掌之而猶未也蓋內朝燕佚必有師保正救之官而閹尹婦寺又皆屬於冡宰之臣行之於宫庭寢處之間達之於朝庭宣布之際同此禮也亦同此心也豈必視朝而後嚴外朝而後謹哉漢唐之儀非不足觀然內外幾天淵之隔旦暮有聖狂之分漢之制朝㑹也謁者贊導郎中俠階百官執㦸傳警御史執法舉不如儀若嚴矣百官表上然臥枕宦者而不顧排闥髙帝枕宦者臥樊噲排闥入見之曰陛下桀紂王也踞視將軍而見至不冠武帝踞厠視大將軍衛青則又何䙝也異時幸臣嫚朝之醜申屠嘉傳鄧通宦者戲殿上嘉召通欲斬之帝遣使者赦通權臣干政之弊是非內庭不謹而區區於外庭之文耶末年王鳳王莽權臣竊政方唐之損益禮文也有兩丞以辨其儀有典儀以贊其位贊辭則通事舍人正班序則御史臺屬若嚴矣唐百官志然樂工伎術之流皆得鳴玉馬周傳斜封墨敕之弊率由中出武后紀則又何䙝也異時大臣有離立之慢武夫有背闕之侮李勉傳者是非平昔過輕而屑屑於視朝之頃耶國朝以禮立國朝儀尤重舊制常朝以日入閣以朔大朝㑹以冬至五月朔㑹要淳化二年張洎言唐初五日一朝肅宗而下咸隻日朝雙日不坐陛下自臨大寶十有五年未嘗一日不雞鳴而起然遊焉息焉亦聖人之訓望依前代隻日視朝雙日不坐不從又㑹要唐太宗始御紫宸殿羣臣入閣常以月朔行之後唐天成初又以望入閣國初舊制皆以朔入閣又按㑹要太祖元㑹二冬㑹二五月朔一太宗元㑹六冬㑹三五月朔二真宗元㑹四五月朔一至天聖則罷五月之朝㑹熙寧罷月朔之入閣而以日視朝之制則天禧變用隻日焉此朝㑹之時然也寶訓天聖三年故事五月朔御天安殿視朝仁宗問輔臣曰此何禮也王欽若曰唐以瑞氣始於此故設君臣相見之儀上命罷之日又長編三年詔罷入閣儀先是王圭言入閣者唐隻紫宸殿受常朝之儀也唐紫宸與今同而唐宣政殿即今文德殿唐制天子坐朝必立儀正衙若正御紫宸殿換正衙儀自宣政東西閣門入故謂之入閣五代以來廢正衙立儀之制今入閣儀正是唐常朝非為古禮不可遵用故罷之又按㑹要天禧四年中書門下言唐貞觀十三年房喬請三日一臨朝顯慶三年長孫無忌請隔日視事並從之自後有五日開延英隻日視朝雙日不坐請自今雙日前後殿不坐隻日視事或於長春閣或於承明殿遂從之舊制有外臣之辭謝有羣臣之橫行有宰臣之押班至乾德則變辭謝類苑舊制文武群臣由一命而上自外至京必先詣正衙見訖乃得入見辭謝亦如之太祖嘗驛召一邊臣入對訝其到京數日而未見左右奏以未過正衙及令入見畢乃詣正衙淳化二年張郁言正衙之設謂之外朝群臣辭見及謝先詣正衙見訖方許入對此舊制也乾德以來始詔先赴中謝後赴正衙而中辭謝辭見之後多不詣正衙致朝經廢欲赴中謝次日赴正衙咸平則倦於橫行㑹要咸平四年御史言舊例假三日羣臣並赴文德殿橫行朝參近日多以內殿起居不赴望申舊制以肅朝儀而押班之制則嘉祐雖廢而中丞有言逮熙寧始盡革焉此朝㑹之制然也長編神宗即位王陶彈宰相不押常朝班韓琦言先朝以前殿退晚以日有機事商議故不及押班為嵗已久即非始自臣等唐每月凡朝延英其餘不坐之日宰相須赴正衙押班及延英對宰臣曰令傳宣放班則宰臣更不赴正衙押班明矣祖宗以來繼日奏事祥符初敕宰臣赴文德殿押班當時似未討論中書若日赴文德殿押班則機務當有妨滯至列聖之所遵守先正之所維持者天冠地屨凛凛難犯朝㑹䙝慢太平有詔也㑹要太平興國五年詔曰表著之設蓋有等威五代以來舊章多廢遂至䙝慢殊失矜莊自今朝㑹皆務恭䖍殿庭私禮景德有戒也㑹要景德三年詔曰自今朝㑹始務端肅不得喧譁內職設直以上赴起居入殿庭行私禮者委閣門彈奏時艾仲儒言立班時多談語行私禮故有是命趨朝後時祥符有令也則列聖之遵守此法固重矣㑹要祥符二年趙相言伏見常參官每日趨朝多不整肅舊制每日趨朝並早赴漏院候開內門齊入仗令具晚入者姓名申奏從之上前之喧忿未巳則王文正以為當譴樞使王崇勳上前失禮王文正公曽執奏劾之外朝之威儀稍慢則薛簡肅公以為言事略薛奎傳武臣之少有失儀則王欽若力攻其失㑹要鞠永言武班臣僚少有失儀望免彈奏王欽若奏鞠永自授憲官多不彈奏詔鞠永出處通判則先正之維持此禮尤謹矣然衣冠整肅之地朝廷森嚴之所律之以舞蹈繩之以俯伏夫誰不致其敬哉若命坐以優大臣此常時也我太祖輟之以重其威噫平日且爾况視朝之頃乎燕服以見近臣此常禮也我太祖昜之以示其敬噫內庭且爾况外朝之地乎夫惟藝祖立極之初已明此意聖子神孫共守家法昭乎太陽之照物凛乎太阿之出匣其視周之六典何愧哉鹵簿古之禮文詳乎後之禮文詳乎曰亦古之禮文詳爾然古人行之天下以為宜後世行之天下不以為安何也蓋禮文之在天下用於自尊者為驕矜之失而用於事天者為盛美之事古人惟以事天為禮則制愈備而愈不弊自夫後世以侈心行之則勢位之益隆而人心之益薄分守之益嚴而風俗之益衰登鳳凰而翳華芝徒見於甘泉行幸之時甘泉賦乘繡象而靡雷旗第用於上林游獵之地上林賦故其車騎服御徒足以駭世耀俗而相攘相僣之患已見於天下是無惑乎後世之不如古也夫論制度之善莫如周禮文之備莫如周然輿服之必飾者非所以自奉也仗衛之必嚴者非所以自侈也蓋用之於己者為甚昜而用之於事天者為甚備故玉路之十有再就者獨見於祀天而以朝以賔者不與焉太常之十有二旒者獨見於祀天而以田以戎者不與焉執戈盾而夾王車者不用於他而獨用於祭祀之時服裘冕而從王車者不見於他而獨用於郊祀之際並同此古者禮文之詳天下以為宜者蓋以事天盛典不容不備也秦皇承六國既滅之後謂非備其儀衛不足以震撼愚民之心自侈出警入蹕之衛以九國二車之制從車羅騎照耀輝煌前旌後旗馳騖紛紜然其禮不用於祀天而用於東遊行幸之舉則秦之侈靡無制者適足以啓天下睥睨之心何益哉蔡雍獨斷曰天子車駕次第謂之鹵簿有大駕有小駕有法駕每出太僕奉駕上鹵簿於尚書又曰古者諸侯二車九乘秦滅九國兼其車服漢承秦制故大駕屬車八十一乘餘見髙祖紀漢武懲禮文多闕之陋謂非煥其文章不足以新一代之施設備太僕屬車之乘見上新甘泉鹵簿之儀千乘萬騎駭人瞻視羽葆霓旌極口賦詠並見司馬相如𫝊又趙昭儀得幸每上甘泉常從左屬車豹尾中然其禮不用於祀天而用於游幸求仙之舉本紀則帝之靡麗自奉者徒以濟平昔好大之欲何補哉嗚呼君臣亡等脫略邊幅固不足以立萬世經常之制然事天不足奉己過汰又非先王制禮之本意也國家承五代簡陋之習制度踈略駁毋庸議自范質討論故事而始定鹵簿之圖太祖謂范質曰今時和嵗豐克舉禋祀卿宜講求遺逸副朕寅恭之意焉質等討尋故事推得大成南郊鹵簿等圗上之自陶榖為禮儀使而始定鹵簿之制太祖南郊陶榖為禮儀使定鹵簿儀仗其導駕押仗之服則從開元五色之禮其執仗次第之色則從五行相生之次其乘輿則增造五輅其奉身則備用六引作於乾德之四年成於開寶之三年而用於開寶之四年太祖增其儀衛仁宗煥其采章神宗哲宗更正其制作徽圖寶記藏在祕府今披而視之尚猶聳然而作如望旄頭之塵而聽屬車之音噫盛哉開寶四年十一月親享太廟始用繡衣鹵簿繡又輿服志槀太祖親閲儀仗毁其不中度者易以文自此儀衛寖盛太宗真宗又增益之仁宗即位宋綬定鹵簿為圖記十卷上之司又神宗元豐三年詳定禮文所言詳鹵簿記公卿奉第一開封令乘輕車次太常卿乘革車隼旗次太常卿乘革車鳳旗次司徒乘革車瑞馬旗御史大夫乘革車獬豸旗次兵部尚書乘革車虎旗皆非是縣令五品秩比大夫常乘墨車建旗諸侯當乘墨車建旗太常卿古春官當乘夏縵建旃司徒令王公當乘夏縵建旃從之又元祐七年大常言議所說王公以下繖合用青令鹵簿圖六引紫繖乞改用青從之八又元祐七年鹵簿圖改二十宿旗然嘗觀其制度矣天子之制鸞駕用之朝陵謁廟其四曰黃麾仗用之省方親征大駕凡二萬餘人法駕省三分之一鸞駕半於法駕黃麾仗又減於鸞駕夫祖宗之嚴於祭祀也故大駕法駕鸞駕為甚重其數為甚備祖宗之略於自奉也故黃麾仗其制為甚疏其數為甚簡嗚呼其得周人祀享之禮歟元龜凡鹵簿四等一曰大駕二曰法駕三曰鸞駕四曰黃麾仗大駕者郊祀籍田獻玉清昭應宫景靈宫用之法駕者泰山下汾隂行禮用之鸞駕者朝陵迎大小天書東封西祀朝謁太清宫大告太清宫躬謝大齊用之本名小駕黃麾仗者御樓車駕親征或有省方還京上遂用之又李清臣輿服志槀按皇祐二年鹵簿使言明堂大享用法駕鹵簿減大駕三分之一得兵部仗大駕用萬有八千二百五十六人法駕減其一用萬有一千一百七十人檢祥符封禪法駕人數用萬有一千六百六十一人本部無法駕字圖又文牘散逸望同禮官詳定乃定萬一千八十八人如此則數又不同是故開寶之鹵簿遺逸特命討尋固也然非事天禋祀則未必備見上康定之儀衛寡薄特令加備固也然非郊廟大禮則未必增輿服志橐康定元年宋庠言郊廟大禮惟鹵簿外常日導從前有駕頭而後有擁蔽之扇而正侍從百司官屬下至厮役皆雜行中道士庶夾道馳走喧呼不禁非所謂旄頭先驅清道後行也國朝承五代荒殘之弊盡去戈㦸旌旗之制儀衛簡寡頗同藩鎮宜委近臣討論儀從及鹵簿參酌取其中稍增儀物諸禮院詳定玉輅大祀之禮也不敢施之齊宿元豐四年太常言齊祀之車異用國朝親祀致齊翌日即進玉輅非是謂致齊翌日進金輅至太廟齊宿翌日行禮畢進玉輅赴南郊毬杖玩習之物也不敢用之南郊恐其䙝也志槀景祐五年賈昌朝言儀衛三事一曰南郊鹵簿車駕出宫曰執毬杖夫毬杖非古蓋唐世尚之以資玩習方今親奉大禮乃陳戲賞之具未為允稱宜亟去毬杖此祖宗以事天為盛舉以祀禮為縟儀則儀衛之詳何慊焉郊禮古今郊祀之議有二曰天地並祭之議祖宗並配之議喙喙爭鳴人人異見自漢儒至我朝治平元祐諸君子之說不知幾千百年于兹然議禮如訟毋惡於爭執經如仇不厭其異要之制禮至聖人而定議禮至聖經而定則制度合而議論決矣夫郊祭之禮見於周典三代以來未之有改也後之議者或主以分祭之說或主以合祭之說而分合之議分矣周禮禮記注疏君子但觀昊天有成命之詩聖人合言郊祀天地之意則合祭之禮誠當也詩昊天有成命篇配享之禮肇於周易豫卦三代以來亦未之有變也後之議者或主以嚴父之說或主以尊祖之說而配享之議分矣記祭法注疏君子但觀思文我將之詩聖人載后稷文王配祀之意則並配之禮亦宜也詩我將思文二詩蓋嘗考之國朝矣合祭始於乾德之元年也甲子南至行禮圜丘時從劉溫叟禮圖之論長編藝祖乾德元年范質張昭劉溫叟行禮圖相與討閲故事上之上甚嘉之其後遵用此制十一月甲子日南至合祭天地于圜丘自是而後或太宗郊五或真宗郊五或九郊或三郊皆用是典其不合祭者惟元豐六年之一郊耳奏議元祐七年顧臨等言宋興以來太祖郊四太宗郊五真宗郊五仁宗郊九英宗郊一神宗郊三皆合祭不合祭者惟元豐六年一郊耳陛下嗣位八年已再享明堂今初郊禮若循祖宗之舊他日果能行北郊之禮然後罷合祭未為失也元祐於是有分合之議顧臨曰合祭是范純禮曰分祭是七年顧臨等八人議請合祭范純禮等二十三人言合祭不見於經三省進呈顧臨等議太皇太后曰宜依仁宗先帝故事吕大防蘇軾蘇頌以合祭為是范百祿以元豐六年南郊分禮上帝配以太祖未可輕改大防又以皇帝即位未嘗親祀天地合行合祭之禮為有名蘇軾曰分祭非劉安世曰合祭非初議北郊禮蘇軾主合祭從之者五人劉安世謂當分祭從者三四十人軾引昊天有成命詩以難分祭議後癸巳合祭天地于圜丘然當時卒從合祭之說蓋祖宗成法萬世不昜皆合昊天有成命之詩有不容輕昜者矣見上且嚴父配享始於乾德之元年也南郊親祀升配宣祖時從張昭之議長編乾德元年十一月合祭天地於南郊以宣祖配初有司議配享請以僖祖升配張昭曰唐貞觀初以髙祖配圜丘梁太祖郊天以皇考烈祖配恭惟宣祖積纍勳伐肇基王業請奉以配享從之自是而後有配以始祖長編雍熙元年初太祖請祀以宣祖配及上即位禮官以為舜郊嚳商郊契周郊后稷王業因之而興也故太平興國三年六年並以太祖配天於禮為允上將東封扈蒙奏嚴父莫大於配天遂用蒙議有配以祖考長編淳化三年蘇昜簡言聖朝親祀圜丘以宣祖侑符聖人大孝之道成嚴父配天之義恭惟太祖光啓丕圖以聖授聖按唐永徽中以髙祖太宗同配望將來郊丘奉宣祖同配從之有三聖同侑有祖宗迭配其前後升配之禮不一矣長編景祐二年禮院言太祖為帝者祖太宗真宗為帝者宗三廟並萬世不遷太宗親郊奉宣祖太祖配真宗肇祀奉太祖太宗配今三宗同躋不祧之位請以太祖為定配二宗為迭配其將來皇帝親祀且請以三聖皆侑年又按國史此後並迭配故慶厯七年楊察言景祐二敕太祖為定配二宗為迭配慶厯四年南郊已奉太祖太宗配今合以太祖真宗配詔依又按皇祐二年大享明堂三聖同侑自此以後並三聖同侑云云治平於是有並配之議王圭曰請以嚴父蓋主仁宗也長編治平元年詔以仁宗配享明堂初禮院奏乞與兩制同議王圭請依周公嚴父配享明堂王疇請依王圭議奉仁宗配享吕誨曰請以尊祖蓋主真宗也同上司馬光吕誨議祀無豐于昵考經曰嚴父莫大於配天以周公有聖人之德而文王適其父也近世祀明堂皆以父配於五帝此乃誤識孝經之意宜遵古禮以真宗配錢公輔曰請以祖宗蓋主太祖太宗也同上錢公輔議郊之祭以始封之祖有聖人之德者配焉明堂之祭以創業繼統之君有聖人之德者配焉太祖則周之后稷配祭于郊者也太宗則周之文王配祭于明堂者也此二配萬世不遷李受傳曰請以祖考蓋主真宗仁宗也同上李受傳乞以仁宗與真宗並配先王作樂崇德薦之上帝以配祖考其以祖考並配也然當時卒從嚴父宗祀之說者蓋明堂尊父郊以尊祖合於我將思文之詩有不容輕議者矣雖然制度不考無以合古誠敬不足無以格天夫古者其席藳秸其祭掃地其器陶匏蓋尚質以章天德也我祖宗乘輿服御並從儉約毋外飾也聖政孝宗隆興三年詔曰太祖皇帝乾德元年郊祀詔書有令務從省約毋至勞煩仰見事天之誠惜民之心朕遵皇祖之典崇儉德而戒勞民除事神賞軍外其乘輿服御及中外之費並從省約青城帟幕務從簡省毋美觀也紹興十三年進呈郊禮宿齊洗如望祭青城幕次事上曰止是一宿不必枉費人力所有宿齊處望祭殿只隨宜絞縛用蘆席青布之類不得侈大古者鬼神之享享于克誠黍稷之馨不如明德蓋修德以享天心也我祖宗屏去葷茹天子身行之則一陟一降在帝左右矣長編拾遺祥符二年上曰太祖太宗每奉郊禮皆屏葷茹朕二祀圜丘並遵行之但外庭不知耳前期洗沐與百官共由之則彼此奔走對越在天矣類苑太平興國二年太宗謂近臣曰朕將郊祀如聞行事官不盡嚴潔當令致齊日即洗潔衣服為民祈福此其小心翼翼嚴恭寅畏之德蓋異世同符百聖一揆初未嘗一毫間斷也宜乎一德享天三靈垂貺故夜月澄爽雲物晏溫則元祐親祠之日也元祐七年十一月冬至合祭天地于圜丘是日五鼓輦詣壇外壝百官待詔不立班自小次歷午陛外壇不設茵褥稽首跪奠致誠極恭夜月澄爽雲物晏溫比還御殿肆赦終日和暖翌日風寒相屬時雪如期朝獻則杲日麗空登壇則台星騰彩紹興十六年十一月初上致齊而雲作及朝獻則杲日麗空至郊夕則微隂登壇即霽而台星見則紹興肇禋之日也帝鑒不逺洋洋其上微之顯誠之不可掩也如此夫社稷縟儀肅將明禋具舉人君所以備事神之文一德格天百靈孚佑人君所以盡感神之實夫人非土不生非榖不食社稷之祭誠重矣是故封人設壝不屋而壇此壇壝之制嚴也周禮薦必以血牲必以黝此牲牢之具潔也王制云天子祭社稷皆少牢皆黝用黑常月用甲祭日之晨王及臣皆服絺冕歌奏應鍾其舞以帗則樂舞之儀為如何大司樂服尚絺冕其飾三章則服冕之用為如何見上春夏祈榖載芟歌之秋冬報禮良耜載詠此人君事神之文備矣然夏德一懋而山川鬼神亦莫不寧有道曽孫一興義兵而所過名山大川之神皆隂拱而受職焉是又感神之德然也豈必因祭祀而始獲地示之福哉噫儒者講禮於千百載之下不明其禮文固無以定沿革之制不究其名義亦無以訂議論之實夫社者五土之神稷者五榖之神土榖之有功於民此祀典之所當尊是以人臣有平土之功則取以配社有播榖之功則取以配稷夫何疑而後儒紛紛之議執經如仇辨禮如訟嗚呼亦惑矣且有功於民者祀之古今之通議也昔共工氏之子龍有平土之功髙陽氏之子黎亦有平土之功是故祭社之日取二子以配食焉示不忘本之義也然則今之配祀者謂之龍可也黎亦可也何慊於二名耶彼直以龍與黎為社之正神而非配社者漢儒之妄也或曰不然使社為土神則當祀以犢不當兼用羊豕也殊不知用犢祭地禮也社乃地祇之屬而非地猶五帝為天之尊神而非天也安得不用羊豕吾益知社為土之正神而無疑也鄭元注社稷者五榖之神勾龍后稷以配食也按所據郊特牲云社祭土而主隂氣君南向於北牖下答隂之義又云社者神社之道又周禮以血祭祭社稷五祀五樂用靈鼓大喪三年不祭惟天地社稷越紼而行事王肅云勾龍周棄並為五官故禮為社稷又牲用太牢與天地不同若榖是榖神祀之用榖反自食乎崔靈恩云二家之說鄭為長餘見禮記烈山氏之子柱有播榖之功厲山氏之子農亦有播榖之功是故祭稷之日取二子以配食焉亦不忘本之義也然則今之配祀者謂之柱可也農亦可也何嫌於二名耶彼直以柱與農為稷之正神而非配稷者又漢儒之妄也或曰不然使稷為榖神則當祀以犢不當復用黍稷也殊不知用犢祭地禮也稷乃地祇之屬而非地猶五帝為天之尊神而非天也安得不用黍稷吾益知稷為榖之正神而無疑也見上孝經說云社者土之神稷者能布五榖皆土地自然之氣故名曰神則社稷之為正神而非人為之也不亦可信矣乎見孝經疏祭法有云共工氏之子能平九州厲山氏之子能植百榖則數臣之配食社稷而非正神也不亦可信乎昔厲山氏之有天下也其子曰農能植百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社考歷代之制度訂諸儒之議論而社稷之義定矣國朝以重農為國本以明禮為家法縟典盛儀於皇三代故大社之饌定於竇儀長編太祖初有事於太廟乃詔竇儀定其儀注儀以開元禮參酌於三代之典繼以進食之祭作雍和樂大社之饌自正門入配坐之饌自左門入皇帝詣壘洗之儀如圜丘屋壇之制申於王隨天聖十年太常王隨言壇廣五丈髙五尺五色土為之四面各一屋惟南無屋三獻之禮得於奉常李維之請景德間太常李維言社稷同釋奠之禮埋血之祭定於元豐禮院之議元豐四年詳定禮文所言今社稷儀注不用血祭皆違禮經伏請社稷以埋血為始從之其定籩豆簠簋之數見於景德四年之詔正配祀二籩豆三簠簋二爼從祀籩豆二簠簋爼一其考儀注祝文之事見於天聖七年之議祝文云以后稷配棄言柱與棄俱為稷不稱棄何以别於柱嗚呼其制備矣其文侈矣其意厚矣而祖宗所以感神者又出於禮文之外宋德當天社稷鼎安歷三百年而又有以遺萬載無疆之休和氣致祥農扈告豐百室盈止而享黍稷稻梁之慶故勾龍為社夏制也且拳拳於過門不入土功用成之日秋報歌詩周制也而豳風農桑之務且致意焉有事神之文有感神之實而後質之鬼神而無愧矣古今源流至論前集卷十
