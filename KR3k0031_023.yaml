body:
  text: 古今源流至論續集卷三宋林駉撰內帑古者藏富於民後世藏富於國又其後藏富於府庫世儒皆有是言矣噫亦嘗觀其用之之意乎夫內庭之費外朝之所不及知宮掖之藏有司之所不敢問固也然使其均節之有人出入之有度則雖籍而在內內猶外也名而為私私猶公也何歉乎嘗觀古今公私之意矣周人制於冢宰冢宰大臣也故不敢有侈用之心漢初屬於少府少府外朝也故亦無滲漏之弊至東漢歷唐率以閹人主之而財用始専為私用爾我朝舉內帑之財而屬於三司之使其亦成周之意歟嘗觀周官之書有太府有玉府有天府有外府有內府皆王之府藏也凡頒其貨于受藏之府頒其賄于受用之府則太府掌之凡良貨賄之藏以共王之珠玉則玉府掌之凡藏國之寶鎮寶器則天府掌之而外府之職則掌布之出入以共百物之用內府之藏則受九貢九賦之貨賄以待邦之大用别而言之府庫之名不同合而言之皆聖人之所藏也然而內府之藏所以待邦之大用者尤異于他府內府掌受九貢九賦之貨賄以待邦之大用凡四方之幣獻金玉齒革兵器凡良貨賄入焉凡王及冢宰之好賜豫則共之而受九貢貨賄又出於太宰之手以此知周人之積所用者邦用所受者太宰又安有一己之私乎漢人財賦分為二品其一以給國家之公用則司農之所掌其一以給天子之私養則少府之所掌至其財之所入則田租均輸司農事陂澤市租少府事也官表大司農掌榖貨屬有均輸官少府掌山海池澤之稅以給共養嘗觀哀帝發武庫兵送董賢毋將隆奏武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乘輿不以給共養共養勞費一出少府是不以本藏給末用不以民力共浮費毋將隆𫝊哀帝即位遷執金吾時侍中董賢方貴上使中黃門發武庫前後十輩送賢及上乳母王阿舍隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乘輿不以給共養共養勞賜一出少府蓋不以本藏給末用不以民力共浮費别公私也及觀元帝世賈捐之言往者暴師曾未一年兵不踰千里費四十餘萬大司農錢盡乃以少府禁錢續之見國用條注是又以私藏為公用以內帑為外費夫大農公用也而天子不敢私用之少府私用也而大農得公用之私不得以傷公而本得以資末亦良法也况少府外朝之臣而得主內庭之物故宫掖無橫出之私閹宦無干預之弊尤漢人之美意又安有一己之私乎東漢始以山海鹽鐵而歸之郡縣出少府禁錢而屬之司農非不可也後百官志郡國􅐭鐵官本屬司農中興皆屬郡縣餘均輸官等皆省又漢承秦凡山澤陂池之私名曰禁錢屬少府世祖改屬司農然宫中私用一切皆於司農取之而司農又不盡應其求章和以來不能堪此於是别自立監而用閹人領之章帝章和元年宮中别立一監命閹人主之而桓靈諸君每歎天子無私財而開鴻都賣爵以為私藏矣靈帝光和元年初開西邸賣官初帝每嘆桓帝無私財故賣官聚財以為私藏自關內侯虎賁羽林入錢各有差夫宮掖之費在內所不能免而使一切取辦於外庭則固有其制而不得為者此所以計出於亡聊而有為庫之私也唐始以財賦所入皆在左藏盈虛之數太府上之出納之數比部覆之非不可也及第五琦不能禁豪將之求取乃悉納之內帑天子以給取為便而天下公賦皆為天子私藏有司不敢計而弊端舞弄於孺宦之手至楊炎請出內帑以歸有司當時方喜有貞觀之風未幾盧杞一用而炎卒貶死前日之法盡變異時瓊林大盈第為己蓄而不計邦用之虛盈矣楊炎傳德宗即位拜門下侍郎同平章舊制天下財賦皆入左藏庫而太府四時以數聞尚書部覆出納舉無奸欺及第五琦為度支鹽鐵使京師豪將求取無節琦不能禁乃悉租賦進大盈內庫天子以給取為便故不復出自是天下公賦為人君私藏有司不得計贏少而宦官以冗名持簿者三百人及炎為相言於帝曰財賦者邦國大本而生人喉命先朝權制以中人領其職五尺宦豎操邦之柄豐儉盈虛雖大臣不得知則無以計天下利害請出之以歸有司度宮中經費一嵗幾何量數奉入不敢以闕帝從之後炎貶死嶺表盧杞用事而瓊林大盈復命宦者主之夫東漢之别監唐人之大盈是亦周漢內府少府之制然不歸於大臣而歸於孺宦不屬於外朝而屬於內庭帳籍無考姦弊肆出以啓異時宦官之恣此其所以為失也成周之意一失於東都再失於唐寥寥千載而能追其意者其惟國朝乎昔我藝祖皇帝斬刈蓬蒿混一版圗梯來索引之國奉琛相望嶺表海嶠之邦入貢不絶府庫充盈林積山阜遂别建內帑以藏之時乾德之初年也編年國初天下盡入左藏庫乾德初府庫充溢太祖嘗顧左右曰軍興饑饉須預為之備若臨事厚斂非長計也於講武殿别為內庫以貯金帛夫上不歸於有司下不散於爾民而第藏於府庫之私我祖果何意哉噫孰知聖人深長慮歟太祖嘗語左右曰軍興饑饉須預為備臨事厚斂非長計也遂别為內庫以貯金帛我祖之意為民計也則內帑之立私耶公耶見上又嘗語近臣曰朕憫八州之民久陷契丹俟蓄滿五百萬緡以贖山後諸郡我祖之意為國慮也則內帑之立私耶公耶寶訓太祖别庫曰封椿庫每嵗國用之餘皆入焉嘗語近臣曰石晉割幽燕諸郡以歸契丹俟蓄滿五百萬緡以贖山後諸郡聖人用心與天地同其公與民臣同其情於此可見矣列聖相承銖積寸纍為民而守無毫髮私貨泉金帛分命有司専職守也長編太平興國二年命賈黃中程能馮瓉分掌左藏二庫先是貨泉與金帛通掌久儲蓄盈羡始分命之牙錢匣藏參驗定數防㵕漏也熙寧二年神宗謂輔臣曰太宗時內藏財貨每千用二牙錢記之名物不同所用錢色亦異他人莫能曉也嘗匣而置之御閣以參驗帳籍中定數晚年嘗出錢示真宗曰善保此足矣今守內藏臣皆不曉帳籍關防之法當更擇人領之不特此爾金帛雖多不敢私用真宗訓之五朝寶訓真宗嘗幸景德殿庫閲所積金帛謂左右曰每念四方輸賦不易金帛雖多朕亦不敢私用朕於宮中一無所費仁宗戒之長編慶厯二年罷左藏月進錢千二百緡語輔臣曰此周公所謂供王之好用者朕宮中無所費併以賜將官在上之訓戒為如何宮中私費孫甫有諫慶厯二年孫甫言景福內庫祖宗以備非常之用近嵗諸路物帛多入內庫內外盡疑宮中之私費唐置瓊林大盈二庫率供燕侈今日景福之積頗類唐之二庫近幸侵漁呂誨有諌治平元年呂誨言內帑奉宸庫非有司關掌外臣莫得知具登耗如聞禁中取用尚未節加之近幸因緣侵漁一旦有事何以枝梧在下之規警又如何異時三十庫之羡侈為歌詩皆歷聖積纍儉約之所致元豐元年上每憤契丹倔強慨然有復幽燕之意即景福殿庫聚金帛為兵費是年始更庫名制詩以揭之曰五季失圗玁狁孔熾藝祖造邦思有懲艾爰設內庫期以募士曾孫保之敢忘厥志凡三十庫後積羡贏又揭以詩曰每乾夕惕心妄意遵洪業顧豫不武姿何以成戎捷至有軍國經常之費又皆取而為吾國吾民之用非徒為是蓄積也明道出禁錢以賜三司仁宗明道二年以內藏錢百萬賜三司初三司以用度不足假於上上曰國家禁錢本無內外蓋以助經費也慶厯罷月進錢以賜縣官見上此則為經費之助也皇祐出內藏庫絹以糴軍糧通鑑仁宗皇祐二年冬出內藏庫緡錢四十萬紬絹六十萬下河北使糴糧草四年又出內藏庫錢三十萬緡絹十五萬匹下河北助糴軍糧至和又出內藏庫錢以糴軍儲通鑑至和初出內藏庫錢三十萬助軍儲此則為軍食之費也陜西博糴以濟饑民則賫奉宸銀三萬兩寶訓慶厯四年遣內侍賫奉宸銀三萬兩下陜西博糴糧麥以濟饑民河北水災欲行賑貸則出內藏絹三十萬匹嘉祐元年出內藏庫絹三十萬匹銀十萬兩賑貸河北水災非為民用乎河北賞軍此公費也而亦出內庫之帛皇祐二年出內藏庫絹五十萬下河北陜西河東以備軍賞河北買馬此外帑也而亦賫奉宸之珠神宗熙寧元年詔出奉宸珠二千三百四十萬付河北四榷場鬻之别封樁以備置馬此非兵用乎以至平荆湖則用之祠郊丘則用之真宗出陳彭年所撰內藏庫記示王曾太祖以來有景福內庫先帝改此名所儲金帛以備軍國之用非自奉也二帝之平荆湖西蜀嶺表江左河東親祀郊丘所費巨萬皆出於是寶訓皆非為一己私奉爾噫此猶未足見聖人之公心也自漢唐以來內帑蓄儲一出閹寺而外庭不得過而問焉景德中真宗令內庫取索必經三司真宗幸景德殿庫曰此庫金帛最多不敢私用自今非時取索必經三司出納景祐中程琳為三司使禁中所取輒覆奏罷景祐元年程琳為三司使禁中有所取輒覆奏罷之內侍言琳専琳曰三司財賦皆朝廷有也臣為陛下惜耳財之所用既為國費財之所主又歸大臣此與周人冢宰之意均爾漢唐之君得無有靦面目乎今天子仁儉有菲食浣衣之德宮闈簡約無金瑰珠礫之侈纍纍丘山浩浩江海不待言耳然祖宗之內藏為幽燕設也今日之內藏亦為祖宗計可也昔神宗歌景福庫之詩曰五季失圗玁狁孔熾藝祖造邦思有懲艾爰設內府期以募士曾孫保之敢忘厥志愚願聖天子以此為訓見上注州縣財井田之法行而財藏於民漢承秦阡陌之後加之武帝多事之餘取民之目愈悉已不在民矣而猶在郡縣不至盡輦京師是亦漢人之良法也是故魚鱉葦蒲之利郡得取之以為饒則山林陂澤之利亦不盡歸少府矣翟方進傳田租之入以待朝廷軍興之用則租賦之入不盡歸之司農矣自武帝置鹽鐵官之後鹽鐵之利雖已行官𣙜而所留於郡國者猶有餘藏則鹽鐵之利亦不盡輸之上林之官矣據郡國出鐵者皆置鐵官而常山郡蒲吾縣有鐵山而不置若郡國置鐵官之外則越嶲郡定筰朔方縣與夫鴈門之祈陽東平之無鹽此數地者皆鹽澤鹽亭所在而當時不置官所以一有軍興用度大農調郡國以給之郡國災荒朝廷亦取旁郡錢榖以助之其三輔所在廪犧官錢至百餘萬蕭望之傳而櫟陽一縣其錢亦不下數千萬薛宣傳財之所在郡縣果何如耶雖然斂收錢榖州縣事也稽收計簿朝廷事也則財之所以散於天下亦未嘗茫然無所考是以調發不給者加以乏興之刑趙廣漢傳尉吏禹劾蘇賢為騎士屯霸上不詣屯所乏軍興用度無據者臨之以放散之律韓延夀𫝊延夀坐放散官錢百萬得罪此又漢人之良法也沿歷至唐此意失矣強藩陸梁者不申戶口而州縣所租歸於藩臣之手唐至中後河北十路不申戶口守臣貢佞者復獻羡餘而州縣所蓄又為京師之貢李絳傳方鎮有地則有賦或嗇用度易羡餘以為獻臣為陛下謹出納烏有羡贏哉又自淮西用兵以來度支鹽鐵及四方爭進奉謂之助軍錢賊平進奉謂之賀禮後又進奉謂之助賞上加尊號又進奉謂之賀禮稅間架算除陌為國計足矣如斯民何德宗貞元後趙贊請復稅間架算除陌而民益愁怨設大盈立內庫為公積厚矣如斯民何楊炎傳舊制天下財賦皆入左藏第五琦悉財賦進大盈內庫天子以給取為便而宦官以冗名持簿者三百人又其極也私家無銅爐平地無銅山而民之錢空於官耳唐人詩二月賣新絲五月糶新榖而民之衣食竭於官耳五代聶夷中詩二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉至國家肇造之初海內分裂天下賦入不上於版曹者大半建隆三年始出師平湖南已而湖南平又三年平蜀又六年下江南又四年收嶺南師旅嵗興皆仰縣官當是時也外而邉郡分命將師鎮禦西北郡中管𣙜之利悉以與之恣其回易不責其上供也三朝寶訓國朝僭僞未下命李漢超屯關南郭進控西山趙贊屯延州凡列郡禦北虜太原西戎之郡管𣙜之利悉以與之恣其回易免所過征稅由是邉臣多致克捷二十年間無西北之憂內而州郡轉運雖𨽻於三司而總一道稅賦之利則得以擅其裒多益寡之權郡守雖統於轉運而合一州地利支酬不盡之贏則得以為屏翰保固之資亦不盡責其上供也國初一路賦稅榷酤商稅茶鹽坑冶之利轉運得以裒多益寡以給邉郡其二稅定例分數𨽻屬州縣及係官廓稅以地利坊場河渡支酬衙門不盡者盡歸本州其係省經費錢帛貯之軍資庫轉運總之若屬州縣之財别有州府庫貯藏聽知通備用非常其犒饋燕設則有公使庫仍許回易收息支費其量分方鎮財用付郡守其㫖逺哉州郡足以聚人率衆屏翰王室皆有其資是故為三司者不敢斂州縣之財以厚公帑為漕使郡守者不敢輦州郡之財以入京師陳晉公恕嘗任三司使矣茶法之定止從中䇿以求公私之兼濟而取利太深者置而不用焉陳恕為三司使將立茶私召茶商數十人俾條利害第為三等副使宋太祖曰吾觀上等之說利取太深此可行於商賈不可行於朝廷下等因滅裂無取惟中等之說公私皆濟世言三司使之才惟恕為稱首張方平亦嘗任三司使矣拱辰𣙜鹽之請公乃具陳本末立止其事且請下免𣙜之詔焉此為三司使者然也王拱辰請𣙜河北鹽張方平見上曰河北再𣙜鹽何也仁宗驚曰始立法非再也公曰周世宗𣙜河北鹽犯輒處死世宗北伐父老遮道泣訴請以鹽課均之兩稅而弛其禁世宗許之今兩稅鹽是也豈非再𣙜乎仁宗大悟曰卿語宰相立罷之遂下詔張士遜嘗為江西轉運矣王文正以𣙜利之至告之而士遜未嘗求錐刀之利真宗時張士遜為江南轉運使辭王文正公曰求教公曰朝廷𣙜利至矣後士遜思公之言未嘗求錐刀之利富公弼嘗知青州矣朝廷輦青州之錢以入而富公力言其害此為漕使守臣然也富弼知青州朝廷輦青州之財入於京師公上疏力言之豈非州郡之地其財用之根本歟王金陵何人哉取祖宗培植根本之地而斧斤之茶鹽坑冶有使者而茶鹽坑冶之利州縣不得私坊場河渡募衙前而坊場河渡之利州縣不得取二稅分數舊屬州縣也至是歸運司以備經費矣軍資錢帛舊與州縣也至是亦歸運司以備經費矣昔聽其回易也今禁之昔許其醖造也今限之熙寧初安石言郡守持權太重以坊場河渡戶絶之産召人買僕斷佃量破雇直以募衙前餘以助常平青苗取息二分為抵當市易以抑兼并其舊例二稅分數房廓地利盡歸運司以屬經費只有公使庫限額正使錢為守臣之施設又禁其回易限其醖造行之十年州郡饋犒幾乏其資此守臣無財也餘見上甚至行均輸市易之法而商賈之民困時安石為均輸市易青苗保馬保甲鄭俠至為流民圖行寬剩役錢之法而下户之民困安石行雇役法舊行差役下户不與今行雇法下戶皆輸錢雇直之外謂之寬剩錢行青苗放息之法而天下之民困安石行青苗法二分取息范鎮曰青苗者唐亂世所為是盜跖之法也噫三頃荒田都賣盡要錢凖備納青苗公獨不聞此詩乎撫州饒竦詩云噫作法於凉其弊猶貪作法於貪弊將若何異時紹聖崇觀奸臣復用其法其弊尤慘皆金陵作俑之罪也中興以來痛務剗革然版章未厚所出者微兵革方興所用者廣仁政之發不逮仁心矣𣙜酤征商契紙頭子已有定額也後以官兵無給復增一分名曰經制焉建炎二年初宣和因方臘之亂官兵無所給乃詔發運使陳亨伯經制東南亨伯始設比較酒務量添酒價及商稅額亦增一分并賣契紙錢公家出納每緡二十三文並號經制錢靖康罷之至是葉夢得言經制之法添商價增嵗額并賣契紙頭子錢皆求於民之所欲非強其所不欲望復行之運司經制以為贍軍已有經制也後以軍用不贍復就數內逐月樁辦名曰月樁焉七年先是諸路贍大軍錢令運司於經制𣙜酟征商等數內逐月樁辦號月樁錢所出不能什之二三餘則州縣之吏臨時措置未免取之百姓民戶出錢本為雇役也今復拘入贍軍與夫抵常庫之四分轉運司之移用當平之七分茶鹽之貸息悉歸上供名曰總制焉建炎五年令章誼措置財用初州縣出納錢物每名收二十三文作經制錢至是加為定數除舊合得外餘並拘法以助軍需既又拘耆戶長雇錢并抵當庫四分息錢及轉運司移用常平司七分茶鹽司之貸息錢悉歸總制司而總制錢自此始矣不特此耳降本和買法也今本錢不給又為折帛矣紹興九年謝祖信言和預買為民之病有司變為折易又甚病者也祖宗時官俵錢於春民輸縑於夏公私兩利其後官無本可俵則名為預買其實白著軍興行一切之政數嵗前縑價高折錢或十千八千今減價而有司猶執前直一例折錢使民鬻絹而求錢此又甚病者降本和糴法也今本錢不給又有要索矣紹興二十八年自紹興改元以後每嵗降本錢下江浙湖南和糴以備軍儲閏八月宰執奏乞與蠲免上曰朕向在河朔見民以為苦朝廷所降本錢州縣移用不即時給縱有給處又為吏多需今幸軍儲粗足豈得已不已也諸路上供之外復有無額上供錢耳紹興二十五年時諸路上供數外又有無額上供錢及一百貫以上川蜀明告激賞絹之外又有隂取激賞錢耳紹興二十七年趙逵奏四川激賞絹官以所納揭之通衢此明告而取之如給賞錢之類總領以數下州縣必陽戒之曰無損嵗計無傷民力此隂取而不告也朝廷之費用莫支而州縣之根括無已况又有歸名有宗室有添差有離軍揀汰衆口嗷嗷衣食縣官一有不給謗讟隨之上既輦京師為上供之數下復有諸邑為衣食之給為州縣者亦難乎哉為今之計先裕大農而州縣自裕耳經常錢物閲兩嵗而未發者大農之錢也今則拘催所拘之場務嵗終所餘與夫乳香度牒等錢大農之錢也今則封樁庫樁之南庫舊𨽻於大農者也今則提領有官大農無與焉誠以是三者歸之大農則夫有名無實虛樁而不可指擬者可以次第捐之州縣州縣既裕則民力亦少寬矣不然捕蛇說猛虎行亦徒為喋喋也漕運觀禹貢所載入于渭亂于河之類所輸不過九州之方物書禹貢則知漕運之法三代之時未立也觀管子所載粟行五百里之類所漕不過一時之挽卒管子則知國都之漕春秋之時亦未聞也豫嘗推原其故蓋古者天子中千里而為都公侯中百里而為都天子之都漕運所貢入者不過五百里之地諸侯之都漕運所貢入者不過五十里之地乘輿服制之用宗廟百司之給自足以供雖春秋戰國以來行師千里間行漕挽然事已兵休猶未至於甚病而所以輸於國都者不出五百里五十里爾自秦罷侯置郡漕法始講致瀕海之粟輸北河之倉伍被傳秦致瀕海之粟轉于兩河蓋以三十餘鍾而致一石而民始病矣然則秦為漕運之俑乎通與秦欲攻丐奴琅琊負海之粟轉輸北河率三十鍾而致一石逮至漢唐其事愈詳方其初年邉事未興兵役未煩故漕運之費省至其後也征伐日勞供役日廣故漕運之費多自今觀之漢初京師之用止仰近郡諸侯之粟不歸天子當時關東之漕僅數十萬石而已食貨志漢初漕關東粟以給中都官嵗不過數十萬石其省何如也及武帝以後山東漕益而為百餘萬石溝洫志武帝時河東守潘系言漕從山東上嵗百餘萬石既而縣官度食者衆則河漕又益而為四百萬石食貨志武帝時其沒入奴婢諸苑養狗馬禽獸官益雜置多徒婢衆而下河漕發四百萬餘石及官自糴乃足繼而言利之臣愈請增益則山東之漕且至六百萬石焉食貨志宏羊請山東益六百萬石逮至軍旅既息之後每嵗漕榖為石猶不下四百萬食貨志五鳯中耿夀昌言嵗漕關東榖四百萬石以給京師向者諸侯自殖之粟至是削弱皆轉輸於中都爾唐初府兵之法未壞平時無事身居田畝一有征行自為調度當時關中之漕不過十萬而已唐食貸志其省何如也及明皇以後天寶每嵗二百五十萬通典天寶中嵗每水陸二百五十萬石廣德嵗轉亦不下百一十萬代宗廣德二年以劉晏専領東都河南淮西江南東西運漕嵗轉粟百一十萬石無升斗溺者唐志甚至江淮之運少緩六軍脫巾於道韓滉之米一至君臣舉酒相慶德宗時江淮米不至六軍脫巾於道而上憂之會韓滉運米至陜上喜謂太子曰米已至陜吾父子得生矣置酒相慶則唐人所以倚辦於此可謂急矣噫引渭穿渠之謀不見於高文之時而見於武帝之世溝洫志武帝時鄭當時為大司農言異時關東漕渠從渭上渡六月罷師古曰計度其上八月而後可罷也而渭水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易漕渡二月罷發卒穿渠以漕大利泝河入渭之說不用於太宗之日而見於代宗之後代宗廣德二年以劉晏領漕江南之運積揚州汴河之運積河隂河船之運積渭口渭船之運入太倉唐志蓋漢唐中年以兵費之故所以屢講而屢詳其勢不得不然也噫兵役漕運相為消長其他朝廷用度百官廪祿十不費一大槩多糜於兵爾豫獨謂漢以用兵而費財唐以養兵而蠧粟養兵者未可遽息用兵者朝罷而夕安此唐之漕運又加詳於漢也大抵漢漕皆仰於山東唐漕皆仰於江淮故武帝時潘系言漕者山東也宏羊益漕者亦山東也並見前注蓋江淮漕米去長安逾逺諸侯自為封殖而已吳王之反自謂聚糧食三十餘年吳王濞𫝊而枚乘之說亦云漢家轉粟西向不如海陵之倉枚乘𫝊故江淮之漕未通而多仰於山東矣天寶以後劉晏所漕者江淮也韓滉所漕者亦江淮也並見前注蓋自開濟漕渠而甸農或至挼穗而關中不足給唐食貨志自藩鎮不申戶口者十五道而河北不足給同上故諸道之漕不通而皆仰於江淮矣此漢唐漕法之本末也國家定都於汴四方輻湊逺近俱便過於漢唐是時漕運之法分為四路東南之粟自汴河而至會要國朝水運自江淮南兩浙荆湖南北路運每嵗租糴至真揚楚泗州置轉船倉受納分調舟船計網泝流入汴至京師發運使領之陜西之粟自黃河而入會要陜西諸州芻粟自黃河三門沿流入汴至三門㳂白波發運判官催綱領之陳蔡之粟自惠民河通之會要惠民河與蔡河一水即閔河也建隆元年始命陳承昭導閔河自新鄭與蔡水合貫京師南歷陳潁達夀春以達淮右舟楫於是以河西為閔河東南為蔡河至開寶六年三月始改閔河為惠民河京東之粟自廣濟河通之會要廣濟河自都城歷漕濟及鄆共廣五文舊云五文河開寶六年改廣濟河然論四河之利害汴河為重黃河次之而惠民廣濟又其次也何以言之視至道所漕之數廣濟十二萬惠民四十萬黃河五十萬而汴河至三百萬於此可見矣至道元年先是汴河嵗運江淮米三百萬石菽一百萬石黃河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十三萬石是嵗汴河運米至五百八十萬石故汴河以發運使副領之黃河以運使判官領之而惠民特命催綱廣濟特用使臣㑹要國朝置淮南兩浙江湖路都大發運使副都監以朝官以上充或諸司使充國朝有三門白波黃河汴河水路發運使三人在三門以朝官充三門判官一人白波判官一人以京朝官充陳潁許蔡光夀諸州之粟芻自石唐惠民河沿泝而至置催綱領之河北衛州東北有御河至乾寧軍饋食邉亦有使臣主之然本朝所謂嵗漕六百萬石景德三年上供六百萬石永為定制出㑹要専倚辦於江淮其他三河所入非大農仰給之所惟是江淮最重故獨於汴河漕法為詳也今以汴漕本末而論之自轉般之法行漕益富而人亦便自直達之法用漕益空而人愈病且國家以東南六路之粟載於真泗轉般之倉江船之入至此而止無稽滯也汴船之出至此而發無覆溺也江船不入汴汴船不入江豈非國家之良法歟國史國家定都大梁尤宿重兵故嵗漕東南米麥六百萬斛漕運以儲積為本故置三轉般倉於真泗二州以發運官董之江船不入汴者即於三倉卸納回運官鹽量給舟人汴船不出江往來轉運無復留滯而三倉常有數年之儲州縣告歉則折納上等優劣謂之額斛計本年最嵗額以倉儲代輸京師謂之代發後於豐熟以中價收米榖賤則官不至傷農饑歉則納錢民以為便故范旻去淮南江淮之間輦運相繼太宗稱其功而奬異之淳化中康定中江淮嵗漕不給京師之軍儲范仲德薦許元為發運判官元曰以六路七十二州之粟不能足京師者吾不信也至行命瀕江州縣留二月糧餘悉發之逺近以次相補引千餘艘轉運而西京師足食故范旻主漕計江淮之間輦運相繼天子加奬許元為判官瀕江之粟千艘而西京師足食其效驗蓋不誣爾並見上注自發運以嵗額不敷之故而拘舟卒江船不至汴船出江而漕法一變矣會要許元比年諸路轉運司年額不敷發運司不放兵卒歸仍令出外江邉沿江州軍截頭運故諸路糧船太半為籍綱發運司搬鹽往遂運米而還且汴船不諳沿江風水沉失者多既從許元議會元罷不即行自閉口之制不行而通冬運役夫搗氷凍死者衆而漕法再變矣會要舊制有閉口十月則舟楫不行王安石欲通冬運不令閉口水淺澀舟不行於是以船艘數十前設巨椎以搗氷役夫苦寒死者甚衆然發綱發運未罷而猶未至大壞也夫何崇觀奸臣以糴本數萬緡為羡餘之貢本錢既竭而無可增糴積粟既空而無可代發於是孝緒說行以轉般之制變為直達之法而漕法至是而三變矣國史崇觀奸臣用事始求美財以供侈費用所親胡師文為大漕以糴本數萬緡充貢而除戶侍自是繼者效尤時有進獻而本錢竭矣本錢既竭不能增糴而漕儲既空無可代發而三倉無用矣乃用曾孝緒之說立直達之法六路郡縣各總嵗額雖湖南北至逺之地亦直抵京師豐不加糴歉處須見米方米綱之來也立法甚峻船有損壞所至修整不得踰時州縣共運皆以費給之以至沿流驅役至必騷擾兼以鹽法既變廽舟無所得舟人逃散舊法盡廢噫孰知直達之法而為吾國吾民之深害歟始者由江而淮由淮而汴人以為便也今綱運直至文移星火而弊壞之外不及修整矣始者以船回鹽以鹽償費人以為利也今鹽法既變絶無錐刀而回船之夫多有逃移矣始者稔嵗則發運收糴公私俱濟也今公帑垂罄糴不得增外郡告荒粟難取辦將何以堪耶並見上注蔡京小人不得不任其咎爾此東京漕法之本末如此今駐蹕吳會蜀漢之粟順流而下以供荆襄之軍閩浙之粟水運而上以供中都之用無復有難致之險然比年以來風濤之突蕩道里之逗留郡之所費不知其幾矣况間嵗不登州以歉告議者又深慮焉將以廣漕歟則東南民力竭矣未易廣也將以省漕歟則六軍百司仰給於此亦未易省也是將何術而可噫木牛流馬不若渭南之屯為可久諸葛亮傳關東轉漕不若三輔之糴為省費食貨志五鳯中大司農中丞耿夀昌言故事嵗漕關東榖數百萬石以給京師用卒六萬人通糴三輔引農河東上黨太原郡榖足給京師又以省關東漕卒今獨不能效其故智乎且荆之區淮之甸田畝相望荆棘未啓者甚衆誠能招徠流民籍之給以田器豫以牛種委守令以督其事遲之數年則一嵗之入必倍於今日矣浙之東吳之㑹舳艫相銜商販奔湊者甚衆誠能捐內帑數百萬以糴之略其譏征廣為儲蓄無拘其限以寬其集無抑其價以誘其來付郡守以領其事以吳越而入京師其勢甚便則轉運之米可以盡計而省之矣捨是不講而泛求廣漕省漕之䇿雖劉晏復生無以為謀矣賦稅孟子曰有布縷之征有粟米之征有力役之征君子用其一緩其二用其二而民有莩用其三而父子離然則明王之法固不出於斯三者就三者之中猶必有緩急以權之則為良法矣欲論成周漢唐征賦之制其可不參酌於此乎今按小司徒云乃均土地而井牧其田野九夫為井四井為邑次而為丘為甸為縣為都以任地事而令貢賦此皆以田而出賦其所謂粟米之征歟康成以小司徒令貢賦之文謂貢嬪婦百工之物則指為布縷之征者非也按載師之凡任地國宅無征園㕓二十而稅一近郊十一逺郊二十而三甸稍都鄙即無過十二此自近郊而下蓋冒園㕓之文爾古者五畝之宅植墻下以桑今園㕓可以植桑於其中則布縷之征蓋出於此其間有植草木亦必計其所有而賦之以代布縷所以輕近而重逺此皆以園㕓而出賦其所謂布縷之征歟康成以載師近郊逺郊謂之國征而為米粟者非也按均人云凡均地征以嵗上下豐年則公旬用三日中年則公旬用二日無年則公旬用一日此皆以力而任事其所謂力役之征歟考諸康成之說亦然也然而周之所以任民者有九職如百工商賈之徒雖亦授田其數鮮矣粟米之征其取既輕布縷均及亦非過取欲進而等之農夫什一之法則夫泉府之入門關之征有廛人司關以掌之固其宜矣是以太宰有九賦之斂自一以至六即載師所謂園廛之賦自七以至九則工商之徒各隨其職而賦之者也康成誤以載師之文而為田稅而太宰之九賦無以當之乃謂九賦計口出泉太宰以九賦斂財貨一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家稍之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦康成注云賦口率出其泉也今之算泉或謂之賦此其舊法歟然則孟子三者之外又將有所謂泉算乎周公之法豈若是其煩哉夫算泉之法近出漢世前未之聞康成以當時法度而推測周法漢家自有制度奈何謂周亦漢耶若夫里布屋粟與夫家之征載師亦掌旅師所聚皆遊惰之罰耳非取民之正法也太宰九貢之法侯國以其所取於民者貢之天豫然後得以用其餘非王令貢之也至於他官之所掌如閭師縣師遂人之所斂即是三者而分職以參治之非有他取也觀周公制度之稅役之多者則輕乎什一役之少者則厚乎什一截長補短欲使其均之為什一而無有幸不幸之嘆至於力役之征時有豐凶而損益焉吾乃今知孟子之說為深得周公之意矣康成談經而不知聖人制法之意有如後人按其成說而行之得無暴取於民而深戾於古歟並周禮小司徒載師均人注至漢之田賦唐之田租正周人米粟之征也漢之更賦唐之庸役正周人力役之征也漢之口賦似有不合而唐之調法正周人布縷之征也且以漢唐租賦而論之漢量吏祿度官用以賦民於是什五稅其一文帝始行賜租之令至十三年之六月乃盡除而不收焉及景帝元年行半租之令而半租之明年則又有三十稅一之令故終漢之世三十稅一者自景帝始也前食貨志漢輕田租什五而稅一量吏祿度官用以賦於民云云至文帝朝錯復說上云云上乃下詔賜民十二年租稅之半明年遂除民田之租稅孝景二年令民半出田租三十而稅一也唐因口分世業之田而立租賦之法田以二百四十步為畝一丁以百畝受之平嵗為米可百二十石而租粟止於二石而唐世以百餘而稅一者自太宗始也食貨志唐制凡民始生為黃四嵗為小十六為中二十為丁六十為老授田之制丁及男年十八以上者田一頃共八十畝為口分二十畝為世業凡授田者每嵗輸粟二斛稻三斛謂之租夫什一天下之中制也輕之入于貉重之流於桀漢唐雖不忍取民必不忍以貉道治天下二十取一百餘稅一可以足乎如其足於此也則景帝太宗果貉道也如其不足於此也則是必有他取於民也何以知之漢自田賦之外有口賦有算賦口賦者民自年三嵗出口錢二十至年十四而止自年十五嵗出算錢百二十至五十六而止自武帝增口錢之三以補車騎馬而口賦始二十三為率是口賦已重於田賦爾漢志高祖四年為口賦算賦注漢儀注民年三嵗出口錢二十至十四而止年十五出算錢百二十為一箅至五十六而止又志漢武帝增口錢錢補車騎馬云此猶可也至更賦正率之更以月代邉戍之更以三日代而不得行者月為錢二千日為錢百王莽以為漢租雖輕而更賦之重至使罷癃之不免其言不為無據然則漢之更賦為民病則輕租僅足以償之爾漢紀注如淳曰三月一更中嵗雇者月二千是為踐更戍邉三日亦名為更有食貨志王莽下令曰漢氏減輕田租三十而稅一常更賦罷癃咸出而豪民侵陵分田劫假厥名三十實什稅一也唐自田租之外有調有庸調者隨家以出為絹二匹綿三兩無綿絹則為布二丈五尺是調賦又重於田租爾唐志丁隨鄉所出嵗輸絹二匹綾絹二丈布加五之一麻三斤非蠶鄉則輸銀十四兩謂之調此猶可也至庸法以身為役嵗以二十為率是已七倍於古其為法以丁身為本案開元赦文有戶高丁多父母在而别籍居者迹其故豈不由丁口增多給田有限而庸役有加所以致此馬周疏言今之戶口不及隋十一而徭役者兄去弟還道路相繼其言亦不為無據然則唐之庸役為民病則輕租亦僅足以償之耳唐食貨志用人之役以二十日閏加二日不及者日為絹三尺謂之庸有事而加役二十五日免調三十者租調皆免止役不過五十日餘見馬周𫝊及元宗紀不特此爾古者授田於官八家百畝是民皆有田也漢為豪民之所占見上注唐以貧民之所鬻食貨志貧無以葬者得賣世業田則雖輕租薄賦民何賴焉古者輸賦於官各供所有是民無他費也漢之算賦則以錢見上唐之兩稅亦以錢貞元四年詔天下兩稅始用楊炎嵗為之夏輸無過六月秋輸無過十月自初定兩稅貨重錢輕乃斗錢而輸綾絹既而物價愈下所納愈多雖賦不增舊而民愈困矣則雖輕租薄賦民何賴焉此漢唐之賦往往倍於成周也雖然以漢唐而論則漢又逺過於唐漢法雖有害於民而實優於農減租之詔無嵗無之故流民免元帝紀初元元年資錢不滿二萬免平帝行所過免武宣元成紀初郡免食貨志武帝災郡免于定國𫝊及昭宣元成紀軍事勞苦免高紀二年假田免元紀初元元年而新田則稍入武帝時河東渠田廢令賦稍入逋租之民又時貸焉成紀建始二年河平四年其待農之意何如哉是雖他賦過重而農尚亡恙也武帝費用百出利析秋毫直至海內虛耗而後已然輪臺之詔一下而民遽有息肩之意者蓋當時取民之法固為甚苛在商賈均輸平準鹽鐵之賦而已而漢家三十稅一之法猶存不改於農無加損也若唐之租調亦為良法奈何德宗從楊炎之請遽變為兩稅使他賦有出於商賈園林之征亦皆取給於田是雖曰省賦而農民之蠧甚矣見上注此終唐之世民生無聊之由也五代以來橫斂四出國朝立極已加蠲免而舊嵗之額視唐為加重熙寧以來新法一行元祐雖變紹聖復開而名色之多視國初為加重渡江以來賦入日少時復多事而一切之賦視熙豐為復重噫民病矣其可不思所以寬之歟且輸米一石加錢百餘舊無是也而廣南行之開寶三年詔廣南州縣嵗輸米稅每石加率錢百六十今每石上十文餘並倣未納國租先遭率斂舊無是也而漢晉創之雍熙二年上謂宰臣曰晉漢未納王租先遭率斂近年以來頗革此弊亦可謂之小康矣畝稅三斗錢氏弊政也兩浙田稅畝三斗錢氏國除朝廷遣王方質均兩浙雜稅方贄令畝出一斗使還責擅減租稅方贄以謂畝稅一斗者天下之通法兩浙既為王民豈循僞國之法上從之惟江南福建猶循舊額人出地稅絹馬氏橫斂也咸平三年李允則知潭州初馬氏暴斂州人嵗出絹謂之地稅及潘美定湖南計屋每間輸絹丈三尺謂之屋稅營田戶給牛輸嵗米四斛牛死猶輸謂之枯骨允則請除之福歙有重稅之額五代方鎮多於舊賦之外重取於民國初悉皆蠲正稅額一定其間或有輕重未均處隨事均之福歙州稅額太重福州則令以錢二貫五百折納絹一匹歙州輸官之絹止重數兩太原府輸賦金乃令減價糴米補之後人往往疑福歙折絹太貴太原折米太賤蓋不見當時之意也秀州有别租之課秀州言錢俶千六百戶嵗納二稅外别輸租真宗曰重加租稅課納於錢氏是橫賦也若錢俶族滅别加優恤此皆五代額外之取也國朝掃五代之煩苛還三代之簡易天下之田二十稅一猶下蠲減之令寬租之意何如哉然江南沿征至祥符而始去祥符元年陳靖言江南僞命日於夏稅正稅外有沿征錢物凡十四件乃溫父僣竊江淮物力不充征斂欺暴太祖克復之初舊弊不去者蓋樊知古怨僞朝不與名第既任轉輸罔思鼎革私怒其上流毒其民使我皇朝只得伐罪之名未見弔民之實上作供征數內有可仍舊有可從新有可推為國恩有可推為民便願陛下察之江西外增一斗之米至慶厯而始除慶厯七年諸路轉運廣要出剩厚有加耗謂之閏官江南諸州納米一石出剩一斗往往有聚斂之臣加耗之外要一斗以江西路嵗百萬石若每石米一斗出剩已及十萬石上曰聚斂之臣過於盜賊遂止之何者蓋五代苛政過多積弊難去故耳至慶厯以來始定矣夫何熙寧大臣借周官之書文管商之術坊場河渡昔歸州縣今充為上供焉蔡官制熙寧間取坊場河渡戶絶之産召人買僕斷佃量破雇直以募衙前餘以助常平青苗取息三分為抵當茶鹽坑冶昔在州縣今歸使者焉熙寧間置提舉茶鹽司提㸃坑冶司青苗取息公帑雖厚而屠牛市肉如民病何司馬光言熙寧作青苗取息二分凶年則屠牛賣肉伐桑賣薪以輸錢於官寬剩過敷公府雖豐而拆屋賣木如民困何國初差役至熙寧行雇役下戶亦出錢謂之剩錢定州民有拆屋賣木免役錢均輸市易不貸秋毫商者苦矣熙寧立青苗免役市易均輸保甲保馬法鄭俠進流民圗諸色賦斂皆輸以錢農者傷矣元祐元年蘇轍言自熙寧以來民間出錢免役又出常平息錢官庫之錢貫朽而不可較民間之錢搜索殆盡此皆熙寧新法之弊也元祐以拯溺救焚之仁為改絃易轍之舉罷青苗免役之法去市易均輸之政吾民至是始有慶厯之望未幾紹聖諸人復之而崇觀奸臣又重之而祖宗之仁政幾失矣中興以來非不復舊然土宇半於全盛之時而兵費倍於全盛之時不雨於天不輸於鬼其勢求斂於民然大抵多縻於兵而他用不及什之一焉自今考之諸路之嵗入雖為錢三千五百四十餘萬緡而歸於版曹者一千九百餘萬緡歸於淮東之總者二百六萬歸於淮西之總者三百七十八萬歸於湖廣者五百七萬歸於四川者五百三十萬且猶未足也又於三𣙜務嵗入二千四百萬之中捐五百五十萬以給版曹捐四百八十萬以給淮東捐八百九十三萬以給淮西其得供於朝廷者不過五百餘萬緡耳此安平無事之時所出之數如此况渡江兵革方殷之時乎是故以酒務商稅州縣出納等錢而入經制似過取耳然迫於給軍不得不取也建炎二年初宣和因方臘之亂官兵無所給乃詔發運使陳亨伯經制東南亨伯始設比較酒務量添酒價及商稅額亦增一分并賣契紙錢公家出納每緍收二十三文並號經制錢靖康罷之至是葉夢得言經制之法添酒價增嵗額並賣契紙頭子錢皆求於民之所欲非強其所不欲望復行之以耆戶雇役茶鹽貸息等錢而入總制若過斂爾然時方用兵不得不斂也建炎五年令章誼措置財用初州縣出納錢物每緡收二十三文作經制錢至是加為定數除舊合得外餘並拘發以需軍需既又拘耆戶長雇錢并抵當庫四分息錢及轉運司移用常平司七分茶鹽司貸息等錢悉歸總制司而總制劣自此始矣月樁而非贍軍未必取也七年先是諸路贍大軍錢今運司於經制𣙜酤征商等數內逐月樁辦是月樁錢所樁不能什之二三餘則州縣之吏臨時指畫未免斂之百姓耳折帛而非給士未必有也紹興元年謝祖信言和豫買為民之病有司變為折帛錢又甚病者也祖宗時官俵錢於春民輸絹於夏公私兩利其後官無本可俵則名為豫買其實白著軍興行一切之政數嵗前縑價高折錢或十千八千今價減而有司猶執前直一例折錢使民鬻縑而求鏹此又甚病也無額上供紹興二十五年時諸路上供數外又有無額上供錢及一萬貫以上推賞有差其後言者又乞二千貫以上即無推賞隂取給賞紹興二十七年趙逵奏四川取民之途有二如給賞絹之類官以民所納者揭之通衢此明告而取也如給賞錢之類總領以數下州縣必陽戒之曰無損嵗計無傷民力此隂取而不告也改鈔軍衣等錢儻非為三軍之用亦何忍而求之乎乾道三年臣僚言郡守下車首請屬邑督責財賦如數方許還邑此之謂獻助錢委郡丞職幕官下邑官認發錢物抑無為有增少為多此之謂剗刷錢二稅就州輸納既倍收合耗重增折科又率其合零就整一寸納一尺一合納一升謂之竒零錢酒稅不照國初額止從重數謂之遞年課利錢至於催到上供錢物之類申發鈔狀到州多行截留先填舊缺别行催發謂之改鈔錢及當支散春夏衣賜拋降數目拘催謂之軍衣錢又有無額鈔總制錢之類不一而足籍為定數按月解發曰版帳曰綱目曰格目又有所謂月樁并清冊子數所在州縣名數不同是皆州汨於縣之色目也今日賦目雖視紹興而隂取之數視紹興又重矣何者賦有常時時有常數今乃重權大量以取贏餘既有加耗又有折色吾民何以供賦入有限限與民宜今乃妄意科斂非時追索民方勤農先赴星限未考官課先辦吏需吾民何以供國家蠲免之令墻掛壁粘朝廷寬恤之詔黃放白催吾民何以告雖常賦定數未易遽革而額外剩斂獨可不省乎昔邵先生有言曰諸賢能寬之一分則民受一分之賜為士夫者盍致思焉卲康節曰云云古今源流至論續集卷三
