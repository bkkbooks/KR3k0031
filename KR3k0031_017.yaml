body:
  text: 古今源流至論後集卷七宋林駉撰歷代德運五行相勝鄒衍説也五行相生劉向説也夫執相勝之説曰夏得木德商得金德周得火德是也立相生之説曰帝出乎震故伏羲氏始受木德其後以母傳子是也嗟夫五行固有相勝相生之義矣然帝王授受天命人心未嘗相勝愚不敢信衍之説五德之運其説雖不見於六經以古帝王建號推之則其説驗矣漢律厯志三代既沒五伯之末史官喪紀秦兼天下未遑暇及亦頗推五勝而自以為獲水德以周為火用水勝之謂有黑龍之瑞以十月為正色尚黑蓋從鄒衍所勝為行説也餘見下自今觀之神農氏之時以為炎帝者為其尚火也黃帝氏以為黃帝者為其尚土也少昊氏以為金天者為其尚金也非其所尚之德則其號特為虛設五行用事始本於東方萬物之所自起焉王者則而象之首以木德王天下其次一以所生之行而轉相承也以建號而推自神農而上為伏羲則知其為木德也自少昊而下為髙辛則知其為水德也自伏羲以至髙辛則五行之運一周矣又自堯以至于商則五行之運再周矣皆繼繼承承取其相生之義則劉向父子之説為足信矣漢律厯志孝成世劉向總六厯列是非作五紀論向子歆究其微眇作三統厯及譜以説春秋推法密要故述焉云云炮犧繼天而王為百王先首德始於木故為帝太昊取犧牲故號曰炮犧氏共工氏伯九域言雖有水德在火木之間非其序也炎帝以火承木故為炎帝號曰神農氏黃帝火生土故為土德與炎帝之後戰于阪泉號曰軒轅氏少昊帝考德曰少昊曰清清者黃帝之子清陽也是其子孫名摯立土生金故為金德號曰金天氏顓頊帝金生水故為水德號曰髙陽氏帝嚳水生木故為木德號曰髙辛氏唐帝帝系曰帝嚳四妃陳豐生帝堯封於唐蓋髙辛氏衰天下歸之木生火故為火德號曰陶唐氏虞帝帝系曰顓帝生窮蟬五世而生瞽叟叟生舜堯嬗以天下火生土故為土德號曰有虞氏伯禹舜嬗以天下土生金故為金德號曰夏后氏湯伐桀金生水故為水德號曰商後曰殷武王伐紂水生木故為木德號曰周室若以相勝而言則舜受堯之天下是有勝堯之心禹受舜之天下是有勝舜之心非獨舜禹不然雖三代而下亦不然也湯之纘夏出於不得已如其以商之金而克夏之木則是彰湯之得天下出於本心矣武王伐商亦出於不得已如其以周之火而克商之金則是彰武王之得天下亦出於本心矣謂相勝之説出於秦之意則可出於帝王之意則未可也徒見夫商尚白故以為尚金周尚赤故以為尚火欲以附會相勝之説嗚呼若從其相勝之説則夏之木德胡從而尚黑記檀弓有虞氏之瓦棺云云夏后氏尚黑商人尚白周人尚赤徒見夫夏有青龍之瑞遂以為尚木商有銀山之祥遂以為尚金欲以附會相勝之説嗚呼若從其相勝之説則周之火德胡為有白魚之瑞耶則鄒衍之説不足信矣前董仲舒策武王白魚入于王舟由周而降相生之義千載未嘗不符契也且秦本西戎餘分閏位不足繼周班固削而不取焉夫秦不足繼周則繼周者漢也周以木而漢以火宜矣不然強華奉赤符亦謂以火為主何耶漢律厯志秦以水德在周漢木火之間周人略其行序故易不載又王莽傳贊莽非命之運紫色蛙聲餘分閏位際又光紀強華奉赤伏符曰劉秀發兵捕不道四七之火為主蛙莽傳注雖無明音但顔注云紫間色蛙邪音又云樂之淫聲則蛙字與蛙字同義哇音蛙淫鄭之音自魏至隋皆非正統不足繼漢崔昌議去而不用焉夫自魏而隋皆不足繼漢則繼漢者唐也漢以火而唐以土宜矣不然伊川謂唐土德而少河患何耶唐天寶九載崔昌議自魏晉至周隋皆不得為正統欲唐逺繼漢統衛包扶李林甫行之災又伊川語録唐土德偏少河患本朝火德多水君子觀漢之承周唐之承漢相生正理異世一揆則知秦用水德之治而行刻深之法其相勝之説背戾於聖人也多矣自是而後莊宗中興唐祚同為一代則土運未絶也一傳而晉以金再傳而漢以水又再傳而周以木天開我宋運膺火德徐鉉之言信矣長編徐鉉曰莊宗中興唐祚重新土運自後相傳晉以金漢以水周以木皇宋運膺火德國初便祀火帝且我宋以火王天下也豈非上天所眷命乎受命宋分星應大辰火之祥也通略嘉祐元年知并州韓琦乞復本州為節鎮胡公宿以為堯遷閼伯於商丘王以火德又京師為宋之分野而并為晉地參商相讎之星宋興平僣偽并最後服太宗削之不使列於方鎮宜如舊制不從乃復并州為太原府收復河東日在重午火所旺也元城語録溫公曰太祖初為歸德軍節度使實在宋國故號宋且河東晉地也昔髙辛遷閼伯於商邱主辰今應天府是也遷實沈於大夏主參今太原府是也參商不相能久矣國初但曰并州不加以府號蓋有深意也又本朝收河東在戊寅年重午日乃火土旺日此參水所忌故克之宋受命已十九年而晉始服是以本朝盛則後服衰則先陷後靖康元年丙午重九日太原陷噫先生可謂先知矣僕妄意測之曰丙午為天水火最大忌九為陽數之極故太原以重九日陷赤烏報蕃昌之兆長編至道九年知通利軍錢昭獻赤烏白兔各一云烏稟陽精兔昭隂瑞報火德蕃昌之兆示金方馴服之證上謂侍臣曰烏色如渥丹信火德之符也紅光彰誕育之祥繫年録大觀元年髙宗生于東京大內之宫中紅光照室噫盛哉是故赤帝有祭也長編乾德元年聶崇義言皇家以火德承正統請奉赤帝為感生帝每别尊而祭之尚書省集議遂如崇義奏辛為壇於南郊奉宣祖升配當以正月上奉祀感生帝者即五方上帝之一也歲正月商丘有祠也胡宿墓志南京鴻慶宫災胡宿言南京聖宋所以受命建號太火主於商丘國家乘德而王者也比年數災宜修火祀事下大常歲以長史奉祀商邱自公始色尚赤也臘用戌也長編建隆元年國家受周木德以火德王色尚赤臘用戌火德彰彰其與堯比隆歟彼趙垂慶因羽毛之白而欲用金德矣然越數代而紹唐此不可也長編雍熙元年布衣趙垂慶言皇家當越五代而上承唐統為金德自禪代以來羽毛之白者不可勝紀皆金德之應也集百官議徐鉉曰五運相承間不容髮豈可越數姓之上繼百年之運此不可之甚也乞聖德承木為火德從之噫太原後服胡公言之并不加號溫公言之彼曷不知乎並見上注謝絳因日抱黃珥而又欲用土德矣然越唐而承於隋此又不可也長編天禧四年謝絳言神農以火德聖祖以土德國家以黜五代紹唐土德以繼聖祖臣聞太祖生而包洛黃及受命五緯聚奎而鎮星是主陛下升太山日抱黃珥朝祀太清有星曰含譽色黃而澤非土德之瑞乎惟勿以變古為疑時董行父請用天為統以金為德詔兩制議皆言用土德則當越唐上承於隋用金德則當越五代紹唐而太祖實受終於周室豈可弗遵傳繼之序絳行父議皆不用噫水患多應伊川言之火祀宜修胡宿言之彼曷不審乎並見上注不然南京即政建炎紀元何天意猶眷眷於中興之後耶中興本末宗澤請開封府南京曹隕進道君御札曰便可即真來救父母上由是趍應天府耿南仲議改元宜倣藝祖建隆之號且本朝以火德王請曰建炎上初即位用漢光武故事為壇於宋之陽名曰中興受命之壇嗚呼宋德當天歷年萬億赫然炎精奕葉有光愚尤有望於今日也歷代世譜能言其祖郯子見稱左昭公十七年郯子來朝昭子問曰少昊氏鳥名官何也郯子曰吾祖也我其知之矣不識其先籍談貽笑左昭十五年晉荀躒如周籍談為介王曰諸侯皆有鎮撫王室晉獨無有何也談曰諸侯之封皆受名器於王故薦彛器晉居深山王靈不及其何以獻王曰叔氏其忘諸乎密須之鼓闕鞏之甲唐叔受之女司典之後何故忘之籍談不能對甚矣世系不可不明也夫世系明逆順之理别親踈之分封侯之所以久長統緒之所以繼述其有關於世教也至矣古者别生分類而作汨作時則有著姓氏之書奠世系敘昭穆而命小史時則有姓氏之官璇源仙派繩繩有序金枝玉葉秩秩可考故訂正甚易也自諜譜久廢源流無據掘起草野之夫而求附聖明之後生長夷狄之部而僭紊帝王之裔噫可嘆矣竊嘗論之且五帝之相承三王之繼禪無非出於黃帝之後考之史遷世表黃帝二世而顓帝三世而髙辛四世而唐堯至舜則八世焉此帝之世系出於黃帝明矣史記世表黃帝生昌意昌意生顓頊顓頊生窮蟬窮蟬生敬康敬康生句望句望生蟜牛蟜牛生瞽瞍瞽瞍生舜四世而禹二十世而湯至武王則二十一世焉此王之世系出於黃帝又明矣同上黃帝生昌意昌意生顓頊顓頊生鯀鯀生禹又世表從黃帝至湯二十世從湯至紂三十世從黃帝至紂四十九世武又世表從黃帝至王二十一世是雖史遷世掌天官能知諜譜之詳而亦帝王盛世歷歷有書若官也世之執茫昧之説者曰契生於卵后稷人迹世系無可考也史記契因元鳥卵而生稷因履巨人迹而生泥五德之説者曰髙辛以水生木夏禹以土生金世系又不必信也漢劉向及子歆論帝王相授以五行相生噫稷契之事特經傳欲以見天命精微之意史記禇先生云五德之説又特起於漢儒附會之私皆不可以實論也見上吾惟觀史遷世表一書而知帝王源流之傳耳彼秦起西戎特一醜類托於柏翳之所出若難信也况吕政受命寄身不韋而亦玷柏翳之後可乎史記大費生大廉大廉元孫曰中衍中衍元孫曰中潏生蜚廉蜚廉生惡來李勝惡來之後為秦又秦本西戎之裔又史記秦記始皇莊襄王子也名子楚為質於趙見吕不韋姬悅之不韋陽翟大賈也其姬有娠而獻於子楚生始皇漢起沛中特一亭長本於唐堯之所出似無疑也况鄙哉劉裕亦冒元王而亦玷唐堯之後可乎漢髙祖贊漢承唐運又髙祖紀髙祖少為亭長又宋紀劉裕稱漢楚元王之後曹魏之興肇於宦者曹騰而以為曹叔振鐸之裔夫何僭矧嵩本養息姓氏無考耶曹操本嵩子嵩本曹騰養子蓋騰後漢時宦官之又魏武作家傳自云曹叔振鐸後周武封母弟振鐸於曹唐祖之始肇於隴西北道而以為出於臯陶夫何偽矧以理為李尤為不經耶唐紀髙祖諱淵隴西人也又唐宗室世系李氏出自嬴姓帝顓頊髙陽氏生大業大業生女華女華生臯陶字庭堅為堯大理歷虞夏商世為大理以官命族為理氏至後利正逃難於伊侯之地食木子得全改理為李氏唐蓋其後也甚者晉之敬塘西夷裔也而改姓石氏可乎五代史晉紀石敬塘其父臬棙雞本出於西夷其姓石氏不知其得姓之始也唐之克用朱邪族也而冒姓李氏可乎五代史唐紀李克用其先蓋出於西突厥本號朱邪後伐黃巢賜姓為李氏嗚呼杜正倫求齒於城南諸杜君子所鄙唐杜正倫與城南諸杜昭穆素逺求同譜不許銜之諸杜所居號杜固世傳其地有壯氣故世衣冠世倫既執政建言鑿杜固川流如血自是南杜稍不振郭崇韜哭子儀之墓識者羞之五代史郭崇韜傳崇韜以其姓郭因以為子儀之後崇韜伐蜀過子儀墓下馬號慟而去聞者頗以為笑况帝王正統使醜類卑族混而無别君子安得不辨之哉此無他自秦以後姓氏無書毋怪乎夷夏貴賤之混噫掃歷代附會之説接上世統傳之正吾於我朝見之昔太祖之肇開區夏應明宗天生聖人之禱五代史明宗焚香禱於宫中朕本夷人願天早生聖人為天下主或以太祖應之太宗之克紹先烈驗玊帝薦祉之祥開寶九年上曰晉王必為太平天子十月有神降于盩厔縣自言黑煞將軍玉帝之輔也云太上宫闕已成晉王有仁心上崩太宗即位誠天命之所眷然仙源積慶天派分潤君子不可不求源流之出愚嘗觀李攸景命萬年之録也謂始基之祖曰平水有勞皂遊銘功則知出於伯益也尚矣紹興中李攸作景命萬年録趙氏之先於秦共祖大費與禹平水土舜曰咨爾費贊禹功其錫皂遊爾後嗣將大費佐禹調駒鳥獸是為柏翳柏翳生大亷大亷元孫曰仲衍其後季勝季勝三世造父以功封趙城子孫因氏焉又觀蘇轍聖祖之記也謂始基之祖曰惟我聖祖肇自皇世則知本於柏翳也又明矣蘇轍筠州聖祖殿記周制天下都邑立后稷祠而唐澧州祀老子蓋二祖之德光配天地凡有社有民不可以弗享維我聖祖肇自皇世知越周唐威神在天靈德下降禪符癸丑始詔四方萬國咸建祠宫嗟夫舜以孝而育虞禹以功而孕夏契之後為商稷之後為周獨益未也天之報益其在我朝乎或者且曰邵博言今之章奏不當名廣漢則本朝廣漢之後也君子曰是益之後在漢為京兆也聞見録今章奏不當名廣漢按國史會要本朝廣漢之後也或者又曰吳處厚言廟食宜及程嬰杵臼有功社稷則本朝趙武之後也君子曰是益之後在春秋為趙氏也魏泰東軒筆録元豐中吳處厚上書云昔程嬰公孫杵臼全趙氏之孤最有功於社稷而皆死忠義廟食弗顯宜有崇厲願訪塜墓飾詞加封詔封嬰為誠信侯杵臼為忠智侯然泝其流測其源其在奏鮮粒民之始歟昔益始封之日帝舜曰爾後嗣將大信矣夫噫帝王世系皆出於黃帝吾得之遷史世表國朝世系實出於伯益吾得之李攸蘇轍夫何疑哉世胄世胄之説尚矣傳曰八元八凱世濟其美此虞制也左傳詩曰王命山甫纘戎祖考此周制也毛詩嗟夫故國喬木見者興思甘棠遺澤愛之勿敗况所謂世臣者箕裘之業不墜詩書之澤猶存民望之所歸屬國勢之所倚重聖人其可不加任用之誠乎然富貴者侈之階逸樂者驕之府蒞而不學動成過咎持祿自滿鮮克由禮虞周聖人之所慮也是故后夔教胄子必示以直溫剛簡之德師氏教國子特拳拳於三德六行之訓夫惟教於未用之初用於既教之後此德業有肖於前人也歟噫世臣之親軻書所重仕不世祿詩人刺之成周以後未嘗不重世胄之選華元子罕宋公族也史魚寧武衛卿族也子良子皮子産太叔鄭公族也鬬辛鬬禦疆薳賈楚卿族也晉之范欒郤趙魯之季孟叔孫齊之晏嬰吳之季札分布列國相輝麟筆無非用人以世者愚獨惜夫作成善教浸不如古尹氏立王子朝而階亂公羊昭公二十三年崔氏出奔衛而怙權宣公十年故公羊有世卿之譏見上吁非譏其以世也蓋譏不以賢也然則王教不如古而人才亦不如古宜矣是教也一變於春秋再變於漢三變於唐教愈壞而愈失材愈趍而愈下可歎也漢自任子之令既除而世胄之無聞王吉上言曰今使俗吏任子弟率皆驕驁不通今古此伐檀所為作也宜明選求賢除任子之令唐自刺史世襲之議不行而世臣之不用唐史戴胄傳况無教養之道乎陵之敗義有沗於李將軍之威望李陵傳禹之驕縱卒壞霍博陸之勳伐霍光霍禹傳漢之世胄安在哉虞世南之後而至於為匠本傳房杜之後而敗於子之不肖本傳唐之世胄安在哉考論漢唐之事君子深為之於邑噫人材非有古今之異也特後世之教有靦於帝王者多矣春秋之教雖不古猶幸其有風聲氣習之遺漢唐以來往往捨法而無教則人材消蝕又何尤焉國朝重象賢之禮嚴世祿之制衣冠陸續相望後先勳業赫奕不替雲仍噫有由也既嚴以監胄之教又嚴以較試之法既重以覆試之實又重以引對之命國初建國子監教養公卿大夫子弟又建隆之制所補齋郎進監以三事覆試之曰身曰年曰誦書覆而不實主者坐之故稀與王貽孫坐補齋郎失實貶官趙元拱髙元緒坐補齋郎貶官又祥符三年詔門資二十五以上求差使者令於國學所習以二年為限令審官院與判監考試既而引對錢象中陳宗紀並以學業未精且令習讀候次年引對此慶厯之詔所謂周大司樂掌學政以六藝教國子則官材蓋本於世胄者其有意於作成胄子也至矣慶厯三年十一月詔曰周大司樂掌學政以六藝教國子則官材蓋本於世胄而今之蔭法受恩太廣以致踈宗蒙恩拜焉未知率身之道從政之方今設考課之格立保任之條云云宜乎世有賢臣者文靖相慶厯之治吕夷簡仁宗即位拜參知政事知戶部侍郎同平章事出判陳州歲中復相封申國公出判許州未幾復入相徙封許國公拜司空平章事明道二年章獻崩上始親政事公手疏為治之本以諷于上後吕公與范公俱出又再入相二公相歡約討西賊至元昊納欵遂與和焉申公新元祐之風吕氏之家聲不替也元豐五年出知定州徙揚州哲宗即位召兼侍講拜尚書左丞遷門下侍郎拜尚書右僕射元祐三年拜司空兼平章事力除新法之害與詰青苗之害責興利之弊戒用兵之失救官制之滯司馬光輔政於是民歡呼鼓舞又公在潁歐公為守以公為相家令子弟待公厚及與劉敞學始愛公學識忠獻輔景祐之政仁宗初韓忠憲公億為御史知雜事景祐三年除工部侍郎同知樞密院事拜參知政事范文正公知開封府獻百官圖隂薦公可用文正既貶仁宗以諭公遂除參知政事又蘇氏談訓云教子嚴肅不可犯第二子舍人持國有過必欲撻之家法之嚴如此持國正熙寧之法韓氏之世業不墜也神宗朝維除翰學承旨時京師旱上疏曰近日畿內縣督索青苗錢甚急往往鞭撻取足至伐桑為薪以易錢貨旱災之餘重罹此苦望陛下自奮英斷行之因奏對面論神宗感悟有旨根究圖易免行利害權住方田編排保甲罷議東西門市易命公草制求直言其略曰朕之聽納有不得於理歟獄訟非其情歟賦斂失其節歟詔出人情大悅是日大雨一范之謡聞者破膽而純仁之事業益盛焉范文正公仲淹知陜西邉人謡曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽又范純仁文正公之次子以恩補太常寺太祝中皇祐元年進士第後元祐初拜尚書右僕射宣仁曰卿父仲淹可謂忠臣卿當似之一韓之謡聞者骨寒而忠彥之忠望尤著焉言行録本傳此相業之彰即商之伊陟也三覆以待北戎授首楊延昭之為有功而其父業前朝之名將也政要咸平中敵寇代州莫州刺史楊延昭伏鋭兵於羊山西自此掩擊且戰且退及西山伏發敵大敗獲敵將函首以獻又長編咸平二年真宗駐蹕大名莫州刺史楊延昭入奏邉事上指示諸王曰延昭父業為前朝名將延昭兵護塞復有父風可嘉也一矢加遺西蕃驚遁曹寶臣之為有功而其父彬開國之勳舊也記曰曹彬將薨太宗親臨其第問以後事對曰臣二子璨與瑋皆將材上問其優劣對曰璨不如瑋已而果然西蕃犯塞瑋望敵陳前有僧往來問左右曰敵貴人也遣李迢射之一發而斃於是敵遁以大軍乘之敵大敗西蕃懾服每言及瑋則加手於頂呼之為父馬全義之力戰已有勞於太祖者也其子知節嚴飭見憚焉言行録馬知節父全義從太祖定天下力戰有功公年十八監彭州兵馬以嚴飭見憚如老將王超之禦敵已有勳於太宗者也其子德用夷狄知名焉同上王德用父武康公超事太宗真宗有勞公以父任為官至道二年討繼遷公從武康公出鐵門為先鋒軍至烏白池公告其父曰歸師過險必亂乃令曰亂行者斬士卒無敢先後武康嘆曰王氏有子矣又王德用神道碑公善撫士雄偉動人雖里婦夷狄皆知者此將材之良即周之召虎也噫遺風餘澤目擩耳染豈一朝一夕之積哉詩曰凡周之士不顯亦世國朝有焉又曰無忝爾祖聿修厥德先正有焉氏姓子長之序司馬氏所出也其先司馬適晉後復奔魏司馬遷傳遷論司馬氏之所自出於顓帝時則為重黎在宣王時則為程伯休父其後官失其守為司馬氏惠襄之間司馬氏適晉晉中軍隋會奔魏而司馬又入梁子雲之序楊氏所出也其祖食采晉陽後為陽侯二公之序詳矣揚雄自序楊氏所自出其先出自於周伯僑食采於晉之楊因以為氏周末時而楊氏或稱侯會六卿爭權韓魏趙興而范中行智伯斃當是時為逼楊侯者然按之春秋隋會奔秦後自秦入魏入魏而還晉豈有自晉而奔魏之理則知子長之説也妄按春秋左氏傳隋會奔秦復自秦入魏而還晉未嘗自晉奔魏考之張衡言晉士大夫食采於楊為楊氏食我有罪而楊氏滅無有所謂楊侯者則知子雲之説也踈張衡言晉之士大夫食采於楊為楊氏食我有罪而楊氏滅無有所謂楊侯嗚呼子長子雲漢大儒也所序又復自姓也本末源流錯繆無據愚欲以一已之見而論他人之譜諜噫難矣哉雖然亦不可不論也古者姓氏之權出於上故姓氏易明後世姓氏之權出於下故姓氏難考夫為齊為魯為宋為衛賜氏以國也為戴為武為宣為穆賜氏以諡也賜氏以官則若司寇司馬賜氏以爵則若王孫公孫賜氏以字則若孟孫叔孫賜氏以居則若東門西門三烏五鹿以志賜也巫氏匠陶以事賜也籍談之籍以其司晉之典董狐之董以董晉之史凡此皆上所命也風俗通氏姓篇序曰凡民之興也事賜氏於國齊魯宋衛也賜氏於諡戴武宣穆也賜氏於號唐虞夏商也云云自夫王制不明私意妄改往往有紛錯變亂之失嗟夫表功德厚親族者姓也制婚姻明人倫者姓也其可輕乎哉邾子之後去邑而為朱氏本自髙陽後周封于邾後為楚所滅子孫乃去邑氏朱焉邢叔之後去邑而為于氏本周武王子邢叔子孫以國為氏其後去邑單于氏踈氏至束晳去足以為束束晳字廣微踈廣之後曽祖避難去足為束橋氏至周文帝去木而為喬周紀文帝本橋氏後去木姓喬此以字而訛其姓也夏啓封支子于莘而其後為辛氏唐書辛替否傳注辛姓夏啓封支子于莘莘辛聲相近遂為辛氏漢初辛滿為趙魏名將徙家隴西便為隴西人周武王封虢叔於西虢而其後為郭氏蔡伯喈作郭林宗碑曰郭林宗其先出自周王季之穆有虢叔者實有懿德文王咨焉建國命氏或謂之郭即其後也步搖氏訛為慕容前燕録云魏初莫護跋率部落入居遼西時燕代多冠步搖冠跋好之乃斂髮襲冠諸部因謂之步搖後音訛為慕容焉跋孫陟歸進拜單于遵循華俗自云慕二儀之德繼三光之容以為氏奚氏訛而為嵇嵇康本奚氏後康易而為嵇此以聲相近而訛其姓也趙奢因封馬服君其後轉為馬氏趙奢本自伯益之後奢封馬服君後遂氏焉秦滅趙徙奢孫興於咸陽為右內史遂為扶風人望田千秋因乘小車其後轉為車氏車千秋本齊田氏後至千秋以年老得乘小車出入省中時人謂之車丞相子孫因以為氏焉京房本李姓也推律而姓京京房本姓李後因進律改姓為京陸羽不知所出也筮易而姓陸陸羽復州人不知所生或曰有僧得之水濵蓄之既長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀吉因以陸為氏名而字之慶純因避安帝諱轉為賀氏賀氏本齊之公族慶封之後漢侍中慶純避安帝諱改為賀氏出會稽河南二望秃髮賀以魏太武謂與同源轉為源氏唐源乾曜傳注源姓秃髮傉檀之子賀入後魏魏太武謂之曰與卿同源可為源氏源乾曜蓋其後也楚人以項籍之故而易籍為席唐席豫傳席姓出安定其先姓籍避項羽名改姓席氏閩人以王審知之故而易沈為尤尤本沈姓以沈與審同音後易尤姓是數者非更姓之私乎灌孟本張姓也為灌嬰舍人而冒為灌氏漢灌孟本張氏後為灌嬰舍人冒為灌姓貟凝之本劉姓也慕伍貟忠烈而冒為貟氏貟半千傳其先本彭城劉氏十世祖凝之事宋及齊受禪奔元魏以忠烈自比伍貟因自姓貟李元諒本安姓也養於閹尹而冒為駱氏唐李元諒安息人本安氏少為宦官駱奉先養息冒姓駱名元光衛青本鄭姓而冒姓衛前漢衛青本鄭姓後為衛家奴僕因冒姓衛鄭注本魚氏而冒姓鄭唐鄭注本姓魚冒為鄭故當時號魚鄭及用事人瘦謂白水族是數者非冒姓之偽乎切嘗深究其弊自族别而為姓姓别而為望望别而為房故姓多則訛其族望多則訛其姓房多則訛其望必然之理也今夫劉氏一族自堯陶唐氏至秦為劉氏而其姓有六自陶唐氏既衰至夏别為御龍氏至商别為豕韋氏至周别為唐杜氏至晉别為范氏至秦别為劉氏凡六姓三子别媯氏一族自舜别為姚氏至齊王建為王氏而其姓有四若是則姓多而訛其族媯氏舜為姚氏至胡公别為陳氏至敬仲奔齊别為田氏至齊王建之子别為王氏凡四姓杜氏一姓自枝伯之後為杜城杜氏王赫子威之後為濮陽杜氏一姓而五望枝伯之後不近者則為杜誠杜氏至漢建平侯延平之後則為京兆杜氏晉當陽侯預之後則為襄陽杜氏恕子寬之後則為旦水杜氏赫子威之後則為濮陽杜氏是杜氏一姓五望張氏一族自常山王耳之後為河間張氏至唐相亮為鄭州張氏一姓而十望若是則望多而訛其姓張氏自常山王耳之後則為河間張氏留侯良之後則為東武城張氏北平侯蒼之後則為中山張氏後漢太守綱之後則為馮翼張氏後漢蜀郡太守睦之後則為吳郡張氏晉司空華之後其一徙居河東則為河東張氏其一徙居河南則為始興張氏漢相安世居繄水則為魏郡張氏唐祖鎬世居平原則為汲郡張氏唐相亮又為鄭州張氏凡有十望清河崔氏一望而三房博陸崔氏一望而四房趙郡李氏一望而六房隴氐李氏一望而四房若是則房多而訛其望並唐宰相世系王制不明私意妄改其弊一至於此歟惜哉噫孰知我朝先正嚴於氏姓之别乎希文少依母氏冒朱姓已稱朱學究也既長知其世家泣從范氏嗚呼其視滕公隨外家而姓孫所見逺矣范仲淹字希文生二歲而孤母夫人貧無依再適長山朱氏既長知其世家感泣去之始范公少冒朱姓舉學究薑遵引入中堂謂其夫人曰朱學究年雖少竒士也年二十餘始改科舉進士又漢滕公隨母外家因姓孫武襄逺祖狄梁公已有誥身可驗也公以一時遭際不敢凂梁公之後嗚呼其視郭崇韜哭子儀之墓所得多矣筆談云狄青為樞密使有狄梁公之後持梁公畫像及誥身十餘通詣青獻之以謂青之逺祖青謝曰一時遭際安敢自附梁公厚贈而還之比之郭崇韜哭子儀之墓青所得多矣若夫司馬之呼聳聞大遼狄遼敇邉吏曰中國相司馬矣謹毌生事開邉隙小范之稱驚動西夏名臣傳仲淹領延安夏人聞之戒曰今小范老子腹中自有數萬甲兵則知姓氏以人物而榮子厚無行有玷郇公聞見録章惇者郇公之踈族介甫用事李承之薦惇介甫曰聞惇大無行京卞憸人借名端明蔡端明名襄蔡京蔡卞皆效其名則知姓氏以人物而辱或榮或辱皆由人物彼區區改姓冒姓何益哉名諱楚臣名籍義士所鄙鄭當時傳髙祖既滅項籍令楚舊臣皆名籍霍氏不名後世榮之宣帝圖麟閣十二人惟霍光不名甚矣哉名諱之重也何者以諱事神古人以為正禮聞人之過如聞父母之名蓋以明尊尊親親之義正三綱五常之理誠扶世之要道歟昔孔子作春秋也內而君臣之朝聘外而兵師之征伐公侯之盟好與國之婚姻榮增華衮辱過斧鉞特寓於名字之間且齊曰齊侯宋曰宋公列國之君書爵宜也而衛滅同姓之國則特書名以譏之小國之君未拜王命而不書爵則書名可也而邾婁之君與公同盟則特書字以褒之聖人立天地之常經人道之大倫皆於是乎賴後世豈可輕乎哉然嘗論之古人之以諱也徇公而合乎禮後世之以諱也徇私而背乎禮且古之臣為君諱子為親諱此當然之理然詩書不諱也臨文不諱也廟中亦不諱也若文王諱昌而箕子為武王陳洪範曰使羞其行而邦其昌厲公諱胡而其子宣王時詩曰胡不相畏者詩書不諱也春秋僖公名申而書戊申定公名宋而書宋仲幾莊公名同而書同盟者臨文不諱也周公成王詩曰克昌厥后又曰駿發爾私者廟中不諱也此非徇公而合禮乎後之為漢帝諱者徹侯改為通侯武帝諱徹諸將徹侯皆改為通侯秀才改為茂材光武諱秀班固作史如武約詔令州郡察吏民有茂材者蓋秀改為茂也莊助改為嚴助嚴助本姓莊班固避明帝諱易為嚴此固尊其所當尊彼吕后名雉以雉字易為野雞豈非尊耶吕后紀諱雉令臣下呼雉為野雞為唐帝諱者劉淵易為劉元海戴淵易為戴若思唐髙祖之祖諱虎李延夀唐人作南北史故名季龍易為石虎韓擒虎者只稱韓擒戴又髙祖諱淵亦以劉淵為元海淵為戴若思名季龍者石虎名韓擒者擒虎此避其所當避彼漢元后之父名禁改禁中曰省中豈宜避耶漢元后之父王禁貴顯時避其諱呼禁中曰省中董仲舒受業之徒名曰步舒臣步舒受業於仲舒亦因名舒司馬長卿以慕藺而名曰相如豈有尊之而復名之乎前漢司馬相如字長卿少名犬子既學慕藺相如為人也更名相如衛侯諱惡而衛有石惡左傳衛侯諱惡其臣亦有石惡者父稱羲之而子名獻之豈有君父可同諱乎晉王羲之子名獻之甚者劉歆當世儒宗竊讖自欺易歆為秀漢讖曰劉秀發兵捕不道故劉歆欲合讖改名為秀唐世名臣其名隱而字顯者乃以字行又何取於父母之名其子乎此皆徇私背禮之失也唐史論唐臣德彛元齡士亷師古皆以字行其名曰倫曰喬曰籀曰儉餘見歐陽集古跋若夫國朝先正一姓字之稱一名諱之論何其不輕耶識與不識皆稱師魯兒童走卒皆誦君實是以字稱之也尹洙字師魯天下之士識與不識皆稱曰師魯又東坡詩云兒童誦君實走卒識司馬豈非春秋書字之褒乎市井相語指元城曰劉待制閨婦相呼指魏公曰張都督是以官稱之也豈非春秋書爵之褒乎劉安世在宋市井細民以謂若過南京不見劉待制如過泗州不見大聖又張浚凡閨婦細民皆呼曰張都督稱寇萊曰冦老稱包拯曰包老示其尊敬之義也豈非春秋書郭公之褒乎冦萊公貶外故天下謡曰欲得天下好莫如召寇老又包拯知開封府語曰關節不到有閻羅包老噫是特下之相敬不敢以諱也有如以君名臣亦何不可呼學士而不呼丁度丁度在經筵仁宗每呼學士而不名呼侍中而不呼韓琦此尤敬之至愛之篤矣英宗呼韓侍中不以名至姓宋而不名郊為時諱也此如姚元崇以開元尊號之故而獨名崇之意宋祁公初名郊字伯庠有忌其先達者譛之謂其姓符國號名應郊天又曰郊者交也交者替代之名也宋郊其言不祥仁宗遽命改之公乃改名庠字公序又姚崇字元之初名姚元崇後元宗改為開元恐犯開元尊號獨名崇父諱林而不除翰林為親避也此如李賀以父名晉而不應進士之義唐李賀父名晉肅賀不應進士以父名晉與進同音後韓退之作諱辨解之又名臣傳有以父諱林除翰林不受詔先正所稱皆有古誼豈若後人紛紛徇私之失歟愚詳論之以俟君子續歐陽公集古録之跋聞望周人用賢之法因民之所自擇而遂使之入長出治孟子用賢之術必徇國人之所共賢而徐加採擇蓋衆望所向不可不順也夫世所謂人望者固有父天下而號天下之大父者有能子一邑而得冠天下之名者景星鳳凰覩者為快太山北斗望之悚然坐於廟堂則姦雄縮頸處於方面則夷狄望風故一鄉一國之望一鄉一國向之矣天下之望天下向之矣彼其向是人也以謂是惟無用用之決能表治而福民吾其咈之彼謂我遏膏澤使不流也雲行于天雷震于地雖未遽雨而稿苗已有生意意期之故心向之也是以君子乘此機而用此人則功雖未效而形已著於事先矣舜之用賢也元凱先焉元凱非能不施功而水土自平也不用力而五教自行也選用之初天下固已為有功何也是十六族者世濟其美斯民注其耳目久矣是所謂以民治民以天下治天下因其向而答之之謂也左傳昔髙陽氏有才子八人蒼舒隤敳檮演大臨龎降庭堅仲容叔逹齊聖廣淵明允篤誠天下之民謂之八凱髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹李貍忠肅恭懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至于堯堯不能舉舜臣堯舉八凱使主后土以揆百事莫不時序地平天成舉八元使布五教于四方內平外成是故以已用人庸或不宜因衆用望無往不濟衆望在循吏則用召父杜母吏民稱誦郡國向治焉前召信臣為南陽太守吏民親愛信臣號曰召父後杜詩傳為南陽太守號為杜母衆望在舊士則用顧榮賀循以結人心而江東皆歸焉晉王導説琅琊王睿曰顧榮賀循此士之望宜引之以結人心二子既至則無不來矣睿乃使導躬造循榮以循為吳國內史榮為軍司加散騎常侍故江東歸心焉衆望以節義為重李固風裁士夫多慕用之而盜賊請降李固結父英賢四方有志之士多慕其風而來學京師咸嘆曰是為李公矣永和固為荆州刺史賊自縛歸首李膺龍門登者為榮用之而閹宦屏息李膺士夫慕之被其容接號曰登龍門為司𨽻校尉諸黃門常侍皆鞠躬屏氣休沐不敢出宫省衆望以德勳為重裴度碩德若位巖廊而幽鎮自臣唐本傳長慶四年王庭湊屠元翼之家敬宗羞惋嗟宰相非其人使凶賊熾肆學士韋處厚上疏曰臣聞汲黯在朝淮南寢謀干木處魏諸侯息兵裴度元勳巨德若位岩廊委決必使戎敵畏威幽鎮自臣子儀元勳一見回紇而下馬列拜郭子儀永泰中懷恩盡説吐蕃等掠涇邠京師大震子儀以數十騎見回紇大酋曰何忘恩誼而至是耶回紇捨馬下拜曰果吾父也子儀即召與飲結歡好如初舉逸民則天下歸心是重望在逸民也故諸葛起草廬謝安起東山卒成伯蜀興晉之功諸葛亮臥南陽草廬先主枉駕起之遂伯蜀地以抗吳魏謝安髙臥東山後起為宰相舉謝玄破符堅之師用世臣則天下所慕是重望在世臣也故山甫纘戎召虎出師卒成中興之勳詩彼以所欲向之我以其所向用之天下欣欣如有獲焉寧不慰蒼生而寧吾國哉嗚呼汲黯在朝淮南寢謀干木處魏諸侯息兵見上注士君子以一身係天下觀望也大矣嘗以國朝觀之文富天下聞名久矣一旦並拜相麻而縉紳之流至相慶賀徂徠之詩膾炙人口宜乎天下向治也至和初並用文富二公宣麻之際上遣小黃門密聽論議二公久有人望一旦復用朝士往往相賀黃門具奏上大恱仲又石介作聖德詩維淹弼一夔一契韓范天下知名久矣一旦出鎮陜府而骨寒之謡傳播軍中小范之名聞者起敬宜乎人樂為用也韓公與范公在兵間最久二公名重當時人心歸之樂為之用天下稱曰韓范軍中謡曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽又西夏相語曰小范胸中數萬甲兵元祐之初國事改絃之日也溫公入朝人皆望治何者兒童走卒皆識司馬久矣東坡作溫公獨樂園詩兒童誦君實走卒識司馬渡江之際國勢綴旒之秋也張公登揆再植中天何者小兒婦女皆知都督素矣張浚為相與趙鼎共起事功時天下小兒婦女皆稱曰張都督噫國吾國也民吾民也而敬之亦宜也若夫蠻夷狄𨽻不知禮義一聞盛名斂袵起畏此尤可嘉也無地起樓臺之詩流布北敵至勤咨問魏野贈寇公詩曰有官居鼎鼐無地起樓臺北使至賜宴兩府預坐北使歷視坐中問曰誰是無地起樓臺相公丁謂曰寇公暫撫南邦長嘯却胡騎之賦傳誦髙麗至問安否嗚呼若人而在朝廷朝廷其不尊乎范鎮少賦長嘯却胡騎賦及奉使髙麗敵相目曰此長嘯公也其後兄子百祿使敵敵亦問鎮安否曹公在天雄敵使一過不敢疾驅曹公威震西鄙及鎮天雄契丹使過必戒其下無敢疾驅王公蒞大名敵使入境沐浴潔服嗚呼若人而在藩閫藩閫其不壯乎詩曰如圭如璋令聞令望吾於諸君子見之今日欲寬天下之憂而起中外之治惟在急收人望耳豪傑歸附正覘吾所以駕馭之術必得人如裴度而後可以用蔡人裴度平吳元濟用蔡人遺黎南來正望吾所以鎮撫之策必得人如馮異而後可以慰關輔光武徇河北遣異乘傳循撫屬縣録囚徒存鰥寡新敵慕義正觀吾所以區處之方必得人如祖逖而後可以制石勒祖逖鎮兵黃河以南皆為晉土石勒遣使奉幣請和於逖朝無重臣天下何賴昔宣和末向子諲謂惟起劉安世陳瓘則尚可支持使朝廷得聞其語及二臣之尚在起而用之則立國豈但江左而已何者劉安世在宋市井細民皆知有劉待制陳瓘過越田夫野老皆知有陳瑩中二公人望所向如此豈難扶宣和之治耶劉安世在宋杜門屏迹然田夫野老市井細民以謂若過南京不見劉待制如過泗州不見大聖又陳瓘遷謫以來杜門三十年所至人情向慕雖田夫野老咸知名自天台道由會稽知越州王豐甫具舟候於郊越人聞公赴府爭競觀瞻比肩輿歸道路遮擁幾不可行不然眼釘之謡天下所惡天下謡曰欲得天下平須拔眼中釘欲得天下好莫如召寇老時丁謂譛貶寇公也距脫之詩士夫鄙之石介聖德詩曰如茅斯拔如距斯脫距蓋指夏竦也知衆之所惡者如此又知所好者如彼今日其可不謹哉古今源流至論後集卷七
