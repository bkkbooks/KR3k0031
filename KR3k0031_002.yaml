  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_002-1a, image: WYG0942/WYG0942-0018a.png}
body:
  text: 古今源流至論前集卷二宋林駉撰語孟論語一書蓋理學之淵源也而終始問答不及誠之一字學者疑之龜山語録問中庸論誠而論語不及一誠何也曰論語凡言恭敬忠信所以求仁而進德之事莫非誠也論語示人以其入之方中庸言其至孟子七篇蓋性學之門户也而辨舜與象皆謂之才君子惑焉伊川語録孟子言性情才三者皆無不善亦不肯於所稟處説不善以堯為君而有象以瞽瞍為父而有舜亦是才然孟子不為才之罪者正答公都子問性善不暇一一辨之噫有是哉周子論太極而及無極或者滋惑得先輩之説始明周子太極圖有言無極而太極近世諸儒疑其無極似道家之論晦翁遂作圖説解明圖體橫渠西銘世謂其言體而不及用非前哲力解其説吾恐異論紛紛未已也張橫渠西銘楊龜山疑其言體不及用伊川貽書答之後龜山始有釋然無惑之語語孟二書聖賢之所議論之所問答實萬世所取法之書簾視壁聽傳訛襲舛世無伊洛開覺後人則夫子之道迂而孟子之志荒矣旨哉伊洛師友之言曰論語之所以不言誠者蓋示人以入之之方要之言恭敬忠信皆誠之旨耳孟子之所以謂之才者正答公都子性善之問未暇深辨要之平昔性情才三者之論皆無不善者嗚呼論聖賢之學當以語孟為宗師論語孟之學當以伊洛為依據此古今之至言也嘗聞伊洛之門其稱論語也曰學者先讀論語當如權衡學者但求論語自然有得語録其稱孟子也曰孟子有功聖門以言仁義孟子有功於世以言性善同上或問於程子曰孟子還可謂聖人否程子曰未敢道他是聖人然學已到聖處又曰孟子有功於聖門不可勝言仲尼只説一箇仁字孟子開口便説仁義仲尼只説一箇志孟子便説許多養氣出來只此二字其功甚多又曰孟子有大功於世以其言性善也自非平昔履此學明此理安能造聖賢之閫奧哉自今觀之讀言志數語則知夫子聖人之氣象伊川雜録由願車馬與朋友共顔子願無伐善無施勞孔子老者安之少者懷之觀此數句便見聖賢氣象大段不同若讀此不見得聖賢之氣象他處也難見讀論交數語則知子張為成人之交子夏為小子之交遺書子貢問師也過商也不及如論交可見否曰氣象亦可見子張是成人之交子夏是小子之交因鄉黨之篇則聖人注措宛然如見伊川語録鄉黨一篇分明畫出一聖人出降一等是自堂而出降階當此時放氣不屏故逞顔色又云鄉黨一篇形容得聖人動容注措甚好使學者宛然如見聖人因溫厲之言則聖人容貌溫然可想伊川語録論語是孔門高弟撰其所立言直見聖人處如子樂不得聖人處怎生知得子樂誾誾行行侃侃亦其門人傍觀見得如子溫而厲威而不猛恭而安皆是善觀聖人者又云惟曾子形容聖人氣象曰子溫而厲威而不猛恭而安有以政事入者有以德行入者則知聖人之教程氏遺書孔子教人各因其才有以政事入者有以言語入者有以德行文學入者如陳文子之清如令尹子文之忠則辨非聖人之仁語録問陳文子之清令尹子文之忠使聖人為之則是仁否曰不然聖人為之亦只是清忠嗚呼伊洛之門其有得於論語也深矣生之謂性亦所稟性也而直謂之不知性伊川語録性善性之本也生之謂性論其稟也孔子言性相近者論其本豈可言相近蓋論其所稟也告子所云固是為孟子問他他説便不是虛發四矢非忠於君也而直美其能於取友程氏遺書庾公之斯遇子濯孺子虛發四矢甚無謂也國之安危在此舉殺之可也舍之初無害於國權輕重可也存心養性蓋兩言也則曰心為發用性為自然上蔡問孟子云知天事天如何别曰今人莫不知有君也事其君者少存心養性便是事天處曰心性有别曰心是發用處性是自然窮理盡性至命蓋三事也則曰窮理既能性命亦了程先生曰窮理盡性以至於命三事一時並了元無次序不可將窮理作知之事若窮得理即性至命亦可矣論養氣則謂必如顔子所立卓爾孟子言躍如也程先生曰孟子養氣一篇諸君宜潛心玩索須是實識得方寸勿忘勿助長只是養氣之法如不識怎生養有物始言養浩然之氣須是一箇物如顔子言所立卓爾孟子言躍如也分明得見方可論執中則謂必如禹稷之當過門不入顔子之當居陋巷也遺書問時中如何程曰如三過其門不入在禹稷之世為中若居陋巷非中也居陋巷在顔子之時為中若三過其門不入非中也嗚呼伊洛之門其有得孟子也至矣至侍燕間而承謦咳者亦充然而有得吕與叔得克已復禮之問有洞然八荒皆在吾闥之語吕與叔克己銘曰己既克之皇皇四逹洞然八荒皆在我闥孰曰天下不歸吾仁侯師聖得勿忘勿助長之教豁然終身之省師説侯師聖云云年十五六時明道先生與某講孟子必有事焉而勿正為一句心勿忘勿助長為一句因講禪語之事則不無擬之則差某當時言下有省其感悟人心也又如此哉是學也一傳而得關洛再傳而得吕侯諸君子又再傳而得晦翁朱夫子觀其二書集注之作斷以章句參以師説決以己見發孔孟不傳之藴啓伊洛未言之旨藝閣祕藏照映典籍膠庠談論訂砭愚頑此伊洛之得晦翁亦孔孟之得伊洛也歟蓋嘗論之誦聖賢之言易行聖賢之行難是必致謹於終日三省之時樂道於暮春詠歸之興加敬於出孝入悌視聽言動之際出門倚衡何見非理書紳鼓瑟何往非天而後有悟於論語是必存養於赤子不失之初窮究於夜氣尚存之旦充廣於四端火然泉逹之後窮理盡性表裏洞徹知言養氣內外昭融而後有合於孟子是豈口耳誦説云乎哉雖然表章聖經在聖明講明聖經在師儒哲宗召程夫子講論語故論語之教始尊哲宗元祐初召程伊川講筵講顔回在陋巷因及魯君不用賢之失也高宗召伊洛門人講孟子故孟子之學始行王安石罷孟子不講哲宗始講又至髙宗建炎二年講孟子上曰孟子所言皆仁義與治道此今日宸章奎翰褒崇朱氏蓋有取語孟集注之説愚也不能誦此以為盤銘寧不負天子負所學乎古史裴駰之集解所以釋遷史之疑禇少孫之續書所以補遷史之闕小司馬之索隱又所以救遷史之訛並史記夫釋其疑補其闕固有賴裴禇之功而正救舛訛若非司馬之索隱則是非有謬於聖人也不少嗚呼孰知小司馬之後潁濱先生出於千百載之後作為古史紏謬救失隱然小司馬之用心昔人有言杜征南顔祕書乃丘明孟堅之忠臣特其所謂將順者而小司馬蘇潁濱乃太史公正救之忠臣其功尤多噫旨哉是言乎愚嘗紬繹古史而知潁濱之有功於遷史也深矣遷紀首黃帝而遺羲昊蓋未見孔安國尚書而言也古史於是有三皇五帝之説則遷之舛者始定遷紀之言髙辛生而神靈黃帝迎日推䇿蓋輕信秦漢間異説也古史於是削其虛誕之言則遷之訛者始正琴牢陳亢此聖門之髙弟遷則略之不有古史孰能明其實乎蘇秦從約之書入秦而函關閉此説客之浮語遷則書之不有古史孰能規其正乎史記紀首黃帝不載伏羲少昊古史以伏羲氏神農黃帝為三皇以少昊顓頊髙辛唐虞為五帝又尚書序云伏羲神農黃帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也削之又黃帝紀生而神靈迎日推䇿等語子由古史史記不書琴牢陳亢古史則載又史記蘇秦傳書蘇秦入秦函關閉等語古史皆不載荆軻刺客之靡爾遷史乃有不欺其志之美使古史之論不明則軻果為信義者乎西門豹循吏之流耳遷乃抑於滑稽之列使無古史之説則西門豹果徒滑稽者乎史記謂獻子有隂德於趙則韓晉同祖謂非周武之後乎古史所謂必辨也遷史以莊子作盜跖篇詆孔子之徒故明其術不知莊子蓋助孔子古史所以必明也史記任俠傳荆軻義燕不欺其志等語古史皆辨之又史記滑稽傳載西門豹古史謂非滑稽餘並見古史遷之述宰我也曰宰我常從田常噫以宰我之智而為僭逆之舉乎蘇公辨之宜矣遷之述子貢也曰子貢一出而變昜五國噫以子貢之逹而有變詐之謀乎蘇公訂之當矣子由曰太史公宰我為臨淄大夫與田常作亂夷其族孔子耻之余以為宰我之賢列於四科不至於從叛逆也蓋田常之亂本與闞止爭政闞止亦曰子我也越子由曰太史稱子貢一出而存魯亂齊破吳強晉伯豫觀左傳齊之伐魯本於悼公之怒季姬而非陳常吳之伐齊本怒悼公之反覆而非子貢凡太史公所紀皆非也蓋戰國説客設為子貢之辭而太史公信之耳傳穰苴而不知考據之乖次蘇則刪之而不存記虞鄉而不知履歷之先後蘇則考之而不舛子由曰太史公為司馬穰苴傳言齊景公時晉伐阿邑燕侵河上王師敗績晏子薦穰苴遂以成功大夫髙國譛殺之豫以左氏考之景公四十五年始救晉自是凡四伐晉未有燕晉伐齊者也戰國䇿稱穰苴執政湣王殺之意者穰苴湣王之臣嘗為湣王劫燕晉而戰國雜説妄以為景公時耶故刪去穰苴而為孫吳立傳子由曰遊説之士皆左右罔利獨虞卿始終事趙專持泛説觀其赴秦魏之急捐相印去萬户而不顧此義俠之士非説客也太史公記虞卿與趙謀事皆秦破長平後而卿為魏齊棄相走大梁則前此矣意者魏齊亞卿自梁還復相趙太史失不言之耳噫遷之所以有誤者非短也潁濵之所以詳辨者非苛也蓋嘗推原其故史遷當經籍既灰之日野史雜出之後故聞見寡陋紀録踈略則其有誤也固宜潁濵當學官已立之餘諸儒訂正之久故採托無遺稽考悉備則其詳辨也亦宜昔潁濵嘗謂漢景武間尚書古文詩毛氏春秋左傳皆不列於學官世讀之者少則其意惜遷未及見聖人之全書此古史之作所以惜遷也非所以詆遷也又謂秦焚古書略盡幸而野史一二存者遷亦未暇詳則其意又憫遷出於煨燼之餘其諸子世俗以易古文之語此古史之作所以憫遷也非所以疑遷也愚觀古史一敘有咨嗟嘆息之意此執燭者愛曽子之見也而豈曰求以掩其實而專其美者乎並古文序嗟夫潁濵之於馬遷其用心特相先後古史之於史記其立論特相表裏察遷之意必不以操戈入室者為忌諒蘇之心亦必不以吹毛求疵者為嫌末學淺識殆未可以文人相輕者議之也不然蘇老泉之論遷史曰其與善也隱而彰其懲惡也直而寬者豈為歆向之説哉老泉文遷固史雖以事辭勝然亦兼道與法而有之云云其與善也不亦隱而彰乎云云其懲惡也不亦直而寬乎云云愛而知其惡憎而知其善此蘇氏之家學也故愛漢史者刋漢史之誤劉攽作漢史刋誤愛唐史者糾唐史之謬吳縝作唐史糾謬當以是而求潁濵之用心新舊唐史史記一書筆於司馬氏之父子而不能逃蘇潁濵之議蘇子由作古史以正史記舛訛西漢一史著於班氏之兄弟而不能逭華嶠之譏華嶠譏班史之非夫司馬之父子非歆向之父子班氏之兄弟非勝建之兄弟一家議論未嘗矛盾諸儒紛紛且議其後則夫唐史之作所編非一人所集非一書豈無疑似之迹乎然君子觀其一去一取卓卓乎出於遷固諸人之右者蓋取其大節而非議其小目也喜其褒貶而非考其異同也且唐史有二曰舊史曰新史其舊史有吳兢之私撰唐書有栁芳之續成唐厯貞觀政要出於吳兢所撰順宗實録出於韓愈所筆至後唐明宗命史官劉氏修為唐史即所謂舊史也至我朝慶厯之五年以舊唐史蕪穢不治命宋公祁歐陽公修刪修之越十有七年書成即所謂新史也愚嘗合二史而參考之舊史李光弼父開元中封薊國公新史以為在武后時是時之先後不可合也舊史敬宗第六子成美而新史以為第五子昭宗十子而新史以為十七子是數之多寡不可知也舊史陸德明字子元而新史乃作陸元明字德明舊史徐有功無字而新史乃名洪政以字行是名字之舛訛不可究也案光弼在天寶至德時其父宜在開元時舊史是案二史敬宗止五子安得言第六也新史是案舊史昭宗諸王自豐王祁至蔡王祐等七王皆失其傳則冝其為七子二史皆異案十八學士贊亦以元明為名而德明為字與新史同案孝敬皇帝諱洪故有功避之而行其字與新史同若乃新史所著異同尤多年月有差如魏謨之相志以為十一年而傳以為十五年姓名有差如麗景洪之將紀以為晏洪而傳以為景洪縣公之號可疑則見於吳縝之糾謬吳縝糾謬案膠東郡王道彥傳云唐興務廣宗支故從昆弟皆爵郡王太宗即位問大臣曰盡王宗子於天下可乎封德彛對曰漢所封惟帝子其親昆弟非大功不王先朝一切封之以天下為私奉非所以别親踈於是疏屬王者皆降為公由是言之則道彥初封郡王所降封郡公如本紀貞觀八年書道彥膠東郡公矣今道彥本傳書郡王亦新書之誤死囚之數可疑則見於溫公之考異然則將安諉其責哉溫公考異七年死囚三百九十人案四年實録云斷死罪三十九人今年實録凡有二百九十九人何乃多如此白居易云死囚四百來歸獄舊本紀統紀年代紀皆云二百九十人今從新書又吳縝糾謬云三百九十人者乃録囚之時自死罪至杖笞之數爾若謂皆死罪必不然也大抵所編非一人則豫奪無定論所集非一書則紀載無定説且紀志出於歐陽公列傳出於宋祁公天文律厯五行志則劉羲叟為之方鎮百官表則梅堯臣為之禮儀兵志初出於王景彛業未畢而卒則成此書者又非止二人耳毋怪乎豫奪無定論也且帝紀編年則得於孫氏之南齊録述姚崇十事則得於開元之遺史贊太宗之謂牽於多愛則出於等慈寺之碑紀武宗之謂躬受道籙則出於會昌之文其贊房杜則本之栁芳其贊五王則本之呂溫傳段秀實則本子厚之文集毋怪乎紀載無定説也唐鱠序子嘗患唐史厯年之久記事之多秉筆者之衆是以支離不能合也紀志出於歐陽公列傳出於宋公祁更而二人此其不能相一也固宜而天文律厯五行志則劉羲叟為之方鎮百官表則梅堯臣為之禮儀兵志初出於王景彛業未竟而卒則成此書固非止二人毋怪乎首尾之不相貫也竇又等慈寺碑等慈寺在鄭州汜水唐太宗破王世充建德乃於戰處建寺云為陳亡薦福太宗不世之姿而牽惑習俗崇信浮圖豈以其言浩博為可喜耶余於本紀譏其牽於多愛者也圖又會昌投龍文余修唐本紀而武宗以奮然除去浮鋭矣而躬受道家之籙服藥以求長年以此知非明智不惑者特好惡有不同耳及得會昌投龍文見其自稱函道離玄昭明三光弟子南嶽上真人則又益以前言為不謬矣噫讀春秋者當論褒貶之大義不當論夏五郭公之疑讀唐史者當論去取之大節不當論疑似異同之迹以李義府許敬宗姦邪而與長孫無忌同傳以栁宗元劉禹錫之阿附而與韓愈同傳此舊史之失也新史改之所以先君子而後小人也以劉蕡之鯁直而槩之於文苑以吳淑之忠義而槩之於外戚以陽城之卓異而列隱逸以孫思邈之高尚而列方技此舊史之失也新史易之所以取大節而棄小目也新史記傳有條不紊如陽城昔在隱逸今書之於卓異傳秦系昔人不傳今書之於隱逸韓愈使王庭湊之節舊史不書今乃書之所以明君子之節太宗恨魏徵之諫有殺田舍翁之語舊史則書今乃不書所以掩人君之闕此新史之得也舊史以高智周薛季王方翼之功業而概之以良吏以陳子昻之諫諍劉蕡之切直而槩之於文苑以吳淑之忠義而槩之於外戚以陽城之卓異而槩之以隱逸以孫思邈之高尚而槩之以方技是棄其大行而取其小節此舊史之失也元又李義府許敬宗姦邪而與長孫無忌同傳以栁宗劉禹錫之不正而與韓愈同傳高愍之果毅李氏妻之忠勇有烈士之慷慨韓偓之正直皆不為立傳而僧神秀普寂義福一行反為立傳獨孤及之才行兼全皇甫湜之文章秀穎韋丹之善政何易于之愛民皆不為立傳而道士王知逺潘師正吳筠反為立傳舊史之失也此其有關於世教也不淺或者烏可以小小不同而妄議噫寧如先輩言列傳之有據依不敢如好事者之以舛訛議景文寧為先輩稱史法之得春秋不敢為糾謬之集以議歐公通鑑昔神宗皇帝之敘通鑑曰典刑之總會册牘之淵林蓋嘉其有關於風化也神宗敘通鑑博而得其要簡而周於事其典刑之總會册牘之淵林矣孝宗皇帝之讀通鑑曰法其所以興戒其所以亡蓋稱其有益於治道也聖政乾道二年上日間暇取尚書通鑑孜孜而讀之帝之所以帝王之所以王法其所以興戒其所以亡口誦心惟未嘗一日輒去手也噫溫公之有功於是書也大矣然嘗聞之十有九年史筆始絶其用心至勞也洛與夏縣遺藁充棟其為書至繁也公著通鑑洛中夏縣之藁各有兩屋官屬之辟召始得劉道原後得范淳夫其編次甚詳也溫公辟官屬考通鑑始得劉道原道原既卒又得范淳夫衆論之訪咨或得康節改曹魏之事或得伊川定李唐之實其訂正精也聞見録司馬文正初作厯代論至曹操則是奪之於盜手非取之於漢室也富文忠疑之問於康節以為非是子家尚藏康節答文忠書副本當時或以告文正今通鑑魏下無此論難又伊川語録君實修通鑑至唐而正叔曰敢與太宗肅宗正篡名乎曰然又曰敢辨魏徵之罪乎曰何罪徵事皇太子太子死遂忘不戴天之讎而反事之此王法所當誅曰管仲不死子糾之難而事威公孔子稱其能與徵何異曰小白長而當立子糾少不當立小白殺子糾管仲以所事言之則可死以義言之則未可死與徵之事全異張藝叟嘗云僅能一觀更休觀書陳了齋亦以此書如藥山無一不在嗚呼後之觀者將終篇而熟究之乎抑閲未終紙而欠伸思睡乎張藝叟答孫子發書多論通鑑其略云溫公嘗曰吾作此書惟王勝之嘗閲之終篇自餘君子求見欲觀讀未終紙已欠伸思睡矣蓋嘗謂是書當以扶持風教論不當以小小節目論當以關切治道論不當以區區凡例論首書晉大夫魏斯趙籍韓虔為諸侯所以明君臣之分通鑑論首三晉以大夫為諸侯力辨四皓為惠帝立黨制其父所以明父子之義通鑑論四皓不當為惠帝以制父高祖傳嫡之命魯仲連射書聊城公則闕之文潛亦謂仲連以布衣遊諸侯不當以身任天下之責通鑑不書魯仲連下聊城之事曹操分香賣履公則譏之元城謂厯數百年無有知之者惟公獨能知其心通鑑論曹操垂沒意存代禪分香賣履以掩平生之姦又元城謂此論數百年無有知之惟公獨知其心劉洎之死史以為出於遂良公謂遂良乃忠臣必無譖洎之語竇參之諌史以為出於陸贄公乃謂贄有救解之辭而無報參之意韓休必不至譖李吉甫顔真卿必不至為賊草奏公之所論者凜凜乎君臣父子之經三綱五常之理仁義忠信之道豈非有關於風教乎並通鑑本出處論曹參遵何之約束正以針熙寧大臣變法之失日録熙寧三年司馬光傳通鑑漢紀至曹參代蕭何為相一遵何故事因曰何獨漢也道者萬世無弊使夏商周子孫常守禹湯文武之法雖至今猶存也論賈山所言從諫拒諫正以譏熙寧大臣同已之非日録熙寧三年司馬光讀通鑑賈山上疏因言從諫之美拒諫之禍蘇秦之縱橫談説本不足取也存其事於書者欲見當時辨説之覆邦家也日録熙寧元年光讀通鑑至蘇秦從約事上曰蘇張掉三寸舌乃能如是乎光曰秦儀縱橫無益於治臣存其事於書者見當時辨説所謂覆邦家也嗇夫之辨給馳騁亦不足道也公之深辨而不釋口者欲使小人知利口之無益也日録熙寧三年讀張釋之論嗇夫利口光曰孔子稱利口之覆邦家夫利口何至覆邦蓋人能以是為非則君從其言是則邦家之覆誠不難矣時惠卿在坐光專以此斥之公之所論者拳拳乎變更持守之異拒諫從諫之别私説正論之不相入豈非有益於治道乎世之好議前輩者謂離騷之賦日月爭光公削之而不録以是為去取之未當不知公之貽書范祖禹已謂詩賦若止為文章皆請直刪則公之所録者必有深識不然厯代儒林文苑之士十已削其七八非此意耶公與范祖禹書詩賦若止為文章詔誥若止為除官及妖異止於怪誕詼諧止於取笑更請直刪餘見在下姓武之讖不近人情公存之而不去以是為編録之未精不知公之貽書祖禹曰妖異有所警戒則並存之則公之所存者必有高見不然漢高祖斷蛇之事具載於書非此意耶通鑑不書怪獨書唐因姓武之讖殺李君羡事又聞見録司馬公修通鑑時謂范純父曰諸史中有詩賦等若止為文章便可刪去公之意正欲立於天下後世不在空言耳如屈原以忠廢所著離騷太史謂與日月爭光通鑑并屈原事削去之褒毫髮之善通鑑掩日月之光何邪公之當有深意求於考異無之然則論公之書不可以凡例輕議也又况一書浩繁非盡出於公之手睢陽事用張中丞傳淮西事用平蔡録其述魏鄭公得之諌録其述李絳得之論事宜其編次之難也真宗命儒臣册府元龜所遺棄既多故亦不能暴白如通鑑則不然以唐朝一代稱之敘王世充李密事用河洛記魏鄭公諫諍用諫録李綘奏議用李司空論事睢陽事用張中丞傳淮西事用陳公平蔡録李泌事用鄴侯家傳李德裕太原澤潞回鶻事用本朝獻替記皆本末燦然嗚呼劉向采上古至秦漢休咎之紀為五行傳論書亦博矣然牽於隂陽之説未免遷就不足以悟成帝之意唐次以自古忠臣賢士衆讒被放之事為辨謗略書亦詳矣然究其纘次之意正為十年不遷祗為身計宜乎貽德宗之怒噫甚矣書之難著也其視公之所編宜何如哉離騷東坡以騷為風雅再變而讀者謂得體蘇東坡曰離騷風雅再變溫公不以騷編入通鑑而論者謂未純聞見録司馬公修通鑑時謂范純父曰諸史有詩賦等皆止為文章便可刪去公之意正欲立於天下後世不在空言耳如屈原以忠廢所著離騷太史謂與日月爭光公皆削之當有深識求於考異無之嗟夫坡公所學有得於騷固也而溫公所以不録者以其例不取詩賦或者烏可執是而輕譏哉讀鴟梟之詩不可不知周公憂周之情讀災異之疏不可不知劉向傷漢之意讀離騷之賦不知原之拳拳為楚亦未為知原者夫楚宗國也原不能止懷王之西而知芈氏之將亡不能輔襄王以復不戴天之讎而反受子蘭之譛故其情切其辭悲昔許穆夫人以既嫁之女尚憂宗國而賦載馳之詩原也得無言乎後之不知騷者則曰九歌之作近於舛崑崙之述近於非經逺遊之作近於放卜居之作近於詭太一之歌繼之以湘君則近於靡惜誦之章繼之以懷沙則近於矯故賈誼以鳯凰千仞而譏平矣本傳賈誼賦有曰凰凰翔于千仞兮覽德輝而下之揚雄以湛身而笑平矣揚雄作畔牢以諷平班固以露才揚已議平矣班固謂平之離騷揚才露已不思誼之鵩賦不若平之以鴻鵠虬龍而喻君子見上雄之投閣不若平之抱石江濱而馨風千古揚雄因新莽投閣幾死固之賦燕然以媚悖逆之臣不若平之獨醒而不啜其醨也班固作燕然銘以媚竇憲不特此耳九歌之辨取其禹之平水土而牧養羣生即骨雖朽而目不瞑於湘水矣噫安得東坡山谷與之讀騷經哉文選文粹文鑑論漢魏以後之文莫備於文選論李唐之文莫備於文粹論聖宋之文莫備於文鑑噫文之難評也尚矣相如上林之賦劉協稱其繁類成艷為辭賦之英特而李白之序大獵復謂窮壯極麗何齷齪之甚劉協曰相如上林繁類以成艷孟堅賦兩都明則以彩贍張衡二京迅拔以宏富楊又李白序大獵曰相如子雲競誇詞賦子虛上林長羽獵既非諸侯述職之義當時徒窮壯極麗何齷齪之甚也其去取之不一如此則選之所録漢賦果安從哉韓昌黎毛頴傳舊史鄙其譏戲不近人情小宋復謂送窮文毛穎傳皆古人意思未到可以名家其抑揚之不一如此則粹之所編唐集果安適哉舊唐書云愈作毛穎傳譏戲不近人情此文章之甚謬者矣又小宋云退之送窮文進學解毛穎傳皆古人意思未到可以名家矣范文正嶽陽樓記後山謂其纍世以為竒尹師魯復謂傳竒體耳其品藻之不相入如此則鑑所論本朝之文又何如哉後山詩話云范文正公嶽陽樓記用對語説時纍世以為竒尹師魯讀之曰傳竒體耳傳竒唐裴硎所著小説也雖然文章美惡自有定論去取當否要終自見吾平心論之則曰選曰粹曰鑑之所集有不難辨者且蕭統盡索自古文士之作築臺選之始於楚騷訖於江左為卷三十名之曰選且曰章表記頌詩賦書論亦各有體茍失其體雖工弗取其用工多矣姚鉉盡取唐人之文拔其尤者先後三變無不編次為卷一百命之曰粹且曰擷英掇華正以古雅侈言蔓辭率皆不取其用心勞矣夫以上下數千年間騷人墨客雄辭傑筆有聲翰墨無毫髮遺是集也或如松林竹徑清隂邃密下臨清流瑩然可愛使人蕭然忘塵埃之意其清如此或如園林華發低紅昻紫麗服靚粧雜遊其間使人熙熙然神怡氣定其和如此然其間纂次之不公品題之未當尚不免前輩之議則以選自名者或有可刪之文以粹自命者多有可疵之體亦何取於勤且博哉且王右軍之序蘭亭絲竹管絃四言兩意不免見黜似矣然劉向之序戰國有先秦典雅之製董子之䇿賢良得伊周格心之學而例黜之可乎王羲之蘭亭序不録其中以天朗氣清非春氣絲竹管絃四言兩意故也又劉向戰國䇿序董子賢良䇿亦並不載屈原之作離騷辭古意烈有風雅體特軋卷首似矣然子雲之美新名教罪人潘元茂之九錫君子羞之而槩收之可乎文選卷首載離騷子雲美新文潘元茂九錫文皆在選中不特此也司馬長卿賦上林而引盧橘夏熟班孟堅賦西都而言玉樹青蔥而亦取之耶左太沖序三都賦云相如賦上林而言盧橘夏熟楊雄賦甘泉陳玉樹青蔥班固賦西都而嘆出比目張衡賦西京而述以遊海若義則虛而無證言則侈而非經蘇李河梁送别之詩在長安而有江漢之語文選載李陵送蘇武詩宋玉高唐神女之賦以一篇分而為序而亦録之耶此統之去取不能逃後世之議也且段文昌平淮西碑録之誠善矣韓昌黎之所作果不及乎唐舊史云韓昌黎淮西碑多載裴度事時先入蔡李訴功第一訴不平之詔令刋去命翰林段文昌撰又文粹不載韓愈淮西碑只載文昌淮西碑李德裕忠諫論録之誠善矣韓愈諍臣之所作果不及乎文粹只載李德裕忠諫論不特此耳王摩詰老將行指天幸不敗為衛青李長吉鴈門行以黑雲壓城而續以甲光向日之句而俱取之何也韓栁之邃古李杜之風雅元白之雄深而反雜以釋子蘭飲馬長城窟道士吳筠遊仙步虛而不倫若是何也此鉉之編次不能掩天下之公也文粹嗚呼不有美玉安别碔砆不有先輩之文鑑無以知選粹之謬肆我本朝始有文海孝宗惡其踳駁且遺逸者衆乃命儒臣更修其書斷自中興以前彚次表上賜名曰皇朝文鑑如衆星列宿爭芒於層漢也如象齒犀角充斥於天府也自今觀之經學至國朝而愈明形於言論發六經所未盡之藴程伊川之序易傳無非天理人極之奧遊酢之為孫莘老序易傳亦皆性命仁義之妙其於孔安國序書杜元凱之序左傳選皆登載者同乎異乎詩體至國朝而始正發於諷詠有三百篇之意蘇東坡之直節徑氣傲雪凌霜黃魯直之風韻灑落光風霽月其與樂天之放蕩愚溪之嘲怨粹皆所采取者是乎否乎文章雜體至我國朝而尤盛縉紳揚厲之文如梁周翰五鳯樓賦鋪陳藝祖聖德進士科舉之文如王曽之有物混成蓋有古詩風骨名臣奏議之文如張方平之諫用兵東坡之疏買燈潁濱之言條例尤其表裏愈偉者彼選之雜賦諫書粹之表頌銘贊微夫斯之為文也視此不亦恧乎已上並文鑑雖然國朝之文所以嫓墳襲典超漢軋唐傑然為一代之盛者有由也三百年來文不振直從韓栁到孫丁此文之始倡也王元之詩曰三百年來文不振直從韓栁到孫丁如今便合教修史二子文章似六經六十年來旺氣消文章化入山川手此文之再變也曾子文章衆無有水之江漢星之斗此文之愈盛也王荆公贈曾南豐詩王元之穆伯長導其源尹師魯孫明復疏其流廬陵臨川眉山南豐助其瀾鳴律和呂嚼羽含宮則氣骨安得不古議論安得不正哉愚故併論之杜詩白樂天海圖屏風之作前輩窺見其心之不忍用兵東坡讀白樂天海圖屏風詩謂樂天心不忍用兵劉禹錫三閣詩四章識者謂可以配黍離山谷讀劉禹錫三閣詩曰此詩可以配黍離後之讀工部詩者安可不求詩之意哉吾觀公之氣節高邁秋霜爭嚴風標屹立砥柱中流嗜殺人如嚴武則瞪睨而兒戲之嚴武守蜀杜甫訪武醉捋其鬚曰子非嚴挺之子耶武大怒房琯毁師公乃排衆而申救之再上疏救琯而議者不挈置於仁人之列至於沈宋諂諛溫李淫艷者為伍前輩深以是為恨惜哉夫公之詩蓋愛君之盛心也北征之篇蓋倉皇問家室而作也使或者處之對童稚語妻孥他不暇顧而終篇諄復惟及國事山谷喜之謂退之南山不必作登慈恩塔寺此正陪諸公遊遨而作也固宜笑談風月傲視八極以樂其心而措意立辭意在言外荆公謂其譏天寶時事則其愛國之意果何如微升古塞外已隱暮雲端夏鄭公知其為肅宗而非為月也初月出不高衆星尚爭光或謂史思明尚在而非為星也石壕吏之作韓魏公知其論戍役之苦茅壁之詠蘇公知其嫉藩鎮之強噫非杜工部之知道不能發愛君愛國之辭非蘇王諸公之知詩不能明愛君愛國之心是詩也烏可與騷人墨客同日語哉並杜詩注不特此也百舌一詠惡讒佞也惡木一章傷小人也腐草之螢譏閹寺也寒城之菊憫士操也悲青坂傷戰敗之無功也嘆秋雨刺暴虐之傷恩也兵車行蓋念驅中國之衆開邉境之地也洗兵馬之作蓋言復西京之地掃安史之亂也又不特此也以是心而處已又以其處已者而待人其送嚴鄭公也則曰公若登台輔臨危莫愛身其寄裴道州蘇侍御也則曰致君堯舜付公等早據要路思捐軀其寄董嘉榮也則曰雲臺畫形象皆為掃妖氛嗚呼又何待人之厚耶先輩謂公詩足以厯知一代治亂以為一代之史則非詞人之詩乃詩中之史也呂公編杜工部年譜始於先天終於大厯且與唐紀傳相為表裏故凡唐史所未載者或見於公之詩而觀公之詩足以厯考一世之治亂又唐史云善謀時事至千言不衰世號詩史先儒作公詩序又謂詩與唐録猶槩見事迹復許之以為詩之六經則非特詩中之史又詩中之經也見杜詩曽謂三百既刪之後果無詩乎世之輕議先輩者且謂楊大年鄙為村夫子以是而疑公之詩不思江漢思歸客之句大年且不能屬是豈鄙公之詩詩史楊大年不喜杜子美詩謂之村夫子有鄉人以子美詩強大年不服因曰公試為我續江漢思歸客一句大年以為屬對鄉人曰乾坤一腐儒大年似少屈又謂歐陽子生平不甚愛之復以是而疑公之詩不思身輕一鳥過之字歐公嘉嘆不已又曷不深取哉貢父詩話歐公平生不甚愛杜詩而謂韓吏部絶倫又歐公與客得杜詩有身輕一鳥之句歐公與客思足其句或曰下或曰落及得全句乃過字歐公深嘆之不然山谷稱其靈丹一粒黃山谷稱子美詩如靈丹一粒點鐵成金蘇公稱其集大成東坡曰子美詩云云陳無已稱其竒工易新蓋莫不好此數君子者蓋風騷之冠冕翰墨之典刑使非有愜於衆論豈為是過情之論歟雜體議論不本於孔氏則厭常喜異不足以垂後世之訓文章不祖於六經則夸多鬭靡不足以該天下之理夫自杏壇迹蕪麟筆絶矣詞人才子名溢於縹囊舒文染翰卷盈乎緗帙紛紛籍籍蓋不知其幾然論本孔氏文祖六經庶可登文章之籙否則纍編連牘特紙上之陳迹耳蓋詩變為樂府之後則作拘幽操文王作作思歸引衛女作即或愛或思之詩也詩變為離騷之後則作弔湘賈誼作弔湘賦作畔牢愁揚雄作即或怨或哀之詩也書自誥命之文不傳而為制為誥為表者皆書之宗泒也詩自明良之歌不作而為賦為頌為針者皆詩之源流也後之曰記傳曰志贊本春秋之遺策也後之曰序曰記即易與記之遺體也然則學必尊師而後天下無異説文必尊經而後天下無異論此古今之格言也諸葛孔明出師一表言辭激烈對越鬼神讀之令人雍雍然生敬心故東坡謂其與説命相表裏東坡云孔明出師表與伊訓説命相表裏杜工部平生詩集模寫風景拳拳愛君讀之令人灑灑然生愛心故山谷謂有三百篇之旨山谷讀杜子美詩如靈丹一粒點鐵成金有三百篇之旨夫以文而論人如朝錯之賢良䇿賈生之過秦論班彪之王命論揚雄之美新王羲之蘭亭序潘元茂之九錫此皆膾炙人口者而前輩特取孔明之一表以詩而論人如蘇李之高妙陶阮之沖淡曹劉之豪逸謝鮑之峻潔徐庾之華麗此蓋有聲於詩壇者而前輩特稱子美之詩此無他不以文論文以經論文也夫商盤周誥特當時小民登于王庭之言幽深簡古如登峻坂然後之博學君子研窮旨意未易通究國風雅頌亦不過小夫賤𨽻之辭渾厚醖藉如奏黃鍾大呂後之騷人墨客老於文墨練辭剪句有不能得其一二者噫作文而不究六經之旨不愧古之聖賢寧不愧古之民乎然嘗觀漢晉而下惟唐之韓栁文章機軸自成一家當於古人中求之韓之南溪始泛三首魯直嘆有詩人之句律魯直於退之最愛南溪始泛三首有詩人句律之深意蓋退之絶筆於此韓之淮西碑孫覺喜其敘與銘得詩書之體後山詩話云龍圖孫學士覺喜論文謂退之淮西碑敘如書銘如詩韓之盤谷序坡老謂唐無文章惟此篇而已東坡云歐公言晉無文章惟陶淵明歸去來一篇而已余亦謂唐無文章惟送李願歸盤谷序一篇而已則韓之所筆非唐之文古之文也栁之詩東坡稱其在韋蘇州之上東坡晚年最喜栁子厚稱其詩在淵明下韋蘇州上栁之序前輩稱送僧浩然一篇無六朝風采栁之碑東坡稱曹溪南嶽諸碑妙絶古今坡公云讀栁集曹溪南嶽諸碑妙絶古今則栁之所著非唐之文古之文也嗚呼盍亦遡其源流乎蓋詩葩易竒盤誥詰屈春秋謹嚴韓之所學者在是則捕龍蛇摶虎豹急與之角而不敢暇者宜矣進學解又栁文嘗讀韓所著毛穎傳後題云有南來者言韓愈為毛穎傳云云索而讀之若捕龍蛇摶虎豹急與之角而力不敢暇上而詩易春秋下而左氏國語栁之所學者在是則軋漢周而凌晉宋凜然為一王之法者宜矣栁文集序噫韓栁逺矣文氣雕喪三百年來文不振直從韓栁到孫丁吾於我朝諸公見之見後夫論制誥之文非駢麗俳優之為美而以體製謹嚴之為高蘇公行呂惠卿之謫辭衆口稱快東坡作呂惠卿謫辭曰先皇帝求賢若不及從善如轉圜始以帝堯之明姑試伯鯀終然孔子之聖不信宰豫尚寬兩觀之誅薄示三危之竄衆論愜之錢穆父之行章子厚謫辭切中事情章子厚元祐初簾前爭事無禮責出知汝州錢穆父行詞云怏怏非少主之臣悻悻無大臣之節子厚見穆父責其太甚也范純仁之遺表辭意感切是文也非六經簡嚴之體歟范純仁之遺表其略云蓋嘗先天下而憂期不負聖人之學此先臣所以教子而微臣資以事君又云萬里波濤僅免江魚之葬五年瘴厲幾從山鬼之遊惟宣仁之誣謗未明致保祐之憂勤不顯奏表時蔡京用事下有司欲罪其子李端叔云代作遂廢錮論記述之文非鋪陳華麗之為巧而以規切諷諭之為工王元之之記待漏院切切然憂國之心王元之作待漏院記論大臣早思憂國愛民之事范文正之記嶽陽樓有對景自警之辭范文正作嶽陽樓記論事皆自警之心張伯玉之記六經閣得尊六經黜百氏之意張伯玉作太平州六經閣記云云經閣者諸子百家皆在焉不書尊經也是文也非六經紀實之旨歟其奏議也潁濵之言條例司東坡之論買燈張方平之諫用兵鄭介夫之辭除授筆勢翩翩炳然仁義之美談非得伊訓召誥之意乎其詩章也楊公之賦朝京闕楊億童子時送中書賦朝京闕結句云願秉清忠節終身立聖朝歐公之詠春帖歐公作春日帖子皆規諷意如御輦經年不遊幸上林花好莫爭開戒盤遊也陽進升君子隂消退小人坡公之諷水利坡詩謂間送苕溪入太湖蓋譏一時水利中存諷諭藹然針美之遺意非得周雅商頌之體乎進士之文王曽以賦䇿勳而為賢相王曽應舉作有物混成賦識者知其有宰相器張庭堅以經義進而為名臣則不可以科舉輕視也序述之文程伊川自序易傳春秋傳遊定夫為孫莘老序周易傳則不可以序體槩論也嗚呼宣公奏議前輩論其有七篇仁義之談陸贄論諫百篇皆仁義之言論者稱其有孟子七篇之意劉禹錫三閣四章識者謂可以配黍離黃山谷謂劉禹錫三閣經四章可以配黍離况我朝諸公以六經為凖的以孔孟為宗師以仁義禮樂為醖藉以針規諷諫為旨要則含商嚼羽戞金切玉豈非周情孔思之遺乎嘗謂孔子之學歷戰國而病至孟子則復起孟子之學厯漢魏而病至韓栁則復起韓栁之學厯五代而病至我朝諸君子則復起得非聖經之未墜歟斯文之未喪歟六經簡嚴與天地並傳而無一日之或息歟不然何其抑之未久而復伸晦之未幾而卒明也于今便合教修史二子文章似六經必有續王元之之詩以為諸公誦王元之詩曰三百年來文不振直從韓桞到孫丁于今便合教修史二子文章似六經古今源流至論前集卷二
