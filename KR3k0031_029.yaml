body:
  text: 古今源流至論續集卷九宋林駉撰任子舜命八元八凱皆出於髙辛髙陽舜之用人以世也周命鄭虢毛原皆出於姬姓宗盟周之用人亦以世也世卿之説其來尚矣然在虞周以為當在後世以為濫何耶愚嘗推原其故命典樂而教胄子而直溫剛簡之德全命司樂以教國子而中和孝友之行備蓋教之於平時用之於異日所以為有賢子弟也夫富貴者侈之階安逸者驕之府蒞而不學動成過咎持祿自滿鮮克由禮如之何而無教養之素耶後世任子之濫正由此也漢人任子之法有任為太子洗馬者汲黯太子庶子者蕭育史丹馮野王皆以父任為中庶子有任為右校書者辛慶忌博士弟子者伏湛有任為侍中史丹九男皆以丹任為侍中任為軍司空者杜延年有任為郎蘇武以任為郎劉向為輦郎孔光子男放為侍郎虎賁諸郎皆父死子代任為中郎將者謝永此所任之官也或以父任西漢龔勝免策曰其任子若孫若同産子一人各除為郎餘見上或以兄任霍去病任兄為郎袁盎以兄任為郎楊惲任兄為郎或以族父任侯霸以族父淵任為舍人或以宗家任趙兼淮南王舅子由以宗家任為郎此所任之人也其為制固不一爾清耶濫耶愚固未暇議獨怪夫漢人無教養之法至使王吉所論任子率多驕驁不通古今直欲除而去之又何足取哉王吉上言曰今使俗吏任子弟率多驕驁不通古今此伐檀所為作也宜明選求賢除任子之令是故萬年教子不過以諂萬年召子咸教戒於牀下語至夜半咸睡頭觸屏風萬年怒欲杖之咸謝曰大要教咸諂也乃不復言方朔教子亦惟以容本贊曰非夷齊而是栁下惠戒其子以為容首陽為拙柱下為工飽食安步以仕易農為父兄者不教以節義不教以亷恥而俾為容身保妻子計此皆漢人積弊之故若是而不除任子之令是滋弊也唐世任子之法有所謂三衛者曰親衛勳衛翊衛皆大臣之子孫為之分畨宿衛而後授之祿任當武德貞觀初其等有七人所共榮也官志親衛之府一勳衛之府二翊衛之府三武德貞觀初重授大臣二品三品子補親衛二品曾孫三品曾孫四品子職事官五品子若孫勳官三品以上有封及國公子補勳衛一品皆率府勳衛四品孫五品及上柱國子補翊衛及率府勳衛勳官三品及縣男以上子散官五品以上子若孫補諸衛及翊衛有所謂親事帳內者文武三品以上乃給而以品官之子為之食貨志光宅元年文武職事三品以上給親事帳內以六品七品子為親事以八品九品子為帳內歲納錢千五百謂之品子課錢有所謂納課品子者捉錢品子者納課則歲取庶臣之子而上之兵部納課十三歲而後試上等送吏部其次留本司又其次納貨納已而復試量文武授散官捉錢則無違負滿二百日本屬以簿附朝集使上之考功兵部滿十歲量文武授散官有納課品子歲取文武官六品以下勳官二品以下五品以上子年十八以上每嵗解上兵部納課十三歲初試一等選吏部二等留本司三等納資二歲四等納三嵗納已復試凡一嵗為一選增自一選至十二選視官品髙下以定其數因功髙下而損又有太廟社稷齋郎皆以武選而崇文𢎞文及四門館生又以文授唐選舉志其為目皆不一爾當耶否耶愚亦未易論獨喜夫唐有學校以教養之曰崇文館曰國子學曰廣文館曰四門館其生徒皆以皇屬國戚及大臣朝臣子孫為之見學校門詳載而當時皆以奏蔭之目不若儒科之榮至使楊國忠亦願其子以明經舉豈非上人激勸之功哉楊國忠傳子暄舉明經不中禮部侍郎達奚珣子撫往見國忠國忠聞暄當黜語曰生子不富貴耶豈以一第為鼠輩所賣珣大驚即置髙第是故柳子厚作吏商而勸為吏之亷栁文昌黎作示兒首言讀書辛勤之好示兒詩始我來京師云云為父兄者勸以亷勸以學亦唐人相師之風則唐之子弟想亦耳濡目染之素爾國初補奏之子止為六宅使增釋開寶五年參政樞密之子並授供奉官太宗以趙普為六宅使豈當時太平未久人君尚有右武之意耶魏咸信以宰相仁浦之子為駙馬都尉特請於朝乃得其子為寺丞是公主未有奏蔭也增釋淳化四年彰德節度使駙馬都尉魏咸信長男昭節為大理寺丞從咸信之請以此知祖宗朝公主無奏子法也咸信乃仁浦之子仁浦以右相就第身後恩數不及其孫而咸信以駙馬都尉亦持請於朝乃得官其長男云杜彥鈞以昭憲之姪從太祖幾二十年僅補東頭供奉官是戚里未輕奏蔭也同上杜彥鈞者昭憲皇太后之姪太祖太宗之表弟太祖有天下從其父至京師更太祖之世幾二十年至太平興國五年始補東頭供奉官以此知祖宗之戚里后妃之家子弟得官之不濫也王德用以勳臣超之子超之建旄已二十年而德用僅為忠佐是管軍方鎮未有奏蔭也同上祥符六年王超卒録其子為州都尉為忠佐惟二子補官超更四鎮建旄秉鉞二十餘年而德用止以太平軍牙校補官豈祥符以前方鎮與管軍三衙未有奏補法也補奏之法非嚴耶然此未足為嚴公卿子弟未仕之前則命入學以教之既學之後復立較試以考之若可用矣猶以為未也其已試者復嚴之覆試覆試則以身年誦書三者而並舉焉其已覆試者復親為之引對引對果精則命官否則復黜焉兹其所以為嚴是故奚嶼以坐補齋郎而貶髙元緒亦以坐補齋郎而貶噫覆試失實尚罪舉主嚴何如耶建隆之制所補齋郎進馬以三事覆試之曰身曰年曰誦書覆而不實主者坐故奚嶼王貽孫坐補齋郎失實貶官趙元拱髙元緒坐補齋郎貶官錢象中以學業未精而黜陳宗紀亦以學業未精而黜噫引對未精復俾再學嚴何如耶祥符三年詔門資二十五以上求差使者令於國學聽習以二年為限令審官與判監考試既而引對錢象中陳宗紀並以學業未精且令習讀次年引對夫既習於國學復試於有司又復引對於天子之庭又安有膏梁之習哉此國初之制然也蓋自祥符之後以太平之樂與臣下共慶恩意漸寬故國初無誕節之恩雖有亦一時之特旨自祥符定承天節奏蔭於是有誕節推恩之例至道末壽寧節推恩時上春秋稍髙出自特旨後世遂為故事祥符八年定承天節南郊奏蔭條格以推恩既濫入流增多也國初無遺表之制雖有亦一時之特恩自祥符丐請日繁白丁盡補於是有遺表推恩之例增釋祖宗朝無遺表之制如韓重賢劉璠亦一時之特恩真宗以後臣寮遺表丐請無厭旁及妻弟外甥下逮門客奴𨽻率皆僥幸皆望沾恩國初無郊禋之蔭自祥符南郊詔朝臣與恩一子於是有郊禋推恩之例祥符元年詔提刑朝臣與一子恩自是三年一講大禮奏蔭之恩廣矣此雖承平日久恩重賞厚然覆試之制尚嚴而引對之制猶在我真宗在御二十五年未嘗不臨軒試之若寬而實嚴也真宗在御二十五年臨軒引對率以為常天禧四年不豫有司建言諸試御齋郎自今更不引對依格注擬從之遂以為例自引對罷於天禧之四年而選用不如前日爾況自明道之間復以致仕推恩有員外致仕而其子試校書者有三丞致仕而其子為三丞者雖曰國初有之蓋特恩也然亦給事知制誥侍從之職始得任子為學究校書而已今以員外三丞不過以朝奉奉議郎皆得官其子不愈寬乎此於誕節遺表郊禋之外而復開致仕之例興國六年給事劉載致仕賜其子宗古同學究出身天禧元年知制誥胡旦致仕以其子幾試校書郎至明道初員外郎致仕者試校書三丞致仕其子為三丞郎夫給事者今之通議大夫也知制誥者今之中書舍人也皆曰侍從員外郎三丞郎今之朝奉奉議郎也推恩至此可謂廣矣是以慶厯以來諸賢刺口極論富弼論冗濫之弊慶厯中范仲俺富弼有曰自真宗皇帝以太平之樂與臣下共慶恩意漸廣夫任子法弊冗濫日增請罷少卿監以上乾元節云云李東之請定補蔭之法至和中諫官李東之請定選舉補蔭之法范鎮毋湜孫抃等亦更進其言自是歲嵗入流者無慮三百員父兄不知教訓子弟不修藝業此孫抃之請也慶厯元年孫抃奏國朝自景德祥符間屢行大禮旁洽慶澤每遇南郊慶聖節並許奏蔭不限才愚概居祿仕未離襁褓已列簮紳故使父兄不知教訓子弟不修藝業俾之從政只以害民若不急為更張積成弊幸臣僚不許陳乞學生精加考試此何剡之請也何剡言近年大臣罷兩府任便陳乞子弟召試充館職或出身用為恩例望自今後館閣不許臣僚陳乞及奏舉人同試以塞僥幸如有合該恩例者送學士精加考試范鎮言之母湜孫抃又言之見上注於是仁宗慨然懲革濫恩伏覩慶厯之詔曰周大司樂掌學政以六藝教國子則官材蓋本於世胄今之蔭法推恩太廣設考課之格立保任之條自是任子之恩殺而考士之制嚴矣慶厯三年十一月詔曰周大司樂掌學政以六藝教國子則官材蓋本於世胄而今之蔭法推恩太廣以致疏宗蒙恩拜焉授官未知率身之道從政之方今設考課之格立保任之條咨爾庶位體兹意焉自是任子之恩殺矣夫何熙寧大臣當國罷身言書判之制立銓試出官之法甚而有免試之例有陳乞之恩不惟不試於便殿亦且不試於有司不惟不試於有司亦或不詣於銓曹不問賢否徑得出仕否則處以嶽祠坐縻廪祿爾而任子之法至此益弊夫既廣恩意之寬而復無較試之嚴所以為濫也熙寧中罷身言書判立銓試出身之法又繼祿恩例著免試之法或有陳乞之恩不惟不試於有司又不引對於便殿不到銓部徑得注官甚者處於嶽祠坐縻廪祿今日任子之法以言乎郊禋郊禋有蔭也以言乎致仕致仕有蔭也以言乎遺表遺表亦有蔭也所不存者誕節之恩其蔭不為不廣爾考試之法問其引對今已罷矣問其覆試今亦罷矣所存者銓試之制其試不為不優爾然為子弟者以富貴為可樂以豢養安逸為可適意而從仕之學未嘗過而問焉為父兄者一命與子終身為喜再命與孫沒齒無憾而過庭之訓未嘗及焉夫既命而銓既銓而爵此非拒其來也蓋所以勉其學而養其材也況一歲而一試非復三歲大比之久合五而取一非於千百之中而不可幾也問之以可據之律較之以童子所易能之目則待之之道誠寬而且厚也夫何不勉以從政之學不加以過庭之訓至挾策而趨場屋者或閣筆以相視貨賄公行至有執而從吏訊者甚而未踰乎強仕之年而甘從逺僻之役規避吏部之問而求領禱祠之職推原其故皆平時之無所教養訓裁也今日而能行乾道不經銓試不許入仕之令則門資者相率而為學來者不濫仕者不冗而祖宗舊典復見矣乾道二年臣僚乞指揮今後出官人先令吏部具曾與不曾銓試申尚書省然後取旨除授詔都謙亨差遣更不施行餘並依奏初將仕郎都謙亨差嶽廣既未曽銓試又補授未滿三年故有此請久任重黎羲和世掌天地書胤征注羲和自唐虞三代世職不絶國語楚語重黎世序天地典禮伯夷典樂后夔終始一人平水罔功隨即黜之可也而必遲之九載鯀古之人其重於久任蓋於此也夫子相魯初而謗之三月而誦之孔子攝相事其初人謗曰麛裘而鞞投之無戾鞞之麛裘投之無郵三月政成教行民誦之曰衮衣章甫實獲我所章甫衮衣惠我無私子産相鄭一年而謗之三年而誦之子産從政一年鄭人謗之曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産植之子産而死誰其嗣之方其謗而未誦也若驟去也雖聖賢無所施其技矣帝王寧不計慮此耶降及先漢猶有古意漢制惟邊吏三歲一更段會宗傳如淳注邊吏三歲一更而其他官以至倉庫之微初未嘗有終更之限也前王嘉疏文帝時吏居官者長子孫以官為氏倉氏庫氏皆其吏之後也其二千石長吏亦安官樂業莫有茍且之意夏侯嬰自高祖時為太僕至文帝不易其職本傳髙祖以嬰為太僕文帝立復為太僕揚雄為黃門郎歷三世不徙官本贊雄三世不徙官此其在內者然也有為京兆尹九年張敞有為刺史五年有為郡太守八年黃霸為潁川太守前後八年其在外職未嘗不久其任也王嘉謂文帝時吏居官或長子孫以官為氏其二千石長吏亦安官樂業莫有茍且之意上注此足以見漢之任吏不輕於易置也茍二千石治行課最則璽書褒寵增秩賜金循吏傳序亦未遽遷擢以重斯民去思之心至其屬吏則其太守察其廉汙而進退之故郡丞雖老聾或以其亷而不欲數易黃霸守潁川許丞老病聾督郵白欲逐之霸曰許丞亷吏耳頗重聽何傷且善助之或問其故霸曰數易長吏公私耗費甚多易新吏又未必賢徒相益為亂曹吏書佐選其可用者而罷斥諸病吏朱博傳博為琅琊太守新視事右曹掾吏皆移病卧博乃見諸曹吏書佐選可用者出教置之皆斥罷諸病吏亦安有具員而終任者哉東都以來數遷屢易是以朱浮左雄輩極言之光武時朱浮上疏曰間者守相數見換易疲勞道路云云順帝時左雄上疏曰吏數換易則下不安業久於其事則民服教化下至李唐猶及四歲然劉祥道盧懷謹猶病其速也髙宗時劉祥道疏曰今任官率四考罷官知秋滿懷去民知遷徙則茍且中宗時盧懷謹疏曰比州牧上任四嵗今或一二年即遷何暇宣風恤人哉其在當時有守桂陽十年者前注有守桂州二十八年者李襲志有治并州十六年闕及識吏民士俗未及諳已復去矣長編銓選成周選舉之法先之以司徒而終之以司馬唐人先之以禮部而終之以吏部司馬位居司徒之次而受其成者古之取人德行為本司徒考其德行而司馬授之政事故以司馬受終焉見唐禮若此類言之則唐之禮部乃居司徒之職而吏部實居司馬之任所謂司士以德詔爵以功詔祿以久奠食夏官司士云云則猶唐之考功郎之類是也官志吏部考功郎掌文武百官功過善惡之考法凡百司之長嵗較其屬功過差以九等流內之官敘以四善二十七最然而冢宰者初無與於其間豈非以此為有司之職而人主之大柄不應於始進之日而錙銖之耶漢至成帝而選曹之名立東漢官志成帝用士人復故當選署及奏下尚書曹文書衆事自漢之東權歸臺閣仲長統傳光武忿權臣之竊命雖置三公事歸臺閣而謂臺閣者乃尚書之職而選所自出也論者每以不任謂為倒置豈非選權益重既非昔比宰相又有不可虛拘者邪晉宋而下其任均矣徐羡之謂蔡廓曰黃散以下廓猶辭不受選通鑑宋景平元年詔蔡廓為吏部尚書廓謂傅亮曰選事若悉以見付不然不能拜也亮以語録尚書徐羡之羡之曰黃散以下悉以委蔡廓曰我不能為徐干木書紙尾遂不受則吏部之尤重也然自是宰相常總其大而吏部常任其小以至於唐有敕受有旨受敕受者宰相奏議而除拜之旨受者六品以下吏部銓材授職然後上言詔旨但書聞以從之而不可否者也通典選舉類開元中起居遺補及御史等官皆以旨授列於選舉四年乃敇員外郎御史并餘供奉官皆以敇授唐選舉志詔員外郎御史諸供奉官皆進名受敇不復在吏部矣然則吏部之權日以輕宰相之任日以繁而唐世吏部之職皆得以己意物論銓擇其才品而進退之非但據資授職而亦不可以取必於一定之制是以宰相吏部皆得行其權焉噫辨論官材司馬職也王制司馬辨論官材詔爵詔祿司士職也黃散以下悉委之選吏部職也諫員臺屬不由敇授開元以來吏部職也並本篇注以今準古吏部之職豈其輕哉國朝之初猶存舊制太祖不以資歷為拘而委吏部觀人量材甄别寶訓建隆元年詔曰惟彼銓衡止憑資歷慮有英俊陸沈下僚委吏部尚書觀其人才具名以聞常與量才甄别真宗不以判中循資而親閲功過狀為之升黜長編景德元年命有司一明太平興國中四等判格判中應循資而詔有司以歷任功過狀進也上親閲而升黜之是以當時有撾閽鼓訴吏部條前後矛盾者桑捐有受詔復視而言選調失於均平者太平興國六年魏羽令有司選調失於均平合責有司是國初銓選之際雖有定法而未嘗拘以法也由今觀之判銓之職尤為得人有薦選人並遷朝官為直館者冦準薦錢若水等有寒士不為人所知為陳其狀而升擢之者大中祥符五年陳堯咨判流內銓士有孤寒不為人知者堯咨為陳其狀而升擢之有三年不與父通問而廢歸田里者長編至和元年賈黯判流內銓有益州推官桑澤在蜀三年不與其父通問黯言之於朝澤坐廢歸田里有匿其私罪應舉及第而奪其勞考者同上晉州推官李亢有私罪黜自行去匿於得官以白衣應舉及第積十嵗當磨勘自首其事黯以為罔冒奏罷之奪其勞考其請擇主判官責成選事蘇紳之言也仁宗寶元元年蘇紳陳便宜六事五曰請擇主判官付以事權責成選事其請命判銓之官當以衡鑑自任者文彥博之言也哲宗元祐二年文彥博乞委吏部長二依三類之法定本選之人判銓之官當以衡鑑自任處之不疑是祖宗之銓選雖任法而猶任以人也私竊怪近世以來吏部牽於資格而不能任甄綜人物之權宿秩任歲月久近而敘遷差遣視名次髙下而占射格法既局所謂銓量人物者徒建空名而已是以前輩有言今賢才之伏於下者資格礙之也職業之廢於上者資格牽之也士之寡亷鮮恥者爭於資格也民之困於虐政暴令者資格之人衆也萬事之所以玩弊百吏之所以廢弛法制之所以頽壞而不救者皆資格之失也孫洙論資格之弊云云然則今之當銓衡之任者愚敢以不限資格為請經筵古者自上而下皆勸學之賢至後世有定職矣又其甚也闕而不置爾古者由內而外皆講學之地至後世有定所矣又其甚也罷而不設爾噫孰知國朝講官之外未嘗不親正人乎經筵之外未嘗不勤聖學乎此愚所以三咏三嘆也且古之盛時前師後傅左疑右丞可與講論乎曰未也保氏諫慝史官記過可與講論乎曰未也蓋宿衛環列無非吉士侍御僕從罔非正人朝夕從容不啻朋友師弟子之講習此則聖人講論之人噫師氏之職與同膳夫詩雲漢閹宦之賤得列小宰禮天官聖人之意微矣哉廣庭密勿大臣納誨可以講論乎曰未也虎門森嚴以媺詔王師氏可以講論乎曰未也蓋深宫幽隱之所無以異於廣庭議論之地宦官女子之側凜凜乎公卿百執之列所以薰陶涵養無往而不善此則聖人講論之地噫路門寢門皆屬儒臣內朝外朝統於冢宰聖人之慮逺矣哉此三代所以世有哲王也自宣帝甘露中始詔諸儒講五經於石渠經筵之所始乎此本紀甘露三年詔諸儒講五經同異太子太傅蕭望之等申奏其議上親稱制臨決焉立梁丘易夏侯尚書榖梁春秋厥後遂為常制是以東漢章帝嘗命諸儒於白虎觀講五經侍中淳于恭奏帝親稱制臨決如石渠故事後本紀建初四年詔曰中元元年詔五經章句頗多議欲減省至水平元年長水校尉樊鯈奏言先帝欲使諸儒共主經議云云於是下太常卿大夫博士議郎郎官及諸生諸儒會白虎觀講論五經使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決如孝宣甘露石渠故事作白虎議奏於是有定所矣夫石渠天子所以藏祕書寓於未央大殿之地俾羣儒出入禁庭講論經學非不善也然望之名儒出補外郡本傳石顯憸人弄權中庭本傳宣帝之講論果常如石渠乎自元宗選儒學之士入內侍讀馬懷素禇無量與焉侍讀之名始乎此逮開元十三年置集賢院有侍講學士有侍讀學士於是有常職矣唐百官志及通鑑唐開元三年上謂宰相曰朕每讀書有所疑滯無從質問可選儒學之士使入內侍讀九月戊寅以馬懷素禇無量更日侍讀唐開元十三年改置正修書院為集賢書院選耆儒日一人侍讀以質史籍疑義置集賢院侍講學士侍讀直學士夫以侍讀侍講皆天下文學經術之士俾之橫經帝幕紬繹古今非不善也然梨園之樂汨亂聰明寧王之笛轉移心術唐書本紀及禮樂志帝之講學果常如集賢書院乎噫傅以一齊歡以衆楚求其齊語必不可得一暴未幾十寒已至天下未有能生之物嗟夫講學且爾況不講乎勸學且爾況不勸乎故尚書朴學厭而不好漢歐陽生傳兒寬初見武帝語經上曰吾始以尚書為朴學不好博士倚席廢而不講後儒林傳序自安帝攬政薄於藝文博士倚席不講朋徒相視怠散噫駁乎無以議為也國朝以講學為治本以親賢為家法自太祖置講席太祖置講席於便殿命王昭素講易太宗開經幃太平興國始開經幃實國朝經筵之始景祐則講於崇政景祐中崇政殿置説書元祐則講於資善哲宗詔開講筵進讀寶訓講讀日赴資善以雙日講讀或命直禁中太宗命吕文仲為翰林侍讀寓直禁中以備顧問或直廬祕閣長編咸平二年真宗設直廬於祕閣侍讀更日侍講長上日給珍膳夜則送宿此講學之所也不特此爾聽政之餘探賾簡編真宗謂近臣曰朕聽政之外未嘗虛度時日探賾簡編素所耽玩長編視朝之暇講論經藝真宗寶訓上每視朝之暇即令講説嘗曰朕聽政之餘惟文史是樂講論經藝寧有倦耶云云非講筵乎宫中消日惟是觀書長編元祐七年王岩叟奏曰陛下宫中何以消日上曰並無所好惟是觀書居常禁中亦有日課紹興七年上曰朕喜春秋之學率二十四日讀一過居常禁中亦有日課非講筵乎是經筵之外無適而非學也國朝未置侍讀以著作佐郎吕文仲為之尋又為翰林侍讀實國朝講官之始國朝太宗太平興國八年始用著作佐郎吕文仲為侍讀尋又為翰林侍讀寓直禁中長編咸平始以楊徽之為翰林侍讀學士邢昺為翰林侍講學士真宗咸平二年以楊徽之夏侯驕吕文仲並為翰林侍讀學士邢昺為翰林侍講學士始建學士之職長編景祐始以賈昌朝為崇政殿説書景祐元年始以賈昌朝為崇政殿説書以楊安國為天章閣侍講景祐四年以賈昌朝王道宗馬希言楊安國並兼天章閣侍講預內殿起居天章閣置侍講始此長編有為翰林侍讀不帶學士者馮元有為侍講侍讀不加别名者會要馮宗元為侍講髙若訥為侍讀不加别名但供館而已有為侍講侍讀外使者景德四年以翰林侍講學士邢昺知曹州侍讀學士外使自昺始也天禧三年張知白為刑部侍郎充翰林學士知天雄軍府侍讀學士外使自知白始也續會要有著作佐郎兼侍講者元祐間范純仁乃以著作佐郎兼侍講司馬公後亦以著作佐郎兼此講讀之官也不特此爾臺丞未有與經筵者特與之慶厯二年召權御史中丞賈昌朝侍講邇英閣故事臺丞無在經筵者帝以昌朝長於講説特召之僕射罕預經筵者亦預之景祐元年詔右僕射賈昌朝赴講筵備顧問不講書帝以昌朝兼宰相又舊講官特命之非講官乎以太師而赴經筵元豐六年文彥博以太師致仕元祐初命平章事一月兩赴經筵以史官而侍經筵至和元年知制誥賈黯言乞令修起居注官入侍閣中侍臣講讀經史事有可書隨即紀録從之長編以處士而召經筵王昭素程伊川非講官乎是講讀之外無賢不講也當是時經筵無常所而燕處間暇皆經筵也講官無定員而名儒碩學皆講官也夫無往非學無賢不親則發聖賢之傳窮典籍之奧果何如哉是故以水喻政得之小旻慶厯五年講詩小旻曰如彼泉流旡淪胥以敗帝謂趙師民曰以水喻政有旨哉對曰水性順則通逆則壅喻用賢則王政通而世清用邪則王澤壅而世濁烹鮮喻治得之匪風慶厯五年講詩匪風曰誰能烹魚溉之釜鬵帝曰老子謂治國若烹小鮮義與此同此學詩也薄征緩刑荒政講之至和元年講周禮大荒大禮則薄征緩刑楊安國曰所謂緩刑者過誤之民當歲歉則赦之今持兵仗劫糧廪一切寬之恐不足以禁姦帝曰天下皆吾赤子也捕而殺之不亦甚乎修德承天視祲論之三年講周禮視祲上曰妖祥之興皆由人事君人者在修德以承天意此學禮也上承下施蓋取諸鼎皇祐三年講鼎卦上問九五之象施之人事如何楊安國曰鼎為烹飪成新之器上承至尊下又應初上承下施任重非據故足折而覆餗亂極生治蓋取諸萃孝宗講萃之上六日盛極則衰亂極則治易學明也説命三篇特誦三句淳化五年孫奭講尚書説命三篇至事不師古以克永世匪説攸聞上曰誠哉是言上意欲切厲輔臣因歎曰天以良弼賚商朕獨不得耶五子之歌再誦六句范祖禹家傳講尚書內作色荒外作禽荒甘酒嗜音峻宇雕牆有一于此未或不亡講畢再誦此六句却立云願陛下留聽哲宗首肯者再三書學深也論魯封疆景德四年上問王旦曰仲尼作春秋幾年成旦曰仲尼修春秋凡二百四十二年行事又問魯之封疆及始封之君旦曰伯禽宅曲阜地封六百里周公常在周故封伯禽於魯講鄭鑄刑仁宗御經筵命講左氏傳鄭人鑄刑書上曰使民知法而欲止辟不若不知而民自化也此明春秋而知之中庸修身天聖五年上令張知古講中庸至修身治人之道必使反覆陳之大學入德元祐五年右正言劉唐老言大學一篇論入德之序願乞詔經筵訓釋以備觀覽此講禮記而知之我國家所以為天地立心為生民立極為天下開太平者未有不源流於經也噫經學難明也馬上之治弗用詩書漢髙帝清淨之治專尚黃老孝文帝是不事乎經也是以讀書為糟粕也莊子通變之説竊而紛更武帝紀元光元年詔曰易曰通其變使民不倦朕嘉唐虞而樂商周又汲黯傳紛更約束復讎之語舉而窮黷胸奴傳武帝下詔曰昔襄公復九世之讐春秋大之是嵗太初四年也是自叛其經也是以詩書發冡也莊子故不事乎經者其罪小自叛其經者其罪大何者不事乎經雖無以利民亦不至禍民叛經者借先王之文逆先王之道其禍天下慘矣嗟夫聖人作經豈料禍天下哉正理之不明適用之不知所以至此也取需卦燕樂之説啓其君以宴遊慶厯二年林瑀撰周易天人會元記其説用天子即位年月日辰占所值卦以推吉凶瑀言上即位其卦直需其象曰雲上於天需君子以飲食燕樂臣願陛下頻出宴遊則合卦體上駭其言斥之借豐亨豫大之説諛其君以侈靡增釋蔡京用事借豐亨豫大之説開天下侈靡之心輔相皆寒儒而所處無異皇居所享爭僣玉食易果如是乎青苗弊法假周人出息之事以自文李當言王安石妄取經義傅會其説謂周人國事之財用取之於息錢不知泉府實授廛人之五布周禮所以使出息者不使其幸得而惰於業保甲苛令託先王民兵之論以自售熙寧三年行保甲法上論變義勇為民兵謂安石曰民兵雖善止是妨農事如何安石曰先王以農為兵因鄉遂寓軍旅今邊郵農人則無什伍不知戰守之法禮果如是乎湯誥勇智非以不殺論之則黷武者未必不竊之矣神宗御經筵吕公箸講天乃錫王勇智上曰何以獨言勇智公曰仲虺稱湯能伐夏救民故以智勇言之然聖人之勇當如易所謂聰明睿知神武而不殺者時上富於春秋故公以好勇黯武為戒王制柴望不以巡狩原之而封禪者皆假之矣范祖禹講王制曰古人多因燔柴望告之説乃附會為封禪皆秦漢之侈心非古者巡狩省方之義新臺一詩聖人所以垂訓也或者不知置而弗講是未知其所以詩慶厯五年先是講官不欲講新臺帝謂曽公亮曰為君之道善惡皆欲得聞況詩三百皆聖人所刪定義存勸戒也豈當有避春秋一經聖人所以垂訓也安石不知黜而不進是未知其所以春秋王安石以春秋為破碎之書於是經筵不講春秋噫聖經難明也安得講師三昧如范祖禹東坡謂范祖禹乃得講師三昧經學淵源如程伊川言行録俾之講論經筵哉古今源流至論續集卷九
