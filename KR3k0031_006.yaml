  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_006-1a, image: WYG0942/WYG0942-0079c.png}
body:
  text: 古今源流至論前集卷六宋林駉撰階官沿革圖本朝官階上係元豐制下係宋初制其政和大觀增改者别注在下又以祖宗舊官遷轉之法參附于後開府儀同三司使相祖宗以節度使中書令節度使侍中節度使平章事待勳賢故老久次宰相罷職隨其舊職如節度使出判大藩及召入未還相位而拜樞密者則加樞密使以易節度故通謂之使相正誤曰曹彬初以節度使為樞密使不罷旄鉞乃開寶九年二月事其年十月太宗即位二十七日加彬同平章事仍充樞密使即罷旄鉞此言以樞密事易節度即通謂使相蓋誤若謂樞密使加同平章事亦通謂之使相則可又不係召自大藩未還相位而為樞密使雖使中書叙位亦在同中書門下平章事之下逮改官制一用開府儀同三司换之時祖宗意以文潞公彥博任使相侍中曹郡王佾任使相中書令皆换開府為减恩數於是拜潞公太尉自司徒進位也佾進封濟陽郡王特進左右僕射左右僕射為宰相官樞密參政止於六尚書若宰相官係吏部尚書即遷左僕射係兵部尚書即遷右僕射乃用特進换之時王安石獨改特進至政和後薛昻𢃄觀文學士任特進白時中以門下侍郎𢃄特進皆失舊制繼詔並改金紫光祿大夫今後非宰相不除右二等為宰執金紫光祿大夫吏部尚書元豐獨换吏部尚書者蓋故事宰相初美罷不拘見𢃄六部侍郎或左右丞五尚書皆超進吏部尚書故以金紫易之若宰相官𢃄吏部尚書者多拜使相出鎮若平遷即加左僕射銀青光祿大夫户部刑部禮部工部兵部書五尚時宰相王圭任禮部侍郎平章事神宗以圭久不進官因改官制换寄祿乃遷銀青光祿大夫光祿大夫元祐銀青光祿大夫分左右大觀以左銀青光祿大夫為銀青光祿大夫右銀青光祿大夫為光祿大夫光祿大夫左右丞宣奉大夫正奉大夫元祐有左光祿大夫右光祿大夫大觀改左光祿大夫為宣奉大夫右光祿大夫為正奉大夫今所謂光祿大夫乃右銀青光祿大夫也正議大夫吏部工部户部禮部兵部郎刑部六侍以正議大夫换六侍郎併作一等時論以宰執貪進官作此蓋故事丞郎作四轉今乃改作兩轉耳通奉大夫元祐正議大夫分左右大觀以左正議大夫為正議大夫右正議大夫為通奉大夫通議大夫給事中中書舍人太中大夫左右諫議大夫神宗以寄祿官等級减少遂以太中大夫為宰相官故蔡確時任右諫議大夫參知政事先换太中大夫及拜相則依前太中大夫守尚書右僕射兼中書侍郎遂為定制右宰執所轉官自通議以上無磨勘法自金紫光祿至太中為侍從以上加爵元豐中自太中大夫至金紫止六階昔之尚書今為一官昔之六部侍郎今為一官是十官併為兩官矣左右丞左右諌議亦併四官為兩官其後增置通奉正奉宣奉大夫三階自太中以上惟宰執侍從得遷中大夫祕書監殿中監元豐三年偶闕任殿中監者故只著祕書監神宗以太中大夫為宰相官故初除執政只授中大夫時翰林學士蒲宗孟王安禮為左右丞二公寄祿官皆未至大夫只除中大夫守之中奉大夫元祐中散大夫分左右大觀以左中散為中奉大夫右中散為中散大夫中散大夫光祿卿少府監故事有出身人自太常少卿轉光祿卿無出身人自衛尉少卿轉將作監次轉衛尉卿自衛尉卿遷殿中監無出身人减一轉為優朝議大夫太常卿光祿四少衛尉司司農左右郎中奉直大夫元祐朝議大夫分左右大觀以左朝議大夫為朝議大夫以右朝議大夫為奉直大夫奉直朝議中散中奉中大夫五等為卿監以上加食邑少卿監等級最多一换之則清濁莫分舊制應兩制侍從官至左右司郎中當遷者左司轉左諌議右司轉右諫議其太常少卿若自吏部兵部司封郎中轉到者遇特㫖轉行亦遷右諌議大夫以别歷任清要則是朝議轉太中也崇寧已前從官自朝議直轉中大夫乃用元豐故事以中大夫為執政官可比舊制太中大夫自增中奉大夫遂細轉乃由當時執政不知典故爾至庶僚職方郎中轉光祿少卿駕部郎中轉司農少卿次轉衛尉少卿皆為朝議其太常少卿年勞叙遷及光祿少卿皆轉光祿卿若衛尉少卿只轉少府監或將作監次遷衛尉卿則是有出身者三遷至祕書監無出身者五遷至殿中監皆中大夫也今增置奉直中奉而有出身人不遷中奉奉直猶舊制也朝請大夫吏部考功兵部駕部司封郎職方之司勳郎中庫部中謂前行昔之吏兵司封三曹若翰林學士任即遷中書舍人自舍人遷禮部侍郎視他官遷五等蓋祖宗優詞臣如此侍從官任即遷左右司郎中次遷左右諫議館職以上任即遷太常少卿再遷光祿卿若任太常少卿除侍從官徑遷諫議大夫兩制到此不轉卿監超轉諫議止候朝議有闕方補朝議以七十貟為額朝散大夫户部司門刑部郎度支比部中都官中金部中倉部謂之行郎朝奉大夫禮部屯田工部郎主客水部中膳部後行郎中謂之昔之吏户禮三曹惟除郎中不除貟外蓋侍從方遷此官仍隔一資超轉朝奉朝散朝請三大夫為正郎故事右名曹兵刑工三部及司封司勳度支金部祠部主客雖轉正郎亦不呼郎中只稱其曹名以辨其常調也自改大夫更無别異自古大夫猶今之執政侍從也書所謂日宣三德者是焉曲禮曰四郊多壘卿大夫之辱也由此觀之豈宜换授庶僚耶在漢晉間只有光祿太中中散大夫為侍從官當論思獻納之任至隋唐增名作階已非所宜今乃易少卿監郎中是轉名器也朝請郎兵部貟司封庫部外郎駕部前司勳外職方謂之行貟郎朝散郎起居舍人部度支金侍御史部貟外刑部司門比都官後謂之行貟外郎右三等為貟郎侍御史不與中行貟外郎等殿中侍御史不與後行貟外郎等故自監察御史遷殿中侍御史殿中遷侍御史此以特㫖遷此三等階未免混淆祖宗愛惜名器不以假人凡士之有德有才者有政事文學者隨其所長用之命其官以别之故狀元登第者初命官以將作監丞兩遷左司諌次轉起居舍人兵部貟外郎多官未及此以擢知制誥若左右司諫𢃄待制以上職遷吏部貟外郎起居舍人𢃄待制以上職遷禮部郎中次轉吏部郎中次轉右諫議大夫若三人及第及制科歷一任回即除館職并任官職人官自太常博士遂遷祠部度支司封貟外郎若因任轉運副使以上即自祠部轉刑部度支遷兵部貟外郎司封轉工部郎中凡進士出身人自太常博士遂遷屯田都官職方貟外郎若任省府推判官提㸃刑獄或館職即遷祠部度支司封貟外郎若官已係屯田即遷度支都官即遷司封貟外郎職方即轉祠部郎中凡待世賞自國子博士轉虞部比部駕部貟外郎若曾任省府推判官提㸃刑獄以上即轉主客金部司勳貟外郎若官已係虞部即遷金部比部即遷司勳駕部即遷主客郎中凡雜流出身自國子博士轉水部司門庫部貟外郎若擢省府推判官提㸃刑獄即自水部遷倉部司門遷考功庫部遷膳部郎中此等遷改絶稀但多因避家諱第降一等改至此曹若任兩制侍從轉官即自後行貟外郎便遷吏部次遷戶部郎中次遷左司郎中其中行貟外郎合轉禮部郎中次遷吏部郎中其前行貟外郎同後行再遷之格右六部分二十四司吏户禮三部任侍從官方除此及司封度支祠部為左名曹任館職人方遷此兵刑工三部館職任轉運副使以上方遷此及職方都官屯田為右名曹有出身人方遷此司勳金部主客䕃補擢用者方遷此及考功倉庫膳部為左曹雜流擢省府推判官提㸃刑獄者方遷此駕部比部虞部䕃補方遷此及庫部司門水部為右曹雜流遷此叙遷品秩尤嚴今以二十四司併為三階宜失之太簡也承議郎舊左右正言太常博士監察御史國子博士奉議郎太常丞祕書丞殿中丞著作郎通直郎太子中允中舍左右贊善大夫洗馬舊制初除知制誥及待制而官未至貟外郎者即除右正言惟狀元未擢外制當叙遷者即自著作郎亦轉右正言熙寧三年許將以磨勘當遷宰相王安石方欲抑三人進取遂特與太常博士初下筆方成大字堂候官以手約筆具陳祖宗舊制當遷右正言安石乃改大字就作右字因知前輩堂吏猶能執祖宗之法若有出身人皆遷太常博士餘人皆轉國子博士易階官後清濁無别矣昔之正言監察御史著作郎皆特㫖遷不與太常博士國子博士及三丞等舊制前名自太子中允遷太常丞著作佐郎遷祕書丞大理丞遷殿中丞狀元初命將作監丞首遷著作郎凡無出身者自太子贊善中舍洗馬皆遷殿中丞以上兩等皆號大朝官舊制凡初擢用京官選人為經筵官及臺諫皆除太子中允若擢轉運判官則前名除中允無出身人除贊善中舍其叙遷官則還其嵗月以表其借朝臣而奉使也若無出身人自大理寺丞叙遷中舍宰執奏補者轉贊善雜科轉洗馬蓋有以别之自改官後初拜待制以上而官未升朝官並改通直郎仍效舊制𢃄除正官爾以上太子官屬號小朝官右三等階官及以上外郎郎中加勳自武衛至上柱國宣德郎著作佐郎大理寺丞今為宣教郎凡前名自光祿寺丞轉官選人改官皆遷佐郎大理評事轉大理寺丞餘人光祿衛尉寺丞轉官選人改官皆遷大理寺丞宣義郎光祿寺丞衛尉寺丞將作監丞凡前名自太祝奉禮轉官選人改次等官皆遷光祿寺丞餘人大理評事自太祝轉者遷光祿寺丞奉禮轉及選人改等官皆遷衛尉寺丞承事郎大理評事凡前名校書郎正字監主簿皆轉評事昔第一甲三人登科命官如之熙寧末狀元方除評事餘人太祝奉禮遷官皆轉大理評事宰相任子亦如之正誤曰狀元授大理評事自嘉祐四年劉輝始前此狀元並授監丞第二三人授大理評事熙寧三年葉祖洽授大理評事上官均陸佃授兩使職官張中程堯佐為初等職承奉郎太常寺太祝奉禮郎凡執政官任子授太祝其用宰執恩澤轉官皆遷太祝其用從官恩澤轉者遷奉禮承務郎祕書省校書郎正字亦將作監簿凡任子前宰執授校書郎諸曹侍郎樞密直學士以上授正字諫議大夫待制以上授將作監簿舊制校書正字有俸同太祝奉禮郎格至改階官一例無俸祖宗故事進士第一人初命官以將作監丞遷著作郎遷左右正言遷右司諌遷起居舍人自將作監丞至起居舍人五官惟進士第一人乃特㫖得遷自起居舍人即遷兵部外郎次遷工部郎中若以起居舍人知制誥即遷禮部郎中超遷一官自是以上率超一官以遷祖宗於進士第一人所以優待如此右五等階號京官自京官而上四年一轉無出身人逐資有出身人超資至奉議並逐資至朝議大夫有止法內奉直中散大夫有出身人不轉祖宗朝官制其甄别流品至嚴一官凡數等宰執侍從之遷為一等卿列館職之遷為一等出身為一等䕃補為一等雜流為一等崇寧七階承直郎三京府判官觀察判官留守判官節度判官儒林郎節度掌書記觀察支傳文林郎防團判官官節度推京府判官軍監留守為兩使觀察以上職官從事郎防團推官初等監推官以上為號職官從政郎録事參軍仕郎縣令改從政號令録崇寧號通政和郎修職郎録事縣令仕郎試御知縣知録事崇寧號登政和改修職郎迪功郎司理號司法郎司户改簿尉郎號判司簿尉崇寧將仕政和迪功右號選人階官始末漢置光祿大夫因秦郎中令有中大夫之貟則光祿大夫之名蓋始於此漢百官表上秦郎中令屬有中大夫武帝太初元年更名中大夫為光祿大夫金紫則置於魏也銀青則置於晉也唐六典觀晉有加金章紫綬者則謂金紫光祿大夫又晉有銀青光祿大夫隋置散官取秦大夫掌議論之義則正議通議之名蓋始於此秦郎中令有太中大夫中大夫諫大夫掌議論皆無貟多至數十人又隋因置正議通議太中大夫中大夫則置於秦也見于上中散大夫則置於漢末也王莽置中散大夫朝議大夫雖隋置之亦因漢大夫以上得奉朝議之意朝請大夫雖隋置之亦因漢將軍公卿以特進奉朝請之意並通典至朝散則隋置之唐因之耳宣奉至朝奉六階則元豐未有大觀創之耳宣奉正奉通奉中奉奉直朝奉凡六階置大觀此大夫之階始末也隋置朝請朝散郎之官元豐置朝奉之官隋文置奉議之官又隋採晉宋以來諸官皆有通直郎以官高下而通為宿直故始為通直之稱至唐取梁宣議將軍而易隋遊騎尉之散官故始有宣議之名承奉承直則隋創之隋煬帝故事唐因之國朝避諱改為承事承奉隋文帝置之承務則唐置之唐置因隋尚書二十四司承務之名崇寧七階初已定其四承直文林儒林從事而三者之名則更於政和迪功修職從政此郎之階始末也蓋國初庶官只存空名元豐新制以階易官然昔之雖存空名而流品甄别官秩難進則人人有安分之念今之易為階官而流品混淆官職易高則易有所希覬而不自重矣舊平章遷侍中侍中遷中書令中書遷尚書令國朝未有至中書令者今以一儀同三司該之是宰相纍遷之官一遷即為之矣奏議畢仲遊言舊平章遷中書令國朝未有遷至中書令而今儀同三司一階兼宰相纍遷之官舊禮部尚書遷户部户部遷吏部工部遷刑部刑部遷兵部而今銀青光祿大夫一班兼尚書纍遷之官舊制禮部侍郎遷户部戶部遷吏部工部遷刑部刑部遷兵部而今正議大夫一階兼侍郎纍遷之官昔之階秩難於進今之階秩易於高舊六部尚書侍從則自禮而户自户而吏常調則自工而刑自刑而兵今以一銀青光祿該之是十二年之官八年俱歷之矣此畢仲遊之深有慨於階秩易高之弊也見上舊制六曹侍郎之任禮部遷户部户部遷吏部則待侍從臣僚工部遷刑部刑部遷兵部則待常調臣僚其區别嚴矣今例以正議大夫可乎舊制前行郎中之任遷太常少卿則待進士遷司農衛尉少卿由司農衛尉少卿入光祿少卿則待世賞其區别嚴矣今槩以朝議大夫可乎此丁隲深論流品相混之弊也長編丁隲言正議大夫舊六部侍郎是也官制未行以前侍從臣僚自禮部遷户部户部遷吏部常調臣僚自工部遷刑部刑部遷兵部三遷凡十二年今自通議大夫一遷即為正議大夫前行郎中考滿當遷進士則遷太常少卿今朝議大夫也非進士出身則遷司農少卿或衛尉少卿由司農衛尉少卿入光祿少卿然後轉少府監如此二遷凡十二年今自朝議大夫二遷為中散大夫雖然官秩易高流品相混固不免或者之譏而正名責實各舉職任亦官制既更之驗也况夫一黜一陟有合舊制亦不可謂無得於祖宗之意且自朝議大夫直遷太中大夫此元豐制也非舊日兩制以上不遷卿監之遺乎官至朝請大夫而止待朝議有闕則補此元豐制也非舊日以少卿監七十貟為額之遺乎見上此其選用之公升進之難亦何慊哉若夫循國初之舊意釐元豐之新制又不能無望於今日兩府國朝兩府之職其周之冢宰司馬歟漢之丞相太尉歟然周以冡宰統司馬故兵民有相通之意漢太尉重於丞相而武職往往偏失焉觀此則國朝之或分或合其得失有不難知者且冡宰司馬周之六卿其職適相等耳然調發之權不歸之司馬而歸之天官豈固畀以職而復奪其權耶蓋兵為重事身為大臣邈不相通則國事睽矣故呂伋掌兵若無與於太保而太保實俾之程伯出師若無與於尹氏而尹氏實命之夫以掌兵出師之事一屬大臣則脉絡貫通又安有疑二之意哉丞相太尉漢之三公其職亦相維耳然漢承秦舊官制益紊文不足以勝武兵有以異乎政事權偏重無以為統御防間之道其事不可勝弔矣故諸呂兆禍勢亦亟矣丞相平至以五百金交歡太尉勃而左袒之功僅濟擁昭立宣事亦重矣丞相敞至不敢發一語而大將軍以國家之權自任並本傳夫以丞相之重而下聽命於掌兵之將况望其能振職哉愚嘗推兩府之分合矣且中書主民密院主兵其事相埒也中書降麻密院降宣其權相等也將分任其事之為當耶則軍國大務不當専委未免如富鄭公之議康定元年知諫院富弼又言邉事係國安危不當専委樞密院而宰相不與乞如國初令宰相兼樞使抑併其職為中書耶則兵柄相維有關大體又非所以知祖宗建樞之意㑹要元豐改官制議者欲廢密院歸兵部神宗曰祖宗不以兵柄歸有司互相維制不從嗚呼分其事固非也併其職尤非也必於分之中而有合之理存於判然不相為謀之際而實有相貫通者寓然後可與論設官之深㫖歟蓋自范質王溥免相之後而二府之事權裂矣國初建隆間范質王溥趙普皆兼樞密使後罷獲繼遷母之議非細事也密院知之而中書初未知之太宗朝獲李繼遷母時與密院寇凖議欲斬之中書呂端初未知其議遂詣凖因語欲斬繼遷母端曰某為中書豈容不與其議因奏繼遷母不當斬恐絶繼遷必致侮遂從之興兵薊門之役非末故也密院謀之而中書不預聞之雍熙上有意北伐曹彬等為敵所躡我師大敗趙普手疏極諫初議興兵上獨與樞密院計取中書不預聞此田公錫抗言密院公事宰相不得預聞中書政事樞密不得預議不能無憾於咸平之時也咸平初田錫抗言密院公事宰相不得預聞中書政事樞密不得預議致兵謀不精國事未善逮夫景德間真宗每得邉奏必送中書於是有共參利害之意澶淵百萬之師寇公親扶日轂尺箠笞之而北敵幾無隻輪匹馬之返此非景德相通之驗歟景德元年上每得邉奏必先送中書謂畢士安寇凖曰軍旅之事雖屬樞密院然中書總文武大政號令所從出向者李沆或有所見往往制其機宜卿等當閲邉奏共參利害勿以事干樞密院而有所隱也後契丹犯澶淵中書寇公力决親征之議遂射中其帥狼狽以歸自寇公免相之後而二府之事權又裂矣戎酋之降非末節也而中書初不預知時大將劉平敗議制鄉兵不决知陟之敗陳執中同判院張觀並罷張士遜言軍旅之事樞密當任其責戎酋吹同乞陟自角厮羅界來降詔補三班奉職羈置湖南富弼言當厚賞以勸來者上命以所言送中書而宰相初不知元昊之叛非小警也而邉奏皆不關中書此丁度力言二府分政若措置乖異則天下無適從不能無激於康定之初也康定元年詔樞密院自今邉事並與宰相張士遜章得象參議之即不須檢國朝舊例以中書制民樞密主兵故元昊反邉奏皆不關中書翰林學士丁度嘗建言古之號令必出於一今二府分兵民之政若措置乖異則天下無適從非國體也逮夫慶歷間仁宗因張方平之議於是宰相有兼樞之職西邉陸梁之賊呂章二公分命名帥戮力平之而卒致骨寒膽破之謡此非慶厯兼領之效歟慶歷二年七月右僕射兼門下侍郎平章事呂夷簡判樞密院户部侍郎平章事章得象兼樞密使樞密晏殊同平章事初富弼建議宰相兼樞密使上曰軍國之務當悉歸中書樞密非古官然未欲遽廢故止令中書同議樞密院事後張方平請廢樞密院上乃追用弼議特降制命夷簡判院事而得象兼使殊加同平章事為使如故又范仲淹韓琦為陜西帥西邉謡軍中有一韓西賊聞之心骨寒軍中有一范西賊聞之驚破膽自賈昌朝陳執中免相之後而二府之事權又益裂矣慶厯二年呂夷簡章得象并兼樞密院三年夷簡致仕晏殊兼樞使四年殊免杜衍同平章事兼樞密使五年衍得象免賈昌朝陳執中並以同平章事兼樞密使七年昌朝免執中本官以不兼樞密使自後並不兼趙明與西人戰密院賞功而中書降約束郭逵修堡柵密院方詰責而中書已降褒詔此滕達道深嘆熙寧戰守異議之非也熙寧初滕達道言中書密院議邉事多不合趙明與西人戰中書賞功而樞院降約束郭逵修堡柵樞密方詰責之而中書已下褒詔夫中書欲戰而密院欲守何以令天下逮夫元豐詔大事三省與密院同議矣元豐官制行詔釐其事之小大大事三省與樞密院同議進呈畫㫖三省官皆簽書以付密院小事樞密獨取㫖訖關三省遂為定制元祐詔除授諫官三省密院同進呈矣哲宗元豐八年呂公著言然是時邉事利害尤未甚相通者至建炎間高宗乃以宰臣張浚兼樞密而趙鼎亦以左僕射兼之是時也國步尚艱敵勢方張剗亂而治支危而安再植巍巍中天之業者皆左扶右持之力此非建炎兼領之功歟中興本末紹興七年宰臣張浚兼樞密使趙鼎秦檜亦以左僕射兼三十六年詔曰比緣軍興令宰相兼樞使今邉事已定可體故事不兼噫自國初以至中興其分其合不知其幾大抵合之則文武相通分之則兵政異情咸平景德康定慶歷熙寧建炎之得失可知也可不審哉雖然主民而知兵此固關天下之大計密院而不預中書亦非大臣相維之意是故樞使而同平章事君子以為慶歷之善謀見上密司不與三省之差除議者為元符惜之此愚於終篇而詳及焉元豐間曾布時為樞密欲預三省差除事不允九卿論漢之九卿當究其權之輕重論唐之九卿當究其職之煩省嘗按東漢百官志謂之九卿者奉常一也光祿二也衛尉三也太僕四也鴻臚五也少府司農宗正廷尉合而九焉夫漢唐之九寺即周之六官也然周有上下相維之制而漢有事權偏重之失周有職任無曠之實而唐有貟數過繁之弊此其故何哉愚嘗究其源流矣觀周之建官也百官聽命於六卿而六卿聽命於太宰故出納之要職宿衛之親人供奉之近習凡周之人布滿於王朝者若不可得而一而不知實以冡宰統之則其權未始不一也周禮天官司徒以旗致萬民宗伯以軍禮同邦國司馬大合兵以從司寇凡周人兵民之權若不出於一而不知實以三公兼之則其權未始不一也此上下相維之制然爾周禮彼漢之九卿吾惑焉景帝眷顧朝錯而內史得侵宰相申屠嘉之權朝錯𫝊武帝屬意𢎞羊兒寬而九卿敢奪石慶之職石慶傳是時也九卿更進用事天下之務不關决於丞相同上禮事屬太常兵事既屬光祿勳又屬中尉刑典盡屬廷尉邦賦既屬司農又屬少府至使外庭之權丞相皆不與聞焉此漢事權偏重之由也漢百官表上又觀周之建官也或以公兼宗伯司寇或以公兼司馬司空是公得兼卿職也周公以公兼冢宰召公以公兼宗伯蘇公以三公兼司寇畢公毛公以三公兼司馬司空或以卿兼鄉大夫或以卿兼軍將是卿得兼有司也周禮一鄉則卿一人又考凡軍將皆命卿此周人職任無曠之實然爾彼唐之九卿吾憾焉既有六尚書合周官之數又有九卿寺同漢官之名杜佑言其繁之弊則曰官名職務遷易不同空存虛稱皆無事實故有二臯陶二垂二契二伯夷二伯益四伯冏之說本傳陸長源言其曠之弊則曰光祿不供酒衛尉不供幕官曹虛設祿俸枉請陸長源上疏曰兵部無戎帳户部無版圗虞水不管山川金倉不司錢榖光祿不供酒衛尉不供幕祕書不校勘著作不修撰官曹虛設祿俸枉請是時也其任分則其數必繁其數繁則其事必曠太農少府復分於戶部太常宗正復散於禮部儀仗一事也既掌於衛尉又掌於庫部飲膳一事也既任於光祿又任於膳部其餘三寺亦多分散唐百官志此唐職任過繁之由也循漢唐之名得成周之實不失於偏重不失於過冗幸有國朝之制焉國初省部寺監皆為空名九卿之職併省不齊且太常則易為判禮院之名㑹要國初太常寺皆以禁林之長主判而禮院自有判院同判院天禧末罷知院天聖中有禮儀院而寺與禮儀舊不相關康定九年置判寺同判寺兼禮儀寺宗正則僅有判寺之名續㑹要國朝宗正寺判寺事一人以宗姓兩制以上充闕時則朝官已上知承事掌奉宗廟諸陵薦享之事司皇族之籍又元豐改制所掌與舊略同太僕則羣牧司是其職也大理則糾察在京刑獄是其職也鴻臚則其職歸客省四方館光祿司農則其職皆𨽻三司衛尉則其職分為金吾衛仗三衛皇城等司此國朝建置之始也察官制九寺則判太常寺禮院即卿之任也資輕者為知院同知院兼掌博士之職宗正有判寺一貟太僕職屬羣牧司有制置使一貟以樞密及學士領之有判院一貟大理則糾察在京刑獄是其職也鴻臚歸客省四方館光祿司農太府其職皆𨽻三司衛尉無所𨽻屬其職分為金吾衛仗司其環衛之任分𨽻三衛皇城司矣故此五寺别無置司并主判官逮元豐詳定官制法唐六典其九寺各有卿有少卿有丞簿惟太常復置博士太祝奉禮協律之官大理復置寺正評事司直之官同上元豐定制九寺各有卿少卿寺簿而太常復置博士太祝奉禮協律郎大理則置寺正評事司直其名正矣其職定矣然既有六部又有四監既有四監又有九寺是不免有十羊九牧之煩此寺監之職可歸六曹之論所以拳拳於劉公安世也元祐劉安世上言陛下量事簡劇以定貟之多寡六曹所減凡十九貟而官無廢事者處之得其理也今太僕鴻臚光祿太府各二卿丞簿官屬仍不預焉前日省官之詔遂為空文欲望寺監之職可以歸之六曹者宜盡省之庶幾官得其人經費易給中興以來遂議併省衛尉併兵部太僕併駕部光祿鴻臚併禮部所存者僅五寺耳官無虛設事無散任此所以為萬世一定之法歟中興㑹要中興以來併省冗職除太常寺大理寺不罷外宗正以太常兼而衛尉併兵部太僕併駕部太府司農併户部光祿勳鴻臚併禮部紹興復置宗正太府司農餘並廢雖然論虞九官之制不若論䕫典樂夷秩宗之為盛論周六卿之典不若論召公宗伯蘇公司寇之為美吾觀我朝其任太常也范景仁為判寺力辨濮園之議凜凜然有生氣治平中范景仁判太常寺時濮園之議或以親說上景仁力辨非是賈黃中除禮院詳定損益之禮後世皆取法焉實録賈黃中判太常禮院多識故實每詳定典禮損益得中咸善之治平中修禮書百卷名曰太常因革禮初歐陽公同判太常寺奏請其任宗正也元弼定教親之式俾公子皆有振振麟趾之風治平元年判大宗正寺元弼言詳定皇親讀書等賞罰規式詔依所定仲忽立糾親之法親賢懋功之閣巋然有光四朝國史仲忽𫝊仲忽者入判太宗正寺徽宗賜之甲第建親賢懋功之閣以示寵立宗同法式後人視為宗貫則知我朝卿寺之任果在此而不在彼微夫漢唐之官也其視我朝巨公碩望流芳後日者不亦恧乎臺諫昔我孝宗之諭御史也曰分𨽻六察可許詳奏至諭諫臣也曰欲其遺補不任糾劾乾道八年虞允文奏祖宗時監察御史未言事上曰今既分𨽻六察可許隨事詳奏事又淳熙十五年林栗奏諫議之臣往往分行御史之針規闕失寂無聞焉乞面加訓諭以遺補為名不任糾劾之職夫糾劾臺官之任也論諍諌垣之責也然臺臣得行論諍之事諌垣不任糾劾之舉祖宗之意何責已以周待人以恕也然則以臺諌分任其責其殆漢唐之制歟嘗觀漢百官表矣御史有中丞専掌糾劾諫大夫數十人俱掌議論漢百官表上御史兩丞皆曰中丞在殿中蘭臺掌圗籍祕書外督部刺史內領侍御史十五人受公卿奏事舉劾案章光祿勳屬官有大夫掌議論有太中大夫中大夫諫大夫多至數十人糾劾委御史議論委大夫是漢臺諫之分也是故蕭望之按延夀之驕恣嚴延年劾霍光之廢立皆以御史也前蕭望之為御史大夫按韓延夀驕恣嚴延年為侍御史劾霍光擅廢立劉向戒外戚之竊柄龔勝爭孫實之繫獄皆以大夫也劉向為光祿大夫力論外戚之橫獄又龔勝時為諌大夫爭孫實係掖庭其所以各守其職也甚嚴矣又觀唐陸長源之論矣諫臣須蹇蹇匪躬之士憲官須孜孜嫉妬之人匪躬故為諫臣嫉妬故為憲官是唐臺諫之分也本𫝊是故韋思謙之劾褚遂良溫造之奏李佑皆以御史也本𫝊杜拾遺之封事岑補闕之諫書皆以諫臣也杜甫為拾遺詩曰明朝有封事數問夜如何岑參為補闕詩曰聖明無闕事自覺諫書希其所以各專其事也甚明矣吾猶惜夫諌垣太拘言路太狹殆非廣君之聰明也大抵漢唐之任諫諍自諌臣之外皆無所與非諌臣而得與者往往以越職離局議之昔漢鄭昌訟蓋寬饒之書曰臣官以諌為名不敢不言夫官任諫諍然後得論則其他皆不敢言也固宜本𫝊唐魏謨之擢拾遺補闕未幾遷為起居舍人帝以論奏敕之謨則曰頃為諌臣故得有所陳今記言動不敢侵官夫拾遺補闕則諫起居舍人則不諫是無怪乎其曰侵官也本傳蓋嘗推原其由古者樂於聞善故彼此皆得以盡言後世諱於聞過雖諫臣亦不得行其職汲黯以中大夫而守東海蕭望之以諫官而補郡吏蓋諫官本以糾人主之過俾之出補守相不得出入禁闥則漢之諫官何益哉汲黯以中大夫守東海云云望之以丞相司直出守平原不樂上疏曰出諫官以補郡吏所謂憂末忘本元次公謂諫議冗者貧無以繼祿陽城為諫議大夫不屑言事唐之諫貟尤甚於漢也本𫝊噫諫官猶不敢言事况㙜臣乎况於百司庶府乎國朝之置臺諫猶漢唐也其任㙜諫實異漢唐也何者諫臣使之諫諍此其所以為盛歟且趙中令之開國勳舊而失色於雷中丞之一奏雷德驤為御史中丞奏趙中令普強市人第宅上怒叱之後其子鄰復訟其庇吏受賂上怒按問罷相韓魏公三朝元老不能不膽落於王中丞之一言王陶為御史中丞劾韓琦跋扈不押常朝班臺臣之得劾糾固也范司諫寧犯宰相之怒而不容默郭后之事明道二年郭皇后見踈呂夷簡以前罷相怨后范誨言后無子當廢夷簡贊其言先敇有司無得受章疏范仲淹同孔道輔數人詣垂拱殿門伏奏門者闔扉道輔叩銅鐶大呼乃逐仲淹等鄒正言寧觸人主之怒而不容已於孟后之舉四朝國史曾誕與右正言鄒浩善友孟后之廢誕三與浩書勸使力請后浩不報及浩以諌立劉后南遷誕著玉山主人對客問以譏之諫臣之得諫諍故也然濮園之議諫垣雖爭而三御史亦相繼罷去長編治平年詔議奉安濮安懿王典禮司馬光王圭范公相繼列之蔡確之貶諫垣雖論而御史府亦為之一空蔡確新州之貶㙜府相繼斥逐至為之一空新法之行不惟諫臣辨之而空㙜至與之論列新法事司馬公蘇軾諸公凡任㙜諫者皆以新法去國是故廢國家大計察官司細故呂公著既言六察之弊専察官司不與於言劉摯又言御史之偏則祖宗重於責己而善於待人者可見也元豐八年呂公著言御史天子耳目比年以來専舉六察故事廢國家利害之大計察官司簿領之細故乞罷按察只置言事御史而又劉摯言伏見諌官止有大夫一貟御史㙜自中丞下雖十貟然止於中丞侍御史得言事外監察御史六貟専察治官司公事文書而不與於言望以諫院增置諫官貟其本㙜六察御史並許言事乃詔監察御史兼言事殿中侍御史兼察事提舉常平之事舊領之常參官其後或𨽻於漕㙜或總於使臣而提舉常平之貟未定也至熙寧二年始置局焉國朝淳化中建常平倉皇祐元年令漕運司與長吏舉所部官専領之然猶𨽻漕臣至熙寧初遣使提領此蓋提舉常平所始也二年制置三司條例言河北陜西已差官提舉常平廣惠倉欲差胡朝宗張復侯叔獻曾宜等並為提舉茶鹽之事舊領之發運司其後或兼於憲㙜或總於知通而提舉常平之貟未定也至政和初元始置司馬國朝茶鹽之事舊𨽻發運司知元豐間或以轉運常平官兼提舉或以提刑兼領通提舉政和以後詔江淮荆湖六路共置茶鹽提舉一貟宣和二年詔河北京東路推行新法鈔鹽可添置提舉官一貟然常平罷於元祐而隨罷隨復元祐初司馬光言熙寧初執政以常平法不善將糴本作青苗錢請罷之二又紹聖九年復置建炎元年詔提舉常平歸提刑司年復詔提刑兼紹興二年復置四年罷委漕臣茶鹽罷於紹興既而或置或罷建炎四年詔逐路提刑司茶鹽司盡依舊分東西路紹興二年詔荆湖北路復置茶鹽司四年詔廣西茶鹽司官吏並罷其職事委漕臣逮至紹興之五年常平茶鹽併為一司而後提舉之職定矣噫茶鹽之利為公而取其官吏固不敢有侵移之患兼於他官無害也此君子不論亦可也常平之利為民而置一司錢榖往往有所滲漏専置提舉誠有便於民也此君子不論不可也請以熙寧元祐罷置常平之制而詳究之夫常平賑荒之善政也我朝置場於淳化之二年淳化京師大穰分遣使臣於四門置場增價以糴名曰常平以常平官領之嵗饑而减價以與貧民置倉於景德之三年景德三年始置常平倉每州擇清幹官主之専委司農總領三司無得移用無非求以便民然州縣移用聚糴不時每有災沴無所振發尚拳拳於慶歷廷臣之請此誠為政之害也慶歷四年范仲淹言常平倉司農寺管轄官小權輕提刑多不舉職盡被州縣將出常平倉錢本使用致不及時聚糴每有災沴無所振發徒有安撫之名初無救恤之實熙寧二年始罷置司與其漏巵於州縣之吏孰若兼總於一司與其沫鮒以候旬月之報孰若立賑於旦暮此其立法夫豈不善溫公言於哲宗曰向者因州缺常平本錢無力少糴又官吏雖欲趍時收糴而縣申州州申提刑提刑申司農比至關投動涉纍月已是失時然借唐虞之行以行盜跖之法范鎮言常平始於漢之盛時雖唐虞無以易也青苗亂世所為青苗在田賤估其值收斂未畢而必其償是盜跖之法也託夀昌之名以用桑孔之術見後豐年糴榖賤價償官周之荒政然乎否乎凶嵗伐桑易錢輸負漢之常平然乎否乎司馬公言將糴本作青苗錢出息二分置提舉官主之豐年則農夫糴榖十不得四五之價凶年則易牛賣肉伐桑賣薪以輸錢於官此元祐所以力罷而不恤也雖然寧以常平之故而復提舉不可以青苗之故而罷提舉蓋提舉非熙寧之失以常平為青苗者誠熙寧之失耳中興以來罷置利害講之熟矣常平本漢夀昌豈以安石而廢此高宗之諭其臣也紹興八年十一月李光請罷常平主管官上謂宰執曰常平法本漢景夀昌今豈可以安石而廢之其提舉官自可復置庶幾不至陷失一司錢榖常平法不宜廢青苗市易當罷此吕公頥浩之告其君也建炎二年七月言者請復常平官修補之法八月詔從之既又詔常平之法豈以多弊須以紹述為名雖公私不便當增損者亦不敢言今止為常平本法所係甚大非可他司兼領宜置提舉官十一月吕頥浩葉夢得言常平法不宜廢惟青苗市易當罷上曰青苗永無復行於是復提舉之官修常平之法自散自斂事權歸一無滲利也時出時入榖價不踴無歉嵗也至今便之誠萬世之良法噫熙寧之置提舉是登壟斷而罔利也元祐之罷提舉是因一噎而廢食也欲求便民之實惠其惟中興之法乎古今源流至論前集卷六
