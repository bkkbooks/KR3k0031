body:
  text: 古今源流至論續集卷二宋林駉撰兵權天下有二權兵權宜分不宜専政權宜専不宜分政權分則事無統兵權専則事必變此善計天下者所宜審處也三代而下兵權散主有司有扈之師六事咸在牧野之戰三卿同出書稱太保伸桓南宮毛俾齊侯呂伋以二干戈虎賁百人逆子釗而常武詩亦曰王命卿士南仲太祖太師皇父整我六師王謂尹氏命程伯休父左右陳行戒我師旅且太保相也非南宮之使不能専令兵師齊侯将也非太保之命不敢擅興禁旅夫以二兵百士而二三大臣參互職掌至於皇父整師尹氏播令程父出征則兵無専制将無専權大略可攷是以兵滿天下居然若無皆措置之謀審矣是意也漢人得之而無内變外叛之慮唐人失之而有宦官方鎮之禍自今觀之漢太尉本王命也然北軍雖矯入而南軍復不得入周勃欲入北軍不得入紀通尚符節乃令持節矯入内勃北軍復使人告南軍毋納呂産軍正次於将軍也然正不属於将軍将軍有罪以聞胡建𫝊天漢中建守軍正承時監軍御史為奸穿北軍壘垣以為賈區建斬之上奏曰臣謹按軍法正無属将軍将軍有罪以聞南北之軍雖有職掌復設䕶軍無専制也前表䕶軍都尉武帝元符四年属大司馬通典漢以除䕶軍都尉盡䕶諸将将軍之職因事而置事已輙罷無常守也若漢大将軍車騎将軍左右前後将軍有常職其他将軍因出征伐始置如驍衛如輕車如材官如鴈門如樓船皆事已復罷也故内無専兵之患漢兵大計皆在郡國内而宿衛皆取郡國外而征伐亦取郡國然都試之役太守都尉事也而縣之令長丞尉必欲俱會其相察至矣漢制每嵗八月會都試郡太守縣尉令長咸預以課殿最調兵之權郡守可専也而非虎符稽合不敢擅興其防微深矣文帝紀初與郡守為銅虎符應卲曰銅虎符第一至第五國家常發兵遣使者至郡合符符合乃聽受之是故都試而不詣試所者必免燕王旦𫝊将軍都郎羽林注師古曰都大也謂大會試漢光祿典令諸當試者不會試所免之都試而僭上者必誅韓延夀𫝊御史按延夀在東郡試騎士治飾兵車望之劾奏延夀上僭不道坐棄市齊哀王欲發兵非有虎符而遽止齊懐王傳齊哀王欲發兵誅諸呂太尉周勃及陳平曰王欲發兵非有漢虎符驗也膠西王卭因發兵無虎符而自殺吴王濞𫝊漢将弓高侯頺遺膠西王卭書曰云云王肉袒叩頭漢軍璧謁曰云云将軍曰王茍以誅晁錯為不善何不以聞及未有詔虎符擅發兵擊義國乃出詔書為王讀之曰王自圗之王遂自殺故外無擅兵之憂自唐府兵一壊禁衛大權盡歸中人魚朝恩専神䇿之兵代宗吐蕃之難魚朝恩以神䇿兵屯苑中劉國珍位太師之權宦者吐突承璀𫝊詔内常侍劉國珍馬朝宗分領易定幽滄等糧料使諫官李庸白居易等衆對延英謂古無中人位太師恐為四方笑承璀充諸軍招討之使白居易傳會王承宗叛帝詔吐突承璀率師出討居易述唐家制度每征伐専委将帥責成功比年始以中人為都監韓全義討淮西賈良國監之高崇文討蜀劉正亮監之自興天下兵未有以中人専綂領者神䇿既不置行營節度即承璀為制将又充諸軍招討處置使是實都統韓全義討淮賈良國監其軍高崇文討蜀劉正亮監其軍見上西頭之勢乃重南衙樞宻之權過於宰相高元裕𫝊敬宗視朝不時稍稍决事諌曰今西頭勢乃重南衙樞宻之權過宰相於是有宦官之變漢以都尉為太尉之副唐以司馬為刺史之副故楊綰謂刺史自有持節諸軍事以掌軍旅司馬右司武以副軍楊綰𫝊時諸州悉𢃄團練事綰奏刺史自有持節諸軍事以掌軍旅司馬右司武所以副軍郎今副使司兵參軍團練判官名號重復可罷團練守捉是都尉與州司馬同為州郡之貳而唐州司馬品秩乃在長吏之下自不得同於刺史而都督府有行軍司馬百官志行軍司馬掌戎右又但其属耳白居易為江州司馬壁記自稱郡佐然其言云自武徳以來郡守之職總於諸侯帥郡佐之職移於部從事然則豈復有漢都尉哉白居易江州司馬壁記曰自武徳以來庶官以便宜從事大攝小重攝輕郡守之職總於諸侯帥郡佐之職移於部從事故自立五大都督府至於上中下郡司馬之事盡去惟貟與俸在牧鎮本有兵權而又兼總其所𨽻州之兵權於是有方鎮之禍藝祖立極制兵立武具有本末聖算瞭然毫髪無隠三百年間絶無内外之警我太祖貽謀之善也收諸鎮之權而萃京師舉京師之兵而属殿岩内而宿衛外而禁廂百萬貔貅皆在掌握三衙之權若重耳然兵之尺籍雖在三衙兵之大權實在樞宻故三帥有握兵之重而無發兵之權樞宻有發兵之權而無握兵之重彼此相制㒺敢異志内安得而不固乎范祖禹言伏見樞宻副都承㫖曹誦權馬軍司祖宗兵法本於樞宻有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權彼此相維不得専制此所以百三十年無兵變也自唐季以及五代樞宻之權偏重動為國患由手握禁旅又得興發今副都承㫖為樞宻属官權任管軍是本兵之地又得握兵合而為一非祖宗制兵之意大郡有十數指揮中郡五七指揮小郡三五指揮平時除戎器備城隍脩武備得以便宜從事郡守之權若重耳然軍儲給餉属之運司統制軍馬貳之郡倅上有轉運以警其志下有倅貳以分其權上下相維㒺有偏失外安得而不壮乎蔡官志逐州置軍招營兵大郡有十數指揮中郡有五七指揮下郡不下三五指揮每指揮率以四五百人為額其軍儲餉給悉在運司其統制軍馬乃𨽻守倅一方有宼盗不虞州郡有兵有財足以聚人率衆屏翰王室平時除戎器備城隍講武備皆有其資也乃祖宗防州郡之深意然又論之内之兵權互有職掌此萬世不易之規故曹誦以樞属權管軍范祖禹力言之其守宗祖之法固矣見前注若外之兵權自熈寜大臣削之過甚籍郡兵併軍額置将副専領至使軍情離貳役使不行一有警急束手無䇿後日之患君子已預卜之盖其權過分故也蔡官典熈寧初安石言州郡持權太重分将籍州郡兵通一路團結五千人為一将置将副専領其後軍情離貳守臣驅使不行是失兵權也靖康中詔守臣統兵入衛遇敵輙潰流為群盗由守臣失權柄故也夫州郡兵權不可不分亦不可過分不分則縱過分則弱昔國初董遵誨李漢超之徒分守邉郡許令召募驍勇以為爪牙軍中諸事許從便宜二十年間無西北之憂盖郡守有兵權也國朝寳訓僭偽時未下南北末賔太祖留心将帥命李漢超屯闗南馬仁瑀守瀛州韓令坤鎮常山賀惟忠守易州何繼筠鎮𨽻州以拒北兵郭進控西山武守琪戍晉州李謙傳守隰州以禦太原趙賛屯延州姚内斌守䕫州以備西戎郡中管㩁之利悉令與之許令召募驍勇以為爪牙凡軍中事許從便宜由是二十年無西北之憂尚論内外制兵之權請以國初為龜鑑兵糧興師十萬日費千金千里餽糧士有饑色孫武云此廪兵國家之急務也然亦起於秦漢之後歟盖嘗論之成周賦藏於民素有委積故不聞廪兵之說漢唐初年民自為兵自給用度亦不聞廪兵之費至其後也或歛州郡歸京師而後給於邉境之用或漕東南以聚闗中而始給於諸道之兵故轉輸勞民緩急乏用而廩兵始為深患矣嗟夫田不井居兵與農異先王遺制不可復講有如我國家藏於州郡而無聚歛之私儲於邉塞而無乏用之急兵不言匱民不告勞豈非委積之意歟予觀成周太平一書半論理財經國大用具在九式至於軍旅獨無與焉禮天官太宰以九式均節財用祭祀賔客䘮祭羞服之事幣帛芻秣匪頒玩好始嘗疑之及考於遺人之職則曰飲食曰委積所以待軍旅者甚専禮地官遺人凡師役掌其道路之委積凡國之道十里有廬廬有飲食二十里有宿宿有路室路室有委五十里有市市有候舘候舘有積異日倉積於豳公劉詩糧峙於申崧高詩會蒐之備達於衛境左定四年取於相土之東都以會王之東蒐皆是物也以是知先王雖不明言以用武欲藏富於天下而其周思熟慮以為緩急之備則自都達境要有所属矣又豈必盡計之於纎悉而無遺用歟迨及春秋此意猶存是故齊師陳鄭申侯共糧左𫝊四年屈完及諸侯盟陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯見齊侯曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧扉屨其可也齊侯説與之虎牢晉軍楚地三日舘榖經夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績𫝊楚師敗績三日舘榖杜預注舘舍也食楚軍榖三日是知諸侯之國在在皆有焉有所謂飛芻輓粟者乎所謂賦藏於民不聞廪兵之說者此也自秦人致瀕海之粟悉漕京師伍被𫝊秦致瀕海之粟轉于南河刮逺方之藏皆儲敖倉酈食其𫝊敖倉天下轉輸久矣臣聞其下藏粟甚富楚人㧞滎陽不堅守敖倉一粒一粟惟恐在民而先王里候委積之制掃地矣漢自初年軍賦有二曰丁賦曰財賦丁賦則以丁年算賦也前高帝紀四年八月初為算賦如淳曰漢儀注民年十五以上至五十六出賦錢人百二十為一算為治庫兵車馬財賦則富者以貲而算貧者以衣服釜鬵而算也前景帝紀至於故吏嘗佩将軍都尉及二千石印者亦給軍賦則又不特取之於民矣恵帝紀故吏嘗佩将軍都尉将兵及佩二千石官印者惟給軍賦他無所與盖漢兵出於民費用自給故淮南之民繇役往來自補衣粧賈誼上䟽曰至今淮南地逺者或數千里越四諸侯而縣属於漢其吏民繇役往來長安道者自悉補中道衣錢用諸侯給也前漢吴楚之兵列侯從軍自貸子錢貨殖𫝊吴楚之兵起長安中列侯封君行從軍賫貸子家錢而其取於民者殆不過為庫兵車馬之資而已見上此其所以無坐食之蠧唐自盛時天下戸口八百餘萬而府丁四十萬皆自食其力不賦於民凡民之租調以奉上者二十分之十九其一為兵故縣官嵗受八百萬之賦並孫樵云盖唐兵出於民自耕自戰三時務農一時講武而士無闕食籍藏将府伍散田畝而兵無坐蠧並兵志此所以不聞饋糧之擾所謂兵出於民不見廪兵之費者此也夫何漢自武宣唐自肅代之後用兵連年轉輸不繼推原其故夫豈無自盖漢以郡國之所積盡輸大農而邉郡諸官之所請必皆報而後給漢百官志大司農卿一人本注曰掌諸錢榖金帛諸貨幣郡國四時上月旦見錢榖簿其逋未畢各具别之邉郡諸官請調度者皆為報發損益多寡取相給之故不復預藏於邉郡爾唐自通濟漕渠而甸農或至于挼穂而闗中不足給食貨志自河北諸鎮皆強租賦不領於度支而河内不足恃東萊文故僅以江淮為給爾夫粟不藏於邉郡而藏于京師不輸於諸道而輸於一隅則倉卒何所備緩急何所仰哉異時漢以西南夷之役負擔餽餉率十餘鍾致一石食貨志唐蒙司馬相如始開西南夷鑿山通道千餘里以縻巴蜀之民罷焉又通西南夷道作者數千萬負擔餽餉率十餘鍾致一石而戰士無禄同上武帝司農陳藏錢經用賦役既竭不足以奉戰士有司請令民得買爵贖罪塞卒乏糧霍去病傳其在塞外卒乏糧或不能自振古人有之乎否也唐以江淮之米不通六軍之士脫巾於道韓滉運米適至君臣之間置酒相慶食貨志徳宗時古人有之乎否也所謂由京師而給邉用漕東南以給諸道而廩兵始為大患者此也國初宿兵京師則浚三河以通漕輸張方平言行師敵國則置轉運以給糧餉正要增釋國初始除轉運使止因軍興専主糧餉至班師即停罷如太祖初平澤潞則命戸部侍郎高防兵部侍郎邉光範充北路轉運使用師湖南則命刑部判官滕旦充湖南給事中沈義倫充京西水陸轉運使是也太宗時如劉保勲為河東城西轉運使樂中為太原管内水陸轉運使王在田為陸路轉運使然亦不専仰於漕運也何者封樁内庫之儲以備軍湏編年太祖嘗顧左右曰軍興湏預為之備若臨事率歛非善計也國初天下貢賦盡入左藏庫乾徳初府庫充羡簞食壺漿之迎以給王師則宿兵行師之用非所慮爾自時厥後景徳澶淵之役事起倉卒寳元西師之興歴四五年皆不聞調度之患盖三司主之於内轉運職之於外此内復有内帑之儲今年出真珠以助糴邉儲寳元二年出内庫真珠估緡錢三十萬賜三司上諭曰此無用之物不若散之民間收其直助糴邉儲亦可以少紓民之歛也通鑑明年出綵帛以備軍賞同上皇祐二年出内庫絹五十萬下河北陜西河東路以備軍賞公私通融軍民俱利然而又不惟是轉運雖𨽻於三司而總一道之稅賦㩁酤茶塩坑冶之利則得以擅其裒多益寡之權或有軍興則轉運給之郡守雖統于轉運而合一州地利坊塲河渡支酬不盡之贏則得以聚人率衆屏翰王室保固郡境平時除戎器治城防脩武備則郡守皆可為之豈非藏於州郡而無聚歛之私乎蔡官志云自變法以來三司之權散於内轉運郡守之權輕於外一有警急束手無䇿後日之患君子已預卜之盖自中興以來駐蹕吴會控扼之地上下數千里列屯相望費用不貲其治糧餉職之主将主将不自給也湖北總領壁記主将取之漕司漕司吝於供億也然後請之於朝總領之官出焉張俊上言然未以名官也自收諸帥之兵目為御前分屯要害而後總領之官置焉紹興十一年取諸州之兵以為御前屯駐諸處皆置總領以朝臣為之鎮江諸軍錢糧淮東總領掌之建康池州諸軍錢糧淮西總領掌之江州荆南江南諸軍錢糧湖廣總領掌之興元州金州諸軍錢糧四川總領掌之中興會要鎮江諸軍錢糧淮東總領掌之金陵池州諸軍錢糧淮西總領掌之武昌荆南江南諸軍錢糧湖廣總領掌之興元州金州諸軍錢糧四川總領掌之同上四總之官既立上可以備邉境不虞之用下可以省老弱轉運之勞通融出入裁制盈虛其於軍用甚便豈非儲於邉塞而無乏用之急乎大抵國家用度多縻於兵西蜀湖廣江淮之賦類歸總司所供京師者惟仰閩浙而已見上近年以來不無滲漏之弊固未能盡知而曉然易見者試舉一二言之且沿江列屯有於臨事之始輙發緡錢十餘萬以為例名曰犒賞此弊於泛用一也江淮養兵有以規利者備供兵為名以錢商販凡累鉅萬號曰營運此弊於失䧟二也觧發之日例送北司諸帥私饋報以公帑此弊於私予三也議者請革其弊欲合總司之權而制之版曹然道里踰隔或慮乏興天下事勢又有所難合者然則為今之計莫若使戸部部長有以稽考之也盖今之任總司之職者每以大農少卿與夫金倉部郎官為之雖直司於外郡而係銜則必以中都官盖以名曰出使而實非任外之職夫果其非外職則雖外猶内也以金倉部而下又皆戸部之属則以長而察其属其權甚尊其勢甚順何患乎積弊之難攷不然不度緩急不審輕重而欲俾戸部部長而制總司之利則漢唐轉輸廩兵之弊可鍳也車戰出車彭彭旂旐央央此周人北伐之詩也方叔蒞止其車三千此周人南征之詩也夫用兵亦多術矣一則曰車二則曰車果何說耶盖用兵之道惟車有節至則歛兵附車以拒之退則乗勝出兵以撃之出則藉此為所歸之地入則以此為所居之宅誠良技也誠周人之所急也雖然亦嘗遡其所自來矣盖古者作車以行陸未始用之於戰自夏啓誓御以正而勝有扈湯以龍旂十乘以克有夏至于成周其法大備臨衝閑閑伐崇之舉也戎車三百牧野之戰也周宣之南征北伐皆用是制然先王之車戰不求大勝求為不可敗而已春秋諸侯節制不謹逐利於草莽之間始為徼利之兵自鄭荘公始多用徒兵自中行穆子始毁車以崇卒自右師展始乘馬自趙武靈王始用胡騎先王車制由是幾廢然春秋去古未逺其法未盡掃地倣其遺躅者亦往往以之取勝戎車孔愽遂克淮夷非魯僖乎泮水詩戎車孔愽徒御無斁既克淮夷孔淑不逆矜其車甲西戎就討非秦襄乎小戎詩備其兵甲以討西戎西戎方強而征伐不休國人則矜其車甲婦人能閔其君子焉大蒐于紅革車千乗左昭八年大蒐于紅自根牟至于商衛革車千乗治兵于邾甲車數千乗昭十三年治兵于邾南甲車四千乘遂合諸侯于平丘楚子之游闕且四十乘宣十一年使潘黨率㳺車四十乘宋華元之甲車猶不下四百六十乗宋華元甲車六百六十乘齊之會諸侯有兵車有乘車前郊祀志桓公曰寡人兵車之會三乗車之會五鄭之賂諸侯有廣車有軘車左襄十一年鄭人賂晉侯廣車軘車淳十五乗甲兵備此車制至春秋猶有存者秦漢而下亦間有之夏侯嬰以兵車而破李由本紀公孫賀以輕車而出雲中本傳馬燧以戰車而威北方唐馬燧𫝊為戰車冒以狻猊象列戰于後云云威振北方衛青之撃匃奴也以武剛車本𫝊青擊胡單于以精騎當之青以武剛車自環為營縱兵出擊單于遁去魏田豫之平代郡也以貟陣車魏田豫征代郡北虜以騎擊之豫以車為貟陣弓弩持滿於内胡不得進遂舎而去扁箱車用之足以擒頡利長編神宗朝取兩河民車以為戰備沈括曰云云李靖於扁箱車以擒頡利大車用之足以觧虜敵李陵傳陵之入胡卒與虜遇陵以大車為營引士於内千弩俱發虜觧去云云兩翼以進方軌徐行宋武以是削平僭亂本紀總召扁箱别為鹿角馬陵以是破羗戎本傳此皆用車之利也然有制敵之長技有制敵之竒謀長技手足也強弱之形係焉竒謀心術也成敗之機係焉是故草淺地堅可馳可突志書唐太宗李靖問對云云而江湖洳沮則不可也高宗紹興三年上曰近有獻車戰者朕謂在人不在車既江湖洳沮之地雖有車騎亦何用平原曠野可進可退前晁錯傳而川徑險阻則不可也同上彼徒我車鄭人有侵軼之慮此審勢之隘也左隠九年彼徒我車懼其侵軼我也毁車為行晉人有敗狄之功此察機之阨也昭元年晉中行穆子敗羣狄于太原魏舒曰彼徒我車所遇又阨以什共車必克請皆卒自我始乃毁車以為行敵人笑之未陣而薄之大敗之若夫車不得方軌之言不見用於成安君而泜水之戰隨敗前韓信𫝊趙成安君聚兵井陘李左車說曰井陘之道車不得方軌騎不得成列願假竒兵三萬人絶其後成安君儒者不用詐謀竒計信遂斬成安君泜水上車戰雜以馬牛一用於房琯而斜濤之兵莫支房琯𫝊此又不審地利之失然則用以長技濟以竒謀始為善兵矣國初用於西北制敵取勝車戰為利澶淵之戰李徳隆以大車環壘歩騎處中戎馬因是而遁去景徳初契丹入寇大将李徳隆以澶淵不足守命士卒掘壕塹以大車數千乗重壘環之歩騎處中戎馬數萬來攻其營禦之遁去陽城之勝符彦卿以拒馬為行寨虜騎因是而莫禦咸平四年吴叔請復古車戰之法曰衛青李陵田豫馬隆皆以車而勝近符彦卿破虜陽城亦拒馬為行寨夫匃奴所長者騎兵也茍非連兵以制之則何以禦其奔突哉故用車戰為便其制取當用者接其衡軛駕以牛車上致槍以刄外向間列士卒於車外賊至射之乃出騎兵擊之此制虜要術也戰之用車一陣之甲鎧也故可以行止為營陣賊至則歛兵附車以拒之賊退則乗勝出兵以擊之出則藉此為所歸之地入則以此為所居之宅故人心有依不懼胡騎之陵突也行載兵甲止為營陣郭固之式馬燧之舊制也至和二年韓琦言郭固就民車約古制為之臨陣禦敵緩急易集其車前銳後方上置七槍為前後二拒此馬燧戰車行載兵甲止為營陣也又以民車之籍増為重箱高四尺四寸用革輓之吴起所謂革車掩戸挽輪籠轂是也琦以為可用于平川之地臨陣人拆奔衝下營以為寨脚今令固自賫車式進呈試之以固為衛尉寺丞駕以牛車上置槍刃吴叔之法衛青之故智也見上此固國朝用車之明驗也然亦不輕用也若山徑之蹊可用小車而不用大車其察形熟矣范仲淹上仁宗議政云延安之西廣川之東有賊界百餘里侵入漢地唐馬燧造戰車行載甲兵止為管陣此路山坡大軍難進當用小車二十輛銀絹錢二十萬賞有功将吏干戈之際宜用兵車而不籍民車而度用審矣北兵将入詔遣中貴人取兩河民車為備民大驚擾一日沈括立御座側神宗曰卿知藉車之事乎括曰車戰之利見於歴世臣但未知一事古人所謂輕車者兵車也今之民車重大以牛輓之日不能行三十里少蒙雨雪則跬歩不進故俗謂之太平車恐民間不可用耳神宗喜曰無人如此語朕遂罷藉民車今由南而北直趨中原欲禦衝突之勢誠不可無車也然有米守信之智而後可極寨脚車之利米守信知禮州遣李錫持新様流星弩拒馬牌寨脚車山字甲八種來進有韓魏公之謀而後能察箱車之用至和二年初韓琦言郭固嘗造車陣法以民之箱增為重箱高四尺四寸前後二尺高與箱等用革輓之云云用車勝敵其别有八六韜言之詳矣宜踵其軌轍云舟師江漢湯湯武夫洸洸此水戰之始也嗟夫波濤洶湧敵人興嘆出沒如神望者膽落自古國於東南者皆恃此以收制敵之功然鼓棹而一進退之勢逐流而争上下之利非熟於舟師者不能也自周以後吴楚之争衡漢唐之平難三國六朝之戰争未有不用乎此朱買臣治樓船而破東越武帝時東越數反覆朱買臣因言發兵浮海直指泉南陳舟列兵席卷南行可破滅也上拜買臣會稽太守詔買臣到郡治樓船備糧食水戰具嵗餘買臣受詔破東越楊僕發水軍而平南越元鼎五年南越反遣伏波将軍路徳博出桂陽下湟水樓船将軍楊僕出豫章下滇水歸義越侯嚴為戈船将軍出零陵下漓水卑為下瀬将軍出蒼梧咸會番禺漢舟師之效也孝恭大治舟艦水陸並進遂平江陵唐河澗王孝㳟𫝊乃大治戰艦𨽻水戰圗下江陸俄逰荆湘道總管統水陸十三軍破越曹成王選歩艦二萬人卒平希烈韓文曹成王廟碑王姓李氏諱臯字子蘭李希烈及授節帥江西聚兵大選江州能者教之歩艦二萬人卒平之唐舟師之效也然漢不志兵制莫得聞唐以志兵水戰復闕愚嘗推原其由盖漢唐之都逺在闗中固非舟師履歴之地雖或取勝亦間有之非若東南常用之技此史氏所以畧之也然漢以北方之将而能用東南之技唐以中原之人而能收功於窮陬者亦平時之素閲爾盖漢昆明有池所以為習戰之所而唐人亦踵其故事以訓兵焉所以得志於水戰也噫以西北而用舟師非其所恃也而猶能成其功以東南而用舟師乃其所長也其可不加之意乎然用舟師之謀有二襲之以伏則必敗窒之以堅則必敗故善用兵者於二者之間而深究其利害耳試以東南所用之事而觀之長岸之戰吴雖敗衂猶有後圗楚惟恃上流之險詫餘皇之獲狃於小勝以弱視吴故長鬛之伏一呼而已得之舟復失左昭十七年江上之戰吴雖首兵畧不為備越惟􅔷枚以分屯鳴鼓以駭敵因其不誡夜以乗之故中軍之襲繼進而江北之師悉奔吴語楚以遇伏而虧軍實越亦用伏而成駿功不然吴見舟以惑楚而求勝於潛師定二年非此術歟故曰師有潛伏則其謀在察微方曹公順流而東也船艦彌望首尾相接扞敵非不固也而周公瑾以蒙衝一進而船艦空於烈熖三國志言劉豫州為曹公所破欲引兵渡江與魯肅遇於當陽遂合兵因進注夏口遣諸葛亮詣權權瑜及程普等與備併力逆曹公于赤壁曹公軍引次江北瑜等在南岸瑜部将黄盖曰今寇衆我寡難與持乆然觀操軍相連船艦相接可燒而去也遂同時發火操軍大敗方吴人之禦晉師也江磧要害鐵鎻横截禦敵非不堅也而王濬炬筏一施而鐵鎻截於長江通鑑晉伐吴太康元年杜預向江陵王濬唐彬擊破丹陽監盛紀吴人於江磧要害之處並以鐵鎻横截之又作鐵錐長丈餘暗置江中以逆拒舟艦濬作巨筏數十長百餘歩縛草為人被甲持杖令善水者以筏先行遇鐵錐輙著筏而去又作大炬在船前遇鎖炬燃之湏㬰融液斷絶於是船無所礙濬克西陵吴孫皓曰北來諸軍乃飛渡江也不然董襲沔口之役突入斷紲而破之三國志董襲傳非此術歟故曰勢有窒礙則其謀在攻堅愚謂有必勝之将無必勝之兵有可恃之謀無可恃之技此用兵者不可不審也國朝舟師之技未嘗不講而舟師之技未嘗輕用何者用於西北非其所長也非其所長而冐用之終非可恃之具爾越逸川澤習性已乆遂立平河之軍江浙發運使楊允㳟捕海寇四十九人送闕下上悉貸之顧左右曰此等越逸川澤習性已久可團為水軍以備舟楫之役以平河為名江淮士卒素習於水遂立水虎翼之軍祥符六年詔諸道選江淮習水卒於金明池按試戰立為水虎翼軍初太祖立神衛水軍及江淮平定不復振舉上復置焉其選之精矣興國幸金明池以試戈棹之利太宗太平興國九年上幸金明池觀習水戰曰戈棹之戰南方所利今萬方平定無所施用習之示不忘戰祥符又詔金明池以試習水之卒見上其閲之勤矣然伐蜀之舉捨舟而用歩騎卒以勝蜀太祖征西川命劉光義出䕫州路伐蜀上出䕫峽地圗示光義曰䕫州有鎮江至此我軍泝流而上謹勿以舟争勝當先以歩騎陸行出其不意擊之俟其少却以戰艦夾攻之光義等至䕫卒如上所計采石之役捨舟而立檣木卒以擒全贇開寳七年閏十月太祖使郝守濬造黄黒龍船於采石磯跨江為浮梁先試於石碑口十一月移浮梁於采石繫䌫三日而成不差尺寸王師過之如履平地吴将全贇領衆十萬将焚浮梁戰櫂正明入奏請造戰艦三百艘上曰全贇朝夕至若俟艦成固不及矣不若於洲浦間多立檣木全贇疑我師襲其後必不敢進明如詔㫖果擒全贇豈非自用所長而不䧟其所短耶馬政馬政之說古今凡幾變以官民通牧者周也牧於民而用於官者漢也牧於官而給於民者唐也至於國朝始則牧之在官後則蓄之於民又其後則市之於戎狄其得失利病有不難攷者成周以民牧者如丘甸嵗取馬四匹之類前刑法志四邑為丘四丘為甸有戎馬一匹平時則官給芻秣有警則民供調發然而在天子之都諸侯之國士大夫之家未嘗不自蓄焉此盖在官養之爾何以知之如周禮以天子有十二閑先儒論數謂不過三千餘匹衛文公承夷狄所滅之後新造之國末年亦至騋牝三千定之方中詩若以制度論之衛以諸侯之國又當殘亂之餘其他固未及論安得遽如成周全盛乗馬之數盖所謂天子有十二閑是養之於官者衛文公謂騋牝三千舉官民通數而言之此成周官民通牧之制也阡陌開井田廢兵車不復取田賦戎馬各從官給於是馬政日廢而外患生矣漢初稍復古制勸民養馬有一匹者復卒三人盖居閒則免三人之算有事則當三人之卒此内郡之制也前食貨志今令民有車騎馬一匹者復卒三人車騎者天下武備也故為復卒注當為卒者免其三人不為卒者復其錢耳至於邉塞則縱民蓄牧而官不禁烏氏居塞則致馬數千羣橋桃居塞則致馬千匹貨殖𫝊于時内郡之盛則衆庶有馬阡陌成群食貨志武帝初邉郡之盛則三十六苑分置西北前百官表牧師諸苑三十六所養馬二十萬又漢儀注曰太僕牧師諸苑三十六所分布四邉北邉以為朗苑馬三十萬自武帝征伐馬大耗乏行一切之令自封君而下以次出馬則内郡庻民有馬者欲望復卒難矣令民得蓄邉者縣官假民馬每三嵗歸其息什二則邉郡之欲廣蓄牧者難矣食貨志諸北地太守以下而令民得蓄邉縣官假馬母三嵗市歸息什一以除告緡用充入新秦中車騎馬乏縣官錢不買馬難得乃著令令封君以下至三百石吏以上差出壯上天下高之在蓄字馬嵗課息故内郡不足則藉民馬以補車騎武帝紀太初二年二月藉吏民馬補車騎馬邉郡不足則發驢槖駞負食出玉闗輪臺之悔始修馬令吁亦已晩矣出西域傳又渠黎國𫝊輪䑓詔曰當今務本力農修馬政以補缺毋乏武備而已郡國二千石各上進蓄馬方畧云云此漢牧於民而用於官之制也唐府兵之制當給馬者官與其直市之每匹錢二萬五千刺史折衝果毅嵗周不任戰者鬻之以其錢更市不足則府供之此給錢以市也至府兵漸壊兵貧難致乃給以監牧之馬此給馬以用也大抵唐之馬政皆編於官民無與焉唐兵志自高宗武后府兵之法更號曰彍騎詔諸州府馬缺乏官私共補之今兵貧難致乃給以監牧馬餘見兵志始唐接周隋亂離之後承天下征伐之弊鳩括殘驢僅得牝牡三千匹於赤岸澤徙之隴右始命太僕張萬嵗葺其政焉肇自貞觀訖于麟徳四十年間馬至七十萬餘匹于時天下以一縑易一馬秦漢之盛未始聞也垂拱以後馬耗大半開元始命王毛仲為内外閑廐使牧養有法雲錦成羣復與麟徳馬數相等耳此唐牧於官而給於民之制也兵志唐初得突厥馬二千匹又得隋馬三千匹於赤岸澤徙之隴右命太僕張萬嵗主之善於其職自貞觀至麟徳蕃息及七十萬六千匹分為八坊四十八監各置所以領之是時天下以一縑易一馬垂拱後馬耗大半元宗初年牧馬有二十四萬匹以王毛仲為内外閑廐使至開元十三年有馬四十萬匹上之東封以牧色從色别為羣望之如雲錦唐制天子十二閑為三廐曰鳯苑其後又增飛龍廐凡馬五千為上廐三千為中廐餘下廐國朝馬政蓄於監牧者曰官馬散於編户者曰戸馬市於邉郡者曰戎馬然與其蓄之於民孰若市之於戎與其市之於戎孰若養之於官何者民間蓄養指為外廐非不可也王旦對仁宗曰聽民間蓄養官中緩急以本直市之猶外廐耳馬知節曰馬多不精多蓄駑弱其費愈甚上然之然馬為不精多蓄駑弱况民至受其害乎見上沿邉等郡估買蕃馬非不可也余靖言國家自來於河東陜西沿邉守處估買蕃馬自西賊不庭買馬數少不足國用然市費益增牧數不加况戎反享其利乎端拱中李覺上言曰議者以為欲國之多馬在㗖戎以利使重譯而至然市馬之費嵗增而廐牧之數不加盖失其生利之理也此國朝所以重於監牧也騏驥有院天駟有監天廐有坊國初有左右飛龍院太宗興國五年改為天廐院雍熈四年改為左右騏驥院左右天駟監左右天廐坊皆𨽻属焉雍熈中太宗嘗幸天駟監閲焉既置群牧司又置牧使此在内監牧之制咸平二年置群牧司景徳四年以樞宻陳堯叟兼郡牧制置使自河北至許州已有十八監長編自河北至許州軍鎮凡有一十八監始置羣牧司總内外馬政兩河陜西有都總管處復置一監治平四年群牧司言乞於河北河東陜西有都總管處皆置一監令陜西監牧司以所市馬選上京年額外餘分撥諸監則本路軍馬可以自辨太原交城又復置馬監唐介知太原請於交城縣置馬監詔催占符相視遂得汾川故牧地三千餘頃其千二百餘頃民佃租以給芻豆既委羣牧司又委守倅兼領天聖四年祖宗舊制以羣牧司總天下馬其属有左右騏驥院分領左右天駟監左右天廐坊諸廐之在外者知州通判兼領之各據芻地并課士卒春夏出牧秋冬入廐此在外監牧之制故陳堯叟作羣牧議勒石于監信知監牧為便且急也陳堯叟議羣牧之設國家巨防作羣牧議以獻勒石大名監遂命堯叟為群牧使熈寧大臣何人哉誤聽曾孝寛之說而棄文潞公之議舉祖宗七八十年營成之制一旦盡壊熈寧七年曾孝寛言慶厯嘗詔河北諸州每戸養破甲馬一匹乞檢會施行戸馬始此又文彦愽上神宗言賦牧地與農民歛其租課獻國馬於編戸責其孳息不知所賦之地皆可耕乎戸散一馬縶之維之皆可蕃息乎坊廐監庫柵穿井泉官廨營房七八十年經營成就廢罷之後蕩然一空賦農民以牧地散國馬於編戸每一都限馬五十匹十五年而足謂之保馬而郡縣茍附不一二年而足之天下騷然不勝其擾至煩天子有安石相誤之嘆噫其忍負之乎彦博言不用元豐時其弊乃見神宗嘆曰朕有愧於文彦博王珪曰罷祖宗馬監自是王安石上曰安石相誤豈獨此一事云云夫養馬於民在成周未嘗不行在祖宗未嘗不用聽民蓄養市以本直祥符制也祥符四年上馬及十萬當且止也王旦曰聽民間蓄養官中緩急以本直市之詔能蓄馬與免二丁嘉祐令也嘉祐中令河東京東京西淮南籍丁壮為兵處有能蓄一戰馬者與免二丁仍不併戸等以備緩急丁度上言如是民何憚而不牧之夫何熈寧大臣急於争利一槩取民民始不堪爾迨至民病已極國用復闕於是求之戎狄而設茶馬之職焉市馬於戎雖不求牧之於官亦猶愈牧之於民此尚有可言也愚嘗攷之國朝市馬戎馬之制始易以銅錢戎因獲其器次易以銀絹戎復獲其用國初河東川陜諸路買馬給以銅錢而戎人皆鑄錢為器興國五年乃以布帛凖其直又元豐四年郭茂詢言欲専以茶愽馬以采帛愽糧榖及以茶馬併為一司竊聞昔時亦用茶縑金帛近嵗始専用銀絹及錢鈔等况賣馬買馬事實相湏乞買馬通管茶場從之今以摘山之利而易充廐之良戎人得茶不能以為我害中國得馬足以為我利亦濟用之良䇿初命李杞川蜀市茶蒲宗閔秦鳯易馬始盖分任其事成都記熈寧七年詔李杞蒲宗閔經畫川茶充秦鳯熈河路愽馬杞於秦州宗閔於成都置司後改名都大提舉茶馬事至郭茂詢言茶司立法以害馬政後遂専任其事元豐中郭茂詢言茶司既不兼買馬遂立法以害馬政乞併為一司從之是職既設茶課百萬獲馬萬匹其效亦可見爾舊蜀茶額三十萬至李稷加為五十萬陸師閔代稷為百萬紹聖中程之郡以羡茶轉入熈秦市戰騎故馬多而茶息厚馬至萬匹不然元祐變法更革殆盡獨茶馬不廢者亦有謂矣司馬光元祐初相罷諸路塩錢法後復其舊獨川陜茶以邉用未即罷遣使相視去其甚者今日雖仍熈寧茶馬之事而亦當行祖宗監牧之制圉師以蓄之校人以視之秣飼以時部轄有方則以渥洼之種耳否則貴市於外夷而賤棄於中國此李公覺之所以慮也端拱元年李覺言市易之馬至於中國縶之維之飼以枯槁離析牝牡制其生性因而減耗是貴市於外夷而賤棄於中國也國用成周以冢宰制國用漢初以相國任會計故利權有所總至漢以財用分掌於大農少府水衡閹宦唐以財用分掌於諸使郎官故利權無所總至國朝始以三司主之後以戸部専之此古今財用虛盈之故也且以周之外府而論王后世子衣服之用則共之祭祀賔客會同軍旅又共之賞賜給勞之用邦布者又復共之職若繁矣而不知以九賦九貢之貨賄而授之外府者太宰也外府掌邦國之出入以共百物以待邦之大用共王及后世子之衣服之用凡祭祀賔客䘮紀㑹同軍旅共其財用之幣齎賜予之財用凡邦之小用皆受焉以王府而論王之金玉則藏之王之玩好則藏之凡有精美貨賄則莫不藏之任若専矣而不知以貨賄收藏總而歸之者亦太宰也夫財之所出太宰既總之財之所入太宰復總之以至大而太府次而泉府又次而司會皆冢宰得會之節之則利權安得不一乎並周禮本官王府掌王之金玉玩好兵器凡良貨賄之藏餘見太宰官漢制以執盾襄為内史軍正咸延為少府漢官表下漢初元年内史執盾襄少府軍正咸延而當時給軍食納獻費正名數治宮室等事皆未嘗闗與於其人所謂給餉修治與夫㑹計之任者皆歸之相國蕭何為相國闗中給餉餽又治未央宮室又有計相在相府為會計則雖内史少府有公藏私藏之分而亦未始有所别異漢制内史掌諸錢穀金帛諸貨幣少府掌山海江澤之利以給供養嘗觀漢表自文帝即位以後未嘗除内史非掌財之無人盖漢初會計事専在相府是時張蒼為御史大夫則所為會計者特此耳蒼盖舊秦主計者而漢初嘗在蕭相國府領計矣自蒼為御史大夫至相凡十五年不易則文帝之世所以無領財之任者其謂之此歟則利權安得而不専乎按漢表文帝時郎無内史官又按陳平對文帝云錢榖問内史盖平勃比皆失對妄指是為言耳直至景帝世始改内史為大農令繼年而恵實為之高帝世則執盾襄為内史景帝田郎恵實為大農文帝未嘗除人也又張蒼傳蒼受計相居相府領郡國國計不然周世圜法流通泉布充足而人主無侈用之心漢初餉饋不乏陳腐相因而國家有富庻之效者是孰使之然哉夫漢郡國上計相府領之此良法也自平勃失對之後漢之大臣類以出納為有司之任往往不屑為之司農少府之掌始分而二上林水衡之置又裂而三供養勞賜出少府供帳牲事属水衡而軍國大計歸司農財皆異掌費皆異供前漢表内史至景帝更為大農武帝更名大司農掌榖貨又毋将隆𫝊奏言武庫兵器天下公用國家武備繕治造作皆度大司農又前官表少府秦官掌山澤之稅以給其養又表水衡都尉武帝初置掌上林苑又龔遂傳供帳諸舘為宗廟取牲不量多少費用無度西羗一役此大農事也乃以少府禁錢續之賈捐之𫝊往者以羗軍言之暴師曾未一年兵出不踰千里費四十餘萬若大司農錢盡乃以少府禁錢續之降胡數萬亦大農事也一旦不給則御府禁錢亦始補贍武帝元光年修治第宅非水衡事也亦間出水衡錢以為縣官工作之支宣帝本始三年雖曰移用補助以權事宜而調度紛紛越官躐事使一代財制幾乎無攷則皆利權散主之失此猶未足見其甚也異時光武併禁錢掌之大農後百官志承秦凡山澤陂池之私名曰禁錢属少府世祖改属司農将以絶一己之私制非不善而不知適以啓閹人之弊章帝章和元年宮中别立一監専用閹人領之其属有尚方考工諸曹反使子孫歎無私財而開鴻都賣爵後園自為己藏矣至是財計之任安在哉靈帝光和元年初開西邸賣官聚財以為私藏唐以度支郎掌嵗計所出而支調之與中書門下議定乃奏此亦唐人良法也百官志度支郎中貟外郎各二人掌天下租賦物産豐約之宜水路道塗之利嵗計所出而支調之以近及逺與中書門下議定乃奏自呂諲領度支之使係以使名親行其事於是裴度以宰相不可領度支韋宏質亦言宰相不可兼錢榖於是相臣不與均節之任呂諲傳肅宗乾元二年擢諲同中書門下平章事三月知門下省兼判度支唐宰相兼度支自諲始又裴度傳未幾判度支文宗加門下侍郎陳調兵食非宰相事請罷度支歸有司奏可又李徳裕傳時韋宏質建言宰相不可兼治錢穀徳裕奏言云云宏質賤臣豈得以非所宜言妄觸天聽是輕宰相夫財用之計本闗宰相使户部治其繁而已總其要亦周人冡宰會財之意今必係以使名而下行其事或者得以煩碎𤨏屑而議罷之矣未幾使名既罷分委諸郎吴武陵傳諫曰云云塩鐵度支一户部郎事今三分其務至萬貟皆御史貟外郎為之始命若實可信今又加使權其務是御史貟外郎乆於事反不可信也今更旬月又将以郎中之為不可信或云權判徳宗時陸贄請以前湖南觀察使權判度支從之或云専判楊國忠傳元宗召見入供奉主簿計等均分銖不誤帝曰度支郎才天寳七年専判度支故吴武陵言塩鐵度支一戸部郎耳今分其務至萬貟見上注則戸部之職至是盡廢此猶未足見其變也接于五代後唐遂以戸部度支塩鐵為三司使加塩鐵於戸部度支之上至是財計之任又變矣見上注然則以三司之使而寓以周人冢宰之任者豈非國朝歟夫夏官之㑹案秋官之磨勘冬官之修造河渠自唐及五代以來而地官皆所不與我朝悉属三司故造作軍器属之㑹案土木之役属之修造河防之役属之河渠國家財用之出無大於此三者而今皆得總焉稽考帳籍均節費用歛散及時縱舍由己而不為他司之所制此財之出者三司皆得兼制矣非成周太宰以貨賄授外府之意乎蔡官制唐地官設度支金部倉部戸部唐末省官分置吏五代専以塩鐵為理財之要分在三省之首今之金部也度支主用度戸部主版籍故次之其三司磨勘在比部衙司乃今刑部皆𨽻秋官㑹案乃今庫部属夏官修造乃今工部河渠乃今水部𨽻之冬官地官不得統焉皇朝盡付三司者可見立功以實不以文也開拆司兼管網運衙司考所掌之財勘磨財計檢察慿由悉歸磨勘司造作軍器則㑹案主行土木之工𨽻修造河防之役則河渠行之國家之費無出三事為蠧耗之大者必命三司使總之外之諸路漕運内之私帑儲蓄自唐至五代以來而地官未必盡與我朝盡歸三司故轉運使副判官督集財賦之權三司統之内庭分貯錢帛之私三司亦總之國家財用之入無要於此二者而今皆得總焉公私通融内外統一利權所属㒺有渙散而不為他司之所分此財之所入三司皆得兼主矣非成周太宰總玉府之意乎南豐文戸部之於中䑓為周官司徒之職掌財賦之調度金榖之出入以待邦國之用歴唐五代征歛煩興而吏名雜出地官之職盖存虛號而已又蔡官制宋朝轉運使副判官督集財賦悉𨽻三司凡經費羡餘獻之三司積于左藏庫及分貯内藏庫者皆三司總之立勸阻之法自熈寧變法之後使者出於相臣之門皆務聚歛而三司不得制旁通簿置於人主之前盡籍國帑之數而三司不敢與外則常平免役坊場河渡地利之資皆號朝廷封樁内則常課上供之數皆别創庫藏貯而三司皆不相闗故漕司之趣辨而不𨽻三司之勸沮内庭之積貯而不闗外司之參攷財之所入者安得而有驗耶蔡官制自熈寧遣使出于相臣之門皆務聚歛以恱廟堂非若三司使有此權以動漕臣亦不敢横歛也云云安石乃置旁通簿于御前盡籍國帑之數在神宗㳟儉君國帑藏率皆富溢崇寧後蔡京蠧國奢廣百端皆不先闗戸部非若三司有専案以闗防也同上王安石為相與三司分權凡賦稅常貢徴𣙜之利方歸三司摘山煮海坑冶𣙜貨戸絶沒納之財悉歸朝廷與常平免役坊場河渡禁軍闕額地利之資皆號朝廷封樁又有嵗課上供數盡入京師别創庫以貯之三司不與自元豐改官制之後三司之㑹案為軍器監而繕治械杖之費户部不得聞三司之修造案為将作監而百工興作之用户部不得攷三司之磨勘歸於比部並𨽻刑曹鉤考户部皆不得知故他司以辦事為效而不恤財之有無户部以給財為功不論事之當否財之所出者安得而有攷耶南窻紀談嘉祐中大水取三司河渠案置都水監元豐官制以三司會案之事歸之軍器修造案之事歸之将作三監皆隸工部於是户部所掌版籍財用二事而已元祐中蘓子由為戸部侍郎請都水将作軍器三監皆𨽻戸部凡三監有所為户部定其事之當否裁其費之多寡而工部任其工之良苦程其作之遲速朝廷從之按唐度支使杜佑奏營繕歸之将作木炭歸之司農染練歸之少府計司兼領他職自唐已然不得云出于祖宗之意凡子由所請者皆佑之釐正也豈時移勢異固不同耶雖然愚以三司戸部而叅攷之今之戸部尚書即昔之三司使也左右曹之侍郎即昔之副使也戸部之諸曹郎即昔之三司判官也有能推而行之則亦祖宗之法爾國初猶能仍五代之陋制而寓周冢宰之意今獨不能沿唐之美名而求祖宗三司之實乎且官制未改之前副使判官多自諸轉運而遷入則為兩制出則為都漕乆其任則為三司之長朝廷䑓省之官皆自此而遷焉後之戸部既不以理財待之矣而况外府司農之長貳哉昔之三司所謂理財也何者國朝呂申公之在禁從必先除戸部判官蔡文忠之叅大政必先除擢三司使此理財之任重矣蔡官制祖宗舊制選除執政侍從必先選歴錢榖伯祖文忠公欲推叅大政先除權三司使數月乃拜樞宻副使呂申公嘉祐中朝廷欲置之禁從乃除戸部判官數月進脩起居注旋詔知制誥今口談元理財榖為迂手校鉛黄籌算若凂視國朝之重其任者何如耶國朝陳晉公之為三司使十有八年號真鹽鐵宼萊公之為三司使前後事件類為方册此理財之任専矣陳晉公為三司使真宗曰真鹽鐵使陳恕十有八年精于吏事晩年薦萊公自代萊公檢尋晉公前後事件類為方冊所至榜示請晉公書押今假途望遷舊例厭視公宇𫝊舎胥吏浮萍視國朝之専其任者何如耶噫有由矣昔天下之財歸之一使事權所在幾半天下諸州之財聽於一道之轉漕而主漕計者得以通諸州之有無諸路之財聽之發運之司而為發運者得以通諸路之多寡三司統發運發運統諸路一路之漕臣統諸州上下相維之勢也今版曹所仰止於閩浙其他則撥𨽻餉所版曹不知也此外則朝廷樁積版曹不知也今将重其權也則舉天下之財莫若使版曹皆得通融而責之以昔者三司之任至将作軍器比部之司亦版曹得與之其任重其權専任重則在此無不盡其能權専則在彼無以分其事則錢流貫朽嵗月可兾耳噫何世無劉晏特在任之如何耳古今源流至論續集卷二
