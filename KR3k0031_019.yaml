body:
  text: 古今源流至論後集卷九宋林駉撰史學論史於麟經絶筆之後至司馬遷史記而止論史於麟經成書之後至歐陽公唐史而止甚矣作史之難也班史失之同范史失之誕陳夀之志三國失之誣陸機干寶諸人之史晉失之謬其餘諸家紛紛蓋不足論大抵作史有法論史有體觀史之表取其抑揚之大義而不當取其登載之年月觀史之書志史歷代則述歷代之沿革史一代則著一代之可否觀史之紀傳當得褒貶直筆是非公論而未暇較其異同也嘗考遷史之表矣三代世表所以觀百世之本支考黃帝之初先列譜系以祖宗為經以子孫為緯則五帝三王皆出於黃帝此帝王授受之正統可見也史記三代世表自黃帝以後至周其譜系皆出黃帝六國年表所以示天下之名分故齊康公之十九年為田和遷居海上而書田齊太公卒且繫之康公二十年康公既卒始書田齊此尊卑逆順之正理可見也六國年表齊年表曰田常曽孫田和始列為諸侯遷康公海上食一城時康公十九年也又齊年表康公二十年曰田和卒康公二十一年曰田桓公午立康公二十五年田齊伐燕取桑丘按康公雖遷海上然田齊有大事皆繫於康公之年至康公二十六年康公卒其齊年表乃書田公遂并齊而有之十二諸侯年表以下以地為主故年經而國緯所以觀天下之大勢也髙祖功臣年表以下以時為主故國經而年緯所以觀一時之得失也秦楚年表上尊義帝而漢居其中明大義也將相年表上繫大事之記明職分也並本表所載如此至唐之表猶有遷之遺意焉表宰相則書杜如晦為侍中仍監東宫兵馬之事蓋言宰相不當下行有司之職唐宰相表正觀二年正月辛亥兵部尚書如晦檢校侍中攝吏部尚書仍監東宫兵馬事魏徴為祕書監反帶參豫朝政之銜蓋言他官不宜上任宰相之權貞觀四年二月蕭瑀為御史大夫參議朝政貞觀三年二月魏徴以祕書監參議朝政唐之宰相稱號如此豈不為後人之戒表宰相世系則書裴氏之房有五而宰相十七人劉氏之房有七而宰相十二人唐之諸臣能修家法如此豈不為後人之勸唐宰相世系表云此馬遷歐陽之表其寓抑揚大義深矣哉嘗考遷史之書矣封禪一書固述帝舜以下也正以著當時求仙之詐平準一書固述歷代也正以譏當時征利之非於禮書則載孫卿禮論而不載叔孫通綿蕞者以見野儀之失而古禮之得也於厯書則載古厯九百四十分之法而不載太初八十一分之法者以見太初之踈而古厯之密也並遷史八書至唐史之志猶有遷之遺旨焉董仲舒劉向子歆以春秋洪範論災異之證班固合三説而志五行前五行志董仲舒治公羊春秋始推隂陽為儒者宗劉向治穀梁春秋數其禍福傳以洪範與仲舒錯至向子歆治左氏傳其春秋意亦已革矣云云范史因之晉史又因之歐公自立特見考武德以來著其災異削其事應而不徇漢儒之論此志五行之得體也唐五行志不載漢儒之論俱載武德以來證應馬遷考經星常宿纎悉不遺為天官之書天官書歷論經星緯星諸宿及天文風雨日月皆述之班固因遷舊説而志天文晉史因之隋史又因之歐公獨以一代天文災異者從事考武德以來某星為祥某星為異而不泛言彼蒼之象此志天文之得體也唐天文志此遷之論歷代歐之論一代其沿革大旨微矣哉又嘗考遷史之紀傳世家矣子長以事之繫於天下則謂之紀秦始皇已并六國事異於前則始皇可紀也項羽政由己出且封漢王則項羽可紀也孝惠髙后之時政出房闥君道不立雖紀吕后亦可也子長以事之有大於列傳則係之世家夫子在周則臣道在後世則師道故以世家别之陳涉在夏商則為湯武在秦則為陳涉故以世家係之蕭曹良平雖曰通侯而勳烈冠於群后皆社稷之臣則亦列於世家也列傳褒貶尤有深意以伯夷居於列傳之首重清節也以孟荀冠於淳于之徒尊吾道也以莊周附於老子以申不害附於韓非别異端也他如佞幸酷吏日者龜䇿滑稽貨殖遊俠皆為當世而發吁有旨哉至唐之紀傳視遷亦不多遜紀太宗而譏以牽於多愛之言非妄也蓋得於讀等慈之碑等慈寺碑等慈寺在鄭州汜水唐太宗破王世充竇建德乃於戰處建寺云為陳亡薦福太宗不世之主而牽惑習俗崇信浮屠豈以其言浩博為可喜耶余於本紀譏其牽於多愛者此也紀武宗而責以好惡不同之語非誕也蓋得於讀會昌之文會昌投龍文余修唐本紀至武宗以謂奮然除去浮屠鋭矣而躬受道家之籙服藥以求長年以此知非明智不惑者特好惡不同爾及得會昌投龍文見其自稱承道繼元昭明三光弟子南嶽炎上真人則又益以前言為不謬矣韓愈使王庭湊之節舊史沒其事今乃書其實蓋以明忠臣之義陽城諫延齡之相舊史置於隱逸今乃列於卓行蓋以表君子之功入秦系於隱逸出劉蕡於文苑皆所以示揚善褒德之意新史記傳有條不紊如陽城昔在隱逸今書之於卓行秦系昔人不傳今書之於隱逸韓愈使王庭湊之節舊史不書今乃書之所以明君子之節太宗拒魏徴之諌有殺田舍翁之語舊史則書今乃不書所以掩人君之闕此新史之得也舊史以髙智周薛季朝王方翼之功業而槩之以良吏以陳子昂之諌諍劉蕡之切直而槩之於文苑以吳叔之忠義而槩之於外戚以陽城之卓異而槩之以隱逸以孫思邈之髙尚而槩之以方技是略其大行而取其小節此舊史之失也此遷史唐史之紀傳世家真得褒貶直筆是非公論歟嗚呼世無馬遷無以示後人作史之例世無歐公無以洗諸子作史之陋然自固而下亦不可不辨也且以言其表則王子侯表遷則斷自建元以武帝始有分封之制也而固則自髙文以來敘之何昧耶武帝從主父偃之請始令諸侯王子分封遷作王子侯表特始建元者此也按班固亦作王子侯表不始於建元自髙文以來皆表之公卿百官表遷則係以大事以驗大臣賢否之職也而固則削去不録止書拜罷年月而已何略耶遷史作漢興將相名臣表上記大事次相次將次大臣至固作百官表上表載官制沿革下表載拜表年月古今人物表以區區一夫之見而欲定生民以來賢聖愚智之差等又何其不知量耶固作古今人物表分為上中下九等自三皇至秦皆録之以言其志則髙祖之創南北軍武帝之置羽林軍此一代大政也固則不志兵使節度無所考光武之三十稅一和帝之縱民煮鑄此一代之急務也曄則不志食貨使豐耗無所稽西漢無兵志東漢無食貨志志郊祀者不計巡幸里數之逺聞見録舜一歲而巡四嶽南方多暑以五月至衡山北方多寒以十二月至常山世頗疑之漢書郊祀志武帝自三月出行封禪又並海至碣石又巡遼西又歷北邉又至九原五月還甘泉僅以百日行萬八千餘里尤荒唐矣志天文者反略當代災祥之事班史晉史志天文大抵不言當代災祥事以言其紀傳則范史紀皇后而不知尊卑之分東漢皇后有紀如光武郭皇后光烈隂皇后明德馬皇后和熹鄧皇后是也三國紀曹魏而不辨逆順之理三國志以魏為帝紀甚者晉史之紀繆誤愈甚貶晉之亡也且有鰲墜三山鯨吞九服之言即協夫歌詠之辭貶惠皇之失御也且有溽暑之氣方聞淫哇之音罕記即協夫表奏之語此諸史著紀之失然也並晉紀云云固論蕭何之理家而不思記載之反覆聞見録蕭何傳先言民上書何強賤買民田宅數千人後言何買田宅必居窮僻處曰令後世賢師吾儉其反覆不可信如此論釋之之不調而不思表傳履歷之乖誤洪邁續筆漢書紀傳志表矛盾不同非惟一張釋之為甚本傳云釋之為騎郎事文帝十年不得調袁盎請徙補謁者後拜為廷尉逮事景帝歲餘為淮南相而百官表所載文帝即位三年釋之為廷尉至十年書廷尉昌廷尉嘉又二年凡歷十三年景帝乃立而張歐為廷尉則釋之未嘗十年不得調又未嘗以廷尉事景帝也曄以忠義董宣列於酷吏之儔以直諒鄭衆列於宦者之徒見東漢酷吏宦者傳董宣在酷吏傳首鄭衆在宦者傳首夀因私忿未復而訾諸葛瞻之失陳夀父與諸葛有忿因作傳訾瞻之失索米不獲而不立丁儀之傳夀因丁廙索米當立丁圭傳後不獲遂不立丁儀傳他如南北紛錯陳隋乖謬蓋未能縷數者此諸史立傳之過然也世之好議論者曰蘇子由古史之作而遷史無直筆蘇子由作古史議遷史之非吳縝糾謬之出而歐史無全美哲宗朝吳縝進唐史糾繆凡二十條一以無為有二似實而虛三書事失實四自相違舛五年月時世差互六官爵姓名謬誤七世系鄉里無法八尊敬君親未嚴九紀志表傳不相符合十一事兩見而異同不一十一辭義踈略十二事狀叢復十三宜削而反存十四當書而反闕十五義例不明十六先後失序十七編次未當十八豫奪不常十九事有可疑二十字書非是往往以微失細過吹毛求疵噫亦苛矣議遷史者以遷之妄述宰我常從田常而不知左氏所述闞止爭政之由伊川語録史記載宰豫被殺孔子羞之嘗疑田氏不敗無緣被戮若為齊君而死是乃忠義孔子何羞之有及觀左氏乃是闞止為陳常所殺亦字子我謬誤如此又潁濵文太史公言宰我為臨淄大夫與田常作亂夷其族孔子恥之余以為宰我之賢列於四科不至於從叛逆也蓋田常之亂本與闞止爭政闞止亦字子我也遷之妄稱子貢一出變易五國而不知左氏所載伐魯伐齊之故子由文太史公稱子貢一出而存魯亂齊破吳強晉伯越豫觀左傳齊之伐魯本於悼公之怒季姬而非陳常吳之伐齊本怒悼公之反覆而非子貢凡太史公所記皆非也蓋戰國説客誤為子貢之辭而太史公信之耳遂以是為遷史之失嗚呼盍亦究史遷傳信之誤乎蓋遷承秦滅籍之後左氏不立學官經傳無傳始誤於遊説之辭若後儒知其闞止爭政知其伐魯伐齊者以左氏歷歷可據也遷何尤焉漢左氏不立學官劉歆遺書太常請立亦未顯至後漢鄭賈諸人皆習左氏而左氏始盛議唐史者以穎達之字傳云仲達碑云沖逺字畫之訛也集古録孔穎達碑其文磨滅今以其可見者質於唐書列傳傳云字仲達碑云字沖逺碑字多殘缺惟其名字特著可以正傳之謬不疑以沖逺為仲達以此知文字轉易失其真者何可勝數幸而因集録所得以正其訛舛者亦不少也裴光庭之諡傳云忠憲碑為忠獻字音之訛也同上裴光庭碑張九齡撰元宗御書唐書傳云光庭素與蕭嵩不平及卒孫琬希嵩意諡曰克平帝聞特賜諡曰忠憲云碑後題額皆為忠獻傳云撰搖山往則而碑云往記此碑元宗自書不應誤碑如是其傳子儀則不書微時之所征討郭子儀廟碑髙參文其序子儀功業不甚詳而載異姓處密討沙陀處密事則唐書列傳無之蓋子儀微時所歷其後遂立大勳宜乎史略不書也然唐書有處密處月朱耶孤注等皆是西突厥薛延陀别部名號余於五代史求沙陀種類卒不見本末參謂處密為沙陀不知何所據也其傳張巡則不書大小數百戰之功張中丞傳嗚呼張巡許逺之事壯矣秉筆之士皆喜為之稱述然以翰墨所記考唐書列傳及韓退之所書皆互有得失而列傳最為疏略蓋云史家當記大節然而大小數百戰屢敗賊兵其智謀才力亦有過人可以示後者史家滅而不著可惜也遂以是為唐史之誤嗚呼盍以考紀傳分撰之始乎蓋歐公所修者紀志宋公所修者列傳時慮其體不一命歐公修而一之公受命而退一無所易見公愛人以德也公何病焉若夫子由吳縝所作是又前輩互相正救之意不然溫公作通鑑猶自為考異三十卷則作史安有無遺論歟此二公非所以短司馬歐陽正所以愛司馬歐陽也論詩觀詩之為美為針原於虞廷君臣之詠觀詩之為譏為諷原於夏人昆弟之歌嗟夫周詩三百蓋經聖人手也一歌一詠尚有源流則後之騷人墨客與盟詩壇者其可不祖風雅之體乎是故詩言志歌永言後世效之以為歌一曰風二曰賦後世擬之以為賦吟詠情性轉而為吟故嗟嘆之易而為嘆自詩變為樂府之後孔子作龜山操韓文孔子以季桓子受齊女樂諫不從望龜山而作操伯竒作履霜操尹吉甫子名伯竒無罪為後母譛而見逐自傷作履霜操牧犢子作雉朝飛齊牧犢子七十無妻見雉雙飛感而作雉朝飛操即或憂或思之詩自詩變為離騷之後賈誼之弔湘賈誼在長沙作弔湘賦楊雄之畔牢愁本傳即或哀或愁之詩凡此皆詩之體制源流也振振鷺三言之所起關關睢鳩四言之所起維以不永懷五言之所起魚麗于罶魴鯉六言之所起交交黃鳥止于棘七言之所起我不敢效我友自逸劉馮事始云詩三字至八字皆自毛詩如三字若鼓淵淵醉言歸之類四字若關關睢鳩在河之洲之類五字若誰謂雀無角何以穿我屋之類六字若俟我於庭乎而充耳以青乎而之類七字若交交黃鳥止于棘之類八字若節南山云我不敢效我友自逸八言之所起注見上凡此皆詩之句讀源流也然自己刪之後詩雅蕭條有如蘇李之髙妙嵇阮之沖淡曹劉之豪逸謝鮑之清奧徐陵庾信之靡麗華藻白樂天栁宗元之放蕩嘲怨此數子非不可與言詩嘲詠風月亡禆風教夸耀煙雲無關政體其視詩人愛君憂國之情無有也此邵康節謂其刪後無詩宜矣邵康節詩云須信晝前原有易自從刪後更無詩雖然諸葛武侯出師一表尚有傅説訓誨之辭陸宣公論諌之奏猶有孟子仁義之談孰謂周詩以後絶唱寡和之甚邪愚嘗謂晉之淵明唐之杜甫非可與刻繪者例論當以古人求之可也且淵明處世優遊自適桑栗里閭得酒輒醉蓋不可以名利羈絆故發而為詩和平自然無纎毫纍太羮元酒淡乎無味一唱三歎邈乎希聲隱然有至味至樂之妙讀命子等詩虛靜平淺有孤鶴任風之態歸去來一辭蕭然物外有間鷗忘海之勢至若自晉以前皆用義熙年號入宋以後惟書甲子並見陶淵明詩集讀之者自能扶綱常於紛亂之餘起風教於陵遲之後豈可以後之詩論耶杜甫流落劒南放散沅湘往來夔陜之間奔走寇亂之際飲食言笑歡愈嘆戚無一息而忘夫君北征之篇蓋倉卒問家室而作也使或者處之對童稚語妻子他不暇顧而終篇諄復惟及國事山谷喜之謂退之南山不必作登慈恩塔寺此正陪諸公遊遨而作也固宜笑談戲謔傲視八極以樂其心而措意立辭意在言外荆公謂其譏天寶時事則其憂國之意果何如哉並杜詩注杜鵑之詩忠愛之念天地實臨北征之詩忠毅之色秋霜之嚴與柏舟考槃之詩異辭同體豈可以後之詩論耶並杜詩世之論者謂韓昌黎以淵明嗜酒有所託而逃者似未許之不知退之當元和之際思欲致君不幸有嶺表之行故進李杜而退淵明亦愈自喻之言又謂歐公平生不愛杜詩必有短者不知歐公方倡古文以抑末學不好杜詩所以權時而救弊也貢父詩話歐公平生不甚愛杜詩而謂韓吏部絶倫又歐公變崑體以古文為後學倡不然東坡喜淵明之癯而實腴謂曹劉鮑謝皆所不及東坡喜淵明詩癯而實腴雖曹劉鮑謝李杜皆所不及山谷謂東坡飽喫惠州飯細和淵明詩山谷亦以子美之詩為靈丹一粒何耶黃魯直謂子美之詩如靈丹一粒點鐵成金噫金屑雖貴著眼成病文章雖多於性有害論淵明之詩當取其有補風教論子美之詩當取其愛君憂國外是不論徒工於文墨章句間豈深知二公哉陶杜之後而得美刺針規之旨吾於楊歐蘇黃見之夫自宋興以來名公巨卿馳騁翰墨固不可一二數求其備政治裨風教者四君子有功焉楊文公超出於岐嶷幼稚之時觀其願秉忠清節終身立聖朝之句則知有致君堯舜之意楊文公年十一送中書再試執政令賦喜朝京闕詩立就且有願秉忠清節終身立聖朝之句宰相表賀見湘山野録讀其介推母子伯夷兄弟之句則知有綿上首陽之風異時范文正公因文而知其道至躋之大雅大忠之列可見矣范文正公讃楊公像曰昔王文正天下謂之大雅冦萊公天下謂之大忠樞密扶風馬公天下謂之正直此三公一代偉人也公與三君子深相交許情如金石則公之道其正可知矣歐公以歌詠為諷諌之首其曰玊輦經年不遊幸上林花好莫爭開節盤遊也其曰君王念舊憐遺族當使無權保厥家抑外戚也髙宗時綦崈禮言歐陽修立朝以諌諍為心若春日帖子蓋宫禁門戶祓除祈祝之辭異時作者不過頌德歌福而已至修乃中舍規諷嘗讀修之詞有曰陽進升君子隂消退小人勸上以用威斷也有曰玊輦經年不遊幸上林花好莫爭開勸上以節盤遊也有曰聖主本無聲色惑宫花不用妬新粧諷上以逺女色也於溫成皇后閣乃曰君王念舊憐遺族當使無權保厥家又有所謂焉是時溫成薨上念之不已其叔父堯佐且將用矣公議未然故修因是申諷異時蘇公以犯顔敢諌為公序之確矣蘇軾序歐陽修之文曰自歐陽子出天下爭自磨濯以通經學古為髙以救時行道為貴以犯顔敢諌為忠長育成就至嘉祐末號稱多士歐陽之功為多繼而蘇黃間見疊出蘇之正節徑氣傲雪凌霜黃之風韻灑落光風霽月見道學傳授門則形於歌詠尚可想見英風清節之美是中惟可飲醇酒意則在於詆新法間送苕溪入太湖意則在於譏水利見坡詩集嗚呼沔彼流水不在於水而在於規鶴鳴九臯不主於鶴而主於誨蘇公之詩蓋得比興而為詩也東坡跋漁父則取其清新婉麗之作東坡跋山谷漁父詩云云東坡送孟容詩則起堅城受我降之語山谷云子瞻詩句妙一世乃云送孟容詩效庭堅體蓋退之效孟郊樊宗師之比以文滑稽耳故詩云我詩如曹鄶淺陋不成邦公如大國楚吞五湖三江赤壁風月笛玉堂雲霧窗句法提一律堅城受我降嗚呼韓昌黎詩豪矣未必熟李太白詩深矣未必暢山谷之詩蓋兼數子所長而為詩也故論東坡之詩為得於淵明論山谷之詩為得於子美誠至論歟噫聶夷中四月賣絲五月賣穀之詠或者猶以周詩許之聶夷中詩曰四月賣新絲五月賣新榖醫得眼前瘡括却心頭肉或謂有三百篇之旨况晉之淵明唐之工部我朝之楊歐坡谷四公其有補於風教也不少君子安得不進於三百篇之列也字文王荆公之辨字説以觀為鸛以雅為鴉君子以為怪聞見録東坡答劉道原書云新學説易觀卦本是老鸛大小雅本是老鴉此類甚衆王氏之學穿穴至此王聖美之治字學以水之小者曰淺金之小者曰錢君子以為鑿筆談王聖美治字學演其義以為古文古之字説皆從左文凡字其類在左其義在右如木類其左皆從木所謂古文者如淺小也水之小者曰淺金之小者曰錢反而小者曰殘見之小者曰賤如此之類故以淺為義也甚矣字學不可不講也亦不可過用其心也何者閲字未盡偏傍固世儒所不豫而苦於竒字或者議其艱深以不識字而見譏者固不足道而人譽其多識且以為終身之恨此荆公聖美之説宜夫君子不與也夫古者蟲書鳥迹象形指事凡假借轉注姑以代結繩記遺忘耳故其字有省文有借用後世皓首點畫勞心偏傍好異過竒往往以巳見合古文故其字有篆𨽻之變有傳寫之訛此古今字文之所以異歟強可為強則如記南方之強記中庸遲可為遲則如詩之行道遲遲匹可為鴄則如軻書之匹雛並本書是所謂省文之字吕令言載青旗則載通為戴記月令漢史言神爵則爵通為雀借此字而彼用可也漢書宣帝紀漢文紀云祝釐是借釐為禧矣禮樂志云熙事是又借熙為禧矣借一字而兩用可也並本書漢髙紀繇咸陽則與徭通文紀無繇教訓其民則與由通百官表臯繇則與陶通李尋傳繇俗則與謠通韋孟詩犬馬繇繇則與悠通班固賦摸先聖之大繇則與猷通借一字而六用亦可也並本出處是所謂借用之字若此數者豈非古者制字之正乎自夫有篆𨽻之鑿也糾亂兩字初非通用而𨽻古之初寫用混淆至糾變為亂法法兩字亦非通字而𨽻書之後多倦點畫至法轉為法棗字從朿不從來古文也後儒解漢書先生來來而為棗劉字從丣音酉從金古文也後儒論漢史書姓劉為卯金筆談古文自變𨽻其法已錯亂後轉為楷字愈益訛舛如兩漢篆文尚未廢庶有可疑者如漢武帝以隱語召東方朔云先生來來解云來來棗也按棗字從束音刺不從來此或是後人所傳非當時語如卯金刀為劉貨泉為白水真人此則出於緯書乃漢人之語按劉字從卯從金如柳駵留皆從丣非卯字也不知緣何如此字書余見周禮諸書自夫有傳寫之訛也榷酒漕運則以榷而從木救以砭劑則以􅀈而從金吳縝作新唐書辨疑凡二十條至字書亦本如唐承訓傳載婦弱持陬則以棷為陬張建封傳困不起則以蹙為救以砭劑以􅀈而從金榷酒漕運以榷而從木如此類甚多互字則易而為牙筆談牙儈本唐人以牙為互字如互市類是也後人互字傳寫為牙遂為牙矣臘字則易而為獵唐史蕭炅不學讀伏臘為伏獵挺之言於九齡曰省中豈容有伏獵侍郎書魚為魯寫帝為虎抱朴子曰書之寫以魚為魯以帝為虎若此數者豈非後人論字之謬乎嗚呼三豕渡河非子夏莫之辨左傳石鼓聱牙雖昌黎亦未之曉韓文石鼓歌信矣夫字學之難也雖然古今之文雖變而所以為理者未嘗變增損之畫雖異而所以為説者未嘗異吾嘗觀先正諸公講明經史推究傳注其有補於後學也多矣而區區篆𨽻傳寫之過一洗萬古而空之劉邠之刋誤漢書也侯表之紅縣則易而絳縣侯表載侯戶封紅縣刋誤曰非紅縣絳訛為紅侯表之票客則易而典客侯表韓信入漢為連敖票客刋誤曰按史記功臣表作連敖典客即非票客票典二字轉寫之訛故也吳縝之糾謬唐史也唐承訓傳載婦弱持陬則以掫為陬張建封傳困不支則以蹙為見上注二公之刋誤糾謬如是等類未易縷數姑以一二言之以辨傳寫者之失若程伊川讀論語曰子在齊聞韶音不知肉味聞見録今世所傳宰豫晝寢以晝作畫三月不知肉味以三月作音浴乎沂以浴作沿至為淺陋伊川取之何耶回何敢死死字自有意義伊川門人改云子在回何敢先學者類不服也蘇東坡讀尚書曰思日贊贊襄哉二先生蓋出新意也説者且以三月之近音子曰之曰近日月之日疑其為不知篆嗚呼先生所讀者古文所論者古意豈若俗儒腐唇於篆𨽻間哉是時字説方熾先生極力排之必不蹈或者之非愚意必有源流不可以私見議先輩也東坡書解云云又時王荆公作字説程蘇力排之噫蒼頡之制字蓋以關天地參造化也天粟書雨市妖夜哭萬物由之以著綱常由之以立百官萬民由之以治則古文誠不可廢矣惜夫後之諸儒寡識者失之愚過竒者失之鑿必如楚子因止戈為武以知武之非己功晉伯宗因反正為乏以知酆舒之必可伐因三蟲食皿為蠱如醫和知晉侯之疾因亥有二首六身如史趙知絳老人所生日數之積並左傳庶無失古人制字之本意吁此唐人所以設明字之科有以夫字音昔前輩沈存中之論音韻也曰玖與李異其韻而詩則協投我以木李報之以瓊玖梁與慶異其音而詩則協黍稷稻粱農夫之慶求其説而不得且謂意别有理也沈存中筆談音韻之學自沈約為四聲及天竺梵學入中國其術漸密觀古人諧聲有不可解者如玖字有字多與李字協用慶字正字多與平字章字協用如詩或羣或友以燕天子彼留之子貽我佩玖投我以木李報之以瓊玖終三十里十千維耦自今以始嵗其有君子有谷貽孫子陟降左右令聞不已膳夫左右無不能止又如孝孫有慶萬夀無疆黍稷稻梁農夫之慶惟其有章矣是以有慶矣如此亦多今廣韻中慶一音卿然如詩之未見君子憂心怲怲既見君子庶幾或臧不止慶字恐别有理也夫學識如存中博洽如存中猶不能曉古詩之韻况後學乎然嘗觀上世之書易近世之詩歌皆有叶韻者而後知詩無有不叶第古今之字異耳音韻異耳以今字而會古音則律度不諧宜其差以古字而尋古音則宫商相應宜其叶蓋詩之言其字多與音異者字古也字古則音亦古也如言題彼脊令則題音大叱鱣鮪發發則發音補末若泉源在左佩玊之儺以儺之音為乃可清人在彭駟介旁旁以旁之音為補彭説一字也曰與子成説曰不可説也又曰召伯所説莫一字也曰維葉莫莫曰莫其德音又曰歲聿云莫夫同是字也或通用或借用則自古而音異也多矣並毛詩注豈有古者塗歌里詠之言如是不叶哉且書曰元首明哉股肱良哉庶事康哉則曰明曰良曰康不同韻也易曰西南得朋乃與類行東北喪朋乃終有慶則曰行曰慶不同聲也借曰明之於良與康固協鄰韻而行之於慶烏得而協耶蓋廣韻中以慶音卿若班固賦東都用慶字與成叶班固東都賦彰皇德兮牟周成永延長兮膺天慶楊雄草太玄用慶字與疆莊叶往往比而用之則知古人蓋用古音也太元居卦次三長幼序序子克父測曰子克父乃能有興也次四見豕在堂狗繫之女測曰見豕在堂其體不慶也次五軸轤調安安和富真測曰軸轤安和順其疆也次六外其井竈三歲見背則曰外其井竈三歲不享也次九老夫擐車少女提壺利考家測曰老父擐車其體乃壯噫書與易猶或相協矧所謂古之詩乎此猶曰居古宜用古也髙馳兮沖天羌愈思兮愁人天與人韻異也以音推之天之反鐵因也屈原非用古音耶離騷經皎皎霞外屣萬乘其如脫外與脫音殊也以音推之脫之音退也德璋非用古音耶房中歌曰象來致福多與國叶漢郊祀志明堂詩曰允懷多福亦與職叶班固傳聲若相逺也以賈誼疏觀之福之音福則漢人非用古福音耶前賈誼傳注不特此耳韓昌黎最後出者也濃墨大字作元和聖德之詩既韻於雨而旁見疊出或曰魚魚雅雅又曰濡及九有此詩配吉甫而作是必不茍然者毋乃退之倔強得寬韻則波瀾橫溢泛入傍韻得窄韻則不復旁出因難見巧歟非也退之平日所習者皆古文故其所作者皆古音韓文元和聖德詩曰皇帝即阼物無違拒曰暘而暘曰雨而雨云云駕龍十二魚魚雅雅云云浹于族親濡及九有云云作為歌詩以配吉甫餘見韓文注噫後人著詩猶或相叶矧所謂古之詩者乎嗟夫尋古人之音不能求古人之字反以沈約四聲西域七音後來紛紛等作以強律之古豈不過哉然嘗論古者字音之失有由矣變於四方言語之不同鑿於諸儒學識之不廣南方之都音豬禮記汙其宫而豬焉注南方以都為豬宋人以來音離左傳宋人歌曰于思于思棄甲復來注來音離邾曰邾婁公羊齊人鄒邾皆曰邾婁故禮記亦謂之邾婁蓋齊人語如此耳得來曰登來在齊有焉登來亦出公羊曰得來齊人語也以居為姬檀弓何居注音姬齊魯之間語助也以但為地在魯有焉丙吉傳吉魯人吉曰西曹地忍之注地但也曰馮曰羌楚何陋也楚詞憑不厭乎求索羌內恕以及人皆楚人語也以一為蜀蜀何訛也楊子方言曰一蜀也郭璞注蜀與獨同吳人稱浦為步韓碑有之韓文碑步有新收注吳人謂浦為步夷人以龜兹為丘慈或為屈沮漢書言之龜茲國者西漢音丘慈東漢音屈沮此變於四方言語不同也白樂天題坐隅詩曰俱化為餓殍殍非孚也而押之可乎杜牧杜秋娘詩曰厭飫不能飴飴乃餳也而訛之可乎沈存中筆談晚唐士人專以小詩著名而讀書滅裂如白樂天題座隅詩曰俱化為餓殍殍作孚作押韻杜牧杜秋娘詩云厭飫不能飴飴乃餳耳若作飲音當音飲吁音况于古也而楊雄賦翰林主人曰吁顔師古乃鑿而音于本傳注梧音訛胡反古也而張良傳贊魁梧項籍傳枝梧顔師古乃鑿而音悟並本傳注此鑿於諸儒學識不廣也嗚呼孰知方言之變諸儒之鑿其弊猶循習於後歟閩人之舉進士也省試詩題至以髙與歌同韻此見四方言語之失國初省試考官取一卷省題詩以髙與歌同押取在入等乃閩中士人時考官亦閩人蓋閩音以髙歌同音也范景仁之舉進士也詩用彩霓考官以沈約郊居賦雌霓連蜷讀霓為入聲而黜之此見後儒學識不廣之過范景仁少舉進士善文賦場屋師之參政王公薦召試學士院詩用彩霓字學士以沈約郊居賦雌霓連蜷讀霓為入聲謂景仁為失韻殊不知約賦但取聲律便美非霓不可讀為平聲也噫安得昌黎諸人與之論古者哉嗟夫深於竒字方言世儒所師楊雄閲字未盡偏傍識者譏之信矣夫音韻之學不可不講也雖然君子寧為范景仁之從古音毋為沈存中之疑古韻寧讀賈元公之音辨毋讀王荆公之字説后德易著家人詩首關睢嗚呼聖人作經何拳拳於此耶大抵宫庭雖隱風俗攸化寡妻是刑邦家所關故私謁不行則椒房無預政之嫌外戚無竊柄之弊而朝廷清矣嫉忌不生則禁密有肅穆之風子孫有衆多之慶而本支強矣晏朝有針則無宴遊逸豫之習無聲色嗜欲之好而君德進矣舜之歷試不在於親總萬機而在於􅀈汭之化書舜典禹之典則不在於豫臨兆民而在於塗山之德史記文王薑任太姒所以成肇造之基毛詩宣王得助薑后所以致中興之業史記噫盛哉推原其由古者彤管有史雅頌有訓毛詩以冢宰總內朝之政宰夫任宫教之職周禮天官是以無後世干請之私奢縱之過竊弄之失者職此之故也自關睢之化不行內庭之教不講而一家之紀綱視昔有訓焉漢自吕后之橫不能制政出房闥而産祿有封王之僭吕后紀自慎夫人同坐之禮不能正袁盎傳尊卑亡度而倡優有后飾之習賈誼策逮至末年許史專寵鳳莽竊權染指漢鼎舉朝不問而漢之宗社危矣並本傳唐自昭儀立后革命為周而諸李有殱滅之禍髙宗立武昭儀為后後武后廢中宗潛謀革命稍除宗室欲悉誅韓魯等諸王命監察御史蘇珦按其密狀珦詢問皆無明驗或告珦與韓魯通謀太后召珦詰之珦抗論不回太后曰卿大雅之士此獄不必卿也使周興等按之於是韓魯等諸王皆自殺親黨皆誅死韋氏專國政事無章而五王有就戮之慘武三思因上官婉兒與韋后私通武氏之勢復振日夜譛五王貶敬暉崖州司馬桓彥範龍州司馬張柬之新州司馬袁恕已賔州司馬崔元瑋白州司馬遣大理正周利用害五王於貶所初敬暉為平陽王彥範為扶風王柬之為漢陽王恕已為南陽王元瑋為博陵王號五王逮至中世牽愛祍席胡雛唱亂漁陽鼙鼓動地而來而唐之國祚殆矣玄宗寵祿山聼其出入宫掖不禁或與貴妃對食或通宵不出頗有醜聲聞於外上亦不疑後祿山求兼河東節度既兼領三鎮有輕中國之心遂自漁陽唱亂逺近驚駭河北皆祿山統內陋矣哉漢唐家法也漢之風俗至有姑婦相稽之嫌賈誼策魏祖疏唐之風俗至有婦駕其夫之失伊誰之咎通鑑然則家人之卦關睢之詩其有補於風教也大矣我祖宗以仁義立國以綱常齊家以人倫化天下內言不出於外私恩不容於公蓋與唐虞三代比隆焉漢朝椒房恃寵至有戚里撓權之患吕后紀王莽傳聖朝杜絶私情髙氏修宅請置濳火太后因戒二髙不得干請是后族未嘗私請也英宗宣仁聖烈皇后髙氏嘗修北宅以奉親母兩國太夫人入謝旦請置潛火一鋪后曰但令公紀公繪省事豈解失火太夫人不樂復曰曹家亦是聽政時南宅創添潛火太后變色曰姐姐殊不思之甚也二姐豈敢比娘娘娘娘於趙氏大有功不可引之因手札戒二髙不得干請其家至今寶藏之唐朝宫闈不肅入閣圖至有昭容之位聖朝內外整嚴曹佾至老視疾禁中太后曰此非若所當留是后族未嘗得入也神宗事光獻太后極誠孝所以娛悅后無不至本朝故事外家男子未嘗得入謁后既年髙多疾弟佾亦老上固為之請得入謁與佾同至后閣坐少頃上先起令佾先申親意遽謂佾曰此非若所當留輒隨上出册命太后文德親受舊典可援也而宣仁自謙故只就崇政元祐三年宣仁太后受册有司檢用章獻明肅皇后故事受策當御文德殿后不許謂只就崇政殿令學士具詔未進入蘇軾草詔中有曰且豫涼薄常慕謙沖况敢躬御治朝自同先后處之無過之地乃是愛君之深意後三日內批付三省所進詔本自常慕而下二十六字不免有今是昔非之議可敘述太皇太后顧德實不及章獻不敢依文德殿故事於是三省重定進入丁巳太皇太后手詔祥禫既終典册告具而有司遵用章獻故事豫當受策文德殿雖皇帝孝愛之意務極尊崇而朝廷損益之文務從宜稱云云所有將來受策可只就崇政殿建立長秋東朝降詔故事可遵也而顯仁后自謂不預外庭紹興十三年上曰數日來太后趣行中宫之禮朕乞太后降一指揮太后不肯曰我但理家事豈預外庭英宗推恩元舅太后持其制不下治平元年知宣徽北院節度使曹佾同平章事初議除拜上問韓琦琦曰陛下推恩元舅非私外戚也遂降制太后持其制不下上固請乃許髙氏舉故事加恩太后輒欲裁損元祐七年三省言景祐七年李用和等改官移鎮恩例今髙氏朱氏皆舉故事加恩太皇太后曰章獻垂簾初無此例吕大防曰太皇太后以髙氏故深自抑畏如故事何后曰外家恩澤方欲除損可又增長乎大防曰此盛德事此猶可也孰知元后賢德維持宗社其功尤大歟父以子繼豈非古今相授之常乎而昭憲切然逺慮且曰四海至廣必立長君是言也不惟社稷之福亦生靈之幸杜太后問太祖曰汝自知所以得天下者乎上曰此皆祖考及太后餘慶也后曰不然政由柴氏使幼兒主天下羣心不附故爾使周有長君汝安得至此汝後當傳位汝弟田海至廣能立長君社稷之福也上曰敢不如教母以子貴豈非家庭相慶之時乎而昭憲愀然不樂且曰治得其道此位可尊是言也不惟子孫鑒之而天地亦臨之宣祖昭憲皇后杜氏太祖既即位拜后於堂上衆皆賀后愀然不樂左右曰臣聞母以子貴今子為天子胡為不樂后曰吾聞為君難且天子者置身兆庶之上若治得其道則此位可尊茍或失馭則求為匹夫不可得是吾所憂也爾其勉之太祖再拜曰謹受教不特此耳元祐初元正小人伺隙之秋宣仁召申公於外郡起司馬於散地拯溺救災革弊去姦藹然有慶厯之風此其功為如何宣仁后元祐初垂簾召申公相司馬盡革熙寧弊政一時政治人謂有慶厯風建炎渡江正國祚綴旒之日隆祐掃清劉苗再植中天剗危而安芟禍而福赫然中興之烈此其功又如何隆祐太后手詔立康王即位後宣問揚國殱苗劉詩之思齊徽音螽斯不妬其我朝賢后之謂歟齊家夫子述詩上起關睢鵲巢之風而下終於陳靈之亂序書本於父子之底豫而慨然絶筆於秦穆不憾其為崤之師噫聖人品節裁成所以立國之規模何其正大深逺耶蓋宫庭祍席之微而係於邦國都鄙之治父子兄弟之倫而關於上下內外之分推而至於國可以安治而無憾極而及於天下可以平靖而無隙變故而不能移危疑而不能亂此六經之格言孔孟之大訓三代聖人之家法也愚嘗誦五子之歌讀盤庚之書深切有感焉夫以太康洛表之畋十旬弗反神怨民怒之時也而五子者方且憂懇惻怛不忍自利至援萬姓之仇以身當之而不辭盤庚遷都之舉安土重遷民咨胥怨卿士浮言之日也而王宫宗室貴后之寵者顧乃從上所命而不煩片辭之告戒是知禹之立夏湯之造商專以齊家為本其純粹和輯之風乃至於此歟文武造周此意尤厚麟之趾振振公子重宗族也常棣之華鄂不韡韡友兄弟也思齊不瑕樛木無嫉嚴閫教也典禮以維之雅頌以播之仁義禮樂以化之異時我周東遷晉鄭焉依左傳薑后脫簪輔成中興史記皆祖宗家傳之法吾觀三代有道之長久安長治羿浞稔亂而不叛商都七遷而不擾春秋戰國綿綿而不絶者蓋對越之義常尊而肅穆之風不絶也至漢歷唐此風泯如漢自杯羹之語一形削滅恩義而父子之倫缺髙祖紀吕后之橫莫制紊亂舊約而夫婦之義乖吕后紀漢之風俗染而成習母子之誶語婦姑之相稽儒者之深憂賈誼傳子弟殺父兄妻殺夫一歲至數百人中興名相以為不可一日安者魏相傳國之不亡岌岌哉唐自兄弟不相忍而蹀血於禁門父子不相安而逼奪於神器太宗紀唐之子孫無所取則子攝兵叛其父太宗太子承乾懼廢謀變事敗太子言為齊王太所圖臣專兵叛其君祿山朱泚之變婦駕其夫而兄戕其弟韋后凛凛然自立於危亡困厄之中尚何取於憑藉扶持之法哉前輩謂漢大綱正唐之大綱固未正也而漢之大綱又安在耶惟我宋立國大體兵力雖不及於漢唐而家法實無愧於三代是故傳授一語鬼神森列金匱藏書千古不磨神器大寶舉而委之不啻脫屣然則太祖太宗之相授堯舜揖遜也太后疾太祖侍藥太后曰汝萬嵗後當以次傳之二弟則并汝之子亦獲安矣太祖曰敢不如母教因召趙普於榻前為誓書藏之金匱終日留侍天顔自怡冒雨扶駕孝心不已冷泉堂詩之跋萬機之暇父子杯酒相屬則髙宗孝宗之相得王李文王唯諾也淳熙五年史浩奏陛下事親之懿二典所載誠有不能及者或留侍終日或恭請宴遊凡所以盡子之道以天下養者無不極其至又紹興三十一年太上移德夀宫皇帝攀戀垂泣出祥曦殿門冒雨扶駕太上麾謝再三令左右扶掖以還又髙宗作冷泉堂孝宗古風云聖心仁智倩優間壺中天地非人間蓬萊方丈眇空闊豈若坐對三神山髙宗跋之曰此就寬間之地疊石為山因湖為泉作小亭於其傍用為娛老之具吾兒萬機之暇時來遊豫父子杯酒相屬挹山光而聼泉流濯喧埃而發清興恍若徜徉乎靈隱天竺之間其樂可勝計耶聖朝虎闈有訓世世不忘親近儒臣之時多昵比嬖幸之時少賔護名賢歷陳忠孝寶訓太宗命李至李沆為太子賔客啓謝之日上曰賔護之任非名賢不可卿等皆久服大僚語及經藉當為陳忠臣孝子事師傅重任深戒順從長編至道九年以李至李沆兼太子賔客見太子如師傅之儀太子見必先拜太宗謂至曰太子仁賢當賴正人輔之以道卿等可盡心調護若動皆由禮則宜贊成事或未當必須力言勿因循而順從也則見於太宗之世元良有針副以詩歌天禧二年立皇太子上作元良針賜皇太子又作詩分賜賔客資善有記戒及戲玩則見於真宗之朝長編祥符九年詔築室於元符觀南為皇子就學之所名曰資善上作記刻石堂中命楊懷玉為王伴讀仍面戒不得於堂中戲笑及陳玩弄之具此子孫世有哲王也聖朝宫禁嚴密出入整肅內之風旨不傳於外外之請謁不通於內宫人服銷金以迎駕真宗却之貴妃衣蜀錦以侍宴仁宗責之長編此閨門世有哲后也聖朝開國承家小人勿用慮肺腑之怙勢而不授以政慮薰腐之挾寵而不假以權駙馬柴宗慶求為使相王曽執議不可天聖四年仁宗曰駙馬都尉柴宗慶求為使相何如王曽曰先帝時石保吉魏咸信皆歷行陳有功晚年方除使相之任豈容私情宦官王守忠求為節度梁適死爭不已王守忠疾求為節度使梁適曰宦官無除真刺史况真節度乎上曰朕嘗許守忠矣適曰臣今日備位宰相明日除內官為節度死有餘責翌日守忠卒此國家世無幸習也我宋家法之善堯舜三代而下誠未之聞也伊川謂三代之後本朝有超越古今者五事誠至論也然伊川所言歸本於大體以忠孝廉恥為之綱紀故能如此伊川之言信矣伊川詔録嘗觀三代之後本朝有超越古今者五事如百年無內亂四聖百年相授受命之日市不易肆百年未嘗誅殺大臣至誠以待夷狄此皆大體以忠孝亷恥為之綱紀故能如此蓋睿祖開基規模自别大綱不正萬目即紊吕微仲謂自三代後唯本朝百三十年中外無事亦至論也然微仲所言推原於家法最善歷舉其事親敬長治內勤身之法微仲之言驗矣元祐八年上讀寶訓畢吕大防等進曰祖宗家法甚正自三代後唯本朝百三十年中外無事蓋由祖宗家法甚善臣請舉其略事親之法事長之法治內之法外戚之法尚儉之法勤身之法尚禮之法寬仁之法詩曰貽厥孫謀以燕翼子祖宗有焉又曰不愆不忘率由舊章今日有焉睦族周之王業何以興吾觀麟趾而知周之所以興周之王業何以成吾觀行葦而知周之所以成麟趾之信厚不惟公子而止也而且及公族不惟公族而止也而且及公姓何其才之多也行葦之親睦既肆之筵矣又設之席既設之席矣又授之几何其恩之厚也然則周人之過歷有由矣是故版蕩之餘常棣缺矣而共和行政周召是賴荒媟之習角弓作矣而我周之東晉鄭焉依綿綿葛藟在河之滸兄弟之義何在也而糾合宗族以蕃王室載之麟筆班班可考焉噫霜降水涸涯涘乃見至文武成康已逺而周以宗強屹若盤石君子是以知同姓之有功於周歟自周以後享國長久惟漢唐而已然其始固有周人封爵之典而其後不免蹈秦人孤立之失此吾有感於世變也方漢懲前日之弊大者既嗣世而襲封而其苗裔支别則置宗正官以糾合之此其敬宗之意厚矣前諸侯王表懲戒亡秦孤立之敗於是剖裂疆土二等之爵功臣侯者百有餘邑尊王子弟大啓九國掌又前百官表上宗正卿親屬朱虛列侯輝映王室朱虛侯劉章與周勃誅諸吕河間獻樂譜系增重亦何負於漢哉河間獻王獻夫何王子分封之令下而侯國削弱武帝施主父偃之䇿下推恩之令使諸侯王得分戶邑以封子弟而藩國自析侯國不得宿衛之禁嚴而宗室無有在位自景武間嚴忌鄒陽枚乘之徒皆官事吳梁逮淮南衡山不軌之謀覺天子懲艾作左官之律則天下之士不得仕諸侯矣主父偃齊人而齊為郎中韓安國梁人而入位大司農逮成帝世彭宣遷廷尉以王國人出守太原龔勝學者亦以王國人不得宿衛則王國之久不許留京師矣又按髙后紀誅諸吕勃令典客劉愒説吕祿劉章急入宫衛帝始皆宿衛自武帝不與諸國人宿衛宗室無有在京師者至昭帝詔劉辟強其養仕於朝自是辟強之子德為宗正德之子向向之子歆並在朝俱楚元王之後耳異時劉龔諸人畔漢獻符者豈非有所激耶王莽傳莽曰嘉新公國師以符命為豫四輔明德侯劉龔率取侯劉等凡三十二人皆知天命或獻天符或貢昌言或捕告反虜厥功茂焉諸劉與三十三人同宗共祖者勿罷嘉新公劉歆也吾觀漢諸侯王表有所謂莽知殫微生其姦心之言信夫前諸侯王表哀平之際親屬踈逺是故王莽知漢中外殫微本末俱弱亡所忌憚生其姦心究其終始強弱之變明鑒戒焉唐有天下之後親者固寵殊恩踈者亦疏王爵此其親愛之意厚矣江夏定難玉牒有光河間立功宗室標的亦何負於唐哉唐太祖諸子贊襄髙祖禳除四方河間之功江夏之略可謂宗室標的者也始唐興疏屬畢王至太宗稍稍降封又見江夏郡王道宗河間元王孝恭二傳夫何未及再傳而降封之禮已薄見上逮至親盡而仕宦之制無别唐宗室世系表唐有天下三百年子孫蕃衍可謂盛矣然其初皆有封爵至其世逺親盡則各隨其人賢愚與異姓之臣雜而仕宦或至流落於民間甚可歎也異時劉秩名儒因武氏之禍欲行封建者豈非有所感耶唐太祖諸子贊至名儒劉秩因武氏之禍則建論以為設爵無上署官不職非古之道故權移外家宗廟絶而更存存之之理在取順而難逆絶之之原在單弱而無所憚至謂郡縣可以小寧不可以久安大抵與曹元首陸士衡之言相上下吾觀唐宗室世系表有所謂流落民間甚可歎也之言信夫見上噫厚敘九族臯陶有謨立愛惟親伊尹有訓斯道也帝王相傳之家法漢唐其可忽諸國朝睦族之恩與周比隆公族之賢亦與周比隆分王之爵天聖制也奏議天聖四年司諫劉隨言皇家謙抑宗族親王之子不封郡王親王既沒不立嗣王闕典未行屬在繼聖封又寶訓仁宗謂輔臣曰自荆王沒而祖宗之後未有王爵者三代皆建宗戚乃以皇叔德文為東平郡王皇兄濮安懿王為汝南郡王允弼為北海郡王皇弟允良為華原郡王姪從藹為潁國公宗説為沂國公南班之恩景祐制也景祐二年南郊太祖宗室並與轉官仍自諸司使以下至殿直皆換西班官諸司使鎮諸州刺史者十二人換諸衛大將軍領諸州刺史諸司副使以下十九人換諸衛大將軍內殿承制以下一百三十人並為將軍率府率副先是宗子無遷官法惟遇稀曠大禮則普遷一官及南郊並侑三聖宗子並上表乞推恩故為此制按實録會要正史並稱換西班官百官表獨稱南班官當考又職源天禧元年定制宣祖太祖太宗初命授諸衛將軍曽孫右侍禁元孫授右班殿直景祐中初定南郊緣入禮乞惟恩遂有南班之授至和二年遷官有法也寶訓仁宗謂輔臣曰宗室久不推恩今悉遷官可乎宰相等曰睦九族堯舜之道陛下推恩宗室此新政之美也又長編至和二年詔曰任職之臣則有考課遷官之法而宗姓不與吏事先朝著格使十八年一遷所以隆族示愛也朕尚念有耆老久次者令中書樞密第其服屬自明道覃恩後且十年咸與進官熙寧初元出補有法也奏議元豐元年趙彥若言熙寧初始命宗子出補外官封事任列於有職之臣此盛德至公之事昔漢之取人不限踈近而宗正有郡國歲計上籍之文劉向以髙才進唐宗正寺歲送進士二十人李程李肱皆為舉首今宗正寺不預薦士切恐臣職有所未稱謂宜俾諸教官依國子監外官學例為課試法每遇秋試就宗正寺鎖院試别立人數頗示優異其疏封之恩誠篤矣睦親有宅寶訓仁宗詔以玉清宫地為潞王等宅賜名睦親上既建睦親宅徐國公承節願得美名榜其所居之宅賜名廣親睦宗有院職官崇寧元年蔡京置敦宗院光宗即位改為睦宗院意何勤也分賜有銘會要大中祥符三年帝作宗室座右銘并注分賜元渥等以申誨導賡詠有詩祥符元年召宗室從官及宫僚射于密王元偓宫賜以御詩及衣幣有差元渥能自修勵嘗曰讀書日記兩事歲月滋久為益多矣上每稱其好學御詩出必令繼和焉情何密也其厚遇之禮誠至矣然祖宗之意不以是而止也蓋生長侯王之第不知政事稼穡之難豢養富貴之勢不知詩書禮樂之訓是以記室之除必擇良士寶訓太宗以王龜從王素畢士元張茂貞充諸王府記室參軍謂之曰諸王生長深宫未知世務必資良士贊導為善使日聞忠孝之訓卿等皆謹恪有行各宜勉之翊善之命必戒迂儒元儼年少尤資訓導翊善成維迂儒循默崔昈性頗嚴以之代維庶有補益王府侍講謹選德行之人四朝國史鄭穆為岐嘉二王侍講府僚缺員陳襄請擇人神宗曰如勤修德行乃宜左右王也任三年一滿非公事不至執政之門講説有法可為勸戒宫院教授亦須端慤之士仁宗嘗曰諸宫院教授非止講習經旨亦須選履行端慤者於是以張維翰充則善心日長也一大長宗正之職既有宗正又有同知職源國朝宗正寺掌敘宗派紀屬籍以昭穆定親踈元豐六年詔宗正事長二不專用同姓蓋自有大宗正寺掌皇族宗乂皇祐三年初置宗正司以寧江軍節度允遜知大正事章化軍留後守節同知大宗正事時諸王孫衆多既聚居睦親院故於祖宗後各擇一人訓導糾違失凡宗族之政皆令關掌崇寧元年增置同知大宗正事一員以宗惠領其職一外宗正之職既有宗丞又有宗簿職原崇寧元年蔡京申請宗室既許分居兩京輔郡乞於兩京置外宗正司擇宗室之賢管幹於本州通判職官內選二人兼領丞簿中丞南外置司泉州西外置司福州丞係倅兼簿係僉判兼紹興亦有宗司乾道七年省紹興宗司𨽻行在置四門宗司則畏心日生也夫示之恩寵以養其身加之訓督以養其心則陶和育粹皆漢河間唐江夏也自今觀之其勤於學問則有手抄經史百家者興國團練使德文少好學凡經史百家手自抄王為文雅上以其刻勵如諸生嘗因進見戲呼之曰王秀才由是宫中悉稱之上封祀德文表賦頌上每賜之詩有上詩賦十卷者寶訓夏竦擬試詩賦論十卷上之請與進士赴廷試上曰宗子好學亦朝廷美事命學士院召試三題有以文章第進士者寶訓皇祐中叔韶所為文召試學士院賜進士及第入謝上曰宗子好學無幾爾獨以文章得進上第前代宗子無有也其忠於規諫則有所獻多忠言者荆王元儼性喜儒學在宫中時孫奭為侍講平日與論經藝王病上親至臥內屏人語久之所獻多忠言有所上關治原者寶訓右神武大將軍宗諤上治原十五卷上曰宗諤採實録祖宗所行善事而為書意在規諫亦宗室之良也有論新法而感泣者聞見録神宗岐王至太皇太后宫太皇太后曰吾聞民間甚苦新法宜因赦罷之王安石怨之者衆不若出之於外帝曰羣臣推安石能橫身為國家當事耳峧王曰太皇太后之言是也帝怒曰是我壞天下耶汝自為之岐王泣曰何至是皆不樂而罷其嚴於律己則有自奉儉薄者從積奉已儉薄嵗時祿賜博置珍異物獻於御厨動以萬計有性謹寡欲者荆王元龍多蓄書好為文性謹約寡嗜欲長編有事親至孝者新平郡王宗保奉母康氏至孝母或遣人至雖賤必衣𢃄見之康氏好方書每歲以錢十餘萬為藥以施疾者母死宗保歲歲為之每制藥必涕泣追慕至若國步多艱之秋策勳社稷中興有功伸威絶域聞者起畏屹然有宗強之勢此尤為宗籍之榮也信王忠義堅如金石擊敵慰民兩河響應猶繫人心於如線中興本末二聖北狩諸親王皆從獨信王榛至慶原府遁歸趙邦傑馬曠率兵擊敵奉信王為首兩河響應榛奏曰邦傑與曠忠義之心堅若金石臣陷敵中頗知其虛實賊今稍隳皆懷歸心望朝廷早遣兵來援其氣槩之英發威望之赫奕豈一朝一夕之所致哉噫凡今之人莫如兄弟此上人之責也懷德惟寧宗子維城此臣下之責也戚畹周因申伯而戚畹始有任職之選是時也以賢而不以親詩秦任穰侯而戚畹始有竊政之弊是時也以親而不以賢穰侯太后之弟秦昭王之舅時用為相專政用事通鑑嗟夫扳援肺腑未免縱侈之習依憑城社或有專恣之權苟不痛懲力革則其弊有不可勝言者故漢自吕氏顓權産祿怙勢白馬盟寒爭疏王爵棯成北軍之變吕后紀及王陵陳平傳王氏根據莽鳳長姦垂涎漢鼎舉朝不問卒致篡奪之患王莽傳此雖吕王之罪亦漢人抑制無法也唐自三思鄙夫怙恩昭儀氣使縉紳勢傾朝野於是有諸李殱滅之禍武后髙宗立為昭儀髙宗崩武后聽政武三思日橫後武后盡誅諸王宗室國忠小人托愛貴妃中外傾附倚為太山於是有胡雛唱亂之兵楊國忠以貴妃故為右相公卿以下莫不震懾張彖曰君輩以楊右相如太山吾以為氷山耳初安祿山以李林甫狡猾故畏服之及國忠為相祿山以是有隙遂反此雖武楊之罪亦唐人寵任太盛也推原其由其亦秦人作俑之過乎嗚呼竇長君少君其質甚美彼灌絳猶選士之有節行者為之師傅賔客竇嬰傳東都四姓小侯立學且拳拳於姻戚之教後顯宗立四姓小侯學教導國戚然則外戚其可無訓導裁抑之法歟嚴矣哉國朝之法也魏咸信更立行陳本功臣也而晚年方有使相之除天聖四年上謂輔臣曰駙馬都尉柴宗慶求為使相何如王曽曰先朝石保吉魏咸信皆歷行陳有勞晚年方除使相將相之任豈容私情上曰卿等可召諭之向傳範典郡有聲本賢守也而當時且靳鄆州之命治平四年十一月知潭州向傳範改知鄆州諌官楊繪言傳範后族不當領安撫樞使文彥博曰傳範纍典郡有政績故授此非緣外戚上曰諌官如此言甚善可以止他干請也其吝於用賞如此不獨上之人為然張堯佐遷宣徽使包希仁抗疏力爭皇祐二年三司使戶部侍郎張堯佐為宣徽南院使淮康節度使景靈宮使又加同羣牧制置使知誎院包拯乞追還恩命王舉正為中丞亦言堯佐一日而除四使乂賜二子科名不當以後宫踈漏庸常之才過受寵渥不報舉正留百官班庭爭堯佐亦辭宣徽景靈使乃詔學士貼麻處分曹佾拜中書令吕公著執奏不可元豐三年上以慈聖光獻故大推恩曹氏於后為兄弟行轉三官子行兩官孫行一官且欲以佾為中書令吕公著言正中書令宋興以來未嘗除人况不𢃄節度使即宰相也上曰此誠闕典第不如是不足以稱厚恩公著固爭乃以節度兼中書令是其臣吝於用賞亦然也杜彥圭販易免征未害也至有鄱陽之行饒州防禦使杜彥圭太宗時圭遣親吏於秦隴間市竹木過度免其役既至又多其直市於官即責授饒州刺史彥圭乃昭憲皇太后之姪也王繼勳或有戕暴未甚也且有登州之貶王繼勳孝明皇后之親弟官至彰德軍節度觀察留後太祖以戕殺奴婢削奪官爵乃配登州其嚴於用法如此不獨上之人為然思永有過有司奏之紹興元年宰執奏有司勘到偽造告身事連知閣門潘思永上曰雖戚里既有過安可廢法於是令罷閣職士曈落職宰相論之紹興三年宰執奏戚里髙士曈乞落階官及差遣詔除客省四方館公事仍轉一官上曰士曈宣仁近親故優異之然不可躐等朕於外戚未嘗假以恩澤今後宫之家未有過保義郎者是其臣嚴於用法亦然也用賞既吝則驕汰之習戢用法既嚴則敬畏之心生君臣上下更相告戒其為慮逺矣不特此爾自古椒房未有不私其親今也外家有求髙后手札曰二髙不得干請也英宗宣仁皇后髙氏嘗修北宅以奉親其母兩國太夫人入謝且請置潛火一鋪髙后手札戒二髙不得干請其家至今寶藏之元舅加恩太后面諭曰外家不可增長也元祐七年三省言景祐七年李用和等改官移鎮恩例今髙氏朱氏皆舉故事加恩太皇太后曰章獻垂簾初無此例吕大防曰太皇太后以髙氏故深自抑畏如故事何后曰外家恩澤方欲裁損可又增長乎大防曰此盛德事也又不特此耳自古戚里未有不自榮其家今也李遵勉奏請納祿力辭錫賚駙馬都尉李遵勉屬疾奏請納祿車駕臨問賜白金五千兩不受王貽永求罷輔政欲逺權利至和元年樞密使彰德節度同平章事王貽永數以疾求罷去本朝外姻未有輔政者貽永在樞十五年常逺權利歸第則杜門謝賔客人稱其謙靜噫椒房抑逺裁制既無私親之心戚畹謙靜退抑復無貪祿之態宜乎陶和育粹折節卑禮有古人之風歟古今源流至論後集卷九
