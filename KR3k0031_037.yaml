body:
  text: 古今源流至論别集卷七宋黃履翁撰備邊漢之邊防簡於髙文而詳於武帝之世唐之邊防密於太宗而踈於元宗之後夫自簡而詳者非曰得率然首尾相應之勢也武帝喜功之過也自密而踈者非曰得護風寒數處之要也元宗而下不知備邊之道也蓋漢自髙祖平城之圍以胸奴數侵代地遂北置雲中郡以備之高帝十六年詔代居常山之北與夷狄邊趙乃從山南有之逺數有胡冦難以為國頗取山南太原之地益屬代逮至髙后孝文胸奴知北邊有備於是自隴西北地入髙后六年胸奴冦狄道道屬隴西又文紀二年胸奴入北地然漢之邊防亦不過此爾自夫武帝好大喜功始自遺禍而入冦之路始廣不出上谷元朔二年元狩六年征和二年則出定襄代郡自馬邑軍後五嵗之秋漢使四將各萬騎擊胡關市下將軍衛青出上谷公孫敖出代郡明年李息出代郡其明年春復遣衛青將六將軍十餘萬騎仍再出定襄數百里其後又通西域欲以斷其右臂西域贊孝武開玉門關通西域以斷胸奴右臂而單于之兵反自其所置之郡而入然後漢兵往來於秦凉之北而不得息夫東之於遼西北平西之於張掖酒泉中之於定襄鴈門疆場廣莫靡有定所有不勝其為防者豈非武帝有以速之耶唐世胸奴之患莫甚於吐蕃太宗之初為之防患矣天下十道分置都督而隴右一道乃居其八地里志秦渭凉西四州中都督府鄯流沙四州下都督府天寶之初昜為節度天寶元年置十節度經略以備邊而隴西節度之兵凡七萬五千又附以劒南三萬九百人通鑑隴右節度治鄯州兵七萬五千人劒南節度治益州兵二萬九百人其為西戎之患豈不極至自夫河北難作兵皆東徙其後吐蕃乘虛內侵唐肅宗即位吐蕃助討祿山大掠東都代宗即位以十萬向塞不數年間隴右數十州相繼陷沒豈非謀事之踈以至是邪然嘗論之漢之失於喜功唐之失於寡謀固不免有備禦之難而能經略邊事使夷狄尚不敢輕視中國亦不為無䇿也本始中胸奴常帥十餘萬騎南旁塞以冦而趙充國乃將四萬騎屯沿邊九郡單于聞之引去夫以四萬騎分屯九郡而充國乃總領於其間非老將為謀之審耶趙充國傳古曰九郡者五原朔方雲中代郡鴈門定襄右北平上谷漁陽也四萬騎分屯之而充國總領太和中李德裕建籌邊樓於劒南四川按南道與蠻相入者圖之左西道與吐蕃按之右而弓弩甲胄人皆其素備總十一軍而作仗義城作禦侮城作柔逺城二邊浸懼南詔東服夫以十一軍皆雄邉子弟而制二邊非德裕之善謀殆不能也李德裕傳德裕知劒南西川蜀自南詔入冦民失職德裕至則完城創治乃建籌邊樓按兩道山川險要與蠻相入者圖之右與吐蕃接者圖之右又請甲人於安定弓人於河中弩於祁西由是蜀之器械皆犀利率户二百人取一人使習戰謂之雄邊子弟總十一軍築仗義城禦侮城柔逺城於是二邉浸懼南詔請還所俘掠四萬人嗚呼使漢唐任禦邊之寄皆如趙充國李德裕之謀又何西北之足憂哉然觀漢之單于鳴鍾渭橋貢琛漢廷不至如前日陸梁之態而唐之吐蕃南詔相挺為患卒與唐終始者豈非漢之備邊之䇿周思曲慮不若唐之踈略耶夫發武庫以贍邊兵食貨志邊兵不足乃發武庫二官兵以贍之發少府以給邊費賈捐之傳臣切以往者羌車之暴師大司農錢盡乃以少府禁錢續之北邊諸郡特藏兵器漢成帝紀注如淳曰漢北邊郡庫官之邊器所藏欲置令西北二邊分養苑馬漢儀注太僕牧師諸苑三十六所分布西邊北邊其備甚悉矣徙邊之民廪給衣食朝錯傳陛下幸憂邊境豫冬夏衣廪徙民實邊北邊騎士軺車不算前食貨志率緡錢四千算一非吏比者北邊騎士軺車不算邊民被害飢寒相失則天下共給其費蕭望之傳金布令甲日邊郡數被兵難飢寒天聖六年父子相失令天下共給其費六郡良家子則給以期門羽林之選地理志漢興六郡良家子送給期門羽林以材力為官將多出名焉其恤邊優矣內郡有守有丞而已邊郡又有長史以掌兵百官表上郡守秦官掌治其郡秩二千石有丞邊郡有長史掌兵馬內郡之縣有令而已邊縣則又置障塞尉後百官志邊縣有障塞尉其設官又備矣彼唐之區畫備禦果若漢之詳且盡歟毋怪乎唐之邊患三百年間之無寧嵗也舉主擇於先而責於後擇舉主於未用之先責舉主於已用之後此古今薦舉之良法也方人才之未用某才之可使歟某德之可任歟固難知其賢否之實吾惟擇舉主於其先俾盡其推轂之誠則得矣及人才之已用其果賢歟未賢歟某果效歟未效歟固當施其升黜之權吾惟責舉主於其後以嚴其連坐之法則得矣擇之於其先而人知所勉責之於其後而人知所懼則舉親舉讎但守公道不敢以名器為房奩之物薦賢報國願盡臣職不敢以私恩為桃李之地夫如是安有所薦之不實哉嘗觀漢唐盛時薦舉之法最為得體尚髣佛古人之遺意漢法郡國可薦終軍傳濟南人太守聞其材甚竒之公府可薦假㑹宗傳五府舉為西域都護騎都尉為師者亦可薦叔孫通傳通為奉常通曰通有諸弟子儒生隨臣久矣願陛下官之帝悉以為郎其薦賢之路亦寬矣夫薦賢之路寬意其有冗濫之弊然吳公薦賈誼賈誼傳河南太守吳公聞誼秀才召置門下王商薦鮑宣鮑宣𫝊大司馬衛將軍王商辟宣薦為議郎叔孫通薦兩生本傳皆不失為獵獵聲名之士抑何耶唐法有薦舉餘四十人者出唐書杜淹參預朝議所薦嬴四十人後皆知名有薦疏至三十人者李吉甫執政謂裴垍曰此日人物吾不知為我言之垍即薦略疏三十人吉甫薦于朝天下稱得人其薦賢之數亦多矣夫薦賢之數多意其有混淆之失然杜淹所薦而後皆果爾知名見上本傳李吉甫所薦天下稱為得人見上往往無幸位之弊又何邪愚嘗熟考其由切觀貢禹上疏元帝曰首相選舉不以實及有贓者輒行其誅亡但免官本傳云云則爭盡力為善進真賢舉實應而天下治矣其責舉主之罪為甚嚴又觀元宗敕京官刺史四府上佐各舉縣令一人視其政善惡為舉者賞罰通鑑元宗九年敇京官五品以上外官刺史四府上佐各舉縣令一人視其政善惡為舉者賞罰其責舉主之法為甚詳夫惟罪之甚嚴責之甚詳為舉主者將盡心於薦賢之職此無妄舉彼無幸進又何疑其路之寬而數之多也然合漢唐論之而漢法又嚴於唐舉獄吏有贓者貶秩嚴顔年傳舉茂才不實者削戶張湯傳張湯與張勃交髙其能元帝詔舉茂才勃舉湯司𨽻奏湯無行勃選舉故不以實坐削户舉方正失禮者左遷何武傳武坐舉方正所舉者召槃辟雅拜有司以為詭衆虛僞武坐左遷此漢之得人也有由矣國朝用人之法一則曰舉主二則曰舉主視漢唐又逺過焉太宗嘗語大臣曰若更不擇舉主何由得賢太宗寶訓上謂輔臣曰若不擇舉主何由得賢人真宗嘗語近臣曰不若先擇主以類求人真宗謂李至曰凡所舉官多聞謬濫不若先擇舉主以類求人此祖宗之明訓也富鄭公曰有德者然後知人之德有才者然後知人之才歐陽公曰廉者舉清廉贓者舉貪濁此先正之格言也仁宗朝歐陽公論法舉者廉者舉清廉贓者舉貪濁私者舉請求餘見仁宗朝經濟録上以是告乎下下以是請于上其講明薦賢之道盡矣舉京朝委之蘇昜簡陳恕淳化四年詔蘇昜簡陳恕冦凖等采之於幕職州縣官由舉堪充京朝官一人舉御史委之樂黃自陳知微天僖二年詔樂黃自陳知微於常參官舉材任御史者一人舉三司判官則委李昉太宗太平興國八年舉監司則委張知白天僖四年詔張知白等十二人舉監司夫以薦賢之責而切之平時素所稱重之人其得人可知也然祖宗非徒輕委也嘗觀乾德之詔曰除授之制書舉主姓名或不如舉者並連坐也乾德五年詔翰林學士及常參官舉堪充升朝官一人除授之制書舉主姓名或不如舉者並連坐之其切責之意甚嚴也是故吕祐之舉東野日宣坐徇親而貶太平興國四年舉主許陳首詔吕祐之舉堪充朝官各一人先是祐之坐舉妻弟東野日宣貶秩上曰此可原前過取之夏侯或舉曹利涉坐徇勢而劾曹利涉乃利用之弟為趙州都監倚勢誅劾始夏侯彧等三十二人薦上命劾之後贖金以戒繆舉崔能之任即墨未滿嵗移職則罪舉者之欺蔽太平興國六年魏羽上言曰瀛州録事郭進十年不代河間令崔能言前任即墨未滿嵗移秩選任失於平均願罪主者以肅欺蔽太宗曰上言若此可貴也路垣之令餘杭貪墨敗露則劾漕司之妄薦仁宗朝大理寺丞路垣之為餘杭令貪墨上命追官運使等薦垣為京官並劾之連坐之法嚴則薦賢之意公正澄源正本之論雖然責之固重矣而褒之未嘗或後也太宗曰濫舉者既懲其過所得實者當議酬奬皇朝要覽淳化四年太宗曰云云吕蒙正曰陛下分功過明賞罰盡至公之道足以激勸以此諭下人誰敢私舉乎陳堯叟曰所舉之人若任用後顯有器能其舉主特與酬奬㑹要咸平四年馮拯陳堯叟曰所舉之人若任用後顯有器能明著績用其舉主特與酬奬不如舉主即依法科罪以此告君人孰不知勸乎陳升之任執政不敢私薦一士職方郎中胡枚除知興元府殊自失歷干執政皆不及復謁升之求薦升之辭以備位執政不當私薦一士謝泌為諫議未嘗妄薦一人諫議謝泌居官不妄薦士或薦一人則焚香捧表望闕再拜所薦雖少無不顯名罰以懲其過賞以旌其能是以人人自勉不至植私恩而廢公道也抑以論之薦人者固當任乎公被薦者尤不當干以私劉器之不通書政府乃所以能擢溫公薦劉器之充館職因謂曰知所以相薦乎器之曰獲從公遊舊矣曰非也光居閒足下時節問信不絶位政府足下獨無書此所以薦也吕舜從惟勤於職事乃所以求知吕希哲語人曰自少守官未嘗干人薦舉仲父舜從守官㑹稽或議其不求知者仲父曰勤於職事乃所以求知也噫薦人者既公所薦被薦者不私所干又何患薦舉之失職也昔陳襄薦司馬溫公而下三十三人剡章遺墨炯炯不磨紹興天子特為賞音嗚呼安得薦人如古靈被薦如溫國以為異日之美談哉紹興元年詔曰近得陳襄薦章草起司馬光而下三十三人德行言語政事文理皆所具備今宣示百辟卿士可亦各舉所知得其人當受上賞其或不當宜坐罰章服論古今章服異同西漢輿服之制史不立制一代制度漫不可考故後世莫傳焉然觀夏侯勝傳經術茍明取青紫如拾地芥顔注以此為卿大夫之服本傳顔注又觀張敞傳自謂備皂衣二十餘年如注以此為朝臣之服本傳敞謂備皂衣二十餘年如淳注曰群臣雖有五時服至朝皆有皂衣及按百官表有金印紫綬有銀印青綬百官表上丞相太尉金印紫綬秩比二千石以上銀印青綬曰青紫者蓋謂此顔氏豈以印綬亦可言服耶是則朝用皂衣蓋漢人之定制而謂青紫者非也正戰國䇿所謂得補黑衣之數鄭國風注所謂緇衣卿士之服漢之所用源流已久矣不然谷永自太常擢光祿大夫自言擢之皂衣之吏厠之群臣之末又曷以是言哉戰國䇿左師觸龍見趙太后云老臣賤息舒祺最少願補黑衣之數以衛王宫又云國風緇衣云緇黑衣卿士朝之正服又谷永奏正謝王鳳云云漢制簡矣姑舉大略且以唐與我朝章服之制論之唐制其服則三品紫四品五品朱六品七品緑八品九品青馬周傳先是品官舊服止黃紫於是三品服紫四品五品朱六品七品緑八品九品青其魚袋則髙宗時五品以上用銀三品以上用金唐車服志髙宗給五品以上隨用銀魚袋以防詔命之詐出內必合之三品以上金飾袋中宗時郡王始佩魚特進亦佩魚中宗初罷龜袋復給以魚郡王嗣王以佩金魚袋景祐中令特進佩魚自此始舊檢校試官不佩至開元亦給之中宗時員外郎試檢校官給玉佩矣開元初五品以上檢校試官皆佩矣舊致仕者不佩至張嘉正亦賞之中書令張嘉正奏致仕者佩魚終身自是百官賜緋紫必兼魚袋謂之章服同上張嘉正致仕亦佩魚自是賞緋紫必兼魚袋謂之章服賞時服朱紫佩魚者矣此沿革之制然也國朝之制其服則舉子以白紵品官以緑衣章服以緋紫石林燕語國朝以緋紫為章服故官品未應得服者雖燕服亦不得用紫太平興國中李昉請禁品官緑袍舉子白紵下不得紫色衣其魚袋則故事學士得服金帶而非學士得服始於薛師正石林燕語故事惟學士得服金帶熙寧初薛師正以天章閣待制權三司使上以為能詔賜金帶非學士得金帶自此始故事武辨不佩金魚而武辨亦佩始於陳堯咨通鑑國初升朝官服緋緑後二十年者叙賜緋紫內出金魚以賜近臣親王武臣內職將校皆不帶又澠水燕談陳堯咨以龍圖閣學士換觀察使曰諫臣本儒生今昜武辨願佩金魚以示優異詔從之學士而重戴淳化制也楊文公談苑重戴者大裁帽也淳化初宰相學士五品以上皆令服之王元之謝表云頭有重戴謂為翰林學士也燕語謂公卿既有繖又有戴謂之重戴學士而重金元豐制也燕語舊制學士以上賜御仙花帶不佩魚惟二府服笏頭帶佩魚謂之重金官制行始詔佩魚故蘇子瞻謝表玉堂賜篆仰淳化之彌文寶帶重金佩元豐之新渥罷政而仍舊服大觀制也㑹要大觀元年吳居厚數請老不許以為資政殿學士東太乙宫使故事罷政當時所賜髙品今特恩許仍舊服遂著為令自居厚始此沿革之制然也然嘗論之明庶以功車服以庸古人所以重報功之典彼其之子不稱其服詩人備譏其無德焉吾觀唐初之所辭受我朝之所豫奪其意猶古也溫璋為大理丞賜以緋衣以審獄得情也溫璋傳纍官大理寺除平吏盜官物而焚其帑璋刺得其情賜緋衣遷婺州刺史牛叢為睦州刺史力辭金紫以越等不宜也本傳叢以司勳員外郎為睦州刺史賜之金紫叢以為越等不敢當於是賜緋陽城以處士而賜緋衣非過也所以旌逸德之髙陽城傳德宗召拜城右諫議大夫城褐衣至闕下辭帝遣中人持緋衣衣之李泌以山人而賜金紫非僭也所以表異能之美肅宗即位靈武泌謁見衆指曰著黃者聖人白者山人帝聞因賜金紫拜元帥廣平王行軍司馬夫受之者不以為䙝恩辭之者不以為矯情正唐人别功過之美意也以三品服賜楊安國以五品服賜趙師民重儒臣也通鑑慶歷四年侍講楊安國為直龍圖賜三品服崇政殿說書趙師民為天章閣侍講賜五品服以三品服賜王素以五品服賜余靖歐陽修蔡襄寵諫臣也同上慶歷三年賜知諫院王素三品服余靖歐陽修蔡襄五品服面諭之曰卿等朕所自擇故有是賜曽致堯之浮躁不可錫以章紱則奪之寶訓曽致堯為經略判官賜金紫上言願不受章紱之賜真宗曰致堯辭㫖狂躁不可不責仍奪其服王文度之伎術不可加以佩魚則抑之寶訓天聖三年翰林待詔王文度摹勒真宗御書得紫服且求佩魚仁宗曰先朝命伎術官無得佩魚所以别士類也宜必明之夫豫之者不以為徇情奪之者不以為少恩正我朝寓勸懲之微權也愚之所惜者唐之後代不守舊典以章德寵功之制輕舉妄用而良法掃地矣沈佺期以弄辭而假牙緋沈佺期傳佺期兼修文館學士既侍宴詔學士等舞回波佺期為弄辭帝悅遂假以牙緋路應以有恩於李泌而賜金紫何濫哉本傳永穆公主生子潛三日而賜緋衣銀魚本𫝊魚朝恩養息令微服緑不候帝賜而令服紫以謝本𫝊何䙝哉此唐之不及我朝逺矣愚故併論其始末云變更持守變更持守不可偏為治之術有二喜作為者尚變更樂因循者貴安靜嗚呼何其持論之偏處心之私耶蓋天下之治非其蹈常襲故之為難而以運用變通之為不昜非其紛更多事之為可喜而以救弊而歸於中道之為可尚有改制之名而亡變道之實因更化之術而得善治之道夫如是能革一時之弊而不失立國之意矣大抵天下當無事之時國家之法度昭如日星祖宗之人民固如磐石於於此時而為改絃之舉君子謂之踈天下當積弊之後變更起於意料之不及而弊源鼠穴事功隳於上下之偷安而世變波流於此時而為膠柱之說君子謂之陋是以善守法者不見其垢玩因仍之習而自足以享經久悠逺之利善革弊者不見其紛更變亂之迹而自足以致安强平定之功以鳬鷖持盈守成之規模而為車攻興滯補弊之事功則為治之術得矣漢唐陳迹類能言之請以國朝之事詳述焉我朝自建隆以來其論有四興國以後持守之論甚堅而不聞變更之術景祐以來變更之議雖紛而力為持守之道熙寧則以持守為可厭而過為變更之說元祐則以變更為可鑒而不失持守之意此二百年間為治之術然也昔我藝祖削百年之根據合數世之瓜分社稷乂安紀綱修明官莫重於三省而置給舍兵莫重於殿岩而歸樞府財用布中外而總三司吏治在州縣而置監司貂璫謹畏無唐人監軍之弊戚畹廉恪無漢人預政之嫌臺諫持天下之平士夫守天下之論國家尊嚴凛然太阿之出匣天下鞏固屹若泰山之四維太宗以道治天下真宗以文安天下大臣以重厚鎮風俗士夫以安靜守家法更張之議一切不用李文靖以此報國也李文靖公沆為相凡建議務更張喜激昂者一切不用每曰用此報國嗚呼賢相思慮逺矣王荆公為相置條例司論天下利害盡變祖宗法豈如趙中令李文靖得為國之體也改作之戒務作故事王公旦以此為相也長編王旦言宋興三世祖宗之法具在故其為相務行故事慎所改作真宗信之所言無不聽吕公蒙正曰制度不可更也長編淳化三年上謂宰相言治國之道在乎寬猛得中吕蒙正曰老子稱治大國若烹小鮮擾之則亂近日上封求更制度者甚衆望陛下漸行清淨之化胡公宿曰庶事不可更也長編嘉祐六年胡宿為樞密副使宿謹重而當重任願惜大體羣臣方建利害多更張庶事宿曰變法古人所難不務守祖宗成法而徒紛紛無益於后也是時也持守之論甚堅而不聞更變之術仁宗景祐以來簾帷雖預事而臺諫之公論不少恕內降雖干恩而大臣之封還不少假儂賊雖擾而人心之本愈固西北雖警而邊帥之威甚伸庶官求恩澤則戒之內之紀綱未嘗不正也杜衍抑絶僥幸凡內降積至十數則節封而面還之上謂歐陽修曰外人知杜衍封還內降耶吾居禁中有求恩澤者每以杜衍不可告人而止者多於所封還也其助多矣監司有不才則去之外之紀綱未嘗不嚴也范文正公為參政患諸司監司不才更用杜杞張昷之輩公取班薄視不才監司姓名一筆勾之富公曰則是一筆安知一家哭矣公曰一家哭何如一路哭耶然大而廟堂次而縉紳又次而草茅往往悼法制之不立傷政事之少弛而我仁宗寧處於舒緩之勢而不敢有嚴刻之政寧拂變更之請而不敢傷積纍之業法制不立富弼言之富弼作政要序云近來紀綱甚紊蓋法制不立而淪胥至此也法令不行劉敞言之知禮院使吳充坐謫罰禮生去官劉敞奏朝廷久安吏困因循稍激厲盡職未知如何而使充得罪大臣依勢作威政事不平如此望陛下且收攬威權無使聰明下蔽法令不行蘇軾則有蕩滌之請蘇文何剡則有威柄之說長編仁宗以治體為念而一切置之是時也變更之說雖紛而力為持守之道熙寧以來大臣不念家法而為紛更之舉謂祖宗不足法而輕昜百年之舊章謂一月一變法而妄立一時之新政吕惠卿雇募之法行而役法壞保甲之法行而兵法壞經義之法行而科舉之法壞青苗之法行而賦斂之法又壞天子有變法之悔而安石不之悟同列有變法之譏而安石不之悟是時也以持守為可厭而過為變更之舉元祐以來大臣拯溺救焚而力還祖宗之舊詔彥博居平章而鑒前日少年之輕鋭元祐元年詔文彥博曰卿踐更二府弼亮三朝名聞四夷功在天下注想元老渴見儀刑宜疾其驅副我虛寧詔書到日可肩輿赴闕特授太師平章軍國事用李常為户部而革前日俗吏之征榷元祐元年吏部侍郎李常為户部尚書用文士掌邦計則天下知朝廷非急於征利去保甲而軍心安罷新學而士心正除青苗而民心固窒邊隙而夷狄之心服是時也以變更為可鑒而不失持守之意切嘗論之興國間國勢方强治體方定如人處富盛之初規模尚新器用尚精不過安居堂奧優游嵗月而已此變更之說不行也景祐間國勢雖弱而人心和治具雖弛而邦本强猶人席富庶之餘上下和睦用度充足特其屋宇朴陋臧獲遲鈍耳未敢撼搖其本根此變更之說亦未行也熙寧間固不能堪其悶悶之政然事之未舉者舉之而已矣勢之未振者振之而已矣豈容伐其本根此如人處積痞之餘精神不運風采不足特以良劑徐理之一旦遽投烏喙之藥幾何不傷其夀哉元祐間蓋不勝其紛紛之病一弊之未去必去之一害之未除必除之不暇為揖遜救焚之謀此如人之痼疾必使疾根之盡除茍或謂勿使遽愈姑留其根幾何不貽其患哉嘗謂景祐守興國之規模雖過於安靜不害其為景祐元祐革熙豐之法令雖遽於變更不害其為元祐愚之所惜者元祐變為紹聖紹聖變為崇觀紹述一語甲唱乙和莫助兩圖左序右列天下之事去矣所幸天意祚宋聖君中興紹興淳熙相繼復舊駸駸有景祐元祐之風不愆不忘率由舊章愚不勝惓惓於今日古今源流至論别集卷七
