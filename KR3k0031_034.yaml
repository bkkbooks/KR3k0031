body:
  text: 古今源流至論别集卷四宋黃履翁撰厯代人才論厯代人才得失愚嘗考論古今人才髙下矣西漢當取其守大義不當取其務長者東都當取其循正道不當取其尚竒節三國處僣竊之時當考其心術兩晉承浮誕之俗當貴其氣槩唐人襲華靡之文當求其德行至國朝興國以後時則在保治其人皆務大體景祐以來時則在任事其人皆持公心元祐之間時則在革弊其人皆守正論此權衡人物之公論也方西漢懲鞅斯峻刻之弊曹相國以清淨浚其源周絳侯以重厚𨗳其流萬石君東陽侯張廷尉以長者揚其波議論寬厚恥言人過守繩尺遵規矩謙謙然君子長者之風然恭遜有餘挺操不立能革曩時之刻薄而不能禁末年之委靡是故身居相位持祿固寵張禹孔光名為宗臣厥角稽首劉歆奴顔婢膝諛唇佞舌俔俔伈伈無敢出一語豈非長者末流之弊而君子所喜稱者汲黯正色淮南寢謀本傳劉向抗疏奸臣沮氣本傳使立漢之本朝者皆若而人則斗筲之莽必不敢垂涎漢鼎惜夫蘇文忠公所謂西漢大臣徒守尋常及其衰也靡然如蛟龍釋其風雲之勞而安於豢畜之樂終以不悟者是也東坡上韓太尉書西漢之間其大臣守尋常而不務大略東漢之末士大夫多竒節而不循正道元成之間天下無事公卿將相安其祿位顧其子孫各互植私恩買田宅為不可動之計低回畏避以茍嵗月而皆依附儒術六經之言而取近似者以為口實孔子曰惡居下流而訕上惡訐以為直而劉歆谷永之徒又相與彌縫其闕而緣飾之故其衰也靡然如蛟龍釋其風雲之勞而安於豢畜之樂終以不悟使其肩披股烈登於匹夫之爼豈不悲哉東都鑒光禹委靡之弊嚴光以髙節唱之李固杜喬以清名和之李膺范滂之徒又以橫議群而咻之身負重名口􅋦清議壁立萬仞凛然有不可犯之色然虛名相尚實效無補能立一時之風采而不能夀四百年之命脉是故刋章誅捕立禁根連朋舊屏迹忠義飲恨人之云亡邦國殄瘁漢之大勢去矣豈非竒節末流之失耶君子所喜道者黃憲淵乎似道圭角不露申屠蟠見幾而作不俟終日使居東都之末世者皆若而人則漢祚亦不至相繼而亡惜夫司馬溫公所謂黨人生亂世而以口舌救之撩虺蛇踐虎狼士類殄滅而國隨以亡者是也通鑑論申屠蟠黨人生衰亂之世不在其位四海橫流而欲以口舌救之臧否人物激濁揚清撩虺蛇之頭踐虎狼之尾以至身被淫刑禍及朋友士類殄滅而國隨以亡不亦悲乎夫惟郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓乎不可及已三國之人才魏則賈詡實良平之亞本傳賈詡傳少時人莫知惟閻忠異之謂詡有良平之竒杜畿當蕭寇之舉本傳杜畿傳太祖謂荀彧曰河東要地也君為我舉蕭何寇恂以鎮之彧曰杜畿其人也荀攸則顔子寧武不能過張既則南仲吉甫不能踰本傳荀攸傳顔子寧武不能過也餘見張既傳蜀則關張為萬人之敵本傳張飛傳程昱等咸稱羽飛萬人之敵黃忠有冠三軍之勇本傳黃忠傳忠攻劉璋常先登陷陳勇義冠三軍蔣琬負社稷之器本傳蔣琬傳諸葛亮曰蔣琬社稷之器非百里之才龎統非百里之才本傳龎統傳司馬徽稱統當南州之冠冕吳則周瑜可比方叔本傳吳周瑜傳諸葛瑾步隲連名上疏周瑜入作心膂出為爪牙揚國忠義華夏是震雖周之方叔漢之信布誠無以尚呂範可方吳漢本傳呂範傳注忠亮篤直以憂公為先卞護修整加之恪勤與吳漢相類故方之呂蒙魯肅入為腹心本傳吳主以呂蒙魯肅為腹心井寧凌統為牙距井寧凌統出為牙距本傳三方鼎峙羣材輩出功業表表差強人意三國人才不為不多矣然所可稱者惟蜀諸葛亮一人而已不得已而思其次魏之荀彧吳之張昭庶乎可也何者當英雄角逐之秋毛髮絲粟皆為世用徒知有功名而不知有道義徒知有吳魏而不知有漢室亮也出處無愧始終一節忠肝義膽對越神明求之古人則王者之佐董昭請加曹公九錫彧謂君子愛人以德不宜如此曹操挾天子之令以臨吳昭謂天子之命不可與抗求之古人則伯者之佐文仲子名見本傳二子雖不敢望諸葛之高風視諸子為有間矣夫兩晉之人才西晉則有阮籍之志氣宏放本傳阮籍傳容貌瓌傑志氣宏放傲然自得任情不羈而喜怒不形于色王衍之風姿間雅本傳王衍傳神情明秀風姿間雅竹林勝遊遺落世事阮籍王戎蘭亭盛集聳動俗輩王羲之東晉則王𨗳之中興第一賀循之當世儒宗並本傳東山勝遊風流相髙謝安南州望士名價增重顧榮東西相望代不乏人功名事業色色有之兩晉人才不為不多矣然所可稱者惟卞壺一人而已何者當魏末相尚通逹之士輕蔑禮法不事守節徒知有清談而不知有職業徒知有私計而不知有公家壺也忠於事上亷於持身子孫慕王謝之為逹壺則責之逆賊蘇峻之舉兵壺則死之司徒不朝壺奏其罪御史有過壺劾其非兩晉人才捨壺吾誰與歸卞壺唐人當百年清明之㑹則當轉移人心變化風俗乃增設課試窘束天下士於章句之間士夫風俗不本於行已者實自科目纍之但聞唐文之變至於還淳則士夫所急亦可知矣而尚望其忠信習成亷恥道立哉夫王勃楊炯盧照鄰駱賔王之長於文李白杜甫元稹白居易之長於詩沈佺期宋之問之精於文學常衮楊炎之長於制誥杜牧李程優於詞賦挺然於科目之中者不少焉黨永王而名節蔑聞李白附叔文而才猷靡邵栁宗元德行不謹文章何功焉吾之所稱者惟韓昌黎一人而已回異端之狂瀾聳後學之北斗忠犯人主之怒勇奪三軍之氣義可以開衡山之雲節可以馴潮陽之鱷屹為吾道之砥柱其有益三百年之治者大矣此豈區區科目詞章所能染其習哉厯代人才下論本朝人才之盛國朝自興國以來蓬孛軒豁版圖混一紀綱修明朝廷尊安是時也人才皆以保治為念寧取其器質重厚毋寧取其文采可人寧取其操履端方毋寧取其明快如意故沆之沉厚寡言得大臣之體元城論本朝名相最得人臣體者惟李沆沆謂人曰沆在政府無以補報國家但以人主利害一切不行此大似失言然祖宗法極是穩便後人不知水旱盜賊惡逆之事上為之變色謂同列曰人主豈可一日不知憂懼也此兩事最為得體士安之飭躬謹行有古人之風李文定之寬大溫和李迪呂正惠之持重識體呂端畢士安以名節自厲天下稱其清而其亡也帝曰士安君子人也朕東宫以至輔相飭躬謹行有古人之風利害之議束閣不行恐有以害吾治李文靖公為相凡建議務更張喜激昂者一切不用每日用此報國嗚呼賢相思慮逺矣王荆公為相置條例司論天下利害盡變祖宗法益知趙中令李文靖得為國之體也輕險之才擯棄不用恐有以變吾法李文靖寇萊公始與丁謂善薦於李文靖文靖曰斯人才則才矣顧其為人可以在人上乎萊公曰如謂者能抑之在人下乎文靖笑曰他日後悔當思吾言則當時皆務大體何如哉自景祐以來僥幸之門開奔競之風長政事委靡權綱廢弛是時也人才皆以任事為賢寧忤大臣之怒而不肯緘默而不言寧斂小人之怨而不肯詭隨而自徇范仲淹革磨勘之法不以為忤陜西用兵天子以仲淹士望所屬拔用護邉及夷簡罷召還賴以為治然規模閎大論者以為難行任子之恩薄磨勘之法密僥幸者毁謗浸甚而朋黨之論滋不可解杜衍封內降之㫖不以為拂杜衍抑絶僥幸凡內降積至十數則連封而還之夷簡少失諫官至十餘人奏其非呂夷簡因廢郭后事孔道輔十餘人叩鐶伏奏其事夏竦未去廷臣纍十八疏以挫其鋒陜西之警琦則奮發自任賊人為之骨寒契丹之驁弼則慷慨請行遼人為之屈膝三諫之詩傳播中外蔡襄作三諫詩稱余靖歐陽修王素徂徠之誦極談德業石介作聖德詩則當時皆守公心何如哉自元祐以來新法之蠧未去熙寧之根尚存世道荆棘天下茅葦端人正士雨露洗滌是時也人才皆以革弊為心寧去新法之驟而祖宗之典故不忍棄寧逐姦黨之過而朝廷之德望不忍失召呂公著於揚元豐六年揚州召呂公著乘傳赴闕召司馬光於陳元豐八年樞密司馬光為門下侍郎自陳州召還言修身治心之要二老來歸衆正相慶呂公則薦方正之孫覺有守之李常清端厚之劉摯才氣之王岩叟長編元豐八年呂公著薦孫覺方正有學識可充諫議大夫或給事中范純仁徑氣可充諫官或户部侍郎使議青苖等法李常清有守可備御史中丞劉摯資性端厚可充侍御史蘇轍王岩叟並有才氣可充諫官或充侍御史司馬公則薦博學之趙彥若難進之唐淑問明敏之范純仁清立之傅堯俞司馬光薦趙彥若博學有父風內行修飭傅堯俞清立安恬滯淹嵗久范純仁臨事明敏不畏強禦唐淑問行已有恥難進易退范祖禹溫良寬厚修明無缺此六人節操潔正雖不敢遽言大任若使之或處臺諫或侍講讀必有禆益自餘如呂大防王存李常孫覺胡宗愈韓宗道梁燾趙君錫王岩叟晏安正范純禮蘇軾朱光庭或以行義或以文學聞望記其姓名隨器能任使古靈之藁至三十三人長編熙寧九年哲宗初即位古靈陳襄薦司馬公而下三十三人章藁司馬光韓維呂公著乞詔還詞苑或居經幄蘇頌宜居編修孫覺李常范純仁可充侍從蘇軾曽鞏可備文翰尹洙歐陽修注王存顧臨可屬危難林晞可以編撰李師中可當邊帥傅堯俞有諍臣之風胡宗愈文醇行修劉摯置之文館虞太熙可充臺閣程皓可備風憲劉載薛昌朝當置臺閣張載學行修明蘇轍學與文稱軾靜厚過之孔文仲性醇行粹吳育端良質實吳恕器識深純林英有才尚行孫奕士行林旦力行鄒浩操履唐坰才翰鄭俠敢言文德之碑至七十四人紹聖間元祐黨籍自司馬而下百餘人逐州立碑文城曰元祐劉元黨正七十四人餘皆非是諸賢以拯溺救焚之心為改絃易轍之舉詔令一新老稚稱快賢才相望夷狄知畏則當時皆守正論又何如哉愚嘗論之自漢而下人才之不如古者有由也先王造成天下而學校之建師友之傳父兄之詔尊經逹才使之知去仁無所成名卓然內具者與天地同其大則其視天下卑陬瑣隘之趍若凂焉周衰此學之不明久矣故人才不失於委靡則失於矯亢不失於浮誕則失於華彩至國朝科目雖未能頓革前世然自國初止用詞賦體尚淳龎無他破碎士夫心緒尚未多岐而又設三館以養天下之才立六科以用非常之士雲蒸霧滃項背相望庶可比先王觀也噫此愚於此有感於世道之升降歟吳楚人才人才由地氣所鍾嘗聞班孟堅之志地理也論吳嚴助朱買臣之貴顯則繼以章山之銅豫章之金則知吳之人才其亦三吳之氣所鍾歟漢地理志又觀韓昌黎之送廖道士歸衡山也謂白金水銀丹砂石英等物皆不足當其竒意必有忠信材德之民生於其間則知楚之人材其亦衡山之精所産歟出韓文送廖道士夫二子論吳楚之人材必原吳楚之地産意者一氣英靈之粹周流宇宙小則泄之於萬物大則泄之於人材其為物也珍其為人也秀况吳之為郡㑹稽山川之蟠鬱錢塘波濤之吞吐楚之為勢三江五湖之澄徹蒼梧雲夢之宏富誠天地之要區也自非育而為英特俊傑之材發而為疏通洞達之學安能當如是之間氣哉雖然亦嘗䆒其源流乎蓋自僖公元年以前楚未嘗書國春秋魯僖公元年杜預注荆始號為楚自成公十五年以前吳絶不經見同上成公十五年冬十一月㑹吳于鍾離自今始來通于時人才未見史傳自楚莊圖伯之後故仕已無慍子文能之朝覲有圭薳啓疆能言之左昭公五年而人才始出矣自吳子通於上國之後故請觀周樂季札能之左襄公伐楚征越伍貟能任之左定四年又哀元年而人材始見矣嗚呼此未足見其盛也自漢以來吳㑹之區襄沔之間項背相望厯厯可紀向為蛩然之音今為遼東之豕矣故能文則嚴助之策賢良㑹稽邑人舉賢良買臣之言楚詞朱買臣吳人也邑子嚴助薦之召見說春秋言楚詞帝恱之裴欽之翰采足用吳志裴欽傳記翰采足用陸雲之文藻宏麗晉陸雲吳人也能兵則周瑜之走曹操吕蒙之斬關羽本傳魯肅之建獨斷三國志評曰周瑜魯肅建獨斷之明陸遜之有謀略同上評曰豫竒遜之謀略壯節矯矯有國士風范謹華融其人也本傳節槩梗梗有丈夫格潘濬陸凱其人也本傳評曰潘濬陸凱皆節槩梗梗有丈夫格業四明狂客晚節勇退則如知章之恬處賀知章自號四明狂客詔賜鏡湖剡溪曲江湖散人屢詔不至則如龜蒙之髙尚陸龜蒙姑蘇人時謂江湖散人後以髙士召不至剡溪之秦系注老子以自娛秦系天寶末避亂剡溪注老子彌年不出苕溪之陸羽著茶經以自得陸羽上元初苕溪著茶經三篇虞翻陸績以竒偉稱虞翻傳注客有候其兄翻進與書客竒之陸績見袁術懷橘遺母術大竒之吳範趙達以術數顯左傳評曰三子名於其術精矣論諫數百皆本仁義陸宣公之愛君也陸贄傳專對數語敵人知敬趙咨之不辱命也通鑑魏文帝紀得非吳門風物之嘉㑹稽景象之富其發之於人者如是乎冠冕之目士元專於南州而楊慮顯於沔南則以德行名龎顯傳宗族之茂蔡瑁盛於漢末而習氏豪於晉世則以閥閲著晉山簡傳文筆才學辟疆之父子前楚元王𫝊五常並稱馬良之弟兄蜀志馬良傳諺曰馬氏五常白眉最強少者代老鄰人愧謝世文係伯之德與遜也南陔名里以姓命亭尹平浩然孝與賢也九歲屬文有如杜易簡十三屬文有如羅令則何秀發之絶人耶八十而手自校書有如向巨達七十而賢良高節有如張柬之何耆老而不倦耶忠義則郭祖深張悌羅憲或輿襯敢言或忘身徇國或堅守巴東凜然古之烈士材略則向寵柳渾蔡道貴鮑昭或曉暢軍事料敵萬里或拳勇比關張或治績顯太原以挺然時之良能並本傳得非衡山鬱秀之氣海陽雄麗之狀其發之於人如是乎嗚呼此亦未足見其盛也國朝以來教化之所漸染禮樂之所作成天運至是而益盛地産至是而益驗矣故仲淹斥夷簡之非而以諫諍名吕夷簡廢郭后事仲淹與孔道輔伏閣奏之范仲淹姑蘇人純仁游安定之門而以純明稱李豸書劉彛對神宗曰胡瑗明體用之學以授諸生上曰其門人今在朝為誰曰錢藻之淵篤孔覺之純明范純仁之直溫錢公輔之簡諒皆陛下所知也范純仁蘇州人錢藻吳越王鏐五世孫仲淹純仁則姑蘇人也唐欽叟息牂牱之疑而大義昭示事略唐恪字欽叟錢塘人牂牱獻地命恪往諭夷人始疑𠂻甲以逆之恪盡撤兵衛獨將騶卒數十往夷人望見歡呼撤兵聽命恪示以大義咸感泣曰不圖今日得沾聖化以使稱職入為右司員外郎林和靖得孤山之趣而逸德愈高林逋字君復號和靖居士杭州人也隱居西湖之孤山欽叟和靖則錢塘人也封內降之命而幸恩自息則有杜祁公杜衍封內降十餘納之衍越州人也斥奸臣之罪而直氣不沮則有陳賔王事略陳過庭字賔王越州山陰人方臘反過庭言致寇者蔡京養寇者王黼竄二人則寇自平由是責黃州安置杜祁公陳賔王則㑹稽人也以誠事君不喪平生之節則有胡公宿胡宿字武平常州晉陵人常謂同列曰宿以誠事君不忍毫髮欺君以喪平生之節以直去國不失為聖人之清則有鄒公浩事略鄒浩常州晉陵人章惇因廢孟后立劉氏浩上疏極諫除名羈管曽誕曰浩雖不得為知幾之士然百世之下頑夫亷懦夫有立志尚不失為聖人之清也胡公鄒公則毗陵人也以諸賢表表如此豈昔之吳㑹所能望哉晏公殊履身誠實不從丁謂之諂溫公日録晏殊撫州臨川人年十三真宗靣試詩賦除祕省正字令於龍圖閣讀書師陳彭年彭年亦杭州人有文學而奸邪丁謂薦之置上左右使其譽已王安國氣豪玩世力排惠卿之佞聞見録荆公諸弟皆有文行安國有氣豪玩世在人主前不屈已方蘇子瞻下御史獄小人勸上殺之安禮言其不可安國者正直有方一日荆公與吕惠卿論新法安國吹笛於內荆公遣人請學士放鄭聲安國曰願相公逺佞人惠卿愧之晏公王公則居於臨川也歐陽公首唱古文力還三代之體歐文序蘇軾序歐陽修文曰自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡五百餘年而後得韓愈又後二百餘年而後得歐陽子其學推韓愈孟子以達於孔氏折之於至理以服人心故天下翕然尊之曰歐陽子今之韓愈也歐公乃吉州人劉原父博究古簡熟知三代之器行狀劉敞字原父吉州臨江人學問廣博無書不通自浮屠老子及山經地志隂陽卜筮醫藥天文皆究知大略嘗曰歲星往來虛危間當有興於齊者歲餘英宗以齊州防禦使入繼大統在長安得三代時鍾磬器回文字竒古公讀之因以考知前代制度歐公原父則居於廬陵也曽子固長於文南豐自名也曽鞏字子固建昌南豐人于震敘公之文曰南豐先生以文章名天下久矣異時齒髮壯志氣鋭其文章驃騺奔放雄渾瓌偉一何竒也先生自負要以劉向不知以韓愈為如何耳黃魯直長於詩江西所宗也事略係年録紹興七年上曰蜀中之士多學蘇軾父子江西之士多學黃庭堅張俊曰大抵耳目所接師友淵源必有所自以諸賢之挺挺如此豈昔之荆楚所能及哉噫是雖地靈人傑之所致亦聖朝㴠養培植之功也况今黃旗紫蓋運在東南時雨將降山川滃浡挹勝地之英精想前修之遐躅又彬彬於翠華南渡之後張九成杭人也鯁論自許力斥逆豫而不顧禍變之臨胡銓江西人也忠義自守痛排奸檜而不恤遷逐之苦此其變化士風培植國脈又不少矣或者則曰姑蘇有丁謂三吳之恥也臨川有安石全楚之纍也嗚呼以此議二子可也以此議吳楚可乎今之君子當以諸賢為勸以二子為戒云儒學同異胡邵程氏本同道言經學者主安定言數學者主康節言理學者主二程此國朝諸儒之學也夫老師宿儒見聞相傳經生學士先後輩出孫太山石徂徠則經學未嘗不講也李挺之穆伯長則數學未嘗不論也濓溪之理學則又首導其源也而君子獨推明胡邵二程之學者有由矣蓋伊川之講學嘗游安定之門牆程伊川與吕希哲俱事胡先生云云康節之談道又素交於程氏之兄弟邵康節與二程同居洛中二程侍大中訪康節明日謂門生曰雖從堯夫先生遊聽其議論振古之豪傑也明道和康節詩曰先生嘗與賞西街􅷹子親攜竹杖來明道敬禮康節如此師友學問同一源派至遡其所從入之門求其所自得之趣往往若背而馳焉言經者不合於數言數者不合於理此君子所以必原其異而合其同也且經義治道各分其齊慶厯間方尚詞賦獨湖學以經義及時務學中有經義齊治事齊經義齊者擇疏通有器局者居之治事齊者人各治一事又兼一事如邉防水利之類云云文藝節義各隨其類安定甄别人物因其所好類聚而别居之故好尚經術者好談兵戰者好文藝者好尚節義者使之以類羣居相與講習時召之為定其理其效見於梁柱榱桷之詩湖學多秀彥出而筮仕往往取高第及為政多適於世用歐陽詩曰吳興先生富道德詵詵弟子皆賢才荆公詩曰先收先生作梁柱以次收拾桷與榱其驗見於純明直溫之對熙寧三年劉彜召對上問從學何人曰少從安定上曰其人文章與王安石孰優彜曰瑗以道德仁義教東南諸生時王安石在場屋修進士業臣聞聖人之道有體有用有文君臣父子仁義禮樂體也詩書史傳子集文也舉而措之天下用也纍朝取士不以體用為本而尚浮華之詞是以風俗偷薄瑗當寶元明道講明體用之學授諸生始自蘇湖終于太學出其門者無慮二千餘人學者明體用以為政教之本臣師之功也上曰門人在朝為誰曰錢藻之淵篤孫覺之純明范純仁之直溫錢公輔之簡諒其在外明體適用數十輩其餘政事文學不可勝數是安定專於明經以為濟時之用也先天之圖講明象數陳瑩中書康節觀物云起震終艮一節明文王之八卦也天地定位一節明伏羲之八卦也蓋先天之學本乎伏羲而備於文王故其詩曰天地定位否泰反類山澤通氣咸損見義雷風相薄恆益起意水火相射既濟未濟四象相交成十六事八卦相蕩為六十四坎按先天圖未乾坤與否泰艮兊與咸損震巽與恆益離與既濟濟常相對是為十六卦經世之書考驗休咎按經世圖元之元二元之㑹十二此隂數十二也元之運二百六十此陽數三十也元之世四千三百二十此又隂數也元之歲十一萬九千六百此又陽數也大而聞杜䳌以卜其世之治亂步聖客談熙寧戊申堯夫聞杜䳌不樂或問之曰將有人起東南為相以文教亂天下此禍非六十年不己未幾王介甫召自江寧介甫所建明經術法令至建炎戊申方息申此事又見聞見録但不言戊微而觀牡丹以定其物之榮枯同上司馬文正種牡丹邵堯夫曰某日某時馬踐死是日及午馬廄中馬出爭仆是康節專於言數以為退居之趣也以誠敬為入門以踐履為實地自致知至於知止自灑掃應對至於窮理盡性伊川撰明道行狀先生教人自致知至於知止誠意至於平天下灑掃應對至於窮理盡性是程氏專於明理以為垂世之訓也大扺聖賢有異學古今無異道支派若殊分而根源實一本途轍若殊趨而歸宿實一致是故窮今博古以垂後者此道也救時行道以立功者亦此道也正心誠意以自養者此道也治國齊家以兼善者亦此道也顔閔之德行游夏之文學固殊尚矣而實同出於孔門善誘之教子思之中庸孟子之仁義固異入矣而實同本於曽子一唯之㫖此三君子者其傳均出於孔孟其說均出於六經其持論均尊王而黜伯其存心均崇仁義而抑功利其衛道均排斥異端而推明正統况同居於洛者俱有濟時之念開講於湖者安知無明理之學不可以出處之迹異其見也不可以理數之名異其議也學者何必辨其疑似哉自今觀之仁義為體之學與遺書言仁者相表裏同上遺又程氏書至誠直心之訓與中庸論心者同脈絡徐積字仲車號節孝先生從安定學不復仕進其學以至誠為本初見安定頭有少偏安定厲聲曰頭容直積因思不獨頭容直心亦要直也自此不敢有邪心又程伊川作中庸解義不然好學一論講明性情非源流安定之門乎則知安定之學初非捨理而言經也伊川初游安定之門作顔子所好何學論曰天地儲精得五行之粹者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀懼愛惡欲情既熾而益蕩其性鑿矣觀性觀心之序即盡心知性之㫖康節擊壤集序以道觀性以性觀心以心觀身以身觀物治則治矣猶未離乎害也不若以道觀道以性觀性以心觀心以身觀身以物觀物雖欲相僞其可得乎心又伊川曰盡其心者我自盡其心能知則自然知性知天矣動心忍性之喻即治怒治懼之說遺書言堯夫解它山之石可以攻玉譬如君子與小人處為小人侵陵則修省畏避動心忍性增益預防如此便道理出來又遺書明道先生曰治怒為難治懼亦難克己可以治怒明理可以治懼不然天地一問極究其理非聞諸康節之論乎則知康節之學初非外理而求數也近思録伊川程先生見康節邵先生伊川指食桌而問曰此桌安在地上不知天地安在何處康節為之極論其理以至六合之外伊川嘆曰平生惟見周茂叔論至此又康節之子伯溫所記但云極論而不言其所論云何今按康節之書有曰天何依曰依乎地曰地何附曰附乎天曰天地何所依附曰自相依附天依形地附氣其形也有涯其氣也無涯竊恐當時康節所論與伊川所聞於周先生者亦當如此因附見之云不特此也大易有傳中庸有解同一經學也伊川作易傳及中庸解義兔起八卦梅知乾坤同一數學也遺書伊川見賣兔者曰聖人見河圖洛書畫八卦何必圖書只看此兔亦可作八卦數便從此中可起聖人即神物之至著者耳也又同上早梅冬至以前發方一陽未生然則發生何其榮其枯此萬物一箇隂陽升降大節也然逐枝自有榮枯分限不齊各有一乾坤也中堂改法之議語録劉安禮云王荆公執政議法改令言者攻之甚力明道嘗被旨中堂議事荆公方怒言者厲色待之先生曰天下之事非一家私議願公平氣以聽荆公為之愧屈云云諸賢寬民之語同救新法也時行新法諸人皆求去有問康節者曰諸賢能寬之一分則民受一分之賜講用兵戰陳之法邢和叔敘明道先生事云堯舜三代之治先生固已默識矣至於行師用兵戰陳之法無所不講習皆造其極外之夷狄情狀山川道路之險易邊鄙防戍城寨斥堠控帶之要靡不究知論邊防治道之學同談兵學也同上不然一則曰安定之門人其醇厚之氣可知聞見録安定教人有法伊川曰凡從安定先生學者其醇厚和易之氣望之可知也二則曰安定之門人皆知稽古愛民遺書安定之門人往往知稽古愛民矣則於為政乎何有一則曰康節振古之豪見上二則曰康節內聖外王之道明道謂康節內聖外王之道又何嘆詠之不自己耶則知程氏之學蓋得於安定而合於康節也噫吾道一太極也太極之運行則為兩儀為二氣為五行吾道之充廣則為經術為象數為理義曷嘗有二本哉然合三君子之學而論之安定之傳其後寂寥康節之書流於卜筮惟伊洛一派家傳人誦日月爭光蓋性命之學甚切而理義之味甚長也是故一傳而楊龜山馬時中壽靖康之脈於國勢綴旒之際楊龜山墓志金人奄至城下太學生伏闕乞留李綱种師道執政慮其生亂引高歡事揭榜通衢且請以禮起邦彥公言士民伏闕出於一時忠憤無足深罪李邦彥首畫逃遁之策罷李綱而納誓書李鄴奉使失辭惟金人言是聽二者國人之所同棄也宜收還榜以示慰人心者逸士狀馬伸字時中崇寧初禁元祐學伊川之門學無幾公因張繹求見先生以非其時恐貽公纍公曰使伸得聞道雖死何憾况不至於死者乎靖康間金人立張邦昌公首具書請邦昌速奉迎康王以書抵銀臺司進之吏視書不稱臣辭不受公叱曰逆類吾今日不愛一死而欲吾稱臣耶尚書省以示邦昌邦昌得書氣沮再傳而胡安國髙閌扶紹興之業於權臣炙手之日胡文定公行狀安國字康侯游定夫謝顯道楊中立皆二程髙弟公不及二程之門而三君子皆以斯文之任期公謝公嘗語朱震曰胡康侯大冬嚴雪而松柏挺然獨秀也紹興元年除中書舍人兼侍講小厯紹興二十一年禮部侍郎髙閌退居明州秦檜弟祿願與公結姻公辭之遂致仕閌喜故程頥之學又嘗見楊時每語競日中年勇退人甚髙之又再傳而朱紫陽張南軒濟淳熙之治於道學復燃之時寶慶臣僚劄子程皓程頥張載諸賢既講明於伊洛之間朱熹張栻吕祖謙又發揮於淳熙之際朱熹行狀除提㸃江西刑獄事奏事是行也有要之於路以正心誠意為上所厭聞戒以勿言者先生曰吾平生所學只有此四字豈可回互以欺吾君乎則訓詁學數之傳又未若理學之愈久愈明也愚也其於程夫子願學焉理學異同周程張源流之學周子接洙泗之統也而有不由師傳默契道體之妙晦庵濓溪祠堂記上接洙泗千載之統下啓河洛百世之傳又書堂記先生不由師傳默契道體建圖屬書根極領要程子從濓溪之學也而有吟風弄月吾與㸃也之意明道先生曰自再見周茂叔後吟風弄月以歸有吾與㸃也之意張氏得伊洛之論也而有盡棄所學從事於道之舉建安游酢曰張子厚少時自居其才謂提騎卒數萬可橫行胸奴視叛羌為易事耳故從之遊者多能道邊事既而得聞明道先生議論乃謝其徒盡棄所學以從事於道其視先生雖外兄弟之子而虛心求益懇懇如不及嗟夫秋陽皓皓世不復覩孟子泰山巖巖遺迹不存遺書仲尼天地也顔子和風慶雲也孟子泰山巖巖之氣象也道喪千載絶學誰繼更秦及漢厯晉隋唐以至于我有宋五星聚奎實開文明之運漓者淳判者合清明之稟得以全付人而周子出焉晦庵江州濓溪書堂記上接孔孟千載之緒下啓程張百世之傳脈絡分明而規模宏逺矣然聞知見知如出一人源深流長百世可知及考其議論驗其問答周子多異於洙泗之論程氏復乖於濓溪之說而張與程又若劒佩相笑者往往致後學之疑吁有是哉嘗觀通書之言通書師第七剛善為義為直為斷為嚴毅為幹固惡為猛為隘為強梁柔善為慈為順為㢲惡為懦弱為無斷為邪佞惟中也者和也中節也天下之達道也聖人之事也晦菴注此以得性之正而言也然以和為中與中庸合蓋就已發無過不及者言之如書所謂允執厥中也通書之言誠以擬議為言復非與中庸之說相類也通書擬議第三十五至誠則動動則變變則化故曰擬之而後言議之而後動擬議以成其變化晦翁注中庸易大傳所指不同今合言之未詳其義或曰至誠者實理之自然擬議者所以誠之之事也圖之言太極之上而加以無極非大易㫖也易繫辭易有太極是生兩儀太極圗云無極而太極太極動而生陽動極而靜靜而生隂圗之言五行但於易四象以為水火金木而即其中而為土非與大易之論相合也通書師第七注此章所言剛柔即易之兩儀各加善惡即易之四象易又加倍以為八卦而此書及圗則止於四象以為水火金木而即其中以為土蓋道體則一而人之所見詳略不同但於本體不差則並行而不悖矣夫周子上接洙泗之統也今著而為書畫而為圗其旨趣之異同也如此豈書不盡言圗不盡意哉曰知周子以時中言則達道亦可以為中或問子思之言中和如此而周子則曰中者和也中節也天下之達道也乃舉中而合之和何以為天下大本耶曰子思所謂中以未發言也周子所謂中以時中言也學者㴠泳而别識之其並行而不相悖可矣知周子以誠之之事言則擬議亦可以為誠見上知無形而有理之意則信周子非論太極之外晦翁解太極圗曰上天之載無聲無臭實造化之樞紐品彚之根柢也故曰無極而太極非太極之外復有無極也太又語録無極而太極是說無形而有理所謂極者二氣五行知本體不差並行不悖之理則信周子於四象之中而亦為五行見上大抵所指雖彼此而本原之不失所見雖詳略而體統之不紊然則濓溪何嘗不合於孔孟哉又觀遺書之言仁也曰仁之道但以公字論之晦翁語録近思録云仁之道要之只消道一公字公只是仁之理不可將公便喚做仁公而以仁體之故為仁其與通書德愛曰仁之言不一也通書誠無為幾善惡德愛曰仁宜曰義理曰禮通曰智守曰信易傳之言復也曰動之端蓋以元字論之一陽復於下乃天地生物之心也先儒皆以靜為見天地之心蓋不知動之端乃天地之心也出伊川易傳晦庵語録伊川也是就動處說就元字頭說復字其與通書利貞誠復之言不同也通書元亨誠之通利貞誠之復晦庵曰若濓溪就利貞上說復夫程子親傳濓溪之學也今言仁言復其議論之抵牾也如此豈人自為說家自為學哉曰仁難言也愛者仁之德公者仁之理曰愛曰公皆善狀仁者何疑焉見上復亦難窮也元亨者以動言利貞者以靜言曰動曰靜亦皆善言復者何惑焉晦庵語録濓溪就坤上說就回來處說如云利貞者誠之復也誠心復其不善之動而已矣皆就歸來處說伊川就動處說如元亨利貞濓溪就利貞上說復者伊川就元字頭說復字濓溪伊川之說道理只一樣非有所異只是所指地頭不同王弼之說與濓溪同大抵體用雖異說而同其本動靜雖異論而同其理然則伊川何嘗不合於濓溪哉至程張之言理又有可得而論者伊川曰理也性也命也三者之異也窮理則盡性性盡則知命矣伊川云天命猶天道也以其用言之謂之命命者造化之謂橫渠則曰盡性至命如穿渠引源是二之也伊川曰橫渠嘗譬命是天窮理盡性如穿渠引源渠與源兩物後來此說必改伊川曰心也性也天也三者一理也能盡心則知性知天矣伊川曰盡其心者我自盡其心能盡心則自然知性知天矣如言窮理盡性以至於命以序言之不得不然其實能窮理便能盡性知命也橫渠則曰以心知天猶居京師往長安亦二之也伊川曰橫渠嘗論以心知天猶居京師往長安但知出西門便可到長安此猶見兩處若要識此意只在京師便是到長安或混而一之或歧而二之是不亦自為矛盾乎曰混而一之者自得學也歧而二之者為學者言之也自得之學在諸君子則可在他人則躐等矣此橫渠不敢以伊川之說語人也其言異其㫖同是橫渠又何嘗自異於伊川哉嗟夫夫子太極也見而知者或忠恕或仁孝聞而知者或中庸或仁義要均之傳道統均之淑人心况二三君子發其户牖於群瞶之中演其支派於衆流之後相佐佑而無背馳相羽翼而非遼絶學者當驗諸孔門之學則無疑論矣愚之所惜者濓溪本得於孔孟也而謂太極一圖傳於种穆希夷之派毋乃以虛誕待濓溪乎晦菴遺文跋朱震進易說謂此圗傳之陳摶种放穆修而來而胡仁仲又以為先生非止為种穆之學者此特其學之一師矣以先生之學之妙不出此圗以為得之於人則决非种穆所及以為非其至者則先生之學又何以加於此圗哉而晦翁得志文考之謂先生自作而非有所受於人者嗚呼世無晦翁之論則濓溪特种穆之學耳同上嘗竊疑之及得志文考之然後知果先生自作而非有所受於人者二公蓋未見此志而云之耳程氏本學於周子也而或謂二程之講論問答見於遺書者獨未嘗及此圗毋乃以舍學倍師疑程氏乎張南軒太極圗說今二程之講論問答見於遺書者獨未嘗及此圗何耶曰二程雖未及此圗然其說固多本之矣而南軒於圗解論之謂太極圗周先生手授二程者嗚呼世無南軒之辨則程氏自棄濓溪之書耳南軒太極圗解或曰太極圗周先生手授二程先生者也今二程先生之所講論答問之見於遺書者大略可見獨未嘗及此圗何耶以為未可據及則聖人之微辭見於中庸易繫者先生固多所發明矣而何獨祕於此耶栻應之曰二程先生所不及此圗然於其說固多本之矣試詳考之當自可見也蓋先生之學其妙具於太極一圗通書之言皆發此圗之藴而程先生兄弟語及性命之際亦未嘗不因其說觀通書之誠動靜理性命等章及程氏書之李仲通銘程邵公志顔子好學論等篇則可見矣橫渠本出於程氏也而關中諸生欲尊其師自為一家毋乃以彎弓反射待橫渠乎而龜山跋橫渠與伊川之簡特言橫渠之學出於程氏故録此簡以示學者嗚呼世無龜山之說則橫渠自為名家耳龜山跋橫渠與伊川簡橫渠之學出於程氏而關中諸生尊其師欲自為一家故豫録此簡以示學者愚故曰孔孟之學得周程張子而始傳周程之學得朱張諸君子而始信古今源流至論别集卷四
