body:
  text: 古今源流至論别集卷二宋黃履翁撰勇論血氣理義之勇聞之師曰有血氣之勇有理義之勇南軒孟子解有血氣之勇有理義之勇血氣之勇不可一日不克理義之勇不可一日不存也夫發於志氣之動而非出於理義之安局於噐質之偏而非得於學問之粹馮河不悔按劒疾視而外示虛驕之氣者血氣之勇也泰然於自克之境而變故不能動釋然於不校之地而威武不能加氣塞天地志奪三軍而内得存養之實者理義之勇也此聖人歴歴乎君子小人之别南方北方之異者正恐學者知有血氣而不知有理義所以深致其辨歟甚矣理義之勇學者不可不存也爲學不勇則始勤終輟而有一暴十寒之累進道不勇則旦聖暮狂而有半塗中廢之失改過不勇也則處心自吝必不更日月之蝕立志不勇也則用心太弱必不立中流之砥勇之於人大矣雖然亦未易言也學未至於自反則其力不全於己無以克其私則其中索然而無所恃是必以誠敬爲入門以踐履爲實地以屋漏隱微爲謹獨之所以夜氣清明爲養性之天忿慾誠之賊也吾則窒之恐有以沮吾勇富貴性之蠧也吾則忘之恐有以汨吾勇意必固我心之翳也吾則無之恐有以累吾勇天者定人者勝非念不足以喪其所養外物不足以敗其所守則遇坎而莫爲之陷處困而莫爲之詘正大之理可質鬼神剛毅之志不渝燥濕雷震於側而色不變太山壓於前而目不瞬此豈堅忍虛驕者所能勉哉抑亦平日克己之學也吾觀洙泗門弟如子貢之俊敏子夏之謹嚴子路之勇果皆平日之升堂入室者而所以傳夫子之道乃付之曾子夫曾子之魯退然而若怯歉然而若樸黙然而似不能言意未足以任道統然觀其力量曰士不可以不𢎞毅也則天地同其大金石同其堅曰臨大節而不可奪也則禍福一其心夷險一其行此其氣象太山岩岩壁立萬仭之壯可望而不可近者參果何以臻此哉葢涵養於忠恕一唯之時操存於一日三省之頃而固非挾諸外以爲重也參之勇愚意自魯中得之則其任道統之傳者非幸也宜也一傳而子思再傳而孟子由其存誠於暗室而患難之可行由其致嚴於妻子而威武之莫屈師友淵源之學有自來矣是學也寥寥千載誰其嗣之吾幸得諸關洛之門伊川謂不難於感慨殺身而難於從容就義則伊川以理義爲勇矣遺書感慨殺身者易從容就義者難橫渠謂不貴冐死之有爲而貴義理之已明則橫渠亦以理義爲勇矣橫渠語録若氣節之士冒死以有爲於義未必中然非有志槩者莫能况吾於義理已明何故不爲噫非茍知之亦允蹈之吾觀涪州之行慨然勇徃而窮塞禍難舉不足以嬰其心以霜節雪操處事變以虛舟飄瓦視世故葢百變不磨而屹立者何勇哉年譜元祐七年除直秘閣判西京監先生再辭極論儒者進退之道御史董敦逸以爲怨望改授崇福宫九年哲宗親政申西監之命先生再辭不就紹聖間以黨論放歸田里四年送涪州編管門人謝良佐曰是行也乃族子公孫與邢恕之爲爾先生曰族子至愚不足責故人情厚不敢疑孟子旣知天焉用尤臧氏臯比之徹毅然勇爲而孫呉佛老躍然而盡脱囊綻矢發不足喻其決火烈湍奔不足言其果葢一念頓悟至道者何勇哉晦翁贊橫渠早説孫呉晩逃佛老勇徹臯比一變至道精思力踐妙契疾書訂頑之訓示我廣居嗚呼伊川之勇於處變橫渠之勇於求道是豈自外入哉持敬主一而僞心之已化樂天知命而妄心之已釋夫惟僞妄之心不凝也則貧賤莫之戚危難莫之動是伊川之勇皆順乎天也語録德盛貌嚴而驕心之已忘心廣體胖而吝心之已去夫惟驕吝之不留也則見善若不及聞道惟恐失是橫渠之勇皆造乎天也呂與叔撰橫渠行狀及語録嗟夫已私盡克蟊賊不生仁之勇也剛直自守客氣不容義之勇也動必以天無妄之健也順必以禮大壯之壯也此洙泗之本原伊洛之功用學者所當體認其説歟昔明道有詩曰富貴不滛貧賤樂男兒到此是英雄愚謂以此書諸紳明道詩曰閑來無事不從容睡覺東窻日已紅云云富貴不滛貧賤樂男兒到此是英雄義利當辨於疑似之間學問之道無他明乎義利而已矣爲人君而不明乎義利則其弊至於不仁爲人臣而不明乎義利則其弊至於不忠爲人子而不明乎義利則其弊至於不孝雖然是未可以易言也茍不致謹於疑似之微力辨於界分之嚴其是非得失葢有毫釐之差而千里之謬者可不畏哉竊嘗疑之易之文言曰利者義之和又曰利物足以和義是言也葢合義利而論之軻之七篇曰先利後義以爲不奪不饜去義懐利則以爲必亡是言也葢别義利而論之夫孟子一書前軰以爲得易之用顧乃背而馳者何哉及觀程夫子之論謂古者以利爲本茍不利則害性後人皆趍利故孟子㧞本塞源不敢言利孟子與易所言則一然後知孟子之言葢激於戰國之時也伊川語録何者三代以前習俗純厚天理素明不以利爲利而以義爲利故義利不容於不合三代而下人慾橫流私心日熾以仁義爲土苴以功利爲標的故義利不容於不别世之不信孟子者旣非其不當去利其信孟子者又直言不可近利世無伊洛先生之論則孟子之本㫖微矣大抵義之説行則利固己存乎其間利而不以義亦祗見其爲害耳故言善利之間者而其間不能以髮言善惡之㡬者而其㡬爲甚微通書此君子戒謹恐懼審思明辨於疑似之微界分之嚴也且雞鳴爲利利也而徒近名不務實者亦利也程氏外書學者須是務實不要近名方是有意近名則是僞也大本已失更學何事爲也名與爲利清濁雖不同然其利心則一龍斷罔利利也而納交要譽惡其聲者亦利也南軒孟子序如内交要譽惡其聲之類者有爲而爲皆利也枉尋直尺詭遇獲禽者利也而不知先難而後獲者亦利也外書仁者先難而後獲有爲而作皆先獲也古人唯知爲仁而已今人皆先獲也道塗不爭險易之利冬夏不爭隂陽之和至微事也而聖人以爲儒者之羙談恐其利心之求便也未可以言而言可以言而不言至末事也而君子以比穿窬之小人戒其利心之求得也必有事焉而勿正懼利心之害吾學也經德不回非以干禄言語必信非以正行慮利心之害吾德也聖賢之所以致辨甚嚴者葢天下之理非難明於白黑之易分而難辨於形迹之相似非難察於天淵之相遼而難知於毫芒之一間噫可畏哉是理也我朝伊洛講之詳矣載之遺書筆之目録寓之經解遡其言究其味切切乎爲人爲己之别昭昭乎天理人慾之辨近世大儒如朱如張又相與紬繹之尤其親切著明也義固所以利之此子思語也而晦翁則謂義固有利若行義之時先言有利則此心已邪又發子思未言之蘊矣晦翁語録説義利處曰聖贒之言所以要辨别教分曉但只要向義邉一直去更不通思量第二着才説義固所以爲利固是義有大利存焉若行義時便説道有利則此心已傾邪向那邊去聖賢直要止向一路做去先義後利此孟子語也而南軒則别其有所爲無所爲又推孟子未露之㫖矣南軒孟子序凡有所爲而爲者皆利也二君子者其論明其㫖切無非自伊洛中來也昔太史公讀孟子書至利國之對而爲之廢卷太息流涕而言之彼葢有感當時功利之徒而深信孟子塞原之論也雖然遷之學葢有自來也董子嘗有正誼不謀利之一言誠得孔孟之餘論而遷之史記有予聞之董生云者意遷從仲舒㳺而得是言歟嗚呼知遷之有得於董子之言則知朱張有得於伊洛之學信矣夫天下不可一日無儒者之論亦不可一日無師友之學也嘗謂義利之説不明於天下乆矣自孔孟而後而董子知其味自董子而後伊洛探其源自伊洛而後朱張辨其分於是學者知有吾道之的人慾之蠧也昔廖公問學於龜山先生答以舜跖善利之分公猶請益不已葢以爲此無難也而先生一言以警之曰吾懼子之不察以利爲善耳公於是悚然知善之爲難愚方戒懼於此敢不請事斯語剛柔賴師道作成之力嘗觀通書之論剛柔也詳矣其曰剛善則爲義爲勇爲斷反是而惡則猛隘强梁耳其曰柔善則爲慈爲順爲巽反是而惡則懦弱邪佞耳此言剛柔善惡之異也然所以易其惡至其中則拳拳於師道之立焉通書師第七篇或問曰曷為天下善曰師曰何謂也曰性者剛柔善惡中已矣不達曰剛善為義為直為㫁為嚴毅為幹固惡爲猛爲隘爲强梁柔善爲慈爲順爲巽惡爲懦弱爲無㫁爲邪佞惟中也者和也中節也天下之達道也聖人之事也故聖人立教俾人自易其惡自至其中而止矣故先覺覺後覺闥者求於明而師道立矣師道立則善人多善人多則朝廷正而天下治矣甚矣師道不可一日不立於天下也古者有君師司主張吾道之權故人才有曲成之善後世有宗師任維持吾道之責故人才亦無偏尚之習又其後也上無君師以司其權下無宗師以任其責而世之人才不流於懦弱則流於高亢耳夫人涵二五之精抱綱常之正其本然之性固善矣然才品不能無優劣氣質不能無厚薄氣之不同不能無清濁力之不同不能無强弱自非聖人未有不局於氣質之性者古之任師道者知之以爲是隂陽之運五氣之不齊也順性情而立其教闡義理以開其迷明中和以㑹其歸涵養其德性和平其心術矯揉其血氣裁其過而合之中約其偏而歸之全去其惡而納之善使一世長短小大之材而㑹之於渾龎純全之域故中者不倚正者不矯淑者不爲懦固者不爲僻此人材所以易就而理性情所以爲王道之畢也昔者䖒周聖人任君師之道也作樂教胄直寛剛簡其别有四建極示人剛柔正直其分有三考虞書之所命與箕疇之所訓未嘗不嘆古人於師道如此其備也直不專於直而必以溫則和順矣寛不專於寛則𢎞毅矣剛不近虐簡不近傲則無棄材矣此舜之命官有曲就之功而無直施之術剛克非暴也去血氣之剛而已矣柔克非懦也去血氣之柔而已矣剛而非暴柔而非懦則歸於正直而已矣此周之訓民無偏黨之私而有正直之道嗚呼人有是性君有是教相與發躍以成就之此上世所以多全才而虞周之君所以有功於人物也故曰古者有君師司主張吾道之權而人才有曲成之善者是也昔者夫子聖人任宗師之道也無皇極之位而有皇極之德設教杏壇開聾啟瞶隨噐成就因材發育奬勸其噐質之粹者以勉其餘裁抑其性質之過者以警其失誘進其一二僅可稱者以要其成故當時諸子濡染吾夫子之教領悟吾夫子之訓莫不悉爲中和之歸顔氏怒不遷犯不校粹然春風和氣似近於柔矣而爲邦一問毅然以王者之事爲己任一日克己天下歸仁非剛孰能之乎曾子得一大勇之説發而為𢎞毅之語似專於剛矣而一貫之語悠然領㑹於一唯之間此時此意氣象從容畧無凝滯又非得於柔乎剛柔必歸於木訥多慾不足以言剛謦咳之下儆省有餘故曰宗師任維持吾道之責而人才無偏尚之習者是也自後世以來上無皇極之主爲之㑹歸下無先覺之儒爲之發鑰腐唇句讀皓首經傳間有馳神聖賢於千載之上則亦倀倀然豈知所適或詭隨䛕佞以爲利或矯亢沽激以爲高尚何望其氣質之變化哉且寛厚長者恥言人過西漢之淳厚羙矣而其弊至有齷齪自守引經誤國厥角稽首爭獻符命坐視漢鼎之移而目不瞬此其爲懦弱爲無斷爲邪佞何有乎柔之善大學橫議壁立萬仭東都之名節高矣而其弊至有視死如歸甘戮如飴根連株繋恬不爲怪而漢之宗社亦隨以亡此其爲猛爲隘爲强梁何有乎剛之善葢惟未知師道作成之教故持心雖厚特移於氣習之陋非得於性情之正執節雖高特發於志氣之動非出於義理之安故曰上無君師以司其權下無宗師以任其責而人才流於懦弱高亢者是也葢嘗論之立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義三才之所以立者固不外乎隂陽剛柔仁義之道而已然隂陽仁義即剛柔之别名也亦剛柔之迭相爲用也何者折膠墮指天下之至隂本柔也而一陽生焉流金爍石天下之至陽本剛也而一隂生焉則隂陽未嘗不互爲其根仁有流動發越之意本剛也然其用則慈柔義有合權從宜之意本柔也然其用則決裂晦翁語録先生答叔重疑問曰仁體剛而用柔義體柔而用剛又問門人曰仁便有箇流動發越之意然其用則慈柔義便有箇商量從宜之義然其用則決裂仁義亦未嘗不迭爲其用鳴呼天地且不違而况於人乎此晦翁釋太極之圗所謂隂陽成象剛柔成質仁義成德固有體用之分其實則一太極也晦翁太極圖解隂陽成象天道之所以立也剛柔成質地道之所以立也仁義成德人道之所以立也道一而已隨事著見故有三才之别而於其中又各有體用之分焉其實則一太極也自虞周之教不明孔孟之書不作而世之言剛柔者偏矣幸而濓溪浚其源程張朱氏道其流而學者始知有中和之德其辨剛慾也則曰有慾則無剛剛則不屈於慾是戒夫人血氣之偏矣遺書人有慾則無剛剛則不屈於慾其辨仁義剛柔也則曰仁體剛而用柔義體柔而用剛是明夫人理義之全矣見上其論顔孟之氣象則曰和風慶雲太山岩岩也明道語録仲尼天地也顔子和風慶雲也孟子太山岩岩氣象也所以形容聖賢剛柔之善其論夷惠之清和則曰和而不流中而不倚也所以推明聖賢剛柔之中晦翁語録門人問和而不流中立而不倚下惠夷齊正是如此曰是又曰栁下惠和而不流處甚分曉但夷齊如何是中立而不倚處曰武王伐紂夷齊扣馬而諫不從却終身不食周粟此見得他中立不倚處曰如此恐倚做一邊去曰他雖如此又不念舊惡曰亦不相似文王善養老他便盍歸乎來後武王伐紂他又自不從而去此便見他中立而不倚處是説也正源流通書之遺㫖也噫麗日祥雲和風甘雨此晦翁贊明道之和學者欲爲柔則當以明道爲標準晦翁贊明道曰山立揚休玉質金聲元氣之㑹渾然天成麗日祥雲和風甘雨龍德正中厥施斯普規圓矩方繩直準平此晦翁贊伊川之肅學者欲爲剛則當以伊川爲模楷同上贊伊川曰規圓矩方繩直凖平允矣君子展也大成布帛之文菽粟之味知德者希孰識其貴是必想舜樂之遺音遵箕疇之正路玩洙泗謦欬之訓味濓溪善惡之論挹明道座上之春風侍伊川門外之深雪歸而求之有餘師孰謂師道之不立者雖然士以一身任綱常之責寧過乎剛毋寧過乎弱寧爲狂狷毋寧爲詭隨此孔子思得狂士孟子善養至剛横渠謂剛則守而不回柔則入而不立橫渠孟子説人又要得剛太柔則入於不立亦有人生無喜怒者則又要得剛剛則守得定不回進道勇敢載則比它人自是勇處多晦翁謂剛果方能傳道柔弱不能濟事也晦翁語録孔子曰不得中行而與之必也狂狷乎㸔來這箇道理須是剛便立得脚住方能有所成只觀孔子晩年方得曾子曾子傳子思子思傳孟子㸔來此語聖賢都是如此剛果決裂方能傳道若慈善柔弱終不濟事夫剛非士之累也守而精之金石可通發而充之天地可塞循而達之天下國家可治世言太剛則折士患不剛耳折不折天也吾聞東坡之言矣蘇東坡論剛德抑猶有未盡然者使其果出於義理何折之憂使其爲血氣之剛則折也宜哉是則剛非士之累而柔乃士之累也處心太柔必無植立必無建明必不果於從政必不直於立朝必不克己之嚴重必不徙義之勇敢必不任道之𢎞毅士君子將何所擇哉每觀紹聖以來君子之得禍而慘伊川先生之流落涪州艱關困躓之餘瀕於一死使柔懦者處此未必不上栁河東之書也而先生怡然自樂晝夜生死銖視軒冕塵視金玉剛心勇志萬折不磨至今言之猶有生氣彼邪佞得志炎炎然今皆安在哉吾未見剛者如先生之卓然有定力也昔韓退之平生倔强慷慨言事一見蠻煙瘴雨之悽愴而甘上功德之表其詩曰自從牙齒折始信舌爲柔平生剛氣折辱殆盡君子視韓退之之揉剛爲柔安得不三嘆三詠程夫子之剛君權攬權不必親細務以天下之責任大臣以天下之平委臺諫以天下之論付士夫則人主之權重矣夫權出於人主則臣下稟國家之命而不敢欺藩鎮憚京師之勢而不敢慢夷狄畏中國之威而不敢侮然人主之所謂總權者豈必屑屑然親事務之細哉夫茍屑屑然親之則其聰明必有所遺而威福必有所寄聰明有所遺者乃生患之原而威福之所寄者即弄權之漸也是故權不可以不歸於人主而必重廟堂之柄以總之政不可以不在廟堂而必擇臺諫之臣以察之言不可以不從臺諫而必通天下之情以廣之如是則萬世無弊矣愚觀漢唐以來其事權分散四出或在宫闈或在戚畹或在貂璫或在權臣其弊徃徃不一者大抵廟堂之責不重臺諫之言不聼士夫之論不明耳且漢自孝惠以來白馬寒盟諸呂爭王是時也權出於房闈元成以後黃霧四塞司馬輔政是時也權出於戚畹然使平勃之歡早交本傳王陵之諍得行本傳太后欲立諸呂為王王陵曰高帝刑白馬帝盟曰非劉氏而王天下共撃之陳平周勃曰高定天下王子弟今太后若稱制王諸呂無所不可及退陵譲平勃曰始與高帝啑血盟諸君不在耶今欲阿意背約何靣目見高帝地下乎平勃曰靣折庭爭臣不如君全社稷定劉氏之後君亦不如臣於是太后陽遷陵爲太𫝊實奪之相權雖百呂産其何施王商之言不屈本傳瑯琊太守楊彤與王鳯連昏其郡有灾害商按問之鳳以爲請商不聼竟奏免彤奏寢不下鳳以是怨商隂求其短使人告商閨門事楊興之諫見聞本傳詔博問公卿大夫無有所諱楊興諫曰云云雖百王鳳其何損夫惟廷臣沮氣公論閉口此漢之人主之勢孤矣唐自中睿之世斜封四出紀綱紊亂是時也權出於内庭德順之時北衙勢橫廢置自己是時也權出於閹宦然使彦範之表弗沮本傳桓彦範上表伏見陛下每臨朝皇后必施帷幔坐殿上豫聞政事臣切觀自古帝王未有與婦人共政而不破國亡身者也伏願陛下覽古今之戒令皇后專居中宫治隂教勿出外朝干國政上不聼宋璟之言見容本傳處士韋月將上書告武三思濳通宮掖上怒令斬之宋璟曰必欲斬月詔將請先斬臣不然臣終不奉則宫掖安敢竊其柄蕭復之謀見聼本傳復言艱難以來始用宦者監軍權望太重是曹止可委宫掖事兵要政機勿使參預帝不聼栁伉之䟽早入宦者程元振傳栁伉上䟽曰云云天下之心乃恨陛下逺賢良任宦寺離間將相必欲存宗廟社稷獨斬元振首馳告天下悉出内使𨽻諸州以神策兵付大臣䟽聞帝顧公議不與乃下詔盡削元振官爵則閹宦安敢弄其權夫惟甘言易入忠論難從此唐之人主之位虛矣不然宣帝初年霍氏用事猶前日也一旦赫然綜核名實以魏相爲丞相以丙吉為御史朝廷尊嚴凜然太阿之出匣非任大臣之力歟本傳憲宗初元藩鎮陸梁猶前日也神斷天造振舉紀綱以杜黃裳總相權以李絳任言責強藩屏息豁然大明之當天非任忠賢之功歟本傳大抵人主之權不寄於下者大臣委任之專也大臣不能竊其權者言路風采之振也言路不至蔽其私者士大夫議論之公也祖宗所以為宰相置參貳分兵民為二府以給舍司兩省以臺諫察大臣葢為是也是故政事歸於廟堂而言路通於天下廟堂之有所失給舍得言給舍之有所不及臺諫得言臺諫之有所不能言天下能言之矣天下能言而人主能賞罰廢置豈得不謂之權不由己而何必親屑屑之事為人主之私哉五季以來藩臣竊權根據瓜裂不知幾年或廢或置彼得專之朝廷不知也或叛或服彼得為之朝廷不問也我藝祖英武自天雄斷如神杯酒雍容顛倒掌股本朝事實雷德驤為御史中丞奏趙中令普强市人第宅上怒叱之後德驤子有鄰復訟其庇吏受賕上怒按問罷相分其支郡在此無疑心同上五代節鎮所領皆有支郡如劒南節度則凡劒南州軍皆為支郡魏博節度則凡河北州軍皆為支郡太祖乃令潭朗數軍直屬京師長吏得自奏事其後大縣屯兵亦有直屬京師者留之邸第在彼無觖望蔡氏官制皇朝革方鎮之患召諸鎮於京師欵陪遊宴各賜邸第以留之分命朝士大夫出守諸郡而權始歸君上嗚呼藝祖豈切切自親其末哉以政事之柄任中書以參貳之職分政權以臺諫之官糾大臣故收節鎮之兵則問趙普決征伐之議則問趙普其任重矣然參政薛居正得以分其柄時趙普為相甚專藝祖遂置參知政事命薛居正呂餘慶為之以分其權御史雷德驤得以糾其失此藝祖善於攬權也天聖之間政在東朝行法旣寛推恩益廣宋綬以總攬威柄之說進長編明道三年宋綬言帝王御天下在總攬威柄頃太后朝議者謂恩出太后今恩寵雖行又謂自大臣出非大臣罔上何以致此余靖以自攬威權之說進增釋余靖言當今為陛下計但能天子自攬威權大臣公行賞罰沮蠻夷之氣塞盜賊之源我仁宗始親政事稍肅紀綱宮中之有請謁者斥長編仁宗曰人皆知杜衍封還内降不知朕宮中以杜衍不可而止者多於所封還也内臣之有罪戾者絀長編明道二年帝始親攬庶政裁抑僥倖初皇太后輔政江德明等交通請謁薛奎言不斥逐恐稽以為亂上不欲㬥其罪狀止絀之於外而權始歸君上嗚呼仁宗豈區區自任其繁哉責股肱之任於大臣而君道常佚委耳目之寄於言者而上聽無壅長編呂希純言仁宗責股肱之任於大臣而君道常佚委耳目之寄於之言者而上聼無壅享國之日長人至於今思故始則委夷簡終則委文富宰相之任重矣然范諫官得論夷簡之非長編明道二年郭皇后見踈呂夷簡以前罷相怨后范諷言后無子當廢夷簡贊其言先敕有司無得受章䟽范仲淹同孔道輔數人詣垂拱殿門伏奏門者闔扉道輔叩銅鐶大呼乃逐仲淹等唐御史得糾文潞之失長編唐介論文彦博燈籠錦此仁宗公於攬權也愚故曰以天下之責任大臣以天下之平委臺諫以天下之論付士夫則人主之權重者此也内外重輕内外無失於偏重天下之勢當重於内乎抑重於外乎曰内重則爲内憂外重則爲外患必使内外相制輕重相權則天下之勢均矣古者外有重兵内無强臣呼吸於談笑之間而奔走於藩維之外錯布於州郡之逺而順從於指顧之頃當此之時内非不重而其亂不起於左右之大臣則生於山林之奸民故天下之重不可使專在内也古者外封侯國内翰王室其兵足以征伐其食足以守衛其權足以生殺當此之時外非不重而其極諸侯有擁兵之强國勢有倒垂之柄故天下之重尤不可使專在外也嘗論自古外重之弊莫如周内重之弊莫如秦西漢之勢類乎周東漢之勢類乎秦皆非善持天下之勢也其善持天下之勢者惟唐之太宗我朝之列聖耳周自得天下之後大封同姓星羅棋布犬牙相制維藩維翰意亦善矣厥後賞罰不歸於王室征伐不出於天子下堂見諸侯而名分微强臣問周鼎而事權紊是内輕無以制之秦自并六國之餘銷鋒鑄鏑外無寸鐵形勢建瓴坐制六合謀亦逺矣未㡬權臣内擅而無所忌匹夫橫行而莫之禁趙高肆指鹿之姦陳勝起揭竿之禍是外輕無以防之西漢懲曩秦孤立之勢今日割某城以益呉楚明日割某地以封燕趙僭上者不之問不朝者不之責至使七國唱亂㡬危社稷西漢之勢何以異於周哉厥後建分封之策漢武帝用主父偃分封諸侯王子弟下削地之令諸候王子表公族微弱㡬不自立至使斗筲之莽談笑得漢鼎璽而劉氏無一人以唱其義又何吹虀之過耶東漢鑒季年都試之弊翟義討王莽因東郡都試勒車騎因發莽命移檄郡縣共行天罰誅莽又李通勸光武起兵因請以材官都試騎士曰欲劫前隊大夫及属正因以號令大衆乃使光武歸舂陵舉兵相應六年省郡國都尉百官志中興建武六年省諸郡都尉并職太守無都試之役省闋都尉七年罷車騎材官光武紀建武七年詔曰今國有衆軍並多精勇且罷輕車騎士及材官樓船士及軍假吏還民伍九年省關中都尉同上建武九年省關都尉復置護羌校尉官二十二年復罷諸邊亭候吏卒同上建武二十二年詔罷諸邉亭候吏卒至使北胡有變南蠻叛命明帝紀永平八年北胡有變置度遼官又和帝紀永平十四年南蠻叛置象林兵羌犯三輔百官志安帝以羌犯三輔置右扶風都尉鮮卑寇居庸安帝紀建光元年鮮卑寇居庸東漢之勢何以異於秦哉厥後改刺史置州牧靈帝紀中平五年改刺史新置牧至籍外兵以除閹宦之根何進傳羣牧爭政漢遂三分又何改絃之甚耶大抵天下之勢内無重則無以威外之强臣外無重則無以服内之大臣而絶姦民之心此二者其勢並立若持衡然不可使此首重而彼尾輕也唐之太宗其審天下之勢熟矣旣平宇内分四方之地盡以沿邊爲節度府而范陽朔方之軍皆𢃄甲十萬地里志河北一道曰平盧曰范陽隴右一道曰隴右曰安西曰北庭曰河西逺足以制夷狄之難近足以備匹夫之亂内足以禁大臣之變而將帥之臣常不至於叛者内有重兵之勢以豫制之也貞觀之際天下之兵八百餘府而在關中者五百舉天下之衆而後能當關中之半而朝廷之臣亦不至於乘隙伺間以邀大利者外有節度之權以破其心也陸贄傳太宗列置府兵八百餘所而關中五百舉天下不敵關中則居重馭輕之意故外之節度有周之諸侯外重之勢而易置從命得以擇其賢不肖之才是以人君無征伐之勞而天下無世臣暴虐之患内府之兵有秦之關中内重之勢而左右謹飭莫敢爲不義之行是以上無逼奪之危下無誅絕之禍有周秦之利而無周秦之害形格勢禁内外相制未有如唐太宗之善為制也恭惟藝祖立國神謀睿算中令謀國深慮逺計强藩爲患㡬年於兹杯酒雍容顚倒掌股收其兵權無疑心也藝祖召王審琦等曰汝曹何不釋去兵權擇便好田宅市之爲子孫立乆永之業君臣之間兩無猜疑不亦善乎明日乞解軍權以散官就第分其支郡無觖望也本朝事實五代節鎮皆有支郡如劔南節度等太祖乃令潭朗數軍直達京師其規模逺矣哉是故以大梁爲天下之樞而聚諸道精銳之兵甲卒數十萬衆戰馬數十萬匹太宗語及北兵利害長自言國家以大梁為天下之樞故定都焉今天下甲卒云云其兵之强未有如我朝也以三司掌財計之權而總中外出納之用内則收禁藏之金帛外則總漕運之財賦蔡官制本朝轉運使副判官督集財賦悉𨽻三司凡經費羨餘獻之三司積於左藏庫及分貯内庫者皆三司總之立勸沮之法其財之饒未有如我朝也此為重内之謀深矣然收天下之精兵聚之京師州郡之兵若不足也而猶足以自衛聚天下之財榖入於京師州郡之財若不足也而猶足以自給大郡十數指揮中郡五七指揮小郡三五指揮軍儲餉給屬之運司統制軍馬𨽻之守倅一旦有警可以使之犯難而忘死外兵不減於内也二税分數𨽻屬州縣地利贏餘歸之本州經費職之軍資庫犒宴職之公使庫而又使之回易收其息利外賦不減於内也蔡氏官制一路賦税榷酤茶鹽坑冶之利轉運得以裒多益寡以給逐郡其二税定例分數𨽻屬州縣及係官房雜以地利坊塲河渡支酬猶前不盡者盡歸本州其係官錢經省錢帛貯之軍資庫轉運總之其屬州縣之財賦别有州府庫貯藏聼知通備用非常其饋燕則有公使庫仍許回易收其利息以助賞用其㫖逺哉逐州置軍招營兵大郡有十數指揮中郡有五七指揮下郡有三五指揮每指揮率以四五百人爲額其軍儲饋餉悉在運司其統制軍馬乃𨽻守倅一方有所警州郡有兵有財足以取人率兵屏衛王室平時儲戎噐備城隍皆有其資内不偏重外不過輕此國朝之制又超越唐太宗居重馭輕之意中興以來燕謀不逺江上諸屯老熊當道殿巖禁旅虎豹守關兵足以相制四總錯峙鞭算軍儲農寺中居山積國用財足以相維其爲千萬年之計深矣然日者衛兵单弱尺籍多虛軍馬一司逺戍金陵爲根本慮宜熟籌之古今源流至論别集卷二
