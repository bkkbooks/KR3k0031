body:
  text: 古今源流至論前集卷一宋林駉撰此所謂旡極而太極也所以動而陽靜而隂之本體也然非有以離乎隂陽也即隂陽而指本體不雜乎隂陽而為言耳此之動而陽靜而隂也中者其本體也者陽之動也之用所以行也者隂之靜也之體所以立也者之根也者之根也此陽變隂合而生水火木金土也者陽之變也者隂之合也隂盛故居右陽盛故居左陽穉故次火隂穉故次水冲氣故居中而水火之交系乎上隂根陽陽根隂也水而木木而火火而土土而金金而復水如環無端五氣布四時行也五行一隂陽五殊二實無餘欠也隂陽一太極精粗本末無彼此也太極本無極上天之載無聲無臭也五行之生各一其性氣殊質異各一其無假借也此無極二五所以妙合而無間也乾男坤女以氣化者言也各一其性而男女一太極也萬物化生以形化者言也各一其性而萬物一太極也此以上引説解剥圖體此以下据圖推盡説意惟人也得其秀而最靈則所謂人者於是乎在矣然形之為也神之發也五性之徳也善惡男女之分也萬事萬物之象也此天下之動所以紛綸交錯而吉凶悔吝所由以生也惟聖人者又得夫秀之精一而有以全乎之體用者也是以一動一靜各臻其極而天下之故常感通乎寂然不動之中盖中也仁也感也所謂也之用所以行也正也義也寂也所謂也之體所以立也中正仁義渾然全體而靜者常為主焉則人於是乎立而天地日月四時鬼神有所不能違矣君子之戒慎恐懼所以脩此而吉也小人之放僻邪侈所以悖此而凶也天地人之道各一也陽也剛也仁也所謂也物之始也隂也柔也義也所謂也物之終也此所謂易也而三極之道立焉實則一也故曰易有太極之謂也朱子太極圖觧太極論自或者謂此圖非先生所學之至而學者遂疑其淺晦翁遺學跋先生之學其妙見於太極一圖通書之言皆發此圖之藴朱震進易説謂此圖傳自陳摶种放穆脩而胡仁仲以為先生非止為种穆之學者此特其學之一者耳非其至也及得誌文攷之然後知果先生自作而非有所受於人自或者謂此圖程氏遺書未嘗及而學者遂疑其迂南軒解太極圖序曰或曰太極圖周先生授二程先生者也今二程先生之所講論答問見於遺書者大畧可覩獨未嘗及此圖何耶以為未可遽示則聖人之遺辭見於中庸易係者先生固多所發明矣何獨秘於此耶栻應之曰二程先生雖不及此圖然於其説固多本之矣試嘗攷之當自可見也嗟夫不由師傳黙契道體推明兆朕根極領要盖濂溪所獨得之學議論淵源理義粹精或者其可妄議乎嘗敬觀晦翁之言曰先生之學其妙見於太極一圖彼謂非其至者正先生至至之妙又觀晦翁之言曰程氏此圖黙識於言意之表盖不求於陳迹也晦翁解太極圖序曰張敬夫以書來曰二先生所與門人講論問答之言見於書者詳矣其於西銘盖屢言之至此圖則未嘗一言及也謂其有微意是則固然然所謂微意果何謂耶切以為此圖立象盡意剖析幽微周子盖不得已而作也觀其手授之意盖以為惟程子為能當之至程子而不言則疑其未有能受之者爾夫既未能黙識於言意之表則持心空𣺌其弊必有不可勝言者然則探前聖不傳之藴當求濓溪太極之圖求濓溪太極之圖又當求晦翁緒論之意庶乎義理之門可入而聖賢之閫可窺矣且氷輪金井心節清冽趙閲道贈周茂叔詩心似氷輪浸玉淵節如金井冽寒泉光風霽月胷次灑落黃庭堅濓溪詩序周茂叔人品甚高胷次洒落如光風霽月好讀書養志林壑初不為人窘束故發而為學其妙具於太極之圖其圖又見於通書之論書不盡言圖不盡意圖書盖相表裏也自今觀之無極而太極太極而兩儀此圖之奥也太極圖曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉而通書則曰五殊二實二本則一豈非發明自無而有之㫖乎通書性理命篇曰二氣五行化生萬物五殊二實二本則一是萬為一一實萬分萬一各正小大有定隂陽一太極太極本無極此圖之妙也而通書則曰五行隂陽隂陽太極豈非發明自有而無之㫖乎通書動靜篇曰水隂根陽火陽根隂五行隂陽隂陽太極四時運行萬物終始混兮闢兮其無窮兮乾道坤道化生萬物圖言易道之變化也太極圖旡極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉而通書所謂大哉乾元萬物資始非此意耶通書誠上第一曰誠者聖人之本大哉乾元萬物資始誠之源也聖人定以中正仁義立人極焉圖言人極之宗主也太極圖聖人定之以中正仁義而主静立人極焉而通書所謂聖人之道仁義中正而已非此理耶通書道篇聖人之道仁義中正而已矣守之貴行之利擴之配天地豈不易簡豈為難知不守不行不擴耳張南軒以太極圖淵源粹精秦漢以來所未有信乎太極圖濓溪之閫奥也南軒太極圖序胡氏以通書書之約而道之大文之質而義之精信乎通書又此圖之啓鑰也胡宏通書序通書四十章周子所述也人見其書之約也而不知其道之大也見其文之質也而不知其義之精也見其言之淡也而不知其味之長也顧愚何足以知之試舉其一二語為同志啓予之益乎患人以發䇿决科榮身肥家希世寵為而已則曰志伊尹之所志患人以知識見聞為得而自售不待價而沽也則曰學顔子之所學人能立伊尹之志脩顔子之學然後知通書之言包括至大而聖門之事其無窮焉然世之輕議其學者曰易有太極而圖加以無極疑其渉於道家虛無之論嗚呼為其説者盍不以吾心驗之方其寂然無思萬善未發是無極也雖云未發而此心昭然靈源不昧是太極也欲知無極太極之妙先於吾心澄神端慮察而見焉則夫子發明造化之藴了然無餘賾矣善乎晦翁之言曰無極而太極非太極之外復有所謂無極者盖上天之載無聲無臭而實造化之樞紐也斯言盡之矣晦翁解曰上天之載無聲無臭實造化之綱維品彚之根柢也故曰無極而太極非太極之外復有無極也噫康節先天之易了齋指為心法而後來者反名其書為考數陳了齋瑩中答楊中立游定夫書康節云先天圖心法也圖雖無文吾終日言未嘗離乎是故其詩曰身在天地後心在天地先天地自我出其餘惡足言先天之學以心為本其在經世康節之餘事耳世人求易於文字至語皇極以為考數之書康節詩云自從三度絶韋編不讀書來二十年俯仰之間旡所愧任傍人道是神仙後來者名其書為考數皆康節所不憾也橫渠西銘之書伊川謂與孟子性善養氣之論同功而或者至疑其流於兼愛伊川語録西銘一書與孟子性善養氣之論同功龜山曰西銘言體而不及用未免渉於兼愛後伊川以書告之始信西銘之學無怪乎後學以無極議濓溪也後之讀者誠能虛心一意反復潛玩而毋以先入之説亂焉則庶幾乎有得周子之心西銘愚嘗敬誦明道之訓矣曰西銘之書仁孝之理備乎此須臾而不於此則不為仁不為孝矣語録吁精矣哉橫渠之道也至矣哉明道之訓也夫西銘一書理義奥閫發前聖未發之藴啓人心未啓之機真可與天地同其體渾渾乎無所名恢恢乎無所不及範圍不可得而過形器不可得而縶吕博士西銘賛故伊川一見不以性善養氣者稱則以原道宗祖者言楊中立問曰西銘言體不及用恐其説遂至於兼愛何如伊川曰西銘之書推理以存義與孟子性善養氣之論同功豈墨氏之比哉西銘明理一而分殊墨氏則無分殊之説子比而同之過矣明道一見不以達得天德者語則以極醇無雜者論明道曰訂頑立心便達得天徳又訂頑之言極醇無雜秦漢以來學者所未到然究其㫖要大抵切切於仁孝之道且乾稱父坤稱母此西銘之純乎孝橫渠西銘曰乾稱父坤稱母予兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也大君者吾父母宗子也其大臣宗子之家相也人而有見於此則事天如事親事親如事天而孝子之職舉矣或謂申生恭而未免䧟父於惡而乃取而儕諸大舜之底豫而遂疑其駁不知橫渠之意非謂舜之孝果與申生同也特以明事天者夭壽不貳而脩身以俟命耳夫何疑西銘曰育英才潁封人之錫類不弛勞而底豫舜其功也旡所逃而待烹申生其恭也民吾同胞物吾與也此西銘之純乎仁見上人而有見於此則天下為一家中國為一人而仁人之事畢矣或謂孟子親親仁民自有次第而乃合而歸諸大君之長㓜而遂惑其泛不知横渠之意非謂大君之心果愛無差等也特以示聖人之心一視而同仁而能稱物以平施耳夫何惑尊高年所以長其長慈孤弱所以㓜其㓜聖其合徳賢其秀也凡天下疲癃殘疾惸獨鰥寡吾兄弟顚連而無告者也學者茍能志其所志學其所學澡身浴徳之地齋心克己之時力於此焉而求之則孔孟之道可傳曽顔之學可企而橫渠之望於後人者亦無負矣嗚呼知西銘者固以西銘之言為當病西銘者復以西銘之言為過今觀龜山之言有曰言體而不及用曰有平施而無稱物此猶可也見上鮑若雨何人而亦非之劉安節何人而亦議之甲可乙否互相矛盾吁橫渠其果可疑乎如其果爾則二程何信之篤也如彼如曰不然何二三子復疑之深也如此哉疑之者是則信之者非信之者是則疑之者非二者必有一焉曰皆是也信之者所以知之疑之者亦所以求知之信之者固無疑矣而疑之者亦豈終於疑哉吾亦見其不能不終歸於信而已矣鮑若雨向嘗疑也及聞伊川管窺天之喻則幡然而改語録劉安節向嘗疑也及聞伊川造道有得之言則頓然而覺同上楊龜山向嘗疑也及聞伊川理一分殊一語則倐然風飛判然氷釋矣又何疑焉見上愚故曰終歸於信而已矣嗟夫人疑先天易為考數之書得陳瑩中之言而悟世疑太極圖加無極之妄得晦翁之言而釋見太極圖條然則西銘一書所以信於人心信於天下後世者幸有二程先生遺訓在性學道學不明而性命之説莫知所宗矣荀子曰人之性惡也揚子曰人之性善惡混也荀子之言性杞栁之論楊子之言性湍水之論善乎孟子之言曰人無有不善水無有不下可謂深切著明直以破諸子異同之論矣然切有疑焉伊洛之學孟子之學也程子曰善固謂性惡亦不可不謂之性毋乃與孟子二言乎曰孟子舉本然之性程子舉所稟之性盖本然之性天命之正理不以聖智而有餘不以愚不肖而不足所稟之性剛柔之異質遲速之異齊有生而鍾其純粹之最者亦有偏駁者亦有駁之甚者其最粹者固存其本然之常性不待復而誠此所謂生知聖人也若其偏駁者其為不善必先就其所偏而發此固可得而反也若偏駁之甚則有於其生也而察其聲音顔色而知其必為不善如叔向之母知叔虎之必㓕羊舌氏之類是也故伊川謂夫子之言性相近者指所稟之性謂孟子之言性善者指本然之性是言也與孟子七篇盖相表裏又安有異同哉南軒曰或問程子謂善固性也惡亦不可不謂之性也然則與孟子有二言乎曰程子此論盖為氣稟有善惡言也如羊舌虎之生已知其必㓕宗之類以其氣稟而知其末流之弊至此謂惡亦不可不謂之性者言氣稟之性也氣稟之性可以化而復其初夫其可以化而復其初者是乃性之本善者也彼荀楊之論執所稟之性以論本然之性此所以失聖賢之本㫖也歟嗚呼氣質之性固有善惡也然善者可以為聖為賢全其所固有之物惡者能力自矯揉亦可以化而復其初夫其可以化而復其初者是乃性之本善者也橫渠曰氣質之性君子有弗性者焉橫渠語録形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉龜山曰氣質之性君子不謂之性龜山語録生之謂性氣質之性也君子不謂之性則故而已矣盖欲因其所稟而反之本然則人皆可為堯舜此孟子所以有異於荀楊此程氏所以有合於孟子也雖然以上智而論下愚固同此性也以人而論物亦同此性也何者性之本則一而已矣而其流行發見人物之所稟萬有不同焉究何莫而不由於太極何莫而不具於太極是其本之一也然有太極則有二氣五行絪緼交感其變不齊故其發見於人物者未嘗不各具於氣稟之内故原其性之本一而察其流行之各異知其流行之各異而本之一者未嘗不全也程子曰論性而不論氣不備論氣而不論性不明盖論性而不及氣則昧夫人物之分而太極之用不行矣論氣而不及性則迷失大本之一而太極之體不立矣用之不行體之不立焉得謂之知性乎異端之所以賊仁害義者皆自此也語録噫合則為太極之一本散則為人物之異稟固也然在人有脩道之教可以化其氣質之偏而復夫盡已之性盡人之性盡物之性及其極與天地叅此人之所以為人之道而異夫庶物也孟子所謂異於禽獸幾希者可不察哉可不謹哉心學一中分造化心上起經綸此康節之詩也康節詩曰天向一中分造化人從心上起經綸則知心學不可不謹中心如自固外物豈能侵此明道之詩也則知心學不可不專語録夫心者人之神明所以具衆理而應萬事者也有和粹之心者其容必温有慈仁之心者其容必良有雍肅之心者必恭有保䕶之心者必儉耳目鼻口之不相亂者此心也喜怒哀樂之不失節者此心也心之為心亦大矣世之論者莫得其㫖以時求心而心非時之可求所謂出入無時者是已以處求心而心非處之可得所謂潛天而天潛地而地者是已以體求心而心非體之可見所謂不在内外者是已以用求心而心非用之可得所謂無思無慮寂然不動感而遂通者是已康節雜説然則心果安在哉曰日新之徳即念之致罔念之狂即心之放有所忿懥有所憂患則不得正有所恐懼有所好惡則不得正心之邪正其根於一念之微乎其所以非念之不生罔念之不形者又在敬學之涵養也關洛諸公紬繹心學之扄鑰發明性學之淵源自敬之外斷無餘藴明道之論心曰敬以直内是涵養意也明道曰或問每常遇事即能知操存之意無事時如何存養得熟曰古之人耳之於樂目之於禮左右起居盤盂几杖有銘有戒動息皆有所養今皆廢此獨有理義之養心耳但存此涵養意乆則自熟矣敬以直内是涵養意言不莊不敬則鄙詐之心生矣貎不莊不敬則怠慢之心生矣伊川之論心曰閑邪存誠敬以直内也忠信所以進徳者何也閑邪則誠自存誠斯為忠信也如何是閑邪非禮而勿視聽言動邪斯閑矣以此言之又幾時要身如枯木心如死灰又如絶四德畢竟如何又幾時復如枯木死灰敬以直内則消伊川語録橫渠曰當以己心為嚴師也橫渠語録橫渠曰正心之始當以己心為嚴師凡所動作則知所懼如此一二年間守得牢固則自然心正矣夫惟守之以敬也鄙倍不生而此心廣矣暴慢不生而此心肅矣縱肆不生而畏心長矣欺詐不生而善心萌矣是必起居出入無不謹也視聽言動無非禮也淵黙雷聲尸居龍見無敢欺也上帝臨汝無貳爾心無敢慢也對妻子如對嚴賔待童稚如待長者暗室屋漏洋乎如左右之有神不覩不聞儼乎如十目十手之所指視夫然故雲行雨施此心之充魚躍鳶飛此心之察洞然明鏡湛然止水與天地同其流與造物同其游而虛明純粹不失赤子之初矣諸君子所以潛心孔學以入堯舜精微之妙者其功用至實也嗚呼自前聖絶學之後英雄豪傑功利崢嶸經生學士識見爛熳茫乎不知所指歸者幾千年矣而關洛諸公發明養心之敬學揭諸人亡書廢之餘豈非後學之幸歟雖然數君子之論當矣然未免自為同異者伊川曰能盡心則知性知天矣曰心曰性曰天本一理也楊潛道録伊川語孟子曰盡其心者知其性則知天矣心也性也天也非有異也橫渠曰以心知天猶居京師徃長安復二之也或混而一之或岐而二之斯不一家自為學乎吕與叔録伊川語橫渠嘗喻以心知天猶居京師往長安但知出西門便可到長安此猶是兩説若要識誠實只在京師便先到長安曰伊川混而一之者自得之學此自誠而明之意也橫渠岐而二之者為學者言之此自明而誠之意也其言異其㫖同烏可執是議之哉伊川曰心之所主則虛故以明鑒在此萬物畢照言之也語録明道曰心有所主則實復以弊屋禦冦驅逐不暇言之也同上或以虛言或以實言斯不亦人自為説乎曰伊川謂其虛者盖涵養莫如敬以敬存心則天真洞然表裏澄徹所見者無非理而外邪不能入矣明道謂其實者盖四端具備則充然有得無非實理而外患不能入矣中之虛明則外不能撓中之充溢則外不能乗又烏可過疑其異哉終日聖門無一事只輸顔子得心齋愚也敢書諸紳吕與叔詩中中之理有二有大本之中有時中之中大本之中不偏不倚渾然於未發之前故中庸謂中者天下之大本是也時中之中時有萬變中無定體無定體者以太極無適而不為中也故中庸謂君子而時中是也盖未發之中猶地中之中隨時之中猶日中之中晦翁或問曰程子專以不偏為言吕氏專以無過不及之説子又合而言之何也曰中一名而含二義程子固言之矣今以其説推之不偏不倚云者未發之前渾然在中無所偏倚之名也無過不及者時中之義見諸行事各得其中之名也盖未發之中不近四旁猶地中之中時中之中則隨時取中猶日中之中爾是理也關洛先生講之熟矣程氏論大本之中也曰喜怒哀樂未發寂然不動也吕大臨曰不倚謂之中不雜謂之和程先生答曰不倚謂之中甚善不雜之言猶未瑩不雜謂之和未當大臨又曰喜怒哀樂之未發則赤子之心而已當其未發此心至虛無所偏倚故謂之中程先生答曰喜怒哀樂未發謂之中赤子之心發而未逺乎中若便謂之中是不識大本也又曰喜怒哀樂以未發謂之中中也者寂然不動者也故曰天下之大本曰亭亭當當直上直下之正理也遺書程先生明道曰中者天下之大本天地之間亭亭當當直上直下之正理出則不是唯敬而無失最正論時中之中也曰三過其門不入在禹稷之世為中居陋巷在顔子之時為中如一家一國之所推也遺書或問時中如何程伊川曰中字最難識須是黙識心通且試言一㕔則中央為中一家則㕔中非中而堂為中言一國則堂非中而國之中為中推此類可見矣如三過其門不入在禹稷之世為中若居陋巷則非中也居陋巷在顔子之時為中若三過其門不入者則非中也曰當手足胼胝則於此為中當閉户不出則於此為中如秤權之義也噫盡之矣伊川曰欲知中庸者無如權湏是時而為中若以手足胼胝閉户不出二者之間取中便不是中若當手足胼胝則於此為中權之為言秤錘之義也何物為權時也義也雖然程氏之答吕大臨問中之書必謂其喜怒哀樂之未發見上答蘇季明求中之問則謂存養於喜怒哀樂之未發其所論大本之中自未發一語之外無餘説矣蘇季明問喜怒哀樂未發之前求中可否伊川曰不可既思於喜怒哀樂未發之前求之又却是思也既思即是已發才發便謂之和不可謂之中也至門人時中之問斷然以難識告之必使黙識心通而後已是果何見哉見上嗚呼楊墨之兼愛為我皆滯於一偏之失子莫之固執是又舉一而廢百此程夫子之所深懼也南軒曰為我兼愛皆偏滯於一隅烏能中節至於子莫則又於為我兼愛之間執其中夫萬變者時也萬殊者事也萬類者物也而是中散於萬變萬殊萬類之中當此時則此為中於彼時則非中矣當此事則此為中於他事則非中矣即是物則此為中於他物則非中矣盖其所以為中者天理之所存也程氏所以深切告語者盖慮其一動不謹必為吾道之賊也故愚為之説曰堯舜湯武之征遜不同而同於中夷惠之出處不同而同於中三仁之生死不同而同於中顔孟之語黙不同而同於中明夫此則可與論時中之義也然又論之方其未發也雖未有無過不及之可名然體用一源則所以為無過不及之凖則者實在於是及其時中也雖其所主不能不偏於一事然顯微無間則其所以無過不及者是乃無偏倚者之所為也故程子曰言和則中在其中言中則含喜怒哀樂在其中正謂此爾然則後之學者以大本之中時中之中參稽而互考之則思過半矣遺書仁甚矣仁之難言也義可言宜禮可言别智可言知仁果何所訓哉程氏遺書伊川曰義訓宜禮訓别智訓知仁當何訓説者謂訓覺訓人皆非也當合孔孟言仁處大槩研窮之二三歳得之未晩也以覺謂仁則仁非覺之可盡盖仁然後有覺而覺未足謂仁也無垢曰仁者覺也心既至覺則善念亦覺惡念亦覺豈獨覺吾一身而已哉晦翁語録曰張無垢以覺為仁則是以智為仁又或問知覺是仁否曰仁然後有知覺以人謂仁則仁非人之可盡盖言仁而不言人則不見理之所寓言人而不言仁則人特塊然之身耳必合而言之非析而言之也晦翁語録或問人者仁也合而言之道也如何先生曰仁之所以得名以其人也言仁而不言人則不見理之所寓言人而不言仁則人不過是一塊血肉耳必合而言之方見得道理出來以愛謂仁則仁亦非愛之可盡盖愛本人之情仁本人之性又烏可以性為情哉程氏遺書問仁伊川曰此在諸公自思之將聖賢所言仁處類聚觀之體認出來孟子惻隠之心仁也後人遂以愛為仁愛自是情仁自是性孟子言惻隱之心仁之端也既曰仁之端則不可便謂之仁退之言博愛之謂仁非也甚矣仁之難言也杏壇迹蕪道學不傳不有先覺孰開我人此關洛君子有功於後學也嘗叅諸關洛之論仁也在身為心在物為理在德為元程曰心生道也惻隱之心人之生道是在身為心也或問仁與心何異曰心是所主處仁是就事言曰若是則仁是心之用否曰固是若說道仁者心之用則不可心譬如身四端如四肢云云固是一身所用其可謂身之四肢如四端固具於心然亦未可便謂心之用或曰譬如五榖之種必待陽氣而生曰非是陽氣發處却是情也心譬如榖種生之性便是仁也形又伊川曰心生道也有是心斯具是以生惻隱之心人之生道也程曰仁者天下之正理失正理則無序而不和是在物為理也程氏經說曰仁者天下之正理失正理則無序而不和程曰萬物之生意可觀此元者善之長斯所謂仁此言仁之徳也遺書明道曰萬物之生意最可觀此元者善之長也斯之謂仁也嗚呼仁之為仁其不可限量如此豈一言所能盡哉大哉仁之道乎内外逺近血脉貫通而後仁而少有壅遏則未也遺書一民一物同胞共體而後仁而少有間斷則未也橫渠西銘曰天地之塞吾其體天地之帥吾其性民吾同胞物吾與也大君者吾父母宗子其大臣宗子之家相也尊高年所以長其長慈孤弱所以㓜其㓜聖其合徳賢其秀也泛應曲當無往不寓而後仁而此善彼不善則未也遺書程氏謂以手足痿痺為不仁以天地萬物為一體是物物皆仁也遺書明道曰醫書言手足痿痺為不仁此言最善名狀仁者以天地萬物為一體莫非已也認得為已何所不至張氏謂天體物而不遺仁體事而無不在是事事皆仁也正蒙張橫渠曰天體物不遺猶仁體事而無不在也禮儀三百威儀三千無一物非仁也此關洛論仁正孔門博施濟衆天下歸仁之遺㫖歟雖然言仁固難求仁尤難愚又求關洛求仁之要曰人體公為仁又曰少私意不仁盖公則物我兼照天地同量而私則町畦立而仁道息矣伊川曰仁之道要之只消道一公字公只是仁之理不可將公便喚做仁人而以公體之故為仁只為公則物我兼照故仁所以能恕所以能愛恕則仁之施愛則仁之用也曰虛靜仁之本又曰仁之難成以人人有利慾之心盖虛則無蔽靜則無撓而利慾則思慮汨而仁道泯矣橫渠曰端篤虛靜者仁之本不能安則端篤也無所繫閔昏塞則是虛靜也此難以頓悟茍知之須乆於道實體之方知其味夫仁亦在乎熟之而已程氏曰仁之難成者以人人有利慾之心耳噫忠恕者仁之方寛裕者仁之質齋莊中正者仁之守發強剛毅者仁之用無迷其方無毁其質謹守之力行之則仁其庶幾乎伊洛我師也龜山豈欺我哉龜山文集龜山曰忠恕者仁之方也寛裕温柔者仁之質也齋莊中正者仁之守也發強剛毅者仁之用也無迷其方無毁其質謹守之力行之則仁其庶幾乎樂道陳蔡之厄此事變之至難也而夫子之弦歌自如陋巷之居此人情之難堪也而顔子之真樂不改盖境變於外者皆其中之無所守樂順乎天者宜乎人之無所汨夫子之恂恂便便誾誾侃侃躩如勃如襜如翼如無以異於夭夭申申之時也視要盟於衛相禮於夾谷之時無以異於鄉黨朝廷之時也夫子之以天自處彼視死生禍福為何等物哉則弦歌於陳蔡者非迂也宜也顔子之視紆金之榮不若簞食瓢飲之真也禮樂為邦之盛不若杏壇雍容之趣也顔子之於貧賤富貴無一毫介蔕於其間彼區區外慕安能凂已哉則不改其樂於陋巷者非矯也亦宜也大抵人各有所樂也有樂於物者有樂於道者如嵇康好鍛阮孚好蠟屐淵明之好酒鍾繇之好書嘗試使康舍鍛孚舍屐淵明舍酒鍾繇舍書其中心有歉然不樂者此皆中懐不足而有慕於物也如伊尹之耕莘曾㸃之浴沂孟子之反身而誠其亦自樂其樂於外物已盡忘之矣非真見乎道者不能也雖然聖賢之所謂樂者何也遇事而事中有理遇物而物中有理天高地下此理之形也雲行雨施此理之徹也鳶飛魚躍此理之察也旦晝生死此理之安也素富貴素貧賤素患難素夷狄無入而不樂焉此其所以為聖賢之學歟孔顔之學寥寥千載尚有得其傳者吾於伊洛見之濓溪之光風霽月胷次洒落不為外物拘束者可想也黃庭堅濓溪詩序周茂叔人品甚高胷中洒落如光風霽月不為人拘束夫惟不為外物拘束則銖視軒冕塵視金玉而以道充為富貴通書富貴第三十三章君子以道充為富身安為貴故常泰而無不足而銖視軒冕塵視金玉其重無加焉耳見其大則心泰心泰則無不足而以貧富為一處同上顔子第三十三章見其大則心泰心泰則無不足云云則富貴貧賤處之一也處之一則化而齊故顔子亞聖已意之妙見於窻前之草謝顯道記明道語周茂叔窻前草不除問之云與自家意思一般子厚聞驢鳴亦謂如此再見之後使人有吟風弄月之興明道先生自言再見茂叔後吟風弄月以歸有吾與㸃也之意此無他濂溪平日之所學者一則曰顔子二則曰顔子則宜乎無歉於簞瓢之樂也茂叔通書曰志伊尹之志學顔子之學尼又明道先生曰昔受學於周茂叔每令尋顔子仲樂處所樂何事明道之道通於外充然有得其不為世俗所累可見也明道先生作鄠縣主簿有詩曰萬物靜觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不淫貧賤樂男兒到此是豪雄夫惟不為世俗所累則見草而知造物生生之意明道先生書窻前有茂草覆砌或鋤之曰不可欲常見造物生意無垢語録見魚而知物意之自適同上明道置盆池蓄小魚數尾時時觀之或問其故曰吾欲觀萬物自得意草之與魚人所共見惟明道見草則知生意見魚則知自得意此豈流俗之見可同日而語真趣寓於雲淡風輕之天明道有詩曰雲淡風輕近午天傍花隨栁過前川時人不識予心樂將謂偷閑學少年上蔡曰看他胷中直是好與曾㸃底事一般佳境見於坐上春風之日朱公掞見明道於汝歸語人曰光庭在春風中坐了一箇月上蔡語録此無他明道之所慕者一則曾㸃二則曾㸃則宜乎無愧暮春之詠也見上二先生之所學品題風花與堯舜三代而為一程氏遺書堯夫詩雪月風花未品題他便把這些事與堯舜三代一般此等語自孟子後無人曾敢如此道來優游造物與顔瓢㸃瑟而同樂見上功名不足惑其心利達不足汨其念是猶烈火中之真金乎疾風中之勁草乎嵗寒凜凜而松栢自有和氣乎噫處暇裕之時固難處患難之時尤難吾觀黨禍之起士類之大厄也涪州之行吾道之不幸也尹公語録崇寧初元祐學有禁奸人用事出其黨為諸路學使專糾其事又伊川貶於涪州伊川講道自如殆若平時語黙不為之易其節飲食不為之失其味正仲尼不惑之時孟子不動心之境大舜歌南風之日文王演周易之年也此其樂豈易量哉是故張思叔因涪陵之歸甘心溝壑慨然有自得之意吕氏雜志張思叔伊川歸自涪陵思叔始見先生因誦孟子志士不忘在溝壑勇士不忘䘮其元始有自得處後更窮理造微云馬時中當學禁之嚴銳然親承有雖死何憾之意逸士狀馬伸字時中崇寜初元祐學有禁伸銳然為依親之訃先生以非其時且曰得聞道雖死何憾平日之所講明之所薰炙也熟矣嗚呼至此而後見伊洛之學明道有詩曰富貴不淫貧賤樂男兒到此是豪雄見上呂晉伯有詩曰可憐曾㸃惟鳴瑟獨對春風詠不休上蔡語録吕晉伯兄弟中皆有見處作詩詠曽㸃曰函丈從容問且酬展才無不相諸侯可憐曽㸃惟鳴瑟獨對春風詠不休愚雖不敏請事斯語中庸大學尊崇正學在君師講明正學在宗師大矣哉中庸大學之書盖帝王立治之根本聖賢進徳之閫奥也是故表章聖經崇重正學使天下享至治之澤此其責在君師繼續絶學演析奥義使天下聞大道之要此其責在宗師嘗觀唐虞而至今日世道不知幾變矣而二書正學與風雨晦㝠流行於天地之間不容一息泯然三代而上有君師以任道統固不待宗師之功春秋以來無君師以任道統不得不賴宗師之學上有君師任尊崇之責下有宗師任講明之責者其惟我朝乎且堯舜之相授惟精一執中之道夏周之相因自皇極之道無聞焉精則見於授受之妙粗則寓於耕桑之末微則存於人心稟賦之初顯則著於日用常行之際而中庸之道尊矣三代盛時中外有學方其八歳則自王公以下至於庶人之子弟皆入小學而教之以禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以脩己治人之道而大學之道尊矣是時也其學見於人君之躬行其理見於吾民之性分治隆於上俗美於下不待形於筆舌間而是學已昭昭於日月故曰三代而上君師尊崇之功也自賢聖之君不作而正大之學無傳吾夫子雖不得其位而所以為天地立心為生民立極為前聖繼墜緒其功又有賢於堯舜者自率性脩道而至天地位萬物育之功自夫婦造端而至上下皆察之境自好學力行而至治人治天下之道皆所以講明中庸之義以明徳新民為學問之本以致知格物為齊家治國之原以仁敬孝慈為君臣父子之極皆所以講明大學之㫖是時也夫子傳之曽子曽子傳之子思懼夫去道愈逺去聖愈邈於是推帝王心傳之本叅父師問答之㫖作為傳義開淑後人諄諄於言論之表故曰春秋而下宗師講明之功也粤自杏壇迹蕪木鐸響息孔氏家學流澌泯没經生學士溺記誦章句之末其學淺近而無用異端邪説窮空虛寂㓕之域而其學荒唐而無實使其君子不得聞大道之要其小人不得蒙至治之澤晦盲否塞反覆沉痼以及五季之衰而壞亂極矣斯文未喪隂剥陽復我宋龍興五星奎聚列聖相承既示尊崇周程大儒復加講貫接堯舜之宗泒發孔孟之淵源而正學始昭昭於人心方仁宗之嗣服也以中庸為脩身治人之道乃命經筵反覆陳説非仁宗得中庸之本乎事實景祐四年仁宗宴餞邢昺於龍圖閣上指禮記中庸昺指為天下國家有九經之語因講述大義序脩身尊賢之本人又寳訓五年上令張知古講中庸脩身治之道必使反覆陳之方哲宗之初政也以大學為入徳之序乃詔經幄訓釋大義非哲宗得大學之㫖乎長編元祐五年劉唐老言大學一篇論入徳之序欲詔經筵訓釋以備觀覽夫自大原不傳之後其道寥寥不知幾載漢唐以來或尊經或隆儒或右文固有任君師之責矣而不能接聖道之正統此愚幸國朝有君師以尊正學也然此特上人之責耳舂陵之墟周子出焉關洛之間程張出焉二三先生口傳心授聖經賢傳紬繹奥㫖其言幽探乎隂陽五行之賾而其實不離乎仁義中正之際周子太極圖五行一隂陽也陰陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉唯人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣聖人定之以中正仁義而主靜立人極焉其道極乎乾道變化各正性命之奥而其實不出乎忠恕之心語録程夫子曰忠恕一以貫之忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也此與違道不遠異者動以天爾又曰夫子之道忠恕而已矣維天之命於穆不已忠也乾道變化各正性命恕也其學造乎立極開太平之博而其實不外乎格物之微語録程夫子為天地立心為生民立極為前聖繼絶學為天下後世開太平又明道行狀曰以暗室屋漏為謹獨之所以格物致知為成性之驗不曰中庸為終身之用伊川語録則曰大學為入徳之門語録程夫子曰大學孔氏之遺書而初學入徳之門也於今可見古人為學次第者獨賴此篇之存次其簡編發其歸趣而子思不言之藴盡矣夫自二學不明之後諸說紛紛盖不一家漢唐以來或訓詁或正義或著論固有任宗師之責矣而不得聖經之本㫖此愚幸國朝有宗師以講正學也愚嘗莊誦遺經參稽緒論而知是學之本矣盖誠者中庸之門户而敬者大學之指歸然曰誠曰敬不過本之於心而已矣為小學者不由乎敬固無以涵養本原而謹夫洒掃應對之節為大學者不由乎敬亦無以進德脩業以致夫明德新民之功此敬之功用也天下達徳而非誠固不能盡其智仁勇以遂其行之之意國家九經而非誠亦不能盡已盡人以得其所以行之之本此誠之功用也吾惟存養其誠敬之心則霧掃空澄埃除鏡徹天真湛然表裏洞照天下之理無往而不自得茍梏亡其誠敬之心則茅塞生矣室廬空矣方寸擾擾情慾橫生天下之理惟見其至難此非愚之臆說盖伊洛淵源之學也聖天子心傳大原躬行實理褒寵晦翁之正𣲖講讀中庸大學之正學乃形奎畫乃錫榮爵正儒學大幸之日嗚呼帝王正道至祖宗而續至今日而盛孔氏正經至伊洛而傳至晦翁而著愚也沐聖朝之文教佩前哲之格言當在鳶飛魚躍之下古今源流至論前集卷一
