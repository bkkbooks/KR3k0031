body:
  text: 古今源流至論續集卷一宋林駉撰衛兵上三代畿兵皆有定制史自遷固不志兵而漢南北軍漫然無考諸儒議論往往異同今參訂漢史之所互載及先儒之所發明緯而為圗焉南北軍考異古者前朝後市王宮在南故漢衛宮之兵在城內者為南宮城之軍既謂之南京城之軍則謂之北所以别也南軍衛尉寺漢書儀曰衛尉寺在宮內衛尉表衛尉一人掌宮門衛屯兵考異南軍衛尉主之衛尉有尉士令丞諸丞衛侯司馬皆屬焉周勃既入北軍乃令人告衛尉毋納呂産以此知南軍主之衛尉明矣衛士令丞漢官儀曰營衛周廬晝夜誰何殿門外署屬衛尉漢儀民年三十三為正嵗為衛士諸屯衛侯後志左右都侯各一人六百石本注主劔㦸士徼循宮諸屯衛司馬顔注曰衛尉有八屯衛尉司馬主衛士徼循宿衛考異按張衡兩都賦曰衛尉八屯注引八校尉此大謬也校尉北軍也衛尉南軍也據宮門四面皆有公車每門各有二司馬凡八司馬故曰八屯郎尉表初皆亡貟多至千人掌守門户出充車騎考異或以光祿勳為南軍既於史無所據况所領皆郎烏可以軍言曰守門户充車騎孰謂其非軍也郎而非軍宣帝胡為出之擊羌也按禮儀志國有大變則閉宮門城門設屯衛兵不過諸郎與北軍爾𥘉不及衛尉之所領何也以是知衛郎衛兵同為南軍事出一體爾中郎五官中郎將左中郎將右中郎將通典曰中郎將分掌三署郎侍郎袁盎兄子種為常侍騎張釋之為騎郎李廣為郎騎常侍顔曰官為郎而常騎以侍天子司馬相如為郎事景帝為武騎常侍郎中郎中車將郎中戶將郎中騎將漢舊儀曰左右車騎將主左右車郎左右戶將主左右戶郎期門府蔡質漢儀曰期門府次虎賁府表武帝建元三年初置平帝元始元年更名虎賁期門郎表掌執兵送從比郎亡貟多至千人服䖍曰與期門下以微行後遂名官徐官考曰謹按周之兵制無事則散之田畝有役則召以縣師而宿衛長養之兵則有虎賁之士八百人至六軍之徒一軍百人大司馬之屬徒三百有二十人又在虎賁之外然不常有而虎賁之祿比下士足以代耕蓋庶人在官者也漢期門千人而秩比郎亦古虎賁之遺意歟虎賁中郎將蔡質漢儀曰舊作虎賁言如虎之奔也王莽以古有勇士孟賁故名焉漢官典職儀曰虎賁中郎將主武賁千百五人考異應卲漢官儀以虎賁曰古官謹按周虎賁氏下大夫二人中士十有二人掌先後王而趨以卒伍成王之道末命召公俾齊侯呂伋而伋方發虎賁之士宰臣統總宮衛其嚴如此漢安能及哉期門僕射表僕射秩比千石給事期門史記功臣表董忠羽林府表武帝太初元年初置名曰建章營衛後更名羽林騎顔曰如羽之疾如林之盛羽林郎表掌送從以期門比三百石後志本注曰無貟掌宿衛侍從考異後志以六郡良家補漢儀以三輔良家補然以史考之趙充國以六郡良家子善騎射補羽林井延夀以北地良家子善騎射補羽林亦六郡也當以後志之言為正羽林孤兒宣紀注武帝又取從軍死事之子孫養羽林宮教以五兵號曰羽林孤兒徐官考曰漢法待死事有加恩自高帝始也孔子欲勿殤僮汪踦周禮冢人凡死於兵不入兆域則是死於兵革者固有二等也高帝令軍士不幸死吏為衣衾棺斂轉送其家又軍法父子俱有死事得輿喪歸武帝取從軍死事之子孫養羽林號曰羽林孤兒皆所以激厲將帥也羽林令丞表羽林有令丞監羽林中郎將諸吏中郎將羽林監任勝監羽林騎都尉表宣帝令中郎將騎都尉監羽林羽林黃頭郎鄧通都尉通典西漢奉車駙馬二都尉並屬光祿勳奉車都尉表掌御乘輿車武帝元鼎二年初置秩比二千石考異霍光為奉車都尉光祿大夫出則奉車入侍左右奉車蓋始於此東萊曰或以奉車駙馬為加官非也荀氏漢紀及通典並不列於加官即此可考駙馬都尉表掌駙馬武帝元鼎二年初置秩比二千石考異金日磾為監遷侍中駙馬都尉光祿大夫出則驂乘入侍左右駙馬蓋始於此漢制叢録曰駙馬都尉之官雖置自武帝然於時尚主者獨取列侯未拜此官騎都尉表宣帝令騎都尉監羽林勳後志曰主監羽林並屬光祿考異表云武帝元鼎二年初置秩比二千石及按沛公為漢王靳歙遷騎都尉則是漢初亦置矣考異按本表及後志騎都尉本監羽林蓋南軍也及考金涉𫝊在成帝時為侍中騎都尉領三輔胡越騎胡越騎之在三輔者若長水長楊宣曲之屬此北軍也今乃領蓋季年之制也自昭帝用霍山為奉車都尉侍中領胡越兵其制已失之矣考異按都尉本軍中官高祖時靳歙以騎都尉定三秦自後無除武帝以李陵有廣之風拜為騎都尉將勇敢五千教射酒泉張掖其後上官桀以捕反者馬何羅上官安以騎都尉為車騎將軍自此騎都尉遂為一官至宣帝時以騎都尉監羽林故騎都尉遂為羽林官又以騎都尉監護西域其後李尋平當使護河隄北軍中尉府中尉表秦官掌徼循京師武帝太初元年更名執金吾考異武帝始有執金吾之名及按功臣表蟲達從起碭至霸上為執金吾未審當時為何官耳考異北軍中尉主之中尉有中壘令丞左右京輔都尉尉丞兵卒皆屬焉八校尉有中壘校尉掌北軍壘門內則北軍為京城兵而主之中尉亡疑矣中壘令校尉表令一人丞一人尉兩人左右京輔都尉尉丞尉比二千石丞一人六百石武帝元鼎四年置有兵卒元紀建昭元年令三輔都尉二千石城門校尉城門校尉表掌城門屯兵一人百環濟要略云高帝置出從緹騎二十人徐官考曰謹按周官司門下大夫二人鄭氏若今城門校尉漢制叢録曰按劉屈氂𫝊武帝世以戾太子在外始置屯兵長安諸城門表云城門校尉掌京師城門屯兵是城門校尉之官自武帝始有然表但云中壘屯騎等八校尉皆武帝初置至城門校尉獨不言起自何時所未諭也成帝世羊阿侯談成都侯商紅陽侯立踵相躡以特進領城門兵豈至是屯兵益盛又與前世殊耶司馬丞通典曰司馬丞各一人八屯司馬顔曰八屯各有司馬即通典曰司馬丞各一人蓋司馬司馬丞門候征和二年以太子在外初置候通典十二城門候各一人黃圗曰主時謹啓閉霸城門候覆盎門候宣平門候安門候東門候候西安門宣城門候路城門候直城門候厨城門候雍門候橫門候徐官考曰按周司門之屬每門下士二人即門候之官歟城門令史王莽傳王興者故城門令史八校尉八校尉皆武帝初置有丞司馬顔曰自中壘以下凡八校尉城門不在此數中中壘校尉掌北軍壘門內外掌西城荀恱漢紀掌四城門漢儀曰尉一人掌上書者獄上書於公車有不如法付北軍獄東萊曰謹按中壘掌北軍則知八校皆北軍也故後志本注曰舊有中壘校尉領北軍營壘之事中興省中壘但置北軍中候以監五營又按中尉有中壘令丞則知北軍之統于中尉中壘在北門即與南軍不相亂頗有周人辨方正位之意屯騎校尉表掌騎士步兵校尉表掌上林苑門屯兵越騎校尉表掌越騎如淳曰越人內附以為騎也長水校尉表掌長水宣曲胡騎宣師古曰長水湖名宣曲觀名胡騎之屯於曲者劉氏釋名曰長水校尉長於水戰舟船之事也胡騎校尉表池陽胡騎增晉灼曰胡騎不常置故刑法志云武帝內七校者以胡騎校尉不常所以不與也射聲校尉表掌待詔射聲士虎賁校尉表掌輕車八校尉各有丞司馬惟中壘校尉多有尉一人監北軍使者劉屈氂傳任安北史記武帝使任安護軍北軍錢官史記任安笞辱北軍錢官小吏公孫敬用擅用北軍錢總南北軍車騎將軍張安世傳七月罷車騎將軍屯兵列宮衛尉城門北軍兵屬焉又漢儀曰漢置車騎衛將軍左右前後皆位次上卿典京師兵衛衛將軍文帝元年拜宋昌為衛將軍領南北軍軍正主平楊僕又胡建南北各有正置丞丞天漢中胡建守軍正丞衛兵下周廬千列設㦸百重入守虎關出陪豹尾此古人設衛所以強幹弱枝防未然而威不軌也昔成周宿衛之制居則宮正宮伯之衛行則虎賁氏之衛僕從之衛掌於太僕守𨽻之衛掌於司𨽻其制蓋不一矣宮正有宮中之􅑫役宮正掌王宮之戒令糾禁以時比宮中之官府次舍之衆寡凡邦之大事令王宮之官府次舍無失守而聽政令宮伯有公卿大夫之士庶子宮伯掌王宮之士庶子在版者作其徒役之事授八次八舍之職事若邦有大事作宮衆則令之以為環列腹心之任居衛之制然也虎賁氏有虎士八百人掌先後王而趍以卒伍視朝則在路門之右虎賁掌先後王趍以卒伍軍旅會同亦如之舍則守王間王在國則舍王宮國有大故則守王門又夏官司士云正朝儀之位王南鄉王族故士虎士在路門之右行衛之制然也太僕掌奉輿馬督扈從視朝則在路門之左太僕王眂朝則前正位而退入亦如之王出入則左馭而前驅太僕而下有小臣祭僕𨽻僕御僕皆屬焉又司士云太僕左右太僕從者在路門之左司𨽻掌率夷𨽻執兵器服兵服以衛王之門外朝在野外則守內列司𨽻掌師四翟之𨽻使皆服其邦之服執其邦之兵守王宮與野舍之厲禁司𨽻而下有罪𨽻蠻𨽻閩𨽻夷𨽻貉𨽻皆屬焉罪𨽻其守王宮與其厲禁者如蠻𨽻之事蠻𨽻其在王宮者執其國之兵以守王宮在野外則守厲禁閩𨽻掌守則取𨽻焉僕從守𨽻之衛制然也由是言之環列腹心之衛非兵衛在內而不出虎士之衛為重兵之衛非王出亦不行四翟之𨽻則環衛諸門僕從之徒則整飭騶從此宿衛之制詳矣然虎賁綴衣無非吉士侍衛僕從罔匪正人書立政冏命執劉鉞而上戈刃者皆用冠冕之士大夫顧命四人綦辨執戈上刃夾兩階戺一人冕執劉立於東堂一人冕執鉞立於西堂一人冕執戣立于東垂一人冕執瞿立于西垂居虎門而詔王媺者乃率四夷之賤𨽻師氏居虎門司王朝以媺詔王地官師氏使其屬帥四夷之𨽻糾其德行稽其功緒勸以善也宮正稽其功緒糾其德行會其什伍而教之道藝掌其糾禁嚴其誅賞防以過也宮伯掌其政令行其秩序以時頒其衣裘嚴其誅賞由是言之腹心之衛固擇有道有德之賢而宿衛之兵亦皆使賢士大夫為之此宿衛之任嚴矣噫孰知聖人防微杜漸之意不止是耶蓋人君處內庭之時多處外庭之時少親侍臣之意玩親大臣之意嚴今宮正宮伯之兵衛郎衛固為太宰之屬天官宮正宮伯而虎賁之虎士掌於司馬司𨽻之五𨽻掌於司寇皆聽命於太宰內外相維而賢否無相混之嫌事權不分而政令無下移之漸此周制之所以盡善也漢制南軍衛宮衛尉主之官表衛尉一人掌宮嚴衛屯兵北軍護京中尉主之官表掌徼循京師南軍則有郎衛兵衛之别如三署諸郎羽林期門則皆郎衛也表光祿勳屬官有郎掌守門户出充車騎中郎侍郎郎中又期門羽林皆屬焉如衛士令丞諸屯衛侯則皆兵衛也表衛尉屬官有公車司馬衛士旅賁三令丞又諸屯衛侯司馬二十二官皆屬焉是衛也非南軍守宮之衛乎北軍則有調兵募兵之分如三輔兵卒則是調兵而衛表中尉屬官左右京輔都尉尉丞有兵卒按黃霸為京兆尹坐發騎士詣北軍調馬不適士貶秩則京輔兵卒番上北軍明矣如八校胡騎越騎則是募兵而衛表八校尉皆武帝初置中壘屯騎步兵越騎長水胡騎射聲虎賁五按八校雖不明言為北軍然考之後百官志載光武營即八校之並省者而北軍中侯監其營故東漢纍有北軍五校之稱是知武帝八校正北軍也是衛也非北軍護京之衛乎此漢人南北軍之制也朱虛入衛卒平諸吕本𫝊方朔執㦸坐折董偃東方朔為常侍郎上使謁者引內董君偃是時朔執㦸殿下辟㦸而前董偃有斬罪三上有詔更置酒北宫袁盎為中郎却慎夫人之坐本傳日磾之侍縛馬何羅之逆金日磾遷侍中出則驂乘入侍左右馬何羅謀為逆上幸林光宮明旦上未起何羅亡何從外入袖白刃從東廂上日磾擒縛之由是著忠孝之節王國侯國拘不得入漢制王國侯國不得入宿衛龔勝為楚王常侍後三舉孝亷不得宿衛同族犯法限不得與漢制同族犯法不得宿衛蕭望之以甲科為郎後坐弟犯法不得宿衛雖以龔勝蕭望之之賢寧從退免則宿衛所任之人固無愧於周爾然始以南北軍皆𨽻三公而太尉周勃得入北軍以成安劉之功可也本𫝊自武帝踈逺外庭之後衛尉之職領於將軍王莽以右將軍兼衛尉城門之兵領於司馬成帝世平阿侯王談成都侯王商紅陽侯王立皆以大司馬特進領城門兵往往以中朝任之而大臣皆無與焉大司馬之任又非向時太尉之比豈知禁嚴之地大臣皆不預聞則凡可以轉移人主之心志惑亂人主之視聽無所不至異日之變可見爾甚至東漢以來又舉五官郎將羽林虎賁以職屬大夫議郎謁者僕射以文屬後官志五官中郎將左右中郎將羽林虎賁中郎將羽林監以職屬光祿大夫大中大夫中散大夫諫議大夫議郎謁者僕射常侍謁者以文屬分屬闕餘但翊衛二府而已餘見杜牧原十六衛張延師之謹畏至三十年唐職林張延師為左衛大將軍性謹畏典羽林三十年未嘗有過未嘗有過見上阿史那忠之清謹至四十八年無有纎隙阿史那忠蘇尼太子也清謹為右驍衛大將軍宿衛四十八年無纎隙人比之金日磾龎王久典宿衛習知制度龐王久典宿衛習知朝廷制度高祖顧諸將多不嫻儀典故授王領軍武衛二大將軍使衆觀以為模範假志元衛章武門夜不示詔假志元為左驍衛大將軍文德皇后之葬勒兵衛章武門太宗夜遣使至今其披户內使志元拒曰軍門不夜開使者示手詔志元曰夜不能辨比旦帝嘆曰真將軍則宿衛所任之人亦無愧於周爾然始以大臣兼領宿衛使文皇有井寢之安可也元微之行於季友右羽林將軍制曰分八舍之衆寡均三庚之勞逸皆將軍之力也是以李大亮上直禁中而文皇井寢則心腹牙爪之任不細矣時李大亮以冬官兼也自六軍禁衛皆用市人其選始輕天寶之後衛佐悉以假人為軍始京師人耻之至相罵辱必曰侍官而六軍宿衛皆市人祿山吐蕃之變神䇿禁軍外入赴難國家遂以倚重悉命中人主之其勢益橫兵志上元中以北衙軍使衛伯玉為神䇿軍節度使鎮陜州中使魚朝恩為觀軍容使監其軍祿山反伯玉與朝恩赴難至永泰元年吐蕃復入寇朝恩又以神䇿軍屯苑自是復盛分為左右廂大厯四年請以京兆之好畤鳯翔之麟逰晉潤皆𨽻神䇿自是南衙日輕北衙日重矣犬所謂禁軍者蓋太宗舉義兵起太原已定天下悉罷還歸而願留宿衛者三萬人給以渭北腴田號曰元從禁軍本為兵立制非為制置兵唐兵制初高祖以義兵起太原已定天下悉罷遣歸其願留宿衛者三萬高祖以渭北白渠旁民棄膏腴田分給之號元從禁軍後老不任事者以其子弟代其後左右羽林龍武神武及神䇿神威而總名北衙者豈太宗初制哉同上貞觀初太宗擇善射者百人為二畨於北門長上曰百騎以從田獵又置北衙七營選材力驍壯月以一營畨上始置左右屯營於元武門領以諸衙號飛騎高宗置左右羽林軍大朝會則執仗以衛階陛行幸則夾馳道為內仗武后改百騎曰千騎睿宗又改千騎曰萬騎及元宗以萬騎平韋氏改為左右龍武軍肅宗復置神武軍自哥舒翰破吐蕃及安祿山反衛伯玉赴難賜號神䇿代宗幸陜朝恩舉陜兵并神䇿元從後遂為天子禁軍德宗又改名神威且唐之十六衛已備漢人南北軍之制漢以衛尉護南軍以金吾巡北軍今十六衛已有金吾將軍掌京城巡警是北軍已寓其間觀白集羽林衛將軍之制所謂國家設十六衛猶漢之有南北軍其知之矣白集王元輔授左羽林衛將軍制國家設十六衛猶漢之有南北軍而左右羽林尤稱親重而其元從禁軍亦猶官制貟外之制初非禁衛正兵也今以禁軍為北衙衛兵為南衙以備漢制豈不過歟北衙既橫之後外庭諸臣莫之誰何蕭復言之而不見聽蕭復言艱難以來始用宦官監軍權望太重是曹止可委宫掖事兵要正機勿使參預不聽高元裕諫之而不見用本𫝊敬宗視朝不時决事禁中宦寺恣放大臣不得進見元裕諫曰西頭勢乃重南衙樞密之權過宰相帝頓悟而不能檢制人皆危之惜夫推原其故皆外臣不預禁軍専歸宦者其為患至是也噫漢不以中朝屬外朝而使閹宦宿直卒成何進之亂何進傳袁紹說何進誅宦官曰竇武欲誅內寵反為所害者以言語漏泄而五營百官畏中人也將軍宜一為天下除害進然之云云唐不以北衙𨽻南衙亦使宦官典兵反致王叔文之亂兵志順宗即位王叔文用事欲取神䇿兵柄乃用故將范希朝為左右神䇿節度使以奪宦官權而不克其視周人以禁衛屬冢宰之意又何止天淵哉國朝有皇城司有殿前司皇城始於梁之乾化五代梁乾化六年詔曰端門正門也宜以時開敞奪陽氣委皇城使國朝因其名置親從官數千人入內內侍省都知與副同主判之長編仁宗慶厯問張方平言國初循周制置諸班直備爪牙屬殿前司又置親從官屬皇城司嚴立保舉之法選千人以充內殿之衛殿前司始於周之顯德職源殿前司始於周世宗顯德元年國朝循其舊有馬軍步軍獨殿前得統之是故皇城一司於內庭宿衛無不預者而獨宿直諸班禁衛無所統攝至親從之官復命武臣同主其事又非専出於宦者之手殿前一司雖統攝諸班禁衛而皇城之司亦判然不相關亦漢南北軍相統之意也蔡官制皇城司以入內兩都知主內判定事入內都知無不與知者惟宿直諸班禁衛略無統攝而皇城司親從官數千人乃命武臣二貟同兩都知主之而殿前復不與此祖宗處軍政深意也而皇城殿前直相維持實是周人之遺制不特此爾為金吾者有擁衆渡河之功高瓊為金吾將軍真宗澶淵之役瓊擁衆渡河為虞候者有上疏論事之直張耆字元弼真宗朝為殿中都虞候是時大興宮室之役以奉符瑞宰臣丁謂欲殫財力大臣不敢議耆上言土木之役不足奉天意遷樞密為指揮者有手不釋卷之賢燕達字逢辰元祐初為殿前都指揮使然喜讀書手不釋卷神宗以其忠實可用抑不特此爾周以冢宰主之國朝以樞府統之內朝外朝混然一體其政柄兵令一惟樞府之為聽與漢周間史洪肇之徒為之者異矣石林燕語三司天下兵柄皆在其手權雖重而軍政號令則在樞密院與漢周間史洪肇之徒為之者異矣此祖宗之微意非前世所及也此其防微杜漸之意豈人之所能及知哉形勢淮甸隴蜀荆襄自古立國於東南其攻守之勢有三曰淮甸曰隴蜀曰荆襄然設險之地不同而守險之術亦異蓋難守莫如淮易守莫如蜀守蜀當以守為守守淮當以戰為守守襄陽如守淮守荆湖如守蜀此謀國者不可不熟究也夫淮之東根本在廣陵而以山陽旴𣅿為門戶淮之西重鎮在合肥而以鍾離夀春為捍蔽兩淮之地大抵然也然而道途平衍山川廣莫虜騎奔馳衝突莫禦故據淮而守示以必戰此上䇿也因其始至逆而擊之此中䇿也縱敵平原以步當騎是為無䇿謝𤣥破苻堅於肥水方至之初苻堅進屯夀陽列陳臨肥水元軍不得渡元使謂苻融曰君逺涉吾境而臨水為陳是不欲速戰諸君稍却令將士得周旋僕與諸軍緩轡而觀之不亦樂乎堅衆皆曰宜逼肥水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過我以鐵騎逼殺之麾使却陳亂不能止元以精鋭八千涉渡决戰堅衆奔遁晉謝元傳楊行密敗朱全忠於清口未合之際梁太祖遣葛從周鹿師古攻行密夀州行密擊敗梁兵清口殺師古而從周收兵走追至渭河又大敗之五代吳世家其效亦可見也南唐初保淮南劉仁瞻力戰夀春周師逡巡不敢進逮夫陳景逹失紫金之屯宋齊丘遏出擊之師再獻江北而國因以危五代史紀節傳周師征淮先遣李榖攻夀春仁瞻鎮夀州遣兵守城圍之數重攻之百端不能下餘見南唐世家知守淮而不知戰也故曰守淮當以戰為守蜀之根本在成都而漢中為唇齒漢中為保蜀之藩籬而以陜隴為近援守南鄭則長安為可窺守武興則隴西為可取隴蜀之勢大抵然也然其地羊腸鳥跡棧閣巉絶一夫據險千夫莫當惟固守形勝乘機俟時則其效為可全捨險輕出衆寡不敵則其勢為難必是以劉備力守陽平而知曹操之無能為先主率諸將進兵漢中分遣將軍吳蘭雷銅等入武關皆為曹公軍所殺先主次於陽平關與淵邰等相拒蜀記詳見諸葛亮𫝊注孔明列守祁山而知仲達之難勝本𫝊六年春亮身率諸軍攻祁山關中響震九年復出祁山以木牛運糧盡退軍與魏將張邰交戰射殺張邰注亮時在祁山旌旗利器守在險要十二其事亦可知耳此後姜維輕出以圗隴西而蜀口之守不堅故劉氏遂至于亡蜀通鑑云云楊亮輕出以爭仇池而成都之守不固司馬氏遂至於失蜀同上皆不知以守為守故也故曰守蜀當以守為守若夫荆之與襄雖曰密邇而事勢則殊嶓冢導漾東流為漢襄陽為一要會岷山導江灔澦東注江陵為一機會襄以漢為險荆以江為險江可恃也漢不可恃也苻堅取襄陽以馬渡漢晉載記前秦朱全忠取襄陽以浮橋渡漢五代梁太祖記漢豈足為襄陽之險耶故曰守襄陽當如守淮荆州以江陵為要而江陵上有夷陵下有武昌洞庭蟠其左漢陽固其右豈襄陽比耶陸抗言敵得江陵必不能守本𫝊此知兵之言也故曰守江陵當如守蜀夫長江可以固吾國也長淮可以窺河南也川陜可以搗關中而荆襄可以圗宛洛也昔者有蜀無荆蜀卒不能舉魏三國蜀志而今日荆蜀險隘吾實有之昔者有江無淮陳卒不能以拒隋而今日江淮表裏吾實兼之則天下之勢今日固得之矣三險雖可恃而形勢殊不侔當得中興之所以守者守之則退可以卧護吾境進可以掃清朔庭爾然以三者而熟究之最難守者固莫如淮而最急守者亦莫如淮何者蓋兩淮乃吾國之藩籬依山為險則淮之西也恃水為險則淮之東也淮甸坦夷如盱眙安豐鍾離淮隂天長六合等處我之拒敵直一衣𢃄水之限爾使藩籬不固盜賊闖吾之門戶則堂奧且露立矣徒以孤江與敵對壘豈不岌岌乎昔孫權老於兵間堰瓦梁塢壖須今日攻合肥明日攻六合搖搖兵鋒無日不在淮甸非為經略兩淮計正所以為保長江計也此守淮又今日之所急也故詳論之畿兵漢之畿兵始為番上至其後也畨上變為常屯常屯變為逺征而畿兵之制壞矣唐之畿兵始為府衛至其後也府衛變為長從長從變為禁軍而畿兵之制壞矣此漢唐內兵三變之由也古者天子之兵止于六軍六軍之兵止于六鄉其出也則為士為卒為旅為軍為師其入也則有比有閭有族有黨有州有鄉兵無坐食之費民無長屯之勞安有如漢唐逺征長從之兵哉古者五侯九伯二伯専征而諸侯皆共四方之事司馬法王有四方之事則冢宰召師于諸侯虎賁氏奉書以牙璋發之漢食貨志而詩言元戎十乘特以為啓行之先安有如漢人輕出之舉哉古者吕伋掌虎賁之士非有宰相之命則吕伋不敢擅發召公雖得以制命非有二諸侯將命以往則召公亦不敢以専行內外相制事權散主不獨命於一人可見矣書顧命又安有如唐人私親禁軍而盡屬於閹宦之手哉按百官表衛尉掌宮門屯衛兵本表衛尉秦官掌宮門衛屯兵而高后紀言周勃既將北軍然尚有南軍乃令平陽侯告衛尉無納吕産本紀以此知南軍為宫城兵而衛尉主之也明矣又按百官表西漢中壘校尉主掌北軍營壘之事本軍中壘校尉掌北軍壘門內外掌西城至光武變為北軍中候而西漢之初中尉屬官有中壘令丞尉式道左右中候而中尉所職乃巡徼京師本表中尉秦官掌徼巡京師屬官有中壘等互武庫都船四令丞又式道左右中侯侯丞乃左右京輔都尉尉丞兵卒皆屬焉餘見後官志中興省中壘置中侯以監五營以此知北軍為京城兵而中尉主之也明矣然漢初二軍衛士皆調發郡國材官騎士而分番為之民一嵗為衛士二嵗為材官漢儀注云民伍一嵗為衛士二嵗為材官蓋寬饒𫝊衛卒願留更一年本𫝊注蓋寬饒為衛司馬及嵗盡交代上臨享罷衛卒衛卒數人皆叩頭自請復留共更一年則是郡國番上於南軍之制左右京輔都尉尉丞兵卒盡屬中尉上注黃霸為京兆尹發騎士詣北軍黃霸𫝊為京兆尹發騎士詣北軍馬不適士坐貶秩則是三輔畨上於北軍之制第南軍猶調於郡國北軍第調於京輔此漢初畨上之法猶為近古也夫何武帝增置八校募知胡人事者為胡騎募知越人事者為越騎前刑法志又表越騎校尉掌越騎胡騎校尉掌池陽胡騎而北軍始有長屯之兵後恐中尉之權太重乃於光祿勳增置羽林期門皆以世家為之表武帝建元三年初置期門太初元年初置羽林掌執兵送從比郎無貟而南軍始有常屯之兵此番上變為常屯是矣然而未至大壞也夫何光武以來弛郡國守尉都試之役高祖紀張晏注曰材官騎士習射御馳騎戰陳常以八月太守都尉令長會都試課殿最光武省之罷輕車材官騎士樓船之士光武紀建武七年詔曰今國有衆軍並多精勇宜且罷輕車騎士材官樓船士及軍假吏令復還民伍兵備浸壞雖黎陽立營領兵騎常千人以謁者監之號黎陽兵本紀及志而京師南北軍如故不知都試既罷外兵不練而國有征伐終藉京師兵以出自建武訖于漢衰丐奴之寇鮮卑之寇嵗嵗有之或遣將出擊或移兵留屯連年暴露奔命四方而禁旅無復鎮衛之職如明帝永平十年遣騎都尉宋苗出平城北伐丐奴竇固破呼衍王于天山留兵屯伊吾廬城之類或曰東都之兵雖或以執金吾將或以光祿勳將或又以五校將如順帝紀永和二年以執金吾張喬行車騎將軍將兵屯三輔天文志車騎將軍都馬越騎校尉馮柱發左右羽林北軍五校征伐胡七年九月隴西羌反遣執金吾列尚武騎校尉趙世發北軍五校黎陽雍容及邉胡兵三萬騎征西羌之類無非京師領兵之官然恐亦如西都故事何以知其出衛兵耶曰不然西漢之世雖或以內之兵官充將而所將之兵則明言發某郡車騎某郡材官高帝紀十一年發上郡北隴西車騎與巴蜀材官惟宣帝一出羽林佽飛之兵紀以明著之宣帝紀神爵元年發應募佽飛射士羽林孤兒胡越騎若東都則但見遣將行師而已果以何兵而充之也異時皇甫規願借列屯坐食之兵五千擊羌本𫝊西羌攻隴關規上疏求乞自效曰云云願假臣兩營二郡屯列坐食之兵五千出其不意時帝不能用所謂列屯坐食指內外郡所養之兵為言也然則東漢行師大抵羽林五營黎陽虎牙之士爾此常屯之兵又變為逺征其法盡壞也唐兵有十六衛將軍兵有五府中郎將兵十六衛兵即諸州折衝府兵番上宿衛者是通鑑唐太宗紀十一年更命統軍為折衝都尉别將為果毅都尉凡十道置府六百二十四而關內二百六十一皆𨽻諸衛每嵗季冬折衝都尉帥其屬教戰當給馬者官與其直凡當衛者番上兵部以逺近給畨猶漢之材官騎士而將軍猶衛尉也五府兵即勳官子孫以資䕃得補者是又漢之三省郎衛而中郎將猶漢中郎將也唐則總之南衙衛兵其外又有左右屯營飛騎起於太原三萬之卒父子相繼者是見衛兵注猶漢之期門羽林唐則謂之北衙禁兵初太宗定府兵之制應天下之兵皆謂之天子禁軍見上注是以逺而諸郡之府兵近而五府之衛兵又近而兩宮營之親兵皆屬於十六衛將軍每月番上以備宿衛唐兵志府兵之制十二衛為左右皆有將軍以分統諸府之兵有郎將方主團主以相統治又有驃騎二府皆有將軍又見前注三時務農一時講武無坐食也籍藏將府伍散田畝無列屯也此唐府衛之兵為近古也自高宗武后時天下久不用兵府兵法壞更代不時衛士亡匿張說乃請一切募士取京兆蒲同岐華府兵及兵丁而益以潞州長從兵共十二萬號長從宿衛未幾更號射騎自是諸府之兵闕籍不補折衝之將積嵗不遷故兵無全兵將無常將宿衛亦非宿衛此府衛變為長從是矣唐志自高宗武后時天下久不用兵府兵之法浸壞畨役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張說乃請一切募士宿衛十一年取京兆蒲同岐華府兵及兵丁而益以潞州長從兵共十二萬號長從宿衛嵗一番命尚書左丞蕭嵩與州吏共選之明年更號曰騎射然自是諸府兵益多不補折衝將卒嵗不遷士人皆耻為之然猶未極也祿山之反六軍宿衛往往市人西駕之兵僅止千人靈武之士至不滿百元宗末年禁兵浸耗及祿山反天子駕西幸禁軍從者僅千人肅宗赴靈武士不滿百而所謂神䇿兵乃自外來赴難賜號神䇿朝廷倚重兵志祿山反如嘐以伯玉將兵千人赴難伯玉與朝恩皆屯於陜時邉士陷蹙神䇿故地淪沒即詔伯玉所部號神䇿軍後幸陜之變朝恩以神䇿扈乘輿吐蕃之寇朝恩復以神䇿屯苑中自是浸盛指為天子禁軍分以左右廂居北軍之右非他軍比爾代宗廣德元年避吐蕃幸陜朝恩舉在陜兵與神䇿從扈悉號神䇿軍天子幸其營及京師平朝恩遂以兵歸禁中自將之然未與北軍比也永泰元年吐蕃復入寇朝恩又以神䇿軍屯苑中自是浸盛分為左右廂號北軍后遂為天子禁軍非他軍比兵志異日幸梁之斾方旋而定難之號先及唐之所恃神䇿禁軍何如哉自德宗幸梁還以神䇿有勞皆號興元元從奉天定難功臣蓋自肅宗以後府衛射騎之法再變而京師實恃禁軍以為重如羽林高宗龍朔二年始置神武肅宗至德二載置英武肅宗至德後復置寶應代宗以射生軍入禁中清難皆賜名寶應故射生軍又號寶應軍神威兵志自肅宗以後北軍增置威武長興等軍名額頗多而廢置不一惟羽林龍武神武神䇿神威云云總名同左右十軍而神䇿専以宦官主之其勢尤盛逮昭宗以朱全忠誅宦官而神䇿之軍始廢名者固不一軍然神䇿専以宦官主之其勢獨盛於是南衙之衛輕北衙之衛重而大勢去矣此長從之兵又變為禁軍其法盡壞也嘗以漢唐之變詳論之蓋漢方常屯而逺征之變已形唐方長從而禁軍之勢已橫何者京師既設列屯之兵安坐而食甚為無謂於是驅以出征此其勢必至府衛既無可恃之兵一旦有警皆不能甲不得不恃禁軍亦其理然也惜也漢兵出征之後京師單弱閹宦復恣終藉州牧之兵以除之閹宦雖除而董卓之禍成矣董卓以州牧誅宦官唐衛既變之後神䇿獨盛中使弄權終藉藩鎮之兵以誅之神䇿雖誅而朱李之變興矣見上注強幹弱枝之道奈何漢唐不察耶國朝定都陳留前無險阻之形後無藩籬之固我太祖皇帝慮安危之機權內外之勢從容杯酒藩鎮解權州縣精兵悉萃京師張方平上疏伏以京師本古之陳留郡天下四衝八達之地自唐以前嘗為重藩四向無險阻之形藩籬之固逼近戎狄太祖深慮安危之計始削諸藩鎮之權屯兵於內連營畿甸凡禁軍之最親近者號諸班直入侍殿陛出扈鑾輿𨽻於侍衛殿前非諸班直者內守京師外備征伐𨽻於軍頭皇城騏驥院長編凡禁軍之最親近者執㦸殿陛宿衛宫省扈從乘輿號諸班直非諸班直𨽻於御前忠佐軍頭司皇城司騏驥院餘軍皆以守京師備征伐殿前司領騎兵之額三十七步兵之額二十六侍衛司領騎兵之額三十五步兵之額八十三至軍頭僅四皇城僅二騏驥僅特騎兵之二額焉大抵盡屬於殿前侍衛之司長編太祖既得天下收節鎮兵權置諸司軍額自古禁旅之盛無若本朝殿前司領騎兵之額三十七步兵之額二十六侍衛司領騎兵之額三十五步兵之額八十三御前忠佐軍頭司領步騎之額四皇城司領步騎之額二左右騏驥院領步兵之額二通略然殿前侍衛始分而二後拆而三自王超侍衛之職既罷無復任者而侍衛之馬軍步軍列而二之與殿前號為三衙而殿司又重於馬步二司矣實録咸平三年王超自殿前都指揮使遷侍衛馬步軍都虞候餘見職略捧日天武四廂屬之殿司龍衛神衛四廂屬之馬步二司捧日舊曰日騎天武舊曰控鶴龍衛舊曰龍捷神衛舊曰英武太平興國二年改控鶴為天武龍捷曰龍衛虎捷曰祕衛雍熙四年改日騎曰捧日皆以美名易禁軍之號也殿前司捧日天武馬軍司龍衛步軍司神衛謂之上四軍各有左右廂廂各三軍其任至隆其權至重精兵鋭卒皆在焉雖曰京師十萬諸郡十萬內外足相制元豐五年神宗曰藝祖養兵二十三萬京師十萬餘諸道十萬餘使京師足以制諸道諸道足以當京師故內外相制無偏重之患而外兵之弱終不若京師之強也噫其亦祖宗制兵之有道歟選諸道之勇者補禁旅乾德二年令天下長吏擇本道兵驍勇籍其名送都下以補禁旅取禁軍之健者𨽻親軍太平興國三年後苑親閲禁軍取伉健者𨽻親軍罷軟老弱悉分配外州疲弱之夫退為剩貟建隆二年詔殿前侍衛二司簡驍勇者聽為上軍疲弱者退為剩貟上每御講武殿親臨試之老弱之卒分𨽻外郡見上選之精矣或閲後苑見上或訓西郊建隆二年大閲西郊上曰晉漢衛兵數十萬然可用者寡朕親校其擊刺騎射之藝盡為精鋭或習戰朱明池乾德元年鑿池朱明門外選卒號水虎捷習戰池中或閲兵講武殿乾德二年上親閲講武殿得萬餘人屬侍衛司練之熟矣川班殿直以妄訴而併廢乾德中收蜀精兵置川班殿直廩給與御龍直等開寶四年太祖以龍御直扈從郊祀特命增給而川班殿直不得如例擊鼓上訴帝怒曰朕之所與即為恩澤焉有例哉命斬妄訴遂廢其班武雄百卒以肆掠而誅戮乾德中籍諸道驍勇兵送闕下太祖團結為武勇軍凡百餘人白日掠人妻女於城下帝怒捕斬之坊兵作過罪及主將何剡語太祖酒坊火發本坊兵士就便作過太祖以本坊使田處岩等不能部轄處極典雲捷僞印置之極法建隆三年雲捷軍有僞刻侍衛司印者斬之御之嚴矣居重馭輕之勢祖宗謀之何其深歟景祐以來承平日久法制稍弛虎翼質弱不知戰鬪龍衛力綿不能披甲慶厯元年田况上兵䇿七曰新添虎翼軍自南中選材質綿弱自云不知戰鬪八曰騎兵高者無如龍衛有不能披甲下馬者似過乎弱也皇城御士至有竊兵慶厯八年崇政殿宿直皇城司親事官劫取庫兵緣上殿屋何剡兩上書乞重黜陟軍頭步直或有埋器皇祐元年軍頭步直兵上擬欲作過於皇城內先埋藏器仗錢彥逺七上書請根究若鄰乎慢也群公抗疏不能自己於是天子振之大臣汰之韓琦汰冗兵老弱者數萬人軍政肅而士心警矣至于熙寧復加振刷有就而合額者有以全部附𨽻者有併營而增額者部佐整肅無有名存而實缺熙寧三年大整軍額有就而合者如龍衛二十九指揮併為二十有以全部附𨽻者宣威併入威猛廣捷而宣威廢罷契丹直撥入神騎而契丹直廢罷有併營而增額者如宣武二十指揮四百人額併為十二指揮五百人為額有就而易名者如驍猛四指揮以第四指揮改充驍雄存三指揮自是部伍齊整無有名存而實缺也自高俅以恩得用軍政遂弛非復曩時之制紹興三年胡安國言本朝分三衛以掌親軍雖崇寧舊章猶在及高俅以恩得用軍政遂弛陛下承寶位而親兵寡弱豈強本之計高宗慨然嚴訓厲之法紹興二年擢楊沂中為神武中興統制而言者請增衛兵上曰朕命沂中治神武中軍皆宿衛兵也遂命沂中兼提舉衛兵沂中嘆曰勾陳天仗單弱於是招丁壯未半嵗軍容益張遂改中軍為殿前司立轉遷之制紹興五年時諸將所總嵗嵗奏功而天子親兵久無遷轉趙鼎請立為轉遷之法復祖宗之制神武中軍改入殿前見上注都督軍馬悉𨽻三衙趙鼎言都督府兵馬合𨽻三衙上曰祖宗故事軍馬未有不𨽻三衙今正之甚善凛凛乎國初之遺意噫盛哉愚嘗究觀祖宗內兵之制其微意猶有二以發兵之權付樞府以握兵之重委三衙欲其彼此之相維一也故有樞密承㫖權馬司者而范公祖禹力言不可兼有發兵握兵之職范祖禹言樞密副都承㫖曹誦權馬軍司祖宗兵法本於樞密有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權今樞屬官任管軍是本兵之地又得握兵合而為一非祖宗制兵之意以禁軍之強者備周廬以禁軍之次者代諸路見前注欲其畿兵之不出二也故皇祐邉郵有警畿兵調發而包公拯言調畿兵非固宗社之䇿皇祐元年包拯言畿兵雖有大故不可多調發近來邉郵有警乃一例調發恐非固宗社制夷狄之良䇿今祖宗成憲萬世不易然中興以來殿司步司守護王畿馬軍一司出戍金陵畿兵馬軍一司中興以後嘗出戍建康雖咽喉之鎮欲示威重而根本之所盍以權其輕重乎州兵神宗有言藝祖養兵二十二萬京師十萬餘諸道十萬餘使京師足以制諸道諸道足以當京師故內外無偏重之患深矣哉我藝祖立國之謀也神矣哉我神宗察治之智也神宗嘗曰藝祖養兵比二十二萬京師十萬餘諸道十萬餘使京師內之兵足以制諸道諸道則無外亂合諸道之兵足以當京師則無內變內外相制無偏重之患天下承平百餘年蓋因於此王圭曰國朝兵制雖詳莫能推明其意張璪曰非陛下神聖孰能知之愚嘗仰稽聖訓逺閲歷代其治亂安危未有不由乎此古者六鄉之內六軍寓焉六遂之內軍又倍焉此在內以為強本之地征徐以魯伐貊以韓平淮夷以江漢此在外以為治亂之具費誓魯侯伯禽宅曲阜徐夷並興東郊不開作費誓孔安國注徐戎淮夷並起為寇於魯魯侯征之於費地為誓衆於魯東郊之地貊下文甲戌我惟征徐戎又韓奕詩王錫韓侯其追其奄受北國又江漢詩命召公平淮夷二者不可偏失也尚矣至秦初銷鋒鏑聚咸陽而陳勝至乘虛以外亂過秦論又陳勝傳後復以重兵伐趙而漢高掉臂而入關章邯提內兵伐趙漢高帝遂入秦關內外不能相維此秦所以不支爾噫秦之覆轍豈不可鑒而漢唐之君復蹈之君子未嘗不嘆其謀國之踈也嘗謂漢唐內兵之制其變適同而外兵之變亦無以異大抵始失於過重故盜賊有竊興之便後失於過輕故牧鎮有難去之患其本末有不難考者且漢列郡有都尉佐太守典武職甲卒王國則以內史比郡守中尉比都尉侯國則亦有相秩比天下令長前官表郡尉秦官掌佐守典武秩甲卒秩比二千石景帝更名都尉後百官志注漢舊儀曰大司空何武奏罷內史相如太守中尉如都尉添職是後中尉爭權而互相奏常不和也後百官志侯國每置相一人其秩各如本縣注曰主治民如令長同上中尉一人比二千石注職如郡尉主盜賊每嵗八月會太守都尉令長相丞咸預各以其方之所習而課殿最焉前高帝紀材官騎士習射御馳騎戰陳常以八月太守都尉令長咸會都試課殿最也巴蜀三河頴川之材官按高帝十一年發上郡北地隴西車騎巴蜀材官上郡北地天水安定之騎士武帝元鼎六年發隴西天水安定北地上郡騎士廬江會稽之樓船地里志廬江郡有樓船官又卜式𫝊願與𫝊昌習樓船者擊呂嘉又伍被𫝊有潯陽之船又朱買臣傅為會稽太守詔到郡治樓船是也然齊王發兵并琅琊兵而西以赴諸呂之難則外兵足以制內諸呂謀亂朱虛侯如京師使人告兄齊王王遂發兵又并琅琊兵而西以二國兵入京師亞夫將二十六將軍往擊吳楚則內兵足以制外本傳漢初相制之意非不善也夫何都試一罷外備單弱後百官志中興建武六年省諸郡都尉并職太守而都試之役省關都尉於是北胡有變始置度遼官明帝紀永平八年初置度遼將車屯五原漫柏南蠻或叛則置象林兵和帝紀永和十四年五月初置象林將兵長史官羌犯三輔則置長安雍二尉安帝紀永初四年丐奴寇常山初置長安二營都尉官鮮卑寇居庸則置漁陽營安帝紀建光元年鮮卑寇居庸十一月置漁陽營兵然兵不素練戰非素具臨時取辦每出輒北外兵終失於弱耳逮至盜賊競起外始盛置立為積射鮮卑𫝊延平四年鮮卑入上谷攻居庸關復發緣邉諸郡黎陽營兵積射士步騎二萬人屯列衛要募為陷陳西羌𫝊任道遣假司馬募陷陳士擊零昌於北地邉置義從假紀明傳桓帝咸熹四年冬上郡由氐隴西鳥吾諸種羌共寇并凉二州紀明將湟中義從討之州為牧鎮靈帝從劉焉之請牧刺史新置牧外兵既重內兵復弱盜賊雖衰牧鎮已盛是以京師有變則邊郡長驅而至董卓曹操之徒相繼而入漢祚遂以鼎立此又矯重外兵之失也董卓曹操皆以鎮兵入京師唐之府兵折衝都尉雖遙𨽻於諸衛軍城守捉實散在於諸道每嵗季冬折衝將率兵馬之在府者置左右校習戰陳之儀步隊騎隊之有其制擊鉦伐鼓之有其節國無不習之兵兵志太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而關內三百六十有一皆以𨽻諸尉唐初兵之戍邊者大曰軍小曰守捉曰城曰鎮而總之曰道其軍城鎮守捉皆有使而道有大將一人曰大總管又唐每嵗季冬折衝都尉率五校兵馬之在府者置左右校尉每校為步隊十騎隊一皆卷矟幡展刀旗散立以候角手吹大角一通諸校皆斂人騎為隊云云然府兵六百三十四所以三百六十有一在關中固為重本計而復道二百有餘分布錯置亦為防外設唐初相制之意非不善也見上夫何更代法廢諸府之籍不補折衝之將不遷唐制張說以府兵為射騎然自是諸府士益多不補折衝將積嵗不遷士人皆耻為之及范陽之變所過州縣望風瓦解如入無人之境外兵蓋失於不補耳唐祿山反范陽所過州縣望風瓦解又顔真卿𫝊祿山反河朔盡陷獨平原城守備元宗嘆曰河北二十四郡無一忠臣邪逮至諸鎮之兵共起討賊其後安史繼亂中國雲擾肅宗命李光弼等討之號九節度之師大盜既滅而武夫戰卒以功起行陳者皆除節度由是方鎮相望於內地朝廷不能制而井為姑息之政唐兵志祿山反犯京師天子之兵弱不能抗遂陷兩京肅宗起靈武而諸鎮之兵共起誅賊其後祿山子慶緒及史思明父子繼亂中國大亂肅宗命李光弼等討之號九節度之師大盜既滅而武夫戰卒以功起行陳列為侯王者皆除節度由是方鎮相望於內地大者連州十餘小者猶兼三四天子不能禁則忍恥含垢因而撫之謂之姑息之政始時為朝廷患者河朔之鎮及其末朱全忠以梁兵李克用以晉兵更犯京師而李茂貞韓建近據岐華妄一喜怒兵已至國門矣其他大鎮南則吳浙荆湖閩廣西則岐蜀北則燕晉而梁盜據其中自國門以外皆列於方鎮矣是以京師有變藩鎮亦驅兵而至朱李之徒相繼犯京見上唐族遂以瓜裂此亦矯重外兵之失也嗟夫輕則盜賊以乘隙重則牧鎮以據兵為國者安可不權其勢歟國朝州兵之制有禁軍有廂軍有禁廂軍國初以天下精兵萃之京師而其餘者分布於諸郡以備戰衛此謂之禁軍見衛兵門宋有天下以來凡役使營繕不調於民皆兵役之此謂之廂軍兵志國朝以備戰衛為禁軍以給徒役為廂軍各𨽻其州之本城由總於侍衛而兵部掌出號令又以廂軍教閲者始號禁廂軍后以為下禁軍熙寧三年詔以禁軍分五都法以檢治廂軍熙寧元豐之間廂軍之數視祖宗時益重矣自三代后凡國之役皆調於民故民以勞弊宋有天下悉役廂軍凡役作及諸營繕民無與焉故民力全固承平百年熙寧取廂軍之壯者而教之留之在城免其難役此謂之禁廂軍見上然州郡所恃以為屏翰王室者惟禁軍而已其始末可不論歟蓋太祖懲前代之弊收藩鎮之兵連營畿甸守衛皇居而州郡之兵不免有疲弱之弊至咸平以後循習日久諸郡撤備咸平三年王禹稱言太祖之初十分天下有其七太宗嗣業天下一家議者乃合江淮諸郡毁城湟撤武備者三十餘年後恐太弱乃募陜西之強壯為保毅簡保毅之精卒為振武於是有保毅振武之禁軍咸平四年九月詔陜西民家出一丁號保毅軍給資糧與正兵分戍守城壘遣御史吳倩與轉運使同主其事凡得六萬八千七百九十五人具緣邉兵上先選中者並升為禁軍號保捷景德元年陜西運使言西面沿邉諸州於保毅諸軍內簡集成振武軍四十指揮自立北軍邉聲振戎不敢寇康定以來元昊陸梁禁衛皆西乃籍民兵以補軍籍升廂軍以充禁旅於是有保捷武衛宣毅之禁軍張方平言康定之末慶厯之初議刺民兵極論其害今日果然太祖朝兵不及十五萬太宗朝不過四十萬祥符已後稍稍消伏而因西戎阻命始籍民兵俄以補軍籍升諸州廂軍以充禁旅陜西河北京東京西增置保捷一百八十五指揮武衛七十四指揮宣毅一百六十四指揮慶厯間鼠竊內訌復於閩浙江淮間修武備增指揮於是復有保毅之禁軍同上慶厯三年因王倫張海等賊於江淮湖浙福建諸路又添保毅等二十四指揮凡內外增置禁軍約四十二餘萬人通三朝兵八九十萬其廂軍鄉軍義軍不在此數自是而後或刺義勇治平初刺義勇軍十五餘萬或校廂軍見上而兵始克大備在慶厯已有八九十萬治平後有十五餘萬至於熙寧又不知其幾矣祖宗所以權衡內外之勢何其當耶然在國初常精在今日常惰豈非役之太過歟夫兵者不役役者不兵今諸郡所謂禁兵者大抵與廂軍無異技巧工匠者若人也改借占留者若人也又或者常時執法物備呵導以為兵也若是而謂之禁軍其不習於驕且惰乎求其所以教之則有兒戲而無法制也有賞賚而無黜責也器械之相角不能無精而不能皆精弓弩之俱發不能無中而不能皆中膂力無爭戰之苦而賞給有必得之利日未及昃返斾而歸是旬教月教春秋大教反為官吏逰賞軍級邀求之目何有於較藝春秋大閲差官按教反為路分鈐轄騷擾州縣之資何有於教閲禁軍且爾廂軍又何暇教乎夫州縣之兵即殿侍之兵名曰在外實統於內更戍迭出於殿侍二司者皆精卒分於州縣者皆惰兵蓋殿侍二司了無他役而州縣不専為兵故也是則熙寧私役禁軍之制在今日不可不講也熙寧中私役禁軍雖經郊叙復永不與親民差遣况國朝之制庫曰軍資官曰參軍務曰贍軍而為守倅者亦先軍而後州其於軍事重矣詎可視曰期會故常而不加之意乎屯田田不井授國有兵費糧以漕運士有饑色孫子千里饋糧士有饑色後之欲為富國足兵之計者不出屯田之制耳蓋自文帝募民耕塞下已有屯田之說朝錯傳錯言守邉備塞勸農力本當世急務其略云自武帝遣戰士田燉煌至鹽澤始有屯田之規前西域𫝊漢興至于孝武始開西域自燉煌而西至鹽澤往往起程而輪臺黎渠皆有田卒數百人成於昭宣廣於魏晉而極盛於唐大抵漢之屯田以兵唐之屯田以民其餘歷代或民或兵蓋不一也漢自通西域始於校尉將卒屯田渠黎而車師前王庭専用戊已校尉見上餘見西域𫝊趙充國既罷兵留屯田蓋弛刑應募及淮陽汝南兵故曰九校萬人郡騎伉健胡騎各千倅馬什二則為遊田以防寇鈔趙充國𫝊此非兵耶唐因軍府以置屯田天下之屯凡九百九十有二或𨽻司農或屬苑內或分諸州或以卿少循行或以御史蒞輸或有警以兵千人助護此非民耶唐兵志其他始屯渭水蜀諸葛亮𫝊分兵屯田為久駐之基耕者雜於渭濱田荆州晉羊祜鎮襄陽墾田八百餘頃祜之始至也軍無百日之儲及至季年有十年之積則如漢人之制也任峻之募田魏志任峻𫝊曹操以任峻為興農中郎將募民屯田許下隋人之立堡隋高祖開皇二年於河西百姓立堡屯田則如唐人之制也要之皆可省運漕而寬國費兵民俱便也然尚論屯田之制其說有三兵屯而不戰則可以耕議定而不搖則可以耕命將帥以先士卒則可以耕何者春務方殷邊塵復警秋禾方熟胡騎復蹂屯其可久乎甲可乙否徒憚一勞彼是此非或惜暫費屯其可成乎應容師募稼穡為凂嬉逰連營耒耜所羞者尤不可之甚者三者而一失焉則難就矣諸葛之屯渭上見上張公謹之屯代郡張公謹𫝊正觀初為代郡都督置屯田以省餽運皆養兵蓄鋭而不廢耕墾者歟金城之屯議者紛紛而充國卒違詔罷兵以成屯田之利趙充國傳許下之田疑若旦攻夕戰而不暇者而曹公獨從棗秪之計而嵗得數萬石魏公曹操破黃巾恐軍乏不足羽林監祇建置屯田於許下嵗得榖百萬斛皆素有成謀而不惑異議者歟子儀躬耕百畝軍士不勸而耕代宗時郭子儀以河中軍食常乏乃躬耕百畝將校以是為差軍士皆不勸而耕卒成野無曠土軍有餘糧之效婁師德身衣皮袴士卒樂為之田婁師德為豐州都督衣皮袴率士卒屯田積有數百萬皆將帥率先士卒之驗歟五代干戈之餘所在土曠民稀農田之政往往殘缺而不補國初始創營田務於唐鄧襄三州雜置營田使於河北東西路國初有屯田使屯田務襄唐鄧三州有營田務如州通判陜西路營田招置使河東漕運兼東路招置營田使夫創務以督其耕置使而勸其事務農之政可謂切至然以州而論則僅行於三州以路而論則才舉於兩路猶未繼及於天下自端拱以來又置使於河東其後樊知古等出使則盡推其法於逐路而屯田之利始博端拱二年以陳恕為河東路招置營田使欲大興營田當雍熙之間強胡纍為邉害天子念守兵嵗廣於是方田之法自此始是後開易水疏雞跖修鮑河之利邊屯以次立矣時命樊知古等出使時或調兵卒田河北續通鑑王守斌田永興以戍卒王沿之田河北以役卒或調丁夫田襄陽真宗咸平二年耿望知襄州置營田上中下三務調夫五百築堤市牛七百頭分給之兵民蓋通用矣然成說未定衆議易搖作室道謀欲書掣肘此君子所深惜也故雍熙遣議臣於宿亳夀春襄鄧之間得田可治者三十六萬頃養兵待敵可也而任事者破其議而終莫興焉長編雍熙中遣議臣東出宿亳至夀春西出許潁轉陳蔡之間至唐鄧事則得田三十六萬欲修耕屯之業天子尤意向之而任者頗壞其計故功不立淳化命屯田使於河北沿邉之地建田種植禾稼成熟將帥在責勤也而沮其議者頗衆焉淳化四年初何承矩至滄州即建屯田之議上意頗向之會黃懋以上書請知河北諸州興作水田以承矩為制置河北沿邉屯田使承矩建水田之議沮之者頗衆又武臣亦耻于營葺細作既而種稻又不熟羣議益盛幾罷其事及是承矩載稻穗數車還闕下是不特在神哲之時也中興以來尤切留意書充國留屯之事其勉之也至高宗紹興六年上曰朕昨在會稽嘗書趙充國𫝊以賜諸將但上下不能奉承申建隆嵗課之法其督之也勤紹興十八年九月上曰淮南阡陌相望素號沃壤今皆為不耕之田良由州縣不務招來安集以致流移未盡復業建隆初以戶口增置為守令嵗課之法宜令使部申嚴行下淮南官莊四十三耕田二百二十五頃官得萬九千九百九十八石建康官莊三十九耕田一百八十四頃官得六千五百三十石倣陜西弓箭手之規其謀之也審詔令孟庾韓世忠措置將兵馬為屯田之計體倣陜西弓箭手法所貴耕植漸廣以寬民力韓世忠田金陵紹興二年詔左司張綱等條具陳說及臣僚獻議屯田盡一以聞中書門下言建康府南南北岸荒田甚廣詔令孟庾韓世忠措置為屯田之計嶽飛田鄂州嶽飛任宣撫使日於諸軍揀撥老弱不堪披帶官兵七千餘人立為撞軍名額専使營田於鄂州王之竒田兩淮紹興九年令知揚州王之竒措置兩淮屯田吳玠田梁洋紹興五年詔吳玠於梁洋等州措置官莊屯田今已就緒漸省餽運以寬民力當時淮南官莊四十三耕田二百二十五頃官得萬九千九百九十八石建康官莊三十九耕田一百八十四頃官得六千五百二十石見上其明驗可見矣今之為邊計者果能行是䇿乎否也聞有𢃄措置屯田之銜者矣而率先士卒未聞也知有省漕運寬民力之議者矣而留屯省漕未知也間有充國棗秪之徒出為國計不以異議而搖則以小費而沮所以方成而遽廢也夫今兩淮之地沃壤千里淮之右如安豐如合淝淮之左如淮南如瓜步雷瑭之田既耕則淮之左可守芍陂之田既耕則淮之右可守屯田之利其可不興乎昔鄧艾屯兩淮淮之南北計五萬人什二番休尚有四萬度六七年間十萬之衆有五年之食即今兩淮之遺迹也見上今荆襄之區瀰漫相望西出河洛不盈百里近可以通關輔綴隴蜀逺可以俯視秦趙據上流鮑渠赤河之利既興則樊城沔口可無屯戍之患屯營之利其可不興乎昔羊祜之於襄陽減戍邏之卒墾田八百餘頃始至無百日之糧季年乃有十年之蓄即今荆襄之遺迹也見上以魏晉且爾况今堂堂之天下乎今倣魏晉之故地參漢唐之舊規近邊則以兵內地則以民兵責之將帥民責之守令以是而課殿最以是而考能否又安有難就之緒哉士飽而歌馬騰于槽可旦夕兾耳民兵以民為兵古法也然古者之民樂於為兵後世之民憚於為兵蓋其為說幾千百年於此矣愚嘗推求其故蓋古者寓兵於農後世寓農於兵又其後也籍農以為兵蓋民兵之名雖同而民兵之意實異也夫寓兵於農自為已衛而民不知其為兵寓農於兵樂為公役而民不害其為兵至籍農以為兵者非所願為而強之使從非所素習而驅之使戰民於是乎不堪矣成周盛時比閭族黨皆伍兩軍旅之師禮大司徒令五家為比五比為閭四閭為族五族為黨五黨為師五師為軍又小司徒乃會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍凡起徒役毋過家一人搜苗獮狩皆征伐擊刺之制夏官大司馬又左隱五年春搜夏苗秋獮冬狩卿士大夫皆將帥司馬之職此寓兵於農也漢人調兵之法起田中者為吏卒馮唐傳士卒從田中起安知尺籍伍符為衛士者業農桑後禮儀志罷遣衛士勸以農桑唐府兵番上之制無事則執耒以耕有警則荷戈以戰此寓農於兵也及其後則兵民一裂不可復合始矯而正之不過籍民為兵而已昭義步兵雄冠山東李抱真𫝊抱真為懷澤路觀察留後凡八年抱真䇿山東有變澤潞兵所走集乘戰伐後賦重人困軍伍雕形乃籍戶三丁擇一蠲其徭租給弓矢令嫻習三年皆為精兵乃曰軍可用矣遂雄山東天下稱昭義步兵為諸侯冠雄邉子弟威伸南詔李德裕𫝊徙劒南西川乃建籌邉樓又調甲人於安定弓人河中弩人浙西由是器械犀鋭謂之雄邉子弟於是二邉浸懼南詔還所俘此固籍民為兵之效然其弊也自兵而戰而非武庫之器自農而食而非縣官之給民未免有憚役之勞又其弊也散於州縣者籍為營壘之符遊於田畝者律以卒伍之令民未免有怨恨之情其視抱真德裕之謀畫又不及爾民安得樂而為之哉我國家以仁立國不専在兵自河東既平之後西北二患我獨當之趙普曰云云故咸平景德中多有事於西北是也自是中國之兵增至六十餘萬然問其禁旅不若土人也景德二年陳貫上兵論三篇言禁旅當以衛京師不當戍邉莫若募土人問其東兵不若土兵也田况言振武保捷皆是土兵材力伉健武藝精強其餘請給微甚不及東軍之下者新添武藝軍不知戰鬪若添土兵請給其立功必不在東軍之後是三路備邊之民兵蓋有益於國家河北河東之強壯陜西之保毅其所謂民兵乎謂民兵果盡善耶則未免羣公之所議謂民兵果未盡善耶則何為服邉人之心也嘗究始末而論之夫河北河東強壯之民自五代時瀛灞諸州恃以雄壯國勢至景德間以其明效於前代遂以籍民而為之人以五百而為指揮射極至精而為校長此強壯之集本民兵也長編河北河東強北自五代瀛灞諸州已有之恃以為壯真宗咸平三年始詔河北民家二丁三丁籍一四丁五丁籍二六丁七丁籍三八丁以上籍四為強壯五百人為指揮置指揮使百人為都置正副都頭二人節級四人所在置籍擇善射者第補校長聽自置馬勝甲者蠲其户役尋募其勇敢團結附大軍為柵官給鎧甲陜西保毅之名自咸平間詔陜西家出一丁號為保毅官給資糧戍同禁旅既主之以轉運遂撫之以六萬八千之衆簡閲既精義勇可用此保毅之集亦民兵也長編咸平四年詔陜西民家出一丁號保毅官給資糧與正兵分戍守巨壘遣御史吳倩與轉運使同主其事凡得六萬八千七百九十五人其緑邉兵士先選中者並升為禁軍號保捷至後元昊陸梁禁兵皆西州郡單弱莫備不虞強壯保毅之外復簡弓手之兵亦一時不得已之計此弓手亦皆民兵也慶厯二年詔簡河北強壯刺為義勇不願者釋之有其籍以備守葺城池自此強壯浸廢又簡河東鄉弓手亦為義勇而陜西之弓手為保捷分戍邉外時初置義勇人情訩訩乃詔李昭逺開諭父老民始安焉長編本朝方元昊之叛也禁兵皆西而諸路守兵多揀赴闕郡縣無備乃命召額外弓手蓋邉兵居沙磧之地苦寒好勇自古禦寇却敵非此不可而兩河陜西之民灑沐風雨諳歷山川材力伉健天性純實無事則射獵自娛見敵則奮不顧身茍優其田疇安其室廬使力耕死戰世為邊用則可以減屯戍省餽運為不易之利慶歷二年賈昌朝言河北河東強壯陜西弓箭手之屬蓋土兵遺制也且戎狄居苦寒沙磧之地惡衣食好馳善射自古禦寇却敵非此不可今宜優復田疇安其廬舍使力耕死戰世為邊用則可以減屯戍而省供饋為不易之利內地州縣增置弓手亦當給如鄉軍之法而試之民何憚而不為哉惜也強壯之兵始者不過鳩集鄉閭見前注後至抽赴京師田錫咸平六年上疏今國家為少闕京兵防禦邉戍遂於曹單永亳陳蔡汝潁之間㸃集騎士㨂選強壯得五七萬人諸聞始降宣命指揮只令本城防守及至奏聞都數即並抽赴京師如此失信令下皆懷怨望豈得無詞又後涅為正軍而強壯之意隳張方平慶厯四年上疏臣伏見宣差朝臣分路往陜西河東京東西路於前來㸃差強壯弓手內招募願充軍人分配宣毅保捷者自去嵗初降敕命㸃差強壯弓手之時民間喧然皆言此時㸃差皆以強壯弓手為名實㸃補軍籍敕㫖屢下原諭只要護縣鄉必不起從征戍郡縣又多方安輯民猶猜驚今此命果下如民所素料此後命令無復可信此其不便一也遂歷陳六不便之說保毅之兵始者無異編氓後至刺手黥面張方平慶厯中論刺陜西路悉充保捷軍京東西路弓手強壯悉刺充宣毅又司馬溫公治平元年議刺陜西義勇總十五萬六千八百人司馬公極言其不可韓公琦曰君但見慶厯間陜西鄉兵初刺手背後皆刺面充正軍憂今復然耳今已降敕永不充軍邉戍矣吾在此君何憂光曰相公長在此可也他人在此因已成之兵使運糧戍邉反掌間耳後義勇運糧戍邉率以為常又後運糧戍邊見上注而保毅之制失至三路弓手之兵或刺充宣毅或刺充保捷見上注皆永為禁兵矣嗟夫散在郡縣自蠶自食不耗帑帛不蠧廩粟國無所費也自處以連營則仰給縣官耳身為丁氓為農為兵有事而戰休戰而耕民以為便也自𨽻以正籍則終身失業爾張方平上疏強壯弓手各在郡縣未去農業若朝廷用漢代耕之術因唐防秋之法入耕出戰遞為防戍則是農不去業兵不舍備不困帑廩之積當時丁壯之人今既籍為正兵處之連營則其衣食財用仰給縣官此其不便也夫韓公一代元老也措謀立畫夫豈不審弓箭之刺率皆市人所至為寇張公已言之而韓公未之聽墓志時於諸路刺弓箭手為宣毅保捷指揮方平連諍之不從所刺兵皆市人不可用而宣毅驕甚所至為寇識者以不從方平言為議義勇之刺其後戍邉率以為常見前注溫公已言之而韓公未之信是豈韓公之慮不及二公耶噫公非不慮及此也觀公請刺義勇之疏謂三路當西北控禦之地宜㸃義勇止刺手背一時不無小擾而終成長利是公亦知一時之擾但心乎為國故不暇恤矣韓琦治平元年奏今之義勇河北幾十五萬河東幾八萬勇悍純實生於天性陜西當西事之初亦嘗三丁選一丁為弓手其後刺為保捷正軍及夏國納欵所存無幾河北河東陜西三路當西北控禦之地事當一體今若於陜西諸州亦㸃義勇止刺手背一時不無小擾而終成長利詔從之觀公誦石壕吏之詩謂後世調兵於民殆無虛嵗今收拾強悍養以為兵使終身保骨肉相聚之樂是公蓋憫其調兵戍邉之弊故心乎為民他不暇問矣别録琦議及養兵事慨然曰琦有所思而得養兵雖非古然自有利處昔者發百姓戍邉無虛嵗杜甫石壕吏篇調兵於民其弊至此後世既收拾強悍無賴者養之以為兵良民雖稅斂良厚而終身保骨肉相聚之樂此豈小利夫何熙寧大臣用趙子幾之言行團集保甲之法而民病尤甚夫強壯團結之名在咸平亦嘗行之見上注然不過藉之以威夷狄熙寧欲廣其法於天下始命三路盡團而為甲焉熙寧三年因趙子幾之請藉畿民為保甲置提舉官教閲之後推行諸道方耕而輟方耘而罷民於是有羈縻之苦既受笞於長正又受辱於縣令又受笞於提舉之官民於是有鞭笞之苦王岩叟論保甲之苦朝廷知教民以為兵而不知教之太苛而民不易堪知别為二司以總軍而不知擾之太煩而民以生怨方耕而輟方耘而罷方幹而去此羈縻之所以為苦也其教也保長得笞之保正又笞之巡檢之指使與巡檢者又互鞭之提舉之官長又鞭之一有逃避縣令又鞭之此鞭笞之為甚苦也時父老之諺曰兒曹空手不可以入教場非虛語也此誅求之所以甚苦也諺曰兒曹空手不入教場民之不堪甚矣上注天子曰民兵妨農也安石曰以農為兵也上論變義勇為民上曰民兵雖善止是妨農事如何安石曰有事以農為兵始發之以戰守其妨農之時少云云天子曰民兵未可恃也安石曰不患不為用也上曰止是民兵未可恃以戰守奈何安石曰有將帥則不患民兵不用往往借周官閭胥比長之說以自文其誰欺邪安石與馮京辨河北弓箭射法云云兩司馬即是閭胥伍司馬即是比長但隨時異名而已善乎程明道之言曰有關睢麟趾之意而後行周官之法度語録惜乎安石之不悟也可勝嘆哉雖然亦不可因噎而廢食也中典以來兩淮荆襄専倚民兵以為重其經畫亦有具矣然無事具其名而有事不收其用何者總於總管者總管不之恤領於郡守者郡守不之念賦役蠲免為惠幾何旗幟器械悉令自辦今果何時而不之顧耶噫得一曹公瑋則陜西皆良兵言行録用一种世衡則青澗皆善射同上种世衡在青澗城課民習兵以銀為的射中與之後人無不能者有官守者盍加勉古今源流至論續集卷一
