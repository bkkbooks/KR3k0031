body:
  text: 古今源流至論别集卷五宋黃履翁撰表志上班史之表不及遷昔邵氏論班固表志之優劣謂遷作歷代史表志當著歷代固作漢史表志不當著歷代嗚呼固之不及遷者豈止是哉聞見録遷作歷代史人物表食貨等志當著歷代之人固作漢史表志亦著歷代之史失於畏遷也夫子長負邁世之氣登龍門探禹穴採托異聞網羅往史合三千年事而斷之於五十萬言之下措辭深寄興遠抑揚去取自成一家如天馬駿足步驟不凡不肯少就於籠絡彼孟堅摹規倣矩甘寄籬下安敢望子長之風耶夫表者興亡理亂之大略而固之表則猶譜牒也書者制度沿革之大端而固之志則猶案牘也且遷之諸侯年表以下以地為主故年經而國緯所以觀天下之大勢如髙帝五年韓信王楚英布王淮南盧綰王燕張耳王趙彭越王梁韓王信王太原吳芮王長沙則天下之勢異姓強而同姓未有封者也如髙帝六年髙祖弟交王楚髙祖子淝王齊英布王淮南盧綰王燕張敖王趙彭越王梁髙祖兄喜王代吳芮王長沙則天下之勢異姓與同姓強弱亦略相當也髙祖功臣年表以下以時為主故國經而年緯所以觀一時之得失如髙祖功臣年表髙祖功臣侯者一百四十三至文帝之世存者一百二十五至武帝時存者七十一則時之守先典待舊勳孰得孰失皆可知矣如惠景間侯者表建元之後存者二國太初已後又皆國除則時之政事孰緩孰急皆可知矣所以封之功名所以亡之刑名所當詳考如建元以來侯者表元光元朔元狩以來不以胸奴則以南粵則知時之用兵戰功居多矣按建元以來侯者表元光侯者四元朔侯者二十元狩侯者十二皆以胸奴封惟公孫宏以丞相封元鼎侯者十六皆以胸奴南粵封惟如意以周後欒大以方術石慶以丞相封如建元以來王子侯者表元光侯者七元朔侯者一百二十七則知時之分封侯子施行次第矣按建元以來王子侯者七元朔侯者一百二十七元狩侯者二十五元鼎侯者三漢興以來將相名臣年表以大事為主所以觀君臣之職分如髙帝元年大事記沛公為漢王之南鄭還定雍而相位書蕭何守漢中御史大夫位書周苛守滎陽髙帝九年大事記未央宫成置酒前殿帝奉玉巵上太上皇壽曰今臣功孰與仲多而相位書蕭何為相國御史大夫位周昌為趙丞相則君臣之職分或得或失皆歷歷可見矣史記漢興以來將相名臣表彼班氏之表何如哉侯表徒列子孫世數之繁官表徒書公卿拜罷之日是特聚諸家之譜牒耳未聞有發明一代之意也且諸侯年表曰異姓王者曰同姓王者遷則合而為一正以明漢初親疏相錯之㫖固廢年經國緯之制徒以一已之見乃以異姓同姓分而為二則天下大勢何觀焉按漢史分二表異姓諸侯王表又諸侯王表功臣年表曰髙祖功臣侯者曰景惠間侯者曰建元以來侯者遷則析而為三正以明一時行封異同之意固廢國緯年經之制徒以卷帙重大之故乃以髙惠髙后文帝景武昭宣元成析而為二則當世得失何驗焉按漢史髙惠髙后文功臣表又景武昭宣元成表與史記異建元以來王子侯者表斷自建元蓋是時始行分封之典遷意正有在也固則起於髙祖且謂聖祖建業以廣親親殊失王子侯表之本㫖矣按史記有建元以來王子侯者表按漢史有王子侯表自髙祖起序云大哉聖祖建業也後嗣承序以廣親親云云漢興以來將相名臣表不載九卿百司蓋漢興將相權重之故遷意正有寓也固則以將相混於列職之中且不記大事以為主殊失將相名臣表之本㫖矣按史記漢興以來將相名臣表先大事記次丞相次太尉次御史大夫又按漢史百官表上卷載百官制度沿革下卷載百官拜罷年月此猶可也固於諸表之外自出新意以為古今人表意有抑揚之深義然徐考是書其失猶甚范武子即士㑹也丘明之傳春秋明矣而表既書士㑹又書武子左傳范武子本士㑹按古今人表以士㑹列中上武子列上中計然為范蠡所著之書也蔡謨之著漢書審矣而表既書范蠡又書計然蔡謨注計然正范蠡所著之書言然其計也按古今人表以計然范蠡為二人又按史記以計然本范蠡之師云云何考訂之不精耶况表名古今不言漢人顔師古以未及言今非也顔師古注表云固作古今人表名古未及今而卒蓋西漢公卿傳及東都雲仍猶在固為漢人畏避閣筆亦猶張湯之後有大司空純者固以純之故不以湯為酷吏然則固之敢於論前代之賢否不敢論當代人物正為此慮遂避忌而不直書噫作史而不直書果何取於史哉元城曰西漢酷吏傳班固獨恕杜張何也固史有深意張湯之後至東漢猶盛有恭侯純者歷位至大司空班固不入酷吏以純固也曰杜氏之絶已久而亦不入何也曰杜張一等人也若令湯獨入列傳則世得以議已并貸杜周此子産立公子泄意也表志下班史之志不及遷且封禪之書何為而作也自武帝有求仙之惑今日用方士明日遣祠官溺心於虛無之境而不自知子長欲救其失其首雖曰自古帝王何嘗不封禪而其贊乃云究觀方士祠官之意子長之意婉矣史記封禪書平準之書何為而作也自武帝有征利之欲今日禁鹽鐵明日置平準留意於錐刀之利而不自知子長欲針其非往往指言宏羊致利之由子長之言深矣史記平準書其著律書也不言律而言兵不言兵之用而言兵之偃觀其論文帝事浩漫宏博若不相類徐而考之則知文帝之時偃兵息民結和通使民氣歡洽陰陽協和天地之氣亦隨以正其知造律之本矣律書云文帝曰兵凶器雖克所願謂百姓逺方何今胸奴內侵且結和通使云云可謂和樂者乎其序厯書也不言太初而言古厯不言八十一分之術而言九百四十分之法觀其在元豐間議造漢厯號為太初其術最驗遷書置而不取蓋古厯之失以其朔餘太強而至於後天乃改新厯而後天之失尤甚於古厯此遷所以不取太初日分之法其知作厯之法矣前律厯志武帝元封七年太中大夫公孫卿壼遂太史令司馬遷等言厯紀廢壞宜改正朔遂詔卿遂與侍郎尊大典典星射姓等議造漢厯乃以前厯上元秦厯四千六百一十七歲至元封七年得太初本星度新正以造漢家太初厯其法以律起日律容一篇積八十一寸則一日之分也按史記厯書只言古厯法九百四十分為日法即不載太初厯云云書天官則初言春秋星隕而五伯代興次言漢初日蝕而諸吕作亂又次言元光元狩蚩尤旗見而兵師四出正以警時君修德修政之心天官書宋襄公時星隕如雨天子微五伯代興云云諸吕作亂日食晝昏吳楚七國作亂彗星數丈天狗過梁野元光元狩蚩尤之旗畫見則半政長天其後兵師四出太上修德其次修書河渠則初言夏禹治水之源流次言秦漢治渠之利害正以知歷代水利之由河渠書於禮書載禮論於樂書載樂記遷非蹈襲舊文也漢承秦滅學之後百氏蜂起天下知有衆說而不知有吾道知有新制而不知有古典所謂禮論樂記之書誰其講之遷乃取而載之於書非有髙世之識不能也彼班氏之志何如哉遷所謂天官而固更曰天文夫兩曜之運行羣星之錯布此非關於漢之一代者而固編於國史施於何代而不可編次果奚益乎史通兩曜百星麗於元象非如九州萬國廢置無常故海田可變而景緯無易古之天猶今之天也必欲刋之國史施於何代不可也但史記包括所及區域綿長故書有天官論者竟志其語班固因循復以天文作志無漢事而𨽻入漢書遷所謂河渠而固更曰溝洫夫廣深皆四尺謂之溝皆八尺謂之洫此非漢所治者而固徒以盡力溝洫之說遂以表其書名實果相當乎合律於厯似也然考之志既言元封七年十一月甲子朔旦冬至日在建星又云星紀中牽牛初冬至夫建星在斗十三四度之間其與牽牛初相去蓋十餘度不應若是之逺此雖漢厯之未精而固獨無一言辨之何耶律厯志元封七年仲冬十一月甲子朔旦冬至日建星孟康注曰建星在斗牛之間晉灼曰古厯皆在建星建星斗星也又律厯志云星紀初斗十三度中牽牛初冬至合禮於樂似也然考之志禮樂之制固詳於史記而於禮多闕而不詳長樂朝儀此漢初禮典之大者但言其大槩而已又何耶見本志易封禪曰郊祀而不載原廟薦新之事叔孫通傳宗廟迭毁之議韋元城傳毋乃太簡乎易平準曰食貨以𢎞羊均輸罔民之術而比成周泉府之法食貨志贊曰易稱裒多益寡稱物平施書云懋遷有無周有泉府之官故羊均輸夀昌常平亦有從來毋乃太謬乎此猶可也固於八書之外自立私見以為地里藝文五行刑法之四志意有去取之髙識然熟究之而亦無足取其論天子之行幸而不計里數之逺邇邵氏議其志地里之疏聞見録武帝自三月出行封禪又並海至碣石又巡遼西又歷北邉又至九原五月還甘泉僅以百日行萬八千餘里尤荒唐矣其論儒者之學術而至與農雜而分峙李氏譏其志藝文之陋李清臣文遷之自序嘗分九流矣固為藝文志遂以儒者與道法隂陽名墨雜家農家分峙而齊驅嗚呼固以為儒者求治於世而已乎宜固因竇憲而犯於非義也云云其引書失宜者四其叙事乖禮者五劉氏駁其志五行之錯劉知幾史通論漢史五行志其錯繆者四科一引書失宜二叙事乖禮三災異多濫四古學不精駁其違誤者有十三條如文公二年不雨班氏以為文公有大致亢陽之禍知幾以為求諸人事理必不然疏其引書失宜者有四一史記左氏交錯相併二春秋史記錯亂難别三屢定春秋言無定體四書名去取所記不同辨其叙事乖理者有五一徒發首端不副證驗二虛論古語論事不同三直引特論競無他術四科條不整尋繹難知五標舉年號詳略無法刑法一志既曰大刑用甲兵則兵猶刑也而又詳於刑略於兵一代制度漫無所考如垓下之役孔將軍左費將軍右淮隂當其中陽敗以誘之兩將軍從兵淮隂復乘之此兵家致人之術羽所以敗者由此而固惟曰羽圍垓下曽不見其所以能勝者微遷著之後人將何所考哉抑又論之遷史固優孟堅也然功十而過一遷史亦不能無失孟堅誠不及子長也然過十而功一孟堅亦不為無得且三代世表誠能推百世之本支然伏羲神農黃帝為三皇少昊顓帝髙辛唐虞為五帝遷乃首黃帝而遺羲昊名曰五帝三王之記其失一也見三代世表律書誠能推上生之損益然遷之黃鐘九寸蓋以九寸為分以十分之寸約之得八寸十分一而乃謂之七分一其失二也律書云烏可以遷之得而不議其失哉王子侯表例不稱姓而下卷以姓書之蓋元始以來王子行封權歸王氏特待以異姓之法默寓其感慨之意其可取一也漢史王子侯表上不書姓王子侯表下乃書姓時元始問也云云食貨志本言財利而歷載張湯峻文窮治之法蓋武帝欲興利源先施嚴刑而湯之慘刻不志於刑法志於食貨正原其用刑之由其可取二也食貨志自公孫宏以春秋之義繩臣下取宏相張湯以峻文決理為廷尉於是見知之法生而廢格沮撓窮治之法用矣烏可以固之短而不取其長哉此愚紬繹二史而詳致其辨云太元太元學易之得失太元果有得於易乎然劉歆嘲之劉歆謂太元可覆醬瓿嚴尤誚之嚴尤謂此書必廢老蘇東坡又起而譏之老泉作太元論辨其說又東坡謂雄好為艱險之辭以文淺易之說如太元法言皆是是其書未足論也太元果無得於易乎然桓談稱之桓談稱其書必傳張衡喜之張衡稱太元殆盡隂陽之數溫公康節又從而推之溫公集注太元又邵康節觀物外篇楊雄作太元可謂見天地之心者也是其書未可輕也愚嘗平心論之以一家之書而強合諸家之數此雄之所以失以大易之理而參決一已之見此雄之所以得善則存之否則去之則雄將無辭而諸儒亦無議矣且易有彖元則有首易有爻元則有贊易之爻有象而元之贊有測以元文而準文言以攤瑩掜圗告而準繫辭元固求合乎易也溫公讀元易有彖元有首彖者卦辭也首者統論一首之義也易有爻元有贊易有象元有測測所以解贊也易有文言元有元元文解五德弄中首九贊文言之類也易有繫辭元有攤瑩掜圖告五者皆推贊太元繫辭之類也易有說卦元有數數者論九贊所象說卦之類也易有序卦元有衝衝者序八十一首隂陽相對而解之序卦之類也易有推卦元有錯錯者推八十一首而說之然易之天五配以地十元也有五而無十元數一六為水二七為火三八為木四九為金五五為土易之六畫初二三四五上加以六位九六元也有畫而無位初一次二次三次四次五次六次七次八次九果易乎元以元文擬文言而元文不加之晬太元以晬準乾而加之中元以中準中孚蓋以卦氣起於中孚故以元文加之中元以首名準卦而或以一首或以二首易一卦當六日七分元一首當四日半積之故以二首當一卦果易乎是元亦不專合乎易也贊之初二以至于上九則有取於洪範九疇之數一與六共宗以至于五與五相宗則有取於洛書生成之數其為首八十一則黃鐘之天數寓焉其為贊七百二十有九則十二辰之中數寓焉泰中之數三十六其用三十三而虛其三則太極函三為一之數泰積之數始於十八終於五十四而合於七十二此則商徴益一上生之數前律厯志此猶可也六日七分之數唐一行所深非而子雲自中至養則而效之而未敢亂其叙孟喜惟易去坎離震兊存六十卦使每卦各主六日七分以當朞之日以中孚為冬至用事之始六日七分而後復受之凶又唐一行謂孟氏六日七分之卦止於占災眚與吉善敗之事至於觀隂陽之變則錯亂而難行牽牛起度之數蔡雍所力議而子雲自中至養求而合之而欲應其度前律厯志洛下閎作太初厯又按元中首入牛一度周首入牛五度至養則為斗宿二十二度疲精竭神於占候步推之末噫亦勞矣自今論之夫復卦之所謂七日來復者謂自復而至於乾自姤而至於坤皆六日爾而有隂陽之辨極其始終則至復與姤皆七日焉是蓋天道之自然而復卦之所以善言天道者也而孟喜乃以私意附㑹之其說曰去坎離震兊以分主二十四氣而六十卦之爻乃當三百六旬之數又自七分推之則其為數四百二十分每以八十分為一日則為五日四分之一而可以備其周天之數以中孚為冬至用事之始故六日七分而復受之果何者而合於七日來復之義也至太元之書始於中終於養凡八十一首以一首當四日有半而其所主者乃三百六旬與夫四日之半又以踦羸二贊而足其閏之數而六日七分之說興焉是固有取於喜之說也抑不思六日七分之竒數果可合於七日來復之義乎借曰太元以虛三起數而七日之數止於六日七分則一日八十分之義果何義乎易卦氣震離坎兊四正卦各守其方餘六十每卦六日則當三百六十日又以一日分為八十分五日為四日分四分之一為二十分總四百二十分分之六十卦每卦又得七分故曰六日七分太元每首直四日半八十一首凡直三百六十四日半又以踦贊諸半日又羸贊諸家皆以為當四分之一雖溫公亦然近代之厯冬至在斗二度其說本於戴記月令仲冬日在斗之數此亦天道自然而月令之所以為善言天道也而洛下閎乃以淺見揣摩之其說曰始於十一月冬至夜半甲子起牽牛一度驗其日月如合璧五星如連珠而其數始定然自太初以迄于今朔後天三日氣後天四日冬至之所在差天幾三十餘度果何為而合於在斗二度之說也至太元之書始於中而應於冬至之日以明陽氣之萌故中首入牛一度周首入牛五度至於養則始為斗宿二十二度是固有取於閎之說也抑不思差天於三十度之間則四分之虧一者果能免乎借曰厯久必差而盈縮進退不能為千萬世之數則探端造始者果能逭其責乎前律厯志洛下閎作太初厯元封七年仲冬十一月甲子朔旦冬至日在建星孟康曰建星在斗牛之間云云又楊雄傳元三方九州二十七部八十一家二百四十三表一百二十九贊分為三卷與太初厯相應又溫公注太元以為擬太初厯古厯四分之一在太初為千五百三十九分之三百八十五分實於四分之一增一秒不可以四分之一論也首又太元注每首之下列二十八宿中首入牛一度周入牛五度養首入斗宿二十三度雖然子雲泥於諸家之數固不能無牽合之謬子雲參於大易之學亦不可無真實之見夫子雲當莽賢之世不事進取恬於勢利獨與嚴遵李仲元游則其學必有據矣夫以漢之正統而象七百二十九贊之正數以莽之閏位而取踦羸二贊之餘分此其立論關於天地之常經古今之大義數耶理耶馬永卿問元城先儒注太元每首之下引二十八宿何也先生曰周天二十八宿三百六十五度四分度之一而太元七百二十九贊乃此數也永卿曰七百二十九贊分而為二合三百六十四度有半而不相應何也曰楊氏以半不可合故有踦贊羸贊應周天之數漢之正統以象歲也莽之僭竊乃閏位也先儒於踦羸之下注以為水火之閏而王莽傳所謂餘分閏位者蓋為是也噫子雲之數深矣以斷之首而得夬卦五陽去一隂之象以隂陽之象而明君子小人進退之義此其為說切於造化之妙用治道之體數耶理耶長編慶厯七年張揆注太元集解召見延和殿今探得斷首且言惟易夬卦蓋剛陽以決隂柔君子進小人退之象也上恱昔韓愈讀荀子欲合於理者存之害於理者去之有道之士於太元亦云中說論王通可疑者四潛虛一書溫公所著也而或謂非出於溫公溫公行狀墓志不載潛虛太極一圖周子所作也而或謂非出於周子張南軒太極圖解或曰太極圖周先生手授二程者也今二程之講論答問見於遺書者獨未嘗及此圖何耶此中說一書雖有格言而不能免後人之疑者無怪也夫自魯鄒教息說鈴紛紛得其傳者蓋鮮諸子之沒自荀楊不能深入閫奧河汾王氏生於隋季動法吾夫子步武質疑問難甚矣其類魯論也遐想氣象亦往往如沂水泳游時矣然所以滋後人之疑者有由也韓愈作原道篇僅有軻死不傳與荀楊大醇小疵之說曽無一語齒及河汾可疑者一也中序愈不稱文中子云云見下房杜王魏諸人嘗游其門皆位將相非忘乎木落糞本之義者亦不見尊其師而立之傳此可疑者二也中說世家門人自逺而至河南董常太山姚義京兆杜淹趙郡李靖南陽程元扶風陳威河東薛收中山賈瓊清河房元竇巨鹿魏徴太原溫大雅潁川陳叔達咸稱師北面而受王佐之道關子明在太和中見魏孝文距通所生之年蓋百二三十年矣而其書乃有問禮於關生之語此可疑者三也録關子明事太和末余五代祖穆公曰談湯穆公曰足下竒材也入言于孝文詔見之關又中說子嘗問禮於生遂退而求諸野李德林卒於開皇十一年通才八歲爾而其書乃有德林請見子於長安之語此可疑者四也王道篇子在長安時楊素蘇夔李德林請見子與之言歸而有憂色門人問子子曰云云德林與吾言文而不及理門人曰然則何憂云云門人退子援琴鼓蕩之什門人皆霑襟焉夫惟事迹之有可疑也於是世之議者始而惑繼而毁終而駁之以為通之門人私為之增益其師說而房杜王魏之遊其門者皆無是事焉吁有是哉後人作駁中說者十卷然嘗觀中序之論閲東郊之書而又參隋唐之史而後知王通之學不誣而中說之書可信也且退之不及於通非遺其人也愈方稱孟子能距楊墨而功不在禹下正推明力排異端之功不稱之者蓋先功而後道之義中序彼韓愈氏力排異端儒之功者也故稱孟子能距楊墨而功不在禹下孟軻氏儒之道者也故稱顔回謂與禹稷同道愈不稱文中子其先功而後道歟猶文中子不稱孟軻道存而功在其中矣房魏不揚其師非棄所學也通之弟以言觸長孫無忌王氏兄弟抑而不用陳叔達時撰隋史欲編世家而避太尉之權而不敢不傳之者蓋閣筆避權之過東臯答陳尚書書曰貞觀初仲父太原府君為監察御史彈侯君集事連長孫無忌太尉由是獲罪時杜淹為御史大夫密奏仲父直言非辜於是太尉與杜公有隙而王氏兄弟皆抑而不用矣季父與陳尚書叔達相善陳公方撰隋史季父持文中子世家與陳公編之陳公亦避太尉之權藏而未出重重作書遺季父深言勤懇季父答書其略曰云云時魏文公對曰夫子有後矣天將啓之證也儻逢明主願翼其道及仲兄出湖蘇合杜大夫嘗於上前言其朴忠太尉聞之怒關生之問禮德林之請見非果可疑也特傳述者錯其歲月耳荀卿子遊於齊居於蘭陵近世儒者亦疑其時世以為非與齊宣王春申君相值謂劉向誤序卿事可也并以為無卿可乎嗟夫通之為道明白正大蓋扶世立教濟時行道之學中之為說議論問答本樂天知命窮理盡性之書蓋孔孟氏之流派而後來諸公之徑蹊也議者不味其言而疑其傳不信其道而惑其人世無諸老大儒之論則河汾之學術沉沒寂寥不著人間安得聲名掀揭流傳古今哉故其在唐朝也司空圖皮日休皆尊其學以房魏數公真其徒大書于碑以示後世而文士又有請以王通氏陪從祀者使無其人容有是舉乎見唐書其在我朝也柳仲塗宗之於前孫漢公廣之於後中序而伊洛大儒又稱為隱君子極有格言荀楊不到使無其人容有是論乎遺書明道曰文中子本是一隱君子世人往往得其議論附㑹成書其間極有格言荀楊道不到處噫河汾之學不幸史失其名而起或者毁駁之議亦幸而世有公論而得諸儒辨明之力然又論之中說一書固有述作之功而不能無侈大夸詡之言固有羽翼之助而不能無僭擬妄誕之咎何者以董常而比顔子以公卿問答而比孔門之諸弟以陳思王而比季伯之遜以荀氏之二仁而比殷之三仁其通之自處則欲與夫子而齊驅嗚呼學步邯鄲而失邯鄲效顰西子而失西子何通之不量力也固宜起後世紛紛之論善乎紫陽先生之論通也雖稱其過荀楊而咎其擬夫子雖喜其明世變而惜其闕大體誠確論也然則中說之書豈得謂合乎中之義哉晦庵語録中說一書都是要學孔子論語說泰伯三以天下遜他便說陳思王善遜論語說殷有三仁他便說荀氏有二仁又以公卿大夫來相答問便比當時門人弟子斤又同上王通自比孔子殊不知秦漢以下君臣人物兩已定云云然王通比荀楊又别於事上講究得精故於世變興亡人情物態更革沿襲施用作為先後次第都曉得只可惜不曽向上靣透一層於大體處有所缺闕晦翁晚號為紫陽先生愚故曰楊雄作法言而言未必可法知幾作通史而史未必皆通王通作中說而說未必合中先天易先天之學在心法畫前元有易刪後更無詩此先天學也欲知大易之㫖當求之先天邵堯夫詩須信畫前元有易自從刪後更無詩畫前有易何以見曰畫前有易其力甚微然即孔子之發明者言之如神農取益取噬嗑黃帝堯舜取渙取隨益神農黃帝堯舜時重卦未畫非畫前有易耶身在天地後心在天地先此心法也欲知先天之學當求之心法陳瑩中答楊中立游定夫書康節云先天圗心法也圖雖無文吾終日言未嘗離乎是故其詩曰身在天地後心在天地先天地自我出其餘惡足言先天之學以心為本其在經世康節之餘事耳夫先天之易非康節之私意也十三卦之藴未畫之前聖人已取之孔子嘗發明其旨此其源流之學耳然是學也非求之圖而求之心非取其數而取其中中者先天之要心者中道之主康節之所自得者在是嗚呼天下安有心外之學哉愚嘗即其圖而玩之乾南坤北與離上坎下之位不同也乾履大有與乾坤屯蒙之序不同也陳瑩中云伏羲之易乾南而坤北自乾而左自㢲而右兊在東離為西起震終艮之序則離上而坎下震東而兊西與先天之序不同矣乾坤屯蒙之序與乾履大有大壯之序亦不同也康節之於易固非好為同異者蓋有先天之易有後天之易先天之易伏羲易也後天之易文王易也文王之易聖人既言之矣伏羲之易聖人未之言此康節開其機而發其藏也是圖也自太極而兩儀自兩儀而四象四象既交而成十六事八卦相蕩而為六十四卦此先天之象也陳瑩中書康節觀物云起震終艮一節明文王之八卦也天地定位一節明伏羲之八卦也蓋先天之學本於伏羲而備於文王其詩曰天地定位否泰反類山澤通氣咸損見義雷風相薄恆益起意水火既射既濟未濟四象既交成十六事八卦相蕩為六十四卦按先天圖乾坤與否泰艮兊與咸損震巽與恆益坎離與既濟未濟常相對是為十六卦由一隂一陽而為二隂二陽由二隂二陽而為四隂四陽由四而為八由八而為十六由十六而為三十二由三十二而為六十四此先天之數也先天由一隂一陽而為二隂二陽由二隂二陽而為四隂四陽由四隂四陽而為八隂八陽由八隂八陽而為十六隂十六陽由十六隂十六陽而為三十二隂三十二陽而六十四卦成矣有變象化象有感象應象故變象則寒暑晝夜化象則風雨露雷感象則性情形體應象則走飛草木此象之不一也經世書元之元日之日乾之乾元之㑹日之月乾之兊元之運日之星乾之離元之世日之辰乾之震元之歲日之石乾之㢲元之月日之土乾之坎元之日日之火乾之艮元之辰日之水乾之坤七者皆然又天隂陽日月星辰地剛柔水火土石變象寒暑晝夜化象雨風露雷感象性情形體應象走飛草木有往數來數有隂數陽數故往數者已生之卦由左而旋來數者未生之卦由右而轉觀物篇數往者順者順天而行是左旋也皆已生之卦也知來者逆者逆天而行是右轉也皆未生之卦也夫易之數由逆而成矣此一節直講圖意隂數者起於十二陽數者起於三十此數之不一也觀物篇乾陽中陽不司變故一年止舉十二月震隂中隂不可變故一日十二時不可見兊陽中隂離隂中陽皆可變故日月之數可分是以隂數以十二起陽數以三十起而常存乎三六也按經世圖元之元元之㑹十二此隂數十二也元之運三百六十此陽數三十也元之世四千三百二十此又隂數也元之歲十二萬九千六百此又陽數也然數之起者不出乎中中之主者不外乎心即中而言數即心而言中見上則先天之學得矣不然於中外而求象數於心外而觀休咎吾恐先天之圖皆陳迹經世之書為考數豈足與論康節之學哉陳瓘曰先天之學心法也其學在心或於心外欲觀休咎故以皇極為考數之書耳愚故曰不知性學不可言太極之圖周子太極圖隂陽一太極圖晦庵釋曰隂陽異位動靜異時而皆不能離乎太極至於所以為太極者又初無聲臭之可言是性之本體然也天下豈有性外之物哉不知心法不可談先天之易而世之議者且曰司馬文正與康節素善者而未嘗言及先天或疑其學之迂聞見録司馬文正與康節同時友善而未嘗有言及先天學嗚呼康節謙退君子也蓋不肯以平日所長求衒於人正傳溫公而不及潛虛之意何疑哉溫公行狀墓銘不載潛虛世之議者且曰是圖康節得之李挺之挺之得之穆伯長伯長得之陳希夷陳希夷學易以數學授穆修伯長修授李之才挺之之才授康節先生或疑其學之誕嗚呼希夷有道之士也故以易學流傳於後正濓溪得希夷种穆太極圖之意何害哉胡宏通書序周茂叔傳太極圖於穆修修傳於种放放傳於希夷吾觀春雷之變而知天時之往復隂陽之消長邵康節問伊川曰今年春雷何處起曰起處起杜䳌之兆而推地氣之去留世道之盛衰其有關於世道也如此或者至以迂濶議之吁亦妄矣康節步天津橋聞杜䳌不樂客問其故曰洛陽舊無杜䳌不一二年上用南人為相天下多事矣援經論儒生援經之謬嘗謂漢儒有明經之功而不無泥經之失有援經之言而不無假經之過夫聖人六經與天地並正為立民極之地而後儒反假托以文姦援引以濟私是先王學術反為禍天下之具也且漢自中世以來上以表章而自任下以授受而名家朝廷之上非經不能立事縉紳之間非經不敢建議賈捐之請勿擊朱崖王商則曰經義何以處本傳龔勝之奏王嘉公孫祿則曰君議無一所據王嘉傳一時君臣相與從事於經學之間意亦善矣如董仲舒以元年謹始之義而勉時君之初政董仲舒傳雋不疑以蒯瞶出奔之事而辨一時之疑獄雋不疑傳以此立論豈不為聖經之幸惜其考究之不精講明之不熟往往以詩書為發蒙是則可嘆也已自今觀之來歸自京我行永久詩雖有是言而無關於邊功也乃援之以頌陳湯之功陳湯傳劉向云何泥也乃眷西顧此維與宅詩雖有是語初無關於郊祀也乃取之以定南北郊何鑿也匡衡傳推遁卦不效以必考課不可謂無得於易然房之法煩碎已甚人皆能言其非豈必得推卦而知其不行乎京房傳用咨十二牧而罷刺史不可謂無得於書然刺史之法以卑臨尊正上下相維之意豈可泥於十二牧之法而罷之乎何武傳古者夷狄來朝坐之國門之外丞相霸援荒服之義當矣而或者乃假長發之詩而從位單于於諸侯王之上抑何與經戾也蕭望之傳古者天子之於丞相右坐為起左與為下况於百官乎司直尊上公之說當矣或者意慢丞相乃托尊上人之言以自文抑何背戾之甚也㳙勳傳甚者欲附姦臣則援其不語怪力亂神之言張禹傳欲行榷酤則援其有酒酤我之文欲奪其利則援周禮五均之法王莽傳是又借聖經以為殺人之術也雖然漢儒固有過矣而過亦不先也自左氏以賦詩之語而定人之禍福以占易之言而論事之吉凶於是詩流入於五際專持子午卯酉以驗人事易流入於五行專類淫巫瞽史以決疑心推波助瀾漢儒尤甚是左氏作俑之過也且秦繆之享晉文賦六月以見意夫六月宣王北伐之詩也重耳何足以當之周襄之享晉文也賦菁莪以見意夫菁莪天子養育人材之詩文公何足以當之垂隴之役鄭伯所以享趙子也七子從鄭伯以寵其禮趙孟請賦詩以觀其志不知伯之汰侈已盛雖愚夫亦知其必亡豈待賦鶉奔之詩而後見哉昭元之㑹鄭伯所以享三大夫也趙孟賦匏葉以為之倡穆叔賦鵲巢以為之和不知死生禍福雖聖人亦歸之命而不敢必豈必因賦詩而言不復此哉夫左氏述賦詩凡六十有六篇而合乎專對之義者止於寧俞辭湛露彤弓叔孫豹如辭肆夏元侯之二事焉其餘皆斷章而不能合聖人之道也並左傳如觀之為卦先王所以觀民而設教也左氏執其說以驗陳氏之得政離之為卦先王所以繼離照于四方也左氏衍其說以符晉侯之必敗叔孫婼見賊於家臣是其見善之不明爾左氏取明夷之占以附楚丘之妖怪南蒯家臣而君圖是其用心之不臧爾左氏取黃裳之義以成惠伯之先見夫左氏述卜筮者三十有三而有功於名教者止於南蒯之事焉其餘皆附㑹而不能合三聖之法也並本傳晉范寧謂左氏失之誣者豈不驗歟范寧謂左氏富而艷其失也誣云云嗚呼左氏親見聖人者也且穿鑿附㑹而不合之罪以罪左氏也國朝以經學淑人心名儒以經學扶名教未嘗不講經也而不聞有鑿經之失未嘗不據經也而不聞有假經之名有合乎經則施於議論之間不合乎經則不泥於章句之末此正善詩不說之意也講月令而明奉天之事范祖禹講月令聖人奉天之事切於畏天者莫如仁宗願陛下誠於奉天云云講春秋而發尊君之㫖寶訓邇英閣講春秋仁宗曰春秋經旨在於奬王室尊君道左氏詭異不若公榖之質宋綬曰誠如聖諭其論禹貢也戒人主之貪心孝宗時林機講禹貢因論禹貢之書立為經常之制天下樂趨而不厭常以大禹勤儉之心為懷治效不難到其論乾卦也而諷今日之君道開寶三年上召王昭素講乾至九五飛龍在天斂容曰此文正當陛下今日之事因示諷諫帝大恱此固合於聖經而援是以告君也若夫燔柴望秩此王制之論也不敢附㑹其說恐滋君上封禪之侈心矣范祖禹講王制曰古人多因燔柴望秩之說乃附㑹為封禪皆秦漢之侈心非古者省方之意錫王勇智此仲虺之誥也不敢敷陳其旨恐啓君上之黷武之忍心矣神宗朝吕公著講天乃錫王勇智上曰何以獨言勇智公曰仲虺稱湯能伐夏救民故以智勇言之然聖人之德當如易所謂聰明睿智神武而不殺者時上富於春秋故公以好勇黷武為戒是雖不求合乎經之言而深合乎經之道豈若漢儒之陋哉竊嘗論之周禮一書為生民立極為天下開太平此周官之本意也至和中有以荒札緩刑之說勉其君者至和元年講周禮大荒大札則薄征緩刑楊安國曰所謂緩刑者過誤之民當歲歉則赦之上曰天下皆吾赤子捕而殺之不亦甚乎熙寧中有以布法象魏之法誣其君者吕惠卿進講言先王之法有一年變法者如正月始和布法象魏是也有五年一變者巡狩考制度是也上問司馬公何如公曰布舊法也何名為變是二說也同出於周官也一則勉之以恤刑之心一則欺之以變法之失其得失可鑒矣易之一書貴陽而賤隂進君子而退小人此周易之要法也皇祐中有以鼎卦覆餗之說諭其君者皇祐三年講鼎卦上問九四之象施於人事如何楊安國曰鼎為烹飪成新之器上承至尊下又應初上承下施任重非據故足折而覆餗慶厯中有以需卦燕樂之說啓其君者慶厯二年林瑀撰周易天人㑹元記其說用天子即位年月日時占所直卦以推吉凶瑀言上即位其卦直需其象曰雲上於天需君子以飲食晏樂臣願陛下頻出晏遊極水陸珍好之美則合卦體上駭其言斥之是二說也同出於周易也一則戒之以用人之道一則諛之以縱欲之非其誠僞又可見矣嗚呼可不戒哉可不戒哉古今源流至論别集卷五
