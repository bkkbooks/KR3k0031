body:
  text: 古今源流至論别集卷三宋黃履翁撰內降內降之名非美也殆亦鴻都斜封之意乎然鴻都斜封皆漢唐衰微之世而內降之名乃起於國朝全盛之日惟其見於衰微之世故漢唐之大臣多以任責䝉譴惟其起於全盛之日故國朝之大臣則以任責為賢任責而䝉譴必莫回其已壞之政任責而為賢必能杜其方萌之始此治亂得失之所由分也然以漢唐論之又不能無辨焉漢自桓靈以來唐自中睿以後其弊亦適相當然漢之治日衰日亡唐之治雖微復起者有由矣蓋唐大臣尚得任其責諫官尚得言其事百司尚得舉其職公議猶存私情知畏亦足回狂瀾於既倒彼漢三府不舉劾尚書不加省奏請朝上罷譴夕報莫能挽天下之勢此漢之末代不及唐之中世也方桓靈之在位也常侍阿保氣焰薰炙手握王爵口含天憲出呼吸變霜露陳蕃言之而就戮本𫝊初竇太后之立也陳蕃有力焉及臨朝政無大小皆委於蕃蕃與竇武同心戮力以奬王室徴天下名賢李膺杜密尹勳劉瑜等皆列於朝廷與共參政事於是天下之人莫不延頸相望太平而帝乳母趙嬈及諸女尚書旦夕在太后側中常侍曹節王甫等共相朋結諂事太后太后信之數出語命有所封拜蕃武疾之嘗共㑹朝堂蕃私謂武曰曹節王甫操弄國權濁亂海內今不誅之後必難圖武深然之蕃大喜以手推席而起武乃引尚書令尹勳共定計策九月武出宿歸府典中書者先以告長樂五官吏朱瑀瑀盜發武罵曰放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召所親共普等十七人喢血共盟曹節請帝出御前殿拔劔踊躍趙嬈等擁衛左右閉諸禁門召尚書官屬脅以白刃使作敕板拜之王甫為黃門令持節至北寺獄收勳等殺楊賜諫之而去位本傳靈帝上以災異詔問消弭之術光祿大夫楊賜對曰今妾媵閹尹共專國政鴻都羣小並各拔擢樂松處常伯任芝居訥言以便辟之性受不次之寵而令搢紳之徒委伏畎畝口誦堯舜之言身蹈絶俗之行委捐溝壑不見逮及冠履倒易陵谷代處幸賴皇天垂象譴告周書曰天子見怪則修德諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身唯陛下斥逺佞巧之臣速徴鶴鳴之士斷絶尺一抑止盤遊冀上天還威象變可弭賜秉之子也懷憤於遷逐之地飲恨於誅戮之時公議掃地矣是故熹平鴻都之榜招集斗筲溷濁政理俯眉承睫僥幸恩寵呂强所謂三府坐逃選舉之負尚書復不訾省而選舉皆出詔用則祿賞之柄外朝不與聞也陽球傳置鴻都門學鴻都門學諸生皆敕州郡三公舉用辟用辟召或出為刺史太守入為尚書侍中有封侯賜爵者士君子皆恥與為列焉既而設為鴻都文學樂松等圖象立贊尚書令陽球諫曰松等皆出於微蔑斗筲小人俯眉承睫徼進明時而形圖丹青有識掩口今太學東觀足以宣明聖化願罷之可以銷天下之謗書奏不省又呂强傳黃門北寺之獄擅矯王命逐捕忠黨根連株繫甘戮如飴鄭颯持節自行之而廷尉不豫聞三府不覆按則釜鉞之柄大臣不與知也見上方中睿之臨政也公主則太平安樂尚宮則柴氏姜氏戚里則郕國沛國爭弄其權勢傾朝野宰相重臣皆出私門屠沽臧獲納粟除官然大臣得言吏部得執公議尚存矣是故除授之命吏部員外郎李朝隱前後執破一千四百餘人一無所顧本傳吏部員外郎李朝隱前後執破一千四百餘人怨謗紛遝朝隱一無所顧則大臣雖失其職而百司尚能奉法以執奏也斜封之官兵部尚書姚元之力言停廢至數千人則大臣有司尚得守公法以奏請也本傳中宗時韋后及太平安樂公主用事於側門降斜封授官號斜封官凡數千員至墨敇睿宗景雲元年八月姚元之宋璟及御史大夫畢構上言先朝斜封官悉宜停廢上從之罷斜封官凡數千人釋慧範何人哉建寺作佛贓至萬計御史魏傅弓請置極法乃行放黜本傳御史魏傅弓劾釋慧範建寺作佛欺匿奸贓四十餘萬請置極法上欲宥之而傅弓謂刑罰國之大事陛下賞已亡以加宜刑所不及上乃黜放慧範於家鬻伎行巫又何人哉濫居纓冕盡占膏腴左拾遺辛替否上疏謂今金銀不共於印束帛不充於賜本傳左拾遺辛替否上疏謂今十倍行賞十倍增官金銀不共於印束帛不充於賜富豪商賈盡居纓冕之流鬻伎行巫盡涉膏腴之地則大臣雖失其職而諫官御史尚能引大義以彈劾也則御史諫官尚能引大義以彈劾也夫漢之大臣不能救桓靈之過唐之諸賢尚能規中睿之失此漢唐得失之所由判歟嗚呼亦嘗究其源流乎蓋漢自中世丞相不豫中朝之事武帝三公不任臺閣之職光武循習日久弊端百出夫何陳蕃楊賜竇武之徒言之徒切聽之甚藐者其來非一日矣至唐之大臣上佐萬機下理庶務事權相通公論不泯又非漢之所可及武后垂拱之初命王立本往宣敇以鞠劉禕之事而禕之謂不經鳳閣鸞臺何名為敕則制敕未有不經鸞臺鳳閣也本傳武后垂拱初或誣悰為侍郎劉禕之之隂事后命肅州刺史王立本往宣敇以推鞠禕之謂不經鳳閣鸞臺何名為敇也文宗太和之末宣除鄭覃御史大夫而中書侍郎李宗閔謂每事一切宣出安用中書則政事未有不經中書也本傳文宗太和末宣除鄭覃御史大夫而中書侍郎李宗閔謂樞密使崔潭峻每事一切宣出安用中書云云文宗開成之間李珏謂用杜悰為戶部尚書陳夷行謂當由上㫖珏謂太宗用宰相天下皆先平章若事不由中書安用平章則宰相未有不平章天下事也本傳開成四年李珏謂用杜悰為戶部尚書陳夷行謂當由上㫖不可使權在臣下珏謂太宗用宰相天下皆先平章故號平章事若事不由中書則莫用平章陛下昔語臣以竇易直勸我於宰相啓擬五取其三二取其一彼宜勸我擇宰相不容勸我凝宰相陛下豈忘之耶夫惟出納制敇之命進退賢否之權一則曰鸞臺鳳閣二則曰中書宰相則人主有所憚而不敢私近習有所懼而不敢請此所以為唐一代之良法也愚獨惜夫敬宗童昏䁥比羣憸牛僧孺纍表補外李逢吉表裏為奸觀薛廷老以右拾遺入閣奏事謂近日除拜不由中書進擬多自宣出敬宗厲色叱之自拾遺見斥之後大臣不敢平章於上百司不敢劾奏於下本傳而天下事去矣所幸繼之以文宗之恭儉委任大臣不疑不二李珏之賢自任平章之責宗閔之黨亦能嘆宣出之非則唐斜封墨敕之弊固未至如漢之速亡也本傳然其消萌杜漸豈若國朝於全盛之日乎國朝自太祖以來躬決萬機明白洞達一有賞罰外朝公議至天聖明道之間請托之門稍開奔競之風漸長仁祖親政痛革宿弊然天性寬仁坦然無我未能遽絶一時哀祈之思所賴防其微救其失者大而兩府之封繳次而臺諫之彈劾又次而百司之執奏也故杜祁公當慶厯之初與韓琦富弼實為兩地之大臣同心合德交修佐佑凡內降與恩澤者積至數十則連封而面納之仁宗有言外人雖知杜衍封還內降吾居禁中以衍不可而止者多於所封還則兩府能封繳之力也長編杜衍抑絶僥幸凡內降積至十數則盡封還之上謂歐陽修曰外人知杜衍封還內降耶吾居禁中有求恩澤者每以杜衍不可告之而止者多於所封還也其助多矣景祐之初韓琦方為諫官首論內降為唐之斜封今之內降蠧壞紀綱為害至深願詔皇族戚里之家不許陳乞長編仁宗景祐初韓魏公琦實供職於諫省首論內降以為國家由祖宗以來躬決萬機凡於賞罰必使兩地大臣於外朝公議頃因莊憲之垂簾奔競之輩私行賄賂假託皇戚干請內降僥幸日滋法律不能懲有罪爵祿無以勸有勳唐之斜封今之內降蠧壞紀網為害至深願詔皇族戚里之家繼自今不許於內陳乞至慶厯李仲昌修河之罪不經兩府詔從中出臺官相與極力言之則臺諫能彈劾之力也長編馬遵言李仲昌妄違朝㫖輒壞河事臺官纍有彈劾乞置重典尋有指揮上令經赦未議而已今者聼於何人既差臺官推劾又監以內臣是臺官未足取信於陛下也詔獄出於內降而中書不預議是中書亦不能信於陛下也又言若陛下聞之語言亦付外施行若謂已經中書則冝移之密院何煩內降駭物情而損國體哉趙抃言陛下正仲昌等罪狀內宣諭中書行之可也付樞密院治之可也奈何事從出張皇驚駭物議歐陽修領京兆首論內㫖之承準長編嘉祐三年翰林學士知開封府歐陽修言內官梁舉直公事兩曾執奏內降時與救罪其內降臣便不敢不司兼鑑進狀龎籍倅開封力奏內侍之私請長編開封兩府史扈玉遷職一等尚美人遣內侍韓從禮傳教㫖免上人市籍府判龎籍奏其事仁宗命杖韓從禮則百司執奏之力也嗚呼當時不惟廟堂之大臣能任其責臺諫百司之諸吏能糾其失而仁宗謹重命令愛惜名器又見於倉卒應酬之間丁寧戒飭之際嘗觀當時小人有進甘言邪說以誤聽者謂當收攬威柄事事率自中出仁宗答曰措置天下事正不欲中出不如付之公議令宰相行之臺諫言之大哉言乎其天地之心歟長編闕柴中家謂當收攬威柄勿令人臣竊弄權事事率自申出仁宗答於以措置天下事正不欲自中若自中出果有不便難改更不如付之公議令宰相行之行而天下不以為便則臺諫得言其失於是改之為易矣云云又觀天聖九年至嘉祐八年其戒飭內降八條手詔切責諄復不曰內外庶官之請託則曰宗室外戚之干祈不令中書密院執奏內降之差遣則戒內外百官毋援前比之希遷大哉言乎其社稷之福歟奏議曾肇言仁宗私天地之度洞然無但慮左右干祈迫切不已臣伏見仁宗下詔約束臣以下干求內降令中書密院具條執奏當時羣臣亦每禁止內降為言輒見納用謹録上仁宗戒飭詔書凡託八條其天聖九年十月之詔則申戒內外庶官之請明道二年四月之詔則申戒宗室外戚之干祈康定元年十月之詔則令中書密院執奏內降所與臣僚之差遣慶厯四年十二月之詔則申戒臣僚因入對以求恩澤六年四月詔則申戒內外文武百官毋援前比以希遷改而皇祐二年九月之詔則尤為訓誥之懇切德音有謂朕躬庶政之機持大公之柄比者憸幸四興妄圖或違禮干恩或負罪希貸率求內降間亦奉行蠧政虧施行風莫斯為甚自今內降令中書密院并百司執奏無政者令諫官御史彈劾以聞丁寧警劾可謂切至而嘉祐三年八月之詔猶以比者內降雖許執奏而百司間有奉行為言八月之詔猶以鎮海留後李璋自求內降罰銅為言伏乞置之座右此仁宗之治所以超漢軼唐而為百王之盛矣今日朝廷清明號令整肅萬無此弊然欲防微杜漸當如以仁宗詔書八條置之座右以為龜鑑此又燕翼之詒謀也見上本朝官制上論新舊官制沿革黃元禮官制國朝自太祖設官分職多襲五代之制雖稍有增損大體仍舊唐制省部寺監之官無所職掌别領內外任使省部寺監别設主判官員額惟以侍中中書令同中書門下平章事為宰相乾德二年始置參政為宰相副二初以薛居正呂餘慶為之宰相所居省謂之中書門下國政所出兵政𨽻樞密院承五代之制有使副使太宗朝命石熙載以樞密直學士簽書樞密院事後以張士遜為知樞密院事寇準溫仲舒同知樞密院事治平中郭逵以檢校太保同簽書樞密院事故樞密有使副使知院同知院簽書院員額與中書號為二府尚書置判尚書都省一員掌百官赴省集議及大祀受䄡戒之事六部各有主判率以學士待制館閣官領之吏部即審官東院掌尚書左選審官西院掌尚書右選吏部南曹掌侍郎左選三班院掌侍郎右選流內銓考功郎官之職也户部郎三司使尚書之任也其官崇職重久次者為使稍輕則為權使資淺則為權發遣使公事度支副使户部副使鹽鐵副使各一員此侍郎之任也别置子司判官八員度支判官戶部判官鹽鐵判官各一員所掌本曹郎官之職也判㑹案一員掌造器械唐軍器監職也判修造案一員唐工部將作少府監職也判磨勘司一員掌勾考唐比部職也判闕三字院一員掌審司闕出納及審覆百官諸司兵級請俸舊兼禁軍以繁冗别立諸司專計司掌之以分其職判理缺司一員掌催促諸路遺缺禮部有判部及判禮部貢院即尚書侍郎之任內兵部事歸樞府工部事歸三司故此二部不設主判官多以别官兼之刑部則判審刑院及詳議官掌詳覆諸路奏案是其職也翰林學士襲唐制以六員為額其𢃄知制誥即釐本院職事其别領省府職任即不𢃄知制誥內年德俱重者一員為承㫖知通進銀臺司兼門下封駁事其任即給事中也而𨽻樞密院知制誥即中書舍人之職也御史臺雖有大夫員而不除以中丞為臺長次侍御史知雜事侍御史裏行殿中侍御史殿中侍御史裏行監察御史監察御史裏行已上為諫官以别官兼領官即為知諫院同知諫院亦有正諫議大夫司諫正言者九寺則判太常寺禮院即卿之任也資輕者為知院同知院兼掌博士之職宗正有判寺一員太僕職屬羣牧司有制置使一員以樞府及學士領之有判官一員大理則糾察在京刑獄是其職也鴻臚歸客省四方館光祿司農太府其職皆𨽻三司衛尉無所總轄其職分為金吾䘖仗司其環衛之任分𨽻三衙皇城司故此五寺别無置司并主判官員祕書省即昭文館史館集賢院謂之三館與祕閣同𨽻本省有直館直院直閣校理館閣校勘謂之館職初除於本省供職一年出補內外任使昭文史館有直館集賢院有學士修撰直院校理祕閣有直閣校理又有判祕書省祕閣一員專掌省事國子監有判其資淺者為同知或同管即祭酒司業之任博士轉而為直講將作少府軍器三監之職並屬三司而都水無常職員遇興役即差官亦係三司差人逮熙寧興役法水利方置判司農寺并司農寺丞員闕建大理寺方置權發遣大理少卿公事二員職掌官外有學士待制等員唯觀文殿大學士仁宗朝以賈昌朝辭使相特建此職仍詔非曾任宰相不除觀文殿學士資政殿大學士資政殿學士端明殿學士翰林侍讀侍講學士龍圖天章寶文閣學士直學士樞密直學士三閣待制皆為侍從清望之選並無職掌多𢃄職以領在內省府寺監在外藩方任使自資政以上多以授二府舊臣此國朝舊定制如此元豐初始命置局詳定官制在內設尚書省置令左右僕射門下省置侍中中書省置令已上為宰相而兩令侍中不除人尚書有左右丞門下中書各有侍郎樞密院有知樞密院事同知樞密院事已上為執政尚書六部吏部一尚書二侍郎分掌四選吏部司封司勳考功屬焉户部一尚書二侍郎分左右曹而户部度支金部倉部屬焉禮部一尚書一侍郎禮部祠部主客膳部屬焉兵部一尚書一侍郎兵部職方駕部庫部屬焉刑部一尚書一侍郎刑部都官比部司門屬焉工部一尚書一侍郎工部屯田虞部水部屬焉每部郎官二員知州已上資序及階官朝議大夫已上為郎官餘員外唯吏部戶部刑部郎官各置四員以其劇曹也左右司郎官各二員通糾六部號都司專佐宰相理省事謂之宰屬翰林學士定以二員為額久次者為承直御史臺官名如舊制而除知雜事及裏行之名門下後省置左散騎常侍而不除人給事中四員起居郎二員左諫議大夫左司諫左正言寓焉中書後省置右散騎常侍而不除人中書舍人六員起居舍人一員右諫議大夫右司諫右正言寓焉號兩省官祕書省有監少監丞郎校書郎正字著作郎佐郎寓焉號館職罷直館院校理等員闕惟存修撰直祕閣號貼職而别領在外任使九寺太常宗正光祿衛尉太僕大理鴻臚司農太府有卿少卿丞簿太常復置博士太祝奉禮協律郎大理則置寺正評事司直四監將作少府軍器置監少監丞簿南外北外丞已上為寺監官國子監有祭酒司業丞簿太學有博士正録已上為學官謂職事官罷三司使副及諸主判官而其職分𨽻諸省部寺監羣牧司使名不除而不命官其職皆屬太僕寺以太師太傅太保為三師太尉司徒司空為三公皆論道之官無專領之職為宰相兼官以開府儀同三司易節度使同中書門下平章事號為使相以唐文散階換省部寺監官歸釐本職號階官為寄祿官而食其俸以領內外任使以特進易左右僕射金紫光祿大夫易吏部尚書銀青光祿大夫易五曹尚書光祿大夫易左右丞正議大夫易列曹侍郎通議大夫易給舍太中大夫易左右諫議大夫中大夫易祕書監殿中監中散大夫易大卿監朝議大夫易少卿監朝請朝散朝奉大夫易郎中朝請朝散朝奉郎易員外郎承議郎易太常國子博士奉議郎易太常祕書監中丞通直郎易太子中允中舍左右贊善大夫宣德郎易寺丞宣義郎易監丞承事郎易大理評事承奉郎易太常寺太祝奉禮郎承務郎易寺監主簿自承務郎至特進為寄祿官大學士至待制其名皆存以為二府罷政省部長二給舍諫議補外之職集賢殿修撰直龍圖閣直祕閣號貼職庶僚領在外繁劇任使者𢃄之削去憲銜檢校官留勳十二轉自通直郎以上𢃄入銜此為元豐新制官名即循唐舊典職掌亦倣周禮六官之法也黃琦字元禮本朝官制下論新舊官制當否論國朝之官制有二曰國初舊制曰元豐新制舊制之善者則官職分治脉絡相統祿秩有階遷轉得序也新制之善者則省部諸司各有職掌郎曹等官不寄虛名也愚嘗究其沿革之得失矣國初懲藩鎮之弊朝官文臣多領外寄九寺三監皆為空官特以是寄祿秩班序位而已向所典之事則别有職存也姑舉大略言之且兵部事歸樞府戶部工部事歸三司固也然吏部既有官矣而别設審官院三班院以判其事禮部既有官矣而别創判禮部判貢院以董其務是吏禮二部皆虛存耳太僕事歸羣牧鴻臚事歸客省固也然太常有卿矣而復立判禮院以任其責宗正有卿矣而復置判寺以行其權是太常宗正二卿皆空設爾至元豐之八年取唐六典而與羣臣講明之踰二年而法成本末次第歷歷條舉或正而治之或旁而治之或統而治之向者省部寺監之無職今其職舉矣向者郎曹卿監之虛官今其官定矣此元豐更新之法不為不善也㑹要元豐三年以唐六典摹本賜羣臣命官置局以義制作上自考求故實自一命以上各區處而科條之省曹寺監以長治屬正而治之也故其為法詳御史非其長以察為官旁而治之者也故其為法略都省無所不總統而治之者也故法當考其成於是長史察月御史察季都省察嵗五年而法成雖然此特正其名也若其美意微權隱然於分司設局之表者皆一切更革之又不可不論者舊制修造案之屬三司正以考其財之有無而今也修造案為將作監而百工興作之用戶部不得考是他司以辦事為效而不恤財之有無也舊制磨勘司之屬三司正以論其事之當否而今也磨勘歸於比部並𨽻刑曹鉤考戶部不得知是戶部以給財為功而不論事之當否也此司馬溫公言改官制以來五曹得以自專而戶部不能制者正嘆其脉絡不相統之過南窗記嘉祐中大水取三司河渠案置都水監元豐官制以三司㑹案之事歸之軍器修造案之事歸之將作監皆𨽻二部於是戶部所掌版籍財用之事而已元祐中蘇子由為戶部侍郎言都水將作軍器三監皆屬户部凡三監有所為戶部定其事之當否裁其費之多寡而工部任其工之良苦程其作之遲速來又司馬公言戶部尚書三司使也云云自改官制以三司所掌散任六曹及諸寺監應支用錢物五曹得以自專有司得符即時應付而户部不能制舊制前行郎中進士則遷太常少卿非進士則遷司農衛尉少卿由司農衛尉少卿入光祿少卿今以一朝議該之是十二年之官一遷即為之矣舊制戶部尚書侍從則歷禮部戶部吏部常調則自工而刑自刑而兵纍而至吏部今以一銀青光祿該之是十二年之官八年俱歷之矣丁隲云前行郎中考滿當遷進士則遷太常少卿今朝議大夫也非進士出身則遷司農少卿或衛尉少卿由司農衛尉少卿入光祿少卿然後轉少府監如此三遷凡十二年今自朝議大夫一遷為中散大夫云云此畢仲游言改官制遷轉之法且謂昔之官品難於進今之官制易於高者正惜其遷轉不得序之失畢仲游云云嗚呼安得因元豐更新之名而參國初相維之意哉漢官制漢制自武帝而失嘗觀司馬遷之表將相名臣也首記大事君子於此知其職之當否史記漢興以來將相名臣表先大事記次丞相又次太尉又次御史大夫又觀班固之表百官也先論沿革君子於此驗其制之是非西漢百官表上論沿革下表論拜表然合二表論之大抵載武帝分職之謬更制之過則知漢之官制莫善於漢初莫病於武帝也漢之初用丞相即御史大夫為之灌嬰薨而除張蒼蒼免而相申屠嘉漢初以來將相名臣表所以重國體也至武帝盡弃舊法李蔡之死御史大夫湯不遷而青翟以太子少傅拜表元狩五年三月甲午丞相蔡有罪自殺四月太子少傅嚴青翟為丞相石慶之薨不拜御史大夫寬而拜涿郡太守劉屈甃正和元年四月壬申丞相賀下獄五月涿郡太守劉屈氂遂為左丞相何輕哉漢初之用太尉特掌武事於朝廷大政亦間與之自勃為太尉而攻陳豨亞夫為太尉而伐吳楚彼時多因是拜相也並本傳至武帝置大司馬其權遂出於丞相之上衛青拜而已重其權霍光拜而復領尚書衛青傳青拜大司馬而恩寵益盛又尚霍光傳光拜大司馬外典軍馬內領書云云何重哉漢初之用御史大夫本副丞相其事權不敢與丞相埓高后欲封諸呂問左丞相平太尉勃而不及趙堯文帝錢榖决獄之問止及右丞相勃左丞相平而不及張蒼本傳其權任可知也至武帝㥯於功利乃專任御史大夫而使之自行不經丞相議造白金皮弊之事委御史大夫湯而丞相李嚴不之知武帝初年張蒼為御史大夫議造白金皮弊等事李嚴為丞相但充位耳議徙流民四十萬之事用御史大夫寬而丞相石慶不之聞兒寬為御史大夫與上議行封禪引九卿更進用事更不關决於石慶是時議徙流民於邉四十萬口上知慶老謹乃按御史大夫兒寬以下議又何其甚哉此漢三公之制變於武帝也太常之職掌宗廟禮儀以列侯忠孝敬謹者為之漢初此意甚重爾漢表太常秦官掌宗廟禮儀又宋百官志漢制太常以列侯忠孝敬謹者為之至武帝之世多至獲罪有陵橋道絶免者孔誠風發廟瓦免者魏不害由元狩而下奪爵免官者至二十八人本表下而尊奉宗廟之意失矣並漢百官表下光祿勳之職掌諸郎衛考其德行而進退之漢初此意甚美爾後志本注曰掌宿衛掌宫掖門户典謁署郎更直執㦸宿衛考其德行而進退之至武帝之世郎選以財而充補武帝後入財者補郎期門以武士而宿衛本表而選用郎衛之意壞矣廷尉所掌刑辟也漢初用張釋之輩任之固有恤刑之心本傳至武帝任張湯杜周之流而法令益滋本傳甚者令諸官府各治其事不統於廷尉恤民之意安在哉後補志云自武帝而下京師諸官府各置治獄以治事凡三十餘所大司農所掌財貨也漢初用執盾襄輩為之按漢表高帝元年用執盾襄為治粟內史自後更不除人至景後元年改內史為大農令繼年惠實為之未聞有興利之議至武帝任𢎞羊孔僅之徒而榷禁日嚴武帝始令郡置鹽鐡以𨽻大司農𢎞羊孔僅行鹽鐡事甚者均輸有令告緡有令紛紛四出裕民之意安在哉此漢九卿之制變於武帝也丞相得劾幸臣漢法也申屠嘉欲斬鄧通戲殿上自武帝遊宴後庭而閹人遂恣由是有恭顯弄權之禍豈所謂閹寺屬太宰之意乎主爵掌治內史漢法也自武帝始分三輔而畿內間斷由是有京兆尹劾丞相之弊豈所謂二卿則公一人之意乎漢表上內史周官掌治京師景帝二年分置左右內史武帝更名右內史為京兆尹左內史為左馮翊主爵中尉為右扶風云去監御史而州郡無監忌之患漢初鑒秦之失也漢皇表監御史掌監郡秦官漢省之至武帝有部刺史之置州郡自截然於外刺史專達與丞相無與是外部之血脉不相關矣漢表部刺史武帝元封五年初置掌奉詔條察州職六百石員十三人初丞相分遣使刺州去加官而外朝有相通之善亦漢初懲秦之弊也漢表加官侍郎左右曹諸吏散騎中常侍秦官至武帝復加官之任凡小臣一得加官得入中朝親近議論與朝廷相絶是中朝之血脉不相關矣表所加或列侯將軍卿大夫都尉尚書太醫令太官令至郎中無員多至數十人給事中亦加官自是而後一變而成帝權入尚書成帝懲恭顯中書之弊遂罷中書置尚書五人再變而光武任歸臺閣光武不任三公事歸臺閣人徒見流弊至此夫豈知其所自哉禮以齊家為禮之本四官各垂法而禮獨不著於象魏周禮天官太宰垂治象之法於象魏地官司徒垂教象之法於象魏夏官司馬垂政象之法於象魏秋官司寇垂刑象之法於象魏春官宗伯無之四官各有司而禮獨名於宗伯見上禮之為用大矣哉蓋藏於人心之微而不在於耳目觀瞻之頃關於天地之大而非付於有司職掌之末嘗觀周禮一書經制大備冠昏祭祀秩秩乎其文吉凶軍賓繩繩乎其典上而朝廷宗廟燦然有儀以相接下而閭里鄉井歡然有恩以相交人以為周公之制度其􅊏悉詳密也如此雖然有關睢麟趾之意然後可以行周官之法度龜山語録注見下知三代致治之意始可講周官經世之務龜山語録正心一事若深知而體之自有其效王氏之學蓋未達乎此其治天下專講求法度如𬒳修身之潔冝足以化民度矣明道嘗曰有關雎麟趾之意然後可以行周官之法蓋深達乎此事又熙豐君子雖通世務而所取為證者秦漢以下之而已有為秦漢以上之說者與之爭取不勝今之論事者多以三代為言實未必曉有能以三代之法與之剖析是非有不戰而自屈者然須深知三代之意方可若周官之書先王經世之務也不可不講先儒固嘗言之矣大抵自其身而刑於家閨門肅肅無以異於宗廟之間衽席雍雍無以異於朝廷之上內外有章宫庭有度此禮之行於一家也自其家而推之國君臣相正官師相規宮府俱為一體上下合為一心此禮之行於一國也誠以內治之不謹則禮法之不嚴家道之不謹則經制之不立是以成周聖人內朝燕佚必有師保正救之官而閹尹婦寺又皆屬於冢宰之臣此風化之流行表著之觀瞻蓋在此而不在彼也觀周禮者不驗冢宰師保之職而徒取春官宗伯之任君子謂之不知務嗚呼魯用周禮識者以其為未可動韓宣子聘魯見易象與春秋曰周禮盡在是矣又曰魯秉周禮未可動也秦未能用周禮詩人謂無以固其國詩蒹葭刺襄公也未能用周禮將無以固其國焉禮之為用大矣哉漢唐之言禮陋矣諸將擊柱何等威儀叔孫通傳幸臣戲殿何等氣象鄧通傳是朝禮未肅也既祀宗廟又祀便殿既祭郡國又祭園陵是廟禮未專也韋元成傳祖宗廟在郡國六十八合百六十七所而京師自高祖下至宣帝與太上皇悼皇考各自有陸旁立廟并為百七十六又國中各有陵寢廟殿日祭於寢月祭於廟時祭於便殿日十四食歲三十五祀后蒼所紀徒顯學校之闕后蒼傳曹褒所定又雜䜟緯之書本傳習儀禮者徒善為性徐生談曲禮者指為拘曲王成傳彼見禮為何物哉皇后亞獻不免瀆神高宗封於社首以皇后為亞獻本紀文昌祠先僭用音樂假文昌享祀先廟至用音樂薦之何有乎吉禮元齡大臣至令奪服房元齡傳茂宗尚在亦使借吉張茂宗何有乎凶禮以言其軍禮則元宗講武驪山三閲之餘元振遽奏禮止元宗講武驪山既三令帝親閲之元振遽奏禮止帝怒軍容不整引在􅀢下將斬之劉幽求張說扣馬諫曰元振有大功有罪當宥乃赦死流新州卒以言其賓禮則代宗故事宴曲江至使教坊倡諢雜侍雖御史風憲之司而亦與所謂貞觀禮書禮樂志太宗時定為吉禮六十一篇賓禮四篇軍禮二十篇嘉禮四十一篇凶禮十一篇是謂貞觀禮開元禮卷元宗時乃詔正仲丘等定百五十卷是為開元禮禮閣新儀元和未韋公肅又為禮閣新儀曲臺新禮王容威為曲臺新禮並禮樂志彼安知禮之本哉蓋嘗因是考論漢唐之禮惟其不知造端立本於修身齊家之說而徒求粉􅎖顯設於具文觀美之際此禮云禮云所以有愧於成周也漢自爼上杯羹之語一聞而父子之禮缺矣高帝紀自僞遊雲夢之事一起而君臣之禮缺矣韓信傳云呂后之橫不能制而夫婦之禮缺矣故一傳而有房闥專政之患呂后紀再傳而有夫人並坐之醜袁盎傳又再傳而有外戚弄權之漸田蚡竇憲傳漢之禮不明於家庭之間毋怪乎朝㑹祭祀之無度也唐自貞觀有內慙之德閨門之禮紊矣太宗妃贊顯慶多中决之政而朝廷之禮紊矣高宗垂拱有殱篡之姦而宗族之禮紊矣武后改嗣聖為垂拱盡殄諸李國號周故一傳而有斜封墨敕之濫中宗時安樂公主用事降斜封墨敇云云再傳而有漁陽召亂之釁元宗時安祿山反又再傳而有閹宦擅政之禍宦官傳唐之禮不正乎人倫之本毋怪乎吉凶賓嘉之亡制也嗚呼漢祖起自亭長親與椎埋屠狗之徒摶取而僅得之唐之源流又出於夷狄之陋晦翁語録唐源流出於夷狄故閨門失禮之事不以為畏是以君臣父子之大綱仁義禮樂之正統視之為迂濶而不暇講也惟我國朝自藝祖肇造以道立極以禮御世兄弟相傳而天下服其孝弟昭憲太后問太祖下曰汝知所以得天者乎上曰此宗祖及太后餘慶也后曰不然正由柴氏使幼兒主天下羣心不附故爾汝後當傳位汝弟上曰敢不如母教遂召趙普立誓藏之金匱父子相遜而天下服其孝慈高宗禪位孝宗一堂父子堯舜揖遜天作之配則如高曹向孟有安邦安國之功而無險陂私謁之行社稷之臣如杜富韓范有同心體國之忠而無狥私忘公之患程伊川謂自三代後本朝有超越古今者五事而推原其由蓋以忠孝亷恥為之紀綱之效伊川語録注見下呂微仲謂自三代後本朝百三十年無事而推原其由亦以事親治內之法之驗伊川語録嘗謂三代之後本朝有超越古今者五事如百年無內亂四聖百年相授受命之日市不改肆百年未嘗誅殺大臣至誠以待夷狄此皆大體以忠孝亷恥為之綱紀故能如此長編元祐八年對讀寶訓畢呂大防進曰祖宗家法甚多自三代後惟本朝百三十年中外無事蓋由祖宗所立家法最善臣請舉其略事親之法事長之法治內之法外戚之法尚儉之法勤身之法尚禮寬仁之法夫惟國家致謹於正心修身之法加意於事親齊家之本則布之朝廷宗廟達之內外上下未有不由乎禮也是故郊祀廢典也而行於建隆五朝寶訓太祖建隆四年行南郊之禮藉田曠儀也而行於端拱長編端拱二年行藉田禮云云明堂亦希濶之舉也而行於皇祐皇祐二年請季秋太享明堂朝㑹有禮以十五條彈其失儀類苑凡羣臣起居謝辭失儀者閣門使及宣徽使八十五條彈奏婚姻有禮而以五禮存其名數此開寶通禮開寶四年命劉溫叟以本朝沿革之度廣成此書凡三十卷號為開寶通禮慶厯禮儀長編慶厯四年上新修太常禮四十卷慶厯新禮儀三十六卷賜修書賈昌朝以下器幣禮閣新編天聖六年王皥上所撰禮閣新編太常新禮見上可與太平六典相表裏也噫繼周百世損益可知禮儀威儀待人而行愚不無望於今日古今源流至論别集卷三
