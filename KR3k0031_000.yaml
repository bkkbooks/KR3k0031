body:
  text: 古今源流至論類書類提要臣等謹案古今源流至論前集十卷後集十卷續集十卷宋林駉撰别集十卷宋黃履翁撰駉字德頌寧德人清修苦學嘗以易魁鄉薦著書授徒鄰境爭迎師之其事蹟見閩書中履翁字吉父不詳其里貫蓋亦閩中人也宋自神宗罷詩賦用策論取士學者咸思以博綜古今參考典制為務而又苦其浩瀚不可猝窮於是類事之家往往排比聨貫薈稡成書以供場屋採掇之用其時麻沙書坊刋本最多大抵出自鄉孰陋儒勦襲陳言概無足取惟章俊卿山堂羣書考索最為精博有助考稽是編於經史百家之異同厯代制度之沿革條列件繫亦尚有體要雖其書專為科舉而設而有宋一代之朝章國典分門别類序述詳明多有諸書所不載者實考證家所取資未可以體例近俗廢矣乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀古今源流至論前集原序財貨而費於源流之知德義而取夫源流之喻治不結繩文籍以生三代而來至於我宋上下三千餘年帝王代興聖明繼作典章文物宏模懿範本末源流所當講明者奚獨財貨德義而已儒家者流以多閲為貴以博聞為高塞胸滿腹澒洞殽昧而無條貫或舉其中而不知其本或原其始而不要其終高談有餘待問不足三山先生林君德頌雅有逺度志在邦典博古通今出於生知平居私淑嘗取夫治體之大者約百餘目參古今之宜窮始終之要問而辨之端如貫珠舉而行之審如中鵠嘻有大學問而後有大議論先生以其淹貫之學發而為經濟之文是非品藻確乎其當昔漢武帝之策仲舒欲聞大道至論先生之論其至論也歟故名之曰古今源流至論以廣其傳焉黃履翁序
