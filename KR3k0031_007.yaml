body:
  text: 古今源流至論前集卷七宋林駉撰提刑緋紫爭榮秩同漕運此國朝崇重之意也印紙書績籍名中書此國朝激勸之權也景德四年真宗謂王旦曰先帝常選朝官諸路提點刑獄今可復置旦曰河北陜西地控邊要尤須得人取性度和中有執守者親遣太常博士陳綸李及咸引對於長春殿所至專察視囚禁詳視軍牘州郡不得迎送聚會所部每旬具囚繫犯由訊鞫次第申報常檢舉催督任繫久者即馳往按問出入人罪者移牒覆勘劾官吏以聞敢有庇匿並當加罪仍借緋紫以三年為任增給緡錢如漕運使之數內出御前印書為厯書其勞績中書密院籍其姓名代還奏課議行功賞如刑獄枉濫不能適舉官吏曠弛不能彈劾務從畏避者置以深典夫天下分而為幾縣縣總而為幾州州合而為幾道獄讞之繁耶簡耶民情之伸耶否耶其權皆出於憲司之職使得元結數十輩錯布州郡則萬物吐氣安有不平之訟是以我朝重之重之者所以重其民也此其哀矜一念隱然於設官分職之際故其擇吏也取其愷悌之賢而不取其刻深之習取其均平之政而不取其髙下之手死罪之覆遷為貟郎杜衍為提點刑獄覆死罪遷為刑部貟外郎官寃獄之活課居上等祥符四年以主客郎中李巽為度支郎中兩浙運使司勳郎中王矩為工部郎中京西運副初遣官提點刑獄至是代還命白敏中等較其殿最以嘗活寃獄者為第二等餘為第三等巽矩皆為第二故遷秩為轉運副使夫以謹刑之吏優以祿秩則苛虐者知所懲矣清謹著聲擢之提按天聖二年監察御史張逸為益州路提點刑獄上謂輔臣曰益州民物繁富提按之任尤須得人王欽若曰逸為御史以清謹著今必稱職賢明廉幹委之讞問明道二年上謂輔臣曰諸路刑獄既罷提點官轉運司不能一一躬親讞問恐致寃濫宜選賢明廉幹不生事者委任之乃復諸路提點刑獄司夫以清明之吏得以居官則貪愚者知所憚矣或者乃曰申命使臣秪為勞擾尚見於淳化之詔淳化四年十月降詔曰比者申命使臣分聽獄訟徒經嵗序蔑有平反既莫副於哀矜徒肆為於勞擾其諸使遣刑獄司宜從省罷委轉運司提舉提刑無益過為煩擾又見於天聖之令天聖四年詔諸路提點刑獄朝臣使臣交割本職公事與轉運使副或言提點刑獄官過為煩擾無益於事故也則是司之設徒為州縣之擾其説果信乎然天下幾州不能皆龔黃一州幾縣不能皆卓魯豈無未清之訟乎使任按察之職者剪一身之棘蓁植子孫之桃李私家無怨矣如公家何求鸞鳳之美名改鷹鸇之清操守令無擾矣如吾民何蓋斂勞擾之怨者正以伸寃抑之刑而假安靜之名者適以滋姦貪之地此歐陽公所謂朝廷未知官吏為州縣大患而按察可以利民委任之意不堅毁謗之言易入正有激而云也河北按察使歐陽修言今按察者所奏未能與行沮毁者一言便加轉信皆由朝廷未知官吏為州縣大患而按察司以利民委任之意不堅故毁謗之言易入不然淳化嘗委刑獄於漕司矣見上未幾景德親選其人專察囚禁而憲司復置也見上天聖又嘗併提按於漕司矣見上未幾明道以漕運不能躬親讞問恐致寃濫而憲司復置也見上然則淳化天聖之詔以為煩擾者豈非懲羮之太過歟故嘗曰目為三虎者不當責慶厯中漕司楊紘提刑王鼎頗務深刻官司憚之號江東三虎而不按贓吏者大可責也淳熙十三年知平江府常熟縣曽鞏將版帳贓賞錢支用及達法科取物事發除名勒停上曰監司以按察為職置司所在不能無失察之罪御批傅琪劉潁各降一官號為四瞪者不可議京東監司孔宗旦李遵徐尚周等四人人多惡之號為四瞪仁宗時也而不擲枉濫者深足議也見上守令嘗觀班孟堅之傳循吏而有疑焉夫親民者莫如守而於民最親者莫如令今漢傳所紀守相甚悉凡令若長沒而不書豈為邑者績用之不逮於郡耶否則瑣瑣為不足紀也噫此正孟堅史筆之微旨歟且天下至廣也郡邑至衆也以郡而言之守長之賢否且不能人人而察而縣幾倍於郡令幾倍於守其廉其貪其材其庸況得枚舉而縷計哉故漢人之察吏深得上下相維之意詔旨叮嚀璽書勉勵惟及守相而部刺史以六條問事獨察二千石而已元豐五年初置刺史每以秋分法行部以詔書六條察郡國舉不以此見命守察令之意是時也有聲中興者茂陵之績著魏相治行尤異者陽翟之治彰趙廣漢道不拾遺何愧於潁川之遜畔三老願留何慊於膠東之勞來焦延壽播之謡詠著之史册昭昭可見班史豈故遺於此哉忠義不傳而紀信之實未嘗沒湯周不列酷吏豈能逃深刻之失蓋漢之察吏者既惟切切於守相而固之傳循吏不屑及於令宰也宜矣至膺百里而綰銅章者皆委其責於守若相也王尊之守安定則出教告屬縣以明謹所職而毋以身試法朱博之為兾州而以兩令換縣因其有材不職而改任之薛宣亦以刺史當察墨綬之長吏此漢制所以近古也漢制逺矣五季令長率皆庸謬無能之流國家以民為本其於親民之官深切留意是故損鎮將之權而邑之事始舉今朝事實五代任官凡齷齪無能昏老不任驅策者始注縣令故天下之邑率皆不治誅求刻剝猥迹萬狀故優諢之言多以長官為笑建隆初始以朝官為知縣其後多用京官為之五代藩將補親隨為諸縣鎮將掌縣盜初與縣令抗禮凡公事即專達於州建隆三年置尉簿掌鄉村盜賊鎮將所主郭內而已始統於縣選京朝之官而邑之任始重見上其事舉則得行所欲為之志其任重則不敢有輕授之心然祖宗之意猶未也蓋民不能遍愛得賢令足矣令不能盡知得賢守足矣守臣嵗舉縣令一人則天聖之詔也天聖七年詔知州軍文武升朝官嵗舉見任判官主簿尉有罪非干私有出身三考無出身四考堪縣令者各一人轉運運使副不限以數舉知州課縣令三條則熙寧之法也熙寧二年考課院準詔定考較知縣縣令課法在任斷獄平允民無寃濫賦稅及時出辦不煩追擾及差役均平並無論訴之人及雖論訴而無不當之理在任能屏除盜賊里民安居對課力田使野無曠土又能賑恤窮困不致流移雖有流移之人多方招誘却令復業一任之中主客户比舊籍稍有增衍在任架閣簿書務令整齊經提轉點檢别無散失及興復功利疏導積水以利民田能勸誘人戶種植桑麻天下州軍委知州通州每嵗取索轄下得替知縣縣令前項三條課績兼依唐四善德義清謹公平恪勤按逐人有上項事實即參詳為上中下三等申本路提轉再行審定上中下三等內有績行尤異出於上等之外即定為優等若政事昏繆出於三等之下等即定為劣等守倅察縣令四善則元祐之令也元祐四年吏部言縣令委任守倅考察課績以德義有聞清謹明著公平可稱恪勤匪懈為四善案張薄書齊整差役均平為治事之最農桑墾植田野無曠土為勸課之最屏除盜賊賑恤窮困為撫養之最仍通取善最分三等及七事以為上五事為中餘為下夫舉之者守課之者守察之者又守也則領挈裘順綱舉目張又何患有不稱之職哉今守相任考察之責者吾惑焉其所剡薦者以財賦充益為先而留意教化者未必不遭斥逐其所稱賞者以催科先辦為最而勞心撫字者未必不考下下逢迎主將則可以取悅而進身稽違星限則立致譴呵而罷黜否則曰某邑某宰非某人之葭莩則某人之推轂也非某人之膠漆則某人之請託也又否則曰某縣某屬非苞苴之往來則書問之殷勤也非介紹之相通則左右之先容也培恩桃李而不為荆棘之地沽名鸞鳳而不立鷹鸇之操則何以警貪墨之風而養循良之治哉昔髙宗聖訓曰縣令末也郡守本也若郡守得人則縣令何患不得人此今日家法也紹興二十八年何傳請擇大縣令為堂除上謂宰執云云雖然令長得人責之守牧守牧得人責之部使此又澄源正本之論故併及之漢爵二十級表爵皆秦制以賞功勞公士漢儀曰公士為國君列士顔注曰言有爵命異於士卒上造顔曰言有成命於上也簮裊顔曰以組帶馬曰簮裊者言飾此於馬也不更顔曰言不與更卒之事也大夫顔曰列位從大夫官大夫顔曰加官公者示官大夫樊噲傳曰國大夫公大夫秦制公大夫以上令丞與抗禮髙紀曰七大夫以上皆高爵也顔曰七大夫公大夫也公乘一曰上聞公乘顔曰言其得乘公家之車也五大夫食貨志曰民多買復及五大夫徴發之士益鮮顔曰五大夫第九級至此始免徭役左庶長顏曰言其為衆列之長右庶長左更顔曰更言主領更卒部其役也中更右更少上造顔曰言其主上造之事大上造駟車庶長顔曰言乘駟馬之車而為衆長也大庶長關內侯劉昭曰秦都山西以關內為王畿故曰關內侯又風俗通曰秦時六國未平將相家皆關中故曰關內侯徹侯應劭曰舊曰徹侯避武帝諱曰通侯通亦徹也張晏曰後改為列侯列者序列也爵邑漢以爵邑為實惠唐以爵邑為虛名愚嘗推其本末矣漢封爵之等有二十曰徹侯者乃得食縣曰關內侯者即無受邑曰大庶長至公士者如吏職耳漢百官表上二十徹侯秦制以賞功勞後志本注曰承秦爵二十等為徹侯金印紫綬以賞有功大者食縣小者食鄉亭得臣其所食吏民至武帝元朔二年令諸王得推恩分衆子土地國家為封亦為列侯又後漢志云秦賜爵十九等為關內侯亡土寄食在所縣民租多少各有戶數為限劉昭曰秦都山西以關內為王畿故曰關內侯若宣帝本始間以劉德蘇武爵皆關內而得食邑者蓋當時嘉異定策之功宣帝本始元年論定䇿功蘇武等八人爵皆關內侯德武食邑特寵劉德蘇武也髙帝即位初年七大夫以上皆令食邑又所以特寵一時軍士之勞蓋非常制也前髙祖紀帝初即位令軍士七大夫以上皆得食邑食邑之例有二有封為某侯言食邑數者有封為某侯不言食邑者漢功臣侯表如平陽侯萬六百戶留侯萬户鄼侯八千户之類餘並見表彼不言食邑蓋以一縣一鄉之租稅俱豫之言邑數則特據邑數而豫之耳周官所謂以其室數制之者是已若戶之數邑所封不足以充之則或取之其鄰張延壽嗣富平侯國在陳留别邑在魏其云别邑者取之鄰近之租稅以給之蓋無定制也漢外戚恩澤侯表張延壽嗣富平侯國在陳留别邑在魏郡又如夏侯之食邑沂陽益食兹氏漢王即位更食汝隂益食細陽千戶之類要之漢人制爵自侯以上則食租自大庶長以下亦得贖罪食貨志故公大夫以上者得與令丞抗禮髙紀爵五大夫者有罪不入狴犴惠紀爵五大夫吏六百石以上有罪當盜械者皆頌繫爵上造以上者當刑減一等同上上造以上有罪當刑及當為城旦舂者皆耐為鬼薪白粲爵至五大夫以上者乃得復一人食貨志無非示其實惠者若唐則不然曰王至男者其爵等有九曰萬户至三百者其邑數亦有九唐百官志司封郎中一人從五品上貟外郎一人從六品上掌封命朝會賜豫之級凡爵九等一曰王食邑萬戶正一品二曰嗣王郡王食邑五千户從一品三曰國公食邑三千户從一品四曰開國郡公食邑二千户正二品五曰開國縣公食邑千五百戶從二品六曰開國縣侯食邑千戶從三品七曰開國縣伯食邑七百戶正四品八曰開國縣子食邑五百户正五品九曰開國縣男食邑三百戶從五品夫封爵猶漢也食邑猶漢也然唐之爵號但止於服色而已陸贄所謂無俸祿之資無管攝之柄無免役之優者是也本傳是其所以為美稱者又所以為虛假歟安有如漢人之實哉噫以漢而論唐則唐無足取以我朝而論漢則漢亦不能無議者且國朝爵有五等公侯伯子男是也且官之至少卿監遙郡勳之至上柱國也始封男爵其食邑三百焉已而二百封子已而二百封伯已而二百封侯至二千之數於是有公爵之封蔡龍圗官制凡官初轉少府監諸司使帶遙郡即封某縣開國男食邑三百戶故事加勳有至此法專加封爵自元豐改官制及除宰臣以下至待制觀察使加三四種外餘但加一種耳若加恩理勳至上柱國方封男食邑三百户再該加恩遂封子增三百户次加封某郡開國伯又增二百戶次加恩又增食邑二百户及次加恩方封候亦增食邑二百户其後凡遇加恩即增二百戶至二千戶方封公官之轉觀察待制以上使也始封子爵其食邑五百焉已而八百封伯已而一千封侯亦至二千之數於是有公爵之封此侍臣以下所封之例也同上若觀察待制以上使初封開國子食邑五百户次封開國伯食邑八百户又次封侯食邑一千戶食實封二百户其後再遇加恩增食邑三百户食實封一百戶增至二千戶封某郡開國公其初除執政也則不問封爵之有無即與伯封一轉而侯再轉而公矣同上若初除執政不問有無封爵即帶封伯食邑五百戶食實封二百戶次遇遷轉加邑即封侯食邑實封户數亦如之又兩經恩遂封公侯其初拜丞相也則不問封爵之髙下即與侯封食邑至二千戶則封公實封至萬戶則封小國次中國次大國此宰執所封之例也同上初丞相直封侯食邑一千户食實封四百户每經恩遷轉官或美罷相皆加食邑實封户邑亦如之及二千石封公若纍加食邑通食邑封及萬户侯封小國公次封中國公次封大國公若因小國中國及大邦不願封大國者聽如文潞公是也國朝所以逺過於漢者蓋漢之爵封有以宦官而封如張釋卿者髙后紀八年封中謁者張釋卿為列侯諸中官宦者令丞一皆賜爵關內侯食邑注釋卿宦者有以方士而封如欒大者武帝欒大以方士封為樂道侯而我朝爵與德稱未嘗濫受也漢有纍爵至列侯而未有食邑如樊噲者有纍賜食邑而後封侯如王商者本傳而我朝爵與邑等未嘗虛假也此唐之不如漢而漢之不如國朝歟資格以法徇朝廷則待朝廷之意固厚而待士夫之意亦厚也以法徇士夫則待士夫之意固薄而待朝廷之意亦薄也何者法所以奔走天下士夫也上下取必於例而不權乎理之可否大小相沿於情而不核乎事之名實前者勉強以相從後者展轉而循習譬如金石珠璣茍道路階庭處處有之則與瓦礫無異若爵祿一一如意則何以奔走天下之士不惟朝廷之法輕而士夫之自待者亦薄矣嘗觀漢之資格莫善於漢初莫不弊於武帝漢初之除相也灌嬰薨而除御史大夫蒼蒼免而相御史大夫嘉嘉薨而相御史大夫青是相之除拜皆以序遷矣百官表方漢初之拜爵也樊噲以舍人而賜大夫已而加列大夫已而賜上聞已而賜五大夫本傳夏侯嬰以太僕而賜爵五大夫已而賜執帛已而賜執圭已而得印匱是爵之遷轉亦皆以階進矣間有超越遷轉出於上之特恩而未聞指是以為例也夫何武帝之不念及此哉公孫𢎞徒步數年至宰相封侯本傳田千秋亦以一言悟意旬月取宰相本傳嗚呼相者百官之本也超資越次略無等級况其餘乎蓋法之所在天地鬼神不能易而易之者人也然則果法耶人耶愚嘗切論我朝之政逺過於前代者以寬恩待士夫之厚也我朝之政時有不及於前代者以法例徇人情之過也蓋嘗推其由矣方太祖即位之初也朝廷未有事例之行士夫未有稽習之病是時也川班比例妄訴威斷赫然謂朕之所與即為恩澤豈有例耶若是則泛例無有也上收蜀得將士之精者置川班殿直廪賜所給與御馬直等開寶四年南郊禮畢行賞以扈御馬直從特命增給錢人五十至川班爭訟不得如例擊登聞鼓陳乞上怒遣中使謂之曰朕之所與即為恩澤又焉有例哉命斬妄訴者四十人餘悉配𨽻諸州元臣宿將以平蜀大勳雖已許之爵未嘗輕授若是則濫恩無有也曹彬平蜀上始許以使相及還上曰今方隅尚有未服者汝為使相品位至矣肯復力戰耶更候我取太原因賜錢五十萬張齊賢以布衣上書其言雖可取而亦未授以官若是則冗爵無有也東軒筆録太祖謂太宗曰我幸西都惟得張齊賢耳不欲官之異時使輔汝為相列聖以來資格甚嚴其用某人也必曰嘗歷某資也由守而憲由憲而漕由漕而三路使由三路使而三司副使至是方除待制焉由正將邊守州鈐由邊守州鈐而邊帥路鈐由邊帥路鈐而都鈐總管至是方選管軍馬其遷轉不輕也如此官制舊典祖宗用人必嚴資格三人賜第制科入等自不待次而舉猶試以民事故三人皆擢通判制科除簽判一任還試館職或擢言路因其帖職遂除省府擢判官循至三司副使言官歷臺諫循至侍御史知雜事乃不次任用所致自餘各論資序一兩任升通判歷兩任升初任知州資序可為正運判若除提刑知節鎮帶權字第二任可正知節鎮而權知大藩次升初任提刑資序可正知大藩而權轉運副使第一任正除運判轉升運使几三路使各髙一等兩任提刑外轉運使資序若除三路及發運副使帶權字方領帥兩任升三路使資序若除發運使帶權字一任升三司副使資序正此方平除待制及三路帥也朝廷每除藩府監司必有理某資序指揮至王安石喜引新進號能集事遂權知縣資序人為監司郡守至有初改官選人亦預峻拔者又奏議政和三年吕頤浩奏祖宗時將臣資深者除正將其次除副將自正將分以路升都監不可任民事者除沿邊知州無才者除州鈐轄三者一等資格若功顯者升路鈐及沿邊安撫知州有勞績方除提刑邊功多而資未深者除都鈐轄資深者除路總管遷副總管至是方除遣管軍四廂自循習既久不便從狹舊比新例日衍一日前倣後承事增一事其來非朝夕耳故有司守法不思國體但徇人情歐陽公修己言於慶歷之始言行録爵位品秩若一稱滿其意將無以役使羣臣司馬光復極論於治平之初治平初司馬光上疏今爵位品秩譬如金玉珠璣茍道路階庭處處有之則與瓦礫無異若一稱滿其意將無以役使羣臣名器祿爵人所奔趍必積勞而後遷則不敢躁求茍開驟進之門使有意外之得則何所不至蘇公軾又嘗力陳於熙寧之初奏議然橫恩四出援例日至猶未至後來之極也逮夫安石用事喜引新進有知縣資序而為監司郡守者有初改官而亦預峻拔者同上有為判官而遽除臺職者長編前秀州判官李定改太子中允除監察御史裏行宋敏求封還詞頭復下蘇頌次至吕大臨皆封還並補外天下謂之三舍人嗟夫示天下以寬大之意納士大夫於寬裕之途兹豈不美然屈吾國之紀綱而便人情之所願欲沿人之情至於無已則法制舒肆而難收其末流之弊有不勝言者然祖宗以全盛之天下當久安長治之餘用四方事力之廣則涵容衆弊無傷大體今以東南一隅之力收勞筋苦骨之賦未有舒伸轉移之術上方慮其事力之易窮下猶謂其志願之未滿豈可曲循姑息不求總核之時乎且隨事設官一官所以治一事也今添差益貟至於無節一壺而百挈十羊而九牧慮其害政而病民也於是有不釐務之法謂寧給以優間之廩而不假以州縣之權今也釐務十五六矣政安在乎薦舉用人保之以親民之名而必責之以親民之實今多端經營求於幸免指州縣為徒勞之官視繁劇為煎熬之地慮其民事之不歷也於是有必試邑之法謂不限以治民考績之途則勞逸有不均之嘆今也舉貟具而不試邑者其端復開矣法安在乎若此等弊未昜縷數朝廷之爵祿既輕士夫之自待亦薄平居無事用此規模猶不可以立規况庶政方新圗事揆策之時乎然又論之待常材以資待非常之材以望捨資而用望則狂謬之流矯抗之士或以虛名而濫進然徒以資而待士則盛德尊行瓌竒俊偉之賢或拘格遲回有沉陸下僚之嘆是故畢士安以侍讀學士兩遷而正端揆增釋景德元年宰相李沆薨時王旦王欽若參政四年矣馮拯陳堯叟在樞密不於見任參知樞密中求相而畢士安時為侍讀學士冦準以故輔為三司使乃先以士安參知政事準由計司階士安同平章事宋琪以兵部貟外三遷而居端揆同上興國八年正月以兵部貟外郎宋琪為右諫議大夫同判三司以琪參知政事十一月拜同平章事近例左右史次補知制誥而陳襄以右史遷臺諫言行録舊制中書舍人止遷後行而王祐以舍人而遷兵部事略王化基以大言自薦而擢知制誥王顯以閣使兩遷而至兩府增釋興國八年正月以東上閣門使王顯為宣徽南院使兼樞密副使六月拜樞密使餘見事略初未始以常法拘也嗚呼韓忠獻力言蘇東坡未可遽入翰林且請培養使天下之士畏慕降服然後用蘇文忠以賢良致身英宗久聞其名以唐故事召入翰林韓公琦力請朝廷培養之使天下之士畏慕降服然後取而用之夫如是而後可用資司馬溫公舉李擇為户部議者雖以為駭而溫公不謂之躐等夫如是而後可用望事略今之二三大臣儻以韓忠獻司馬公之所以待士者待士尚何資望之可疑哉職田職田之制尚矣王制之論圭田釋者謂其厚賢孟子之言圭田釋者謂其供祭祀嗚呼古者待士夫之意厚矣蓋衣食既足而後養廉潔之行廪餼或闕將不能安職守之常此培養氣節封植人材所以特拳拳於圭田之制歟井田既壞美意間斷秦漢而後寡廉鮮恥沿厯至唐內外庶官始有職分之田唐凡京諸司各有公廨田內而自司農寺二十六頃至率更府各二頃所給有差外而自大都督府四十頃至中戍下戍各一頃亦各有差諸京官文武職事各有職分田一品十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃並去京城百里內給百里內地少欲外給者亦聽之諸州及都護府親王府宗人職分之田亦各有品二品十二頃三品十頃四品八頃五品七頃六品五頃七品四頃八品三頃九品二頃五十畝諸職分田田限三月三十日稍田限四月十三日以前上者並入後人以後上者入前人其賫用田以九月三十日為限各前人月耕未種後人馴其功直自種若準租分法然貞觀方給未幾以侵漁而罷太宗貞觀十一年以職田侵漁百姓詔給逃還貧户視職田多少每歲給粟二十謂之地是歲以水旱復罷之開元再復未幾以匱乏而寢自代宗以來關中匱竭時物價騰貴內官不給乃裁外田及田二分之一以給京官俸如前肅宗上元十一年令官給職田其後藉為兵糧矣至是復行嗟夫同此制也亦同此意也周人行之為良法唐人行之多弊政此其故何哉蓋古者授田於民蓋藉民以給祿也故愛護其民常如一日唐以此田為自耕之地則勢家巨室百計豪取於是有侵漁之弊古者公卿大夫食其賦以為祿初不以田為私屬也故圭田之制可行終世唐則以此田為私屬之物則官日益繁地有常限於是有匱乏之弊周唐之制所以若同而實異也吾觀國朝職田之制蓋始於真宗之時方國初承五季凋瘵之後土曠人稀人不樂仕祿猶可以自給也承平日久官繁物踊蒞官之日淺間居之日長而往往有溫飽不給之憂祖宗憫其然也咸平之際遂給職田二年給內外京職官田天聖之際隨罷隨復天聖七年上封者言職田不均又貪吏多取嵗租以害細民請廢之命晏殊與三司使議皆以為然詔天下職官悉以嵗租送官具數上三司以時估價與給之九年詔職田所以養廉也貪汙之人侵於細民比詔停罷命三司裒公田嵗入之數計直而均給之未能即行如聞勤事之吏祿薄不足自養其復即多占佃户及無田令出租者以枉法論熙寧之制均及四川元豐之制均及熙河元祐中變限嵗之法而以月元符中變限月之法而以日此其沿革大略然耳熙寧中以四川職田嵗收子利稻梁桑麻等納隨處皆同遂召吕晦劉述均定計實榖穡一色每計中價百有二十而梓夔利三路數少均分不足已定到成都一路以髙下均給之元豐以後復熙河等路以其地給弓箭手而郡縣官職田每頃嵗給錢鈔十千元祐中復推廣神宗均定四川遺意以限月之法變而均給焉元符新敕一人變限月而貪冒者或窮一日以赴限期然既有俸祿又有職田俸祿則隨其官之髙下職田則隨其地之有無此不均之患喋喋於諸臣之論也慶厯二年范仲淹疏近日臣僚乞罷職田以其有不均之謗有侵民之害臣謂職田本欲養賢緣而侵民者實比之衣食不足壞其名節豈止職田之害耶自古常患重內而輕外唐外官月俸尤豐請兩制同議外官職田有不均者均之有不給者給之然後可以責其廉節是故當其有之之地雖一邑之微毋慮千頃當其無之之所雖大藩之雄不及一邑或櫛風沐雨而愁困之不給或玩嵗愒日而鮮醲之過奉其不均何如哉古文方職田不均當其有之之地藩鎮大者至四千頃下及一縣亦無慮十頃及其無之之所雖大藩求有縣百分之一亦不可得或又州自守二以下嵗動數百縣自令佐以下亦不下數十于其間又有在令佐之職而反過於守二者亦有居簿尉之官而反過於令佐者又有一命之吏獨無職田之入者冒風沭雨負星戴月一月所得不過數十少者不過十餘千階州之髙苑凡九百斛常州之江隂凡八百斛下而或四五百或二三百至於閩廣咸無焉或處優逸而所得丘山或任繁劇而不得圭撮其不均又何如哉政和末言者謂天下圭租多寡不均縣令所得多至九百斛如階州之高苑八百斛如常州之江隂至是而降或四五百或二三百而閩廣有自來無圭撮處遂詔縣令職田有未及格者促令標撥然既言之遂罷之既罷之又復之豈故循習其弊耶大抵事育之不及甚於多寡不均之患名節之自壞又不止於頃畝不平之憂然則如之何而可曰天下公田在在而有地之多者斂之以入官地之無者出之以供官此慶厯廷臣之議也今獨不可行乎見上今天下職田皆有定數斂其租之直於上均其租之直於下此天聖詔旨之諭也今獨不可行乎見上此法既行無尊卑不倫之弊無豐嗇不平之患其周人圭田之遺意歟噫孰知侵漁之酷尤甚於不均之苦乎夫田以圭名為其潔也授之以田而名之以圭者古人之意欲使夫仕享是祿而思潔其行也今以養廉之具而為濟貧之媒守晉州者私增租入守絳陜者遣私斂穫杜子充請復元祐均給之法從之初晉州守臣李君卿以所得職田諭意屬邑令增租入比舊數倍後襄陵縣令周政力陳其弊郡守符彥嵗減十七八佃户始脫苛斂之苦而晉韓絳三州圭腴素多守臣多苛法昜其種子或遣子弟監穫貪汙猥賤無所不有建中靖國初知延安范純粹乞令監司究情治之寧不負上人責望之意哉故曰不均之患其責在朝廷侵民之患其責在士夫閩中人材自常衮興學校而閩人始知文章之重唐常衮為閩觀察使時閩人未知學衮至為建學校訓教諸生而人遂知學自歐陽詹登進士而閩人始知科第之榮韓退之文集送歐陽詹序時詹與退之等同登進士第時人謂之龍虎榜云閩人知學自詹始愚嘗遍閲圖志熟究史牒蓋騶駱為姓閩中是居遂為無諸國時漢初五年也史記閩越王無諸姓騶氏從諸侯滅秦漢五年立無諸為閩越王又索隱贊曰句踐之裔是曰無諸既席漢寵實因秦餘騶駱為姓閩中是居其地僻陋其俗鄙朴其人物希踈寂寥自唐以來駸駸與上國齒曼胡之纓化為青襟閩中記林藻泉山銘云曼胡之纓化為青襟有闕下髙風鄉人敬慕者林藴有龍虎同榜天下稱重者歐陽詹有苜蓿賦詩後世仰慕者薛全之為補闕賦詩曰曉日上團團照見先生盤盤中無一物苜蓿長欄杆遂去本福州長溪縣人也天運既回地靈育秀前躅髙古後代景仰嗚呼美哉然唐之風土未盡變至我朝而始大榮盛唐之人材未盡出至我朝而始大繁衍此雖風俗轉移之效抑亦人文成化之朝默有以薰陶涵育也然嘗論之夫靈而為人業而為士非特區區功名利祿之計其為文也必欲潤色皇猷不循時好其為學也必欲窺造道閫有補治道其操履則以端方直亮為尚其言論則以鯁介慷慨為髙立人之朝則處事不撓其氣槩可慕也任君之責則竭忠自效其忠藎可敬也處國之難則視死如歸其忠義可服也否則鳴珂名里衣錦榮鄉科第相望衣冠雜遝亦何足為榮且盛哉此君子考論人物蓋取其數大節耳是故名重禁林詞學無比時與楊劉同譽者隆平集楊億建州浦城人真宗謂億詞學無比多所法時與劉筠同聲譽有正元元和風自億始職居西掖文學知名時與楊陳並稱者是其為文不徇時好也隆平集陳從昜泉州人與楊大雅同在西掖文學知名時謂之楊陳得體用之學者精及道德粗及水利劉彞福唐人從胡安定學熙寧二年召對上問從學何人對曰臣少從胡瑗以道德仁義教東南諸生今學者明體用之學以為政教之本皆師之功彞又長水利著尊堯之集者學問淵源議論謹嚴是其為學有補治道聞見録陳瑩中南劒人著尊堯集辨誣後得瑩中尊堯集遂改神宗實録蓋蔡卞據王安石日録妄修神宗實録也氣髙行古人皆化之不曰迂闊而自變陳襄與鄉士陳烈周希孟鄭穆四人者氣髙行古以天下之重為己任時學者溺於篆籕之文所謂知天盡性之學指為迂闊四人卒不變人卒信而化之時人謂之四先生孝友質直必稽孔孟不為曲謹以求名其操履正矣隆平集王回字深甫福建侯官人孝友質直博學知要王安石謂回造次必考孔孟不為小廉曲謹以求名於世其學問自漢儒林者罕及也諫垣論事權幸退斂而新除三諫之詩至今膾炙人口墓志仁宗任蔡襄為諫官遇事感激無所回撓權幸畏斂不敢干撓時有詩曰御筆新除三諫官欣然朝野盡相歡襄乃興化仙逰人也檢院抗章不懼勢要而直論新法之疏聞者為之縮頸王安石行新法時鄭俠者詣檢鼓院上章力攻其弊遂繪圗上神宗嘆息翌日詔罷青苗免役俠乃福州福清人也其言論直矣力沮濫賞不避外怨非褊心也隆平集吳育字春甫建州人章憲太后升祔真宗廟言者謂覃恩給賞力諫既而上語輔臣曰外甚怨執政宜謹之育曰臣既以身許國何避耶不由銓考封還詞頭非沽名也此其氣槩何如哉事略蘇頌字子容泉州人秀州判官李定改太子中允除監察御史宋敏求封還詞頭敏求罷蘇頌當制奏定不由銓考擢授朝列不緣御史會至憲臺未敢具草次至大臨大臨亦封還並左遷知制誥天下謂之三舍人君相豫久豫嘉君伐則見於聖德之詩石介聖德頌汝得象殊重謹微密君相豫久豫嘉君伐得象乃建州人也薦賢報國莫非名士則見於古靈之藁陳襄福州侯官人號古靈先生哲宗元祐初薦司馬溫公而下凡三十三人皆節義忠正之士謂之古靈藁受遺詔於治平之初曽公亮泉州人治平初與韓琦同輔英宗時謂可比張安世陳規模於中興之日此其忠藎何如哉繫年録李丞相綱字伯紀邵武軍人相髙宗言中興規模當有先後之序儂智之變事勢亟矣寧死其身而不忍辱其國事略曹覲建州人知封州儂智高反鄰或勸使之去覲叱之曰吾家以忠義自將豈茍生耶率州兵禦賊力不勝遂為所執賊諭欲用之曰犬彘敢爾耶遂殺之渡江之際國步艱矣寧死其節而不忍偷其生此其節義又何如哉係年録劉珙建安人以忠顯公死節補承務郎蓋忠顯公劉韐者靖康中守真定有功京城失守敵人得之欲為將忠義不辱而死酌幽馨而起敬想遺迹而興嗟凜然起髙山仰止之想如其舍是不論而縷縷功名富貴之徒特遼東之豕耳嗚呼孰知有大於此者乎蓋顯名於一時者不若傳道於異日有功於耳目者不若淑教於人心彼伊洛正學為天地立心為生民立極為前聖繼絶學為天下開太平蓋有與風雨晦冥流行於天地間而不可磨滅者自黨籍一嚴禁錮日久中更變故道脈如線一傳而得遊定夫胡文定楊龜山之流靈光屹立疏瀹源派碩果不食元氣復春講明經學於建炎之初培植人材於熙寧之後此三君子之功大矣遊酢字定夫建安人胡安國建州崇安人楊時字中立南劒人從學伊川之門後黨禁嚴諸弟四散至髙宗建炎初召楊龜山胡安國在經筵後浙閩學者皆出其門盡知性命之學再傳而得仲素五峰致堂延平晦翁之流故老道德賴此典刑晚輩學問視此模楷責權臣以尊主攘狄之義示後人以中庸大學之教此數君子之功大矣羅仲素南劒人清介絶俗從學於楊龜山後劒浦人李延平先生諱侗者又從仲素學受春秋中庸語孟之説晦庵朱先生從學延平先生盡得其學皆伊洛性命之學也又胡五峰胡致堂皆胡安國文定先生之子秦檜以金助胡寅省親寅謝曰願公修政任賢尊主攘狄以開後功檜以其諷已始大惡之此又閩中之山斗照映古今後學敢不欽於景仰哉噫雖百昌黎作歐陽序林藻作泉山銘何足形容其萬一歟見上蜀中人材昔我髙宗之論蜀士也曰當以德行為先文章乃其餘事大哉王言其品藻人物之龜鑑歟係年録紹興二十六年沈該進呈蜀中人材上曰蜀人多能文然士人當以德行為先文章乃其餘事愚嘗登岷峨之山望巴江之水捫參歷井縱觀四望山川蔥鬱氣象宏富其為物也有青金丹砂之良其為人也皆光明俊傑之習然世之論者曰模寫風物有聲詞壇是蜀士之長也馳騁古今持論文苑是蜀士之盛也噫德行首科文章末枝由漢至唐光映史牒能文之士固不少而碩德重望者抑何寥寥間見耶黃門奏賦飄飄凌雲似也然失節臨卭至虧終身之大節西漢司馬長卿奏賦黃門武帝嘆曰飄飄有凌雲之氣又與卓氏因撫琴有淫奔之聲白首草元甘心寂寞固也然劇秦美新為名教之罪人楊子雲草太元又作劇秦文以諷莽作頌漢庭誇詡君臣善文辭也而彭祖喬松之語識者陋之王褒賦詩沉香笑謔風月善詩章也而騎鯨捉月之踈君子惜焉李白作沉香亭數章又後遊江騎鯨捉月而死故漢之所可取者惟嚴君平唐之所可稱者惟陳子昂甘心肥遁不事王侯忠孝一言有禆風教嚴君平居蜀肆以賣卜為業為臣者教以忠為子者教以孝秉心立朝有意規諫奏論數章皆切大體陳子昂此又表表於漢唐數君子之上尚論蜀之人材果在此而不在彼也自五季根據人物雕陋我宋混一日薰月染偉人碩德相望先後不特區區於翰墨蹊徑之末自今觀之詞賦有聲人曰范景仁之能君子曰首決大議其勇決不可及也范景仁成都人為舉子場屋有聲賦作彩霓理識勤翻來如云云注又隱作平音去之景仁不之辨後仕仁宗時仁宗三十五年在位未有繼嗣景仁上疏曰太祖舍其子而立太宗天下之大公也某王既薨真宗取宗室子養之天下之大慮也願陛下以太祖心行真宗故事章十九上待罪不肯去鬚髮為白其後仁宗感悟遂立英宗君實作傳曰景仁之勇決豫所不及也著論權衡人曰蘇老泉之能君子曰辨姦未形其先見不可及也鑿表蘇洵字明允眉州人歐陽永叔一見權書衡書嗟嘆目為荀卿子又聞見録王安石名始盛歐陽修勸老泉與之遊先生曰吾鄙其人作辨姦一篇以譏之稱坡公者皆曰天下竒材不知儋耳之遊其氣可以沮金石而凌雪霜事略王稱曰東坡斥之嶺海之外而不為之愠也稱潁濵者皆曰制策翩翩不知新法之疏其言可以質天地而感鬼神遺老傳轍舉直言極諫得失司馬公第以三等范景仁難之蔡君謨曰吾三司使也司會之言吾愧之而不敢怨胡武平請去之上曰以直言召人而以直棄之天下謂我何卒兩置之下第王介甫意其右宰相韓公曰此人策語謂宰相不足用欲得婁師德郝處俊用之尚以谷永疑之乎後神宗嗣立介甫得幸急求財利轍議事而多詆介甫及青苗法行極論之范淳夫之經學非學也色和氣柔開悟上意此其學粹矣家傳范祖禹字淳夫成都華陽人弱不好弄博學強記范忠文每器之曰天下士也元祐初伊川謂溫公曰經筵若得范淳夫尤好頤自度乏溫潤之氣淳夫色溫而氣柔可以開陳是非導人主之意其後除侍中田公錫之奏議非文也憂治世而危明主此其文雅矣隆平集田公錫本京兆人唐末徙蜀因居嘉州蘇越序公奏議曰自太平興國至于咸平可謂大治而田公之言常若有不測之憂近在朝夕何哉古之君子必憂治世而危明主明主有絶人之資治世無可畏之防此君子所深懼也以孝事親甘露降祥彭公乘之孝人曰今之曽子也隆平集彭乘益州人天禧初遷集賢校理懇求便親得知普州父卒既葬甘露降墓柏上人以為孝感以廉律己上悟帝意孫公抃之廉人曰今之伯夷也孫抃眉州人皇祐中權御史中丞諫官奏抃非糾繆才抃言今士趨進者多謙退者少以善求上為精神以能訐入為風采若然臣誠不能也仁宗察其言趣視事抃居侍從屈久而短於進取人以為長者苗劉之變事勢倉卒張公忠獻親扶日轂洗日虞淵其功何如哉張忠獻公浚成都人髙宗即位星夜馳赴劉正彥作亂公唱義師平之河南之擾人心危懼孫公昭逺忠氣激烈聞者生氣其節何如哉建炎二年金兵攻河南府留守孫昭逺戰不利其下擁昭逺南去避兵昭逺罵之曰若等衣食縣官不以此時報國南去何為昭逺抃孫也之數君子者上則信於其君次則信於其友下則信於其人蓋一世所共知者至若山顛水涯頽墻敗壁之下不逐時好不徇世祿不求人知此其清操髙節照映流俗君子尤當表而出之不阿匪人終身退藏王子思之逸節也事略王子思眉州人廷對不避權貴蔡京知成都府舉為學官不聽後京為相遂不復仕不從偽命守節肥遁尹和靖之髙義也建炎初劉豫偽命召尹焞焞不肯因居蜀後髙宗因召居經筵張俞一布衣也力舉祖訓勸勉大臣康定中益州隱士張俞上宰相吕夷簡書閣下且舉太祖太宗之故事開導天子之聰明云云呂夷簡謂俞所言郭元振不及何群果州一草澤也後學起敬目曰御史長編至和三年賜果州草澤何群安逸處士慶厯中石介在學諸生來者數千人群自蜀至介以為學長群與人言未嘗下意曲從同舍目曰布衣御史嗚呼蜀士有聲於上國也久矣然在漢唐則先文學在國朝則先德行此又天涵地育之教歟不然由漢以來踵秦陋習文翁修起學宫人始知學又不專於岷峨巴江之精氣也今場屋之下嵗貢傑出泉石之間芝詔屢聘則孰不為明時用哉嚴王陳李司馬揚一翁二季對相望必有續後山之詩陳后山見二蘇詩曰岷峨之山中巴江異人間出駭四方嚴王陳李司馬楊一翁二季對相望古今源流至論前集卷七
