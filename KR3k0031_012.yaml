  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_012-1a, image: WYG0942/WYG0942-0174a.png}
body:
  text: 古今源流至論後集卷二宋林駉撰三省侍中中書令尚書令左右僕射唐亦除尚書令以僕射為尚書省長三省之職起於秦漢三省之任重於東都魏晉以尚書省統天下之務中書省總機要之司門下省掌出納之命則唐與本朝也且侍中秦官特丞相史之任漢選貴游充為加官掌侍左右分典服物宋百官志曰侍中本秦丞相史也使五人往來殿內東廂奏事故謂之侍中又按通典漢侍中為加官得入禁中分掌乘輿服物云云貴子弟至襁褓受寵嚴助詞臣得備顧問本傳安國名儒特掌唾盂宋百官志武帝世孔安國為侍中以其儒者特聽掌唾盂朝廷榮之其微可知也中書令漢官特少府屬之職晚年倦政游宴後庭遂置中書俾領章奏武帝初用宦者成帝懲用士人甚欲輕其權也通典其所置中書之名因武帝遊宴後庭始用宦者典事尚書謂之中書謁者置令僕射元帝時𢎞恭為令石顯為僕射秉權用事成帝改中書謁者令日中謁者令更以士人為之秦時少府主發書殿中者謂之尚書令不過任蠶室至賤之人通掌圖書宣達封奏而政不與焉六典云初秦變周法天下之事皆決丞相府置尚書於禁中有令丞掌通章奏而已之又通典云秦時少府遣吏四人在殿中主發書故謂尚書尚者主也又云武帝始用宦者主中書以司馬遷中間遂罷其官以為中書之職至武帝罷中書宦者又置尚書五人一人為僕射秦時以善射者掌事謂之僕射乃謁者冗從之徒後置尚書雖優此官而任猶輕焉此三省之職起於秦漢然也通典秦官漢因之自侍中尚書博士初皆有之古者重武官有主射以督課故曰僕射又云成帝尚書五人一人為僕射四人分曹通掌尚書祕記章奏之事其任猶輕西漢丞相總百官而九卿分事東都事權歸臺閣而尚書分曹出納王言敷奏萬機令則總領紀綱僕射則分掌錢穀而尚書之權始重司馬溫公文按西漢以丞相總百官而九卿分天下之事光武中興自親庶務事歸臺閣尚書始重而西漢公卿稍已失職矣及通典尚書至後漢則為優重出納王言敷奏萬機令右丞總領紀綱無所不統僕射及左丞分掌廪餼錢穀靈帝以侍中梁鵠為選部尚書總謂之尚書臺亦謂之中臺魏武置祕書令典尚書之奏事文帝置中書令罷祕書之官屬遂以祕書左丞劉放為中書監以祕書右丞為中書令職重情親專掌機要而中書之任始重魏武帝為魏王置祕書令典尚書奏事又其任也文帝黃初初改為中書令又置監以祕書左丞劉放為中書監右丞孫資為中書令並掌機要中書令監始於此也又司馬溫公文及魏佐漢初建魏國置祕書令典尚書奏事文帝受禪改祕書為中書有令有監亦不廢尚書然中書親近而尚書疏外矣東晉以後天子以侍中常在左右與議政事始不專用中書入侍帷幄出擁華蓋嵇紹為侍中身捍乘輿禇翼為侍中面叱峻兵於是中書之權分而門下之權重矣司馬溫公文東晉以後天子以侍中常在左右多與之議政事於是又有門下而中書之權始分矣侍王粲為侍中曹植贈粲詩曰戴蟬珥貂朱衣皓帶入帷幄出擁華蓋又通典注曰彭權於晉武帝為侍中能答旄頭之義嵇紹於晉惠帝為侍中以身捍衛帝側禇翼為侍中抱天子以叱蘇峻兵鍾雅為侍中出招義兵事覺為峻所害此三省之任重於東都魏晉然也降及南北大抵循襲唐因隋制以三省長官為宰相命太宗為尚書令封德彛為中書令髙士廉為侍中後以太宗嘗為尚書令故以僕射為侍中中書令為宰相如武德間以裴寂德彛為左右僕射正觀初以蕭瑀無忌為左右僕射皆為宰相之職其制可見也唐宰相表武德元年六月甲戌趙國公世民為尚書令三年三月甲戍中書侍郎封德彛兼中書令九年七月辛卯髙士廉為侍中又表四年四月寂為左僕射九年德彛為右僕射右又正觀元年蕭瑀為尚書左僕射長孫無忌為尚書僕射其後以品髙不除他官參預故有參議朝政參知政事之名唐百官志太宗時以杜預吏部尚書參議朝政魏徴以祕書監參預朝政或曰參議得失參知政事之類其名非一皆宰相之職也又其後或加平章或加同品至拜僕射亦必帶之惟侍中中書令則否故有平章同品之名同上貞觀八年僕射李靖以疾辭位詔疾少瘳三兩日一至中書門下平章事而平章事之名蓋起於此其後李績以太子詹事同中書門下三品書同侍中中書令也而同三品之名蓋起於此職源自尚書令闕二僕射為宰相及正觀未除拜僕射必加同中書門下平章事及參知等名然唐為此號者蓋欲合中書令之權耳自是相承至于國朝莫之能改非不分也理勢不可復分也國初三省長官第為空名惟侍中有真拜者在國初則范質趙普繼此則丁謂馮拯韓琦而已是雖以門下省長官而總百揆然三省之職實合為一故未改官制之前凡命相者必曰同中書門下平章事蓋國朝之制名曰沿唐而實異於唐歟職源國朝沿唐制凡命相必曰同中書門下平章事即真拜侍中者不復言平章事纍朝因仍三省長官尚書令中書令侍中僕射不與政皆為空官特以寓祿秩序位品而已趙又皇朝元輔表建隆元年范質侍中興國六年九月普司徒兼侍中乾興元年丁謂馮拯並侍中治平四年神宗即位正月韓琦司徒侍中昭文館大學士監修國史元豐正名三省並建分職設局如貫繩然然愚所深惜者小人用事託公濟私其弊有三蓋不可不論且王圭以左僕射兼門下侍郎蔡確以右僕射兼中書侍郎二省宜相兼矣夫何確專政柄惟重中書凡有除吏圭不與聞蓋僕射為相命令進擬皆所由出安有省覆之舉二省進對同得預聞既已奉行又復有審駁之理此事權所以盡歸於右僕射之手蔡確偏重右相之弊一也元豐五年詔自今事並中書取㫖門下覆奏尚書施行輔臣有言中書獨取㫖事權太重上曰三省體均中書議之尚書行之苟有不當自可論奏不當於此亂體統也初王圭蔡確力贊改官制確先說圭曰公久居相位必拜中書令故圭不疑一日確密言三省長官位髙不須設只以左僕射兼門下侍郎右僕射兼中書侍郎各主兩省事上以為然確獨專政柄凡除吏圭不與聞乃言臣備位宰相不與進退百官請同議上許之三省並建政事者大事出門下其次出中書又其次出尚書王安禮不預官制乃曰政畏多門要當歸一臣謂事無巨細宣於中書本於門下尚書行之則善矣從之僕又筆談官制行左僕射兼門下侍郎行侍郎之職右射兼中書侍郎行中書之職别置侍郎以二之二省宜相兼矣然僕射既為宰相則凡命令進擬末有不由之出者出令之職既身行尚又省而復之乎方其進對門下侍郎亦預聞矣既已奉行之而又審之亦無是理門下惟有給事封駁未有侍郎自駁已奉之命者則侍中侍郎所謂省審殆幾虛文也元祐間議者以詔令稽留吏員冗多因有并門下省之意故雖不行然而有當禀左相必送中書右相或持不主左相無如之何中書侍郎進門下侍郎雖名為進其實不樂也自呂公著有同舟共濟之說而執政皆協力呂公著神道碑官制三省並建而中書獨為取㫖之地門下尚書奉行而已公著曰三省均輔臣也正如同舟共濟當一心共力以修政事乞事于三省者自今執政同進呈取㫖而各行之遂定為令又韓縝以猶子避親改授之命而三省同取㫖三省宜同心矣韓縝為右僕射其猶子以避親改授超升本班時黃履言之始命三省合取㫖事及臺諫章疏同進擬不專屬中書夫何子厚任左僕射有欲更分班奏事之制者子厚懼權之去已乃曰此先帝之志不可易故終哲宗之世不置右僕射而文書有合送中書取㫖者則以為無條有例由尚書省徑上但過門下而已蔡京姦臣尤而效之子厚偏重左相之弊二也紹聖元年章焞左僕射當時有言元祐擅更三省分班奏事之制者焞曰此先帝之志不可易故文書有合送中書取㫖者則以為無條有例由尚書省徑上但過門下而已三年李清臣為中書侍郎言官制中書取㫖門下審覆尚書施行近日尚書侵紊職事而合送中書者更不送中書便將上取㫖伏望變正相又紹聖元年至元符二年凡六年惟焞為左又有甚者京相既久姦謀日長請改左僕射為太宰右僕射為少宰自以太師兼總三省號為公相宰執大臣皆居其下益肆其無忌憚之心噫可嘆也是則蔡京偏重公相之弊其變已三流害尤甚歟大觀二年京為左僕射獨相政和六年改左右僕射為太宰少宰五月京以太師楚國公領三省事三日一至都堂元輔表又蔡絛國史補政和廢尚書令侍中中書令改為左輔右弼未始除授左右僕射為太宰少宰京為太師兼領三省號公相云嗟夫右相偏重之弊王圭非不言之言之卒不勝見上左相偏重之弊李清臣非不辨之辨之卒不能至公相專恣之弊宣和詔令非不言罷而或以為噬臍之悔宣和七年詔令居三公論道之位而總理三省衆務使宰相備員殊失紹述憲章之意可於尚書復置令虛而不除三公止係階官更不總領三省餘見上甚至紹興權臣竊之秦檜紹興十三年除太師開禧權臣又竊之識者蓋為浩歎罷平章之名定丞相之稱此乾道之令典也乾道八年改左右丞相罷左右僕射平章事今日宜率由之以為萬世家法云宰相兼樞周公冡宰出征東山詩畢公為公兼任司馬書嗟夫軍旅之事非縉紳之所當預將帥之權非廟堂之所可侵而周公必使兼統不曰侵官何耶蓋出征重寄也握兵大權也身為大臣不得與知則渙散不相通彼此不相濟其弊豈勝言哉嘗以周之六官考之冡宰所以掌邦治統百官也司馬所以統六卿平邦國也二卿適相等耳至調發之權不歸之司馬而歸之天官噫先王之為慮也逺矣故呂伋掌兵若無關於太保而太保實俾之書顧命程伯出師若無與於尹氏而尹氏實命之詩於分之中而有合之理存於判然不相屬之際而有貫通之意寓此周人所以為良法歟自廉藺立敵而將相之職分田吳爭功而軍國之權偏通鑑魏置相田文吳起不恱謂田文曰請與子論功可乎田文曰可起曰將三軍敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓魏賔從子孰與起文曰不如子起曰三者子皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之子乎屬之我乎起默然曰屬之子矣又藺相如輔趙王歸國以相如為上卿位在廉頗之右亷頗曰我為趙將有攻城野戰之功藺相如素賤人吾羞不忍為之下宣言曰我見相如必辱之相如聞之每朝常稱疾不欲爭列出而望見輒引車避匿其舍人皆以為恥相如曰子視廉將軍孰與秦王曰不若相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑獨畏廉將軍哉顧吾念之强秦所以不敢加兵於趙者徒以吾兩人在也今兩虎共鬪勢不俱生廉頗聞之至門謝罪更秦歷漢官制益紊諸呂兆釁勢亦亟矣丞相平至以五百金交歡太尉而左袒之功僅濟漢書周勃傳擁昭立宣事亦重矣丞相敞至不敢言而大將軍光以廢立之權自任本傳夫以丞相之重而下聽命於掌兵之將况望其無所不統如周人之制哉厥後以北衙抗南衙之權以西府敵東府之勢自朝廷而言則曰軍國而軍先於國自大夫而言則曰將相而將先於相古人事權一切倒置中書主民樞密主兵兩不相通而天下之事紊矣我太祖肇造區夏削平僭僞范質趙普皆以宰相兼樞密之柄皇朝元輔表建隆元年二月王溥范質大學士樞密使同中書門下平章事又乾德二年正月樞密使趙普門下侍郎同中書門下平章事家法相傳至今不易故時方有事則參議機謀之祕時方無事則各任兵民之寄太宗朝獲繼遷母之議非細事也而宰相呂端告樞使冦公曰邊鄙常事端不敢與軍國大計不可不知於是覆奏養視招徠繼遷果動九重撫髀之嘆保安軍獲李繼遷母是時冦凖為樞使呂端為宰相上召凖與之謀端邀凖曰邊鄙常事樞密院之職端不敢與知若軍國大計端備位宰相不可以莫之知也凖以獲繼遷母告端曰君何以處之凖曰凖欲斬以戒凶逆端曰此非計之得也端將覆奏之即具奏曰陛下今日殺繼遷之母繼遷可擒乎若不然徒植怨讎益堅其叛心耳以臣之愚謂宜置於延州使善養視之以招徠繼遷上撫髀稱善曰微卿幾誤朕事真宗朝契丹冦邊之舉非細故也而真宗謂宰相冦凖曰中書總文武大政密院雖專兵須本中書於是建議親征尺箠笞之果三十餘年無北顧之憂景德元年上每得邊奏必先送中書謂畢士安冦凖曰軍旅之事雖屬樞密院然中書總文武大政號令所從出向者李沆或有所見往往别其機宜卿等當詳閲邊奏共參利害勿以事干樞密院而有所隱也未幾契丹犯澶淵宰相寇準力主親征之役果契丹請和當是時也二府雖有同議之公未有兼任之職逮慶厯間西事方興因富弼之言而以張士遜同議密院事康定元年詔樞密院自今邊事並與宰相張士遜章得象參議之即不須簽樞國朝舊例以中書主民樞密主兵故元昊反邊奏皆不關中書知諫院富弼言邊事係國安危不當專委樞密院而宰相不與乞如國初令宰相兼樞密使翰林學士丁度言今之六府分兵民之政若措置乖異則天下無適從非國體也請軍旅重務二府得通議之上參取其言而降是詔士遜等以詔納上前曰恐樞密院謂臣等奪權弼曰此宰相避事耳非畏奪權也因張方平之言而以呂夷簡章得象皆兼樞密使慶厯二年七月右僕射兼門下侍郎平章事呂夷簡判樞密院戶部侍郎平章事章得象兼樞密使晏殊同平章事初富弼建議宰相兼樞密使上曰軍國之務當悉歸中書樞密非自官然未欲遽廢故止令中書同議樞密院事及張方平請廢樞密院上乃追命富弼議特降制命夷簡判院事而得象兼使殊加平章事為使如故未幾邊事既寧而兼職遂罷於慶厯之五年慶厯五年從賈昌朝陳執中之言罷兼樞密以邊事寧故也建紹間國步多艱乃以宰相范宗尹兼樞密於建炎之時建炎四年六月以宰相范宗尹兼樞密院事罷御營使議者以為宰相之職無所不統本朝沿五代分為兩府兵道付於樞密比年又置御營使是政出於三也於是以其事歸樞密院為機務房焉自慶厯後宰相不兼樞密者八十餘年而後兼蓋自此始復以張浚趙鼎兼樞使於紹興之日紹興七年宰臣張浚兼樞密使趙鼎秦檜亦以左僕射兼未幾和議既成而兼職復罷於紹興之二十六年紹興二十六年詔曰比緣軍興令宰相兼樞密使今邊事已定可依祖宗故事更不兼領然亦觀慶厯紹興兼樞之效乎方夷簡判樞院之職命范公仲淹出撫陜西相約平賊而趙元昊送欵哀鳴終身膽破而西邊晏然矣吕夷簡自許州召還除平章門下事兼判樞密院時范仲淹亦召還二人歡然相約戮力平賊范公出陜西未幾元昊請和復還張魏公都督兵馬之事命張韓劉嶽分屯江淮大敗劉猊僅以身免而敵人始懼矣名臣事實本傳此見兵民相通之驗歟不然雍熙議征幽州獨與密院詳議中書不得預聞卒不能成幽薊之功雍熙三年正月先是賀令圖等相繼上言取幽薊上始有意北伐曹彬等為虜所躡我師大敗趙普手疏諫曰蠢兹獯鬻誠非我敵自古帝王置之度外云云願頒明詔速議抽軍初議興兵上獨與樞密計中書不預聞康定戎人歸附諫官方爾論列而中書初不預知不免有區處之失康定初時吹同乞沙自唃厮羅界來降詔補之班奏職羈置湖南富弼言當厚賞以勸來者上命以所言送中書而宰相初不知其弊亦可見矣甚至熙寧初趙明與西人戰中書賞功而樞密約束郭逵修堡柵密院詰之而中書褒詔滕達道之言其深知事情歟其有感祖宗舊制歟熙寧初滕達道言中書密院議邊事多不合趙明與西人戰中書賞功而密院降約束郭逵修堡柵密院方詰之而中書已下褒詔夫中書欲戰而密院欲守何以令天下願敕大臣凡戰守議同而後下神宗善之宰相臺諫秉鈞當軸宅揆代工坐廟堂而進退百官此宰相之職烏府深嚴豸冠威肅振紀綱而警風采此臺諫之職噫孰謂天子耳目之官尤重於股肱之任歟何者廊廟之謀謨未必盡合於事情賢否之升默未必盡愜於公論况權門一登炙手可熱相府潭潭趍者如市使非白簡霜飛之嚴何以動其警畏之心哉然敢於論人主之過而不敢於忤權臣之意敢於陳宫闈之非而不敢於指廟堂之失茍不奬其徑直之節借其容納之意則孰肯盡言耶且霍光廢立權在掌握雖宣帝亦憚之嚴延年以侍御史之微劾奏其罪而朝廷肅然起敬嚴延年傳宣帝時為侍御史帝初即位劾奏霍光擅廢立無人臣禮不道奏雖寢朝廷肅然敬憚餘見霍光傳王鳳竊柄根據中外雖成帝亦憚之劉向以大夫之卑公陳其咎而權貴為之縮頸劉向陳延光祿大夫是時帝元舅陽平侯王鳳為大將軍乘政以太后專國權兄弟七人皆封為列侯時數有大異向以為外戚貴盛兄弟用事之故震霆一驚聽者掩耳威望若此廟堂其不警乎李義府取媚昭儀擅殺六品髙宗且不問其枉法之罪王義方一為侍御對仗呵叱昌誦彈文之過通鑑髙宗記李義府恃寵用事洛陽婦人淳于氏美色係大理獄義府囑寺丞畢正義枉法出之將納為妾大理卿假寶𤣥疑而奏之上命給事中劉仁執等鞠之義府恐事泄逼正義自縊於獄中上知之原義府罪不問侍御史王義方欲奏彈之先白其母曰義方為御史視奸臣不紏則不忠紏之則身危而憂及於親為不孝二者不能自決母曰若王陵之母殺身以成子之名汝能盡忠以事君吾死不恨義方乃奏義府於輦轂之下擅殺六品寺丞如此則生殺之威不由上出於是對仗叱義府令下三叱義府始出乃讀彈文裴延齡怙恩老姦舉朝側目德宗方有白麻之拜陽城身為諫官守閣慷慨卒沮其右相之命裴延齡譛陸贄與李充張滂等失勢怨望四月貶贄為忠州别駕初陽城自處士為諫議大夫人皆想望風采及至日夜痛飲韓愈作爭臣論以議之城亦不以屬意及贄等貶上怒未解中外惴恐無敢救者城聞而起曰不可令天子信用奸臣殺無罪人即帥拾遺王仲舒歸登右補闕熊執易崔邠等守延英門上疏論延齡奸邪贄等無罪上大怒欲加城等罪太子為之營救上意乃解張萬福聞諫官伏閣往至延英門大言賀曰朝廷有直臣天下必太平遂遍拜城與仲舒等已而連呼太平萬歲太平萬歲萬福武人自此名重天下時朝夕相延齡陽城曰脫以延齡為相城當取白麻壞之慟哭於廷嚴霜在望睹者毛寒言論若此權要其不懼乎不然黃閣森嚴紫府榮耀喬嶽峻天魁斗橫漢縉紳不敢言給舍不敢論而任風憲者若猶首鼠自默仗馬不鳴則事權不振國勢不立亦豈廟堂之福哉嘗觀國朝宰相臺諫輕重之由矣自御史劾趙中令反以見斥而臺諫之言輕太祖寵待趙韓王如左右侍御史雷德驤劾奏普强市人第宅上怒叱之後其子有鄰復訟其庇吏受賄上怒按問罷相自諫官論丁謂卒不見聽而臺諫之言沮蘇子由云使丁晉公之時臺諫言事必聽其敗已久矣至於申公非諸公並攻其短其害必有甚也卒之中令其子不能逃庇吏受賕之失而謂之姦邪他日自敗則知人言有益於國家也多矣並見上至于仁祖以政事付宰相以公議委臺諫政事之出少有愆失而公議之誅略不少貸是故晏殊為政傾身諫官張方平蓋指仁宗時言也子由龍川志云張安道為豫言國朝自真宗以前朝廷尊嚴私說不行好竒喜事之人不敢以事搖惑朝廷故士知為詩賦取科第而不知其他自設六科以來士之翹翹者爭論國政長短其始也范諷孔道輔范仲淹以才能為稱首其後晏元獻為政富鄭公參政事多置諫官乃用歐陽修余靖蔡襄孫沔為諫官諫官日橫鄭公尤傾身下士上以謙虛為賢下以傲誕為髙於是私說遂勝而朝廷輕矣豫以為張公之論得其一不得其二徒見今世朝廷輕思曩日之重不知大臣恣為非橫其害亦不細也蓋朝廷重輕則不在此誠使正人在上舉動皆當下無以議而朝廷重矣富弼為相奉㫖臺諫汪輔之亦指仁宗時言也嘉祐四年汪輔之以書誚責富弼曰公為宰相但奉臺諫風㫖而已是雖朝廷之勢若輕而議論之權若橫然失在廟堂救在臺諫亦不過維持公議而已自今觀之景祐之際丞相呂夷簡也納賂市恩抗疏力爭夷簡之勑雖峻而仲淹之氣愈厲國朝元輔表天聖七年夷簡同中書門下平章事至明道二年二月免三年再相景祐四年免仁宗廢郭后夷簡以前罷相怨后范諷言后無子當廢夷簡直其言先敕有司無得受臺諫章疏仲淹孔道輔孫祖德蔣堂郭勸馬絳假少連宋郊劉渙詣垂拱殿門伏奏斥夷簡納賂市恩罷相判許州寶元之際執政王隨陳堯佐也不才多私極口深詆韓琦之章屢上而王隨之黨隨罷寶元元年三月平章王隨陳堯佐參政韓億石中立皆罷初呂夷簡密薦隨與堯佐二人為相其意引援非才居已下者用之覬他日上意見思而復相已及四人議政數僨事於中書隨復屬疾堯佐復年髙多不舉事災異仍見右司諫韓琦論隨等不才多私凡疏十上於是四人俱罷文彥博取媚宫闈唐介劾之雖介有别駕之除而彥博亦有罷免之命况猶遣使護介乎此見於皇祐之時也皇祐三年唐介劾文彥博知益州日作間金燈籠錦因中人入獻宫掖緣此為執政及恩州賊平幸㑹明鎬成功遂叨宰相昨除張堯佐宣徽節度使蓋彥博奸謀迎合乞斥罷彥博以富弼代之上怒甚召二府示曰介言他事乃可至謂彥博因貴妃得執政此何言也介面質曰彥博宜自省即有不可隱於上前彥博拜謝不已梁適斥介下殿介辭益堅上令送臺劾介彥博言臺官言事職也願不加罪不許上怒不可測羣臣莫敢諫右正言蔡襄獨進言介誠狂直然容受直言帝王盛德也必望矜貸之王舉正復言介責太重改英州别駕復取其奏以入遣中使護送介至英州且戒必全之無令道死彥博罷為吏部尚書觀文殿大學士知許州梁適求援閹寺馬遵彈之雖遵有補外之行而適終負去位之愆况上久知清議弗平乎至和元年五月平章梁適罷先是殿中侍御史馬遵等彈適奸邪貪黷任情狥私上知清議弗平乃罷之馬遵等皆出補守倅適之得政中官有力焉及遵等極言其過左右或言御史捃拾宰相自今誰敢當其任者此見於至和之時也劉沆挾私趙抃力沮劉沆在相疾言官屢加裁抑出范師道其趙抃張鼎言沆挾私出御史罷相知應天府執中剛愎蔡襄面斥蔡襄言執中剛愎不才不可任以政甚者富鄭公一代名臣初年拜麻士夫相賀且不免韓絳之議則清議凛凛於朝廷之上誠可畏也嘉祐六年歐陽修言景祐中范仲淹言宰相呂夷簡貶知饒州皇祐中唐介言宰相文彥博貶英州别駕至和初呂中復呂景初馬遵言宰相梁適並罷職出外其後趙抃范師道言宰相劉沆亦罷職出外前年韓絳言富弼罷知蔡州今又唐介五人言陳升之得罪自范仲淹貶饒州後至今二十年臺諫未聞有規諫人主而得罪者臣蓋謂方今諫人主則易言大臣則難蘇子由嘗曰申公非諸賢並攻其短其害必有甚則臺諫不惟有益於人國其於相業亦不為無助見上自議者以私說日勝輕議臺諫而風采言論非復前日之舊見上子由龍川志云云妄行新法此宰相之過也臺諫爭之宜矣而反補外焉熙寧間王安石為相行新法臺諫相繼論列盡出補外臺中為之一空邊事失實此宰相之尤也御史論之當矣而反左遷焉見下鳴呼諫官御史敢攻人主不忤權臣傅公此言誠有激而云也元祐二年御史張舜民因論邊事言文彥博照營劉奉世失實罷判登聞鼓院自古諫官御史之患在敢攻人主之短不敢忤權臣之意如舜民者宜被擢賞而反蒙廢黜豈所以勸忠義之節哉傅堯俞傳吾觀後來之事則知仁祖之為國慮豈不逺哉雖然仁宗盛時臺諫所以敢言者雖曰人主崇奬之誠亦大臣優容之公夷簡非仲淹所斥乎夷簡復相且曰仲淹賢者朝廷將用之此言豈易發耶康定元年范仲淹復舊職㑹夷簡復入朝言於仁宗曰仲淹賢者朝廷將用之豈可但除舊職耶即除龍圖閣學士陜西安撫使仲淹謝曰向以公事忤相公不意相公乃爾奬拔夷簡曰夷簡敢以舊事為念彥博非唐介所攻乎彥博復相乃曰召臣未召唐介臣不敢行此言豈易得耶元豐中潞公留守西京唐介之子義問元運判潞公謂義問曰仁宗時先參政為臺諫以言某謫官某亦罷相未幾復召還相位某上言唐某所言正中臣罪召臣未召唐介臣不敢行仁宗以某言起參政通判潭州尋至大用之二君子者其真古大臣用心歟愚觀徂徠之頌蔡襄之詩因三詠三嘆於慶厯宰相臺諫云石介作聖德詩誦慶厯諸賢如衍殊昌朝仲淹修靖得象襄弼王素蔡襄作諫官詩云御筆新除三諫官紛然朝野盡相歡素修靖三諫官也參政黃樞二職侍講金華紫府宏深參謀玉鉉陳希烈制詞云是職也豈非師尹之副歟按漢表御史大夫掌副丞相則今參二之意也漢百官表上御史大夫秦官位上卿銀印青綬掌副丞相按唐表參預參議得管朝政則今參二之名也唐宰相表魏徴以祕書監參預朝政褚遂良以黃門侍郎參預朝政夫惟二於相職則小大相通長二合議盡推車協力之忠效同舟共濟之義相曰可參曰不可參曰然相曰不然則天下無不舉之事矣嘗觀宣帝之任御史大夫也本始地節四五年間丞相韋賢御史大夫魏相也是為長寬而二嚴地節神爵八九年間丞相魏相御史大夫丙吉也是為長嚴而二寬神爵五鳳三四年間丞相丙吉御史大夫蕭望之也是為長寬而二嚴並漢百官表上同異相濟寬嚴相用不過適中而已此所以成中興之績又嘗觀太宗之任參預等官也正觀三年房元齡為尚書左僕射魏徴以祕書監參預朝政元齡謂創業為難徴謂守成為難故彼此異議而不嫌房元齡傳帝問創業守成孰難元齡曰創業則難魏徵曰守成為難帝曰元齡從我定天下見創業則難徴與我安天下見守成為不易正觀四年元齡尚為僕射蕭瑀以御史大夫參議朝政蕭瑀偏駁則元齡裁正元齡過失則蕭瑀痛劾故議論相規而不恕此所以成造業之功蕭瑀傳正觀四年瑀為晉州都督遷御史大夫參預朝政瑀意或偏駁不通用法深房元齡魏徴溫彥博頗裁正之㑹元齡等小過失瑀即痛劾然漢之御史大夫不副丞相皆有覬覦謀陷之心杜佑通典漢御史大夫不求副丞相多隂毁丞相欲代之唐之參議參預名曰副二實無異宰相之任錢若水曰按唐故事裴寂參知政事杜淹參議朝政魏徴蕭瑀參議政事劉洎參知政事劉幽求參知機務並宰相之任今陶穀不能逺引乃以參政下丞相一等失之然則名實相副長二協濟者其惟國朝乎國初相權太重擇官為副倣唐參知參議之名而立參知政事之官遂命薛居正呂餘慶為之時乾德二年因陶穀之言也職略國朝乾德二年太祖已相趙普畏其專將擇官以為副而難其名稱召陶穀問曰下丞相一等有何官對曰唐有參知機務參知政事今可用之遂命薛居正呂餘慶為參知政事舊制不押班知印自開寶中宰相趙普與薛居正輪知於是有押班知印之命初不宣制不押班不知印不升政事堂上令就宣徽院使㕔上事殿庭别設磚位於宰相後勑尾書銜降宰相數字月俸雜給皆半之此乾德之制也至開寶六年詔押班知印及祠祭行香令宰相趙普與薛居正輪知舊制不升政事堂自咸平中宰相呂端與寇凖同事於是有得升都堂之例至道元年詔宰相使相視事及商議軍國政事並得升都堂先是呂端寇凖並為諫議大夫參知政事至是端相而凖尚參政端慮凖不平且言兄餘慶任參政曰悉與宰相同願舉行之從其請至元豐以門下中書侍郎尚書左右丞為參知政事之職至建炎罷左右丞而門下中書侍郎即為參知政事之名此事權輕重制度沿革之由也元豐官制罷參知政事以門下中書侍郎尚書左右丞為執政建炎三年呂頥浩請將元祐司馬光併省奏召侍從參議孫覿等請以門下中書侍郎並參知政事而咸罷尚書左右丞焉職略及中興㑹要愚之所以深喜者有協同而無扞格有相維而無相激相有舉事之非則為參者抗議正救不曰越職參有建議之失則為相者廷爭力辨不曰侵官此非古者相規之意歟故景德魏州之守此時蓋無方略可展中書萊公以一言勉參政欽若則即日就道不敢辭難東軒筆録真宗之次澶淵也語萊公曰敵騎未退何人可為朕守魏萊公曰當此之際無方略可展古人有言智將不如福將臣視參政王欽若福祿未艾宜可為守於是即時進語出勑遂召欽若諭以上意欽若茫然自失未及有言公遽曰主上親征非臣子辭難之日參政為國柄臣當體此意遂酌大白飲之命曰上馬杯欽若不敢辭飲訖拜别卒能成勝敵之功者伊誰之力同上或云王公數進疑辭於上前故萊公出之以成勝敵之績耳慶厯西事之興此時諸臣皆有退避呂夷簡復相范仲淹除參政行邊二公相歡戮力平賊卒能受元昊之欵者伊誰之功范仲淹神道碑呂公復相公亦再起被用於是二公歡然相約戮力平賊又公安撫陜西欲為取雲夏之謀夏人已請臣公以疾請鄧州元祐初年司馬拜僕射公著除左丞熙寧弊法同心力革而不恤朋黨之禍言行録元祐四年純仁為僕射王存除左丞竄逐蔡確合力固爭而不顧罷黜之命名臣事實王公存傳云云此數公相協之效然也至所見或異所議不同則互相正救不敢為茍同之習是故范公焚書之事參政宋庠謂可深罪而呂文靖曰止薄責之是相得詰其參之非也記聞范文正知延州移書諭元昊以利害元昊復書語極悖慢文公具奏其狀焚其書不以聞時宋庠為參知政事一日許公從容言曰希文大臣擅與元昊書得其書又焚去不奏它人敢爾邪宋公以為許公深罪范也時朝廷命文正分析文正奏臣聞敵有悔過意以書誘諭之㑹任福敗敵勢益振故復書悖慢臣以為使朝廷見之而不能討則辱在朝廷乃對官屬焚之奏上兩府共進呈宋公遽曰范仲淹可斬杜祁公為樞副曰仲淹之志出於忠果欲為朝廷相勑厲爾何可深罪上問許公何如許公曰杜衍之言是也止可薄責而已王守忠空頭之簽韓公出勑只令參書參政趙公槩難之是參得難其相之行也聞見録有入內都知王守忠者姦邪反覆間諜兩宫司馬溫公等請誅之韓魏公一日出空頭勑一道參政歐陽修已簽書矣參政趙公槩難之問歐公曰何如歐公曰第書之韓公必自有說魏公坐政事堂以頭子勾守忠立庭下數之曰汝罪當死責蘄州團練副使安置取空頭敕填之差使臣即日押行其意以謂少緩則中變矣六曹吏額之議呂丞相則置房都省劉門下則録黃過門能使上意曉然者劉之力也名臣事實劉摯傳蒲宗孟尚書之命三省則奏除蘇執政則力爭不可能使朝廷稍安者蘇之言也名臣事實蘇轍傳嗚呼一謀議之當則協力胥濟不為築室之疑一舉動之失則相規無私不為濟水之同賢矣哉先正用心也若夫丁謂除參萊公推轂也親拂相鬚狗茍取媚萊公所宜面責未幾􅋦怨忍為下石之謀遺事萊公嘗語所親曰丁生誠竒材惟不堪重任公為丞相謂參知政事嘗㑹食都堂羮染公鬚謂起拂之公正色曰身為執政而親為宰相拂鬚耶謂慙不勝公性正直不恱巧佞故卒為所陷惠卿除參荆公力薦也稍至得意反覆陷穽荆公再相於是詔獄忍為彎弓之計何慘耶初呂惠卿為荆公所知驟引至執政荆公去惠卿遂背之洎荆公再相於是起華亭詔獄而使徐禧王古蹇周輔三輩按之惠卿情不得練亨甫呂嘉問以鄧綰所修惠卿事交聞其間復為惠卿取中語連荆公子雱雱時已病坐此憂憤而卒荆公再求罷去噫丁呂小人也始之比周以勢利而附後之立異以勢利而叛其視諸賢相協相正之風亦少愧哉三司嘗觀三司沿革之由矣度支本唐户部之郎耳自宰相兼判係以使名而度支之權始重此其一變也百官志度支郎中員外郎各一人掌天下租賦物産豐財之宜知又呂諲傳乾元二年擢諲同中書門下平章事三月門下省兼判度支唐宰相兼度支自諲始鹽鐵亦唐户部之郎耳自御史分務吏至萬員而鹽鐵之權愈重吳武陵傳諫曰云云鹽鐵度支亦戶部郎爾今三分其務吏萬員皆御史員外郎為之今又加使權其務是御史員外郎久於事反不可信此其再變也接于五代鹽鐵度支户部皆專使總領曰三司而鹽鐵又升户部度支之上此其三變也鹽鐵戶部度支在唐五代皆專使領皇朝方設副使以三司使總之故號三司鹽鐵副使其度支戶部亦如之然則戶部之職一變而判以宰相再變而主以他官三變而為三司而所謂三司使者乃其三變之餘爾國朝立極五季弊政掃除殆盡而獨一二僅存殆有深意焉蓋我朝以宰相主民樞府主兵三司主財國家大務莫重三者故不得不專其職也有正使位亞執政官稱省主有副使位亞待制者稱省副外此有判官其員有二資序視轉運有子司其員有六資序視提刑通稱曰省判吏員之多寡然也國朝沿五代後唐之制置三司使以總國計應四方貢賦之入朝廷未嘗預焉一歸三司總鹽鐵度支戶部號計省使位亞執政目為計相官稱省主其恩數廪祿與參樞並鹽鐵度支戶部本唐五代皆專使領皇朝方分設副使以三司使總之位亞待制及稱省副恩數同夫卿監逐司各置判官二員號三司鹽鐵判官三司度支戶部判官以佐副使視轉運使資序又有三司判官六員謂之子司視提刑資序各主一司謂開折司勾覆磨勘司兼憑由胄案兼刑案修造案河渠案各號三司判官管勾開折司或衙司公事之類以專職也乃通判省判在太平興國則分而為三太平興國八年始分三司為三部各置使王明為鹽鐵使陳從信為度支使郝正為户部使雍熙三年詔三司錢榖公事自今並預計定合行與否具狀聞奏不得復持兩端在淳化則合而為一淳化三年五月詔罷鹽鐵度支户部等使三司但置使一員至至道因陳恕之奏復有三部之分至道二年陳恕奏分為三部各設主司從之又咸平命冦凖之充復有一使之置咸平六年先是三司各置使局不相總統彼此自求充濟至於出納移用則專名指執動相違戾六月始併鹽鐵度支戶部為一使命寇凖充官職之分合然也曰長若屬皆不輕授蔡文忠之在仁廟進士第一欲擢政府先除正使呂申公之在英廟館閣有聲欲置禁從先除判官長二之選用然也蔡龍圗官制祖宗舊制選除執政侍從必先選歷錢榖蔡文忠公由進士第一亦嘗自三司度支副使權拜起居舍人知制誥乃至翰林學士權御史中丞章獻明肅皇后遺詔令楊太后繼垂簾同聽是時仁宗年二十四文忠公力諍之方親決萬機即欲權參大政尚書除權三司使數月乃拜樞密副使元祐宰相呂申公在至和間任館閣禮官已有賢名嘉祐中朝廷欲置之禁從按其歷任未嘗經錢榖乃先除戶部判官居數月進修起居注旋召試知制誥可見待三司使暨僚屬之意至事權之不分利源之歸一隱然有周官理財之意又豈唐與五代所能髣佛萬一哉夫夏官之胄案秋官之磨勘衙司冬官之修造河渠自唐五代以來而地官之所不與我朝悉屬三司故造作軍器屬之胄案土木之役屬之修造河防之役屬之河渠國家財用之出無大於三者而今皆得總焉均節制度檢柅耗蠧而不為他司之所用此財之所出者三司得統之矣蔡官制唐地官設度支金部倉部戶部唐末省官分置使五代專以鹽鐵為理財之要分在二省之屬今之金部也度支主用度戶部主版籍故次之其子司磨勘在比部衙司乃今都官皆𨽻秋官胄案乃今庫部屬夏官修造乃今工部河渠乃今水部𨽻之冬官地官不得統焉皇朝盡付三司者可見立功以實不以文也開拆司兼管綱運衙司考所掌之財勾磨財計檢察憑由悉歸磨勘造作軍器則胄案主行土木之工𨽻修造河防之役則河渠行之國家之費無大三事為蠧矣必三司按之外之諸路轉運內之私帑儲蓄自唐五代以來而地官未必盡與我朝盡歸三司故漕運督集財賦之權三司制之內庭分貯羡餘之財三司亦領之國家財用之入無大於二者而今皆得總焉公私通融內外統一而不為他司之所分此財之所入者三司得統之矣蔡官制本朝分路設漕運使副判官付以按劾之權皆督集財賦悉𨽻三司凡經費羡餘轉運官獻之三司盡輸都城積于左藏庫别有科名決分貯內庫者皆三司使總之自熙寧變新法而三司之職已壞自元豐改官制而三司之權盡失噫惜哉同上以此論之三司使之職不待改官制而失其權自熙寧更變新法之時已壞矣况政和之後以勾當為承受實領邦計以便宣取而戶部尤難守其職掌焉是故方雍熙之變法也所遣使者盡出相門皆務聚斂取恱廟堂而三司不得制御前置簿盡籍總數帑藏盈溢侈心易生而三司不得防外則常平免役坊場河渡之資皆號朝廷封樁內則嵗課上供之數皆别創庫藏貯而三司並不相關故漕司之趣辦而不𨽻三司之勸沮內庭之積貯而不關三司之參考向之三司皆總財之所入者安在哉此在龍圗嘆其熙寧變法三司無權勸沮漕司無案關防用度者此也蔡官制曰熙寧遣使盡出於宰相之門皆務聚斂以恱廟堂要重賞而取美官非若三司撫此權以動人則漕臣亦不敢橫斂也邦計所入有常可絶人主之奢費安石乃置房通籍於御前盡籍國帑之數在神宗恭儉郡國帑藏率皆盈富至崇寧後蔡京自號制禮作樂往往蠧國勸以奢廣而又宦者各專局應奉及淫巧繕修與夫除戎器修河渠凡此之類皆不先關戶部非若三司有專案以關防也同上又安石為相與三司分權凡賦稅常貢征𣙜之利方歸三司摘山煮海坑冶𣙜貨户部沒納之財悉歸朝廷其立法與常平免役坊場河渡禁軍關額地利之資皆號朝廷封樁又有嵗科上供之數盡運入京師别創庫以貯之三司不預焉方元豐之改制也三司之胄案為軍器監而繕治械仗之費戶部不得聞三司之修造案為將作監而百工興作之用户部不得考三司之磨勘歸於比部並𨽻刑曹鉤考户部皆不得知故他司辦事為效而不恤財之有無戶部以給財為功而不論事之當否向之三司得考財之所出者安在哉此司馬公言其改官制以來五曹得以自專而户部不能制者此也南窗記談嘉祐中大水取三司河渠案置都水監元豐官制以三司胄案之事歸之軍器修造案之事歸之將作三監皆𨽻工部於是戶部所掌版籍財用三事而已元祐中蘇子由為户部侍郎請都水將作軍器三監皆𨽻戶部凡三監有所為户部定其事之當否裁其費之多寡而工部監其工之良楛程其作之遲速朝廷從之按唐度支使杜佑奏營繕歸之將作木炭歸之司農染練歸之少府計司兼領他職自唐已然不得云出於祖宗之意凡子由所諫者皆佑之釐正也豈時移事異固不聞耶又溫公言戶部尚書三司使也而左曹𨽻尚書右曹不𨽻尚書矣天下之財分而為二無專主之者誰為國家愛惜乎又云自改官制以來置尚書六曹二十四司及九寺三監將舊三司所掌散在六曹及諸寺監應支用錢物五曹得以自專百司得符即時應副而戶部不能制雖然今之户部尚書即昔之三司使也左右曹之侍郎即昔之副使也郎中貟外即昔之判官子司也國初因仍五代第為權宜之舉今之復唐舊制正為經久之謀豈得以罷三司歸户部為非古哉第事權之分合利源之通塞如何耳使其能久其任有如陳晉公之為三司十有八年號真鹽鐵萊公之在三司前後事件類為方冊何患事之不舉陳晉公為三司使十八年精於吏事晚年薦寇萊公自代真宗用萊公為三司使以晉公為集賢學士萊公檢尋晉公前後事件類為方冊及所至榜示躬至其第請晉公判押自是計相無不循其舊貫至李􅖴為三司使始改茶法而晉公規模漸革向之榜示亦除削矣能重其職有如程琳為使禁中有取覆奏罷之景祐元年程琳為三司使禁中有所取琳覆奏罷之內侍言琳專琳曰三司財用皆朝廷有也臣為陛下惜爾王堯臣之為使閹寺橫斂輒奏止之何患其弊之不革慶厯三年四月王堯臣為户部郎中權三司使事堯臣始受命言於上曰今國與民皆困矣在陛下任臣者如何因請自擇僚屬上納其言堯臣果以治上聞五月入內都知張永和建議請收民房錢七之三以給軍費事下有司堯臣持不可因上言曰此衰世事唐德宗所以致朱泚之亂者鹽鐵副使林維張永和勢助之甚力堯臣奏鐵維議乃定能專其事有如鄭戩居省半載而得羡餘四百萬緡康定元年鄭戩在三司未半嵗復漕運考課格分别殿最又勾校三司出入得羡錢四百萬緡張方平主計未朞而京師有五年之蓄何患其用之不豐嘉祐九年八月張方平為三司使遂畫漕運十四策宰相富弼讀方平奏上前晝漏盡十刻侍衛皆跛倚上太息稱善弼曰此國用大本非常奏也悉如所啓施行退謂方平曰自慶厯以來公論食貨詳矣朝廷損益必以公奏為本其後未朞年京師有五年之蓄不然亦徒動元祐諸賢拳拳之請也司馬溫公蘇子由奏見上侍從昔歐陽修進言曰侍從之臣論思為職嘉祐三年三月歐陽修言學士待制號為侍從之臣所以奉閒宴備顧問以論思獻納為職自祖宗以來尤所精擇苟非清德美行藹然衆譽髙文博學獨出一時則不得與其選是以選用至難員數至少官以難得為貴人以得職為榮縉紳人望既隆則朝廷之體增重而後用人亦易員數不少今自觀文殿大學士至待制並立定員范純仁抗疏曰侍從之官是亦論思熙寧二年四月同知誎院范純仁言今兩府之下則有侍從官實古九卿之職是亦朝夕論思同國休戚今朝臣將主判司存使為己之職事寵亞四輔報同庶僚人情既習因循朝廷不加考校或有時政得失惟能退有後言處之不疑自同胡越乞降詔督責凡朝廷闕失並須論列有所上章疏付政府銓定量加賞罰上與安石為然嗟夫佩持荷槖對立松階承清燕之雍容親龍光之密勿莫親於侍臣之職固也然潤色典誥主判司存謀議政事參決疑難孰非侍臣責也二公者置而不言一則曰論思二則曰論思何耶我知之矣夫人主深宫退處之時侍左右者雜薰腐便嬖之習恱耳目者多綺羅妖冶之色使王所皆居州而誰與為不善無人於穆公之側則退而寒之者至膺是選者其可不以正救君心切劘聖德為己任哉昔漢之侍中大夫非侍從之選乎出入禁闥掌直承明謀議辨論中外相應似也夫何俳優不根之論莫能勝義理之文詞賦虛誕之作不過狀陸離之景卒使神仙之心方啓而征伐之志益鋭者司馬相如嚴助東方朔之流不能論思之失也嚴助傳後得朱買臣吾丘壽王司馬相如主父偃徐樂嚴安東方朔枚臯膠蒼終軍蔥竒等並在左右是時征伐四夷朝廷多事上令助等與大臣辨論中外相應以義理之文大臣數詘其尤親幸者東方朔嚴助枚臯吾邱壽王司馬相如朔臯持論不根上頗俳優畜之唐之學士待制非侍從之職乎晨趍青瑣夕宿嚴衛上備顧問次典議論似也夫何應制摛辭者李白第以靡麗之文賦詩估酒者張洎殊失操修之行卒使梨園之樂汨亂聰明沉香之章轉移心術者李白張洎之流不能論思之過也並本傳國朝責任之意蓋與漢唐異矣王鬷之為待制忤意季良杜衍之為待制不志薛顔可以言侍臣之任乎曰未也天聖九年閏十月王唆口鬲杜衍並為天章閣待制初馬季良建言京師賈人常以賤價居茶鹽引請官置務取市之季良方用事有司莫敢忤其意鬷獨不可曰與民競利豈國體耶他日上見鬷勞之曰官市交引賴卿力言罷之甚善有司臨事當如此薛顔死其家屬衍為墓志衍卻之及在三司因奏事上謂衍曰薛顏有愧行卿不與志墓誠清職也楊億之為翰林揮翰如飛陳彭年之為翰林詞筆優長可以言侍臣之任乎曰未也楊億真宗朝為翰林學士揮翰如飛文不加㸃年又祥符六年陳彭年為翰林學士上曰彭詞華優長人鮮及者蔡齊之為學士不媚近習劉筠之為學士不奉權貴可以言侍臣之任乎曰未也天聖六年以學士蔡齊知河南府羅崇勳趣上修景德寺記曰參政可得也齊不上崇勳讒於太后命齊出又天禧二年丁謂復相召學士劉筠草復相制筠不奉詔乃更召晏殊殊遇筠側面而過蓋有愧也吾觀熙寧之詔曰侍從自今視朕過失極言無隱熙寧因范純仁之請乃詔侍從官自今視朕過失與朝廷事之闕略具章極言無隱噫言善而不用朕有闕咎道久而弗言爾為不恭將用此考察在位所以事君之實而為黜陟焉又觀淳熙之詔曰侍從自後事有過舉盡忠極言淳熙八年八月壬子召侍從官王希以下頒示御札曰朕謂侍從之臣當以論思獻納為任自後事有過舉政有缺失卿等即宜盡忠極言或求對或入奏務在當理而後已嗚呼聖朝責望之意蓋如此縉紳其可不以是自勉歟是故司馬溫公之除翰林也修心之諫首論仁勇治國之諫歷陳賞罰溫公獻納之意切矣觀其不拜樞密之言曰臣為侍從於天下事無不言者可見也溫公行狀神宗即位除公為翰林學士公上疏論修心之要三曰仁曰明曰勇治國之要三曰官人曰信賞曰必罰其說甚備且曰臣昔為諫官即以此六言獻仁宗其後以獻英宗今以獻陛下餘見言行録公拜樞密副使上章力辭至六七曰誠能罷置條例司雖不用臣臣受賜多矣上遣人謂樞密兵事也公言臣未受命則猶侍從也於事無不可言者范文正公之除待制也百官之圗不忌時宰四論之獻極指弊政范公論諫之意厚矣觀其諷丞相之言曰論思侍臣之職豫敢不勉可知也景祐元年徙蘇州為天章閣待制仲淹自還朝言事愈亟宰相使人謂之曰待制侍臣非口舌任也仲淹曰論思侍臣職也余敢不勉景祐六年時呂夷簡執政進者往其門仲淹上百官圗夷簡不恱又為四論以獻一曰帝王好尚二曰選賢任能三曰斥名四曰推委大抵譏指時政夷簡大怒以仲淹語上於帝前訴仲淹越職言事怨女三千放出宮死囚四百來歸獄李昉之為侍臣誦此以規其君何忠也太宗語侍臣曰朕何如唐太宗李昉誦白居易七德舞詞怨女三千放出宫死囚四百來歸獄上聞之曰朕不及朕不及卿言警朕矣玉輦經年不遊幸上林花好莫爭開歐公之居從臣詠此以諷其君何直也髙宗時綦崇言歐陽修立朝以諫諍為心若春日帖子蓋臨禁門戶祓除祈祝之辭異時作者不過頌德歌福而已至修乃中含規諷嘗讀修之詞有曰陽進升君子隂消退小人勸上以用威斷也有曰玉輦經年不遊幸上林花好莫爭開戒上以節盤游也不然寵亞四輔報同庶僚寧不愧熙寧諫官之言乎見上抑又論之針規闕失縉紳責也奬借風采廟堂責也蔡襄直言有補時政多矣一為至和權臣中傷甘心請外以求避至和二年六月趙抃言天子南面之尊左右前後須得正人賢士為之羽翼朝廷有大賞罰可以􅖴訪有大闕失可以禆益有大急難可以謀議有大禮法可以質正抃蓋論蔡襄吳奎等請外以避權要中傷不當聽其去范希文賢者有禆君德多矣景祐大臣且戒其侍臣非口舌之任見上殆何啻欲書掣肘乎此愚又拳拳於廟堂之責兩制天子私人世以為貴榮矣哉鑾坡之選也五代職官志選用益重號為內相又以為天子私人入院一嵗遂知制誥宰相判官世所推重榮矣哉鳳閣之選也呂陶言中書舍人前世推重謂之宰相判官豈曰序遷然嘗究設官之源流矣承明直廬侍中為文是西都制誥第以侍中掌之漢嚴助厭承明之黨補外郡召歸侍中復使為文本傳明光奏事尚書為誥是東都誥令但以尚書郎職之通典注漢尚書郎直宿建禮門奏事明光殿下筆為詔誥出語為誥令是時翰學中舍尚未置員至魏設中書之官南朝以來相仍不改出則宣命入則參決於是有中書舍人之職通典魏置中書通事舍人東晉省宋初復置通事舍人四員入直閣內出宣詔命凡有陳奏則舍人持入參決於中梁用人殊簡以才能不限資地多以他官兼領後除通事字直曰通事舍人自是詔誥之任舍人專之唐武德改中書舍人置六員至唐立學士之官開元以來改稱翰學備待顧問發演絲綸於是有翰林學士之職通典自太宗時召名儒學士草制然猶未有名號乾封以後始號北門學士元宗初置翰林待詔掌四方表疏執答應和文章繼以詔勑文誥悉由中書多壅滯始還朝官有詞藝學識者入居翰林供奉别㫖然亦未定名制勑書詔猶分在集賢開元二十六年始以翰林供奉改稱學士則建學士院於翰林院之南俾掌內命其後又置東翰林院於金鸞殿之西隨上所在選用益重職林此制度沿革之由也嗟夫發揮白麻稱曰內相見上典掌紫泥號為一佛神宗重內外制之任嘗謂左右曰詞臣之選古今所重朕早聞人言朝廷命一知制誥六姻相賀以謂一佛出世誠古今清華之選若非德望隆重才猷頴拔其何以稱是職哉正諫自任閹宦知懼李絳為翰林學士孜孜以正諫為己任中官縱肆皆憚之草詔一下士卒感泣陸贄為學士從幸奉天下詔山東士卒感泣固無愧於翰學之任然騎鯨之怪孟浪之檢豈不為謫仙之纍唐李白傳白為翰林學士帝愛其才後浮游四方於采石騎鯨捉月而死解事舍人明練事機齊浣援凖古誼時號解事舍人文場元帥獨擅聲價張九齡固無歉於中書之除然集蠅之揮輕鄙見斥豈不為元稹之辱若人也其有負寵任之意多矣憲宗用元稹知制誥朝論鄙之會同僚食瓜於閣下有青蠅集其上中書舍人武元衡以扇揮之曰適從何來遽集於此國朝未改官制之前翰林學士帶知制誥者乃其為內制之職而他官帶知制誥者為外制之職若不帶知制誥而但為翰林中書者是特寄祿官之稱官制既行則翰學中書自為職官不復帶知制誥之銜然國朝所選兩制名儒彬彬實異於唐且畢士安之與張洎均之為才士也我太宗之選翰林用士安而不用洎以士安有德行而洎特有文之士爾太宗以畢士安為翰林學士初執政欲用張洎上曰極知張洎文學不下士安第德行不及爾楊億之與梅詢均之為文人也我真宗之選知制誥用億而不用詢以億望實素著而詢特險薄之人爾咸平四年三月禮部郎中薛映兵部員外梁鼎左司諫楊億並知制誥初上欲用梅詢宰相李沆言詢險薄億實望素著遂與薛映梁鼎並命云云北門深嚴非可輕任寧用竇儀而不用杜韡蓋酣酒無取也乾道二年上謂宰相曰北門深嚴當擇審重士處之范質曰竇儀清介謹重上曰禁中非此人不可時宰相欲用杜韡質曰近王著以酒失罷去韡之嗜酒尤甚豈當用邪西掖典司非可序遷寧用劉攽而不用曽肇肇蓋操履偏詖也元祐元年十一月曽肇為中書舍人王巖叟言未行官制以來謂之知制誥專行誥詞不預政事自改官制遂為中書屬官肇之凡材何以稱職及劉攽除中書舍人巖叟又言近劉攽命下之日無賢不肖莫不稱為得人今既有中書舍人兩員肇可汰去呂陶又言肇操履偏詖藝文浮淺今乃擇居西掖外則典司誥命內則分押諸房前世推重豈可序遷輒以虛授范杲獻記擢以翰學可矣然躁競求進則拒之而不入知制誥范杲數致書宰相求入翰林嘗出一篇示李昉曰先公謂杲才任學士故付杲於是獻玉堂記請備其職上惡其浮躁不使居內林希有文處以中書可矣然諂附無恥則斥之而不容元祐元年九月林希為中書舍人王覿言希雖博有文藝素號險巧當王圭用事希意諂附無所不至復為韓縝鷹犬與張璪交結何可代言禁掖詔中書時暫闕官噫祖宗之選用固嚴矣而兩制之所自處者將以文學為貴耶抑亦職位為榮耶否則以踐履操守為重也且文章典雅有三代風張方平在翰林上手札羡之曰卿文章典雅煥然有三代之風文詞醇深有西漢風溫公年譜云無所不通文詞醇深有西漢風神宗初擢為翰林學士何粹也史館進碑驚為神速國初王祐拜中舍受史館詔普照王碑經宿上進中外驚其神速西垣視草嘆曰竒材蘇軾何竒也然文藻之粹詞翰之竒未可為兩制之盛四字寵名御筆親書淳化二年蘇易簡續翰林志二卷以獻上嘉之飛白玉堂之署四字付易簡榜之㕔額永為翰林美事七言賦詩御筆親製學士楊億疾在假御筆七言詩有副豫側席待名賢之句何寵也王吕父子俱掌紫誥春明退朝録父子掌誥國初至熙寧元年凡九家李文正昌武王兵部文正王思讞安簡鼎文元文莊錢希白修懿梁翰林莊肅吕文靖公夷簡宋宣獻公敏求蘇儀甫子容此九家也韓曽兄弟親草黃麻本朝弟草兄制惟韓氏與曽子固無他比也公論榮之何貴也然恩禮之寵家世之貴未可為兩制之重切嘗求翰學之榮矣冊妃之命所當從也而宋祁不肯草宋景文初入翰林當張貴妃制初行冊禮而祁以誥進妃怒抵于地曰何學士敢輕人落職知許州冊后之命所當奉也而楊億不肯草真宗議冊皇后上欲得楊億草制使丁謂諭㫖曰大年勉為此不憂不富貴億曰如此富貴非所願也乃命他學士草制之丁謂再相之麻筠不奉詔丁謂復相詔學士劉筠草復相制筠不奉詔乃更召晏殊殊遇筠側面而過蓋有所愧崇勳招提之記齊不進藁天聖六年以翰林學士蔡齊知河南府羅崇勳趣上修景德寺記曰參政可得也齊隱其記不進崇勳怒讒於太后命齊出守夫內制翰學之責也今啖以利祿而不從迫於權貴而不徇其操守何如哉非榮乎又嘗求中舍之榮矣丁謂除參中書告以降麻舍人反以草制雖拂權勢不恤也丁謂自保寧軍節度使知江寧召為參政中書以為當降麻盛文肅為學士以為當草制竟以制除丁銜之吕弼罷樞丞相力請命詞舍人力請用麻雖拂廟堂不顧也舊制執政罷政樞密使除宣徽使轉一兩官除藩府其次除觀文殿學士皆宣麻熙寧間吕惠公弼因爭新法求去王安石隂沮之乃選舍人院命詞蔡齊掌外制繳詞頭舉典故論之安石勸上內批今後樞密罷更不宣麻元豐中馮京以樞密使改除節度使乃宣麻蔡龍圗官制遂國之命創例封還國初舍人主行文書封還詞頭者蓋鮮康定間劉從德遂國夫人初以后族出入禁中一日削其國封久之中㫖還封富弼當制封還詞頭朝論謂無近比然多是弼者後歐陽修援例封還張可久詞頭李定之詞相繼繳駁四朝國史李定以資淺入臺宋敏求蘇頌相繼封還詞命次呂大臨亦還之世稱為熙寧三舍人夫外制中舍之任也今抗大臣而不奉任衆怨而不從其節槩何如哉非榮乎故曰錫宴賡詠不足為蘇翰林賀而忠孝一生心之詠君子以為賀也太宗蘇易簡為翰林錫宴賦詩太宗詩曰君臣千載遇易簡賡云忠孝一生心太宗喜之揮翰如飛不足為楊制誥喜而願秉忠清節之詩君子以為喜也真宗朝知陳州召還知制誥又歸田録大年揮翰如飛文不加㸃又嘗試中書詩云願秉忠清節終身立聖朝宰相表賀云云古今源流至論後集卷二
