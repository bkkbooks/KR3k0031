  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_026-1a, image: WYG0942/WYG0942-0432a.png}
body:
  text: 古今源流至論續集卷六宋林駉撰臺官御史古官也自周迄今無代無之然名雖相沿意實相逺蓋以御史為傳命記事之官者周與戰國也以御史平章報奏而兼察劾之任者秦漢也以御史分為四司專劾百官之過者東都魏晉以來也唐則任彈劾之外而復兼訴訟之事國朝則任彈劾之外而復兼言事之責此歷代委任之大者也按周官御史五史之至微者以中士下士為之特小臣之傳命令者耳周官御史逮至戰國獻書多云獻書大王御史史記澠池之會秦趙各命御史書事史記藺相如傳而淳于髠謂齊王曰御史在前凡此皆記事之任而糾察之責未聞焉此蓋周與戰國制也通典曰御史之官周官有之蓋掌贊書而授法令非今任也戰國時亦有御史秦趙沔池之會各命書其事又淳于髠謂齊王曰御史在前則皆記事之任也至秦人主日親政事以操其下侍御僕從其勢益親或在中以受文書或在外以主彈擊通典至秦漢為糾察之任本注曰秦以御史監郡漢初叔孫通新制禮儀以御史執法舉不如儀者是也漢因舊制御史大夫佐丞相兼統萬幾中丞在殿中掌圗籍祕書侍御史受公卿奏事舉劾按章漢表御史大夫秦官位上卿掌副丞相有兩丞一曰中丞在殿中蘭臺掌圗籍祕書外督部刺史內領侍御史十五人受公卿奏事舉劾案章故張蒼為柱下御史明習天下圗書張蒼傳蒼為御史主柱下方書明習天下圗書計籍又善算律厯李文為御史中丞數從中主文書事張湯傳湯為御史大夫李文為御史中丞數從中主文書事陳咸為中丞總領諸郡奏事本傳元帝擢咸為御史中丞總領諸郡奏事課第州刺史內執法殿中公卿以下憚之此居中受文書也叔孫通令中執法舉朝會不如儀見上蕭望之為大夫部按延夀之驕恣韓延夀傳延夀代望之為左馮翊而延夀遷御史大夫望之劾奏延夀僭上不道延夀竟坐棄市嚴延年為侍御史劾奏霍光之廢立本傳延年舉侍御史宣帝初即位劾奏霍光擅廢立無人臣禮不道奏雖寢朝廷肅然敬憚此在外主彈擊也兹蓋秦漢制也至成帝以御史大夫為大司空置長史而中丞官職如故至哀帝再更大司空之後迄于東都而中丞出外為臺率専任彈劾始不居中主章奏之事前表成帝綏和元年御史大夫更名大司空置長史如中丞官職如故哀帝建平二年復為御史大夫元夀二年復為大司空御史中丞更名御史長史又後百官志御史大夫轉為司空因别留中為御史臺率専席而坐其職重也後漢光武改為中丞與尚書令司𨽻校尉朝會皆専席而坐京師號三獨坐通典驄馬見避其望隆也後漢桓典為侍御史執法無所避常乘驄馬京都畏之為之語曰行行且止避驄馬御史埋輪都亭豺狼屏迹張綱為侍御史安帝時遣八使案行風俗惟綱最官卑年少同日受命各之部獨埋其車輪於洛陽都亭曰豺狼當道安問狐狸遂奏大將軍梁冀罪惡云云執法殿陛權幸知畏陳翔字子鱗拜侍御史正旦朝賀大將軍梁冀威儀不整翔奏請以冀理罪時權幸知畏並通典及本傳自是以來權専任重魏則簪白筆以奏不法魏置御史八人當大會殿中御史簪白筆側陛而座帝問左右此何官何立筆對曰此謂御史舊時簪筆以奏不法晉則糾行馬以督百僚通典晉中丞専糾行馬內司𨽻専糾行馬外雖制如是然亦更奏衆官實無其限宋則命中外停駐以尊之同上孝武帝孝建二年制中丞與尚書令分道雖丞郎下朝相值亦得赴之餘內外衆官皆受停駐齊梁以來常命十人居曹以察之齊有十人梁陳皆九人居曹糾察不法兹蓋東都魏晉以後制也唐制有大夫有中丞有侍御史有殿中侍御史有監察御史復有主簿內供奉裏行之員通典大夫一人中丞二人侍御史四人殿中侍御史六人監察御史十人主簿一人內供奉裏行各如正貟之半大抵臺事大夫總判之中丞通判之侍御史分判之至殿中則糾班序之不整者監察則掌監祭祀諸軍出使者其餘職事與正同爾通典御史大夫掌肅清風俗彈劾內外總判臺事中丞職副大夫通判臺事侍御史掌糾察內外受制出使分判臺事殿中侍御史號為副端閣門之外百僚不序有離立失列言囂而不肅者則糾罰之其正冬大會則戴元豸乘馬加飾監察御史掌內外糾察并監祭祀及監諸軍出使等凡諸供奉及裏行雖俸祿有差職事與正同貞元以來曰御史臺則天以後曰肅政臺左臺以察朝廷右臺以察郡縣龍朔改肅政為御史睿宗復詔二臺以察京師太極復廢右臺而左臺専𨽻尚書省此特沿革之制爾然以職任論之武太后時改御史臺為肅政臺凡置左右肅政二臺則置大夫中丞各一人侍御史殿中監察各二十人左以察朝廷右以懲郡縣二臺迭相糾正而左加敬憚龍朔以後去肅政之名但為左右御史臺睿宗即位詔二臺並察京師資位既等競為彈劾百僚被察殆不堪命太極元年以尚書省悉𨽻左臺月餘右臺復請分給尚書西行事左臺大夫乃表請依貞觀故事遂廢後臺而本御史臺官復舊廢臺之官並𨽻焉戴豸糾儀縉紳皆整肅也見下􅋦命出使山嶽可動搖也乾封二年韋仁約曰御史􅔷命出使不能動搖山嶽震懾州縣誠曠職矣桞範之規拂蕭復之剛介王義方之抗奏姦人王義方擊李義府溫造之望威稱職並本傳中書令抑置田宅監察得劾之韋仁約奏褚遂良御史中丞犯狀有五監察亦得擊之紀履忠劾來俊臣此不過糾督之任然舊制御史不受訴訟有通辭狀者立於臺門候御史出收取採如可糾則糾之略其姓名皆云風彈自永徽中崔茂元為大夫始任受事得任訴訟矣通典舊例御史臺不受訴訟有通詞狀者立於臺門候御史出門外收採如可彈者略其姓名皆云風聞訪知永徽中崔義立為大夫始定受事御史人知一日劾狀題告人姓名或訴訟之事舊制不主刑獄惟主案效提綱而已自貞觀末年中丞李乾祐以囚自大理滋姦又按事多為棘寺所反乃奏臺中置獄復得主刑獄矣此唐自彈劾之外而得兼獄訟也通典舊御史但聞風彈事提綱而已其鞠案禁繫則委之大理貞觀末御史中丞李乾祐以囚自大理來往往多姦弊又按事入法多為大理所反乃奏於臺中置東西二獄以自繫劾國朝初無正貟止為兼官中丞除正貟外或帶它官者尚書則曰某官兼御史中丞郎則曰御史中丞兼某官給諫則曰某官權御史中丞事次則知雜御史副中丞判臺事其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉三院多在外任風憲之職它官領之職源聖朝沿唐之制設御史臺大夫無正貟止為兼官中丞除正貟外或帶他官者尚書則曰某官兼御史中丞丞郎則曰御史中丞兼某官給事中諫議大夫則曰某官權御史中丞事次有知雜御史二貟副中丞判臺事其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉舊制三院多出外任風憲之職用它官領之自太平興國以張巽為監察御史正官舉職自此始也天禧始置言事御史景祐始置御史裏行元豐復置六察其後大正官名不除大夫以中丞為長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史其使名皆除之此特沿革之制爾然以職任論之太平興國三年以張巽為監察御史正名舉職自此始也唐制御史不専言職至天禧中始置言事御史其後久不除至慶厯五年殿中侍御史梅摯監察御史李京並為言事御史唐太宗時置御史裏行至景祐中始置以處御史之官卑者唐議臺案有六監司元豐三年李定請復六察於是以御史専領六察察在京官司又詔御史六貟以三貟分領察案三貟専言事其後大正官名不除大夫檢校官𢃄憲銜者亦除去以中丞為長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史舊以中丞兼檢理使殿中侍御史兼左丞右巡使監察御史兼監察使至是使名悉罷會要四朝志國朝之任御史者亦如唐人按劾之任其清徑忠烈尤過之韓琦一代宗臣不押班細故也而王陶極口詆之韓琦不押班王陶論琦有跋扈之罪文彥博三朝元老燈籠錦微失也而唐介抗疏論之唐介論文彥博以燈籠錦媚後宮求遷介遂貶春州别駕彥博亦出呂誨之先見呂誨為中丞時王安石除參政呂誨首力彈之時溫公皆以為過後安石行新法溫公始服先見王素之徑力王素在臺諌風力愈徑帝曰真御史也議者目為獨擊鶻鐡面御史趙抃為御史彈劾不避權幸號鐡面御史鐡肝御史四朝國史劉顗為御史言事貶蘇軾以詩送有烏府先生鐵作肝之句世號為鐵肝御史風采凛凛令人膽落此亦不過糾督之任然唐制御史以局専糾百官陸長源云諫官須蹇蹇匪躬之士憲官須孜孜嫉惡之人李華序崔孝公集亦曰直躬正詞擢左補闕嫉邪忿佞除侍御史直躬故能諫君嫉邪故能察吏是臺憲無預君德之正否也長源上宰相書曰諌臣須蹇蹇匪躬之士憲臣須孜孜嫉惡之人李華序崔汚文曰朝廷以公直躬正詞擢左補闕嫉邪忿佞除侍御史至我朝太宗置言事御史而朝廷闕失御史得言之見上呂公著諸賢復言六察不與於言専察官司復許得言而國家大計六察得發之又不止區區於指摘群臣細故而已元豐八年呂公著言御史大夫比年以來専舉六察故事廢國家利害之大計察官司簿領之細故乞罷案察只置言事御史劉摯又言中丞而下十貟然止於中丞侍御史得言事外監察御史六貟専察治官司公事文書不與於言請許六察並許言事此國朝自彈劾之外而復兼諫諍也愚以古今御史之職而歷考之未嘗不嘆國朝之美意蓋糾群臣之慝易劾大臣之失為難劾大臣之失固難言人主之闕尤為不易我國家涵養士氣崇奬直言趙中令開國元勳固對越神明而跋扈之態未必不自雷德驤一言折之太祖寵待趙韓王如左右手御史雷德驤劾奏普強市人第宅上怒叱之後其弟有鄰復訟其庇吏受賕上怒按問罷相丁謂當軸用事使非臺諌有言則其禍天下非止如今日所觀者蘇子由云使丁晉公之時臺諫言事必聽其敗已久矣至如申公非諸公共攻其短其害必有甚也惟演之麻鞫詠毁之錢惟演圗相監察御史語右正言劉隨曰若相惟演當取白麻毁之堯佐之使御史奪之張堯佐以女有寵於仁宗一日除四使唐介論列卒奪兩使曾不以卑抗尊而為嫌也噫孰知犯人主之威而尤為難乎雷霆之威犯者必折堂陛之嚴目不敢瞬人非喪心誰敢冒身於斧鉞之下今先正諸賢感慨奮發不為之折雖斥之貶之相率以為慶也叩鐶大呼不曰沽名明道二年郭皇后見踈仲奄孔道輔孫祖德蔣堂郭勸馬絳假少連宋祁劉涣詣垂拱殿門伏奏門者闔扉道輔叩銅鐶大呼夷簡以臺諫伏閣非美事乃逐之叩榻論諌不曰忤旨石介慶歷聖德詩惟修惟靖立朝讞讞言論醜酠忠誠特逹素相之後含忠履潔昔為御史今叩豫榻濮園之議全臺論列侍御史知雜事呂誨前後十一疏丐休王圭等議侍御史呂純仁監察御史裏行呂大防皆論稱親之非新法之論臺府一空蒲宗孟范百祿蘇公范公呂公皆爭新法去於是始足見國朝臺論之公耳雖然有由也欲除御史先擇舉主元祐五年劉安世朱光庭伏覩祖宗故事天禧三年詔諫議大夫賈黃中知制誥陳知微於常參官舉公清強敏材堪御史者一人臣等切惟聖訓皆有微旨何者御史之任使以糾察百僚故須先擇舉主使之引類然亦未嘗専出於執政也選人入臺皆不奉詔熙寧中李定以資淺入臺三舍人皆不奉詔其居之以人者審也諫官御史不兼職務天禧中詔諫官御史不得兼職務入臺十旬無疏者罰舊制御史入臺滿十旬無章疏者有臺辱之罰其責之以言者専也言及乘輿天子改容語關廊廟宰相待罪蘇東坡論其假之以權者重也鳯凰鳴矣于彼高岡梧桐生矣于彼朝陽君子推原其故三咏三歎祖宗待之之厚矣諫垣官以諫名非古也自漢武置諌大夫専掌議論於是有言事之官漢官表上大夫掌議論有諌大夫皆無貟多至數十人武帝置蓋自周季監謗秦氏禁言腹誹心謗莫不有罪况敢昌言其事乎西漢以來始懲壅蔽之患特立論諌之貟以作天下慷慨敢言之氣豈非夫人之所願然言路之通固自此始而言路之狹亦自此始也觀鄭昌訟蓋寬饒之書曰臣官以諫為名不敢不言蓋寬饒傳昌上書訟寬饒曰臣得從大夫之後官以諌為名不敢不言而鮑宣上書論何武亦曰官以諌諍為職不敢不竭愚鮑宣傳召為諫大夫是時帝祖母傅太后欲與成帝母俱稱尊號宣為諫大夫上書云官以諫諍為職不敢不竭愚上以宣名儒優容之夫職任諌諍然後得論天下之事而職非當諌者謂其為越職可乎君子惜其職之有所拘也蓋自唐虞二代盛時不以諌名官而天下皆可言之人漢唐之世特以諌名官而天下無敢言之人我朝雖仍諌諍之貟而不拘諌諍之職公卿可諌也布衣可諌也閭巷小民亦可諌也官共漢唐而意實虞周爾試以古今評之群后四朝敷奏以言諸侯朝宗陳謨謀事則外之侯伯牧守皆得言矣臯陶作士稽首揚言伯益朕虞吁咈作戒則內之公卿師長皆得言矣鄭人鄉校得議執政則草茅賤士皆得言矣瞽誦工諌市議道謗則農商工賈又皆得言矣是意也行於總章衢室之間寓於謗木善旌之際見於發言盈庭之時拳拳於都俞規戒之頃當時諌官之名隱然於其間故曰唐虞三代盛時不以諌名官而天下皆可言之人是也自諌議大夫之官置於漢武帝置諫大夫至光武改為諫議大夫補闕拾遺之貟增於唐唐武后垂拱中置左右補闕左右拾遺二官以掌供奉諷諫開元以來左屬門下右屬中書以如是之名求如是之實霜飛白簡露奏皂囊以輔天子耳目之任亦美矣然中郎補闕者出綰淮南之綬汲黯傳臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮南邪出為淮南太守博士對䇿者往持江都之麾董仲舒對䇿第一拜為博士出為江都相是猶可諉者曰非諫貟也非言責也有如劉向戒外戚之専孫寶奏馮后之事皆以大夫也劉向傳遷光祿大夫時王鳯秉政倚太后専權向以為外戚貴盛兄弟用事之故不聽孫寶傳哀帝即位召寶為諌大夫初傅太后與中山孝王母馮太后俱事元帝有隙傅太后使有司考馮太后令自殺衆庶寃之寶奏請覆治傅太后怒上乃順旨下寶獄蕭望之以諌官而出補郡吏王吉以諌大夫而上疏見踈皆以諌官也蕭望之傳是時選博士諫大夫通政事者補郡國守相以望之為平原太守望之上疏曰悉出諫官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無達士則不聞善王吉傳吉宣帝時為諫大夫論除任子之令上以其言迂濶不甚寵異也吉遂謝病歸琅琊然亦視如土梗屏棄不用夫職在諌諍猶不得伸其喙尚奚望於百􅀢哉唐因漢制復增遺闕愚意有導人使諌之意然貞元以來蔣又以右拾遺為史館修撰蔣又貞元九年以右拾遺權史館修撰穆宗之世李紳以左拾遺為翰林學士本傳元和擢進士第穆宗召為右拾遺翰林學士與李德裕元楨同時號三俊夫拾遺一職也史館又一職也翰林學士又一職也則唐之所以任是官者亦幾於不専矣任之而不専其職固未為唐害任之而不用其言唐之害為不小爾觀李渤之初以拾遺召也未幾遷為補闕一諫忤旨下遷參軍李渤傳渤始以拾遺召嵗餘遷右補闕以直忤旨下遷咨議參軍裴潾之初以補闕諫也一徙舍人未幾再疏身亦再貶裴潾傳潾屢遷左補闕諫憲宗以中人領使帝不用後擢為起居舍人又諫憲宗從桞泌治丹劑帝怒貶江陵令則唐之所以望補闕而拾遺者亦文具矣嗟夫古者上自公卿下至工瞽皆諌君之人也至後世結舌不鳴僅有諌垣之立耳古者若針若頌若議若謗皆諌君之言也至後世掃地不存僅有諌囊之規耳今也任諌垣者未必言進諌囊者未必信此君子深為之浩歎故曰漢唐之世特以諫名而天下無敢言之人是也我國初官以定俸實不親職故赴諫院者方得諫官端拱初以補闕為司諫以拾遺為正言所以舉其職也國初承五代之弊官失其守者裁以定俸入而不親職兼議大夫司諫正言須降敕赴諫院供職者方為諫官端拱三年以左右補闕為左右司諫以左右拾遺為左右正言時太宗欲諫官修職故詔改其官天禧之廣諫貟天禧初詔兩省置諫官一貟再兼職務明道之置諫院明道元年陳執中為諫官屢請置諌官六是以門下為諌院所以重其職也元豐正名散騎常侍不除而諫議大夫遂為諫垣之長其屬有司諫焉有正言焉而三者各分左右焉此諫官沿革之制也元豐正名左右散騎常侍各一人既闕不殊而左右司諫大夫遂為諫垣之長専言責焉左𨽻門下省右𨽻中書省掌規諌諷論然國朝雖仍漢唐之官而實得虞周之意三百餘卷上裨君德田錫遷諫議大夫凡進三百餘卷真宗見之必莊嘗比之曰朕之汲黯也一十九章極詆時弊劉安世十九章論蔡京時為諫議大夫諫議大夫之有人也御筆新除歡動朝野慶厯歐陽永叔張安道王素俱除諫官蔡君謨以詩賀曰御筆新除三諫官喧然朝野兢相歡當年流落丹心在自古忠良得路難必有謀猷禆帝治直須風采動朝端世間萬事俱塵土留取功名久逺看三人以其詩薦之於上尋亦除諫官涑水記御筆親題名留殿壁魯宗道為正言事有遺誤風聞彈疏御筆題殿壁曰魯直司諫正言之有人也不特此爾四諫之稱侈為美談歐陽修余靖蔡襄王素為諫官時謂之四諌四賢之名播在流詠范文正公言事忤大臣貶余靖上疏論救落職尹洙歐陽相繼抗疏亦得罪蔡襄作四賢一不肖之詩若此者又班班可紀也兹任言責者知無不言言無不盡爾至若鄒浩之為正言也不陳孟后之事而曾誕玉山客問之篇隂諷潛刺聞者若愧四朝國史曾誕與右正言鄒浩友善孟后之廢誕三與浩書勸使力請后浩不報及浩以諫立劉后南遷誕著玉山主人對客問一篇以譏之識者或以比韓愈諍臣論高若訥之為司諌也不言仲淹之去而蔡襄不肖之詩極口深詆略不少貸見上故雖庸庸瑣瑣之流亦為挺挺敢言之氣失在諌垣救在縉紳以此觀之我朝之諌諍者何特諌垣一二貟哉又嘗舍是而觀之百執草茅田野之公論矣外任漕臺亦許奏事歐陽修出為郡倅得議建儲司馬公是在外群臣得以奏封不曰越職以希恩也身居貟外挽衣論列寇萊公職為監門上書言事鄭俠為監門上書言新法是在內微職得以抗議不曰出位而賈名也山林布衣抗論行都張齊賢上庠諸生疏陳中道太學生江煒時為靖國中陳大中至正之道草澤之士敢議國政不曰猖狂而加罪錦工獄吏引對殿陛王贊大名細民伐鼓論事大中祥符九年大名府民伐登聞鼓訴秋旱詔遣官披視蠲其賦閭閻之夫敢言朝政不曰誹謗以速刑自上而下由貴而賤皆為論列之人爾故曰我朝雖仍諌諍之官而不拘諌諍之責者此也翰苑玉堂賜篆景仰彌文寶𢃄橫金敬佩新渥榮矣哉翰苑之選也東坡謝翰林表云然嘗考建置之由矣西漢以來代言委諸尚書未有是官爾通典漢尚書郎直宿建禮門奏事明光殿下筆為詔誥出語為誥令魏晉以後代言委諸中書亦未有是官爾通典梁用中書舍人居詔誥之任注魏晉以來詔誥皆中書令及侍郎掌之而翰林建職其自唐始歟夫翰林院者藝能伎術召見之所處也韋執誼翰林政事翰林院者在銀臺門內以藝能伎術召見之所處也貞觀間時召學士草制而名號則未聞焉乾封間始號北門學士而他號則亦未聞焉開元初始選朝官入居翰林供奉别旨而定名則亦皆未聞焉逮至二十六年而翰林學士之名定矣自太宗時召名儒學士草制然猶未有名號乾封以後始號北門學士元宗初制翰林待詔掌四方表疏執答應和文章繼以詔敕文誥悉由中書多壅滯始選朝官有詞藝學識者入居翰林供奉别旨然亦未定名制敕書詔猶分任集賢開元二十六年始以翰林供奉改稱學士别建學士院於翰林院之南俾専內命其後又置東翰林院於金鑾殿之西隨上所在選用益重職林及翰林故事國朝翰林雖掌內制而學士或領外制其文書皆知制誥主之國朝翰林學士掌內制淳化二年以翰林學士賈黃巾蘇易簡司管勾差遣院而學士領外司自此始自學士兼領他司止與職名同元豐官制行始専內制故必𢃄知制誥有承旨有學士有直院有權直院承旨以久次居之唐始以鄭絪為承旨國朝承旨不常置以院中久次者一人充續會要學士多以外制除之直院以資淺者充之國朝開寶二年以中書舍人李方知制誥盧多遜並直學士院而直院之名始此會要塵史云但以資淺者為之其實正官也權直以他官暫行之開寶六年以知制誥張詹權直翰林院而權直之名始此凡他官入院未至學士謂之直院學士俱關他官暫行文書謂之權直會要元豐正名而後翰林之職定矣嗟夫水繞瀛洲花圜周廡外喧既寂內務靡華清之極也西聮金鑾北瞻銅樓晨趍瑣闥夕宿嚴衛密之至也備待顧問辨疑釋非發演絲綸據古援今任之重也自非天才拔萃已德邁倫未有不沗厥職爾李白嘗為翰林供奉矣雖一時應制摛辭奴僕力士然未幾神遊八極不可羈絆者才為之纍也唐李白傳白為樂章帝愛其才嘗侍帝醉使高力士脫靴後白浮遊四方於采石騎鯨捉月而死張洎亦嘗為翰林學士矣雖一時侍詩侑酒勢有華蓋之逼然未幾而儀同之詔不下卒受楊國忠之謗者德未足於此也本傳自開元至咸通翰苑顯名者一百八十九人為相者五十有三元宗八人肅宗四人一相代宗六人一相德宗二十二人七相順宗二人一相憲宗二十四人十相穆宗七人一相敬宗三人一相文宗三十四人十相武宗八人三相宣宗三十九人十一相懿宗以後三十六人七相非不侈為美談然求如正諌自任閹宦知懼李絳為翰林學士孜孜以正諌為己任嘗極論中官縱恣人皆憚之草詔一下士卒感泣者能有幾人哉陸贄為學士從幸奉天下詔山東士卒感泣至于國朝與唐異矣紫詔白麻流布中外金坡玉堂選遴才德且以尚書而為翰林下遷也而太祖乃曰深嚴之地當以宿儒處之長編乾德元年上謂宰相曰北門深嚴當擇審重士處之范質曰竇儀清介謹重然在前朝已自翰林遷端明今又遷兵部尚書難於復召上曰禁中非此人不可卿當諭朕意勉再赴職據平資而除翰林非超遷也而太宗乃曰學士之職清貴非可以他官比之張洎欲遷翰林太宗曰學士之職清切貴重非他官可比金坡遺事是用人不以資而以望矣和㠓以文得寵可用也而眸子不正竟不居以近侍太祖以和㠓善文寵待之欲召入翰林謂近臣曰㠓眸子眊然胸中必不正不可以居近侍范杲獻記求進亦可用也而躁競可厭終不除以內制知制誥范杲數致書宰相求入翰林嘗出一篇示李昉曰先公謂杲才任學士故以付杲於是獻玉堂記請備其職上惡其躁競不使居內是用人不以文而以行矣此選用之意然也蘇易簡張洎皆興國之翰林矣清淨玉堂中之詩而太宗特示易簡焉蘇易簡時為承旨張洎為學士上疏數千言太宗賜蘇易簡詩云翰林承旨貴清淨玉堂中豈非洎之德行不及文學執政欲用張洎上曰極知洎文學不下士安苐德行不及爾蘇之忠孝形諸歌詠歟太宗賜易簡言曰君臣千載會易簡曰忠孝一生心楊億晏殊皆景德之翰林矣前席待名賢之詩而真宗特賜楊億焉真宗御筆七言詩賜楊億曰承明近侍究儒玄苦學勞心疾已痊善保興居調飲食副豫前席待名賢豈非億能不草册后之制真宗欲册皇后上欲得楊億草制使丁謂諭旨曰大年勉此不憂不富貴億曰此富貴非所願也乃命他學士草制而殊井奉相謂之詔歟天禧三年丁謂復相召學士劉筠草復相制筠不奉詔乃更詔晏殊殊遇筠側面而過蓋有所愧也此勸勉之情然也賜以錦袍十月朔舊賜紅錦袍淳化三年代以細花盤雕錦賜丁丞相一等錫以金盞神宗賜王圭以盤龍金盞設以紫花之座神宗設紫花座賜王圭坐榮以金蓮之燭哲宗時蘇軾為翰林學士入對命坐賜茶曰中翰須盡心事官家報先帝知遇出撤金蓮燭歸院或不覺前席英宗朝張方中或命坐賜茶見上或待舊臣以賔友太宗以賔友待蘇易簡或見宰相以客禮孫抃此待遇之禮然也噫選用謹矣勸勉至矣待遇之恩復厚矣則雍容禁坡回翔仙境參決國論發揮天語其忍負之哉是故條畫兵數稱為頗牧有李文定焉李文定公迪在真宗時為學士上問陜西兵幾何對曰臣向在本道以册書兵馬糧草之數以備調發今猶佩置囊中帝令探取之目黃門取紙筆令具疏帝曰不意頗牧復在吾禁中矣兼有文學可比董楊有司馬公焉神宗擢司馬光為學士自謂知制誥不敢濫居况堪為學士乎又三疏力辭上從容問光曰古之君子或學而不文或文而不學惟董仲舒楊雄兼之卿有文學何辭為光曰臣不能四六上曰卿既舉進士取高第賦亦四六也以告勑授光光不得己受之有文章典雅者張方平在翰林上手札褒之曰卿文章典雅有三代風有文行兼著者真宗朝召學士梁皓夜對論及人物上曰文行兼著如趙安仁者有幾遂為學士噫盛哉不特此爾唐之翰林妄為弄辭艷曲無所規正如沈佺期為學士為弄辭李白為翰林作樂章之類陋也而我朝歐陽公宮帖亦不忘規諫之意歐陽修宮中之帖亦不忘規諫唐之內制不聞封還間以給事郎為之袁高為給事封還盧相刺史詞頭拘也而我朝劉筠亦不草丁謂之制見上注此尤翰苑之盛也子瞻堂堂如山如河此魯直贊誦東坡也愚以先正諸公亦何歉於斯云古今源流至論續集卷六
