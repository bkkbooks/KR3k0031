body:
  text: 古今源流至論後集卷十宋林駉撰勸農嘗觀諸史而知周人重農之意厚矣詩曰曾孫來止以見君之尊嚴出入田畝而不為屈也又曰嘗其㫖否以見田畯之官相忘豆觴而不為耻也夫櫛風沐雨莫勞乎農沾體塗足莫賤乎農周之君臣從事于襏襫之間交孚于閭里之所則當時為農者安得不相勸勉哉然周人之意不止此也天子所命者農命官所先者農朝廷所加惠者農官府所分作者農下至州鄉閭巷婦人女子賤𨽻小夫歌詠讃頌亦無一不在農者噫盛矣夫自民不里居農非前世之農勸相之方視為末務去而為游手棄而為末作散而為諸侯之食客聚而為山澤之盜賊漢復古意多方勸率免其租以優之文紀賜民田租之半設其科以貴之吕后元年初置孝弟力田二千石一人民未知種麥則勸之種麥仲舒說上曰今關中俗不好種麥願陛下詔大農使關中民益種宿麥民未知養苗則教之養苗食貨志以趙過為搜粟都尉遣令長三老力田及田父老善為田者受田器各耕種養苗春事欲作則鑄以耕種之器終軍傳徐偃曰偃矯制教種者欲及春耕種贍民器也田務正殷則不行發卒之令發巴蜀卒相如為檄曉論百姓以發卒之事方今田時重煩百姓已親見近縣至其法之最良者則自天子而下無不以農為務躬耕藉田率勸民耕天子勸農也征和四年上耕于巨鹿又昭帝始元六年上耕于上林分府計吏告郡勸農宰相勸農也後百官志注漢舊儀曰哀帝元壽二年以丞相為大司徒郡國守長吏上計事畢遣歸告二千石帥勸農桑思稱厚恩司農諸丞部州分勸大司農部丞十三人各部一州勸農桑事少府水衡各置農官則九卿勸農也前百官志水衡少府並置農官刺史行部必問墾田何武𫝊武為刺史行部必問墾田頃畝五穀美惡博士巡行舉奏野荒則監司勸農也武紀元符六年分遣博士六人分巡行天下野荒治苛者舉奏渤海太守勸趨田畝龔遂𫝊遂為渤海太守勸民農桑民有持刀劒者使賣劒買牛賣刀買犢曰春夏不得不趨田畝秋冬課收斂郡皆有蓄積南陽太守出入阡陌則州郡勸農也召信臣為南陽太守出入阡陌勸農嗚呼漢人勸相之意亦至矣愚之所不滿者漢當去古未逺之日不能正其經界均其田里或為外戚之所占孫寶𫝊帝舅紅陽侯立使客因南郡太守李尚占草田數百頃頗有民所假少府陂澤略皆開發上書願以入縣官有詔郡平田豫直有價萬萬以上寶聞之遣丞相史按驗發其奸劾奏立尚尚下獄死或為豪民之所侵食貨志豪民侵陵分田勸假有仁心仁聞而民不被其澤者有由也噫自漢以後世道愈趨經界之制固若難行而勸勉之令獨不講乎五代以來民無常業萬目聧聧其不聊生甚乎田稅三斗錢氏弊政而兩浙之農病兩浙田稅畝三斗錢氏國除朝廷遣王方贄均兩浙新稅方贄令畝出一斗使還責擅減租稅方贄以為畝稅一斗者天下之通法兩浙既為王民皆當循為國之法上從之至今畝稅一斗惟江南福建猶循舊額當時無人論列牛輸稅米馬氏橫斂而湖湘之農病咸平三年李允則知潭州初馬氏暴斂營田户給牛輸稅米四斛牛死猶輸謂之枯骨允則除之田器有稅五代相承而河北之農病河北五代末揶算田器吕文靖嘆曰王道本于農此何名哉因表除之朝廷推其法他路自是農器無征夫田也牛也耕器也蓋農民所恃以為生養之地暴征虐斂一至于此尚何望其無惰農哉天生聖人為天下主以務農立國以足食為政凡一毫有便于農者極力行之因王方贄之請而減田賦因李允則之請而去牛租因吕夷簡之請而不稅農器並見上夫惟優農之仁既行則勸農之政得施矣上而天子之勸相則田中刈麥法駕親視政要增釋開寶六年駕出觀民刈麥刈禾興國二年出南薰門觀稼從臣列坐田中令民刈麥民間機杼清問勤劬同上天聖二年觀刈麥聞民間有機杼聲召問之乃貧婦因曰其勤如此尚不免貧賜茶綵賜田婦以坐席勤者知勸太宗逰金明池召田婦數十人賜席使坐問以民間疾苦賜耕者以茶綵惰者知愧政要增釋仁宗駐駕觀道左耕者賜茶綵下而官吏之勸相則長吏勸墾田數悉書印紙見于至道之詔至道元年詔募民請佃諸州曠土仍蠲二嵗租州縣勸民墾田之數悉書于邙紙以候施賞知通漕臺勸農並令入銜見于景德之命景德六年二月丙子權三司使丁謂等曰今諸州長吏職當勸農知州者並兼管內勸農使餘及通判並兼勸農事諸路運使副使兼本路勸農使詔可勸農入銜自此始勸農置司嵗終賞罰見于皇祐之令皇祐元年右司諫錢彥逺本朝轉運使提㸃刑獄知州通判皆帶勸農之職拜敕結銜所在督課而徒有虛文無勸導之實謂宜置勸農司設法勸課俟嵗終農隙運司考較賞罰從之不特此耳念農之歌置之坐側真宗製貴廪食吟珍農民吟念農歌皆置之座右耕田之繪置之左右是無往而不在農也紹興十一年上曰朕聞民間乏牛皆以人耕田其勞可閔令晝以人耕田之象置之左右庶不忘稼穡之艱難民食野豆天語惻然咸平五年上謂輔臣曰河北穀雖登民間尚有食野豆者民食麻滓帝心恧然是無念而不在農也咸平四年上詔輔臣以諸州物價曉示之又出麻滓蓬實曰民已食此可速賑濟此周官分井之意豳詩七月之情溫乎可想也今之為官吏者果無負九重念農之仁乎聞有帶勸農之銜矣木鐸方聞東郊有作不過設供帳以為園林遊樂之舉聞有示勸農之文矣老氓玩視胥吏循常不過掛墻壁以為里巷無用之物是豈有真情實意哉嗚呼吾農願無催稅打門之聲不願有㪷酒彘肩之賜願無黃放白催之文不願有連篇纍牘之語朝廷以此責州縣州縣以此寬吾民則不至為具文爾若夫復成周耕鑿之農無漢人兼并之害則今日經界不可不講也户口愚嘗歷觀古今民數登耗之由矣自其有兵革之禍也雕耗于戰鬬之場枕藉于干戈之役而民始不堪其命自其有形役之害也根連株繫于羅織之獄勞筋苦骨于營繕之工而民始不聊其生自其失農桑之業也亡而為盜賊去而為浮屠而民始不安其居噫可歎也夫世道之盛衰係于夫家之衆寡夫家之衆寡係于君政之善否此任生靈之寄者可不謹歟夫自春秋戰國而至漢版籍莫盛于漢之元始户凡千二百二十三萬三千六十二漢志元始民户千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八自三國六朝而至唐版籍莫盛于唐之開元户凡八百九十一萬四千七百九通鑑隋煬帝大業二年户八百九十萬七千五百三千六此隋之極盛也唐元宗户總八百九十一萬四千七百九口總五千二百九十萬九千三百九此唐之極盛也吁有由矣蓋漢承纍代戰爭之餘加以劉項相持盜賊蜂起轉輸征伐曾無寧嵗觀曲逆一縣秦尚三萬户間者兵起僅至五千其耗可知也陳平傳髙祖南過曲逆顧問御史曲逆户口幾何對曰始皇時三萬餘户間者兵數起多亡匿今見五千餘户于是髙帝講和親而民始息肩文帝勸農桑而民始安業本紀然而猶未也至宣帝懲海內减半之後極力撫摩膠東相勞來流民而賜爵膠東相王成勞來流民自占八十萬餘口賜爵關內侯南陽守户口增倍而賜金召信臣為南陽太守户口增倍賜黃金十斤所以元始户籍之登者此也唐承南北紛亂之餘加以隋人不網莽為盜區內劉外夷十耗八九觀隋大業尚有八百萬餘户至唐初僅有三百萬其耗可知也唐食貨志唐正觀初户不及三百萬絹一匹易米一斗餘見上于是太宗恤刑而死罪絶少同上是嵗天下斷死罪者二十九人號太平髙宗承平而天下乂安同上髙宗承之海內乂安然而猶未也元宗懲役費並起之後厲精為治蠲徭給符而免苦役之勞李義甫許敬宗用事役費並起初以武氏之亂民不勝其毒元宗初立遂立蠲徭給符之令州縣上户口之登耗以為殿最髮僧為農而無遊手之病開元初姚崇為相髮僧歸農至萬二千人所以開元户籍之登者此也嗟夫受民數者必拜見負版者必式古人重民之意拳拳不能自己也如此然則牧民者可不加意乎五代紛紛生齒凋弊天生聖人為民父母方建隆之元年也版籍來上嚴定升降長編建隆元年有司請據諸道所具版籍升降天下縣令以四千户以上為望三千户以上為緊二千户以上為上千户以上為中不滿千户為下仍請三年課責户籍别定升降從之至眀年也户口增耗申嚴殿最長編建隆二年先是按令文州縣官撫摩有方户口增益者各凖見户每上分加一分刺史縣令各進考一等若撫摩乖方户口減耗各凖增户法亦減一分降考一等主司因循例不進考至是有司上言自今請以減損户口一分科納餘缺三分並降考夫開基立極豈無急政一則曰定版籍之升降二則曰嚴户口之殿最者深知本固邦寧之意歟列聖相承天㴠地育故梅詢之告仁宗曰二聖相承休養百姓今之户數至倍于前長編寶元二年上謂侍臣曰今天下户籍幾何梅詢對曰自五代之季生齒凋耗太祖受命而太宗真宗繼聖承祧休養百姓今天下户口之數蓋增于前矣詔三司及編修院檢閲王安石之告神宗曰户口之盛無如今日本朝百年不見兵革長編熙寧六年上論户口之數王安石奏户口之盛無如今日本朝太平百年生民未嘗見兵革上曰纍聖以來咸以愛民為心既未有征役又無别館離宮營繕之事生齒蕃庶蓋不足怪是知我朝無兵革之禍無刑役之苦無農桑之棄則生太平之世為太平之民無怪乎不蕃息也是故以太宗視太祖加百餘萬以真宗視太宗加五百萬長編寶元二年編修院上厯代户口數太祖朝二百五十萬八千九百六十五太宗朝三百五十七萬四千二百五十七真宗朝八百六十六萬九千七百九十七寶元元年一十一十二萬四千二百九十自祥符而視景德已增百餘萬太中祥符元年是嵗天下户七百九十萬八千五百五十五口一千七百八十萬三千四百又景德四年權三司使丁謂言景德三年新收户三十三萬二千九百九十八流移者四千一百五十總舊管七百一千一萬七千五百七十一户一千六百二十八萬二百五十四口比咸平六年計增五十五萬三千四百一十户二百萬二千二百一十四口自寶元而視祥符已增三百餘萬寶元二年户部上天下主户六百四十七萬九百九十五口千四百二十九萬九百五客户三百七十萬八千九百九十四口六百一十九萬五千四百二其在治平視國初凡十有五倍治平四年主户九百七十九萬九千三百四十七客户四百三十八萬二千一百三十九其在元豐視國初凡十有八倍元豐六年主户千一百三十七萬九千一百七十四客户五百八十三萬二千五百三十九至于紹興蓋二十倍有竒紹興四年主户千一百六萬八千七百四十一客户六百二十六萬六千百二十九噫至此始見深仁厚澤之功嘗謂自古規恢大業維持國本未有不加㴠養于數年之前越報夫差十年生聚越王困于會稽而歸乃嚴不産子之令産一子者賜酒肉産二子者與保主姬後十年生聚十年教訓卒平吳國濬平吳亦用此術晉王濬傳况襁負子來雲集鱗附宜亟為生聚教訓之計今日中興欲侔周德當觀諸鴻鴈之詩民心民心國之命脉也國家之安危係焉嗟夫人心有神非可文欺真德實義可以係其心而非虛辭矯情所能誘深仁厚澤可以感其心而非小術淺惠所能留此有天下者所深畏也夫自周迄于五代上下二千年間釐為十有六代惟周餘八百年漢四百年唐亦垂三百年其餘十有三代乃不能五百載是何修短如是之相絶耶豈非周人本于仁義漢唐近于仁義而餘亦不足論歟昔者周之興也散財發粟懷民以仁也下車釋囚感民以義也分田為井教民以相生養也拯救于文武㴠養于成康勞來安集于宣王之世其愛戴當如何耶黍離之歌涕泗欷歔毛詩葵丘之㑹感激奮發齊威公噫此猶可也末年威王以盟向豫鄭而盟向之民不肯事鄭襄王以陽樊豫晉而陽樊之民不肯事晉左𫝊豈有求而應有利而為也哉聖人有至公之施而自得至公之報其民亦不自知其何以使之然無他此皆本于仁義之功也漢髙祖之得天下人皆曰法令章程也君子曰仁義公恕也唐太宗之維天下人皆曰制度憑藉也君子曰仁義既效也雖遭于武宣兵刑之禍而終不忘髙文寬仁之恩雖罹于肅代干戈之慘而終不棄太宗愛民之心是故吕氏之禍七國之亂漢幾亡矣而左袒為劉周勃𫝊堅壁從漢周亞夫𫝊凛然有不敢犯之色新莽之篡三國之爭漢幾去矣而三輔流涕光武紀荆楚雲從三國志蜀先主興自蜀荆楚之士從者如雲猶起人悠長之思漢何以得此哉漁陽之叛藩鎮之強非小變也而河朔死義顔真卿顔杲卿𫝊山東感泣天下復為唐陸贄𫝊奉天之幸關陕之狩非細故也而戎狄送欵京輔掃清天下復為唐郭子儀李光弼𫝊唐何以得此哉無他此皆近于仁義之效也嗚呼天下之生久矣然治安之日少亂亡之日多可歎也戰國以兵革禍天下秦以刑威戕天下至漢而有所依曹魏以篡奪取天下南北以戎狄亂天下至唐而有所歸噫孰知唐亡之後其禍尤慘歟五代紛紛干戈亂離民生斯時如刈草菅向使天不興聖眀之世則吾民其將疇依然我國家強不如秦富不如隋機變不如齊楚事力不如漢唐所恃以為千萬世無窮之基者惟結人心而已立極以來掃除苛撓革命之日市不易肆獨王彥升之專殺終身惡之而不用康節先生謂國朝五事自唐虞而下所未有者一革命之日市不易肆二克復天下在即位後三未嘗殺一無罪四百年方四葉五百年無心腹患又王彥升專殺太祖終身惡之削平僣僞不戮一人獨王全斌之平蜀暴掠十年廢之而不録曹武惠初與王全斌同伐蜀殺降卒三千餘人武惠諫不聽及歸上惡其暴不録用之太原違命勦而絶之可也不殺為誓天地實臨之開寶二年王師伐河東至上黨佛寺上焚香自誓曰吾取太原終不殺一人江南奏捷喜而受之可也而垂泣一意鬼神實聞之江南平捷至太祖覽奏泣下曰攻城之役必有橫遭鋒刃此實何罪此一念也雖堯舜不戰之兵湯武仁義之師殆不是過噫此未見其至者前代降王皆以逐鹿而不免爭肉之誅前代將帥皆以兔死而不免狗烹之患前代三恪之子孫屠滅芟夷略無遺種而我祖宗天地之恩咸使覆育夫豈厚施而求報哉蓋謂吾之立國自當如此而非以為仁也夫惟吾祖宗之專務愛民也是故養兵雖驕而終不忍以兵煩吾民理財雖乏而終不忍以苛取困吾民寧建都于四平無險之地而終不忍疲吾民轉餉之力寧捐金繒以屈已于慢侮之敵人而終不忍苦吾民干戈之禍臣下忍于負吾國將帥忍于負吾法而終不忍如前代之誅戮也嗚呼為吾宋之民者將何以報之哉霜降水涸涯涘乃見故君子每于靖康之際觀之為臣者甘受誅夷之慘而不負扞守之節為民者甘從刀鋸之死而不汙腥膻之俗嘗觀建炎之詔曰河北億萬之衆無一人忍負國者以此而論則我朝之社稷雖𫝊于萬世猶未足以報吾祖宗之萬一也今之民心何如哉兩淮之民罷于轉徙困于饋餉以遺黎之來忠義之附已安者難恃方來者難保是兩淮之民所當恤也襄漢之間軍兵踐蹂氣象蕭條戕于兵革死于盜賊呻吟者未起塗炭者未蘇是襄漢之民所當恤也西蜀之地去天一方臯郊失守忠義反戈犬羊之侵掠方興鴻鴈之離散未集是西蜀之民所當恤也內地之民樂嵗之禾場方築而富室并之凶年之四壁赤立而重斂困之凛凛乎朝夕之不相保是內郡之民所當恤也京畿之民一室湫隘而居之者數家一夫經營而仰食者數口皇皇乎一飽之未期是京畿之民所當恤也矧邉郵騷繹匪曰常程疆埸多憂已勞逺算則夫謀所以壯吾命脉者可不加意哉常平義倉古今救荒之策多矣成周都鄙委積之政上也漢唐常平義倉之法次也外此臨期趣辦移民移粟最下也噫激西江之水不足救涸轍之魚則捨一時濟用之謀以圗三十年制用之法君子以為迂求三年之艾以攻其疾苟為不蓄終身不得則苟簡應變倉卒就食君子以為踈逺則行濟用之策而為經久之圖者其惟常平義倉歟且常平之法何始乎自李悝已有平糴之說至夀昌始定常平之策此其始也漢食貨志李悝謂魏文侯曰善平糴者必謹觀嵗有上中下熟上熟其收自四餘四百石中熟自三餘三百石下熟自倍餘百石小飢則收百石中飢七十石大飢三十石故上熟則上糴三而舍一中熟則糴二下熟則糴一使民適足價平則止小飢則發小熟之所斂中飢則發中熟之所斂大饑則發大熟之所斂而糶之故雖遭饑饉水旱糴不貴而民不散取有餘而補不足也行之魏國國以富強時又同上宣帝即位歲數豐穰穀至石五錢農人少利大司農中丞耿壽昌行漕事果便遂白令邉郡皆築倉以穀賤時增其價而糴以利農穀貴時减其價而糶名曰常平倉民大便之厥後罷於元帝同上元帝即位天下大水二年齊地飢榖石三百餘民多餓死諸儒多言鹽鐵官及比假田官常平倉可罷上從其議復于顯宗通典顯宗復常平倉隨罷隨復無有定制至于我朝淳化之二年京師置場有其法也淳化二年京師大穰分遣使臣于四門置場增價以糴名曰常平以常參官領之嵗饑即減價糶與貧民景德之三年諸路置倉有所積也景德三年始置常平倉每州擇清幹官主之專委司農總領三司無得移用然增價以糴分命使臣減價以糶專命司農隨時遣用未有定職至熙寧以來提舉常平之官始定焉司馬光言熙寧初執政以常平法不善將糴本作青苗錢出息二分置提舉官督之夫祖宗之始置常平也出內庫之儲以為糴本仁宗嘉祐七年給內庫及三司錢以助糴本頒三司之錢以濟常平見上粒米狼戾之時民艱于錢官則增價以入之菜色隱憂之日民乏于食官則減價以出之夫何舉糴本而為青苗之錢鬻廣倉以求二分之息見上伐桑易鏹官帑厚矣如民貧何鬻田輸官公家利矣如私害何此常平救荒之實政壞矣見上豐嵗則農夫糶榖十不得四五之價凶年則屠牛賣肉伐桑賣薪以輸錢于官義倉之法何始乎自隋始置于鄉社至唐改置于州縣此其始也隋食貨志開皇五年長孫平奏令諸州百姓及軍人勸課當社共立義倉收穫之日隨其所得勸課出粟及麥熟當社造倉窖貯之若時或不熟當社有饑饉者即以此榖賑給自是諸州儲峙委積秋又唐食貨志太宗時戴胄建議自王公已下計墾田熟所在為義倉嵗凶以給民厥後弛于永徽壞于神龍隨罷隨復亦無定制同上太宗置義倉及常平倉以備凶荒髙宗後稍假義倉以給他費至神龍略盡元宗即位復之至于我朝乾德創之未幾而罷元豐復之未幾亦罷逮紹聖復以石輸五升大觀又以石輸一斗至于今日而義倉輸官之法始定焉乾德元年令州縣置義倉所收二稅石每輸一斗以備凶荒乾德四年詔朝廷置義倉以恤百姓訪聞重疊供給復成勞攘俾從停罷又熙享元年錢顗言乞于州縣各置社倉主三等人户量出斛㪷以備賑濟擇有物力一户充甲頭所斂至輕所濟至博唐齊同三州守臣王廣淵趙尚寬髙賦皆乞置義倉即詔行之既而上與王安石論其法安石意主青苗故言而罷元豐復詔行義倉蔡承禧言二石輸一斗所取至輕乃令畿甸皆立倉京東西如畿邑法仍所就縣倉輸自是義倉又縣倉矣又紹聖著令斗取五合即元豐法也大觀初增令斗取一升以備賑荒至今有焉夫古人始置義倉也自民而出自民而入豐凶有濟緩急有權名之以義則寓至公之用置之于社則有自便之利夫何社倉轉而縣倉民始不與而為官吏之移用縣倉轉而郡倉民益相逺而為軍國之資費官知其斂未知其散民見其入未見其出此義倉之實政廢矣自義倉不留諸倉而知縣倉悉為官吏移用始也縣倉與民猶近厥後三等户皆令輸郡義未既入郡倉轉充軍食或資煩費豈復贍民中興以來講明荒政常平錢穀專委一司而無陷失之弊建炎二年言者請復常平倉詔常平本法所係甚大非可他司兼領宜復置常平倉然盧襲前弊又至害民令葉夢得同議夢得等言常平法不宜廢如免役易功亦可行惟青苗市易可罷請選實厯州縣通世務者為提舉從之紹興八年李光請罷常平主管官上曰常平本漢耿壽昌今豈可以王安石廢之而提舉自可復置庶幾不陷失一司錢榖建民騷繹置倉長灘已有社倉之遺意天下豈有難革之弊紹興二十年建州甌寧縣有洞曰回源與建陽接境乃范汝為竊發之地去嵗凶民杜八乘時嘯聚張大一李大二復于洞中作過進士魏掞之謂民之易動緣于艱食請于提舉袁得一得米千六百石以貸鄉民至冬而取遂置倉于邑之長灘鋪民得以濟不復思亂人謂掞之所為乃社倉之遺意也今日常平義倉之儲雖有美名本無實惠不惟州縣有侵借之患而支撥至有淹延之憂城邑近郊尚可少濟鄉落少民瘽身從事彼知官長皂吏為何人一旦藜藿不繼又安能扶持百里取糴于場以活其已餓之莩哉是有之與無其理一也嗚呼孰知有甚者焉常平出于官義倉出于民出于官者官自斂之官自出之其弊雖不足以利民亦不至于病民出于民者民實出之官實斂之其弊不但民無給而官且病之文移星火指為常賦籮頭斛面重斂取嬴噫可嘆也愚謂民不必甚豫特無取之足矣民不必甚利特無害之足矣平時奪其衣食之資一旦徒啖以濡沫之利樂嵗不為蓋藏之地凶年始思啼饑之民何益哉寧願為不取繭絲之尹鐸毋願為矯制擅發之汲黯寧願為催科政拙之陽城不願為發粟賑饑之韓昭則裕民實政隱于常平義倉之外昔邵先生有言諸賢能寬之一分則民受一分之賜有官守者其勉之抑貢獻愚嘗讀禹貢一書而有疑焉夫西旅底貢召公有戒蓋人主不可有一毫玩好之私今揚之貢金雍之琳琅不幾如漢人酎金之誅乎武帝八月獻酬金服䖍曰八月獻酎宗廟時使諸侯各獻金來助祭也荆之大龜梁之熊皮不幾如漢人天馬之求乎武帝遣使往大宛求天馬作天馬歌青之海錯楊之橘柚不幾如唐人貢荔之病乎唐眀皇楊貴妃好荔枝令蜀郡貢之坡詩曰一騎紅塵妃子笑誰人知是荔枝來曰古者以貢為賦正什一便民之法後世常賦之外復求方物此所以為困民之弊政歟且禹貢之冀州獨不言貢篚者蓋畿甸之內既衆且大賦其總秷秸粟米也是食為土貢之用也兖州之貢蠶絲豫州之貢絺紵其地則密邇于畿甸焉是衣服亦為土貢之用也自服食之外則器用次之器用之外寶玉玩好又次之故貢金琳琅大龜熊皮海錯橘柚之屬皆為土貢之物也皆償田賦之輕也聖人初何心過求哉不然賦出于田貢以其土所宜而禹書總謂之貢孟子所謂夏后氏五十而貢亦以田賦為貢何耶及周之衰荆揚貢金之地已陷吳楚金不入貢而天王求之于魯蓋以魯通于吳豈不失聖人禹貢貢篚之本若荆貢菁茅時屬于楚王祭不供無以縮酒管夷吾佐威公以伐之可謂知先王制貢之意然則禹之所謂貢即後世之所謂賦初何害于貢篚歟厥後常賦不足誅求無厭自夫有酎金之誅也色惡者罰少斤兩者罰列侯廢黜郡國蕭條而民始匱矣侯表朝節侯因城五鳯四年坐酎金四兩免廟又如淳注曰漢儀注諸侯王嵗以户口酎黃金于漢皇帝臨酎酎金金少不如斤兩色惡王削縣侯免國百又臣贊注曰少府省金而列侯坐酎金失侯者以數並武紀注自夫有天馬之求也出兵于大宛之庭勞民于西域之國干戈連年人不聊生而民始病矣見上自夫有荔枝之貢也十里一置五里一堠兵火催督道途枕籍而民始疲矣楊妃好荔枝五里一堠十里一置道途奔走人死枕藉其他貢取百端勞擾萬狀其視聖人制貢之法同乎否乎噫可歎也漢唐弊政談者厭之姑舍是而以我朝論拜觀乾德之罷羡餘之詔曰倘規羡餘必務掊克是詔也天地鬼神實聞之太祖乾德詔曰出納之吝謂之有司倘規致于羡餘必深務于掊克熙寧之罷貢物之詔曰所貢飲食闕乏無害是詔也千萬世猶將賴之長編神宗即位出諸州貢物名件手詔曰四方入貢雖云古禮考之禹制未有若兹之繁也又所貢物多飲食之類閫之亦無甚害也夫以天下奉一人此臣民職分之常我祖宗一則曰罷之二則曰罷之誠以小人乘人君耳目之欲以市恩竭吾民膏血之利以求利恐恐然有所不敢祖宗之心其帝王之道歟天地之德歟且朝獻有費髙紀十一年三月詔曰今獻未有程吏或多賦以為道而諸侯王尤多民疾之今諸侯王常以十月朝獻及郡各以日數率人嵗六十三錢以給獻費月進有錢德宗奉天之後屬意聚斂常賦之外進奉不息劒南節度使韋臯有日進江南觀察使李兼有月進漢唐故例爾我朝場院以餘粟上者有責通鑑長編光化軍旅金某上言三司令諸處場院有羡餘粟及萬石芻五萬束以上者上其名請行常典上曰此非倍取民租私減軍食何以致之宜追寢其事轉運以聚斂為羡者有罰仁宗寶訓天聖三年湖廣轉運使王逵多為聚斂為部內得替里長押録録二十萬為羡上曰使人無效百姓何以生乎乃詔取常賦外斂民者以逵制論之倉官以羡餘獻者有戒寶訓真宗咸平元年詔監倉官不得以羡餘為獻上曰倉庫多收出羡以為勞績若非受納之際剩收即是出給之時減尅易曰損上益下其利無疆我祖宗有之淡菜有貢唐孔戣以明州嵗貢淡菜蚶蛤役四十三萬人瓜果有獻德宗朝有獻瓜果者帝嘉其意授以官漢唐常事爾我朝諸州新茶寧斥而不入真宗諸州嵗貢新茶三十餘處詔悉罷之廣南果實寧却而不受寶訓仁宗罷廣南嵗貢果實閩中新荔寧罷而不納聖政髙宗詔興二十三年十二月辛巳進呈御筆批下安豐軍進鰔鮓白魚不欲以口腹勞人令自今後罷上曰三年已降指揮罷溫州橘柚福州荔枝獨淮甸鰔鮓未罷此皆祖宗嵗貢之物朕恐勞百姓所以頒降指揮語曰菲飲食惡衣服我祖宗有之白雉有詩建武日南嶺外蠻夷獻白雉白兔復有詩白狼有歌漢顯宗紀外國獻白狠遂作歌漢亦為美談爾我朝貢馴犀者還之寶訓真宗時交州進馴犀上曰此犀逺至深違物理朕還之獻白馬者却之寶訓真宗時交州獻白御馬一匹上曰無名進貢何用遂還之進崑崙奴者返之同上蒲相國遣使獻崑崙奴上曰異俗隔去鄉土亦可憫也遂還之書曰不貴異物賤用物我祖宗有之噫無用之物棄之可也而有用者亦棄之足用之秋罷之可也而時雖乏用亦罷之且南郊之禋兵給官賜所費不資此正聚斂不暇也漕臺貢助郊費且責以為貪政長編仁宗時范鎮言國家自陕西用兵以來賦役繁費轉運使復于常賦外進羡錢以助南郊此貪政也渡江之始兵連勢蹙所蓄未豐此正誅求不恤也守臣羡錢入貢且罰以為斂民髙宗紹興三年二月戊子殿中侍御史江濟劄子奏前知明州吳懋輒有所獻踰五百緡恐朝廷受之無名倘或小人觀望爭相效尤以為己利其患有不可勝言者臣欲望斥還懋所獻錢仍加黜罷少寬民力後吳懋降兩官嗟夫至此而後見聖人盛心歟萬國貢珍孟堅作賦東都賦寸天入貢杜陵賦詩本詩集使知東坡之詠貢荔罪林甫而酹伯遊豈不愧死乎坡詩謂貢荔枝曰至今欲食林甫肉不識何人酹伯遊廟祀執經如讎議禮如訟諸儒宗廟之議何其紛紛也論立廟之制者或曰天子七廟太祖不毁則不在七廟之數王肅曰尊者尊統于上故天子七廟世有殊功異德惟太祖不毁不在七廟之數或曰夏之廟五商之廟六惟周有七廟之制鄭康成夏五廟商六廟周七廟此諸儒之說不一也然書曰禋于六宗禮曰旅酬六尸一尸發爵六尸旅之則七廟自虞舜已言之伊尹曰七世之廟可以觀德則七廟在商時已備之蓋太祖有大功于天下雖百世而不改其餘則父為昭子為穆三昭三穆以世數次比及親而遷焉此七廟誠不易之論而曰五廟六廟者非也至漢初三廟隋文四廟唐自開元以後至為九室十一室其有戾于古制也多矣國朝張昭奏曰周立七廟清廟之外祀太祖及文武也漢初二廟悉不如禮魏晉始復七廟之制江左相承不改然七廟之中猶虞祖之室隋文但立髙曾祖禰四廟而已言因隋立四親廟梁氏而下不易其法又廟志開元以後常為九室終唐之世常為九代十一室論祭祀之禮者或曰日祭月祀時享左𫝊祭公謀父曰甸服者祭侯服者祀賔服者貢日祭月祀時享嵗貢或曰天子曰祭于祖考月祀于廟時享于二祧韋元成云天子日祭于祖考月祀于廟時享于二祧嵗遍于壇墠此諸儒之說互言也然大宗伯則祀春禴夏嘗秋蒸冬則有時祭之禮周禮大宗伯祭法則五廟皆月祭而二祧止享嘗有月祭之禮記祭法王立七廟一壇一墠曰考廟王考廟皇考廟顯考廟祖考廟皆月祭之逺廟為祧有二祧享嘗乃止蓋先王制禮不過適中過乎禮者失之瀆不及乎禮者失之簡此月祭時祭誠至當之論而曰日祭者非也至漢日祭于廟時祭于便殿漢郊祀志其有咈于古禮也甚矣論禘祫之義者或曰祫大于禘鄭康成或曰禘大于祫王肅或曰一祭二名賈逵此諸儒之說異同也然祫則合食而已毁廟未毁廟之主皆合食于太祖非惟天子有祫而諸侯皆得有祫禘則禘其祖之所自出如虞夏禘黃帝商周禘嚳惟天子有禘而諸侯不得有禘見後注此禘尊祫卑誠萬世常行之典而曰祫大于禘一祭二名者皆非也至魯為諸侯禘于僖室故孔子謂魯之郊禘非禮也其有叛于四代之典已無據矣左𫝊春秋及禮記大抵後世無定禮參之聖人則有定禮諸儒無定說質之聖經則有定說用聖人之定禮合聖人之定說其惟國朝乎立廟之制未定也至建隆間集議宗廟因唐人四親之說定成周七廟之制是制也蓋從張昭之請而行之建隆元年正月有司請立宗廟詔百官集議兵部尚書張昭等奏議曰按堯舜禹皆立五廟蓋二昭二穆與其始祖也有商改立六廟昭穆之外祖契與湯也周立七廟親廟之外祀始祖及文武也云云隋文但立髙曾祖禰四廟而已唐因隋立四親廟梁氏而下不易其法稽古之道斯為折𠂻伏請近立髙曾四代諡號崇建廟宇制可祭祀之禮儀未定也至元豐中朔月合五廟而行月祭四孟合七廟而行時祭是禮也蓋因議臣而舉之此立廟之制祭祀之禮皆與古合長編元豐三年詳定禮文所言古者宗廟有時享月祭而無月中祭月半有祭非時享也記曰春祠夏禴秋嘗冬蒸又曰逺廟為祧享嘗乃止此所謂時享也又曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之左傳閏月不告朔猶朝于廟此所謂月祭也五廟有月祭而二祧止蒸嘗者仁之行有親疏禮之施有隆殺其止享而不與乎蒸則加殺矣翼祖宣祖時享止于秋嘗禧祖太祖太宗真宗仁宗英宗時享外時月朔宗廟各一獻牲用特牛至若祫禘之說有合于古者行之有難合于古者闕之何者禘者祭其逺祖謂之追享祫者自即位朝廟始謂之朝享由親廟而毁廟合而祭之故其禮為當行由始祖而逺祖譜失其傳故其禮為難考是故虞夏商周所出甚眀故有禘漢魏而後所出無據故不禘此國朝僖祖而上譜諜不眀故寧為漢魏之祭毋寧為四王之禮也長編元絳等言禘者禘其祖所自出故謂之追享祫者自即位朝廟始故謂之朝享王者享及七世推親以及祖推祖以及始祖祭時各于其廟祭之于是有祠禴嘗蒸既有祠禴嘗蒸矣而毁廟之主不及尤為未也緣生有合族綴食之恩焉于始祖之廟合毁廟親廟之主而祭之于是有祫焉既祫矣而逺祖不及猶以為未也又推其上審諦其祖之所自出而祭之于是有禘焉至此而仁之至義之盡也然諦之所自以其祖配君舜禹祖髙陽髙陽世系出自黃帝則虞夏禘黃帝以髙陽氏配商祖契出自帝嚳則商人禘嚳以契配周祖文王亦出自嚳故周人禘嚳以文王配四代世系所出者明故追祭所及者逺也漢魏以來世系不眀漢自上皇以前無聞故自髙帝而上惟見太上皇一世而已魏自處士君而上亦無聞故眀帝上事髙祖之父處士以下五世而已劉氏出于劉纍而漢不禘堯曹氏出于陸終之子安而魏又禘漢以譜諜不眀故也恭惟藝祖連漢唐故事祭四親廟惟僖祖而上所自出者譜失其𫝊有司因仍舊說二年一祫五年一禘禘與祫皆合羣廟之主綴食于始祖禘祫之名不同而禮實無異其為訛舛莫甚焉臣等推本先王立禘之意以為國家世系所𫝊與虞夏商周不同既求其祖之所自出而不得則禘禮當闕之必推見祖系所自出乃可以行惟聖神詳擇從之是說也蓋得元絳之言矣然則論帝王之制當求之祖宗定諸儒之議當考之先正庶無遺議矣抑有聞焉祭祀之職不獨在于我將我享之時而在于朝夕修省之際不特見于犧牲牢醴之末而見于誠心實德之行親享四室不登黃道此太祖之敬也㑹要乾德元年親享四室有司取褥為黃道詔徹之昭告祖考不行中道此真宗之誠也㑹要祥符三年詔曰朕以親祀后祇昭告祖考頃者入廟則步武出門屬以時方未暇改更是宜避中道以不行奉至神而如在恭謁廟曰朕于東西偏門入詩曰于穆清廟肅雍顯相書曰黍稷非馨明德惟馨又于制度禮文之外而求祖宗之盛心云釋奠過魯一祀足以興漢漢紀髙祖過魯祀孔子以太牢國學廟貌有光于唐噫東魯聖人吾道宗主功用在人萬古不泯其可不嚴報本之禮乎唐禮樂志武德二年始詔國子學立周公孔子廟七年髙祖釋奠焉愚嘗深考古今之禮切以為所當先者有三曰天地曰祖宗而學校之先師與焉所當備者亦有三曰郊祀曰禘享而學校之釋奠與焉夫生而為人業而為士戴天履地靈于萬物而不至于斫喪磨滅者伊誰之力歟發而為言著而為經仁義禮樂𫝊諸萬世而不墜者又誰之力歟造端立極出于此理者天地也垂法立則以維持乎此理者聖人也發其用闡其義淑諸將來者師之教也故報于天地而郊社之禮舉焉報于祖宗而禘享之禮舉焉報于先師而釋奠之禮舉焉然河汾王通氏曰夫子之道不啻天地也通于夫子受罔極之恩文中子嗚呼罔極之恩雖殫天下之物何足以報之特拳拳誠意不能自己姑寓于制度文物之間耳夫自漢髙帝行太牢之祠也元始有追諡之褒有奉祀之典元始五年六月丙午封孔子後孔均為褒成侯追諡孔子曰褒成宣尼公漢帝紀又表云孔霸承烈侯奉孔子祀元和有闕里之祀有諸弟之祀東漢郊祀志章帝元和中因行郡國幸魯祠孔子及七十二弟子自唐髙祖有廟貌之設也貞觀有釋奠之禮配享之儀唐禮樂志貞觀二年左僕射房𤣥齡博士朱子奢建言周公尼父俱聖人然釋奠于學以夫子也大業以前皆孔丘為先聖顔回為先師乃罷周公祀升孔子為先聖以顔回配四年詔州縣學皆作孔子廟十一年詔尊孔子為宣父作廟于兖州十四年太宗親釋奠于國子學二十一年詔左丘眀卜子夏公羊髙穀梁赤伏勝髙堂生戴聖毛萇孔安國劉向鄭衆賈逵杜子春馬融盧植鄭康成服䖍何休王肅王弼杜預范寧二十二人皆以配享而尼父廟學官自祭之開元有國學南面之位有羣弟封爵之榮開元二十七年詔夫子既稱先聖可諡曰文宣王以其嗣為文宣公先時孔廟以周公南面而夫子坐西墉下貞觀初廢周公祭而夫子位未改至是二京國子監天下州縣夫子始皆南面以顔淵配贈諸弟子爵公侯子淵兖公子騫費侯伯牛鄆侯仲弓薛侯子有徐侯子路衛侯宰我齊侯子貢黎侯子遊吳侯子夏魏侯又贈曽參以下六十七人然祀禮行于漢而釋奠未講也釋奠講于唐而儀文未稱也至于我朝其文愈侈其儀愈隆天下始知祀事之重與天地祖宗等噫盛矣哉是故以顔淵為亞聖優之以公爵舊制也國朝則優進孟子而同列于南面配食之位唐禮樂志封子淵為兖公以四科之賢列為十哲而顔子居其首舊制也國朝則復進顔淵于配享而十哲坐于東西面之列見上以左邱明而下二十二人圖繪于壁者舊制也國朝則以韓昌黎名賢皆列于從祀之位唐禮樂志開元七年司業李元瓘奏先聖廟為十哲像以先師顔子配則配像當坐今乃立侍餘弟子列像廟堂不預享而范寧等皆從祀請釋奠十哲于上而圖七十二子于壁曾參以孝受經于夫子請享之如二十二賢乃詔十哲為坐像悉預祀曾參特為之像坐亞之圗七十二子及二十二賢于廟壁我朝聖賢之教彬然于家傳口誦之間詩書之澤藹然于目擩耳染之餘吾道輝煌日月爭光正學𫝊授源派益衍者皆祖宗尊師之功也然究其儀物觀其制度又不無深意焉其日用丁以文明之盛也其時用仲以四時之正也雲山之象竒耦之數寓于樽罍籩豆之器以吾道與天地隂陽為一體也奠幣而後獻爵先誠而後物也再獻而後旅爵先尊而後卑也奠爵所以致其厚故合樂以興舞羞菜所以致其薄故興樂而不樂酒以元所以致其䖍幣以白所以尚其質夫子之道猶元氣然周流兩間成小成大所以答其賜者固宜其備也噫世更五季聖道湮鬱久矣文物光華蕩人耳目豈止魯祠廟貌之敬哉雖然纍朝之報本誠厚矣然亦祖宗開國貽謀之善也我太祖之贊文宣曰尼父挺生河海標異祖述堯舜有德無位太祖作文宣王贊曰王澤下衰文武將墜尼父挺生河海標異祖述堯舜有德無位哲人其萎鳳鳥不至我太宗之贊文宣曰維時載雍戢此武功肅昭威儀海宇聿崇太宗作文宣王贊維時載雍戢此武功肅昭威儀海宇聿崇其為吾道計至切也聖子神孫安得不發揮斯道乎噫荆舒何人亦侑夫子不有龜山孰尊我師然則公議在人其不可掩也如此夫編年崇寧三年置辟雍于京師以王安石配享文宣王廟庭坐顔孟下又言行録王安石𫝊紹聖初配享神宗廟崇寧三年詔配祀文宣王廟靖康初聞楊時言停文宣王廟配享列于從祀建炎中聞趙鼎言罷配享神宗古今源流至論後集卷十
