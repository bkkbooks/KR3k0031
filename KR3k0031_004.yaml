  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_004-1a, image: WYG0942/WYG0942-0045c.png}
body:
  text: 古今源流至論前集卷四宋林駉撰玉牒玉牒之書何記乎記大事也以紀帝系以載厯數以籍昭穆蓋將綿天地亘古今為不朽傳也以書政令以記户口以别封域蓋將以理亂興衰之大驗固與之為消長也有大制誥有大冊命凡關於事之大者皆録之又將使進退取舍豫奪廢置揆之人情而安布之冊書而信也嗚呼亦重矣續㑹要修玉牒官無定貟掌修皇帝玉牒凡編年以紀帝系而載其歷數及朝廷政令之因革者為玉牒以又四朝志宗正修纂牒譜圗籍其别有五一曰玉牒編年之體叙帝系而紀其歷數凡政令賞罰封域戶口禮文祥瑞之事故瑶編金軸崇藻飾也寶鑰縹囊謹緘護也耆儒宿學假以嵗月重成書也編摩告備寵以優爵示有敬也是書之隆重如此則關係治體而寄其深長無窮之意者顧不多哉會要凡玉牒書以銷金花白羅紙金軸銷金細羅縹𢃄黑漆金飾匣紅綿褁金鎖鑰又淳熙臣僚劄著之金版藏之邃殿典領之於大臣如是其嚴也愚嘗考設官之本末為書之沿革與夫圗籍之或分或合藏籍之有始有終有可得而論者蓋唐玉牒本宗正之職開成始别置官其倣唐制或以宗正卿領其事或命知制誥掌其職與夫以學士典領者咸平祥符熙寧之制也其分𨽻宗正與夫置使以領者元豐大觀之制也其提舉以宰臣充修以侍從纂修以宗正卿少而下則見於紹興之初者如此其不置修書檢討獨以少卿丞編修既而宰臣提舉而修書之一員仍舊則見於紹興之末者如此在乾道則以參樞提舉初不專係於宰相在今日則提舉有監修有修玉牒有檢討皆以宰臣侍從他官兼至於纂修則卿丞簿皆與此則玉牒設官之本末也唐本宗正之職開成後始置修玉牒官聖朝祥符九年以知制誥劉筠夏竦為修玉牒官自後置一貟或二貟熙寧三年皇帝玉牒十年一修玉牒並以學士典領自元豐官制行分𨽻宗正寺官紹興十二年襲舊制始以宰臣一人提舉修玉牒官一人以侍從兼凡宗正卿少而下悉與修纂二十九年詔玉牒所併入宗正寺更不置修玉牒官檢討官以本司少卿丞同領編修事詔玉牒所宰臣提舉依舊修書官一貟同宗正卿丞修纂更不置檢討官紹興三十二年詔尚書左僕射陳伯康提舉編修玉牒後或以參知政事簽書樞密院兼權提舉乾道元年錢端禮以參知兼權蔣芾以簽書兼權皇唐玉牒之號肇於開成為書一百一十卷者李衢林寶所撰也其襲唐憲度用編年法者咸平之制也其以成書十年一進者熙寧之制也照用日歷指定修書則又見於熙寧者如此以玉牒聖政抄送史院則見於元符者如此其在舊制所書之條例者凡十有一其在紹興以來臣僚所定之條例凡九若親祠若遊幸若大除拜若大慶賞若皇子公主之出降封冊若大事之類皆大書特書此則玉牒為書之沿革也續通典唐開成三年修玉牒官李衢奏聖唐玉牒與史冊並驅立號建名期於不朽乞特創嘉多敕以皇唐玉牒為名又續㑹要修皇帝玉牒凡編年以紀帝系又中興㑹要熙寧三年玉牒十年一進修指又元豐六年詔宗正寺修玉牒詔用日歷所文字並定所書而今本所節録元符二年宗正寺丞陳覺民乞將先帝玉牒內聖政令本寺修玉牒官抄寫餘見上唐始置圗譜官其譜自武德者栁芳之所撰也其譜自永徽者栁景之所續也於是永泰有譜天潢源泒有圗在我國朝至道時則梁周翰所編也在祥符時則始屬玉牒趙世長所請也於是皇屬有籍仙源積慶有圗宗藩慶系有録其曰宗枝屬籍者蓋皇屬籍也逮至紹興合而一之謂之仙源慶系屬籍總要此則玉牒圗譜之分合也中興本末紹興十一年卲大受言宗正舊有四書曰玉牒曰仙源積慶圗曰宗藩慶系録曰宗文屬類建炎南渡寺官失職舉四者而逸於江滸陛下比命重修仙源積慶系屬籍總要合三者而一之固已無愧於昔獨玉牒未修望命有司討論於是始建玉牒所纂修之所則咸平始纂於祕閣既而祥符建殿于新寺既又修於編修院之西閣所以便國史也嘉祐則修於宗正寺廨熙寧則於三班院既而從編修院者用祥符之舊也元豐則以𨽻宗寺紹興中間始特建以纂修之所既而併於宗寺者用元豐之舊也屬籍之樓見於咸平慶籍之堂創于景德曰圗曰録嵗以供龍圗天章寶文者則舊制也是則置局藏籍之終始也職源聖朝祥符六年始設局置官倣唐制也八年建玉牒殿于新寺景祐元年宗正寺修玉牒官李淑申請詔以編修院廳西閣子充修纂玉牒之所時李淑言前修玉牒馮允亦是兼編修㑹要蓋緣國史玉牒事節須要照㑹所以只就編修院修纂熙寧三年玉牒於三班院置局後從編修院自元豐官制行分録宗正寺官紹興間始建玉牒所噫觀祖宗之所已書知祖宗之所由治謹方來之所未書兾方來之所大治必也麟趾振振螽羽蟄蟄而後無愧於帝系歷數昭穆之譜朝廷清明民物阜安而後無愧於政令封域戶口之記衆正翔集群邪晛消而後無愧於冊拜制誥之書萬世可法天下可誦鋪張對天之閎休揚厲無前之偉績愚願拭目以觀㑹要昔淳熙廷臣之進㑹要也其表曰考貞元㑹昌之作至藝祖而後成參慶歷熙寧之編逮慈皇而載續愚嘗因是而推原其由是書始於貞元之蘇冕繼於㑹昌之崔鉉至建隆初王溥取宣宗以後故事又從而推廣之此唐㑹要之源流也自唐德宗貞元間蘇冕始為唐㑹要四十卷武宗時崔鉉又續四十卷本朝建隆初王溥取宣宗以後故事并蘇崔所録共為二百卷文理簡當太宗嘉之自建隆至慶歷凡百五十卷則進於章得象由慶歷至熙寧凡三百卷則成於王圭元豐而至政和以續修㑹要為名則汪大猷刪定之建炎而至紹興以中興㑹要為名則陳騤編類之此國朝㑹要之源流也寶訓寶元二年上以蘇冕典章有足考者乃詔史官纂國朝建隆以來止慶歷二年凡制度沿革大小畢録為㑹要百五十卷慶歷四年監修國史章得象上之卷又職源本朝㑹要自建隆至慶歷四年成一百五十章得象上玉牒編修又長編元豐二年宰臣王圭上國朝㑹要三百卷寧仁宗時修㑹要自建隆止慶歷二年一百五十卷熙初圭請續之凡十二年乃成止熙寧十年通舊增損成三百卷修又職源乾道四年詔尚書左僕射陳駿卿兼提舉編國朝㑹要五年祕書少監汪大猷等言蔡攸所修國朝㑹要除將熙寧十年以前章得象王圭所修重加刪改外其自元豐至政和止得帝系后妃吉禮三門攸所修吉禮緣當時議論好惡不同妄有刪改以近時好乞令本省再加刪定兼今來續修斷自神宗其五朝㑹要內有熙寧十年內事亦合重行編入以續修國朝㑹要為名從之六年中書門下有言國朝㑹要已修至靖康詔令自建炎元年接續至乾道五年九年祕監陳騤言編類建炎已後㑹要至紹興三十三年六月十一日成書以中興㑹要為名列帝系於其先編蕃夷於其後禮樂輿服之目秩秩乎不紊學校職名之條繩繩乎可考總而類之門而分之唐與我朝同此書也亦同此名也王洙㑹要總類十五帝系三卷禮三十六卷樂四卷輿服四卷學校四卷運歷瑞異各一卷職官三十三卷選舉十卷道釋四卷食貨十六卷刑法八卷兵九卷方域八卷蕃夷一卷王圭㑹要凡二十一類如后妃王洙入在帝系中王圭自為一類之類然唐自德宗武宣而後治少亂多大綱不舉故其書雖備而無取國朝自藝祖列聖相𫝊之盛豐功茂德照映今古故其書相稱而無愧愚敢端拜而論之唐之言帝系也顔真卿以謂皇帝則盡有大聖之號皇后則盡有順聖之號議禮之士病其繁多不經其視我朝建隆之尊四廟祥符天聖之加號祖宗盛德大功為如何况今繼志以彰孝治備禮以奉慈極寶冊徽號輝光日星唐虞禹益之𫝊姜妊太姒之德又何加乎唐之郊禋曠嵗而不舉張九齡至謂郊禋常典猶闕其儀而有怠於事天之語其視我朝定南郊行禮之圗徹黃褥遮道之飾用繡文鹵簿之儀見郊祀門其精神享帝又如何况今嚴禋致祠以享神祗討論盛典光華史冊又何愧宗伯所掌者乎唐於食貨之事載之㑹要大率苛取橫斂而已故裴守真以為太府聚天下之財而國用有缺司農理天下之財而倉庾不充其視我朝賜租於乾德减六州之稅於開寶免開封之租於咸平賦稅門其損上益下裕民足國又為如何况今培植國本以寬民力則八政食貨之書又不足言矣噫國朝之德業如此治功如此則成書所載當以唐虞三代論不當以唐論也信矣然嘗論之天下有公是非則所書皆實事天下有公毁譽則所載皆定論宣仁之善政始不能以自明而終明於尊堯之集宣仁誣謗事為蔡京悖筆所汙至陳瑩中作尊堯集始定金陵之私史始固未免於失實而終實於時政之記紹聖間蔡卞以金陵實録私史壓宗劄至紹興命范冲以實録刪定之且熙寧十年以後之㑹要其所議論本於時好故不定於蔡攸之私筆而定於乾道正論興起之際見上嘉定三年以前之㑹要其所刪集之大者在於戮姦更化故不定于曩時未更化之前而定于已更化之後見上噫是書之作上以慰祖宗在天之靈下以示子孫奕世之典抑亦公道大明而後皆直筆也愚故併及之實録實録之名何始乎稱於漢而定於唐也愚嘗究其顛末矣漢人抽蘭臺之祕藏發金匱之舊籍曰本紀則係天下之統曰世家則係一國之紀曰列𫝊則係一人之事書者制度沿革之大端表者興亡理亂之大略雖出入於歷代之事而實褒貶西漢之治此漢實録之號也是則漢之書亦詳矣然帝紀列呂氏不能無譏於房闥之政八書著封禪不能無憾於登封之舉禮書盡録荀子是長樂等儀非儀也樂書止載戴記是昭容禮容等樂非樂也漢之實録得無不足於漢之治乎史記唐高祖之二十卷敬宗撰之房元齡修之太宗之六十卷顔嗣元修之長孫無忌又增之憲宗之四十卷則潤色於既濟父子之手德宗之五十卷順宗之五卷則粉飾於蔣乂韓愈之筆此唐實録之書也是則唐之書亦備矣然敬宗之曲筆未免有失實之嫌韓愈之直書又起後來竄定之議唐之實録果能直紀唐之事乎唐史嗚呼業巨而辭淺固不足以揄揚其萬一文浮而實泯亦豈紀録之真哉漢唐之制陋矣惟我國家聖聖相承豐功茂德輝映史牒名實相稱萬古不磨蓋自搜尋有詔訪求有命而實録之書益備㑹要咸平元年詔曰太祖誕膺丕命啓肇皇基恭惟實録將示無窮而筆削非工多所漏略先命張洎重加刋定其書未成近因搜尋備見踈簡命呂端錢若水表成以揚芬烈興又至道三年命錢若水修太宗實録若水言自太平國已前君臣獻替不著於話言淳化五年以前親决萬機不聞于䇿府請降詔求訪從之提舉以宰臣修撰以侍從檢討校勘以本省官而實録之官益重㑹要提舉實録院之置蓋自治平元年以宰臣韓琦提舉修仁宗實録熙寧九年以宰臣曾公亮提舉修英宗實録紹興初實録國史皆寓史館後罷史館遇修實録即置實録院遇修國史即置國史院九年二月以上神宗哲宗徽宗實録始置院以宰臣一貟提舉修撰檢討官無定貟檢討官以本省官或他官兼而修撰官如史官例十二年詔史館提舉討司承受等并官吏並併歸實録院以罷史館也或置院或寓史館或罷館而歸院而實録之地益崇見上名山登載鏗乎二典之並𫝊寶閣分華熀若祖孫之炳耀嗚呼盛矣哉我藝祖之開天下也披棘蕩榛規模萬世太宗之守文治也廣聲纘功有光前代故興國三年李昉扈蒙趙璘幾之同修所獻者㑹要太平興國三年命李昉扈䝉李穆董淳趙璘幾同修太祖實録五年書成凡五十卷淳化五年乃命李至張洎同修太祖國史實録咸平元年呂端錢若水李宗諤趙安仁之同修所上者皆鋪陳乎此也咸平元年命呂端錢若水裁成若水表辭帝曰以卿前修太宗實録甚為周備而太祖朝事盡漏略故再命卿修撰又以王禹稱李宗諤梁皓趙安仁同修撰端罷李沆繼成咸平元年錢若水所上八十卷祥符九年王旦所修二書皆終始乎此也㑹要至道二年命錢若水修太宗實録若水言自太平興國請降詔求訪從之咸平九年八月書成凡八十卷增又祥符九年王旦言兩朝實録有未備者望降史官修詔可真宗以清淨治而民物乂安仁宗以安靜治而風俗醇厚故天聖二年三月癸卯李維晏殊所上之百五十卷而大典惟恐其不謹也寶訓天聖二年三月癸卯李維晏殊所上凡一百五十卷宰相王欽若等表上熙寧二年冬韓琦所上二百卷而金匱惟恐其不副也熙寧二年韓琦等表曰仁宗在位四十餘年嵗紀綿久注記盈多先帝撰述賜下永以丕承夙愧多聞繆塵聖選不能昭星斗之觀副金匱之藏昧死奏編經營失次其所修仁宗實録二百卷事月日卷上進英宗以上聖之資撫高世之行則三十卷之昭昭可考者曾公亮領之也熙寧二年曽公亮表曰英宗以上聖之資撫高世之行度越前王憲章來裔聖上申命儒臣俾知撰次臣捧詔惴栗逮兹朞嵗僅乃成篇其所修英宗實録共三十卷上進神宗天資高美動法三代則正史之久鬱復明者范冲定之也中興本末紹興四年上欲重修神哲兩朝實録常同言范祖禹之子冲知其本末乃召冲上諭宰執曰二史失實非所以𫝊後朱勝非曰神宗史添入王安石日録哲宗經蔡京蔡卞之手今修之足以彰二帝之盛美矣秋范冲條上宣仁誣謗事且奏曰臣親奉玉音議熙寧之法度則曰神宗之意初實不然言紹聖之繼述則曰帝王之孝豈在于是辨宣仁之誣謗謂功烈之盛何可不明思道君之重明為奸臣之所誤安得不悔願明詔群臣示之好惡詔付史館六年范冲言重修神宗實録於朱墨二本中有所刋定奉詔别為考異一書明辨去取之意以辨誣為名從之八年神宗實録用何愈刋正訛謬六月詔前修詳略去取未當令本省簽貼進入哲宗元祐之治雖汙於卞京之手而終潔於紹興之四年也見上徽宗崇觀之事本出於蔡京之姦而卒明於紹興之三十二年也中興本末紹興八年詔修徽宗實録以左僕射趙鼎提舉鼎奏曰先帝以仁厚之德㴠養天下其間法令有未盡善者皆出於群臣貪功冒賞而有司壅於上聞非先帝本意又曰崇觀之失不歸蔡京使何人任責十二年初詔修徽宗實録至是才成六十卷秦檜上之高宗之中興再植宇宙蓋耳目所接未逺則紹興嘉泰諸臣所定亦可覆也嘉泰二年高宗實録二百三十卷起紹興十七年之正月迄紹興三十二年之正月孝宗之揖遜宏模懿範實人心所共知則嘉定諸臣所潤色者亦可見也嘉定十二年詔修孝宗實録隆名美號昭乎日月之照臨深仁厚澤蕩乎天地之覆載襲六為七作宋一經蘭臺石室有直筆而無𨼆情寶軸牙籖有全册而無遺典微夫漢唐之史也視我朝之盛德全典鏗鍧炳焕不亦恧乎溫公之學誦公之行事者曰今人不及須求之古人韓魏公語録文潞公書言君實作事今人所不及須求之古人稱公之學術者曰三代而下公一人而已劉元城語録或云三代而下宰相學術溫公一人而已公以為如何公曰學術誠然若相之才所以圗回四海未敢以為第一蓋當時正人多短于才所謂愛而知其惡也噫公何以得此名哉吾嘗求其操履大致矣平生所行不外乎誠無欺心也劉安世從溫公學數年一日問盡心行己之要溫公曰其誠乎吾生平行之未嘗須臾敢離故立朝行己俯仰無愧耳平生所為可語諸人無私心也朝無咎云司馬溫公有言吾無過人者但生平所為未嘗不可對人言者耳夫惟心之無欺也己正物正精粗一致意誠國治本末一理君其不我信乎夫惟心之無私也視國猶家夷險不變待人猶己公私無間人其不我知乎此公至誠自得之學見於立朝行己之間也授以翰林而辭翰林神宗即位擢司馬溫公為翰林學士力辭上諭以卿有文學何辭公曰臣不能為四六上曰如西漢制誥可也公曰本朝故事不可上曰卿舉進士高等而云不能四六何也公趍出遣內臣強公受告公不得已乃受授以樞密而辭樞密韓魏公言君實初除樞密副使竟辭不受亟遣人賫書與潞公勉之君實云自古被這官爵引得壞了名節不少一日神宗有無人才之嘆蒲宗孟曰人才半為光以邪說壞之上曰蒲宗孟乃不取司馬光耶光未論别事只辭樞密一節朕自即位惟見此一人他人則遣之去亦不肯矣非矯情也禹益伯夷之遜也善韓公而非韓公龍川志云治平韓魏公建議於陜西刺義勇無一人敢言其非者司馬君實時為諌官極言不便持劄子至中書堂魏公曰今已降敇榜與民約永不充軍戍邉矣君實曰朝廷屢失信未敢為信雖光亦未免疑也魏公曰吾在此君無憂此語之不可信君實曰光終不敢奉信恐相公亦不能自信耳魏公曰君何相輕甚耶又光與韓琦在仁宗朝同論建儲在神宗朝論新法善范鎮而非范鎮熙寧元豐間士大夫論天下賢者必曰君實景仁二公蓋相得歡甚曰吾與子生同志死當同傳蓋二公用舍大節皆不謀而同如仁宗論立皇嗣英宗時論濮王稱號神宗時論新法其言若出一人君實嘗謂人曰吾與景仁兄弟也但姓不同耳然至于論鍾律則反覆相非終身不能一君子是以知二公非茍同者也范鎮墓志非褊心也稷契臯陶之忠也此處己待人之道然耳至愛君之大節憂國之至情俯仰無慙神明可質真一代之標凖也建儲之議人所難言言之者亦未必力中心藏之何日忘之如公幾人哉自為并倅已獻三章繼入諫垣復抗纍疏雖仁宗亦稱他人所不及也初至和三年仁宗始不豫國嗣未立諌官范鎮首發其議公時為并州通判上疏擇宗室賢者使攝儲二以待皇嗣之生退居藩服不然典宿衛尹京邑亦足以係天下之望疏三上其一留中其二付中書公又與鎮書此大事不言則己言一出豈可復返願公以死爭之及公為諫官復上疏上沉思久之曰得非欲選宗室為繼嗣者乎此忠臣之言但人不敢及耳至嘉祐六年復上疏上大悟詔英宗判宗正寺新法之行人所同爭爭之者恐未必力風雨如晦雞鳴不已如公幾人哉始諫不從奮然補外再諫不聽浩然居洛雖荆公亦稱其言不變也公力論安石新法不便垂拱登對乞知許州或西京留守御史臺國子監上曰卿何得出外光曰臣必不敢留上沉吟久之曰安石素與卿善卿何自疑光曰臣與安石素善但自執政違忤甚多今忤安石者如蘇軾輩皆中以危法臣不敢避削黜然出知永興軍朝辭進對猶乞免本路青苗助役後判西京留守御史臺遂居洛買園以獨樂名之又荆公嘗曰自吾行新法始終言不可者惟司馬光一人公之愛君何其終始不易邪雖然此未足以知公也改絃之際公豈不知朋黨之禍邪而拯溺救焚不暇他恤且曰天若祚宋此必無事是言也天地實臨之劉先生語録公曰溫公當揆路日蓋知後必有反覆之禍曰然變法當如救焚拯溺何暇論異日事又聞見録公欲改新法或謂公曰元豐小人有以父子之義聞上則朋黨之禍作矣公正色曰天若祚宋必無此事垂歿之頃公豈不念身後之事耶而憂國忘家不能自已且曰四患未除死不瞑目是言也鬼神實鑒之元祐元年公始得疾詔公與尚書左丞呂公著朝㑹與執政異班再拜而已免舞蹈公疾益甚嘆曰四患未除吾死不瞑目矣乃力疾上辭至九月薨公之憂國何其禍福不變耶雖然此亦未足以盡公也何者公之至誠格於匹夫公之忠信行於蠻貊公之清忠粹德凛凜異日之景仰兹所以為公也兒童知名且重君實東坡作溫公獨樂園詩兒童誦君實走卒識司馬衛士加額歡呼相公公赴闕庭衛士見公入皆以手加額曰此司馬相公也至民遮道呼曰公無歸洛留相天子活百姓所在數千人觀之噫賤𨽻且稱之况君子乎大遼伶人敬公清名文潞公謂溫公曰彥博昔守北京遣人入大遼偵事回云見遼主大宴群臣伶人劇戲作衣冠者見物必攫取懷之有從其後以挺仆之者曰司馬端明耶君實清名在夷狄如此溫公愧謝契丹伴使慕公忠亮呂晦叔曰昨使契丹彼中接伴問副使狄咨曰司馬中丞今為何官咨曰今為翰林學士兼侍讀學士曰不為中丞耶聞是公甚忠亮晦叔以著於語録噫逺人且敬之况吾國乎凜然遺像後人尊仰畫公至有致富公既沒京師民畫遺像刻印鬻之家置一本飲食必祝焉四方皆遣人之京師時畫工有以致富者刻之黨名異時立石鐫工不肯受役元祐奸黨并元符黨凡三百七人起司馬止王仲基上親書刻石于文德殿之東壁又詔蔡京書須諸路立石長安當立石召石工安民者刋之安民辭曰元祐大臣如司馬光者天下謂之正直今謂之奸邪安民不忍鐫也府官欲罪之安民曰被役不敢辭乞不刻安民後世以安民為罪也噫異日且慕之况當時親見乎然則公何以得此名哉曰微之顯誠之不可掩也如此夫康節之學不觀明道之論無以知康節為內聖外王之道言行録明道訪康節歸謂門人純明曰內聖外王之道也不觀了翁之論無以知康節為在心之學聞見録陳瑩中書康節先天圗心法也其詩曰身在天地後心在天地先天地自我出自餘惡足言然則先天之學以心為本其在經世者康節之餘事耳愚嘗求其源流矣有義理之學有物理之學有性命之學是學也蓋北面李挺之而得也然叩擊於飯立坐拜之間潜思於夢寐興居之際探羲文於方冊中探造化於指顧頃公之所自得者又多矣辨惑挺之聞康節好學自造其廬問先君曰子何所學先君曰為科舉進取之學耳曰科舉之外有義理之學子知之曰未也願受教曰義理之外有物理之學子知之乎曰未也願受教曰物理之外有性命之學子知之乎曰未也願受教於是傳其學於李挺之且因神農取益取噬嗑黃帝堯舜取涣取隨而知畫前之易曰畫前元有易刪後更無詩則所學不在書而在理龜山語録堯夫云須信畫前元有易自從刪後更無詩畫前有易何以見曰畫前有易其理甚微然即孔子所發明者言之如神農取益取噬嗑黃帝堯舜取涣取隨當神農黃帝堯舜時重卦未畫非畫前有易邪以起震終艮明文王之八卦以天地定位明伏羲之八卦而發揮先天之學其詩曰身在天地後心在天地先則所學不在書而在心此公義理之學然也陳瑩中書康節觀物云起震終艮一節明文王之八卦也蓋先天之學本乎伏羲而備乎文王故其詩曰天地定位否泰反類山澤通氣咸損見義雷風相薄恆益起意水火相射既濟未濟四象相交成十六事八卦相蕩為六十四卦又按先天圗乾坤與否泰艮兊與咸損震巽與恆益坎離與既濟未濟常相對共為十六卦餘見上杜䳌之聞至微也而知世治之所關熙寧戊申堯夫聞杜䳌啼不樂或問之曰將有人起東南為相以文教亂天下此禍非六十年不已未幾王介甫召自江寧介甫所建明經術法令至建炎戊申方熄此事又見聞見録但不言戊申春雷之鳴至隱也而辨其所起之方程氏遺書卲康節問伊川曰今年春雷何處起曰起處起云云詠楊桞之風氣象灑落有吟風弄月之趣上蔡語録堯夫詩云梧桐月向懷中照楊桞風來面上吹真風流人豪也推牡丹之數胸次洞達有致知格物之妙此公物理之學也步里客談司馬文正種牡丹卲堯夫曰某日午時馬踐死是日及午馬廄中馬絶經仆之聖飾性而不加增狂染性而不加損既發明孟子性善之㫖康節雜說曰性如是無有相見無有聲臭無有小大無有廣狹以萬寶采飾之而空不受其飾無所措手而加飾以糞穢而汙染之而空不受汙損無所施其汙染也是以聖飾性而性不加增狂染性而性不加損孟子指性善也以謂人之生有不學而知不慮而能今有赤子卧于空室饑則乳之不見一人不交一語試問之孰為汝親赤子蠢然不知方其乳哺者教之既久親愛之心生豈非性哉習智而智習愚而愚習聖而聖習狂而狂又發明孔子性習之說同上康節曰自孔子沒諸子之言性甚衆未嘗有一言及於正性非無性也無有自性也若有自性則愚者常愚不可以為智智者常智不可以為愚其實無自性故不可以不習孔子曰學而時習之性如美田種藝耘耔灌溉之功猶習習智而智習愚而愚習聖而聖習狂而狂書曰習乃性成只在一念克與罔耳論顔子之不遷怒不二過曰皆情也非性也康節觀物外篇曰顔子不遷怒不二過遷怒二過皆情也非性也不至于性命不足謂之學論韓子之上中下三品曰皆習也非性也此又公性命之學也雜說康節曰韓子之言性有上中下三品其所以為性者五仁義禮智信則有當其名者矣性如水中泡膠中清隂中影水中月决定是而不可得鷹之鷙橘之甘若有自性則鷙橘井苦不可移也自習而名上中下可也以正性為三品不可也自同時不知公者往往以為神仙之學豈知公之所學主乎誠至誠可以通神明曾謂公為幻惑之流歟陳瑩中答楊中立遊定夫書康節云先天一圗心法也世人求易于文字至語皇極以為考數之書康節詩云自從三度絶韋編不讀書來二十年俯仰之間無所愧任人謗道是神仙同時者目其人為神仙後來者名其書為考數皆康節所不知也後來所不知者又以為考數之學豈知公之所學本乎心或於心外欲觀休咎而已曾謂公為卜筮之術歟康節觀物外篇康節曰先天學心法也故圗皆由中起萬化萬事生乎心也先天學生乎誠至誠可以通神明不誠則不可以謂道不然邢和叔欲𫝊此學公告以虛心滌慮辨惑邢和叔從康節學援引古今康節曰先天學未有許多言語曰當虛心滌慮程氏性學淵源公則慨然欲授之卲康節曰天下聰明過人惟程伯淳正叔可傳此學果神仙乎抑至誠乎果數學乎抑心法乎天向一中分造化人從心上起經綸後之欲求其學者當於此詳味云康節詩歐蘇之學昔蘇子序歐陽之文曰宋興七十餘年斯文終有愧於古自歐陽子出天下爭自洗磨故嘉祐以來文章始盛者歐陽子之功也文集蘇軾序歐陽之文曰韓愈之後三百餘年而得歐陽子天下尊之曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有愧於古自歐陽子出天下爭自洗磨以通經學古為高以救時行道為賢以犯顔敢諫為忠長育成就而嘉祐末號稱多士歐陽子之功為多李豸記蘇子之言曰方今太平文士輩出要使文有宗主昔歐陽以是任與某故元祐以來文章愈盛者蘇子之功也李豸記東坡嘗言文章之任亦在名世之士相與主盟則其道不墜方今天下太平文士輩出要使文有宗主昔歐陽以是任與某異日文章盟主責在諸君子亦如文忠公之𫝊授也蓋嘗考其所自來矣國初襲五季之陋氣習卑淺體製浮靡衲被之譏君子所羞楊億為文用故事令子姪檢討出處用片紙録之文成掇拾所録人謂之衲被太崑之嘲為天下笑天聖以來穆修尹洙歐陽倡為古文變西崑體學者從之其有楊劉體者人戲之曰莫太崑否劉筠倡之於前楊億和之於後雖栁仲塗穆伯長始尚古文而猶未變也聞見録本朝古文桞仲塗穆伯長首為之倡尹洙師魯兄弟繼其後歐陽子工偶儷之文及官河南始得師魯出韓文學之蓋公為古文則居師魯後也歐陽子祖韓昌黎之謹嚴習師魯之簡古歐公書韓文後曰余少得昌黎文集後舉進士及第官于洛陽而尹師魯之徒皆在遂相與作為古文因出所藏昌黎集而補綴之其後天下學者亦漸趍於古又事實天聖明道中錢文僖守西都起雙柱樓觀關者命永叔師魯作記永叔先成凡千餘言師魯曰洙止用五百字可記文成永叔服其簡古自此始為古文讀公之文如遊帝舜之庭聽簫韶之樂戞擊雜陳而節奏雍容人以為是文也精純典雅之文也故一時化之鉤棘之句變而渾厚嘉祐二年歐陽知貢舉先是進士習為竒怪鉤章棘句浸失渾厚修痛加裁抑及榜出囂薄之士群聚詆斥或為祭歐陽之文然文體由是少變險怪之詞革而平易嘉祐文章所以一變者非歐陽子之功而誰功筆談嘉祐中士人劉幾好為險怪之詞歐陽公惡之㑹公主文有一舉人論曰天地軋萬物茁聖人發公曰此必劉幾也黜之既而果幾後幾年公為御試考官而幾在廷時堯舜性仁賦有曰靜而延年獨高五帝之夀動而有勇形為四罪之誅公大稱賞及唱名乃劉輝人曰此幾易名公愕然因成其名小賦有內積安行之德人謂積近於學改為藴故曾南豐之毅蘇東坡蘇潁濱之通數君子皆出公之門而其文亦鏗然名家也東都事略歐陽修以高明博大之學興起斯文大章短篇與詩書春秋相表裏自是􅎔川以王氏為宗南豐以曾氏為重眉山以蘇氏為師而文章之學于今為盛唐有韓愈之功宋得歐陽子之力夫豈偶然也哉國朝自熙寧之間黃茅白葦幾遍天下東坡文集王氏新學行云云黃茅白葦幾遍天下牽合虛無名曰時學荒唐誕怪名曰時文聞見録荆公用事以穿鑿不經入於虛無牽合勝說作為字解者謂之時學而春秋百王之法獨廢而不用又以荒唐誕怪非昔是今無所統紀者謂之時文王氏作之於前呂氏述之於後雖當時能文之士亦靡然丕變也王安石呂惠卿行新法蘇子尚古學之源流排新經之破碎讀公之文如駕千里之駒而御以王良造父之手豪縱奮逸而疾徐中節人以為是文也雄渾瓌偉之文也而一時化之穿鑿之說謹守注疏好異之學變為正論元祐文章所以一新者非蘇子之功而誰功元祐三年東坡知貢舉盡廢新學凡經學盡守注疏不敢自立怪說文體一變故山谷之文竒而工淮海之文直而婉文潜之文深而靜無咎之文潔而騷無已之文簡而肅數君子皆履公之庭而其文亦粹然出正也世之好訶詆人物者謂歐陽子醉翁亭記未免有賦體之纍不知公之此記特戲筆耳蓋不自以為竒也東坡云永叔作醉翁亭記其辭玩易蓋戲云耳又不自以為竒也而妄庸者亦作永叔語云平生為此又最得意又云吾不能為退之書記退之又不能為醉翁亭記此又大妄也遊陳後山云退之作記記其事爾今之記乃論也秦少謂醉翁亭記亦用賦體又謂蘇子新書麗句未免有嘲詠之過不知公之所諷特陶情耳初不害其為文也要之論二公者當以救時行道為高立節著名為尚而平居遊戲之筆適意賦詠之詞蓋不足為公纍吾觀歐公方其司文衡也痛革天地軋萬物茁之病見上其為翰苑也托諷於袚除祈祝之辭其有禆於風教也不少高宗時綦崇禮言歐陽修立朝以諫諍為心若春日帖子蓋宮禁門戶祓除祈祝之辭異時作者不過誦德歌福而已至修乃中含規諌嘗謂修之詞有曰陽進升君子隂消退小人勸上以用威斷也有曰玉輦經年不遊幸上林花好莫爭開戒上以節盤遊也蘇公買燈等疏力論當時之弊隱然有一唱三嘆之音書溫公神道碑首言西方之兵寡而黃河之流以復識者知其胸中有天下之體可以超宇宙排海岱其自立氣節也為如何並見蘇文噫此歐蘇之學所以絶唱古今也讀詩未有劉長卿一句已呼阮籍為老兵筆語未有駱賓王一字已罵宋玉為罪人則吾豈敢關洛之學理學張敬夫記濓溪之祠也曰先生起於逺方超然自得二程先生推明究極其學則知二程之學本於濓溪信矣張敬夫濓溪祠堂記周茂叔起于逺方超然自得本乎易之太極中庸之誠以極天地萬物之變化其教人使之志伊尹之志學顔子之學推之於治禮樂刑法可舉而行於是二程先生推明究極其學遊定夫書程氏之行也曰先生有妙質聞道甚早橫渠張子厚友而師之有虛心求益之意則知橫渠之學得於程氏信矣遊定夫書程伊川行狀云先生有妙質聞道甚早橫渠張子厚友而師之云云又龜山跋橫渠與伊川簡云橫渠之學出於程氏而關中諸生尊其師欲自為一家故豫録此簡示學者大抵有濓溪則有二程有二程則有橫渠吟風弄月名利俱釋二程蓋有得周子再見之後明道先生自言再見茂叔後吟風弄月以歸有吾與㸃也之意共談道學涣然自足橫渠蓋有得於一見程子之日橫渠少學孫吳後從范文正學中庸又後貫穿百家及見二程共談道學涣然有得師友淵源千載而下尚可想見夫同一源流則同一學術同一學術則同一議論可也然嘗觀數先生平日之所談論之所趍向未能無疑焉且主於太極與靜者周子之學也太極圗曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根二程既學於濓溪遡其立教不言極而言仁不言靜而言敬程氏豈為彎弓之見哉明道論仁如手足痿痺為不仁伊川論仁如榖種生之性程氏論敬曰主一之謂敬主於仁與敬者二程之學也橫渠既得於二程究其為說又不主於二者而主於禮張氏豈為操戈之說哉橫渠教人以禮及以數書而紬繹之則殊塗同歸百慮一致未見其為異者周子論靜無不動天下歸仁君子悉有衆善無不愛且敬何嘗不本於仁與敬乎通書程氏論動容周旋主於禮未嘗欲其形如死灰何嘗不本於禮乎語録橫渠論至虛之實至靜之動與夫仁者安靜等語又何嘗不與周程相出入乎理窟嗟夫堯舜相授不外一中大禹叙疇名曰皇極至子思則又於中庸發明夫子鳶飛魚躍之妙中也極也即夫子所謂中庸也曾謂周子太極與靜非程氏仁敬之論耶顔子先博文而後約禮則自明而誠曾子先忠信而後𫝊習則自誠而明至孟子則一以誠身明善為主明也誠也即孟子所謂誠身明善也曾謂程子曰仁與敬非橫渠主禮之論耶嘗謂數先生之學未嘗不同也而所以啓後人之疑者關洛之人自尊其師之過也為程氏之學者曰二程講論問答見於遺書者未嘗及於太極圗使後人疑程子之學異於周者未必非此言始晦菴跋太極篇曰云云為張氏之學者曰橫渠之學不出於二程使後人疑張子之學異於程子者未必非此言始程氏遺書呂與叔作橫渠行狀有見二程盡棄其學之語伊川曰表叔平生議論謂頥兄弟有同處則可若謂學於頥兄弟無是事噫指伊川之說以議康節之學此康節之所深戒歟聞見録近時妄人出雜書數千百條託為伊川之說意欲前無古人于以重吾之師矣如司馬文正公張橫渠皆斥以為未至但以康節為數學亦安知所謂數者非伊川之雅言也豈中立定夫亦惑於此歟太諫公反復論之深矣先君之戒則曰張巡許逺同為忠義兩家子弟不能明二父之志更相毁故并為退之所貶凡託伊川之說以議吾家學者若子孫可勿辨乎然嘗論之關洛之學致疑於後人者固諸儒議論之過見信於後人者亦後儒指明之功夫洪範曰極易曰太極可謂盡矣而周子又加無極於太極之上近代儒宗又從而釋之曰不言無極則太極同於一物而不足以為萬化之根本不言太極則無極淪於空虛而不能為萬化之根本何其詳且盡耶晦翁語録明道伊川橫渠教人切至曰敬曰一明矣而程夫子又示人曰主一之謂敬無適之謂一近代儒宗又告其學者曰講究涵養如車兩輪廢一不可晦翁語録何其簡且易耶噫安得深知關洛者與之語關洛哉關洛之學經學中庸解義蓋程夫子親筆也心不自滿且火其書則知於經也為不茍陳長方見尹子於姑蘇問中庸解尹子曰先生自以為不滿悉焚之矣周易一𫝊蓋程夫子晚年也學者請授尚覬學進則知於經也為不輕伊川晚年作易𫝊門人請授先生曰更俟學有所進嗚呼先生於聖經也深矣蓋自咸陽一熖編殘簡斷漢儒紛紛蛙鳴蟬噪其所壞者不少國朝慶歷而上士以詩賦取科第於經學未暇也慶歷以來文學彬彬周子之通書伊川之經𫝊橫渠之理窟而伊洛之門又相與講明之而道德之言藹如也自今觀之西風而雨悟密雲不雨之意理義養心得敬以直內之說則得於易者雖數也亦理也伊川語録長安西風而雨終未曉此理須是自東而北自南而西則不雨何者東北陽也陽倡而隂和西南隂也隂倡則陽不和易言密雲不雨自我西郊則是隂先倡也耳又明道先生曰古之所養心者皆廢今獨理義養心敬以直內是涵養意兔微物耳可起八卦梅粗迹耳可知乾坤則得於易者雖理也亦數也遺書因見賣兔者曰聖人見河圗洛書而畫八卦然何必圖書只看此兔亦可作八卦數便從中起古聖人之取神物之至者耳又遺書早梅冬至以前發方一陽未生然則發生何也其榮其枯此萬物一個隂陽升降大節然逐枝則有一個榮枮分限不齊此各有一個乾坤也或以七九為進君子以六八為退小人是不知有自然之數不有程氏誰其辨之程氏遺書先儒以六為老隂以八為少隂固不知介甫以為進君子而退小人則是聖人安排義理也此是定隂陽之數九六只取純隂純陽過六則一陽生至八便不是純隂以九四為武王觀兵以九三為湯武知位可至是不知有本然之理不有程氏誰其正之遺書介甫以武王觀兵為九四大無義理兼觀兵之說亦無此事如今日天命絶則便是獨夫豈容更留三年今日天命未絶便是君也為人臣子豈可以兵脅其君只是太誓序云十有一年正經惟十有三年先儒遂轉為觀兵之說先王無觀兵之事不是前序一字錯便是後三字錯幾同上知至至之如今學者知至處便從此至之是可也荆公云九三知九五之位可至而至之大殺害事使人臣常懷此心大亂之道亦自不識湯武知至至之只是至其道也其深於易之理數也歟鳶飛戾天魚躍于淵此言周人作人也讀之得理學之妙二程語録詩云鳶飛戾天魚躍于淵猶韓愈謂魚川泳而烏雲飛上下自然得其所也詩人之意言如此氣象周人作人以之秉心塞淵騋牝三千此言衛人坰牧也讀之得心學之善伊川語録夫子言興於詩觀其言是興起人善意如言秉心塞淵騋牝三千又如駉之詩駉牧是賤事其中却言思無邪詩三百一言以蔽之者在此一句駉牧而必要無邪者蓋非此不能駉牧文王至德者也以靈臺為始受命則辨其不知文王橫渠理窟靈臺民始附也先儒指以為文王受命之年此極害義文王之於紂事之盡道矣先儒解經如此君臣之義且不明何有義理哉周公至仁者也以破斧為真破斧則辨其不知周公橫渠正蒙訓破我斧缺我戕言四國亂離烏能有為徒破我斧我戕而已周公征而安之者此愛人之至也其得詩之㫖趣也歟夏社之遷人皆曰湯實為之君子曰欲遷者非湯其不可者湯也召公之不恱人皆曰周公實致之君子曰召公實不安於心周公無可疑也程氏遺書湯既勝夏欲遷其社不可湯為聖人不容有妄語不可者湯不可之也湯以為國既亡則社自當遷以為遷之不若不遷之為愈故但屋之春秋書亳社災魯有亳社屋之故有火災此制必始於湯也稱伊川語録召公何以疑周公曰召公何嘗疑周公書召公不恱何也召公初稱為太保與周公並列其心不安故不恱耳豈有召公之賢不知周公乎詩言刺朝廷之不知者為成王耳泰誓之不書商歷者以見紂罪自絶于天舊所未論此則論之伊尹之始立太甲者以外丙仲壬幼而不立舊所未辨此則辨之達矣哉論書之學也程氏遺書泰誓書何一月曰商厯已絶周厯未建故用之正今之正月不書商歷以見紂自絶于天矣又遺書伊尹受湯委寄太甲如不終厥德可廢也然則始何不擇賢蓋外丙四嵗仲壬二嵗惟太甲長年入德之門無如大學大學其學之門戶乎中庸一卷書終身用不盡中庸其道之總要乎伊川語録唐國見伊川問學如何曰入德之門無如大學今之學者賴有此篇僅存一又伊川語録善讀中庸者只得此卷書終身用不盡也禮之達禮之成吾得之禮運禮器禮之灑掃禮之應對吾得之少儀曲儀至矣哉𫝊記之學也橫渠正蒙曰禮器則藏諸身吉無不利禮運云者語其達也禮器云者語其成也達與成體與用之道合體與用大人之事備矣又呂氏童蒙訓後生學問須㑹曲禮少儀等學灑掃應對進退之事有關雎麟趾之意然後可以行周官法度吾得之程明道龜山語録正心一事若深知而體自有其效王氏之學蓋未造乎此其治天下専講求法度如彼修身之潔宜足以化民矣明道常曰有關雎麟趾之意然後可以行周官之法度蓋深造乎此知三代致治之意始可講周官經世之務吾得之楊龜山龜山語録熙寧君子皆通世務而所取為證者秦漢以下之事而已有為秦漢以上之說者與之爭輒不勝今之論者多以三代為言然須深知三代致治之意方可若周官之書先王經世之務也不可不講此周官之典精矣王氏之欲行周典彼烏知哉見上春秋何以始世儒之說紛如也龜山曰王者之迹熄則知春秋之始龜山語録春秋始𨼆其說紛紛無定論孟子有言王者之迹熄而詩亡詩亡然後春秋作平王之崩在𨼆公三年則𨼆公即位實在平王時平王東遷黍離降為國風則王者之詩亡矣此春秋所以作也春秋何以終世儒之論不一也伊川曰聖人有所因而作則知春秋之終伊川入關語録孔子感麟而作春秋或謂不然如何曰春秋不為惑麟而作然麟不出春秋豈不作孔子之意蓋亦有素因此一事乃作故其書亦以此終如畫卦因圗書果無圗書八卦亦須作此春秋之經明矣彼王氏欲罷春秋彼烏知哉王安石罷春秋學嗚呼伊洛經學豈特為漢儒訓詁之習乎程門書𫝊崇寧小人禁錮不講或者已卜其異日之事崇寧間蔡京用事禁錮程氏之學胡氏春秋建炎中興祕閣珍藏君子知有中興之脉高宗好春秋胡安國解春秋詔藏祕閣其有關於世道也不淺誠不可以訓詁待之也程氏黨論觀歐陽尹師魯穆伯長之說作古文以變崑體學者爭師而世莫之議天聖以來穆修尹洙歐陽修倡為古文變西崑體學者從之又聞見録本朝古文桞開仲塗穆修伯長首為之倡尹洙師魯兄弟繼其後歐陽子工偶儷之文及官河南始得師魯出古文示之監又曾南豐蘇東坡王川皆歐公門人也觀安定太山徂徠之徒明經學以扶名教門人實繁而人莫之議胡安定瑗慶歷中教學者在湖學弟子以數千計錢藻劉彛范純仁皆出其門孫明復居太山下學春秋四方學者爭師之石介字守道耕徂徠山以易教授學者吾程夫子以誠敬為入門以踐履為實地自致知至於知止自誠意至於平天下亦何負于人哉而天下往往輕有鄙笑之論何也大抵木高則風必摧行高則人必毁七十二子不可非也而非之孟子不可疑也而疑之然亦何損正學之日月哉吾觀程夫子辭謝之表曰入朝見嫉世俗常態名高毁甚史册明言則夫子不以毁譽芥蒂也明矣伊川辭謝表曰入朝見嫉世俗常態名高毁甚史冊明言且程之與蘇同尊堯舜同學孔孟同師六經同尚仁義然主程氏者攻蘇子主蘇子者毁程氏此其故何耶愚嘗推其故矣哭則不歌程氏蓋守經㫖而蘇則戲之此爭忿之始也呂陶言明堂賀赦訖兩省官欲弔司馬光程曰子於是日哭則不歌或曰子言哭則不歌不言歌則不哭蘇戲程曰此乃枉死市叔孫通所制禮衆大笑結怨之端自此始吕公有事質問程氏初無容心而蘇則疑之此又立敵之端也噫蘇固非也而程之門人所與力爭者亦未為得也何者䇿問之語未足以譏子瞻而朱光庭必斥其非舜民之事不可以及呂陶而賈易則力劾其罪夫如是安得不激氷炭之意歟嗚呼程夫子以太空止水處吾心以虛舟飄瓦視世事以浮雲飛埃待爵祿初豈為是屑屑之忿蓋附程氏之黨從程氏之遊者未能釋然于懷也雖然范祖禹非與蘇同里乎曰光庭賈易不與程立黨也蘇子瞻眉州人范祖禹成都華陽人本同蜀居范祖禹嘗曰朱光庭賈易不與程立黨黃庭堅非蘇之門人乎曰濂溪灑落人品甚高未嘗不尊伊洛之學也黃庭堅本蘇之門人世謂之蘇黃嘗作濓溪詩序周茂叔人品甚高胸中灑落如光風霽月好讀書雅意林壑初不為人窘束噫先生之名雖可毁先生之道固自若不然何取信范黃二君子之深耶嗟夫程蘇之學皆正𫝊程蘇之遊皆正人細忿小嫌特水上之漚鑑中之塵耳愚之所深惜者元豐小人投散置間􅋦怨刺骨乘間有日諸賢不悟操戈相攻不知今日之相攻正所以啓異日攻我之資程氏既去蘇黨隨罷鷸蚌相持漁者之利此君子所深哀也聞見録哲宗即位羣賢畢集忠厚不擾庶幾嘉祐之風矣然雖賢者不免以類相從故當時有川黨洛黨朔黨之語洛黨者以程正叔為領袖朱光庭賈易等為羽翼川黨者蘇子瞻為領袖呂陶等為羽翼朔黨以梁燾劉摰王巖叟劉安世為領袖羽翼尤衆諸賢相攻不已正叔多用古禮子瞻謂不近人情如王介甫或加玩侮故朱光庭賈易皆訕子瞻執政兩平之時退元豐大臣于散地􅋦怨刺骨隂相間隙而諸賢不悟自立黨相毁至紹聖初章子厚為相以為元祐黨竄嶺海之外可哀也呂微仲秦人獨立無黨范淳夫蜀人師溫公不立黨亦不免竄逐以死尤可哀也古今源流至論前集卷四
