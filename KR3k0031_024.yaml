body:
  text: 古今源流至論續集卷四宋林駉撰榷酤酒之有禁尚矣自古至今大略有三以民之傷德敗性而禁者一也以民之糜榖耗粟而禁者二也借古人酒禁之名而為規利之術者三也豫嘗究其始末而論之未嘗不嘆後世風俗之不古也夫酒之為物古人惟以供祭祀而君臣之間以彛酒相戒凡羣飲者執拘以歸于周豫其殺酒誥周王誥羣臣曰矧汝剛制于酒厥或告曰羣飲汝勿佚盡執拘以歸于周豫其殺又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之刑之至重莫此為甚然聖人豈有他意哉惟懼其沉湎浸漬黷亂風俗不過導迪民彛防閉私欲而已至於地官有司暴以掌市飲之禁秋官有萍氏以掌幾酒謹酒之禁皆是意也是禁也豈非為傷德敗性之故歟漢初酤酒有禁而時有酺賜蓋因秦法之舊蕭相國作為律令羣飲者罰金四兩著之法令亦頗有古意文紀注漢有酒酟酤有禁三人以上無故羣飲酒罰金四兩至漢文以即位而賜民酺文紀帝即位賜民酺五日元年詔云為酒醪以糜榖者多十六年九月令天下大酺景帝以嵗旱而禁民酤景紀中元五年夏旱禁民酤懼以有用為無用之舉糜耗米榖民食不足爾後元酒醪糜榖之戒可見也是禁也豈非為害榖耗粟之故歟吁古之酒禁為亂德也漢之酒禁為糜榖也糜榖而禁似若非古然猶有崇本抑末之意至其後也三變而為爭利之術宜乎國政之日蕃而風俗之不古也自其未榷之初猶有吏舍歌呼之習曹參𫝊其既榷之後光祿之郎醉汚殿陛九卿諸吏仰天嗚嗚楊惲朝廷之間且有此則鄉黨小民何所不至耶甚矣宏羊之作俑也方武帝多事用度不足宏羊以商賈之習不恤民計置官榷酒考其嵗月至天漢之三載而初榷蓋春秋暮年利源益浚自是以後惟恐民之不彛酒也武紀天漢三年春二月初榷酒酤始元賢良文學之徒願罷鹽鐵榷酤方發議之初以鹽鐵均輸與酒榷並議而桑大夫答之尚猶以皆便為辭及再詰之後姑専以均輸鹽鐵為請而酒榷之法已置而不敢護則酒榷之設其義蓋悖歟賢良既議之後鹽鐵均輸尚無恙而榷酤一法首從剗去亦幾乎古矣昭紀始元六年召郡國文學賢良問民所疾苦皆對願罷酒榷均輸等官無與民爭利宏羊難之於是丞相田千秋奏宜罷郡國榷酟令民得破律酤租賣酒升四錢霍光大臣不學亡術未能取康誥之書以嚴羣飲之禁乃且令民得自酤酒而官稅升四錢其月攘一雞者乎其後長安三輔每有私酤之弊趙廣漢宣帝時廣漢長安吏自將與俱至光子博陸侯禹第直突入其家搜索私酤初廣漢客私沽長安而丞相史逐去客而他日百寮用度不給大臣又有賣醪之請翟方進傳制誥下云乞賣酒醪後請止雖未竟行而言利之徒因取為六管之令民始病於此矣王莽𫝊初魯康言鹽鐵錢布皆斡惟酒酤獨未斡復設六管之令命縣官酟酒義和置酒郡一人乘𫝊督酒利云厥後相仍指為常制陳文帝以國用不足而行榷酤南史陳文帝天嘉中虞荔等以國用不足奏請榷酤從之唐肅宗以廪食方屈而禁酒酤唐初無酒禁肅宗乾元二年京師酒貴帝以廪食方屈乃禁京城酟酒代宗令酤戶而納月租唐代宗廣德二年定天下酟戶以月收稅大厯中兼定三等逐月稅錢德宗以榷錢而隨兩稅憲宗元和六年罷京師酤肆以榷酒錢隨兩稅青苗斂之皆指此為規利之媒也五代以來其法愈酷私酒㳙滴犯者至死况不止於㳙滴乎東萊文五代之時如王章之徒提酒㳙滴處死太祖自㳙滴至一石其法甚寬私麴勺合論者棄市况不止於勺合乎漢初犯私麴者棄市周祖令至五斤死上以法禁密詔民犯私麴至十五斤者始處極典藝祖立極痛懲前弊雖未能盡弛一時之利然易嚴而寬其革有漸爾向以㳙滴而至死今而寬至於一石見上注向以勺合而棄市今而寬至於十五斤見上注或者茍不觀前代行刑之慘而妄議祖宗立法之意是不知本之論自後列聖相承日減月尅而酒禁並無死刑皆太祖貽謀之善東萊文自後列聖相承漸漸蠲減所以後來酒禁都無死刑正如孔子所謂為之兆也是故益州麴錢寧除而不課太宗太平興國二年詔除諸州官措置榷酤舊造曲鬻仍除益州嵗增麴錢六萬貫寶訓江南酒課寧罷而不取寶訓真宗咸平六年秦義畫䇿增榷酟課以助軍旅之費遣朝臣乘傳諸州初增榷酤之課景德元年江南諸州頗為煩擾屬嵗歉罷之二年李昉言江淮兩浙荆湖亦望停寢俟嵗稔如故上見奏亟罷仍詔義等自今榷酤課勿復增益江淮榷酤第從中制恐下無遺利也寶訓時江淮制置秦義上言榷酤遺利望增課上曰榷酤之設本以經費之廣故助國用若使下無遺利非常久之道第詔酌中而務於通濟諸路榷酤立為定規恐言者增課也長編景德四年因宰相王旦言淮南諸路榷酟增益課利煩擾特甚乃詔三司取一年中數立為定額自今中外勿得言增課以圗恩奬然則酒之有榷豈祖宗之得已哉特以國用寖廣未能遽弛仁心不獲寓於仁政爾噫此猶未足以見聖人之用心也學士酒失斥而不用近臣酣飲去之不容乾德二年令竇儀為翰林學士時宰相有欲復用韋曄者質曰近王著以酒失罷去曄之酣飲尤甚於著豈當復用耶乃止有周人正德之意乾德之詔糜榖有戒乾德四年詔古者倉廪實禮節興所宜禁民飲博勿致遊惰戒其崇儉免於糜榖慶厯之令羣飲有禁仁宗初詔鄉村不得增置酒場初上封者言天下酒課月比嵗增無有底極非古者禁羣飲欲節用之意故條約之即漢初重本之意此祖宗之酒禁又不専在於區區之利蓋以正德重本之美意並行其間矣自王安石開利門增酒課於青苗方散之時而為罔民之舉張肆設樂惑亂民心果何俗也設法命名籠取市利果何義也東萊文自王荆公置斂散青苗法一時新進苛刻之徒布在州縣青苗因收利息於散青苗之時官司又多張酒肆廣為聲樂耀人之耳目今俗謂之設法蓋自此始嗚呼古者懼民之為過自設法之後反納於有過古者恐民之羣飲自設法之後惟慮其不飲桑宏羊榷酒之法見前注至是又變矣向非中興以來深鑒其失罷蜀中隔槽之榷建炎二年張浚趙鼎大變酒法自成都始先罷公帑罷酒即舊坊場所置隔槽設官主之聽釀戶以米赴官司自釀凡米一石輸錢三千紹興二十六年費庭論隔槽酒臺之事上曰此張浚趙鼎濟一時之急耳今休兵既久自合更也弛七閩萬戶之禁紹興二十七年上曰中間福建用鈔鹽未幾復罷若可行祖宗已行之正如萬戶酒前後欲榷者甚多然竟不可行大扺法貴從容不然不可經久於國用不得已之中弛利寬法明示此意於天下愚恐末流之弊又不止於設法矣噫始作俑者其無後乎宏羊小人安得不執其咎昔先正翰林蘇公論酒誥一書以為漢武帝以來至于今皆有酒禁刑者或至流賞者或不資未嘗少縱至於私釀終不能絶周王獨何以禁之曰周王無所利於酒也以正民德而已東坡書解然則欲明酒禁之法當以祖宗正德重本之美意毋但為取利設可也榷茶嘗觀禹貢任九州土地所宜而無茶一字周禮列祭祀賔客之名物亦無茶一字以至漢唐以來史𫝊所載皆不言之夫茶充於味而饒於利何盛於今而不用於古乎抑有說焉按本草茶本名茗一名􅖗一名菽今通謂之茶蓋茶近故呼之末之乃可飲與古所食殊不同本草而茶譜云雅州蒙山中頂之茶獲一兩即能袪疾二兩無疾三兩固以换骨四兩即為仙矣其他頂茶園採摘不廢惟中峯雲霧蒙散鷙獸時出故人迹之所不到是茶也本藥品之至良也茶譜雅州蒙山中有五頂頂有茶園其中頂曰上清峯昔人有遇老父謂曰蒙之中頂茶獲一兩即能袪疾二兩無疾三兩固以换骨四兩即為仙矣其四頂茶園採摘不廢惟中頂草木繁密雲霧所蔽鷙獸時出人迹不至至唐人茶飲序云釋滯消壅一日之利暫佳瘏氣侵精終身之纍斯大則知自蒙山之外他土所産其性極冷故多雜以草木食之是茶也本草食之相混也唐毋榮茶飲序云及其後也智者創物製作愈精亦可以少易其性譬如易牙先得口之於味而俾天下之人皆知所嗜而有國家者因以為財賦之原焉究其所由來貴於唐而盛於我朝也亦猶含桃薦廟而盛於漢漢以含桃薦寢廟荔子萬錢而重於唐唐貴妃嗜荔子時至萬錢蓋物之所尚各有其時爾自唐陸羽隱於茗溪性酷嗜茶乃著茶經三篇言茶之原之法之具尤備陸羽上元初更隱茗溪自稱桑苧翁性嗜茶著經三篇言茶之原之法之具尤備天下益知飲茶矣時鬻茶者至陶羽形置煬突間祖為茶神有常伯熊者因陸羽論復廣煮茶之功李卿知伯熊善煮茶召之如常伯熊嗜之見上玉川子嗜之盧同性嗜茶至飲七碗曰覺兩腋生清風江湖散人嗜之陸龜䝉號江湖散人嗜茶置園顧渚山下嵗取租茶自判品第故天下益知飲茶回紇入朝亦驅馬市之矣回紇𫝊入朝驅馬市茶習之既久民之不可一日無茶猶一日而無食故茶之有稅始於趙贊唐志德宗時趙贊議稅天下茶漆竹木十取一以為常平本錢行於張滂通典上元九年初稅茶凡州縣産茶山外要路皆估其直什稅一從張滂之請也至王播則有增稅唐志穆宗時王播增天下茶稅率百錢增五十至王涯則有榷法同上王涯置榷茶使使徙民植茶於官場逮至我朝往往與鹽利相等賔主設禮非茶不交而私家之用皆仰於此榷商市馬入銜置使而公家之利全辦於此茶至是而始重矣然嘗以國朝榷茶之法而觀之曰榷務曰貼射曰交引曰三分曰三說曰茶賦紛紛不一然論其大要不過有三鬻之在官一也通之商賈二也賦之茶戶三也乾德之榷務筆談太祖乾德二年詔在京建州漢蘄口各置榷貨務五年始禁私賣淳化之交引太宗淳化四年行交引法置榷務咸平之三分咸平五年王嗣宗始立三分法以十分茶價四分給香藥三分犀象三分茶引六年又改支六分犀象四分茶引景德之三說景德二年許入中錢帛金銀謂之三說並筆談此鬻之在官者淳化二年貼射置法淳化二年令商賈就園戶置茶於官場貼射始行貼射法至四年行交引罷貼射同上此通之商賈者嘉祐三年均賦於民嘉祐四年韓絳及三司言茶課嵗二百四十四萬八千嘉祐三年才及一百二十八萬又募人入錢皆有虛數實八十六萬而三十九萬有竒是為本錢才得子錢四十六萬九千而已其贊運給費不與焉宜納至和之後一嵗之數以所得息錢均賦茶戶恣其買賣詔弛茶禁以三司嵗課均賦茶戶嵗輸三十三萬八千有竒謂之租錢唯臘茶禁如舊餘茶肆行天下矣此賦之茶户者然榷茶之法官病則求之商商病則求之官二法之立雖曰不能無弊然彼此相權公私相補則亦無害也惟夫均之於民則民病始極噫豈惟民病哉雖在官在商亦因是而有弊爾愚嘗推原其法自乾德置榷茶之務定私買之禁然利額未甚多場務未甚衆而民之有茶猶得以自折其稅是官鬻猶有遺利也太祖乾德二年諸州民有茶附折稅外官悉市之許民於京師輸金銀錢帛官約劵就榷務以茶償之時在京建州漢蘄口置務他處皆未置自後有十三場六榷務之立至淳化許商賈置鬻茶之場而行貼射之法然大商之利多而國家之課減未幾復罷其制是通商猶有遺法也國初許商賈就園戶置茶於官場貼射謂之貼射法太宗淳化三年始行之四年罷仁宗天聖元年復行之行之三年利歸大商又曰邉糴償以見錢京師府藏不足以繼爭言不便孫奭言商人貼射則善茶入商人入官者皆粗惡詔罷行三稅法商納芻粟於邉郡官給文劵於茶務此交引之法爾然鬻引之具一興而所給之茶不充此利復在商而不在官也西北用兵又募商人入中粟麥材木於邉郡給文劵謂之交引許就沿江榷務自請射茶郡所入直千五六千至三十千而給券百千謂之加檯然商人入中者不知茶利至京皆以茶引鬻於茶商百千才得二十餘緡謂之實錢輦下坐賈遂専交引以射利謂之引鋪嵗月滋深沿江茶務交引紛至茶不充給計嵗入雜茶三年不能償其弊如此始以茶錢與香藥犀象為三分之法邉糴未充而商人為便後以轉糴便糴直便為三說之法邉粟雖足而商人折閲此利徒在官而不在商也熙寧四年吳充曰茶法初立許商人入芻粟之郡入交錢至京師或使銀金紬絹或香藥犀象唯所欲商人便之後以邉糴未定遂以三分之法定立分數不許從便又茶官多置茶之下者茍足課額商人得之往往折閲所以大壞又筆談舊傳茶有三說見錢為一說犀牙香藥為一說茶為一說此乃三分法謂緣邉入納糧草價折為三分一分折見錢一分折犀象雜貨一分折茶爾後又併折鹽為四分法豫在三司求得三說乃是轉糴為一說便糴為一說直便為一說轉糴者極邉糧草嵗入必欲足常額三司先封樁見錢緊便錢緊茶錢然後召人入中便糴者沿邉糧草商人先入之詣京師請慢便錢慢茶鈔及雜貨直便者商人取便於沿邉入納見錢於京師請領轉糴數足然後聽便糴直便以此商人就趍極邉轉糴之二法者官無全利亦無全害商無全得亦無全失蓋彼此迭相救矣夫何韓絳以三司所得之息而均於茶戶之民舊納茶稅今變租錢民甚困之見上甚者稅不多登而官有浸虧之課販者日寡而商有不通之患此官之與商商之與民交受其弊歐陽言民舊納茶稅今變租錢一害也小商所販至少大商絶不通行二害也茶租不登浸虧國用三害也往時官茶容民入雜故茶多而賤今民自賣須要真茶真茶不多其價遂貴四害也河北和糴實要見錢京師嵗輦於河北五害也歐陽五害之說豈欺我哉見上噫此猶未至極病者茶戶均賦固也異日均賦之外復有榷之之法民堪之乎靖康元年楊時言陛下復祖宗之舊崇寧紛更惟茶鹽二法最為民害仁宗㑹榷茶爭利均為茶租户輸之弛其禁令茶租錢輸如故而榷户愈密是榷之又榷也茶地出租可也異日無茶之所亦例有租錢之輸民堪之乎王德用塵史嘗試考之其茶凡三名一名供軍稅茶蓋江南李氏所取以助軍也二曰酒茶乃景德之前因撲賣縣酒課其利計茶以納後因敗缺遂以數敷出於民三曰市茶景德三年嵗荒官許額外課茶以濟艱食後不復減湖北二路淮安復漢陽三州軍無茶租蓋民不種以資利耳嘗按茶之起謂之根租以茶株均敷其多寡而已今水湖田宅之地無茶株而有茶稅噫民病矣其可不為之慮耶昔開寶中有司請高茶價我太祖曰茶則善矣無乃困吾民乎詔勿增價噫是言也將天地鬼神實聞矣豈惟斯民感之哉愚願今之聖天子法之太祖開寶七年有司以湖南新茶異於常嵗請高其價以鬻之上曰茶則善矣無乃重困吾民乎即詔第復舊制勿增價直寶訓景德中茶商俱條三等利害宋太初曰上等利取太深惟從中等公私皆濟噫是言也將民生日用實賴之豈惟國用利之哉陳恕為三司使將立茶法召茶商數十人俾條利害第為三等副使宋太初曰吾觀上等之說利取太深此可行於商賈不可行於朝廷下等固滅裂無取惟中等之說公私皆濟吾裁損之可以經久行之數年公用足而民富實世言三司使惟陳恕為稱首愚願今之賢大夫法之榷鹽古今鹽法之沿革昔禹貢以青州貢鹽而鹽用始興當時鹽雖入貢而與民通用也禹貢青州厥貢鹽絺周官以鹽人掌鹽而鹽用始重當時鹽雖有官而未始不在民也鹽人掌鹽之政令以共百事之鹽蓋古者名山大澤不以封天子使吏治之而入其貢賦或稅取焉以待時發夫其不封也非徒利之九兩藪以富得民而繫之于太宰將與百姓共矣太宰至管仲以魚鹽富國以功利相君著海王之篇興鹽策之利通典齊桓公問管仲何以為國對曰惟策山海為可耳桓公曰何謂山海曰海王之國謹正鹽策舉三代聖人正大之用而為後世自私之謀至使禁榷之法與古人相為終始仲其作俑之尤也仲何人哉秦之鹽利至二十倍於古漢食貨志秦改帝王之制鹽利二十倍於古漢之山澤以為私奉養漢表少府掌山澤之租以共奉養則鹽之不在民可知矣然漢初隄防未密搜取未悉吳王煮海雄視一方吳王濞東煮海水以為鹽以故無賦國用饒足猗頓之富與天子埒前猗頓𫝊用鹽起富與王者埒漢初猶有遺利在民也自鄭當時一旦薦齊之大鬻鹽者而鹽之在官始悉前食貨志咸陽齊之大鬻鹽承僅南陽大治故鄭當時進言云云大農上鹽鐵丞孔僅咸陽言賴募民自給費因官器作王鹽官與牢盆於是懼其無所職掌也郡國置官三十有九而鴈門沃陽有長丞焉同上元封五年宏羊為大農丞幹天下鹽鐵請置大農部及數十人分部王郡國各在往置鹽鐵官又地理志郡國鹽官有三十九鴈門沃陽有長丞又懼其無所監臨也鹽官之上又有鹽長官焉表司農屬官幹官有兩長丞斡官郡斡鹽鐵者注云又懼其無所稽考也則又舉而一之於司農水衡之職焉表大司農屬官有斡官又後漢志郡國鹽官本屬大司農又水衡都尉有均輸官主鹽鐵事上下相統一孔不遺宏羊孔僅之徒鞭算殆盡而民始病苦矣雖然剝利固切而猶未竭澤也以史考之鹽官之置多見於西北而東南之郡特少如㑹稽一郡則今之兩浙路也而獨海鹽有鹽官廬江九江二郡乃今淮甸間也獨睆城有鐵官而無鹽官地里志又觀終軍詰徐偃以為膠東南近琅邪北接北海魯國西枕泰山東有東海二國食鹽悉取於鄰郡鹽鐵郡有餘藏終軍𫝊軍詰徐偃矯制曰膠東南近琅邪北接北海魯國西枕泰山東有東海二國食鹽悉取於鄰郡鹽鐵郡有餘藏正一國廢國家不足以為利害而以安社稷為辭何也縱膠東魯國廢不取當時諸郡相通彼此相補雖以東南財賦之淵以武帝之多欲行之且猶有不盡取者其後昭帝議弛禁而不果昭帝時舉天下賢良文學之士願罷鹽鐵榷酤於是丞相奏賢良文學不明縣官猥以鹽鐵為不便宜罷郡國榷酟酒關內鐵奏可時鹽榷不罷至元帝雖嘗罷之未幾復置食貨志元帝時罷鹽鐵官三年而復之是以終漢世而不變此君子重始立法也自是而後魏因衛現之言而置鹽官三國時衛現議曰鹽者國之大寶宜依舊制使者監鹽賣魏武帝於是遣謁者僕射監鹽官陳因虞荔之言而立鹽稅陳文帝天嘉元年虞荔孔奂以國用不足奏立煮海鹽稅從之沿歷至唐始為軍國大計焉鹽之池十有八鹽之井六百四十皆𨽻度支見食貨志第五琦劉晏講明備盡乾元初第五琦初變鹽法就海井竈之池置鹽院後劉晏以為因民所急而稅之則國用足於是上鹽法輕重之宜天下財計鹽利居半官兵諸費皆仰給之其後軍費日滋鹽價日踴有以數斗之粟而易一升之鹽民有不勝之病大厯末六百餘萬緡天下之賦鹽利居半宮闈服御軍鎮百官皆仰給焉其後軍費日增鹽價浸貴有以榖數斗易鹽一升私糶犯法未嘗少息唐志以此知天下利源不可開一開而不可復塞推原其故管氏子不能逃其咎也捨是而以我朝鹽法論之鹽之種類蓋不一品有出於池出於海出於井者有出於地出於山出於木石者北方之鹽盡出解池疏為畦隴决水以灌南風以播鹽始成熟此池之顆鹽也南方之鹽産於海西蜀之鹽産於井煎熬出素烹煉成鹹此海井之末鹽也河北所産成於鹵地永康所産出於山崖此出於地出於山之鹽也胡中之鹽或生於木或生於石此出於木出於石之鹽也東萊文世所共知者有三如出於海出於井出於池三者鹽之尤多世共知之如青州出於井幽薊北海嶺南南海皆出於海劒南西川出於井如河東鹽出於池如解池鹽之尤著者大略三種三種之外所出亦多如河北有鹵地此出於地者如永康軍鹽出於崖此出於山者又有出於石出於木品類不一大抵南方所出是海鹽自漢以來海鹽井鹽同煎熬之制皆烹煉然後成兩處之鹽必資人力如解州之鹽大抵如耕種疏為畦隴决水灌其間必候南風起此鹽遂熟風一夜起水一夜結成鹽所以北方皆坐食鹽如南風不起則課利遂失大海鹽井鹽全資於人解池之鹽全資於天而人不與大抵鹽者吾民之日用不可一日闕所以天地間無地無之然論大農國計之所仰惟淮之海解之池最資國用至蜀之井自贍一方河北之鹵素無禁榷其餘山崖所生木石所出亦不多爾國朝淮鈔未行置倉建安江浙湖廣以船運米而入真州真州因船回鹽而散江浙湖廣以之發鹽得船為便彼之回船得鹽為利國不匱而民亦足費益省而利益饒此李沆之良法也東萊文方其國初鈔鹽未行是時建安運置鹽倉乃令真州發運在真州是時李沆為運使運米轉入其倉空船回皆載鹽散於江浙湖廣諸路各得鹽資船運而民力寬此南方之鹽其利廣而鹽榷最資國用自蔡京秉政轉般法壞始則俾商賈入納於官而為鈔法以逺近為差終則俾商賈已納其錢而鈔復不用而折閲益甚此海鹽之法壞於蔡京之手蔡京秉政廢轉般倉立直達之法使商賈入納於官為鈔鹽法請鈔於京師商賈運於四方有長引短引限以時日蔡京専行罔民鹽法數十日一變鹽法既變則鈔鹽亦不可以用商賈既納錢之後鈔皆不用所以折閲甚多國初解鹽通商陜京為便商以納錢之鈔輸貨務官以給鹽之鈔在解池公家無輦運之勞民用無泥沙之雜契丹以鹽奪課則防之西夏以鹽入界則禁之公私通融君臣便利此盛度之良謀也舊制陜西三十五州軍京西十州軍許民買解鹽餘皆榷之慶厯元年議者以輦運之役困於軍民不若商旅入錢散鹽上命盛度與三司議之度請以見錢輸在京榷貨務就地給鹽其利有五方禁商時官自輦運兵兼疫勞今無此弊一利也始以陸運既差貼頭又役軍戶今悉罷之二利也舟運有沉溺之患兼又侵盜雜以沙泥今得真鹽三利也錢為富家多藏公商嵗出緡錢五千餘萬頗助經費四利也嵗減監軍人畦夫役作之給五利也上從之遂詔弛三十一州軍榷推而行之又呂文解池有契丹西夏之鹽相雜解池鹽味不及西夏價直而西北又賤所以沿邉多盜販二國鹽以奪解池國家當措置關防徽廟初雨水不常圍塹不密守者護視不固為外水參雜不復成鹽所以大失課利自蔡京解之鹽法盡廢而滄之鹽價復踴西北之鹽鈔多剩而榷務之錢鈔復阻况以雨水不常地力消耗此解鹽之法復廢於蔡京之手大觀四年初舊法以六路軍須給鈔於邉募商入中其鹽即赴解池錢即赴榷貨務支復以都茶場引錢課利輸榷貨務軍民便之至蔡京聚錢中都進羡要寵及先變鹽鈔錢鈔為二改鹽法廢解池行滄鹽於西北鹽翔貴又地界逺故西北鹽鈔多剩至錢鈔則榷貨務艱澀百端商旅不行始以軍糧須費科之於民及弓箭手至是張商英以為言詔復舊法餘見上祖宗以庸蜀僻逺恩澤鮮及貢入常多故不忍以鹽謀利而重困之卭州一旦減鹽井之課至一百萬此王堯臣力言蜀井之不可榷也慶厯六年益梓䕫三路轉運使皆乞增鹽元課王堯臣不從上問其說對曰庸蜀僻逺恩澤鮮及而貢入常多民力由此困朝廷既未有以恤之而又牟利焉是重困也上善其對五月減卭州鹽井課嵗額緡錢一百萬長編夫何王宗望小人以商賈之利而損國家之體庸蜀之鹽始榷矣元豐四年䕫州路轉運使王宗望乞就成都置鹽榷司而兩蜀産鹽之地置場其井鹽盡榷之官然後售之於民祖宗以河北自安史之亂藩臣竊有其利因而以鹽定稅固無再榷加以河北鹵地彌望非如蜀井解池立墻塹以封守熬波即成非如南方瀕海待煎烹而易察此張方平痛論河北不可榷也慶厯六年三司使王拱宸言請榷河北鹽三司更立榷法未下張方平見上曰河北再榷鹽何也上曰始立榷法非再也方平曰周世宗以河北鹽課均之兩稅今兩稅鹽鐵是也豈非再榷乎上大悟立罷之又呂文惟是河北之鹽自安史亂河北一路緣藩鎮據有河北鹽後因而以鹽定稅所以河北一路無榷鹽仁宗時議者要禁榷仁宗不肯神宗時荆公章子厚亦欲禁榷神宗亦不許自後章子厚為相方始行禁榷犯者甚多盜賊甚起河北所以不可禁兼河北之鹽又與其他不同如井鹽官可知一井故井鹽可榷如解池之鹽毫釐封守亦可禁榷海鹽亦待煎起爐閉爐非一旦所成官司又勤禁察亦可禁榷淮河北鹽是鹵地其地甚廣非如井池可以為篱塹封守又却才煎便成非如海鹽必待煎煮可以禁察所以最易得犯禁自章子厚禁榷河北一行靖康之末盜賊滋多矣夫何子厚奸臣以箕斂之法而為固寵之計河北之鹽始再榷矣見上此國朝鹽法沿革之大略也愚嘗因是而思之天下不可一日無儒者之論也何者君子之為國計為公而不為私小人之為國計言利而不顧義自公私不兩立義利不相合而天下之正論廢矣齊之鹽策不行於太公之時而行於管仲圗伯之日漢之鹽榷願罷於賢良文學之口而力行於桑孔小人之說此猶可也國朝淮鹽之法李沆以公行之而便蔡京以私行之而病解鹽之法盛度以義行之而利蔡京以利行之而弊庸蜀之鹽王堯臣不之榷而王宗望榷之河北之鹽張方平不之榷而章子厚榷之君子小人其枘鑿也如此彼小人者不過以規利為逺謀以富國為大功而國家之重計生民之大業彼何知焉古今之所以為民禍者未有不由小人之誤國信矣夫天下不可一日無儒者之論也錢幣堯鑄錢於歷山以遭洪水而鑄也湯鑄錢於莊山以遭大旱而鑄也堯遭洪水以歷山之金鑄錢救人湯遭大旱以莊山之金鑄錢出後魏高謙之表嗚呼錢幣之來久矣聖人特為水旱權宜之設未嘗倚之以為經常之用也至周太公立九府圜法而國家之經用始資焉錢圜函方輕重以銖而錢之制以定利於刀流於泉而錢之用以通錢之為用昉乎此歟太公為周立九府圜法黃金方寸而重一斤錢圜函方輕重以銖布帛廣二尺二寸為幅長四丈為匹故貨寶於金利於刀流於泉布於布束於帛出漢志嗟夫六府養民金居其一利用厚生日用資焉書此天地自然之利何假夫鑄金為錢而後為利哉聖人裁成輔相懋遷化居鑄金以救民於水旱之餘是亦因所利而利之即斫木為耒以濟天下之義也易然輕重相權之法猶未若是之紛紛也景王當周之季欲更鑄大錢而單繆公始有子母之說雖繆公之言弗聽太公之制遽更而勸農振乏百姓利焉周景王二十一年將更鑄大錢單繆公曰不可古者天降災戾於是乎量資幣權輕重以救民民患輕則為之作重幣以行之於是乎有母權子而行民皆得焉若不堪重則作多輕而行之亦不廢重於是乎有子權母而行小大利之今王費輕作重民為其資能無匱乎弗聽卒鑄大錢文曰寶貨肉好者有周郭以勸農贍不足百姓蒙利焉出國語漢志自子母之說肇於繆公後世於是有輕重之制有直當之法由周而唐迭更迭變而民病之君子考論之故作俑之由舍周景之君臣其奚歸雖然亦嘗考論夫輕重直當之始末矣秦之錢質如周秦之不周君子知其故也秦兼天下幣為三等黃金以鎰名為上幣錢銅質如周同上漢興何為是紛紛者高帝懲秦重幣之餘而鑄策錢已不免有輕重之意未幾高后以其太輕而重之於是有八銖之行高后二年行八銖錢應曰本秦錢漢以其太重更鑄策錢民患其太輕故行之出本紀文帝以其太重而輕之於是有四銖之改本紀五年自時厥後或輕而三銖建元以來用少更鑄三銖錢重如其文出食貨志或重而半兩文帝時鑄四銖錢其文為半兩食貨志八九十年之間錢幣屢更而農商俱病以聖人救民之具而卒為病民之端抑何不思之甚耶蓋至於武帝元狩五年罷半兩而鑄五銖元狩五年詔罷半兩錢而行五銖錢本紀雖變於新室而光武中興復還武帝之舊建武十六年始行五銖錢以其輕重適中故也自五銖之行多之不加輕少之不加重則三官之鑄至元始中積至二百八十億萬武帝元鼎二年初置水衡都尉掌上林其屬有上林均輸鑄官辦銅令三官自元狩五年三官初鑄五銖至平帝元始中成錢二百八十億萬餘漢志豈非五銖之制久而無弊歟魏人或罷或立然亦不能變五銖也魏文帝罷五銖錢以榖帛為市買至明帝太和間復立五銖他如蜀之直百蜀先主拔成都軍用不足劉巴曰此易耳但當鑄直百錢帝從之晉志吳之當千吳孫權赤烏元年鑄當千錢徑一寸四分重十六銖晉志愈變而愈重晉之四分沈郎晉元帝過江輕重雜行大者謂之比輪中者謂之四分吳興沈充又鑄小錢謂之沈郎魏志宋之來子荇葉宋廢帝時有來子荇葉之名愈變而愈輕甚而曰鵝眼曰綖環入水不沉十萬不盈一掬宋廢帝時錢一千長不盈三寸謂之鵝眼劣於此者謂之綖環入水不沉十萬不盈一掬斗米一萬商賈不敢行由三國歷南北以至於隋錢之名制不一而足至有稱錢之令北齊天下之市各置稱於市門私鑄不禁但重五銖然後聽用之有置用之法隋京師及諸州邸肆皆令立榜置樣為准不中樣者不入於市此輕重迭更之弊也唐興亦可以監矣何當直之法猶沿前代而未能一洗其輕重迭勝之弊哉夫當直之法始於漢武京師赤仄之制漢武帝時郡國鑄錢民多奸鑄公卿請令京師百官鑄赤仄一當五通典自漢以後以一當兩宋元嘉二十四年江夏王義恭建議請以大錢一當兩出南史或以一當十梁敬帝太平二年改四銖錢一當十同上甚至以一當千周宣帝大象元年鑄永通方國錢以一當千出隋志夫物之不齊物之情也自天一地十生成之數既定纍一至十纍百至千秩然之數不可躐取如舉一可以當十則天地生成之道息矣夫何唐人不明此理猶踵其弊而不之改耶武德八分之行是也唐高祖武德四年初行開元通寶錢徑八分重四銖三絫輕重小大最為折𠂻逺近便之通鑑未幾乾封之鑄以一當十高宗乾封元年鑄乾封泉寶徑寸重五銖六分一當十通鑑唐書自高宗貽謀之不善先後嗣子孫法愈出而愈弊試以肅宗之時觀之乾元之錢一也徑寸者當十而寸二分者當五十一寸之徑與寸二分之徑均之為錢何為是之差别耶問之則曰重稜之不同自重稜之法既出於是民間之錢大而重稜者亦號重稜法既多端物價翔踴不得已而定減其直上無定制下無定從於是民間交易錢有虛實之名矣肅宗乾元元年經費不給鑄錢使第五琦鑄乾元重寶錢徑一寸每緡重十斤與開元通寶參用以一當十亦號乾元十當錢第五琦為相復命絳州諸爐鑄重輪乾元錢徑二寸二分其文亦曰乾元重寶皆有外郭為重輪每緡重二十斤與開元通寶並行以一當五十是時民間行之錢大而重稜者亦號重稜錢法既屢更物價騰踴上元元年減重稜錢以一當二十開元舊錢與乾元十當錢皆以一當十典莊展碓等交易當用當十錢由是錢有虛實之名唐志㑹要終唐之世經費不給則議鑄見上注兵役不支則請鑄唐自淮上用兵役錢益少鍾模請鑄大錢一當五十通鑑或以一當二或以一當三代宗即位乾元重寶錢以一當二重輪錢以一當三唐志當五十者有之見上注當十大錢者有之同上此直當迭更之弊也嗚呼考論歷代之變更推究錢幣之始末堯不可及也湯不可及也由周而來僅有漢唐而輕重之迭勝當直之屢更其弊若此曷不廣鑄以濟其乏歟漢初猶有盜鑄之令至文帝弛禁放鑄雖以賈誼七福之說不能回帝之聽故吳鄧之錢布於天下富埒天子財過王者利權弛而不收孝文五年更鑄四銖錢除盜鑄錢令使民放鑄賈誼諌因陳七福之說上不聽是時吳以諸侯即山鑄銅富埒天子鄧通以鑄錢財過天子故吳鄧之錢布天下武帝禁郡國無専鑄禁之誠是也武帝禁郡國無鑄専令上林三官鑄錢令天下非三官錢不得行章帝罷之縱民自鑄利權收而復弛後章帝章和二年遺詔罷郡國鹽鐵之禁縱民煮鑄通鑑勢利人主之大柄其可弛之於下哉唐至元宗錢禁未弛也夫何放鑄之議雜起於張九齡之徒九齡曰放鑄是劉秩則曰放鑄非一是一非卒無定論止詔禁惡錢而已九齡固賢臣也五不可之說劉秩非不善謀惜九齡不之悟而元宗不之聽也唐元宗開元二十二年宰相張九齡建議宜縱民鑄錢參軍劉秩言五不可於是下詔禁惡錢而已唐志惟我國家監前代已往之弊故鼓鑄之權操之於上而不縱之於下饒之永平仍於唐池之永豐置於至道江之廣寧置於咸平韶之永通置於景德而䖍之鑄錢院又置於大觀並中興小厯此鼓鑄之地也國初平江南嵗鑄七萬緡天聖中嵗鑄百餘萬緡慶厯中至二百萬緡熙寧中多至六百萬緡此鼓鑄之數然也國初平江南嵗鑄七萬貫自後稍增廣至仁宗天聖十嵗鑄一百餘萬貫慶厯間至二百餘萬貫神宗熙寧已後六百餘萬貫國初錢文曰宋元通寶自淳化改元御書淳化為文是後每改元必為之更鑄通略太宗淳化元年國初錢文曰宋元通寶太平興國後又鑄太平通寶是嵗上親書淳化通寶自後每改元必以為文仁宗嘉祐有折二之令嘉祐四年以陜西民間多盜鑄大錢於是以見行當三大錢折小銅錢二謂之折二錢慶厯有當三之請慶厯二年鄭戬請廢當十錢以一當三至今賴之當三雖請於鄭戬而未鑄也至崇寧而始鑄焉徽宗崇寧二年鑄大銅夾錫錢以一當三餘見上注折二雖鑄於陜廣而未行也至熙寧而始行焉熙寧五年三司言奉詔折二錢可且未得支用别聽指揮先是薛向鑄折二錢於陜西其後許彥又鑄於廣南以償銅價既而有言折二錢民不肯折用上批欲罷之中書言無是律上曰恐四夷聞中國行兩等錢以為貧窘乃傷國體何如安石曰錢有二品自周已然何係貧富上乃復行之此折當之始末也雖當時行之傷及國體見上注然三品之錢至今便之豈非我朝之良法歟夫我朝鼓鑄之地如此其廣鼓鑄之數如此其多錢之流衍又如此其盛而錢幣日削可不推原其故歟蓋有利之源有利之權利源之消長在天地利權之操縱在人主自熙寧間一罷銅禁奸民日消錢為器而邉防海舶不復譏錢之出張文定公墓志公在熙寧間論錢禁自王安石為政始罷銅禁奸民日消錢為器邉防海舶不復譏錢之出故中國日耗以畎澮之益而供尾閭之泄張公方平雖力言之無益也張方平疏云今日之法將操其權於上乎抑縱其權於下乎側聞中興以來嵗鑄以五十萬為額而虧額猶多止及十萬比之祖宗所入至少也紹興二十二年初諸路嵗鑄銅錢一百六十萬自紹興以來權以五十萬為額而虧額甚多止及十萬一千貫而當時斂散闔闢不聞乏用究其所以則滲漏之法罪及主吏紹興中宣諭官言二廣邉郡透漏銅錢應帥臣監司守卒巡捕當職官失察者乞比犯人減等坐罪鉟銷之禁責及士大夫紹興中臣寮言民以錢十文得銅一兩鑄為器皿可得五十文士大夫之愛竒者百計以蓄以為玩好乞嚴鉟銷之禁紹興之制可覆也錢寶之泄以軍法論乾道六年詔淮南運司如般載錢寶一貫以上依軍法施行銅器之禁刻之事板淳熙八年上曰朕以宰牛禁銅器及金翠等事刻之記事板每京尹初上輒示之乾道淳熙之制可覆也今日惟申嚴紹興乾道淳熙之禁足矣詩云不愆不忘率由舊章上之人盍致思焉楮幣古者劵幣造於下而行於下故聽於民之自便後世劵幣造於上而行於下故貴於君民之俱便夫法無精粗便民者良論無當否便民者至君上之立法臣下之議法求便於民可也果何計於君哉蓋自後世以劵幣而權錢錢之與楮相為消長此劵幣之通塞國計命脉之所繫民生利疚之所關焉故必貴於君民之俱便也愚嘗考論其始末而後知劵幣造於下而民自便者周也劵幣造於上而君民之俱便者漢與唐也雖其名號之不同其實則一而已周官小宰以官府之八成經邦治四曰聽稱責以𫝊别識者謂𫝊别劵書也蓋民間私相稱貸以為符驗而小宰特聽之而已禮小宰以官府之八成經邦治四曰聽稱責以𫝊别鄭司農云𫝊别謂劵書也聽訟者以劵書决之𫝊𫝊著約束於文書别别為兩兩家各得一也正曰今之劵書也故曰古者劵幣造於下而行於下故其用聽於民之自便者此也由周而漢自漢而唐有所謂皮幣漢志武帝以公上之用不給於是造白鹿以為皮幣有所謂飛錢唐志憲宗令商賈至京師委錢諸道進奏院使富家以輕業趍四方合劵乃取之號飛錢皮幣造於武帝事見上飛錢造於憲宗事見上一以濟公上之不給一以便商賈之懋遷而公私兼濟焉故曰後世劵幣造於上而行於下故其用貴於君民之俱便者此也夫曰𫝊别曰皮幣曰飛錢皆所以權錢之輕重然則楮幣之端緒豈非始於此歟國家開寶中在京有便錢務開寶太祖年號天禧中建州有便錢務天禧真宗年號而乾德中又有交引之制太祖乾德二年募商人入粟麥材木於邉郡給文劵謂之交引然楮幣則始於蜀也真宗祥符中張忠定公鎮蜀患鐵錢之重不可貿易於是設質劑之法一交一緡以三年為一界而换之寶訓至仁宗天聖初薛田請置交子務以權出入於是始置益州交子務長編仁宗天聖元年寇瑊守蜀乞廢交子不復用㑹瑊去而薛田代之田請官為置務詔從其請始置益州交子務然行於蜀而未行於外也熙寧中欲行於河東以莫若之言而罷寶訓神宗熙寧中因高遵裕等言欲行於河東轉運使莫若言今交子法行商販必不肯中納糧草不然有害邉計亦恐鹽礬不售遂廢之欲行於陜西以張景寧之言而罷同上上因沈起言欲行交子於陜西而張景寧謂交子可行於蜀不可行於陜西將必民失業無以為生遂罷其後以條例司之議而各置務則散於外焉初張忠定公之始行於蜀也主以富民而官不與長編仁宗天聖元年初蜀民以鐵錢重私為劵謂之交子以便買易富民上大户主之其後以薛田張若谷之議而置務則始斂之於官事見上夫主以富民則聽民之自便是亦周人之意至於斂之於官則非周矣嗚呼古者劵幣以便民良法也後世因之而為國家之利亦未失也至於今也稱提無術劵幣不行非惟民病之國亦病之沿流遡源豈非錢重而楮輕乎天下之理多則輕少則重天聖創置之初一界一百二十五萬仁宗朝至紹聖則增為一百四十萬哲宗朝至元符則增為一百八十萬哲宗朝至建炎則增為三百七十萬高宗朝雖以辛巳用兵而中外之數僅餘百萬而上高宗朝蓋至淳熙間兩界共四千五百餘萬孝宗朝較之天聖則數十倍矣紹熙光宗朝慶元以後又溢至十萬之數向者止行兩界每界所印三千六百萬為率今增至三界則共有二億四千萬開禧臣寮奏劄其多若此幾何而不輕乎以方寸之楮飛錢致逺不積錢以為本不能以空文行此富公弼所以為神宗言也經濟富公弼上神宗言以方寸之紙飛錢致逺欲不積錢為本亦不能以空文行今商號鄜耀洮崖清逺鐵冶所收極廣茍即以更鑄折二錢嵗除吏費外可得百萬緍為交子本并上可行十二事故紹興間陳季若請行交子於諸路我高宗詔於都茶場置㑹子務撥左藏錢一十二萬貫為本㑹要紹興末陳季若請行交子法於諸路其後上用錢端禮言行於東南三十一年設於都茶場置㑹子務撥左藏錢一十八萬貫為本有本如是楮其不重乎今交子之行通於江淮福浙一夫可以賫千萬緡而無關津譏征之患無變易輕貨之勞其於民亦可謂便矣然今之民往往重錢而輕楮者何哉曰斂散之無術也今日講求其斂散之術將求諸錢乎抑求諸楮乎抑亦錢楮之相權乎在昔楮劵之行於蜀賤則官出錢以斂之貴則官出楮以散之使居者以藏鏹為得行者以挾劵為便是故州縣之折納四方之征商坊場河務之課息不責其錢不拘其楮是錢重而楮亦重今則不然中半之法行於出而不行於入元陌之令行於近而不行於逺朝廷未嘗不嚴出納之禁矣而巧為名色邀阻者自若也未嘗不嚴殿最之課矣而虛數僞冒罔上者亦自若也門關之外便同隔江上下皆知置而不問輦轂之下尚乃如此何責於外郡乎若是則今日斂散之䇿當如何必如孝宗之出內帑金帛以收换則可重必如孝宗綱運許中半入納則可重孝宗聖政發內帑金帛换㑹子藏於內庫者四百萬行於民間者二百萬進呈淮東西兩總領各乞以金銀兌换㑹子支遣上曰綱運既以㑹子中半入納何故缺少不然則得守臣如趙開者用公錢以收之則可重茍舍是而他求焉殆非敢知也古今源流至論續集卷四
