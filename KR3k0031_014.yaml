body:
  text: 古今源流至論後集卷四宋林駉撰浙江潮海潮強弩射潮江流為東則論水患者歸之天理五代史錢鏐以強弩射潮潮水東流負薪塞流河不為溢則論水患者責之人力漢武帝自臨决河令羣臣從官自將軍以下皆負薪寘决河下淇園之竹以為障於是卒塞夫五事既正行無汨陳一徳脩明水循故道嶽瀆之鬼神受職河海之波濤不驚此固天理之所存若非人為之能與然蔡墨擾龍之對必謂水官當宿其業以脩其方左昭二十八年秋龍見于絳郊魏獻子問於蔡墨曰云云夫物物有其官官脩其方朝夕思之一日失職則死及之失官不食官宿其業其物乃至其泯弃之物乃抵㐲欝湮不育故有五行之官是謂五官子産言宣汾洮障大澤之功亦歸之臺駘能業其官者以見古人不泥茫昧之數而必謹脩治之職也如此左昭公一子産曰昔金天氏有裔子曰昧為元冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處太原帝用嘉之然則浚治道滌之事曽謂無益而不講乎嘗觀漢武帝時河决瓠子東南注鉅隨塞隨壞議者皆謂江河之决人力不可強塞也其後自臨决河羣臣從官皆寘力焉果卒塞之築宫其上而瓠子之水息矣漢溝洫志孝武元光中河决於瓠子東南注鉅野通於淮泗上使汲黯鄭當時興人徒塞之輙復壞時田蚡為相言於上曰江河之决天事未易以人力強塞後二十餘歳梁楚之地尤甚於是上臨决河湛白馬玊璧令羣臣乃從官自將軍以下皆負薪寘决河下淇園之竹以為障作歌曰瓠子决兮将奈何浩浩洋洋慮殚為河云云於是卒塞瓠子築宫其上名曰宣防而道河北行二渠復禹舊迹成帝初河决館陶浸滛數郡民益不利議者謂一川兼受數河雖髙増堤防不能泄也其後王延世編竹寘石兩船夾載而下之三十六日河堤告成而館陶之水治矣成帝即位清河都尉馮逡言令屯民河塞靈鳴犢口又益不利獨一川兼受數河之任雖髙増堤防終不能泄後三歳河果决於舘陶河堤使者王延世使塞以竹落長四丈大九圍盛以小石兩船夾載而下三十六日河堤成以五年為河平元年推原其由漢猶近古尚有水官宿業之意有都水長丞有河堤使者有渭水司空外此又有陂官雲夢等官漢百官表上領水之職盖非一人此所以不慮决溢之害嗚呼天下安有難圖之事哉亦安有非人力所致哉然此特河流之决耳嘗考之史傳海潮衝溢其患尤難顯慶中括州海溢溺者九千餘人唐五行志顕慶元年九月括州暴風雨海水溢漲六月括州大風雨海溢壊永嘉安固二縣溺死者九千七十人上元中青州海溢漂者五千餘家上元三年八月青州大風雨海溢漂居人五千餘家同上永貞中宻州海溢至有毁城之决同上永貞十一年六月宻州大風雨海溢毁城云云海之為患尚矣至若兩浙之地襟山𢃄湖廣袤無幾浮沫蔽江洪濤浴日豈能無穿齧之慮故大厯海溢杭州同上大厯十年七月杭州海溢寳厯海溢㑹稽同上寳厯二年夏越州大風海溢光化間浙江又溢壞居民者甚衆同上光化三年九月浙江溢壞居民甚衆噫可畏也然讀瓠子之歌見上誦黄樓之賦蘇公守徐河决曹村公親入武衞營曰事急矣宜為我盡力増築城為木岸遂作黄樓賦莫非歸功於隄防捍築之力此不可不講也曩時錢塘江岸率用薪土潮水衝擊屢築屢毁景祐中轉運張夏命作石堤以防江潮於是無怒濤之衝長編曩時湖水失利取給江潮潮多入市民甚病之元祐中杭守蘇軾浚茅山一河受江潮浚塩橋一河受湖水於是免市淘之潮蘇文忠公墓誌杭本江海之圮水泉鹹苦唐刺史李泌始引西湖水作六井民足於水及白居易復浚西湖淤水入運河自河入田所溉至千頃然湖水多淤乆廢開治至是積二十五萬餘丈而水無幾矣運河决湖水之利取給於江潮潮濁多淤河行闤闠中三年一淘為市井大患而六井亦幾廢公始至浚二河以茅山一河受江潮以塩橋一河受湖水復造堰閘以為河水蓄洩之限然後潮不入市杭人名其堤曰蘇公堤云以此言之大抵以人力勝也夫錢塘本江海之地自錢氏立國大城其地壘石以衞塘築岸以夷谷今之通闤𢃄闠即朝帆暮櫓之鄉向之魚龍出没為連甍接棟之所重以中興南渡六飛駐蹕馮夷海若頫首帖耳行都千里屹然奠枕百年無水菑矣雖曰清蹕所臨百靈陪扈然石塘雄峙鮫鰐避舍非天也人也比年以來海堤頺圮塩官居民凛凛朝夕遣廷紳以脩理命使者以相視悠悠歲月未有成說談禨祥者歸之時數之偶然崇詭異者委諸螭龍之擾害寡謀淺慮者又曰天河激湧地機翕張白浪黒沙下無根著有非人力之可致姑俟水勢之稍定嗟夫斷鰲立極猶藉人為湮谷塹山具存往迹獨不能以理輔智曲為障塞乎至有怠於拯溺者或欲築堤以折其怒或欲浚塘以殺其勢此其救患之䇿而未能行何也築堤之說近裏者為是而田之在堤外者則多方而沮之浚塘之說田之在東郷者為便而西郷者復以為不可人懐私意矛盾異論官吏惑之泛泛無謀是無怪聽其為魚也昔禹之治水先自冀始盖冀者尭所都之地有不可緩今嚙岸為患宻邇神京其可不亟圖之膺行河之寄者不得不任其責也雖然懐㐮湯湯不害至治天作大水宋其興乎左𫝊荘公十一年秋宋大水公使吊焉曰天作滛雨害於粢盛若之何不吊對曰孤實不敬天降之灾又以為君憂拜命之辱臧文仲曰宋其興乎此天心仁愛之意在謹徳以致和修政以治變可也今宜勉之國論劉元城先生曰唐虞三代與吾祖宗之時公論在上君相主之晩周東漢上之人不能主公論所用非其人於是公論在下誠哉是言也元城語録天下以為當然者謂之公論公論非強名乃天道也此道未嘗廢顧所在何如耳唐虞三代與吾祖宗之時公論在上君相主之晚周東漢上之人不能主公論所用非其人於是清議在下云云然在上則治在下則亂可以下之乎甚矣公議之存與天地相為終始春秋之征伐彼自征伐爾戰國之縱横彼自縱横爾秦自坑戮東都自黨錮三國自鼎峙晉宋以後自爾紛紛其存亡治亂之殊公議盖未嘗一日不存王陵之廷争雖不能定劉氏後致白馬之盟不寒者伊誰之力漢本傳程嬰杵臼全趙孤於艱難辛苦之中千載而下言者猶有生氣左𫝊嗟夫天下不可無公論固也然在上則治在下則亂在廟堂則享其福在草茅則受其弊元城為言確矣嘗試攷之虞夏盛時君臣一體片言之發則賡歌再拜當時所與同心而出治道者惟一二腹心大臣而已問之朝野朝野不知夫何所容其議此固不待言耳伊尹桐宫之事天下盖未嘗見也伊尹行之天下信之獨非公議素明於上耶書伊訓周公攝政之事四國固流言也周公任之諸大夫終服之獨非公議自不泯於上耶書周誥盖古者三公無職與王坐而論道自冢宰而下文章議論之吏無聞焉此大臣所以維持者甚至矣自厲王之過觀其詩則大雅之作秉國大臣有如穆公凡伯憂民勞板蕩等詩以言之而百官庶府尚不與聞焉詩民勞板蕩詩自幽王之變則小雅之作諸大夫誦過以言之而匹夫匹婦亦不至與議焉詩小雅自平王之遷王迹掃地則國風之作雖國人戌卒皆得昌言之而大雅小雅不復作焉詩國風黍離等詩陵夷至于六國之際處士横議王公卑禮議帝秦之論反主於匹夫魯仲連清議之口定六國之計皆係於說客蘇張反覆之舌通鑑周赧王紀古者君相之權安在哉髙祖之興削平煩苛專務簡易不遽引㧞戰國知名之人所以養成公論者不可謂不至傾心所聽惟將相二三功臣耳末年太子之廢雖出於四老人定之向非張良主於内周昌諸臣主於外則一介踈逺必不能以言為帝輕重也漢本𫝊曹參畧猜忌而遵蕭何之約束則卿大夫以下欲言而不敢言漢本𫝊陳平許其請以封諸吕之爵則大臣有口欲爭而不容爭漢本𫝊當時豪傑之士滿於山東游侠之流盈於閭里卒不敢輕議朝廷之事者以所主有人矣任侠傳以至大臣絳灌力斥少年紛更之請丞相衞綰請罷申韓蘇張亂政之學此則漢初功臣主張國論之力賈誼傳及衞綰傳自新進用事大臣見詘朔方之議屈於侍中公孫𢎞傳武帝東置滄海北築朔方之郡𢎞數諌以為罷弊中國以奉無用之地愿罷之於是上使侍中朱買臣等難宏置朔方之便發十䇿𢎞不得一乃謝曰山東鄙人不知其便流民之議屈於九卿石慶傳尊號之議屈於外戚王莽傳矯制之議屈於谷永陳湯傳卒養成天下謟佞之俗東漢雖有公議之名無預君相之事李膺范滂之徒一戰不勝公議敗績而漢鼎亦不復支然則公議在下而不在上豈天下之福哉東漢本傳元城所謂晩周東漢上之人不能主公論者豈不信歟國朝公論之權不在縉紳不在草茅凛凛於廟堂之上繁星麗天斗杓芒寒太山喬嶽屹然朝宗噫可敬也利害文字焚之通衢則太平興國之國論在趙中令邵氏聞見録趙普為相於㕔事坐屏後置一甕有人投利害文字皆置其中滿即焚之通衢李文靖沆為相凡建議務更張喜激昂者一切不用毎曰用此報國嗚呼賢相思慮逺矣王荆公為相置條例司論天下利害盡變祖宗法益信趙中令李文靖得為國之體也更張議論一切不行則天禧祥符之國論在李文靖見上借契丹兵朝廷許之卒奪於吕夷簡之一言家塾記契丹借兵伐髙麗明肅欲與之吕文靖公夷簡堅執不可后云適已微許其使矣不與恐生怨奈何公曰但以臣不肯拒之既而后語其使曰意非不與但以吕相公堅不可耳使人無語而去殺繼遷母樞府行之而終屈於吕端之一奏記聞保安軍奏獲李繼遷母太宗甚喜是時寇準為樞副吕端為宰相上獨召凖與之謀凖退自宰相幕次前過不入端使人邀至幕中曰向者主上召君何為凖曰議邉事耳端曰陛下戒君勿言於端乎凖曰不然若邉鄙常事樞宻院之職端不敢與知若軍國大計端備位宰相不可以莫之知也凖以獲繼遷母告端曰君何以處之凖曰凖欲斬保安軍北門之外以戒餘逆端曰陛下以為何如曰陛下以為然令凖之宻院行文書耳端曰必若此非計之得也願君少緩其事文書勿亟下端将覆奏之即召閣門吏使奏宰相吕端請對上召入之端見具道凖言且曰以臣之愚謂宜置於延州使善養之以招徠繼遷雖不能即降終可係其心而母死生之命在我矣上稱善曰微卿幾誤我事澶淵之役王欽若言之陳堯叟又言之而冦萊公獨立赤幟確然不揺也記聞冦萊公從上在澶淵王欽若請幸金陵陳尭叟請幸蜀上以問公時欽若堯叟在旁公心知此二人所為陽為不知曰誰為陛下畫此䇿者可斬也今敵勢慿陵陛下當率厲衆心進前禦敵以衞社稷奈何委棄宗廟逺之楚蜀耶上悟乃止濮園之議臺諌爭之禮曹又爭之韓琦壁立萬仞屹然不變也長編治平二年詔議崇奉濮安懿王典禮范純仁與吕大防合奏曰豺􅀈當道擊逐宜先如宰相韓琦初不深慮欲累濮王以不正之號司馬光曰為人後者為之子不敢復顧私親王珪議濮王於仁宗為兄皇帝宜稱皇伯而不名中書奏按儀禮為人後為其父母服所繼所生父母皆稱父母王珪等議稱皇伯於典禮未見明據司馬光言向者詔議濮安懿王典禮王珪等以為宜如封贈期親尊屬故事凡兩次㑹議無一人異辭者欲奉濮王以私也而政府欲尊為皇考誤惑聖聽二年皇太后手書令皇帝稱親諱避濮安懿王名下一字置園令一人從中書之請也元祐革弊之議朝論洶洶或說以異日朋黨之禍范鎮遺事元祐初鎮再致仕宇文邦彦問公不起之由公曰事有太甚者恐他日為朋黨之禍予先使語君實不吾信也或告以不可為暴革之患范純仁與司馬光素有間行差役法純仁以為凡法不可暴革乃言於光且先行一時俟見其利害可否漸而推之光不聼純仁曰又一王介甫矣温公拯溺救災不暇他恤元城語録盖中流砥柱萬折必東也方國朝公論始出之時初是者什三後是者什八又其後則人人心服皆以為當嗚呼公議之不可泯也如此夫元城所謂唐虞三代與吾祖宗之時公論君相主之又豈不信歟雖然主張國論大臣責也正救大臣臺諌責也古者命卿論士鄉老以三公之貴而進退其間盖公議雖主於大臣而必酌於衆見也是以國朝失在廟堂救在臺諌此朝廷所以清明有道之際廟堂似過舉矣全臺論列不曰黨同扣鐶大呼不曰肆志大臣竦然知有公議之不可犯明道二年郭皇后見踈吕夷簡以前罷相怨后范鎮言后無子當廢夷簡賛其言先敕有司無得受臺諌章䟽仲淹孔道輔孫祖徳蒋堂郭勸馬絳叚少連宋祁劉渙詣垂拱殿門伏奏門者闔扉道輔扣銅鐶大呼夷簡奏臺諌伏閣非美事乃逐道輔等熈寜之間廟堂輕變更矣御史面折不為假借程顥嘗言熈寧初王介甫行新法並用君子小人君子正直則以為俗學而斥去小人謟佞則以為才能而進用如司馬光不拜樞宻而去范尭夫辭脩注得罪張天祺自御史面折介甫被責君子去則所用皆小人諌官納敕不為狂躁時范鎮諸人以争論新法皆納敕而去大臣悔艾亦知為小人之所誤荆公晚年為吕惠卿所叛始悔用惠卿之謀鍾山題福建子三字識之夫以國論一出廟堂主之臺諫正之百官庶府布衣匹夫尚復何議哉不然永樂之舉滿朝不言神宗朝永樂城之䧟夏人决水以灌吾壘時吕惠卿所薦徐禧築永樂城夏人破之死者千餘萬帝嘆曰永樂之患無一人言其不可者聞見録燕雲之役羣臣不議又奏議陳公輔言本朝禍變其弊實在尚同客曰崇觀宣和間王黼童貫有燕雲之謀致金人踐蹂中國今歸咎尚同毋乃不然曰熈寜以来權臣用事創立新法期於必行故天下靡然尚同至崇寜間蔡京挾紹述之說蔽欺聖明恐脇臣下凡有異議謂之詆毁先烈動揺國政故忠臣義士鉗口結舌尚同之弊甚矣遂使王黼童貫敢為燕雲之謀者特此而已矣有欲尊崇濮安懿王此特於禮經不便當時吕獻可范景仁等七八人交口攻之豈有通謀金人背祖宗盟約廢邉境守備而舉朝羣臣無人敢言者至今言之令人憤激此則可憾也噫戒之哉國勢人皆曰國勢貴乎強君子曰國勢貴乎重人皆曰國勢惡乎弱君子曰國勢惡乎輕夫強與重異弱與輕殊強弱形也輕重勢也弱之弊者臣下狃於寛而玩吾法吾民習於寛而玩吾治不過積寛之過而已矣輕之弊者柄移於臣下而朝廷䙝政出於小人而紀綱紊其患有不可勝言者嘗謂形雖弱而勢重者周也形雖強而勢輕者秦也方周之治過乎弱河洛頑民三紀不服民無畏心也洛誥三監有變反曰艱大臣無警心也金縢似鄰於不振矣而八柄馭群臣凛然有不可干之意大臣統内朝而近習無預政之嫌勢之重者自若也周禮太宰及秦之治尚乎強以兵威服諸侯以財粟富京師以刑威劫群臣以焚詩書尚法律愚天下之民若幾於自振矣而盜賊羣起得以輕朝廷之勢陳勝集閹宦自恣得以輕政事之權趙髙形之強者果何益哉周之弱形正如君子長者其勢不能與強者争不害為大體秦之輕勢正如巨室不能自立而納侮於僮僕尚謂國足恃乎國朝立國之勢自建隆立極以來臣民習於寛厚風俗狃於治安天下之勢近於委靡而不振朝廷之制幾於廢弛而不舉兵驕士弛吏玩財困積弱之弊識者痛之元城語録神廟必欲變法者盖有說矣祖宗以忠厚治天下至於嘉祐天下之事似乎舒緩委靡不振當時士夫亦自厭之其實根本牢固至神廟見朝廷州縣多舒緩不及漢唐毎與大臣議論悚然有不悦色當時識者以為方今天下正如大富家上下充足但有僕妾遲鈍不敢改革是故何郯以總攬威柄之說進何郯言方今之政令不舉盖失於寛之漸也以陛下聖明之資加有祖宗典刑具在但當總攬威柄以奮乾剛之斷余靖以自攬威權之說進余靖言當今為陛下計但能天子自攬威權大臣公行賞罰沮夷狄之氣塞盗賊之源宋綬曰攬威柄綬猶郯也明道二年宋綬言帝王御天下在攬威柄歐陽脩曰執威權脩猶靖也慶厯三年歐陽脩言内外臣庶尊陛下如天若一旦赫然執威權以臨之則萬事皆辦然寛厚仁愛之心不揺於群臣紛更之請忠信誠慤之實不悔於吏民玩治之餘寜受夷狄之侮而終不忍用生民之命寜容臣下之欺而終不忍失君上之體寜寄爪牙於連營坐食之兵而終不忍役不教之民寕使小人盗賊之負我而終不忍一毫負天下也列聖用心之寛如此其為弱也亦宜然根本所在甚於泰山四維之固大勢所歸凛然有太阿出匣之狀國勢既重弱何病焉此祖宗不貴乎強而貴乎重也然則重之之勢何如哉曰權在人主則國勢重公論在朝廷則國勢重政事在君子則國勢重是故祖宗之置參貳以分政柄防權臣也國朝乾徳四年太祖已相趙普畏其專将擇官以為副而難其名稱召陶穀問曰下丞相一等有何官對曰唐有參知機務參知政事今可用之遂命薛居正吕餘慶為參知政事分樞筦以掌兵柄防叛將也范祖禹言祖宗兵法本於樞宻有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權彼此相維不得專制此所以百三十年無兵變也詳見兵權臺諫論事慷慨敢言防壅蔽也子由龍川志張安道為予言自設六科以來士之翹俊者争論國政長短其始也范諷孔道輔范仲淹以才能為稱首其後晏元獻為政富鄭公參政事多置諫官乃用歐陽脩余靖蔡㐮孫沔為諫官諫官日横鄭公尤傾身下士上以謙虚為賢下以敖誕為髙於是朝廷輕矣銀臺封駁不畏權要防專切也淳化四年太宗從魏羽請命魏庠柴成務同知給事中事制敕有未便許封駁未幾以給事中封駁𨽻通進銀臺司分命監司紏察州縣防末大也乾徳以後僣偽略平始景置轉運使按察帶御史徳四年置提刑熈寕二年差官提舉常平元祐初罷紹聖九年復置天子不必攬權而權在君上矣北辰居所衆星拱之國勢其不重乎然而人主之權不能自重也所恃公論在朝廷耳故自慶厯盛時責成輔相雖若威權之少弛而言路風采肅然加於奸邪之頸仁宗朝諫官韓縝論政事錯繆以宰相非其人堯佐與王隨同罷又夏竦拜樞時十八䟽斥之治平之間政在冢宰雖若廟堂之太重而御史一䟽直攻其䟦扈之態治平間韓琦定䇿拜相名望隆重御史中丞王陶抗䟽極言琦不押班為䟦扈熈寜以來信任柄臣雖若國體之少變而力爭新法之臣不加罪也王安石行新法時臺諫給舍皆言其失如司馬温公蘇東坡吕公著范純仁皆辨之元祐之初簾帷立政雖若乾剛之未充而朝廷之公論不可犯也元祐初宣仁后垂簾蒞政時司馬光吕公著劉安世諸賢變熈豐弊政時有慶厯之治宰相臺諫主公論而公論在朝廷矣泰山喬嶽屹然朝宗國勢其不重乎然而朝廷之公論亦不能常存也所恃以存者君子常親而小人常逺矣故待大臣儒生之情親而待宦官近習之情踈在講筵師席之時多而在深宫禁宻之時少不以閹宦預機宻官制舊典皇朝革唐五代宦官驕横之弊不使典衞統兵干預政事但專任其本職而已不以戚里參政事至和元年樞宻使彰徳節度同平章事王貽永数以疾求罷本朝外姻未有輔政者貽永在樞宻十五年常逺權利兵權付之將帥而去内臣監軍之弊長編治平元年吕誨上英宗云聞陜西四路各差中官一貟充鈐轄自唐以來舉兵不利未有不自於監軍者奈何又増此貟政令出於三省而無中㫖内降之私趙抃言陛下李仲昌之罪状宣諭中書行之可也付樞宻院治之可也奈何事從中出張皇大獄驚駭外議雜流不列於清貴之聫官制舊典云舊制状元初為将作監丞一滿遷右司諌起居舍人兵部員外郎三人及第及制利一任囬自太常博士遷祠部度支司封員外郎進士出身自太常博士屯田都官職方員外郎世賞自國子博士轉虞部駕部貟外郎雜流自國子博士轉水部司門庫部貟外郎貂璫不加以節越之寵王守忠疾求為節度使梁適曰宦官無除真刺史况真節度乎上曰朕嘗許矣適曰除節度死有餘責肆夏鸞和鄭聲自逺國勢其不重乎祖宗惟不恃其可畏之威而恃其可重之勢故逺方不畏其兵而畏中國之有人小人不畏其刑而畏君子之公論倖臣近習不畏其法而畏朝廷之紀綱西蕃悍於邉陲而屈服於王文正之一言王旦言行録本傳狄青嘗將百萬精兵而膽落於王文忠之清議王堯臣傳時樞使狄青以軍功起行伍居大位而士卒多屬目徃往造作言語以相扇動人情以為疑而青色頗自得公嘗以語衆折青為陳禍福言古将帥起微賤至富貴而不能保首領者可以為鑒戒青稍沮畏王守忠姦邪反覆群臣百計不能去而俛首於韓公之竄聞見録英宗即位有疾光獻皇后垂簾同聽政有入内都知王守忠者奸邪反覆間諜兩宫司馬温公知諌院吕諫議為侍御史凡十數章請誅之韓魏公一日出空頭敕一道參政歐陽公已簽書矣參政趙公槩難之問歐公曰何如歐公曰第書之韓公必自有説魏公坐政事堂以頭子勾守忠著立庭下数之曰汝罪當死責蘄州團練副使蘄州安置取空頭敕填之即日押行乃治平元年八月也契丹桀驁陸梁中國兵甲不能服而寒心於司馬之相元祐初司馬温公入相遼人敕其邊吏曰中國相司馬矣謹母生事開邉隙夫聖朝之所以服四方威強暴戢近習豈其力必可以制生死之命哉君上有大權朝廷有公論天下有君子而已今日欲重國勢當以祖宗之已行者而為法云君子君子之名何始乎三代以前無有也直道之行誰毁誰譽至治之世人人有行天下隂受君子之功而不知有君子之名甚哉君子之名見於世非君子之福也何者名者天下之令名非惟人情不堪造物亦不吾堪耳吾而以君子自處孰肯以小人自名此君子之名人以為幸而君子以為不幸也漢初天下未嘗無君子而當時未嘗指名其人也雖尊顯於髙祖涵養於孝文收拾於武帝而天下安有君子小人兩立之形哉自望之輔政劉向繼用周堪更生諸賢亦彈冠相慶於是有用君子之迹然亦未盛也石顕傳初元中前将軍蕭望之及光禄大夫周堪宗正劉更生皆給事中望之領尚書事知石顕專權邪辟建白以為尚書百官之本國家樞機宜以通明公正處之請罷中書之官應古制不近刑人元帝不聽由是大與不叶後皆害焉望之自殺堪更生廢錮不得復進用後大中大夫張猛魏郡太守京房御史中丞陳咸待詔賈捐之皆嘗奏封事或召見言顕短顕求其罪擠害之至李膺杜喬用事而君子之勢始振陳蕃李膺一出而君子之名始盛挺身於虎豹之中砥柱於風波之表自三代以後未有盛於斯時也詳見東漢黨錮傳然一沮於宏恭石顯之姦再沮於曹騰侯覽之詐豈漢君子之福耶見上唐初天下亦未嘗無君子而當時亦未嘗指名其人也雖戕賊於武氏萌蘖於開元消沮於李林甫元載之手而天下安有朋黨之説哉自杜黄裳裴垍引用賢者李絳李藩武元衡裴度諸人皆㧞茅彚進於是有用君子之名然亦未害也裴垍傳垍為學士時引李絳崔羣與同列及相又擢韋貫之裴度知制誥李夷簡為御史中丞皆踵躡為輔相號名臣自他選任罔不精明人無異言故元和之治百度修舉稱朝無幸人又李藩傳裴垍曰憲宗謂藩有宰相器㑹鄭絪罷因拜相貫又史臣曰裴垍精鑒黙識舉賢任能如崔羣裴度韋之軰咸登將相皆垍薦逹至裴度元老反為新進小人所排而朋黨之說始起憲宗朝度入朝第勲進金紫光禄大夫復知政事程异皇甫鎛以言財賦幸俄得宰相度極論不可帝不納纎人始得乗罅率為所構出為河東節度使至穆宗議者交口請相度乃以本官兼平章事時權幸側目謂李逢吉險謀可構度共諷帝召逢吉還度相閲月果為逢吉所間出為節度僧孺宗閔遂與徳裕立敵而朋黨之説始熾唐憲宗時牛僧孺皇甫湜李宗閔對䇿歴指時政之失無所避李吉甫惡其直亦訴於上故僧孺乆不調穆宗時李徳裕以父恨李宗閔常對䇿譏切遂恨之李進則牛之嚢槖為之一空牛進則李之門戸為之一掃自歴代以來未有熾於斯時也然竄逐於嶺海之隅間關於蠻瘴之鄉豈唐君子之幸耶李徳裕傳愚願天下享君子之福不願天下羡君子之名願君子立終身之節不願君子植正人之黨願國家當如三代漢唐之初不願國家如建寜㑹昌之際也宋興百年公道大明私論退聼納天下於渾淪元氣中趙忠獻李文靖王文正諸公為政天下晏然享其福而不知其功初不分其君子之目中葉以來名字一立而君子之蒙禍也有三推原其故皆起於君子好自異於世耳嘗觀慶厯間富范登朝一竦方去是時正人雖少伸矣而竦之蓄憤伺隙未已也吾深扄固鐍於中猶恐無以杜奸人之計况夫石徂徠聖徳一詩侈歌一䕫一契之名則安得不激小人之變自富范之受是名也而朋黨之名遂作一網之計得行富范果不旋踵而去矣吁渭清涇濁别白太明一䕫一契之名於士大夫乎奚益慶厯間夏竦除樞使䑓諫十八䟽力爭遂寢時石介作聖徳詩曰於維慶厯三年三月云云維仲淹弼一䕫一契予早識琦琦有竒骨可屬大事重厚如勃曰衍汝來汝予黄髪心如一兮率履不越云云衆賢之進如茅斯㧞大奸之去如距斯脱大奸盖斥竦也泰山先生曰子禍始於此矣介卒竦言於仁宗曰介實不死北走胡矣出中使發介棺吕夷簡令中使責親属状入奏仁宗亦寤竦之譛介又先是石介奏記於富弼責以行伊周之事夏竦怨斥已乃使女奴隂習介書改伊周作伊霍上雖不信而仲淹弼不自安皆請出按西北邉進奏院祠神蘇舜欽循前用鬻故紙錢召妓女開席王拱辰諷周魚詢劾奏貶舜欽因貶王洙尹約江休復王益柔宋敏求徐受等拱辰喜曰吾一網打盡矣元祐初中國既相司馬而鱗集左右者皆賢士大夫是時吾道雖粗伸矣而章蔡之啣怨伺間求以報復於我者百端也吾蓄鋩隠鋭而不露焉猶恐小人之窺吾便也况夫蘇劉諸君子恬不自悟而且唱為朔黨川黨之名自蘇劉之植是名也而小人愈得以肆其計文徳黨碑之立而諸君子皆海之隅嶺之表矣吁操戈入室自相排抵朔黨川黨之名於士大夫乎奚補聞見録哲宗即位羣賢畢集忠厚不擾庶幾嘉祐之風矣然雖賢者不免以類相從故當時川黨洛黨朔黨之語洛黨者以程正叔為領袖朱光庭賈易等為羽翼川黨者以蘇子瞻為領䄂吕陶等為羽翼朔黨者以劉摯梁燾王岩叟劉安世為領袖羽翼尤衆諸黨相攻不已時退元豐大臣于散地啣怨刺骨隂伺間隙而諸賢不悟自立黨相毁至紹聖初章子厚為相目以為元祐黨竄嶺海之外可哀也吕微仲秦人戅直無黨范淳夫蜀人師温公不立黨亦不免竄逐以死尤可哀也化元祐奸黨并元符黨凡三百七十人起司馬光止王基上親書刻石於文徳殿之東壁又詔蔡京頒諸路立碑後劉逹勸上碎元祐黨碑除上書係籍人禁夜半遣黄門毁石刻而歩里客談云大雷雨碎宣和殿碑紹淳間山斗大儒以標凖一世之人望而主張吾道之正盟伊川之䰟方駸駸而有生氣然奸人在旁側目睥睨而已欲倒吾道之戈矣况吾又從立道學之名以標的天下縉紳士夫趍者如流自道學之名熾而小人之憾深既而權倖得志善類一空黨以消天下之名流偽以排天下之正學間關萬里之行道學之大不幸可知矣吁抽關啓鑰示人可投一切道學之名於士大夫奚利趙鼎入相招用胡寅諸賢皆伊川門人也後秦檜用事諸賢皆外竄斥又開禧姦臣以道學為偽學而道學之黨盡逐矣夫名者所以自别於君子也而反以為君子之累名者所以求異於小人也而適以激天下之怨則夫士大夫亦奚貴於此名哉盖天下之為小人者常多而為君子者常少君子之防小人也常踈而小人之擠君子也常巧故范希文不喜徂徠聖徳詩而指徂徠為怪鬼盖事出於怪則必至於招小人之謗也石守道作聖徳詩范希文見之以為怪鬼張安道亦雅不喜石介謂狂譎盗名所以與歐范不足至人目以姦邪元城了翁亦惟願士大夫有此名節而不願士大夫立此門户自立以求異則必至於啓小人之爭也吁可畏哉去小人甚矣小人之詐也以便佞為車以邪㨗為途以似忠似信而沽名以偽言偽行而欺世心術反覆險如山川智謀隂宻詭如鬼神噫可畏哉開國承家小人勿用則小人不容於創造之時鬼方之克小人勿用則小人不容於興復之日是不使一日得安其身也雖然天下未有無小人之世聖人未有無去小人之術當未進之時則牢辭固拒惟恐微隙之可乗迨既衰之後則力賛勇决惟恐舊根之復蔓此所以無小人之禍歟方朝廷清明國家尊嚴君有剛健中正之資臣有厥孚交如之志斯時也虎豹在山蛟龍在淵若無事也而聖人必杜漸於㝠㝠之中履霜之警恐其堅也取女之戒懼其壯也童牛之牿防其盛也金柅之係止其進也無非拒絶於未進之時如舜之去四凶成王之誅管蔡是也並書不然王衍未用或者知其必壊蒼生後用之而為晉禍晉書王衍神情明秀少時山濤見之嗟歎良乆曰何物老嫗生寜馨兒然誤天下蒼生者未必非此人也後衍佐政惟尚清談晉果有夷狄之禍至東海孝獻王越薨王衍等相與奉越䘮還葬東海石勒遣輕騎追之無一人得免者執太尉衍等坐之幕下衍言少無宦情勒曰君少登朝何得言無宦情破壞天下非君而誰夜使人排墻殺之盧杞未用識者恐其他日之得志後用之而為唐害信夫小人不可不防於其始盧杞奕之子也貌醜色如藍郭子儀每見賓客婢妾不離側杞嘗往問疾子儀悉屏侍妾獨隐几待之或問其故子儀曰杞貌陋心險婦人輩見之必笑他日杞得志吾族無類矣後得志中傷顔真卿李揆復以趙賛判度支於是間架除陌之暴縱矣後李懐光謀反因暴言杞罪惡士議沸譁乃貶為新州司馬後遷澧州至剛道浸長群疑己亡衆正有彈冠之慶小人有孤睽之勢斯時也髙臺忽傾曲池忽平若無虞也而聖人必致慮於衰微之際揚于王庭發衆聽也君子夬夬厲剛志也獲狐於田示無縱也射隼於墉示必誅也無非鋤剔於已消之後如魏相之去霍氏宣帝時霍氏縱横霍顕及禹山雲自見日侵削謀廢太子事覺山雲自殺禹要斬顯棄市五王之去二張是也張東之桓彦範敬暉袁恕已崔元暉封五王始武后疾甚張易之張昌宗居中用事五王恊謀帥左右羽林兵五百餘人至元武門迎太子於是收張易之昌宗梟首不然望之為政先漢君子方幸以為福而望之不知戒懼反為小人所乗蕭望之等患許史放縱又疾恭顕擅權乞罷中書宦者由是大與髙恭顕忤望之周堪数薦名儒鄭朋隂欲附望之後望之知其傾邪絶不與通朋乃更入許史後恭顕令鄭朋華龍告望之等謀罷退許史状恭顯因奏望之堪更生朋黨毁離親戚請召致廷尉上初即位不省召致廷尉為下獄也可其奏後上召堪更生曰繫獄上責㳟顕皆叩頭謝上欲用望之為相恭顕及許史子弟皆側目於望之㑹望之子散騎中郎伋訟望之前事恭顯等言望之幸得不坐不悔過教子上書歸非於上非頗屈望之於牢獄塞其怏怏則聖朝無以施㤙厚上可其奏望之自殺陳蕃得志後漢君子方恃以為依而反為小人所䧟信夫小人不可不盡絶於其終竇后委政於蕃蕃與后父竇武同心盡力召用名賢共參政事天下之士莫不想望太平中常侍曹節王甫等與共交構謟事太后蕃嘗疾之志誅宦官㑹武亦有謀蕃乃上䟽言侯覽與趙夫人並亂天下今不急誅必生變蕃因與武謀之及事泄曹節等矯詔誅武等亦執蕃送獄中即日害之愚嘗感世道盛衰之由觀小人進退之機竊於本朝増慨焉自建隆一陽之萌駸駸而至於慶厯六陽之盛天下皆君子而小人不多見也自熈寜一隂之生紛紛而至於宣靖六隂之極君子委蛇退縮波流風靡而小人荆棘多矣當夫熈寜之初王介甫方進也新參彈文吕誨力排王介甫初拜參政吕誨将對於崇政殿温公宻問曰今日請對何事吕誨曰䄂中彈文乃新參也温公曰以介甫之文學行義命至之日衆喜得人奈何論之誨曰安石雖有時名然好執偏見喜人佞已若在侍從猶或可容置諸宰輔天下必受其弊矣辯姦一篇老泉深詆王安石名始盛歐陽公勸洵與之逰蘇公曰是不近人情者鮮不為天下患作辨姦一篇李定新入也敏求當制不肯草詞李蘇舍人相繼封還當時諸賢凛凛於堅氷之至也切矣神宗方厲精為治急於人才王安石薦秀州判官李定召見拜太子中允監察御史裏行知制誥吕大臨宋敏求以定驟入幕大職而升朝著任執法非故事與蘇頌相繼封還詞頭不草制詔蘇頌三人皆罷而定御史之命亦中寢蘇頌墓誌惜夫安石雖沮而復用吕氏家塾記中丞吕公誨論荆公十事荆公力求去位上為出吕公而韓魏公亦論青苖奏至荆公稱疾求分司上不許李定雖寝而復行李定不除御史裏行安石復引用之新進登朝群憸塞路以章吕為腹心張琥為爪牙劉孝孫張商英為鷹犬元絳陳繹為厮役唐坰言安石用章吕曽布為腹心張琥李定為爪牙劉孝孫張商英為鷹犬元絳陳繹為厮役逆意者乆不召還附同者雖不肖為賢又置市易司都人有致餓死者以安石比李林甫盧杞而温公名流皆投閑居棄散地矣程顥言熈寕初王介甫行新法並用君子小人君子正直則以為俗學小人謟佞則以為才能如司馬光不拜樞宻而去范尭夫辭修注則罪張天祺自御史面折介甫被責君子去則所用皆小人嗚呼蟻宂不塞遂成江河熒熒星火果焚玉石此始者不能杜安石進用之門而使非類敢倒公議之戈也迨夫元祐之初公論有歸群正翔集或以叅用熈寜舊臣之説告而温公慨然曰天若祚宋必無此事也哲宗即位温公當國悉改熈豐舊事或曰舊臣如吕惠卿章惇輩皆小人他日有以父子之義間上則朋黨之禍作矣光正色曰天若祚宋必無此事必改之不疑君子謂光之勇孟軻不如若曰參用熈寜諸臣共變其法以絶異時之禍實光所不取也或以引進元豐黨人之說進而蘇公毅然曰君子小人不可並處也元祐五年吕大防劉摯言欲引用元豐黨人以平舊怨謂之調停蘇公言君子小人不可並處議者欲與之共事欲以此調停其黨此人若進必害正人以快私忿人臣被禍不足言所惜者朝廷也太皇太后曰蘇公疑吾君臣並用邪正言極中理自此兼用邪正之説始衰當時諸賢拳拳於羸豖之戒也至矣惜夫范忠宣主持平之論而小人之䰟返范純仁自為執政務以博大開上意忠厚篤士風在樞府時言者攻章惇鄧綰公皆力為救觧因言臣嘗為綰誣奏坐黜今日所陳恐録人過太深實係國體兩宫感悟即日使手詔嘉納因下詔書前日希合附㑹之人一切勿問書者亦勿復以言既而在庭頗分朋黨議論多出私意浸潤之説稍行吕汲公持内恕之心而小人之脉盛哲宗親政吕汲公欲用楊畏為諌議大夫忠宣公曰天子諌官當用正人楊畏不可用汲公方約畏為助謂忠宣公豈以楊畏嘗言公耶忠宣公曰不知也盖上初召忠宣畏嘗有言上不行忠宣故不知也後畏首叛汲公無所不至聞見録倖門一開趍者瀾倒清臣一用而首唱紹述元祐中劉摯言神宗顧命大臣不可盡去宜於張璪三人内罷璪以安天下留安燾清臣以全國體至紹聖元年清臣首倡紹述鄧伯温和之楊畏一進而盡援邪黨元祐八年畏言神宗更法以垂萬世乞賜講求成紹述之道即䟽章惇安燾吕惠卿鄧伯温李清臣行義乞召章惇為相上納之而元祐諸賢皆海之隅嶺之表矣聞見録元祐初退元豐大臣于散地啣怨刺骨隂伺間隙而諸賢不悟自立黨相毁至紹聖初章惇為相目以為元祐黨竄嶺海之外可哀也嗚呼氷炭同處必至交爭薫蕕共器乆當遺臭此始者不能盡絶熈豐之黨而復蔓稂莠之害也愚嘗論之使熈寜之初沮抑金陵亦如慶厯十八䟽攻夏竦之力則熈豐餘孽不為異日之宣靖仁宗朝吕夷簡罷相夏竦受樞宻使時十八䟽争之卒奪其命代以杜衍聖徳詩所謂大姦之去如距斯脱者此也使元祐之初斥逐舊黨亦如乾興諸公逐丁謂群邪之决則元祐善治不為異日之紹聖仁宗即位乾興初年王曽言謂令雷允恭擅移皇堂於絶地太后怒貶謂并曹利用馮極王欽若諸人凡向之黨丁謂者皆貶斥惜哉盖天将祚人之國必先福其君子禍其小人觀其君子之衆多如林福夀如山小人之消鑠如氷奔逐如流則知其國之盛觀其君子之寥落如晨星摧折如霜木小人之依憑如城狐遺毒如螫蝮則知其國之微天意甚可懼也噫熈寜貽為宣靖元祐反為紹聖者天耶人耶雖然此論小人未進既退之勢也不幸由徑而入媚竈而來盤據華津布列要路将决裂之太亟耶則必激反噬之忿抑包容而兼收耶則將有遺患之憂必也上有知人灼俊之君下有平心處事之臣立剛直之的以為之唱開中正之門以為之歸涵濡愧悔善心自生則小人亦可化為君子之習吕夷簡本小人之黨耳得脩靖諸公為之規諷既而不念舊事與仲淹有相約之歡呂夷簡因廢后事與范仲淹相忤而歐陽脩余靖尹洙皆以仲淹黨去國當時諸賢極論夷簡後夷簡入朝言於仁宗曰仲淹賢者朝廷将用之即除龍圖學士陕西安撫仲淹謝曰向以公事忤相公何意奨㧞夷簡曰夷簡豈敢以舊事為念耶於是二公歡然相約戮力平賊天下之士皆以此多二公也又蘇子由云申公非諸公並攻其短其害必有甚陳執中本俗吏之流耳得蔡襄為之救正既而薦引名士而東坡亦有可賢之嘆蔡㐮言陳執中剛愎不才不可任以事又東坡志林王鞏云其父仲儀言陳執中罷相仁宗問誰可代卿者執中舉吴育上即召赴闕㑹乾元節侍宴偶醉坐睡忽驚顧附床呼其從者上愕然即除西京蘭䑓以此觀之執中雖俗吏亦可賢也育之不相命矣夫此又變佞為忠之道也故併論之古今源流至論後集卷四
