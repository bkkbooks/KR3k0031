body:
  text: 古今源流至論前集卷五宋林駉撰朱氏之學元祐初元擢用横渠人曰吾道之幸不知異日節恵之諡此所以為幸也哲宗元祐二年陳襄薦三十六人張載預其列又至寜宗嘉定間諡節恵建炎中興召用龜山人曰儒學之榮不知異日文靖之封此所以為榮也高宗建炎二年召楊龜山胡文定馬時中又後諡文靖大抵榮其身於前不若顯其名於後行其道於一時不若流其澤於異日此君子當求源流深長之論昔我宋龍興五星奎聚九江之下舂陵之墟有周子出焉繼而得程張又繼而得胡楊尹馬又繼而得晦翁朱夫子嗚呼道學之𫝊至晦翁而益盛者非天耶近而閩浙逺而巴蜀千里裹糧樞衣凾丈遺訓格言家𫝊人誦方淳熈之盛時也芝詔親訪蒲輪屈致入而談經翠幄有陳善閉邪之敬出而持麾外郡有學道爱人之用然未足為盛爾孝宗朝謂朱氏樂道安貧遂詔用之始任南康軍次任浙東倉又次任憲復除侍講至嘉定之更化也掃清異說之荆蓁開明正學之日月藏其遺書而想典型之存錫其褒諡而發潛徳之馨然亦未足為榮耳寧宗朝嘉定初詔晦翁四書藏之秘監謚文公何者夫子之學上補治道下扶名敎此其功豈易報哉我主上心𫝊道統躬行實理講讀夫子之遺書慨慕夫子之高行乃形奎畫乃發天語乃畀隆職乃封穹爵吾道生榮墟墓有光此與太祖初基首賛孔顔同一意也近寳慶二年二月庸主上親批云朕觀朱熹中大學論語孟子四書羽翼斯文有補治道朕方有志講學前哲典型深維慨慕可追封信國公贈太師諡如故又太祖建隆間作文自賛孔顔餘七十二子命近臣賛之愚嘗覽遺編而起敬想高節而景仰竊窺所學萬一而鋪繹之其為詩易四書之論著也求其本義攻其末失黜小序明卜筮風諷比興必正其體彖象經𫝊必析其㫖求古人垂訓之心析諸儒不一之說纂以精義辨以或問附以輯畧别以章句以論語首篇為入徳之本以孟子七篇為言性之書晦翁論語集注學而篇此古人入徳之門篇又孟子集注孟子告子篇言性最詳然觀七皆是言性以守常為中庸之要以致敬為大學之原中庸或問序或曰庸字之義程子以不易言之而子以平常何也曰惟其平常故可常而不可易其義雖殊其致一也但謂之不易則必要於乆而後見不若謂之平常則其驗於今之無所詭異而其常乆而不可易者可兼舉也又大學或問序葢吾聞之敬之一字聖學所以成始而成終也為小學者無此固無以㴠養本源為大學者不由乎此亦無以開發聰明如親見聖賢𫝊授之㫖而無拘儒固滯之非其視周張二程之經𫝊大抵發其所己言而及其所未及言也其為儀禮經𫝊之通觧也自王氏廢罷儀禮獨立𫝊記是以儀禮惟有士禮數篇僅存王侯大夫之禮皆缺𫝊訛襲舛世實病之自是而後儒生之誦習者知有禮記而不知有儀禮士大夫之好古者知有開元以後之禮而不知有儀禮今也分章句附記𫝊大而邦國王朝之儀次而士庻䘮祭之目制度區别條理明白其視劉㳟姚闢蘇張數君子之所述作大抵明其所未明備其所未備也詳見晦翁儀禮觧其為通鑑綱目也取溫公編年之書律春秋記事之法一事之疑若决蓍龜一字之簡凜乎斧鉞别周末之僣王明昭烈之正統天下知其有名分之嚴按綱目周末諸王皆别出獨昭烈首為正統與溫公通鑑異揚子雲而係之以莽狄仁傑而係之以周天下知其䕶名節之重按綱目以揚雄附王莽以狄仁傑附武后與通鑑異綱舉而不紊目張而不繁其視司馬溫公異辭而同㫖也語録之書則辭㫖從容往復詰難其辨愈愽其義愈精逺而談性命道徳之妙近而論洒掃應對之粗讀之者如承謦咳而侍燕閒此與伊洛之門風㫖必録葢無愧也家藏之集則鋪陳義理吟詠情性長篇短章璀璨前後潛徳發而姦雄誅其文切於衛道皮剥落而筋骨在其文恥於徇時讀之者知其奏金石而諧韶頀此與穆柳之流文集並𫝊又逺過也是數書者得於操存㴠養之頃而著於述作問答之餘本於精神念慮之微而形於言語文字之際此觀其書當觀其所以書也抑嘗聞之師曰此數書析而言之則各為一書合而論之初無異致葢其敎人之法以大學語孟中庸為入道之序而後及於諸經不先之以大學則無以提綱挈領而盡語孟之精微不參之以語孟則無以融㑹貫通而極中庸之㫖趣不㑹其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉此易詩而下數書未有不本於四書也此今日宸翰褒寵亦特拳拳於此學也然所以讀四書豈無其本哉究太極動静同源之㫖窮西銘理一分殊之學味真趣於窻前之草樂至理於池中之蓮挹坐上之春風想門外之立雪寓禮於洒掃應對之間主敬於喜怒哀樂之頃則有心胷之書而無筆舌之書矣愚敢書紳以誦法帝王巍冠講唐虞此韓公之詩也愚知人臣當以古道告其君韓文致君堯舜上此杜公之詩也愚知人臣當以古道勉其君杜詩致君堯舜上再使風俗淳夫天生聖人錫以聰明睿智之資復生賢臣禀以高明正大之學明良一堂更相告語當以唐虞三代望其治不當以目前小康而自足當以稷契臯陶待其身不當以功利陋習而自處則君臣之望塞矣愚觀漢唐以來帝王盛治影滅響息非特其君無逺大之想而亦其臣無責難之義稽古未遑如文帝則不敢為文帝賛稽古禮文之事猶多闕雜伯自任如宣帝則不願為宣帝紀此固其君之責若武帝之上嘉下樂氣亦銳矣汲黯贛直人也靣斥其君以奈何欲效之語使帝平時廣大之志皆發而為神仙宮室之舉汲黯𫝊太宗逺冀堯舜志亦壮矣封徳彛世俗人也力言三代以後難化之道雖帝勉強於帝王之說不能無惑於法律伯道之論魏徴𫝊嗚呼自薄猶可且薄其君寜忍之乎接帝王之統於如綫之餘振帝王之澤於頺波之中吾於國朝君臣有望焉因四凶之去而歎後世刑網之宻則有意於堯舜之治寳訓太祖讀尚書歎曰堯舜之世四凶止從竄殛何後代法網過為靡宻也因昌言之拜而思諌者切中之言則有意於大禹之道寳訓淳化二年上曰昔禹拜昌言世稱其明今之諫者倘能切中時病朕豈惜大禹之拜誦說命師古之言則高宗其心也寳訓淳化五年講說命上曰尚書治世之道説命為最文王得太公高宗得𫝊說𫝊說言簡真良相也因誦事不師古匪說攸聞之句講冏命正人之說則周王其心也寳訓皇祐五年講冏命侍御僕從㒺非正人帝曰君臣之際必誠意相與而治道成是意也雖帝堯之考古帝舜之稽古亦不是過此祖宗以堯舜三代望其治者何如哉以至誠為本而不及功利則以堯舜期其君程顥語録陳君道以至誠仁爱為本未嘗及功利嘗極陳治道神宗曰此堯舜之事朕何敢當以勤儉為懐而治不難到則以大禹期其君聖政孝宗時林機講禹貢云觀禹貢之書立為經常之制天下樂趍而不厭當以大禹勤儉之徳為懐治效不難到上曰人主茍有貪心何所不至陳傅說而勉其師古則欲君為高宗也寳訓端拱元年羅處約上䟽臣讀傳說之書以為事不師古匪說攸聞又二典曰若稽古皆謂順考古道致乎太平講洪範而告其三徳則欲君為武王也帝學英宗召王廣淵書洪範於屏因訪廣淵論洪範得失廣淵進張景論七篇上曰景所說過先儒逺矣以三徳為御臣之柄尤為善論是意也雖伊洛之格君孟軻之敬王亦不是過此先正以臯䕫伊周待其身又何如哉抑又論之行帝王之道在祖宗固已無愧致帝王之治在祖宗亦無慊太平之功堯舜不及此陳瑩中之言也則我朝成法又同符而一揆也孝宗序聖政曰進而得之諄諄之訓退而求之渾渾之書夫祖宗功徳輝映瑤編神謨聖畧峥嶸寳閣所慕者非一君所法者非一代而太宗仁宗孝宗拳拳於三聖而不敢越者以其易知易行正堯舜揖遜文武授受之家學歟抑又論之太甲無沗於成湯皆伊尹格心之學成王歴知先公之艱難非周公之功而誰功此又大臣相與勸戒之意也熈寧天子有志潤色安石素不快於仁宗者也唱為祖宗不足法之說元城語録安石云天變不足懼祖宗不足法人言不足畏呂恵卿迎合於安石也立為一年一變法之說長編英宗讀蕭何曹曹參事司馬光曰參不變何法得守成之道由此言之祖宗之法不可變也後恵卿進說咸有一徳因言先王之法有一年一變者有五年一變者有三十年一變者有百年一變者前日光言非是雇役一行而祖宗之役法壊保甲一用而祖宗之兵法壊青苗一興而祖宗之所以爱民者至是盡壊見新法門安石諸人不能逃其咎嗚呼安得文彦愽司馬溫公諸人與之論守法哉聖學論聖學之博不若論聖學之精論聖學之勤不若論聖學之専嗟夫逺稽古典近參家訓採遺文於墜闕之餘萃鉅帙於編摩之後似愽矣然求簡牘之陳言而不考義理之奥㫖得口耳之粗迹而不究心胷之實學則愽所以為雜也漏下咨訪夜分談論講唐虞於細旃之上玩周孔於遺編之間似勤矣然一暴未幾而十寒之已至學奕方勤而鴻鵠之已移則勤所以為惰也何者帝王之學與經生異致謹于天命人心之際立辨於君子小人之情以法祖奉親為大本以正心脩身為要務不以位為樂而以斯民不被澤為憂不以身為恤而以天下國家得所安為念學云學云豈言語口耳云乎哉然是學也樂便嬖則壮心沮無警畏則戒心忘踈賢士則正論咈喜任好則舉錯偏爱惡私則憸壬入好慾衆則孝敬衰此心術之大累而學術之所由邪正也終始惟一時乃日新可以知成湯聖學之精且専而湯之所以精専者商書曰不邇聲色不殖貨利葢聲色易以惑此心貨利易以壊此心興言及此則學之日新又新也宜矣書日就月将緝熈光明可以知成王之精且専而成王之所以精専者無逸曰無滛于觀于逸于遊于田又曰無迷酗于酒葢逸觀游田易以䘮此心酒亦易以惑此心彼惟謹守厥訓則其學之能顯徳行也宜矣甚哉人主一心攻之甚衆也可不謹哉後世人君未甞不知學也未嘗不欲為湯成王也六經之表章百家之罷黜見於武帝建元之初年固也然一事征伐則此心已肆於窮黷矣一興土木則此心已縱於奢侈矣一惑長生則此心已荒於神仙矣何怪帝學之不雜並本紀文籍之討論名儒之訪問見於太宗開館之初政固也然浮屠之立則此心不能不惑於異端矣射獵之好則此心不能不縱於游畋矣雪恥酬兇之誇詡則此心未能不馳騖於逺畧矣何怪帝學之不怠本紀嗚呼心學不𫝊帝王之學棘榛久矣寥寥千載能嗣其𫝊者惟我國朝乎夫經史講論足矣而且或節孝經之要語呂公著家𫝊哲宗時公著於尚書論語孝經中節取要語一百叚進呈或取伯陽之緒言事實淳化五年上讀老子語近臣曰伯陽五千言讀之甚有益治身治國之道並在其内或進陸贄之奏議聖政孝宗讀陸贄奏議日取五板或覽貞觀之政要寳訓慶歴八年進讀貞觀政要終祖訓進讀足矣而且或披仁宗之二圖長編元祐五年范祖禹言仁宗慶歴元年出御製觀文鍳古圗示輔臣皇祐元年召近臣觀三朝訓鍳圗二圗必有本願陛下鍳此可以見善惡或閱太平之總類祖禹帝學興國八年語宰相曰史館所脩太平總類自今日進三卷朕将親覽或上帝學之三卷見上或上三朝之聖政石介聖政序三聖之徳三朝之政國史載之備矣臣慮國史紀之至繁聖人一日萬幾不能徧覽吴兢作貞觀政要臣效作三聖聖政録此足見聖學之愽夫講學經筵可矣而復有宮中之觀書長編元祐七年王岩叟奏曰陛下宮中何以消日上曰並無所好惟是觀書有禁中之日課中興本末紹興七年上曰朕喜春秋之學率二十四日讀一過居常禁中亦有日課有退朝之覽奏仁宗講學常時可矣而復有夜分而觀書事畧太宗􅎔政之暇觀書為樂每至夜分手不釋卷有炎暑而講經寳訓天聖四年上謂宰臣王曾曰比以大暑罷講適召孫奭說書卿等可至經筵王曾曰陛下萬幾之暇留意經術雖炎暑不輟有以見聖學之高明也有風雨而親御經幄范祖禹帝學神宗天資好學自強不息禁中觀書或至夜分自熈寧至元豐日御經筵風雨不間此足見聖學之勤矣噫論其愽不若論其精論其勤不若論其専何以言之酣酒嗜音范祖禹援此以告其君則誦之而無斁范氏家傳范祖禹講尚書内作色荒外作禽荒酣酒嗜音峻宇雕牆有一于此未或不亡講畢再誦却立云願陛下留意哲宗首肯者再三飲食宴樂林瑀借此以誘其君則斥之而不聽寳訓慶歴二年瑀撰周易天人㑹元其説用天子即位年月日辰占所直卦以推吉凶瑀言上即位其卦直需其象曰雲上於天需君子以飲食宴樂臣欲陛下頻出宴遊則合卦上駭其言遂斥之夫嗜音也宴遊也此盖君心之酖毒一去一取聖狂天淵其學之精為如何情慾之節有得於易之損寳訓仁宗讀易至損君子以懲忿窒慾上曰人之情慾皆生於隂陽節之在人逸豫之戒有得於書之無逸帝學皇祐四年講無逸上曰朕深知享國之道宜戒逸豫夫情慾也逸豫也此又伐心之斤斧端本澄源天真湛然其學之専為如何大抵自古不患學術之不正而患心術之不純不患心術之不純而患外物之易誘我祖宗不溺情於羅綺妖冶之色不恱耳於滛聲艶詞之樂不惑於刀鋸虧殘之習不喜於脂韋巧侫之說驗之以旦夜之氣體之以清明之徳警之以中庸大學之學守之以暗室屋漏之誠是理也此正舜之業業禹之汲汲湯之日躋文王不已之意也易之乾乾詩之於穆書之精一記之不息之㫖也昔程子在元祐講筵専以正君心為本元祐初伊川為崇政說書首論正君心文公在淳熈經幄首以誠敬為勉朱晦翁淳熈在經筵為侍講論中庸大學誠敬之㫖此正帝王之家法也今天子日御翠幄奎章陸離有朕方有志於學之㫖且以中庸大學語孟為本則巍冠森侍者宜以程朱之所告君者告君則無負天子亦無負所學矣聖製聖人之道與天地同其妙聖人之文與天地同其工方藴而為道也醖籍乎仁義道徳之㫖㴠蓄乎禮樂綱常之端古今治亂得失之㫖有以愽其見萬物變化生成之藴有以養其思此如天地之歛為元氣渾淪磅礴而不可窺其秘也及發而為文也布造化於紙上散陽和於筆端嫓墳襲經戞韶切頀滿心而溢而不足以費其精神肆筆而成而不足以役其念慮此如天地之散為風雲為雨露為日月河漢而不可揜也是故是文也當以天地論而不當以經生學士論當以聖道論而不當以一技一藝論當以彌綸造化膠轕宇宙論而不當以辭藻為工製作為巧論夫伏羲之八卦非八卦也盖天地之機緘隂陽之藴奥胥此焉出大禹之九疇非九疇也葢彛倫之本原皇極之㫖要於此乎見夫豈如後世區區然學為如是之文哉且後之所謂文其形於歌詠也或為歌武帝天馬芝房朱鳥隂陽之歌或為賦魏武帝登高必賦唐太宗作威鳯賦以賜長孫無忌等或為樂章漢武帝造雜詩皆成樂章或為詩句文宗召桞公權聮句人皆苦炎熱我爱夏日長公權属曰薫風自南來殿閣生微凉家開成二年賜裴度詩曰注想待元老識君恨不早我柱石衰憂來學丘禱其寓於述作也或為論魏武帝作典論二十篇或為序唐元宗作孝經序序又唐嘗美謝樞文召見欲作賦先為篇言天下乂安或為書魏武帝作兵書數千言或為範太宗作帝範十二篇非不知雕琢之工也程度之嚴也然正心誠意之學已墜於文墨之中危微精一之妙不闗於言語之末噫可嘆也我國家奎星應治文風振古列聖相承靡敢暇逸宮室苑囿無所增益惟儒館是闢聲色服御無所玩好惟文墨是娱天葩睿藻峥嶸於文府之秘瓊章寳字輝煌於傑閣之嚴猗歟休哉愚嘗拜觀真宗之盛製也進士有詩祥符二年賜知舉晁逈已下詩云禮闌選士古稱難都為陞沉咫尺間較藝清時公道在掄材應得惠人寰崇儒有論寳訓祥符六年以崇儒術為君難為臣不易論示王旦先是陳彭年因奏對上曰儒術汙隆其應甚大國家隆替何莫由斯秦衰則經術道息漢興則學校興行彭年曰陛下聖言足以為天下訓可著之於篇翰頃之以二論示陳彭年所以振文敎之隆龍圗有賛太清有記所以示圗籍之尊龍圗閣藏太宗御製真宗自為賛歌冩念農寳訓祥符十年上作閔農歌又作十一經詩賜近臣和吟詠貴食見上所以重邦本之貴然真宗之文非専於文也觀其與王元之論文而極論王者之文且謂彫纎之言豈足軫慮則知我真宗之所製無非學之所充歟真宗與王禹偁論文謂王者之文云云彫纎之言豈足軫慮較輕重於𤨏𤨏之儒又嘗拜觀孝宗之聖製也喜晴託詠孝宗新春喜晴詩末聮云平生雄武心覽鏡朱顔在豈惜常憂勤規恢須廣大秋雨述懐所以述規恢之志秋雨述懐末句神宗應未逺當繼沛中歌詩播冷泉孝宗作高宗冷泉堂古風高宗親䟦之大畧曰吾兒自㓜岐嶷進徳脩業如雲升川增一日千里豈待義方之訓師保之功吟寫郊禮所以述孝敬之念孝宗作郊禮詩十章用人著論乾道中御製用人論秘閣著詩所以表敬臣之心乾道五年幸秘省賜詩然孝宗之文非泥於文也觀其序高宗之聖政曰進而得之諄諄之訓退而求之渾渾之書則知孝宗之所製無非學之所積歟孝宗序高宗聖政曰進而得之諄諄之訓退而求之渾渾之書率而行之庻幾於治云云惟大猷是經惟舊章是循不特真宗孝宗為然也作文宣賛作兖國賛重聖道也金坡遺事太祖作文宣王賛曰王澤下衰文武将墜尼父挺生河海標異監又自賛顔子時車駕親幸國子賜趙普詩長編興國八年上賜趙普詩賜楊億詩眷大臣也太宗賜楊億詩曰𤨏闥往年司制誥共嘉藻思類相如非藝祖太宗之製乎著危竿喻寳訓慶歴四年御延英作危竿喻述居安慮危之意著鑒古記謹保治也仁宗康定二年親製觀文鍳古圗記以示輔臣草親征詔高宗草親征詔有謂秦無人之類草討賊命志中興也高宗討賊命有逗留稽慢之誅非仁宗高宗之製乎故龍圗太清太祖太宗之所藏也天章寳文真宗仁宗英宗之所藏也敷文焕章華文徽宗高宗孝宗之所藏也太祖文宣王兖國公二賛太宗戒石之銘所謂清樓之御製玉容殿之御集藏於龍圗閣者是也真宗文宣王之賛正說之篇向敏中所集李虛己所編藏於徽猷閣徽宗之文藏於敷文閣高宗之文藏於焕章閣孝宗之文藏於華文閣儲之書林鬼神呵䕶布之天下臣民𫝊誦如圗書肇於河洛而疇卦演其奥也如雲漢麗於層霄而萬物覩其光也其視漢魏而下哇俚混并律吕叢雜微夫斯之為文也方之我祖宗之作不亦恧乎堯舜之盛必有典謨文武之政布在方册愚何幸親見之聖翰王褒一頌此頌之工者今日書之所以侈聖賢之遇合也寶慶二年主上御書王褒聖主得賢臣頌賜丞相陸機一賦此賦之美者今日書之所以示文章之好尚也寳慶二年正月親書陸機文賦夫六龍在御正天下觀瞻之始宸章一布河漢争輝心畫一形海宇仰望如非上闗於治道下切於風敎又何必屑屑於翰墨之間哉此愚於今日得其書又得其所以書也嘗謂古者有心於道而無心於書其後有心於治而亦無心於書又其後於書加詳而道與治若無與焉噫君子可以覘世道之盛衰矣且河圗之畫以道之所寄也不得不形於書聲銘之字以徳之所寓也不得不託於字石鼓之文以功之所形也不得不寓於文萬世而下盪人耳目與天地同其乆與日月争其光者豈非道之待書而著耶故曰有心於道而無心於書也十札之書頒及方國儆吏治也飛白之字賜及近弼禮大臣也漢光武一札十行頒及方國賜又太宗飛白書鸞鳯冲霄字馬周帝範之書貽示後嗣重國本也太宗貞觀中作帝範十二篇以勉太子刑政敎化之㫖在是法度典刑之意在是真情實意之拳拳懇懇者莫不在是故曰有心於治而亦無心於書也氣龎道駁文存意泯臣工筆法君臣相忌宋武帝王僧䖍以書法君臣相忌君得戈畫臣皆稱慶龍翔鳯翥體非不精也霧捲霞舒筆非不壯也然殚精竭誠於毫釐之巧而絶無正大之學寫情陶意於㸃畫之粗而類無高明之見故曰於書加詳而道與治無與焉者此也嗚呼以禮樂為管以天常為筆而後可書以心為畫以道為工而後可書否則一㸃一畫果何益於事哉昔王文正公之語士遜也曰皇太子不必學書夫書不可闕也學以為巧則非帝王之書長編張士遜嘗言曰皇太子學書甚好而王文正公正色折之以為皇太子不必學書孝宗之奉高宗御書也曰不惟宸章奎畫照耀萬世其所以崇儒重道者可謂至矣夫書不可無也無闗於道則非有益之書孝宗聖政噫我祖宗之聖翰無非有闗於道徳政治之要也且孝經一書百行之本則書之以勒碑隂曰将以垂世敎也寳訓太宗嘗有草千字文書賜李至至請换刻上曰千字文盖梁武帝得鍾繇破碑俾周興嗣次韻非垂世立敎之道孝經百行之本朕當親書勒之碑隂臨民奉法吏治之要則書之以賜棘寺曰将以厲吏治也長編淳化四年太宗書一幅曰公務刑政惠爱監民奉法除姦方可書為勞績又别書三十餘幅賜大理正尹玘等玉堂四字以寵翰林則有意於重文辭元城語録淳化二年上飛白書玉堂之署四字賜蘇易簡榜於㕔額上曰此為翰林美事秘閣二字以寵秘書則有意於重閣職長編淳化三年李至言願比玉堂之署賜以新額乃飛白秘閣二字賜之此太宗之翰太宗之意所寓也歟以文儒之字賜張方平以愽學之字賜張錫無非示文學之勸長編慶歴八年學士張方平上奏答手詔所問上異之書文儒二字賜方平又皇祐元年張錫講書禁中上嘆其愽學飛白書愽學二字賜之以端敏之書賜王舉正以日新厥徳之書賜張士遜無非為臣下之勉此仁宗之翰仁宗之意所寓也歟蘇文慶歴賜王舉正端敏二字蘇軾記云抱烏號之弓不若藏此筆寳曲阜之履不若𫝊此書曰仁宗嘗賜張士遜十二字曰寅亮天地弼予一人又日新厥徳蘇軾為之賛不特此也高宗親翰輝映胄監天下之所共覩淳熈四年監安府建閣安頓太上皇御書石經以光堯御書石經之閣為名又書中庸賜進士書孟子列屏幛則聖經有光焉高宗嘗書中庸二篇賜進士又書孟子列於屏幛書趙充國𫝊以修營田書羊祜𫝊以脩睦鄰則前史有榮焉編年録紹興三年上書趙充國𫝊以修營田之政同上七年書羊祜𫝊賜秦檜寜宗奎畫寵示外廷士夫之所敬仰故易簡二字形之天筆則知有得易之妙縕寜宗嘉定間嘗書易簡二字示近臣有臺一章錫之台衮則知有得詩之本意寜宗嘉定間嘗書有臺詩賜丞相噫天下固有不寳烏號之弓而寳此筆不藏曲阜之履而藏此書今日王褒之頌陸機之賦􅖙然於初政之世者愚意源流於家學也敬天古人以天自處而求在我之天後世以天自警而求在天之天嗚呼誰謂世道愈降而有䙝天棄天之意乎夫雨暘寒燠吾之五事風霆流形吾之志氣是吾之舉動皆天也天禄天爵吾則代之天刑天討吾則奉之是吾之政事皆天也吾其可求於㝠㝠之中乎是故古人以天自處也虛室生白吉祥止止吾誰欺淵黙雷聲尸居龍見吾誰欺上帝監汝毋貳爾心帝即心也一陟一降在帝左右天即我也一言之微一行之細曰吾無愧於心則無愧於天矣一賢否之黜陟一賞罰之榮辱曰吾無怍於人則無怍於天矣此堯之欽天舜之敇天湯之六事自責文之純亦不已無非求在我之天也至後之以天自警也雨𤾉之不時是以有决獄之命星文之示變是以有罪已之文减膳徹樂美意也必因災異而後見蠲租求言盛徳也必因譴告而始形倖福而為善懼禍而不為惡是雖未純乎天而亦知畏乎天此文帝之蠲租太宗之釋刑無非求在天之天也並本紀若夫以天命不足畏者論之旱乾之變天心仁愛也且以乾封之祥而自文名曰䙝天武帝紀時大旱帝以為乾封之祥遂改元乾封廟屋之壊天意警懼也反以行與壞㑹而自釋名曰棄天明皇出幸廟屋壞姚崇曰行與壊㑹平居未變之前既不能以天自處一旦既變之後復不知以天自畏此武帝之䙝明皇之棄君子所以深憾也嗚呼聖人不作知天之學不𫝊矣愚幸國朝有見焉夫祥瑞之應漢唐君臣動色稱慶也獲麟作歌芝房有詩薦之天地告之宗廟盖侈之以為美談我祖宗獲麟入貢此為上瑞而曰時和俗阜乃為上瑞竒獸無益也寳訓太平興國九年嵐州獻一角獸徐鉉等曰麟一角者明海内共一王也盖天下一統之應太宗曰珍禽竒獸無益於事但得時和嵗豊人安俗阜乃為上瑞令養于後園不欲宣布於外此事長編在雍熈元年異草來獻此為至寳而曰豐年為瑞賢臣為寳異草不足尚也長編皇祐三年無為軍獻異草三百五十本上曰朕以豐年為瑞賢臣為寳至於草木䖝禽之異烏足尚哉知軍免罪夫無徼福覬祥之心則平日之所自脩者吾身而已而天瑞何與焉夫災異之譴漢唐君臣文過飾非也乆旱下詔日食求言告之中外播之臣民盖自以為盛舉我祖宗不雨徹樂禮也而曰恐飾虛名不若夙夜精心也長編慶歴三年上曰天乆不雨将害民田朕每焚香上禱于天昨夜聞雷遽起冠𢃄露立殿下須㬰雨至衣皆沾濕章得象曰非陛下至誠曷致天應若此上曰比欲下詔罪已徹樂减膳又恐近於崇飾虛名不若晝夜精心宻禱為佳耳遇旱避殿禮也而曰是亦文飾但至誠也㑹要熈寧元年上憂旱甚言當避正殿又恐妨有文飾富弼曰此但係陛下至誠亦不須避殿上曰避殿亦只是文飾夫無虛文外飾之禮則平日所自畏者吾心而已而天譴何與焉不特此也慶歴七年春旱之詔上命學士更草曰與其降疾於人不若移災於朕是語也天地鬼神鑒觀之雖桑林之禱亦不過是寳訓仁宗命學士草制無以増損以又慶歴七年春旱将降詔楊察既進草上曰此未足盡朕寅畏之意乃更其詔朕不敏於徳不明於政天威震動以戒朕躬與其降疾於人不若移灾於朕熈寧八年直言之詔上親秉筆以累年災害一歸咎於已是詔也中外臣民感泣之雖雲漢之詩亦不過是長編熈寧八年富弼言近日手詔許中外臣僚直言朝政闕失洛城士庻已歡忻鼔舞臣再詳手詔乃陛下親筆非學士所作以至累年災害前後包括一一歸咎於已忠義之士讀之莫不感泣故星變不旋踵而滅又不特此也仁宗嘗語輔臣曰國家雖無災異亦當常自脩警則非但因異而見也寳訓慶歴六年上謂輔臣曰比臣僚有言星變者且國家雖無大異亦當常自脩警况因謫見乎夫天之譴告人君使懼而脩徳此天心之仁也敢不祗畏孝宗嘗語近臣曰朕與卿等尤當上下交脩以答天貺則非但有變而警也孝宗聖政詩曰在宮雝雝在廟肅肅惟我祖宗之心乎抑又論之明良賡歌時幾是敕則君心無一日而不警君臣相䛕諱言災異其不流於玩忽者幾希方國家無事也自常情觀之莫不居安㤀危李公沆當國每朝必以水旱盗賊之事奏聞誠恐不知憂懼也元城語録李丞相沆每朝奏事畢必以水旱盗賊不孝惡逆之事奏聞上為之變色既退同列曰吾儕當路幸天下無事丞相每以不美之事拂上意後告之曰人主豈可一日不知憂懼也不知憂懼則無所不至矣方天下争獻祥瑞也自常情處之莫不好祥惡異韓公琦力言災符不言瑞諜誠慮夫意安政怠也長編景祐四年有芝生於化成殿柱御製瑞芝詩儒者並獻賦韓琦言春秋之法記災異至於祥瑞畧而不書豈不以若閱瑞諜則意安覩災符則心懼意安則政怠心懼則徳脩望陛下不特以災異為重至於珍符竒瑞雖仁愛所形亦望日謹一日以雖休勿休為念彼王安石以三不足之說禍後世寧不愧死於李韓二君子哉災祥雲漢為虐不害中興天作滛雨宋其興焉則知災異之來人君不足懼寳鼎作歌無補虛耗瑞雪相賀適驕唐治則知休祥之至人君不足恃抑何也盖天心仁愛每寓於譴告之中而奪其鑒益其疾正天以休徴咎予也是以聖人陟降以天自處惟求其在我之天而不求其在天之天也歟古者雨雹風雷之變固未嘗忽而不憂慶雲景星之祥亦未嘗欣然而自泰金縢未啓大風㧞木君臣相顧以動色洛邑已定休祥荐臻君臣警戒以自若其所以自處者吾之徳無闕歟政無失歟吾之刑罰得中而民安其化歟而天之災祥休咎豈容置喜懼作輟之心於其間哉後世一休祥之適至錯采繢畫夸諸臣民一咎徴之荐至君臣相告指為天數芝房之産未足竒也彼則薦之郊廟而頌美屋廟之壊深可畏也彼則委之行與壊㑹而自文閭閻之疾苦不暇問也紀綱之廢弛不暇舉也言行之玷缺不暇脩也而古者敬天奉天之意彼安知哉嗚呼上帝監汝毋貳爾心相在爾室不愧屋漏盖天在我而不在彼吾之自盡者非求以無愧於天求以無愧於我也是意也其不明於漢唐也乆矣欽哉之歌敬之之詩猶幸我朝有聞焉嵐州之麟養之後園曰時和為上瑞竒獸無益也寳訓太平興國九年嵐州獻一角獸徐鉉曰麟一角者明海内共一統也葢天下一統之應太宗曰珍禽竒獸無益於事但得時和嵗豐人安俗阜乃為上瑞令養於後園不欲宣布于外此事長編在雍熈元年坊州之麟養之苑中曰民安為上瑞鳥獸何足云也寳訓雍熈三年坊州獻一角獸近臣奏曰瑞應圗牝曰麟牡曰麒昔嵐州進麟也此乃麒也請宣示中外上不許但令豢於苑中謂宰相曰時和嵗豐兆民安泰斯為上瑞鳥獸草木亦何足云枯桔之生可稱也吾瑞鐡騎不瑞枯桔聖政紹興七年劉光世奏枯桔生穗委是祥瑞上曰朝廷有賢輔佐軍中有十萬鐡騎乃為祥瑞此外皆不足信異草之産可珍也吾寳賢臣不寳異草長編景祐三年無為軍獻芝草三百五十本上曰朕以豐年為瑞賢臣為寳至於草木昆蟲焉足尚哉臨川之圗丼露不足褒也故寧罷其守使人不敢為佞聖政紹興七年知果州宇文彬通判嚴信孺進禾登䨇穗上曰去年荒旱安有瑞禾往年知撫州高衛進丼露圗朕疾其佞罷其守彬等可罷官澧州之獻瑞木不足賞也故寜却其獻使人不敢為欺長編寳歴三年澧州獻瑞木有文曰太平之道歐陽修言使木不偽實是天生亦有深意葢其意可推也有道則太平失道則危亂方今但見其失未見其得也此瑞木乃誤事之妖木耳噫漢唐之君飾祥文瑞作歌獻詩者視此不亦愧乎熒惑犯輿鬼應在秦雍天子憂之曰朕念及秦民也長編司天言熒惑犯輿鬼秦雍之分國家當有兵在西北太宗謂宰相曰天文謫見如此秦地民罹其殃朕旦夕念之不遑寧處彗星出營室變在秦魯天子憂之曰朕念及天下也㑹要咸平元年彗出營室光三尺餘呂端言變在秦魯之分上曰朕念天下生靈豈獨在一方耶開寳之五年霖雨不止上曰朕闕政也是語也天地實臨之長編開寳五年上謂宰相曰霖雨不止朕日夜焦勞㒺知所措得非時政有闕使之然耶趙普曰陛下憂勤庻務有弊必去至於苦雨為災乃是臣等失職天聖之四年霖雨為沴上曰朕不徳也是語也神明實鑒之寳訓天聖四年大雨雷電平地水數尺仁宗避殿减膳謂宰臣曰霖雨為災夙夜惕厲豈朕之不徳而政之不脩歟端拱之旱則减常膳走群望甚至欲築臺以自焚何切也政要太宗遇嵗旱必蔬食减食品三之二又長編端拱二年上以嵗旱减膳徧走群望於又政要增釋淳化二年以嵗蝗旱詔宰相呂蒙正當文徳殿前築一䑓朕當暴露於其上三日不雨當焚朕以答天譴呂蒙正惶恐封還詔書未幾膏澤霑足蝗死慶歴之旱上則蔬食引咎精心宻禱甚至冠𢃄露立而不辭何誠也長編慶歴三年上謂輔臣曰春夏不雨盖朕不徳所致但日於禁中蔬食引咎而已又八月不雨上曰天乆不雨朕每焚香上禱于天昨夕寝殿中忽聞微雷遽起冠𢃄露立殿下須㬰雨至衣皆沾濕章得象曰非陛下至誠曷致天應噫漢唐之君不自引咎往往䙝天者視此不亦愧乎雖然此上人之責耳鳴雉之變商之大臣作訓以為戒天休之至周召且以是警告焉吾觀先正諸公熏心之論不聞逆耳之言屢戒其古大臣用心歟瑞芝之生韓公琦有諌琦之心誠慮夫意安而政怠也景祐四年有芝生于化成殿柱御製瑞芝詩儒者並獻賦韓琦言春秋之法但記災異至於祥瑞畧而不書豈不以若閱瑞諜則意安覩災符則心懼意安則政怠心懼則徳脩望陛下時以灾異為事至於珍符竒瑞雖仁愛所感亦望日謹一日以雖休勿休為念瑞星之見張公知白有諌知白之心誠欲其懼亂而思危也景徳二年司天監奏周伯星見羣臣稱賀張知白言懼亂者治必興焉思危者安必乆焉今陛下思黎元之疾苦知軍旅之勤勞誠能寳兹數事則瑞星不出臣亦賀是大臣亦以休祥不足恃矣四方水旱人所諱也李公沆當國必以變異為戒元城語録李丞相沆每朝奏事畢必以四方水旱盗賊不孝惡逆之事奏聞上為之變色曰人主豈可一日不知憂懼也江淮連旱人所惡也崔公立獻議必以天戒為慮長編祥符間士大夫争奏符瑞獻賛頌崔立獨言水發徐兖旱連江淮無為烈風金陵大火是天所以戒驕矜而中外多上雲露草木之瑞此何足為治道言哉是大臣亦以災異為足戒矣明良相逢時幾是敕此國家所以上格天休而享靈長之福也盖自王欽若以符瑞惑上聽而當時以祥瑞為美談長編初王欽若以城下之盟毁冦凖上自是常怏怏欽若曰陛下當為大功業以鎮服四海上曰何得大功業欽若曰封禪是矣然封禪當得天瑞又曰天瑞安可必得葢有以力為之陛下謂河圗洛書果有此乎聖人以神道設敎耳上意未决他日杜鎬直宿上曰河圗洛書果何事耶鎬不測上㫖謾應曰聖人以神道設敎耳其言偶與欽若同上意遂决自王安石以天變不足畏之說䙝天戒而當時以災異為適至王安石以三不足之說天命不足畏祖宗不足法人言不足恤然戚綸之䟽力攻其非大中祥符元年王欽若上天書戚綸言流俗之人或作慿神靈或偽形土木妄陳符命伏望凝神正道仰答天貺上嘉納之溫公之論深辨其失而祖宗深切嘉納不為異論所惑異時欽若安石亦自知悔矣然則災異之來正人君之拂士休祥之應實國家之鴆毒可不戒哉可不勉哉儀象古人之論天者多矣有曰盖天有曰宣天有曰穹天有曰安天有曰昕天盖天之說又離為周髀盖天形如盖本庖羲氏立周天歴度宣天言天碧無質察色所謂宣夜也穹天言天形穹窿如雞子晉時晉聳所陳安天言天在上有常安之形晉時虞喜所說昕天天勢南低北軒吴桃信所造周髀乃周公授於商考其制度之盡善而可為萬世之通行者未有如渾天者也何者觀揚雄有八事之難則知盖天之不如渾天也觀蔡邕無師法之譏則知宣天之不如渾天也觀好竒徇異之責則知昕天穹天安天又不如渾天也晉天文志渾天之制起於誰乎或云唐堯即位羲和立渾儀或云舜齊七政所言璇璣者謂渾天儀季長創言璇衡為渾天儀王蕃言渾天儀者羲和之舊器其後落下閎耿夀昌鮮于妄人行於西漢張衡賈逵行於東都陸績行於晉王蕃行於吴李淳風一行行於唐皆具精於制作者抑嘗以渾天而考之黄帝之歴起辛卯顓帝之歴起乙卯虞舜之歴起戊午歴之所作非渾天不可也青道二出黄道東赤道二出黄道南白道二出黄道西黑道二出黄道北道之所行非渾儀不可也中外之宮常明者百有二十可名者三百二十為星者二千五百微星之數萬有一千五百二十錢樂之則以朱黑白而别三家星葛衡則以白青黄而别三家星以考星宿非渾天不可也自軫十二度至氐四度則知其為夀星自氐五度至尾九度則知其為大火自尾十度至南斗十一度則知其為析木以考躔度非渾儀不可也華林之置粱華林殿前置銅儀孔廷所造觀象之置後魏晁崇修渾儀以觀星常號最宻凝暉之置唐太宗置銅儀於凝暉閣武成之置唐明皇詔一行置於武成殿常號最宻偽劉曜史官孔挺常為䨇鐶横規單規以銅為之其法見用於時也梁帝為横規為南軸單規為北軸以木為之其法見用於時也唐太宗為六合儀三辰儀四游儀以銅為之未幾易之以鐡其法見用於時也噫渾天之行於世也乆矣然設之崇䑓以候天象者渾儀也轉之宻室以與天行相符者渾象也儀以驗之天象以驗之儀二者不同而為用則一盖不可不參稽而互考也我朝盖兩用之矣夫水運渾儀則古之刻漏儀也在太宗則以太平渾儀名在哲宗則以元祐儀象名其布星辰猶渾象也其窺天象猶渾儀也長編元祐四年詳定水運渾儀所奏趙齊良状宋以火徳王所造渾儀其名水運乞更水名以避刑剋按張衡謂之刻漏儀一有謂之水運俯視圗張思順所造太宗賜名太平渾儀名稱並各不同今新制備二器而通三用乞特賜名詔以元祐渾天儀象為名許将言乞被有製水運渾儀本様進呈差官試驗如候天不差則造銅器今校驗已得參合詔以銅造仍名元祐渾天儀象言其後本所又言前所得渾天儀者其外形如丸其内則有璣有衡外形如丸可徧而星辰大率若木所造渾象之製内有璇衡可仰窺天象大率若木所造渾儀之製若渾天儀則兼二器有之同為一器既言渾天則其為象可知然於渾象中設璣衡使人内窺天象以占測為主故可總謂之渾天儀其實兼儀象而有之也今所建渾儀渾象别為二器而渾儀占測天度之真數又以渾象置之宻室自為天運與儀參合若并為一器即象為儀以同工天度則渾天儀象兩得之矣此亦本朝備具典禮之一法也乞更重作渾天儀從之其視璇璣齊七政之意無愧矣嗚呼志天文不知璣衡歐陽公深以為疑歐陽修唐史天文志周禮測景求中分星辨國而獨無璣衡豈其不用於三代耶不然二物莫知其為何器也賦璣衡不知儀象沈存中所以深歎歟筆談天文類雖然有平子之推算則渾天之說行於漢無一行之歴法則唐之鐡儀特為觀美之具爾是必有張思訓文明殿之制而後可知日月之行度長編太平興國四年新渾儀成張思訓所創也置文明殿東南之鐘鼔樓舊制日月行度皆人所運新創成於自然尤為精妙有沈括能發三司之欺而可知雲物之祺祥筆談國朝置天文院於禁中設刻漏觀天䑓銅渾儀皆如司天監與司天監互相檢察每夜天文院其有無觀見雲物祺祥及常夜星次須合於皇城門未發到禁中門發後司天占状方到以兩司奏状對勘以防虛偽近嵗皆是隂相計㑹符同寫奏其日月五星行次皆只據正歴所算躔度謄奏不曽占候有司畢備其安否而已熈寧中予領太史常按發其欺免官者六人未幾其弊復如初有蘇子容激水轉輪之智而後知星辰之躔次蘇頌行状元祐中建請别置渾儀因命公提舉公既邃於律歴以韓公兼曉算術奏用之且授以占法為䑓三層上設渾儀中設渾象下設司辰激水轉輪不假人力時至刻漏則司辰出告星辰躔度測驗不差前此未有也之二三君子亦何愧於重黎羲和之職云古今源流至論前集卷五
