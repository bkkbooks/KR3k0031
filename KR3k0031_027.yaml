body:
  text: 古今源流至論續集卷七宋林駉撰史院有編史之名有編史之官有編史之所此三者不可不論也且三代國史之名其來尚矣至漢有所謂髙祖傳孝文傳漢著記前藝文志髙祖傳十三篇髙祖大臣述古語詔䇿孝文傳十一篇文帝詔䇿漢著記百千卷師古曰若今起居注有所謂楚漢春秋陸賈作楚漢春秋禁中女史漢武帝有禁中起居注宗室屬籍漢表三王世家宗正者主諸劉屬籍逮唐始加詳焉玉牒始著於李衢續通典開成二年修玉牒官李衢奏命名勑有以皇后玉牒為名會要始著於蘇冕唐德宗貞元間蘇冕始為唐會要四十卷崔鉉又續四千卷日歷始詳於韋執誼唐貞元初韋執誼奏修撰私家紀録非是望令各撰日歷館中詳定從之此日歷所從起實録雜著於長孫無忌吳競諸人之手長孫無忌作太宗實録四十卷知幾作髙宗實録三十卷而又國史有書舊唐書政要有書唐太宗政要時政有記姚璹請立時政記國朝以來因唐玉牒會要日歷實録之外駮定是非列為志傳者國史也搜求事迹不入正史者别為一書也天聖五年王曽言欲採實録日厯時政記起居注其問事迹不入正史者别為一書與正史並行從之纂集盛美有聖政焉編摩典章有寶訓焉曰政要富弼修三朝政要曰帝學范祖禹編仁宗訓典帝學曰太平故事元祐二年龔夬言仁宗朝命近臣修三朝故事乞續曰中興要略髙宗有中興要略至是其書始備矣三代太史之官其傳逺矣通典夏有終古商有髙勢周則有禮太史皆太史也至漢世有太史公以掌筆削太史公司馬談有中丞以收圖書漢表御史有兩丞收蘭臺圗籍有宗正以掌屬籍見上逮唐復加盛焉以宰相而監國史則為監修之官唐太宗以宰相監修國史如房玄齡嘗為之以史館而撰國史則為修撰之官唐初令狐德棻請修近史遂命修撰名始於此唐史館修撰四人掌修國史國朝以來因唐監修修撰之外乾興命宰相馮拯提舉乾興元年命司徒監修國史馮拯専領提舉監修淳化以董元亨為史館檢討則又有檢討淳化二年以殿中丞郭延澤太子右贊善董元亨並為史館檢討大抵提舉監修惟提大綱檢討惟事搜閲所以専史職者修撰而已聖朝職略宰相監修但提大綱檢討官搜閲校對惟修撰實専史職至是其官始詳矣成周志書皆藏外府周禮本官注至漢有殿中蘭臺之藏漢表御史丞在殿中蘭臺掌圖籍祕書金匱石室之貯遷為太史令紬史記石室金匱之書名山大川之所遷作史記副本藏之名山逮唐則加重焉著作有局所以編史也唐初著作郎掌修國史及製碑頌之屬分判局事四庫有號所以藏史也唐有四庫國史命校書郎刪正之國朝以來因唐著作局之外新寺建殿三班設局宗正置寺此則為玉牒之所祥符八年建玉牒殿于新寺至熙寧三年玉牒於三班院置局後徙編修院自元豐官制行分𨽻宗正寺官六年詔宗正寺修玉牒照用日歷所文宗中興會要門下置院國朝以宰相兼監修國史修撰直館檢討無常員掌修日歷舊於門下省置編修院修纂日歷四朝志宣徽有藏國朝監修國史一人以宰相為之掌修日歷及典司圖籍之事凡國史别置院於宣徽北院之東以藏之秩書立局元豐官制行歸祕書有國史案以著作佐郎修纂日歷此則為日歷之所其餘國史等書或編於史院或修於史館蓋不一所至是編書之所益重矣噫此特其制爾至編史之意其可不論歟自漢以來有述作無法之患自唐以來有更易不定之弊國朝元祐以前有踈略未備之失元祐以後有誣謗不實之過請論之司馬遷紬石室之書紀數千年之事此漢之正史也然項羽以姦猾之雄假竊名號而帝紀反列之惠帝承正統之傳在位有年而帝紀反削之遷之所紀是耶非耶正帝紀詳見史記孟堅觀東觀之書述二百年之事亦漢之正史也然劉歆諛莽之恥名教罪人而本傳闕而不書劉歆奉符命於王莽傳不言之黃霸潁川之政吏治冠冕而循吏則去而不傳本傳固之所傳公耶私耶此述作無法之患是也唐自太宗欲觀史而史不得行其直禇遂良傳見起居注載自房玄齡監修國史而史又不得以行其直本傳敬宗曲筆變亂名實許敬宗傳張説祈改竄易是非張説祈改魏元忠之事吳競不肯本傳獨韓昌黎一代儒宗道醇氣徑所作順宗實録粗伸其意而紛紛之議至後世猶不已宣宗追恨至於竄易無全篇而後止文公天刑人禍之言豈非有為而言歟本傳此更易不定之弊是也國朝以來其史又何如哉自今觀之自建隆元年至開寶八年耳目所接未逺也而史臣逼於權勢多所回避實録所載頗有脫略至命李沆等修之為卷五十而太祖之實録始詳長編淳化五年太宗語宰相曰太祖朝事耳目相接今實録中頗有漏略可集史官重撰蘇易簡對曰近代委學士扈蒙修史蒙性巽怯逼於權勢多所回避甚非直筆會要咸平二年六月監修國史李沆上太祖實録曰前實録僣主偽臣頗全事迹今之所紀坦然明白其實録五十卷并事目二卷謹與舊本同進帝覽之稱善自慶厯四年至熙寧三年歲月相距未久也而史臣亟欲成書會要所載尚有遺事至命王圭等修之為卷三百而仁宗之會要始備熙寧三年翰林學士承旨王圭言伏見國朝會要凡朝廷檢尋故事未嘗不用此事然止修至慶厯三年其後事迹恐嵗久浸成淪墜又當時亟欲成書及欲廣其部帙故其間尚有遺事而所載多吏文恐不足行逺欲乞差官下史院自慶厯四年以後續修至熙寧三年庶成一代之典詔可會要又元豐三年九月宰相王圭上國朝會要三百卷仁宗時修會要自建隆止慶厯四年一百五十卷熙寧初圭請續之凡十二年乃成止熙寧十年通舊增損成二十卷長編甚者君臣獻替不著話言況餘論乎至道三年錢若水言太平興國八年已前君臣獻替不著於話言淳化五年已前親決萬機不聞於䇿府許臣等披訪親決萬機不聞策府況他務乎見上元昊稱臣頗關國體而皆不書之況軍國諸事乎嘉祐四年修撰歐陽修言切見元昊自初僣敇至稱臣始終事節皆不曽書其於他事又可知此其疏略未備之失然也神宗實録之修聖謨可覆也蔡卞何人哉尊私史而壓宗廟薄神考而厚安石至陳瓘尊堯之集出而誣謗之迹彰建中靖國曽布奏請以王安石付史館蔡卞修神宗實録陳瓘極論之遂作尊堯集其序云昔紹聖史臣蔡卞用王安石日録以修神宗實録薄神考而厚安石尊私史而壓宗廟臣居諫省請改裕陵實録及在都司進日録卞云云故以臣所著日録論名曰尊堯集哲宗國史之成典章具在蔡京何人哉以私憤而搖公道謗宣仁而貶司馬至范沖辨誣之書成而誣謗之罪著髙宗紹興四年謂宰臣朱勝非曰神宗哲宗實録事多失實范祖禹有子名沖者令兼史事勝非奏曰神考史緣入王安石日録哲宗史經蔡卞蔡京之手議論多不公今蒙刪修天下幸甚已而范沖辭免勝非曰沖謂史館専修神宗哲宗實録而其父祖禹當元祐間任諫官復坐死嶺表而神宗實録又經祖禹之手今令重修則凡出京卞之意者不無刪改恐其黨未能厭服上曰以私意增添不知當否勝非曰皆非公論上曰然則刪之何害沖遂修神宗實録乞别為考異書明去取之意重修哲宗實録考其議論多誣請别為一書以辨誣為名從之此有誣謗失實之過然也今鴻藻麗筆刋定蘭臺述作公矣瑶編金軸緘藏祕閣紀録定矣固無漢唐之患有如更化以來會要之書肇於嘉泰迄於嘉定典章憲度之彰明本末源流之炳煥至刪集之大則在於戮權臣之竊政此又無遺事也玉牒之書前乎開禧後乎慶元金枝玉葉之繩繩豐功偉績之浩浩至編次之要則在於辨宗臣之被誣此又無失實也是書也上以慰祖宗在天之靈下以垂子孫奕世之休豈不偉歟豈不偉歟館閣聲華當健筆灑落富清製此非杜甫祕監之詩乎杜甫贈李雍祕書監詩曰惜昔李公存詩林有根柢聲華當健筆灑落富清製義苑手祕寶文堂耳驚霆此非韓愈校書之詩乎韓詩贈張徹濡墨竄舊史磨丹注前經義苑手祕寶文堂耳驚霆嗟夫東璧騰輝晉天文志東璧二星下應圖書祕府太乙秉藜拾遺記曰劉向校書天祿閣夜有老人著黃衣扶藜杖出火丹以照向向問姓名答曰我是太乙之精上帝聞卯金之人有博學者下而觀焉天所應也蓬萊仙境漢崇東觀禮儀時人羡為蓬萊島仙瀛洲清選唐太宗開𢎞文館召十八人學士號為登瀛洲人所羡也使居是選者非如杜韓二公之所稱贊寧不忝厥職耶自漢有石渠石室延閣廣內貯之外府蘭臺祕書麒麟天祿藏之內禁此杜佑之説也通典漢武時圖籍志在石渠延閣廣內祕府之室謂之祕書又有御史中丞掌蘭臺祕書及麒麟天祿閣藏之於內禁然考之三輔故事石渠之閣在未央殿北以藏祕書施仇傳注則石渠不得謂之外府而七略亦謂外有太常太史博士之藏內有延閣廣內祕室之府則延閣廣內亦禁中之藏矣故天祿為大夫校書之所劉向遷光祿大夫領校五經祕書劉歆哀帝為侍中大夫遷光祿大夫領五經卒父業楊雄為大夫校書天祿閣石渠為諸儒講經之地孝宣詔諸儒講五經於石渠蘭臺石室則在殿中為史官著述之居遷為太史令紬石室金匱之書至後漢圖書祕記入於東觀亦如西都之所藏後漢圖書在東觀通典餘見上則漢之圖書皆藏於內也夫內禁密勿祕殿森嚴使諸儒出入其中議論商確漢之意亦厚矣夫何揚雄校讎忍為劇秦揚雄作劇秦美新劉歆集議甘心事莽劉歆集七藝嘗奉符書於王莽求如劉宗老乃心王室者有幾人哉本傳噫西都猶爾况東都乎自晉人置祕書監并統著作局掌三閣圖書而祕書之府始居於外通典晉惠帝永平置祕書監屬官并統著作郎又東晉置祕書監掌三閣圗書自是祕書之府始居於外自隋人寫祕閣之書分為三品於觀文殿東西廊貯之而祕閣之書始藏於外隋志云云至唐之藏書尤非一所曰宏文館置於門下省曰崇文館置於東宫唐志武德四年置修文館于門下省九年改曰宏文因漢蘭臺而以祕書省為蘭臺因漢麒麟閣又改祕書省為麟臺唐六典初漢御史中丞在殿中掌蘭臺祕書圖籍至唐以祕書省為蘭臺漢西京未央宫中有麒麟閣亦藏祕書即楊雄校書之所也至唐改祕書為麟臺此於在外藏之至開元之五年於乾元殿東廊寫四庫書以充內庫十三年置集賢書院由是書籍充溢無所不備祕書所有不及其半此於在內藏之韓文唐以祕府為外且逺更聚書集賢殿置校讐官曰學士曰校理常以寵宰相為大學士其他學士皆逹官也校理則天下名士由是集賢之書盛積祕書所有不及其半又見本朝太宗朝李至上言又藝文志則唐之圖書分藏於內外也夫史館之籍許通禁中學士之選號登瀛洲唐之意尤厚矣夫何敬宗修史第成門户許敬宗貞觀除著作郎兼修國史喜謂所親曰仕宦不為著作無以成門户欽明談經井舞八風祝欽明為八風舞五經掃地餘見本傳求如蔣義劉知幾等史學優長者有幾人哉本傳噫唐且然爾况晉隋乎君子厭論也國朝奎星應治文風振古凡所居之府所藏之書所職之官皆煥然一新矣舊館湫隘才蔽風雨太宗别建三館昭文館史館集賢院輪奐壯麗賜崇文以為名啓便門而備幸盡遷舊館之書以實之院之東廊為昭文書南廊為集賢書西廊有四庫分經史子集四部為史館書而猶未也長編云梁氏都汴貞明中始以今右長慶門東北小屋數十間為三館湫隘才蔽風雨周廬徼道環於其側太宗即位因臨幸周覽顧左右曰若此之陋豈可蓄天下圖書延四方賢俊耶即詔有司别建三館輪奐壯麗甲于內庭二月甲辰朔詔賜名為崇文院西序啓便門以備臨幸盡遷舊館之書以實之院之東廊為昭文書南廊為集賢書西廊有四庫分經史子集四部為史館書六庫書籍正副本分八萬卷䇿府之文煥乎一變矣至端拱則建祕閣兩朝國史志端拱初建祕閣擇三館書籍真本并古畫墨迹以藏之景德則廣西庫長編景德三年上謂輔臣曰國家搜訪圖書其數漸廣乃詔分其藏西庫地以廣祕閣祥符則設六閣真宗祥符間分六閣經典閣三千七百六十二卷子書閣一萬三百六十三卷文集閣八千三十一卷天文閣二千五百六十四卷圖書閣一千四百二十一軸而所居之府侈矣舊館所藏書僅萬餘卷長編太宗太平興國三年建隆初三館所藏書僅一萬二千餘卷及平諸國收其圖籍篇帙未備至平蜀得書一萬三千卷平江南得書三萬餘卷訓鑒國初止萬二千卷吳蜀平所獲滋多得蜀書一萬三千卷江南書三萬餘卷今廣內册府通五萬六千二百卷其盛如此復得朱載之徒獻書總千二百二十八卷爾而猶未也長編乾德四年詔求亡書是嵗三禮涉弼三傳彭幹學究朱載皆應詔獻書總千二百二十八卷命分置諸府祥符經典閣為卷三千七百六十二子書閣為卷萬三百六十三文集閣為卷八千三十一天文閣有二千五百六十四卷圖書閣有一千四百二十一軸景祐以來復詔求亡書益州進士至進四百卷而祕閣之書至是充棟嘉祐中下詔求亡書獻書四百篇者授以官爵二百卷以下者賜以金帛益州進士郭友宜進四百卷所藏之書富矣太宗以柴成務宋鎬直史館而館職之官尚未備也會要太平五年以殿中侍御史柴成務為户部員外郎直史館監察御史宋鎬為右拾遺直史館至淳化命吕祐之直昭文和㠓直集賢趙鄰幾直史館杜鎬直祕閣而編校之官尚未置也長編淳化二年以起居舍人直史館吕祐之等分置昭文館太子中允和㠓直集賢院趙鄰幾直史館杜鎬知祕閣先是但有直文館於是始備三館之職至嘉祐以蔡抗陳襄充祕閣校理陳繹充館閣校勘而三等之官備矣長編嘉祐四年置館閣編定書籍官以祕閣校理蔡抗陳襄集賢校理蘇頌館閣校勘陳繹分昭文史館集賢院祕閣書編定之館職三等見蔡官制官制之行併三館之職而歸祕書省職源元豐王明以崇文院為祕書省既罷館職盡以三館職事歸祕書省屬有五著作郎著作佐郎祕書校書正字元祐復置館職已而隨官資除授或領內外職任不必専在館中紹聖初罷之宣和初定為十八員建炎三年罷紹興元年復罷直館直院之名而存直祕閣石林燕語國朝直館直院謂之館職以他官兼者謂之貼職官制行廢崇文院為祕事監建祕閣於中自少監至正字列為職事官罷直館直院之名獨存直祕閣於貼職之首皆不試而除蓋特以為恩數而已然直祕閣之名但為貼職自少監至正字列為職事官元祐復之紹聖罷之宣和又復之中興以來罷於建炎復於紹興至今相仍也並見上噫此特論所居之館所藏之書所職之員而已而所任之人又何如哉年方十餘清節自許何幼悟有得也楊億應童子賦詩曰原秉清忠節終身立聖朝令居館閣時年十一年至七十篤學不已何耆老不衰也咸平五年以職方員外郎分司西京樂史直史館年七十餘於是奉留司表入賀上召見嘉其筋力不衰且篤學好著書故授以舊職悉取所著書藏祕府史與其子黃自俱直史館時人榮之居館九年處之自如何恬退也曽鞏為史館編校凡積九年處之自如在館十年不少干澤何堅操也王存為著作史館等官十年不少干恩澤司馬光文章學術當代尊仰自直講為校勘當也張橫渠道德仁義關中師表特薦而為崇文校書宜也並名臣事實景仁之遷直閣龎公薦之以不汲汲於進取爾范景仁器之之充館職溫公薦之以不交通當路爾劉器之已上並見本朝名臣事實噫使漢唐數子知之得無愧容乎雖然有由也錫之宴會以歡其心淳化祕閣成祕書監李至上言願比玉堂之署賜以新額戊辰御飛白書祕閣二字賜之仍詔宰相樞密使與近臣就觀置宴閣下直祕閣官皆預又賜詩以美其事寵之犀帶以華其躬端拱中王禹稱羅處約召赴中書命試詔臣僚和御製雪詩序稱旨故皆擢用為直史館賜緋舊止賜塗金帶特擇犀帶寵之長編所以示眷愛之恩親製御詩以美其事親書祕閣以榮其居並見上注所以示褒嘉之意此上之眷遇為如何處以子弟魯宗道力拒之恐膏梁之習而溷清華之選天聖六年執政多任子於館職讀書魯宗道曰館閣育天下英才豈紈袴子弟得與恩澤處耶校以道書范淳甫深闢之恐異端之説而玷六經之書哲宗朝王欽若等乞差道士陳景元校黃老道書范祖禹上疏為損朝廷之體此下之愛惜為如何噫紬經繹史砥名厲行孰非正人哉夫何王安石當國喜用少進主行新法遂不由召試直除館職由是闒茸躁進之士得以濫厠儒流而儲材之地遂輕矣蔡官制熙寧中王安石當國喜用新進少年主行新法遂不由召試直除館職由是闒茸輕進之士得以濫進儒館時亦不知貴至蔡京竊政九等職名增立不已弊濫愈甚由是俗冗乳臭之夫叨竊閣名而養賢之職掃地矣崇寧而後增立九等職名為賞功之格自是俗冗不學之徒以嬰兒孺子或胥吏之後叨竊館閣之名孰為史哉元豐更官制以著作祕書郎為一等其次佐郎校書郎又其次以正字待未升朝官及選人皆取名士無復召試矣至崇寧後多處恩幸至於伎術之子戎狄之裔皆預此除豈止闒茸不學之徒耶由是儒館養賢之名掃地矣蔡官制噫蔡京不足責王荆公初年力辭館職之命蓋以此選為重也言行録至後復請嚴召試之法意猶以此選不濫用也熙寧二年王安石論伏見館職一除乃至十人此本所以儲公卿之材也然陛下試求以為講官則必不知其誰可試求以諫官則必不知其誰可試求以監司則必不知其誰可此患在於不親考試以實故也臣願陛下察舉衆人所謂材良而材美可以為公卿者召試令三館祗候雖已帶館職亦可令兼祗候事有當議論者或召至中書或召禁中令奏利害是非則人之賢不肖審矣夫何末路倒戈終始二節召試美意去而不用君子蓋深惜之噫可勝嘆哉監司周命撢人循省四方漢遣掾史分别諸郡良法也自武帝始置刺史職卑權重尚得察舉之體至成帝易為州牧職重權専流為藩鎮之弊逮國朝增置監司帥臣而下亦許糾劾有元封之得而無綏和之失此古今按察之大略也自古封建之法行天下至廣難以統一故五載一巡狩以一風俗以通民情至周而稍多五載巡狩既不能行故置撢人之屬以逹上下使無壅蔽秦人郡縣之後周制始壞秦置監御史掌監郡漢興蕭相國獨知此意故遣掾史行部郡國之治悉逹于公府關絡脈理一統于上漢紀以御史不奉法乃遣丞相史出刺并督察御史亦周人之遺意也自武帝元封五年初置部刺史每以秋分行部見上注以詔書六條察舉郡國雖相府郡縣其意稍間然以六百石之微而察二千石之尊其職卑其權重職卑使其人自奮權重使其志得行豈非一代之美意乎漢官表上武帝元封五年初置部刺史掌奉詔察州秩六百石員十三人綏和以來不遵古制始更部刺史為州牧同上成帝綏和元年更名州牧二千石始也官下縣令今位次九卿矣大縣萬戶以上千石九卿下二千石始也職六百石今職二千石矣其職既重其權安得而不専朱博為冀州刺史行部不察黃綬吏民有言縣丞尉各令詣郡本傳博行部告吏民欲言縣丞尉者刺史不察黃綬各自詣郡令丞尉職卑皆黃綬何武為揚州刺史所舉奏二千石長吏必先露章服罪者為虧除免之而已本傳武為刺史所舉奏二千石長吏必先露章服罪者為虧除免之而已是皆未更州牧之初也然博之得大體猶其本心武則有所畏而為之耳何以言之武以貴治賤不以卑臨尊故欲罷刺史而置州牧博傳武言春秋之義用貴治賤不以卑臨尊請罷刺史更置州牧博以職卑賞厚勸功樂進故欲罷州牧而置刺史博言職卑而賞厚咸勸功樂進故罷州牧置刺史即今日之所言觀前日之所為可知其心矣噫孰知更牧之後而為異日無窮之禍歟東都以來其制復變始州牧奏劾二千石長吏者皆下三公遣吏驗實然後退黜及光武即位不復委任三府故權在州牧廢置自由則嘗一變矣通典舊制州牧奏二千石長吏不任位者事皆先下三公遣吏驗然後黜退光武即位用法明察不復委三府故舉歸下之刺史始以六條詔察過失者罷免其後乃與賦政治民之事則又一變矣通典漢制刺史以六條一條強宗豪田宅踰制二條二千石不奉詔書三條二千石不恤疑獄四條二千石選署不平五條二千石子弟恃怙榮勢六條二千石違公損下或又漢官制劉昭曰晉武帝詔曰上古中代或置州牧置御史皆總綱紀而賦政治民之事任之諸侯郡守漢末四海分崩自是刺史內親民事外領兵馬其始傳車周行後乃更為重鎮據有州郡則又一變矣通典漢刺史乘傳周行郡國無適所治有定處舊常以八月巡行所部録囚徒課殿最靈帝中平五年改刺史唯置牧是時天下方亂各欲據有州郡州牧之任自此重矣愈變愈重至於東都之末方鎮之形方成而劉焉建論猶請重其權任通鑑靈紀中平五年劉焉建議刺史無職任宜改牧伯朝廷從之以焉為益州牧劉虔為幽州牧是知有牧鎮而不知有朝廷袁紹曹操首亂而爭雄東漢本傳皆以州牧起兵討卓拜紹為勃海太守關東州郡起兵討卓以紹為盟主蘇峻桓溫效尤而跋扈晉書本傳自晉至陳禪代之際多由於此至唐之興不鑒前轍以河北隴右之極邊為天下之重鎮而撫之以都督其品位崇重復不少抑豈所謂五大不在邉之説乎見地理志兵志都督略與十六衛將軍同品在六尚書之上與左右僕射為一流自是郡守日輕方鎮日重齊映為觀察以刺史不如制而見遽至謫為别駕唐令狐峘為吉州刺史見江州觀察使齊映不抹首屬戎器映以為恨謫為别駕按唐刺史乃太守之任非漢部刺史也劉晏為觀察自刺史六品以下得杖而後奏代宗使劉晏為觀察故所部善惡刺史六品以下杖而後奏其重何如耶甚至諸道帥臣皆兼觀察之權江南觀察使即宣帥為之荆湖觀察使即潭帥鄂帥為之竊柄擅權無有糾其非者則養成藩鎮之禍又何言哉劉器之云唐制諸道帥臣兼觀察之權故藩鎮擅權無人糾舉是以江南觀察使即宣帥為之荆湖觀察使即潭帥鄂帥為之其餘諸道亦復如此此元城先生所以嘆刺史為良法州牧為隳制也劉器之云漢刺史部十三州職才六百石爾漢制萬户以上縣令職千石今刺史之職乃在千石縣令下其職卑矣然刺史之權極重以六條問事一條謂強宗豪右其五條皆謂二千石不法且職卑則其激昂自進假以重權則得行其志此良法也綏和五年更名牧秩二千石其法隳矣我朝監司始則有轉運使副轉運判官後則有提點刑獄武臣提刑又其後則有提舉茶鹽提舉常平此三者不可不論也轉運置於乾德判官置於開寶使副置於太平紹興以來使副運判詔不雙除乾德以後僣偽略平始置轉運使以總利權開寶六年除徐澤為判官具轉運之名太平興國初皆曰使兩省以上則為轉運使又置副使與諸路判官焉紹興以來詔使副運判不雙除淳化中置提點刑獄四年省之景德中復置天聖六年罷之八年復置而治平罷之逮置於熙寧之後而提刑之職遂不廢乾道以來武臣提刑罷而不差淳化三年遣官往諸路提點刑獄尋省之景德四年復置天聖六年罷八年復置嘉祐中有武臣提刑議者謂武臣不可為監司罷之治平元年罷提刑委轉運司熙寧二年文武提刑並罷十年復置提點京畿刑獄宣和初詔江西嶺東增置武臣提刑建炎元年以盜賊權差一次孝宗乾道武臣提刑罷提舉常平置於熙寧而元祐罷之既而隨罷隨復提舉茶鹽置於宣和而紹興罷之既而或置或罷紹興以來常平茶鹽併為一司熙寧二年差官提舉常平元祐初罷紹聖九年復置政和元年六路共置茶鹽提舉一員既而諸路皆置建炎元年詔提舉常平歸提刑司二年復置三年復詔提刑兼紹興三年復置四年罷委漕臣五年詔提舉常平併入茶鹽司然究其始而觀之國初實無監司之目始雖除轉運特因軍興専主糧餉王師既班其職旋罷如平澤潞則命髙防充北路轉運使用師湖南則命沈義倫充京西水陸轉運使是也增釋國初未嘗有監司之目其始除轉運使止因軍興專主糧餉至班師即停罷如太祖時平澤潞則命户部侍郎髙防兵部侍郎邉光範充北路轉運使用師湖南則命判官滕白充南靣給事中沈義倫充京西水陸轉運使是也太宗時如劉保勳為河東城西四靣轉運使樂沖為太原管內水陸轉運使或謂路或謂道或曰知或曰同知或為幹當此為用武責以餽運之職也逮僭偽略平懲五季之亂藩臣擅有財賦不歸王府始置諸道轉運以總利權然但司財計而按察未任爾職略藝祖開基懲五季之亂藩臣擅有財賦不歸王府自乾德以後僣偽略平始置諸道轉運以揔利權自太平興國中髙保寅請罷支郡以損方靣而轉運始加按察之任始轉運一司𨽻州縣與夫廢置皆在一時初無定制所主掌者軍需糧餉而已自髙保寅知懷光州𨽻河陽時趙普為河陽帥與保寅素有隙事多相制保寅不能平手疏請罷支郡會左拾遺李幹亦言諸州藩鎮支屬州郡多俾親吏掌其關市頗不便於商賈望不令有所統攝以分方靣之權尊奬王室亦強幹弱枝之術也時太平興國二年也遂詔諸州𨽻藩鎮今直屬京師郡長吏得自奏事自是而後邊防盜賊刑獄金榖按察之任皆委於轉運使增釋自慶厯間歐陽公請遣使者以察官吏而轉運始帶按察之職慶厯三年詔諸路轉運使並帶按察使每嵗考官吏能否先是歐陽修請遣使按察官吏賈昌朝言轉運以按官吏故令兼領之六年復罷按察之銜實録然當時按察之官尚未衆也監郡之責亦委倅二東坡所謂若問君王覔符竹恐無螃蟹有監州蓋借錢昆之言以自詠其事蓋可見矣國朝懲藩鎮之弊設通判以二州事故嘗與知州爭權每云我是監郡朝廷使我來監汝舉動為其所制太祖聞之下詔戒厲使與長吏協和有錢昆者餘杭人嗜蟹嘗求補外郡人問其所欲昆曰但得有螃蟹無通判處則可至今以為口實故東坡詩曰若問君王覔符竹恐無螃蟹有監州蓋指此也故金穀之任漕司主之見前注刑獄之事漕司尋之太宗淳化二年五月詔轉運使司命常參官一人糾察州郡刑獄四年十月詔刑獄司宜省委轉運司振舉之以此知轉運司揔刑獄之事也增釋至提刑提舉之官既出而漕司之事分而倅二之權輕矣此其更置之由也噫漢以二千石而為牧祿秩太優人無奮職我朝以郎曹出使而得劾宰執侍從之臣漢制不及也唐以帥臣而兼觀察無由糾舉人多廢職我朝以名藩具狀而亦書姓名於監司之前唐制不及也至道元年八月荆湖轉運使何士宗請執政大臣出領外郡應合申轉運公事只書通判以下姓名太宗謂宰相等曰大臣品位雖崇若出臨外郡即轉運使所部係州府不係品位此朝廷典憲不可輕改餘見上注不特此爾奏事稱旨特賜金紫馮亮將漕有勞榮錫錦袍景祐間河北陜西三路漕臣有勞錫方騰練鵲錦袍華其躬也覆正死罪即遷員郎杜衍為提刑覆正死罪遷刑部員外郎官索治寃獄課命遷官成正忠為提刑治寃獄課在第二等遂遷官榮其職也當時任職者當何如哉有訪西蜀利害者趙稹為益州路轉運使上諭稹曰蜀去朝廷逺而有可更置者上之稹至部事無大小悉心究訪一日章數上長編有罷江南橫賦者大中七年陳靖為江南轉運使自李氏橫賦於民者凡十七事靖請罷之有除陜路之害者薛頌為陜路轉運使除夔州陜西防州等四路修成浮橋溉田煉礬之害事略有救東國之民者四朝國史哲宗念東國困於役竄吳居厚復以鮮于侁為京東轉運使司馬光曰侁為福星救之耳噫三虎楊紘猶使貪吏解去况不為三虎乎富弼薦楊紘為江東轉運使紘常言不法之人不可貸肆貪叨於一郡一邑害良民千萬家不若去之不利一家耳聞者望風解去然竟坐刻苛下遷慶厯中漕司楊紘王綽提刑王鼎號江東三虎四瞪宗旦尚能叱詈蠻儂况不為四瞪乎仁宗朝儂智髙執孔宗旦欲任以事宗旦叱賊乃大罵遂被害宗旦始官京東與李道徐尚同等四人為監司人惡之號為四瞪此皆激昻勉勵之有權耳然嘗觀歐公包公之言而有疑焉官吏為患察以利民此歐公之論也河北都轉運按察使歐陽修言今按察者所奏未能舉行沮壞者一言便加輕信皆由朝廷未知官吏為州縣大患而按察可以利民委任不堅故毁謗之言易入體量部吏頗傷煩碎此包公之論也包拯言諸道轉運使自兼按察及置判官以來并提點刑獄等體量部下官吏頗傷煩碎此蓋茍圖振舉以希進用二公之言果孰從乎曰圖振舉之名而為煩苛之政者非也借寬厚之説以為容庇之私者尤非也用捨升黜公而不私則二公之言皆可用耳愚復奚言郡守漢之兵財在於郡守故郡守得以伸其權唐之兵財不在刺史故刺史無以行其志國朝分藩鎮之權付郡守而兵財為有餘熙寧收郡守之權歸朝廷而兵財為不足此古今郡守輕重得失之由也夫漢內郡甲卒掌於郡尉漢官表郡尉秦官佐守典武職甲卒邊郡兵官屬於長史漢官邉郡有長史掌兵馬職六百石守若無與於兵然都試之講太守會之漢每秋八月郡太守都尉與縣令長丞尉會都試課殿最虎符之調太守分之文帝初與郡守為銅虎符故趙廣漢之將兵屬蒲類將軍擊胸奴朱買臣將兵與橫海將軍擊南越並本傳則一郡之兵守得以自將也千乘河東均輸有官地理志千乘有均輸官河東有均輸官鴈門沃陽榷鹽有丞地里志郡國皆有鹽官鴈門沃陽置長丞守若無與於財然葦蒲之入郡得取之翟方進傳廪犧之錢郡得藏之蕭望之傳文翁守蜀郡減省少府用度以興學校魏尚守雲中許以軍市之租以給士卒本傳則一郡之財守得以自用也夫惟兵得以自用則進退擊刺可以為緩急之備財得以自給則積聚散施可以支凶荒之患郡守容不得伸其權乎夫何刺史一罷更為州牧而郡守之權非復前日爾自州牧得領兵馬則兵易而在州牧晉武帝詔曰千石中代或置州牧或置御史或置監御史皆揔紀綱而賦政治民之事任之諸侯郡守漢末四海分崩自是刺史內親民事外領兵馬後志注自州牧得據土地則財又轉而在州牧靈帝中平五年改刺史唯置牧自是天下方亂豪傑各欲據有州郡而劉虞劉焉亦自九卿出領州牧州牧之任自此重矣後袁紹曹操董卓皆以州牧割據沿歷至唐終為積習太宗始易太守為刺史又皆假以使持節之稱官志武德元年太守曰刺史加使持節按前代所謂持節者皆得専戮二千石以下通典魏晉制有使持節假持節使持節戮二千石以下假持節戮無官人是以古所以假太守而假刺史此其重之之意豈無謂哉惟其重鎮之地邊屯之兵歸於都督又品秩得居六尚書之上見兵志故郡守日輕而藩鎮日重白居易江州壁記云自武德以來庶官皆便宜從事郡守之職統于諸侯帥郡佐之職移於部從事白居易江州司馬壁記自武德以來庶官以便宜從事大攝小重攝輕郡守之職統於諸侯帥郡佐之職移於部從事故自立五大都督府至於上中下郡司馬之事盡去惟員與俸在則牧鎮總郡守之權在初時已然爾夫刺史本以職租賦也諸鎮既強自擅租賦不領度支刺史何有於財乎唐自肅宗代宗之後如河北諸鎮租賦不領於度支刺史持節正以掌軍旅也後諸鎮兼總所𨽻州之兵權刺史何有於兵乎楊綰傳時諸州悉帶團練使綰奏刺史自有持節諸軍事以掌軍旅餘見兵志兵財既専於牧鎮之手內地相望皆為廣區趙魏燕齊同日而起梁蔡吳蜀躡而和之藩鎮傳序地益廣兵益強僣擬益盛侈心益昌趙魏燕齊同曰而起梁蔡吳蜀躡而和之此其措置之失豈但唐人之罪蓋其所從來者逺矣始嘗疑之兵財之在郡守固能守衛邦境也兵財之在藩鎮猶其在郡守也然在郡守則可以已亂而在藩鎮往往至於召禍何耶曰守之所治不過千里鎮之所屬支𨽻數郡兵益強財益富土地益廣所以有頡頏難制之患非若守權之適中耳強不至縱弱不至削盍觀諸國朝乎皇朝立極首革前弊解強藩之權於杯酒之間去積世之患於談笑之頃錢穀之利入於王府精兵之強收于京畿太祖召趙普曰唐季以來兵革不息何也普曰自唐以來戰鬪不息節鎮太重而已惟稍奪其權制其錢穀收其精兵天下安矣上因召石守信王審琦等飲酒酒酣上曰汝曹何不釋去兵權擇便好田宅市之為子孫立永久之業君臣之間兩無猜疑不亦善乎明日皆乞解軍權以散官就第見本朝事實然猶恐未盡也髙保寅以州事制於河陽之帥李幹以關市掌於藩鎮之吏復以諸路邊防金穀之任皆委於轉運之官向之支郡𨽻於雄藩者今直屬京師耳向之郡吏制於帥臣者今得自奏事耳增釋髙保寅知懷州州𨽻河陽時趙普為河陽帥與保寅素有隙事多相制保寅不能平上疏請罷支郡會左拾遺李幹亦言諸州藩鎮支屬州郡多禆親吏掌其關市頗不便於啇賈望不令有所統攝以分方靣之權尊奬王室亦強幹弱枝之術也時太平興國二年遂詔邠寧涇原鄜坊延丹陜虢襄均房復鄧唐澶濮宋亳鄆濟滄德曹單青淄兖沂貝兾滑衛鎮深趙定祈等州先𨽻藩鎮令自屬京師郡長吏得自奏事自是而後邉防盜賊刑獄金穀兼按之任皆委於轉運使又節次土地俾之分治此蓋分方鎮之權十之二三以付守倅也見下注當時郡守兵可以用財可以給無復有掣肘之患鳴呼聖人為千萬世之謀逺矣哉是故以山澤之利歸於轉運轉運不自私也盡給逐郡以用之經費之錢總於轉運轉運不自有也皆聼知通以支之二稅分數既𨽻屬郡坊場等利又歸本州此外犒饋燕設又有公使庫以回易朝廷非不知州郡榷利均厚其權若重也蓋以聚人率衆修城講武於此為之資耳國初以一路賦稅榷酟商稅茶鹽坑冶山澤之利轉運司官得以裒多益寡移用以給逐郡其二稅有定例分數𨽻屬州郡及係官房廊雜收地利坊場河渡支酬衙前不用者盡歸本州其係省經費錢帛貯之軍資庫轉運司捴庫若屬州郡之財别有府庫貯藏聽知通備用非常其犒饋燕設則有公使庫仍許回易收息助費是量分方鎮財利以付郡守其旨逺哉蔡官制不然趙贊董遵誨之徒以郡中管榷悉與貿易而卒得捍禦之力者非其驗歟三朝寶訓國初太祖留心將帥命趙贊屯延州董遵誨屯環州以備西戎李漢超屯關南馬仁瑀守光州以禦太原郡中管榷之利悉與貿易免所過征稅計令召募驍勇以為爪牙凡軍中事許從便宜由是邉臣多克捷二十年無西北之憂守𢃄知軍事之銜軍政得制也倅帶通判軍事之職軍政得二也大郡指揮數十中郡指揮五七小郡亦不下三五平時犒勞得其歡心一旦有警可忘其死此人知郡守為千里之長朝廷非不知州郡得専軍政其權若重也蓋以屏翰王室保固邉境以此為之備耳逐州置軍營招兵大郡有數十指揮中郡有五七指揮小郡亦不下三五指揮每指揮率以四五百人為額其軍餉給悉在運司其統制軍馬乃𨽻守倅如曰知某州軍州事通判某州軍州事軍乃軍政也州乃民事也兵民皆守臣得専制而通判二其權平時飾饋犒勞各得其歡心一旦有警使之犯難可忘其死此久知守臣為千里之主也時朝廷非不知州郡榷利均厚但欲倚付防虞不輕蓋分方鎮之權十之二三以付守倅也一方或有冦盜不虞州郡有兵有財足以聚人率衆屏翰王室保固邦境應將鄰州平時除戎器治城防講武備皆有其資此乃祖宗時待郡守之深意不然李漢超馬仁瑀之徒軍事許從便宜召募驍勇以為爪牙而多有克捷之功者非其效歟見上注熙寧大臣變法過當以郡之兵權太重而輕之郡之財用太専而收之舊例軍額守所主也併額以後𨽻于憲司守不敢過而問焉舊例兵馬守所制也團結以後領于將副守不得過而問焉是守無兵權也二稅之數悉入經費正使之錢已禁醖造問其茶鹽茶鹽有使問其坑冶坑冶有司青苖取息免役輸錢星火文移秋毫不貸是守無財用也噫兵去則無以備非常財乏則無以支不給異日之患安石獨不慮及此乎至熙寧初王安石建言郡守兵權太重於是刮四方地利籍州府禁軍罷招填而掇併軍額又會其逐利闕額兵食衣樁嵗計其口數上供京師乃𨽻提刑目為朝廷封樁立免役法悉斂民財而官為差募收坊場河渡户絶沒官之産召人買朴斷佃量破雇直以募衙前藉其餘資以助常平設斂散之法初號青苗錢取息二分嵗積巨萬又為抵當市易以抑兼併措置常平使者専董一司其舊例屬州一稅分數房廊地利盡撥入轉運司以備經費州郡只有公使庫限額正使錢為守臣之施設而又禁其回易限其醖造行之十年州郡饋犒幾乏其資此守臣無財也分將籍州郡兵通一路團結五千人為一將置將副専領其後軍情離二守臣驅使不行是失兵權也既無兵權又無財用一旦冦盜何以禦之靖康中詔守臣統兵入衛遇敵輒潰流為羣盜由守臣失兵權無財用故也今郡縣之兵有禁兵有廂兵有弓兵係於廂者郡可私以役使而禁兵弓兵之籍見在帥司以備宣撫征伐攻戰之役所謂兵者特兵籍而已一郡之財有贍軍有係省有上供為係省者州可留以廪給用度而贍軍上供之數悉輸轉運司以備户部總司俸給賞犒之費所謂財者特應期會而已母乃太弱乎臂指拘牽氣象蕭條朝廷之詔責則曰民之父母不能任責也牧帥之文移則曰吏之師帥不克稱職也為守者亦難矣噫藝祖廟謨中令祕畫刋諸琬琰萬世可覆舉而行之愚有望於今日縣令附丞簿尉前漢詔書言守不及令至明帝詔不得繆舉黃綬始言之矣本紀班史傳循吏言守不及令至范史載卓魯諸人始及之矣後漢循吏傳夫西漢之所以不及者豈以其職甚卑耶否則政未必賢耶又否則待令甚輕不及太守耶然嘗考之漢有自孝亷舉者趙廣漢王尊劉輔尹賞平當有自賢良舉者魏相貢禹有自直言王尊方正房鳯舉者有自茂材薛宣龔勝尹賞四行何武舉者不特此耳以詐御史傳者至於棄市魏相以侍中犯法者至於斷頭何並胡建捕客於蓋主之家本傳義縱不少貸於太后外孫之罪本傳舉選之法既不輕任誅戮之權復無所制則職亦不輕矣治劇有功何並原涉陳遵尹賞將漕有最陽翟之課治行尤異趙廣漢外黃之政上書願留焦延壽自虢令轉守槐里王尊之能也本傳由櫟陽徙雲陽平陵朱博之最也本傳則吏亦未嘗不賢矣或遷刺史朱博或遷諌大夫劉輔或遷京輔都尉趙廣漢或遷御史中丞薛宣上之寵擢為如何琅琊太守不肯令掾下縣曰縣自有長吏朱博馮翊京尹不肯出縣行曰縣皆有賢令長韓延壽下之待遇為如何又不可以待令為卑而議之也然詔書不之及循吏不之傳何哉我知之矣養民之道郡踈而縣親除吏之法郡少而縣多令之親民固不可輕也天下幾郡一郡幾縣君門萬里必欲人人而擇之不幾瑣瑣屑屑乎漢法太守得自除吏而刺史行部但察二千石一守得人則諸縣得人矣此西漢法簡而易用也東都詔書之下督及黃綬雖曰丁寧切責欲皆卓魯然非執要御詳之道智力所及察者可以得知情偽耳目所不及知者必有不如人意耳何東都之不憚煩耶嗟夫豈惟東都然哉唐明皇以縣令理人之策召試於後庭而韋濟獲第一之擢開元初韋濟為甄城令既謝有詔問所以安人者對凡二百人惟濟居第一不能對者免官宣宗聞醴泉考滿之政預得於父老而李君奭被刺史之除本傳審察於未用之先奬勵於已試之後委任縣令之意亦篤矣然當時吏治不如所望是豈徒為美名而未聞吏治之實乎將所察未必周而徒自惑於聰明乎善乎姚崇之言曰擇十道使患未盡得人安得縣令皆稱職則知二君雖以縣令為意未得其所以審擇奬勵之術噫母惑乎漢詔之不及班史之不傳歟此猶可也五季令長率以齷齪老耄者為之所在不治猥迹萬狀本朝事實五代任官凡齷齪無能昏老不任驅䇿者始注縣令故天下之邑率皆不治誅求刻剝猥迹萬狀故優諢之言多以長令為笑建隆初始以朝官為知縣其後多用京官為之五代藩侯補親隨為諸縣鎮將掌警盜劫與縣令抗禮凡公事専逹於州建隆二年置尉簿掌鄉村盜賊鎮將所主郭內而已始統於縣推原其故蓋令長之權制於鎮將之官而鎮將之任又出於藩侯之屬所以局促委頓不獲展用而士流皆不屑任之也政要後周用人為令濫雜由是士流耻居之餘見上國朝立國之初首重親民之職始邑之事權牽於鎮將今别置尉簿悉統於縣其權重矣始邑之令長委於無能今京朝等官始令受職其選清矣其權重則皆有奮志其選清則罔有庸才然猶未也按察郡守監司任之按察縣令郡守任之一則曰縣有課最知通考察也元祐四年吏部言縣令罷任知通考察課績以德義有聞清謹明著公平可稱恪勤匪懈為四善從之二則曰令難盡擇精選郡守也髙宗謂輔臣曰近時士大夫數言縣令多有不稱其任者朕再三思之亦難盡擇莫若精選監司郡守似為要道正如朕深居九重豈盡知百職能否當留意相體此國家之美意西都之遺制爾是故循良政迹著在國史今可覆也宦寺索牛以理拒之吳育知襄城縣宗室宦寺上冢過縣或夜索牛駕車公曰牛不可得也衛士縱馬以法杖之范純仁知襄邑縣民有訴衛士縱馬食田者公捕杖之青苖不請寧棄官去薑潛以民不願請青苖拂府寺意稱病棄官而去免役不議寧投劾去劉蒙知湖陽縣初行免役法使者詔諸令會議蒙以為不便不肯會議即投劾去民田植桑存名著作純仁知襄城民鮮種桑公因民之有罪輕重者使植桑人得其利號為著作林著作公作宰時官也縣庭植柏留號萊公冦凖知巴東縣每期會賦役不出符移唯具鄉里姓名揭縣門民莫敢後手植雙柏於縣庭民比甘棠謂之萊公柏不奉行茶法雖忤使者民所利也唐恕不行茶法忤使者意而謝病免歸不髙價估絹雖拂轉運民所便也宇文之郡為曲水令不肯髙價估絹拂轉運使意遂致仕治簿書恤孤寡非朐山之範乎熙寧二年劉彛為朐山令治簿書恤孤寡通陂池教種藝平賦斂抑豪猾振遊惰凡所以惠民者無不至式其事為一書名曰法範清如水平如衡非穀城之謡乎四朝國史葉康直傳康直知光化縣豐稷為穀城令人歌之曰葉光化豐榖城清如水平如衡皆國家考察勸勉之有術矣噫盛哉抑又論之自朝廷而州郡州郡則親於民也自州郡而縣縣又親於民也然縣之吏有丞焉有簿若尉焉皆親民也國家以坑冶之利常平之倉命丞職之國史外補云縣丞昔大邑有之至是不以邑之大小皆得置丞使主常平坑冶農田水利邑版之稽地力之教命簿職之胡文恭行吕英制云善勾邑版之稽能盡地力之教檢覆之事巡捕之責命尉職之四朝志尉掌巡捕及檢覆之事豈不重歟然今日上而監司郡守之監臨次而令長之切責又次而蓮幕之伺察斂板趍庭借書求庇舉手移足惴惴譴呵噫親民之官百里所依顧輕之至此耶盍不以國家崇重之意而觀之丞之一職置於熙寧罷於元祐厥後隨罷隨復其事固未得聞國初不置丞皇祐但赤縣有之熙寧增置縣丞一員元祐初省熙寧三年復大觀復若尉與簿自開寶三年置之見前注其職未嘗不振爾裴明允一慈溪尉耳親詣闕庭力陳世事不曰越職也寶元初有明州慈溪尉裴明允倜儻不羣雖處賤官有憂天下之心屢上書言事復詣闕上書漢梅福上書言災異求假詔傳吳擇仁一雍丘簿耳得詣朝堂親白河事不曰瀆尊也擇仁字智夫為開封雍丘主簿元祐中金水河隄壞十八縣皆選屬佐役擇仁詣朝堂白事宰相范純仁異之領簿中乃有是人耶元城之尉以有追捕功也而國家特除令尹勉之至矣乾德元年以大名府元城縣尉張義元為本縣令賞捕盜之功也天下縣尉久廢是嵗復置義元首該賞典楚丘之簿以有公輔器也而留守為之加禮重之至矣四朝國史張升字杲卿為椘丘主簿南京留守王曽識其有公輔器重之祖宗之所褒寵先正之所優禮亦以親民之選在所當重爾噫脫身簿尉中始與箠楚辭杜詩此唐之極弊在今日固不至此極然亦當體祖宗先正之意可也愚因縣令之親民故併以屬論之將帥將帥之名古也然周官將與帥並置而將之職大於帥漢唐之初置將不置帥而帥之名泯國朝中葉以來置將統以帥而帥之權重愚嘗考其始末歷代之將帥可得而論矣周設六官而兵掌於司馬司馬之職其制軍有六曰軍曰師曰旅曰卒曰兩曰伍萬二千五百人為軍軍有將二千五百人為師師有帥五百人為旅旅亦有帥軍將命卿師帥皆中大夫旅帥皆下大夫禮夏官司馬乃立夏官司馬使帥其屬而掌邦政以佐王平邦國政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長即是而觀將之職重而帥之職輕將之所統者衆而帥之所統者寡下至春秋之世此制猶存秦之伐鄭有三帥之遣書秦誓秦穆公伐鄭注遣三帥帥師往伐之事見左傳齊之內政亦有鄉帥縣帥焉伍鄙之法三十家為邑邑有司十邑為卒卒有卒帥十卒為鄉鄉有鄉帥三鄉為縣縣有縣帥故曰將帥並置而將之職大於帥也漢初有大將之拜前韓信傳而帥則未聞也唐興以府衛制兵析關中為十二道皆置府後更為軍軍置將副武德初始置軍府以驃騎車騎兩將軍領之析關中為十二道道皆置府二年更十二道曰軍軍置將副各一人唐志而帥之名亦未聞也故漢之名將前有韓彭韓信彭越後有衛霍衛青霍去病至於唐也靖之與績李靖李績功著於前光弼子儀李光弼郭子儀名播於後不特此爾雲臺圖畫漢明帝時圖畫中興二十八將於南宫雲臺贊榮耀一時帝室勤功唐興其名將曰英衛皆擢於罪亡之餘遂能依乘風雲勤功帝室本贊垂傳萬世曽不見以帥而顯者雖唐之中世節度使之置亦謂之帥然府兵壞而方鎮唐室以衰君子無取焉詳見唐兵志故曰置將不置帥而帥之名泯也國初僭國未下西北未賔服太祖命諸將出鎮邉地即帥之職而未有定名國初諸僣國未下西北未賔服太祖留心諸帥命李漢超屯江南馬仁瑀守瀛洲韓令坤鎮常山賀惟忠守易州何繼筠守棣州以拒北虜郭進控西山武守琪戍晉州李謙傅守隰州李繼勳鎮昭義以禦太原趙贊屯延州姚內斌守慶州董遵誨屯環州王彥升守原州馮繼宗鎮靈武以備西戎寶訓長編至神宗始置諸路將官陜西四十二將河北三十七將東南一十三將各有正副調發賞罰皆決於將副宣和六年詔然未有以統其權也宣和間詔杭越等州守臣並帶安撫掌總護諸將統制軍會要而未有帥府也至建延初李綱請於沿河沿江要郡置帥府其帥府文臣一員帶安撫使為都總管武臣一員為副總管遇朝廷起兵則副總管為帥至紹興二年諸路並置中興會要則是帥府統諸將矣故張公浚之帥興元得以節制平江常秀兵馬事實吳公玠之帥涇原得以兼陜西諸路都統事實豈非帥之權重於將乎夫將帥並置者周也置將不置帥者漢唐之初也而我朝中葉以來獨以帥而總夫將者何哉吾知其為御將之法也今夫泛駕脫銜之馬亦在所馭之而已御得其道則狙詐咸作使御失其道則狙詐咸作敵况為命為威董賢為大司馬衛將軍册將之所係為甚重嚴霜時雨怒如嚴霜喜如時雨魏事將之喜怒為不常自非神武祕略景祐四年御製有帥以總其權而制其命寧保其無陸梁之患哉雖然我祖宗亦未嘗無御將之法也伐蜀之役因大雪而脫所服之裘帽以賜之將帥發京師時大雪上設氈帷於講武殿衣紫貂裘帽曰我被裘如此尚覺寒念西征諸將衝犯雪霰何以堪處即解裘帽遣中黃門驛賫以賜王全斌全斌拜賜感泣長編此御之以恩也江南之役以匣劒授曹彬曰不用命者戮帝大言諭彬曰所謂大將者能斬出位犯分之副將則不難矣彬汗下不敢仰視言行録此御之以威也恩以使人愛威以使人畏此藝祖所以為善御也方今邉防繹騷戰勝攻取正有賴於爪牙之任誠能法藝祖之道恩威並行而又有中興帥府之法以節制之可謂善將將矣古今源流至論續集卷七
