body:
  text: 古今源流至論前集卷八宋林駉撰儒吏古者以仁義為儒以教化為吏而儒與吏為一後世以章句為儒以法律為吏而儒與吏為二嗟夫周官九兩曰道與治孔門四科文學政事又曷嘗有異致哉此愚深嘆後人之不古也夫惟儒與吏為一也詩書禮樂皆潤澤生民之具功名事業亦吾道之緒餘是故臯夔伊傅雍容於廟堂之上而君民相忘於道化之中寂寥於都俞之頌而天下交通於泰和之治周召毛畢以帝王制作施於邦國都鄙之間以孝悌睦婣書比閭族黨之民是時也内而賡歌外而岳牧皆剛簡直寛之徳出而使長入而使治無非俊造秀乂之士後世指臯夔伊傅周召之倫以為儒之效吏之循者不過仁義教化之學耳夫惟儒與吏為二也儒則從事於誦說章句之末而目吏為俗也吏則從事於法律刀筆之陋而目儒為腐也是故假春秋以濟欺公孫𢎞學春秋及對策以旱為桀之餘烈上䛕武帝托論語以文奸者張禹不言天變及帝問之以子不語怪力亂神為對往往以詩書為發蒙上尊管晏下煽申商者又甚於功利之場晁錯𢎞羊張湯杜周等傳儒術飾吏似濟時也如多詐何惠文從事似振治也如太刻何見上是時也視腐儒為敗事酈食其視尚書為樸學而儒之效泯武帝指申韓為家學景帝指雜伯為制度而吏之實壊宣帝當時謂寛𢎞杜張之徒以為儒之術吏之能者不過章句法律之習爾嗚呼儒與吏之名固對立於古今也然天下亦豈有捨儒而可以為吏哉儒道與天地並上之扶天經立人紀次之定社稷安國家曷嘗一日無所待於儒至其列之官爵著之行事居天職而治天民者夫是之謂吏而非有二也烏可以壁間蠧簡為無用之藏徒與民相處於三尺間哉第恐儒而非真曾俗吏之不若所以起後人輕鄙之議甚矣天下不可無儒者之功也吾觀唐虞三代之時此固享吾道之福若周而秦秦而漢漢西而東儒者之效固間闗於群咻衆吠之中天下亦隂受吾道之賜異端横流吾道如綫大造幾不立矣吾孟子奮力而排之我是以有仁義之道秦火既熾孔壁不傳大造復不立矣吾董氏首尊孔氏我是以有六經之教奸雄竊睨染指漢鼎大造又不復立矣而若陳元方鄭康成之徒且聲大義於一隅我是以有孔孟之澤本傳若然者果儒之功耶抑吏之功耶文不䘮天道未墜地藝祖立極天下文明以讀書勉大臣太祖曰宰相必用讀書人以文吏代鎮將太祖謂趙普曰儒臣有武幹者何人普以辛仲甫對徙益州都監以士人治刑獄開寳六年詔改馬歩院為司寇院以新及第進士九經五經及選人資序相當者為司寇參軍以儒人典藩方太祖因命郎曹卿監官出典藩方懲武臣之弊趙普一代勲臣也東征西討無不如意求其所學自論語之外無餘業趙普曰論語二十篇吾以一半佐太祖定天下盧多遜當代名儒也博學强記該貫古今用而為相藹然於太平興國之治太祖問盧多遜事善對帝曰宰相必用讀書人後太宗拜為相一掃五季刻薄之習隱然正道之規模此列聖所以守為家法也故三司錢榖之任葢吏職之至難我祖宗必擇德望儒臣如陳恕冦凖程琳蔡齊之倫相望於前蓋不敢付之庸常之吏也蔡龍圗官制祖宗舊制選除執政侍從必先選歴錢穀伯祖文忠公欲擢參大政先除擢三司使數月乃拜樞宻副使吕申公嘉祐中朝廷欲置之禁掖乃除户部判官數月進修起居注旋召知制誥陳晉公恕為三司使十八年精於吏事晚年薦寇萊公自代真宗用萊公為三司使景祐元年程琳為三司使禁中有所取輙復奏之又蔡齊為三司使見上京尹繁劇之任尤吏事之至冗我祖宗必用賢明碩望如范仲淹杜衍包拯歐陽修之流歡然政聲葢不敢委之刻薄之吏也范仲淹除侍郎即任開封府時與吕夷簡不恊欲以此困之仲淹為尹數月京師稱治杜衍知開封府權貴不敢干以私包孝肅知開封府京師為之語曰闗節不到有閻羅包老歐陽修嘉祐二年除開封府此吏之所施未嘗不源流於儒也歐公之倡古文吾儒之領袖也其與曽南豐蘇東坡之所講明者不但區區於操觚弄翰之末耳以犯顔敢諫為忠以濟時行道為賢東坡之有聲杭郡南豐之六秉州麾皆有補於吏政蘇軾序歐公文集曰天聖景祐間歐陽子出天下爭自濯磨以通今學古為髙以救時行道為賢以犯顔敢諫為忠長育成就至嘉祐末號稱多士歐陽之力居多南豐歐公門下士東坡歐公所取南豐行狀公自求補外轉徙六州東坡守為蘇堤浚三河杭人徳之胡安定之明經學吾儒之山斗也其與劉彞范純仁錢藻之所議論者不特屑屑於訓詁句讀之習爾講經義有齋明時務有齋劉彞之明水利純仁之明治道皆有益於吏治吕氏家塾記湖學以經義及時務學中有經義齋治事齋經義齋者擇疏通有器局者居之治事齋者各治一事又兼一事如邊防水利之類云李廌記安定甄别人物因其所好而類聚别居之故好尚經術者好談兵戰者好文藝者好尚節義者使之以類羣居劉彞對神宗曰錢藻之淵篤孫覺之純明范純仁之直温錢公輔之簡諒其餘政事文學不可數皆安定之門人也劉彞學水利何熙寧之臣言道德而心功利親羣小而踈老成天下為之開闔動揺彼六七年中數十使者徒貪城社之可憑不思竈突之炎上孰知寛之一分民受一分之賜矣諸賢固已隨事苴補於㝠㝠之中及其焦頭爛額於元祐七八年問者又向時排擯廢逐不可得一日安於朝廷之人也當是時雖百惠卿其將焉施惜乎君子防制之太踈小人報復之反肆積至政宣無可為矣見新法條天運循環隂剥陽復龜山先生巋然如靈光之獨存出其眇然之驅支山岳萬鈞之壓以啟趙鼎張浚諸賢弼成建炎撥亂之功此吾道之一伸也龜山行狀晦翁先生屹然如泰山之具瞻福星外臨以蘇生靈荒旱之餘復成淳熙太平之治此吾道之再興也晦翁行状嗚呼二公所學為天地立心為生民立極為前聖繼絶學為天下開太平豈一時吏治究其萬一哉此愚於終篇推廣儒學之盛云才德忠肅懿恭徳也而古謂之才左傳徳行道藝賢也而古亦謂之能周禮嗟夫以徳養其才則才泯於徳之中徳不足而惟以才自見則始判於徳之外且人才之在天下若十指然强者奮發敏者輕銳辨者縱横是其才禀於天者然也先王以君師之責自任作成長育以全天地父母所不可及之功九徳之辨書典樂之教皆所以治其偏而成其全禮樂射御敬敏任恤皆所以達其才而成其徳禮迨夫陶和毓粹氣質變化朝廷比閭人人君子是故司馬論材即曰秀曰俊之賢鄉老賔興即月書季攷之行禮奔走禦侮疏附先後夫豈其才之不用而赳赳武夫公侯干城無非兎罝好徳之人虎賁趣馬左右擕僕夫豈其才之不任而淠彼涇舟烝徒楫之亦無非奉璋峩峩之士其徳度足以收世望其風流足以成習俗其器識足以達事幾此古者未嘗有才徳之分也自尾生之行一棄而德為無用漢陳平傳自跅􅕟之詔一下而才為有濟漢武帝紀弄車織薄不齒鄉井衛綰周勃黥卒亡命闖伺山澤黥布非不足與集事也然叛者九起不顧盟血之未乾韓信傳又彭越傳奉命絶域唇辨如流張騫宣威沙漠開拓土宇衛青霍去病非不足與謀功也然本根蠧耗索然元氣之已秋於是君子始有才徳之辨曰徳如大圭不割也才如利刄不缺也唐白居昜傳曰德勝才謂之君子也曰若才勝徳謂之小人也司馬温公嗚呼謹重寛厚者固足壽國脉而敏銳奮發者亦豈不能辦事哉全徳粹行固足以服人心而一藝一能亦豈為棄物哉惟隨宜而器使之各謹視其所用而已葢鸞輿在前屬車在後清道而後行則非稱徳之驥不足以駕君之車及用之戰陳施之馳逐則非駿足疾駈超軼而絶塵者不足以獲多而取勝然則曰賢與能亦不容偏廢也愚獨惜教養之制不明剛柔緩急不能無偏而世之所謂才者往往淪於頑鈍無耻之流此才之所以不如徳也歟世更五季人物彫陋天生聖明陶冶一世治獄必用士人開寳詔以新及第進士九經五經及選人資序相當者為司理參軍固也宰相必用讀書太祖因盧多遜善對曰宰相必用讀書人而左右前後無非儒學之選見後典郡必用儒臣太祖問趙普曰儒臣有武幹者何人趙普以辛仲甫對徙益州都監將閫必擇無過固也太祖命將必用謹厚無過者而堂後官亦必參之以士人之任舊堂後官皆胥輩至太祖參用士人是雖斬艾蓬蒿削平僭偽之初使愚使貪使智使勇固不能免而天下既定非鎮重老成之人不用也嗚呼其為天下慮後世慮也逺矣是故亂世用材治世用行太宗有意於用徳也端拱二年上曰為臣之道治平之代雖收功效亂世止用其才不用其行如陳平韓信頃刻可立功業治平之世即此輩無以施其謀畧孔子四科以徳行為首夫惟以徳為可重故李沆以風範端凝相李沆侍宴太宗目送之曰李沆風範端凝真貴人也韓丕以冲澹自處進韓丕起寒素以冲澹自處不奔競於名宦太宗甚重之命守本官左諫議大夫知制誥為翰林學士用士安而不用張洎者以洎有文學而士安有徳行也太宗淳化二年以畢士安為翰林學士初執政欲令張洎上曰極知洎以文學資仕不下士安第徳行不及爾用敏中而復用張詠者以敏中大耐而詠素有徳望也淳化四年一日御筆飛白書向敏中張詠姓名付宰相曰此二人名臣也朕將用之餘見言行録本傳太宗之用捨如此風俗其有不厚乎才幹則不乏徳行則罕見此真宗有意於尚徳也夫惟以徳為可敬王旦以深沉有徳相張詠嘗謂人曰吾榜中得人最多謹厚有雅望無如李文靖深沉有徳鎮服天下無如王公李諮以苦學奉親用景徳二年李諮中進士第上親閱試卷謂宰相曰李諮亦有可觀聞其㓜年母為父所棄歸其舅諮日夕號泣求還其母至乃絶葷茹以禱祈又能刻苦為學自取名級亦可喜也寧取文行之趙安仁而不取盛元景徳元年七月先是上召翰林梁顥夜對詢及臺閣人物顥曰晁迥篤於詞學盛元敏於吏事上不答徐問曰文行兼著如趙安仁有幾顥曰安仁才識兼茂未見其比以安仁為翰學寧用他人輔仲舒而不用致堯真宗朝時梅詢曽致堯以才名自負嘗遣致堯輔温仲舒安撫陜西致堯於閤門疏論仲舒言不足與共事李沆在中書不喜因用他人輔仲舒而還致堯真宗之去取如此人才其有不盛乎貽厥孫謀以燕翼子豐芑之仁數世用之吾觀徂徠之頌也潞公重望弼亮數世小范老子純乎王道以率履予衍以謹厚予殊比弼以夔契比琦以周勃凡見於一頌者皆君子人也維仲淹弼一夔一契予早識琦而有竒骨可屬大事重厚如勃曰衍予來汝予黄髪心如一兮率履不越汝得象殊謹重㣲密又觀古靈之藁也司馬名相首擢第一孫覺純仁可列侍從以可備風憲舉明道以可屬危難舉王存以張子厚為學行修明以吴育為端良吴恕為器識凡見於一藁者亦皆君子人也長編熙寜九年古靈陳㐮薦司馬温公而下三十三人章藁司馬光韓維吕公著乞詔還詞苑或居經幄蘇頌宜居編修孫覺李常范純仁可充侍從王存顧臨可屬危難程顥可備風憲張載學行修明孔文仲性醇行粹吴育端良質實吴恕器識深醇云云吁有由也雖然用捨人材在人主權衡人才在大臣昔李文靖當國冦公屢以丁公薦而文靖則曰才則才矣使在人上不可也東軒筆録冦準屢薦丁晉公之才於李文靖而終未用一日語文靖曰比屢言丁謂而終不用豈其才不足用耶文靖曰如斯人者才則才矣顧其為人可使在人上乎萊曰如謂者相公終能抑之使在人下乎文靖曰他日後悔當思吾言王文正品藻人物楊文公亦以丁謂告而文正則曰才則才矣使獨當權不可也遺事楊文正輿王文公評品人物文公曰丁謂久逺果何如對曰才則才矣語道則未他日在上位使有徳者助之庶得終吉若獨當權必為身累惟二公之所取者不在於區區之小才則自真宗而後多得重厚名流者亦大臣擢用之公也李沆為相真宗問治道所宜先沆曰不用浮薄新進喜事之人此最為先故自真宗之世至仁宗初年多得厚重之士陳升之才智才也安石曰是可用也司馬公曰是不能臨大節也神宗問司馬光曰今中外大臣獨升之有才智曉達政事光曰升之才智誠如聖諭恐不能臨大節而不可奪耳安石用事引升之自代吕惠卿之明辨才也安石曰是可用也司馬公曰是用心不端也神宗歴問羣臣至惠卿光曰惠卿憸巧致安石負謗皆惠卿所為也上曰惠卿明辨亦似有才光曰惠卿文學誠如聖旨然用心不端安石後力引惠卿代已惟安石之所用者惟取其才智明辨之人則自熙豐以來大抵皆少年新進輕躁浮薄之流皆安石之咎也嗚呼安得李王司馬二三君子與之評品人物哉士風諛佞成風漢道不西清虚相習晉其東矣噫豈惟漢晉然哉雖唐虞三代而有此未有不敗者也國朝立三綱以為綱張四維以為維護風俗如護元氣重名節如重鬼神何厚耶好事盡輸純與直謾勞頰舌湧如泉此太宗戒欺誕之詩也士夫其不為誠實乎太宗作七言詩示學士卒章云好事盡輸純與直謾勞頰舌湧如泉臣守但當守公法馳騖茍進何可取此真宗疾奔競之詩也士夫其不為恬退乎真宗作詩示羣臣云云李昉子弟並從罷黜懲攘奪也雍熙二年宰相李昉之子宗詩參政吕蒙正之弟蒙亨舉進士試皆入等上曰比至勢家與孤寒並進但以藝升人亦謂朕有私皆罷之温叟子孫特加甄録戒貪墨也士夫其不為推遜清㢘乎劉温叟至清㢘太宗嘗賜以錢五百千不敢辭貯於别室明年復因重午以角黍遺之使人至見前所送錢扃鎖如故還白其事上曰我錢尚不用况他人乎後温叟薨太宗録其後曰使名節者知所激勸嗚呼有君如此其忍負之此國朝所以人人有士君子之行胡宿白首不忍欺君詳議不敢得也嘉祐元年胡宿知審刑院詳議官闕判院者當擇人以薦於上宿與同列得二人一人者監稅河北以水災虧課同列曰虧課小失不足白上以累才宿不可至上前白之同列曰詳議在得人公固欲白上縁是不得奈何公曰得與不得一詳議官爾宿以誠事主上今白首矣不忍絲髮欺君冦公初進不可欺君科第不足計也冦忠愍時年方十九舉進士時太宗取人多問其年年少者往往還遣或教公増其年公曰吾初進取可欺君耶不預宴集館閣盛徳晏公曰非不宴遊直以貧故無飾辭也晏殊為館職時天下無事士大夫多為宴集公時貧不能出獨家居與昆弟講習一日選東宫官忽中批除晏殊既受命上面諭除授之意公曰臣非不樂宴遊者直以貧無可為具臣若有錢亦須往但無錢耳上益嘉其誠實私入市肆宫僚失徳宗道曰飲酒常情欺君大罪無妄語也魯宗道昜服飲仁和肆一日真宗急召使者入門移時行自仁和肆歸中使先入白與公約曰上怪公來遲當以何事對公曰但以實告曰然則當得罪公曰飲酒人之常情欺君臣子之大罪使者如公對真宗問何故私入酒家公曰臣貧無器皿酒肆具備適有親客遂與之飲真宗曰卿為宫臣恐為御史所彈然自此竒公噫匹夫至愚尚知以誠况諸君子乎其誠實之風著矣年方强仕請解機務急流勇退人也至道三年真宗即位錢若水以母老請解機務章再上乃得請君請云云又麻衣僧謂若水曰公急流中勇退人也年未知命表求掛冠知止求退人也咸平四年韓見素為監察御史表求致仕時方年四十八上問輔臣曰見素髮齒尚壯遽爾致仕何也吕端曰見素性恬退上難之李至曰近世朝行中躁競求進者多知止求退者少若允其請亦足以激勸風俗上黙然乃授刑部貟外郎致仕年八十餘卒父任執政不就廷試非韓維之安於静退乎他日之遷監學正以旌擢之韓維嘗以進士薦禮部父億任執政不就廷試仁宗患縉紳奔競諭近臣曰恬退守道者旌擢則躁求者自當知愧於是宰相文彦愽等言公好古嗜學安於静退乞加甄録召試學士院辭不赴除國子監主簿禮部第一不肯自陳非范景仁之恬於進取乎他日之除袐閣正以勸激之范鎮舉進士禮部奏名第一故事唱第過三人則禮部第一人越次抗聲自陳因擢置上第鎮不肯自言至第七十九人乃出拜退就列無言龎籍言鎮有異才不汲汲於進取特除直祕閣噫虞非其招猶不屑往况諸君子乎其恬退之風盛矣張公詠之試大名也將以張公首薦而公推張覃為第一太平興國四年張詠與冦準同赴大名舉義將首薦詠詠以同郡張覃素有文行即率冦公以覃為薦士論多之蔡公齊之試萊州也將以蔡公首薦而公推史方為第一蔡齊萊州人舉進士第一以書薦其里人史方而已居其次畢文簡之除相可喜也曰臣以駑朽請薦相才畢士安參政入謝帝曰未也行且相卿公曰臣材駑朽不足勝任惟冦準兼資忠義善㫁大事此宰相材也不閱月並拜平章事杜祁公之去相甚鬱也曰某以非材久妨賢路杜衍門生嘗謂公曰公在相位未期年而出天下甚鬱望曰衍以非材久妨賢路遽得解去深遂乃心然獨有一恨平生聞某人之賢可某任未薦嗚呼攫金逐鹿者聞此寧不有愧心乎其推遜何如哉有官鼎鼐無地樓臺萊公之儉徳也是詩也肯移為他人誦耶聞見録萊公居家儉魏野贈公詩曰有官居鼎鼐無地起樓臺後北使曰此無地相公耶馬諳舊路龜放長江趙公之清徳也肯私為外人讚耶趙抃初知成都擕一龜一鶴自隨其再任也屏去龜鶴止一蒼頭執事張公祐送詩云馬諳舊路行來滑龜放長江不再來歸自南海不載一物何㢘耶余靖為廣西安撫戒當任官吏不得市南藥及公北歸不載南海一物歸自西蜀僅有數卷何薄耶太祖初立命王全斌等伐蜀沈倫為水陸轉運使諸將爭取金帛子女倫一無所取東歸之日惟圗書數卷耳太祖知之擢為户部侍郎兼樞副使嗚呼囊帛匱金者知此寧不汗顔乎其清廉何如哉是雖諸賢律身之嚴亦祖宗激勸之微權也雖然授以翰林力辭不已神宗即位擢司馬光為翰林學士力辭上諭以卿有文學何辭公曰臣不能四六上曰如西漢制誥可也公曰本朝故事不可上曰卿舉進士髙第而云不能四六何也公移出内臣强公受吿以告置懷中不得已受授以館職固辭不就温公家語至和中召王安石試館職固辭不就乃除羣牧判官又辭不許乃就職嘉祐中召除館職三司度支判固辭不許未幾命修起居辭章至十上焉温公荆公之推遜一也然議者以温公為是而荆公為非議法不合請歸西洛温公與安石論新法青苗不合章屢上請歸洛用法未便投老鍾山初吕惠卿為荆公所知驟引至執政荆公去惠卿背之值荆公再相於是起華亭獄而使徐禧王古蹇周輔之輩按之惠卿請不得然後以語中子雱荆公不快遂投老金陵鍾山温公荆公之恬退一也然議者以温公為得而荆公為失温公之不事生産公忠信孝友恭儉正直出於天性不事生産買宅洛中僅庇風雨荆公之不自奉養上言安石不好官職不自奉養可謂賢者光曰安石誠賢但性不曉事而復庇其短也均之為清㢘也議者亦以温公為真清而荆公為詐清何耶大抵重厚之士其處已也以誠好名之士其處已也不以誠温公重厚之士而荆公特好名之士也是則三者習尚又闗於誠不誠之間未可以笑貌聲音求之矣不然温公平生以誠嘗語之劉安世元城先生曰安世從公遊學十年問其立身之要公曰其惟誠乎公平生行之俯仰無愧而安石詐人我仁宗已心薄之仁宗朝安石知制誥一日賞花釣魚宴内侍各以金盞盛釣餌藥置几上安石食之盡明日謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也君子於此可以覘二公之終身也噫相在爾室不愧屋漏中庸之學君子不可不書諸紳幸學古者以學為維持風教之地故視學為常典後世以學為粉飾太平之具故視學為曠儀嗟夫學者化民成俗之本不可一日不明於天下也是以三代盛時取士論政莫不在是卜禘而後視學所以游其志也未見其輕於禘也士不變而視學所以重其教也未見其嫌瀆也春入學秋頒學一嵗而再學未見其繁且數也以謂不如是則無以維三綱五常之具示作人重道之心為禮樂教化之本此所以視為常典歟後世以先王化民之地而指為美觀之文平日常行之事而視為創舉之禮漢明臨雍拜老此先王大合樂之舉而史筆紀之以為美談凡入學以齒將入學小胥大胥小樂正簡不率教者以告于大樂正大樂正以告于王王命三公九卿大夫元士皆入學不變王親視學不變三日不舉屏之逺方終身不齒大樂正論造士之秀者以告于王而升於司馬曰進士記王制又漢明帝紀永平中帝臨雍拜老諸生圜橋門者億萬計執疑問難又班固賦辟雍湯湯聖皇蒞止唐太宗數幸釋菜此先王春入學之常唐人嗟異以為偉觀唐儒學傳序太宗召天下純儒老徳以為學官數臨幸觀釋菜命祭酒博士講論經義優以束帛廣學舍千二百區三學益生員復置書筭二學皆有博士大抵諸生員至三千二百雖三代所未聞也嗚呼明帝太宗當文治彫落之餘士類湮鬱之後一旦舉行駭人耳目爼豆生輝冠帶増氣此所以視為曠儀歟嘗謂王者以一身膺天地社稷之託禮樂綱常之任其不可輕之地有三曰天地曰宗廟曰學校夫以萬機之繁未必皆其身與惟天地之祀宗廟之祠與夫學校之幸非萬乗親幸未見其所以致敬之意是故吉蠲大報於天地之郊灌鬯薦獻於宗廟之享承師問道於親臨學校之幸此無他天地萬物之始宗廟國家之本而學校教化之基國之大務未有舍此而先者韓退之謂天下通祀惟社稷與夫子社稷壇祭不若夫子用王者事嗟夫夫子豈止與社稷爭雄長而已哉韓文國家以禮義淑人心人文化天下方太祖肇造之初蓬孛未豁也我太祖元年正月幸監二月又幸至四年四月又幸故其賛先聖曰尼父挺生河海標異祖述堯舜有徳無位是舉也其視武王克商封先聖之後者同一意也太祖建隆元年正月幸國子監二月又幸四年四月又幸海又作文宣王賛曰王澤下衰文武將墜尼父挺生河標異祖述堯舜有徳無位哲人其萎鳳鳥不至云云髙宗中興之始國步甚艱也我髙宗親謁聖祠師道日隆命講周易經學有光故其贊先聖曰維時載雍戢此武功肅昭盛儀海宇聿崇是舉也其視光武興漢先建太學比日臨享者同意也聖政紹興十四年三月幸太學謁先聖先師登降步趨執爵灌獻天容肅恭禮畢乃命司業髙閲講周易復幸養心持正二齋上幸畢觀太祖太宗徽宗所製贊文因御製文宣王贊後又製七十二子贊文宣王贊曰大哉宣聖斯文在兹帝王之式古今之師志則春秋道由忠恕賢於堯舜日月其譽維時載雍戢此武功肅昭盛儀海宇聿崇夫當太祖之初興髙宗之再造庶事草創未暇他舉一則曰幸學二則曰幸學飾禮容奉籩豆周旋進退興降俯伏汲汲然為尊師重道之舉此固百世而下聞風興起者祖宗躬行之於前子孫潤色之於後此道術所以顯行教化所以興隆也是故列聖相承盛禮日舉自太祖而後則端拱幸國學而玩易之泰卦寳訓太宗端拱元年幸國子監將出顧見講堂左右言博士李覺方聚徒講書即詔覺講易泰卦翌日語近臣曰昨聽泰卦文理深奥足以為君臣監戒淳化五年又幸國子監召孫奭講堯典說命淳化又幸講書之堯典見上此太宗舉行之典也景德二年幸國子而覽書庫明年又謁先聖以展拜此真宗舉行之典也寳訓真宗景德二年幸國子監歴覽書庫觀羣書鏤板曰國家崇尚儒術然非四方無事亦何以䥴此又㑹要景德中幸西京謁先聖詔河南府營建國子監又幸四月又謁文宣王廟帝展拜以表嚴師崇儒之意自髙宗而後則淳熙之禮行釋奠吾道有光義闡中庸聖學髙明此孝宗親幸之禮也孝宗淳熙四年二月幸太學詔畧曰朕躬釋奠闡中庸之義云云士大夫其念哉當為君子之儒母慕小人之德則無負於樂育在汝等勉之是時龔遂良等奏命儒臣講經上曰禮記中庸為天下國家有九經一叚最益治道嘉泰之詔命司成紬繹周官束帛戔戔寵及青衿此寧宗親幸之禮也寧宗嘉泰壬戌幸學講周官賜諸生束帛貽厥孫謀以燕翼子祖宗之為謀逺矣雖然祖宗之所以屢行幸禮者豈以是為漢唐美觀之文哉吾觀吕大防曰古者天子視學葢常事也徳意在焉小惠何足道嗚呼大防之言其欲祖宗常行是禮之意深矣欲觀國家之美意當求諸辟雍之章元祐中哲宗幸國子監詔文宣王殿行釋奠禮畢御端化堂命國子祭酒豐稷講尚書無逸或謂吕大防曰祖宗視學非有爵命之賞則有金帛之賜今皆無之何也大防曰古者天子視學葢常事也徳意在焉小惠何足道哉吾固欲天子時一幸金爵之賞後日何可繼也正恐惜費而止耳聞者乃服學政有學教有學政詩書薰染禮樂和平鼓舞於鳶飛之下者教也檢柅私心防閑非習折旋於蟻封之地者政也教者所以長養之政者所以規正之政寓於教而無偏廢之失而聖人之責塞矣然政教果自行乎葢天下之尊有三覆載我者天地也鞠育我者父母也而導迪作成者雖天地父母亦無所用其力故有師教之義焉聽禮義之誨如臨深淵視規矩之嚴如畏簡書目擩耳染無非教也手舉足履無非政也而師儒之功為大尚論古今政教之善安得不歸於教者之責哉且成周盛時人人君子長育如陵潤澤如沚既教以射御又教以詩書既習以諷誦又習以羽籥而教之之意詳矣然撻以記之而侯明之德不可無否則威之而承之庸之不可廢於禁制防遏之法有隱然訓迪誘諭之意嗚呼盡之矣不知成周之政教所以施之成均用之鄉黨而無一人之不被者伊誰之功葢嘗考之成均學政專待國子政也而樂音導迪使人有易直子諒之心非教乎而政教之施非大司樂之責而誰責大司樂掌成均之法以詔建國之學政而合國之子弟焉凡有道者有徳者使教焉死則以為樂祖祭興於瞽宗以樂徳教國子中和祗庸孝友以樂語教國子道諷誦言語以樂舞國子舞雲門大卷大咸大㲈鄉黨禁令専待秀民政也而屬於掌教無非示道藝之美非教乎而政教之行非地官之責而誰責卿大夫噫有政教以淑其心有師儒以任其責則學校為扶天理立人極之地歟國家自慶歴以來建立學校元豐宏之南渡新之其知學校為扶持世教之本葢不可一日忽天聖五年晏殊知應天府大興學慶厯四年詔州縣皆立學十一月余靖言興建學校以育俊秀由是廣學官頒學田又熙豐間中書言近制増廣太學益置生貟請分三等以初入學為外舍不限員上舍以百員内舍以二百員為限又建紹間再新學舍然觀安定胡先生之在湖學也談經學以明理義而學之教為甚詳補正録以明規矩而學之政亦不廢體用之學封植人材榱桷之詩膾炙人口孰不曰政教並舉之善君子觀錢藻范純仁劉彞之流講明經學議論治道皆知有政教之學者無非胡先生之功也墓志先生為蘇湖教授嚴條約以身先之雖大暑必公服終日以見諸生嚴師弟子之禮懇懇為諸生言所以治已而後治人者後為太學四方歸之又吕氏家塾記荆公詩曰先收先生作梁棟以次收拾桶與榱又李廌書熙寧二年劉彞召對上問從學何人曰少從安定上曰其人文章與王安石孰優彞曰瑗以道德仁義教東南諸生時安石在塲屋修進士業累朝取士不以體用為本當寳元明道間明體用之學授諸生始自蘇湖終於太學出其門者無慮二千餘人上曰門人在朝為誰曰錢藻之淵篤孫覺之純明范純仁之直温錢公輔之簡諒又職畧仁宗朝胡安定掌太學其正録第補諸生熙寧末興三舍始遣官為正録學正五人凡諸生之戾規矩者待以五等之罰學録五人掌佐學正糾不如規者今以經義詞章課士固非古者樂正之教以學令學規待士固非古者大胥之政因仍舊習其來尚矣然文已中程而選考不預則不聽選已書籍而程試不預則不許試此兼考行藝之意又出於經義詞章之外諸生外有顯過亦許糾治舍選有犯重罰亦必舉行此申明規矩之意又出於學舍學規之外亦何慊於政教乎然愚所以不滿者意葢有在也葢今之司成所掌者學教正樂正之遺意今之正録所糾者規罰亦大胥小胥之舊然師儒之於生徒適然而值如浮萍之不相闗博士月一詣齋教導之意第為具文而教安在哉士之視規矩指為不切如屋壁之陳迹間有毅然不恤衆議以師道自任而群謗蝟興而反退縮矣而政安在哉此愚不咎政教之制不如古而咎師儒之不如古之得伸其志也雖然豪傑之士雖無文王猶興待文王而興者凡民也忠信仁義是為天爵則教在我也清議所臨嚴於簡書則政在我也士以綱常自任以言行自守表儀不足而後誨訓形焉誨訓不足而後繩墨及焉寧不有靦面目將何自立於俯仰間哉抱琴而歌鼓篋而遊采芹藻於泮水之間詠道德於橋門之下此士君子自修之學也敢不以是而自勉繪功臣昭勲崇德閣記朝散大夫守太常少卿麋漂朝請郎太常丞兼權尚左郎官留几英朝奉郎太常博士林惟孝宣教郎太常寺主簿許儀宣教郎行太社令程源宣教郎行籍田令余天錫臣等恭惟皇帝陛下躬上聖之資誕膺駿命嗣守鴻圗尊賢尚功厲志求治固已緝熙十三朝之令緒培植億萬載之丕基矣屬時社稷尊安海宇清晏慨艱難之積累思左右之勤勞永惟寧考在御嘗有崇顯配享勲臣之㫖經始未成乃寳慶元年八月申命奉常闡基建閣自趙韓王普而下二十有三人悉登繪而表異之親洒宸翰寵以隆名曰昭勲崇德之閣雲章炳耀下飾萬物臣等整襟肅容端拜聳觀切謂群公先正遭遇聖時濟業於平定之初圖義於惟機之日次策於危疑之頃扶景運而致中興輔潛德而定大計曰文曰武咸有丕績可謂協明良之㑹矣貂纓儼飾烝徒祫侑可謂極始終之榮矣至若視功載於奕葉崇傑閣於頌臺具昭盛典以示永藏斯千古之曠儀一人之厚錫也陛下欽承先志䆳宇聿新扁揭昭回輝映層漢猗歟漢之麒麟唐之凌煙其舊義無所取意以名之於恩重事殊豈惟元勲故老精爽飛動潛孚於肹蠁之中而嗣臣志士修名砥節亦莫不思奮於激勸之下龍吟虎嘯事業益閎乾清坤夷邦家永輯其自今日始臣等猥以謭薄欽厥攸司幸際明時目擊盛舉䖍奉奎翰刻之翠珉敢稽首拜手恭書于下用對揚丕顯休命謹記元祐初我哲宗嗣服之始也首行鄭公配享之法元祐三年神廟侑食時欲從安石配享鮮于侁奏疏以富公訪落之初功德第一合配神廟隆興初我孝宗即政之初也首從岳侯祠宇之典孝宗初年江西守臣乞建岳侯祠宇從之夫當人君臨御之元國家之利害民生之休戚豈無一二急務所當講明者而祖宗拳拳於報功之典者葢人心觀瞻莫新於初政士氣激昂莫切於初政衡茅之下垂名自奮者有人縉紳之列以身任責者有人是時也茍無褒崇勸勉之意孰肯以功名自見哉此祖宗之寵表臣節特行於初政之時也此今日之繪畫盛儀正得祖宗之意也且人臣之所謂大勲者非曰尺寸之㣲勞也絲粟之小材也或開國於斬艾蓬蒿之秋或保治於重熙累洽之日或翊日月於人心危疑之頃或作霖雨於舊學登庸之後他如仗天威伸皇靈以驅馳於介胄間者皆國家所倚賴豈車服爵禄所能報其萬一哉是必傑棟崢嶸聳人瞻視麗筆黼藻示世典刑上以發九泉忠義之馨下以感一世豪傑之念則報功之責塞矣夫圗繪之典漢唐非不講也甘露之麒麟前宣帝甘露間因單于來朝建麒麟閣繪霍氏而下十一人屬國蘇武永平之雲臺顯宗永平二年於雲臺圗建武名將自鄧禹而下二十八人貞觀之凌煙太宗貞觀中凌煙閣繪長孫無忌而下侈然於史牒之間亦一代之偉觀然寵其創守者未必及其中興念其征伐者未必思其規誨此君子惜其有遺也又孰若今日前後之輝映哉今日仰紹燕謀慨念鴻勲乃命奉常有翬其宇衣冠冕服之儀洋洋如在也功勲庸多之美凜凜不忘也自趙中令而下二十三人見其形而思其人因其人而慨其功嗚呼盛矣哉然先正之功何如哉方藝祖之開國也以仁興武與壺漿百姓請命于上天削百年之根據合諸國之𤓰分西顧而誅李筠李筠周朝為昭義節度在鎮䟦扈太祖即位舉兵反遣石守信攻其城赴火死南盼而戮重進李重進鎮楊州李筠反重進密書與筠相結太祖遂平之平蜀而孟昶俘前蜀王建唐僖宗授西川節度至子衍唐莊宗滅之以孟知祥為後唐昭宗封為蜀王尋即帝位其子昶踰越而劉鋹縛梁封劉隱為南海王弟巖襲位國號南漢傳巖龑玢晟鋹開寳三年潘美伐之浮梁東渡天下為家蓬孛軒豁悉主悉臣當是之時非趙薛沈呂諸公之功而誰功見前至列聖之承休也興國之下太原太平興國四年冬駕親征太原漢主降北漢遂平景德之征澶淵景德元年契丹侵澶真宗用冦萊公親征之策遂征之射其帥遂請和嘉祐之太平嘉祐間天下富庶不知兵革時和嵗豐元祐之革弊元祐初司馬温公當國盡革熙豐新法天下咸謂快活條貫節紀綱於治安之餘修禮文於藩飾之後結人心植國本凜凜不能一日安以為泰山四維之地當是之時非張冦王吕文富司馬諸公之功而誰功見前治平嗣服正人心易惑之際呼吸之間有雷有風有存有亡大臣親扶日轂晏然如山神閑氣定垂紳搢笏使中外餔啜嬉遊而無竊義之警天地亮其心鬼神鑒其誠則定策如韓如曽亦難矣慶厯聖德詩予早識琦而有竒骨可屬大事重厚如勃又事畧曽公亮謹畏周密受遺輔政有始有卒可方張安世餘見言行録隆興潛邸正聖心培養之機歴試之始方知諸難潛飛之日正思施普大臣者朝規夕誨言箴行銘乾進剛徳䝉養聖功異日登進揆席葢念舊學之勲社稷享其福生靈䝉其恩則舊學如史文惠亦難矣史越王言行録不特此耳方僣偽之未平九縣飈回三精霧塞趙薛賛謀畫策固有功矣而曹潘仰仗威靈糾率義旅亦創業之竒勛也方敵國之肆侮鼎社陸沈神人共憤趙張居中運策固有功矣而韓劉虎視江上洗滌腥羶亦中興之偉績也夫此數公者先朝褒崇之典錫之爵秩禄之子孫曰未也勤之鼎彞銘之竹帛曰未也而又清廟有像大烝有享而猶未也迨于今日矢棘壯觀偉儀精神侈其典也奎畫陸離鴻名赫奕榮其舉也盡祖宗所未盡之禮報先正所難報之功其所以激勸後來使人有悠長之思又何如哉抑又論之周禮司勲一職自王功國功而次其等有六祭之大烝銘之太常均之為報典也而所謂王功國功特冠於諸功之上抑何也葢有功於民者不若有功於君有勞於事者不若有勞於國此正周公之輔相成王甘盤之舊學商宗也然則司勲烏可不首舉哉不然麒麟之繪如丙魏之輔佐充國之征伐皆煥然於其列獨霍氏之名首冠諸公者葢擁昭立宣對越無愧其功尤偉也凌煙之像如李靖之善戰魏徴之能諫亦燦然於丹青之下而房杜二公特列其上者亦秦府舊臣啓沃日久其功尤卓也此愚於定䇿舊學之勲故表而出之任舊臣貽厥孫謀以燕翼子此前人儲材之意也不愆不忘率由舊章此後人仍舊之意也夫人材之在天下其養也非一日其用也亦非一日何者木之蔽雲調惜拱把是必養於卵翼之時用於登進之始禮樂㢘耻以維之寛大樂易以待之如護元氣如愛重寳以為不如是則無以流久長之仁備緩急之用也是故髙帝末年重念安劉之計特拳拳於勲舊之絳侯武帝以遺詔而任霍光正以為擁昭立宣之地其儲材之意深矣並本傳龜惟千年可決大疑是必以老成為柱石以重厚為腹心不為新進之所移不為異說之所揺如待上賔如對嚴師以為不如是則無以任付託之寄慰在天之靈也是故文帝之用將相莫非舊臣是雖洛陽年少紛紛之請曽不為之轉移太宗之用房杜秦府舊人從遊日久不啻若僚友然其任舊之禮至矣並本紀甚矣舊臣有闗於天下之治也其閲世也久其歴事也熟則智老識逺有蓍龜之見其受恩也深其感徳也厚則與國終始有嵗寒之操議論重厚無少年之紛更也忠槩真純無流俗之鍥薄也可以託六尺之孤可以服群心之望可以決大事之危疑可以翊社稷之靈長此舊臣之所以可仗也如此故天之祚人國家也使二三元老左扶右持森然斗杓之横漢壽考康寧福禄未艾屹然華岳之不揺否則參辰不合典刑汩没晚輩後進紛更百出則國之為國也危矣昔曽子有言孝可能也其不改父之臣為難能也誠哉是言矣愚嘗拜觀國朝委任之意我藝祖之開基也柴周三相保全寵禮心腹相孚邊幅盡略此與成湯之相伊尹武王之待箕子葢同一意夫以異代之舊臣且用之而不疑則我藝祖之豐芑詒後者子孫其忍忘之哉通略上待周三相並以優禮范質司徒平章事昭文館大學士加侍中王溥左僕射平章事監修國史加司空魏仁浦中書侍郎平章事集賢殿大學士太宗承之沈薛並任不廢舊職事略任沈倫薛居正九年中令三入追念故績記聞昭憲太后敕太祖曰汝萬嵗後以次傳之二弟太祖曰敢不如母教太祖為約誓書趙普書於紙尾藏之金匱後太宗因見藏書即召普再相張齊賢之相以輔汝為相之言而相之也東軒筆錄太祖謂太宗曰我幸西都惟得張齊賢耳不欲官之異時使輔汝為相也盧多遜之相以儒者宰相之言而相之也長編盧多遜言對精敏太祖曰宰相不可無儒者我太宗之所任者非藝祖之遺後歟真宗嗣位仰法太宗齊賢之復入也凡二年䝉正之復入也凡三年吕端之即居相位也亦一年此真宗之任舊臣然也仁宗之繼真廟也登庸元老布置揆席景祐之相李迪即天禧之相也記聞章獻上仙迪名復相吕夷簡譖之嵗餘罷相迪謂人曰迪不自量天聖之相王欽若亦天禧之相也事畧天禧間王欽若作相至仁宗嗣位天聖初復相如張如王前朝參樞追念不忘相繼秉軸長編王曽張知白真宗朝曽為相知白為參政仁宗初年相曽又相知白英宗之繼仁廟也治平初元廟堂權重受遺輔政無愧古人韓公親扶日轂晏然太山人心無警重厚如勃徂徠聖徳詩予早識琦而有竒骨可屬大事重厚如勃曽公謹畏周密内外無隙有始有卒可方安世長編曽公亮謹畏周密内外無間言受遺輔政有始有卒可方張安世吾觀列聖相承委任勲舊無新進以撓國政無讒言以間故老堂堂相位尊嚴謹重以持守家法為本以維持治體為尚百餘年間天下享安靖和平之福皆元老故臣相與扶持輔贊之功此固前人儲數世之仁抑亦後之子孫愛惜保護之至此也熙寧大臣徳不勝才大言闊論驚駭人聽韓公元勲一去不留治平四年九月韓琦罷相富公大臣相繼去位富弼熙寧二年十月罷相而前朝之耆舊一網盡去所與共事者非新進之惠卿則少年之曽布熙寧七年四月安石薦惠卿代已曽布終始守新法安石之門人浮躁輕薄自相傾軋元豐末年方用正人慨然有革去熙寧之意惜乎有志不及就也中更元祐嗣守先志退二大奸曽不踰時元祐元年二月蔡確免三月韓縝免潞公碩徳首䝉師禮元祐相司馬温公吕公以潞公舊相遂居二相之上師禮之司馬吕公相繼召用吕大防繼之范純仁又繼之劉摯蘇頌又繼之並元祐人材門之數君子皆端人也皆先朝之徳望也環列左右風采頓異嗚呼累朝之所相者皆故臣之重厚故天下享持守安静之治熙寧大臣之所用者盡少年之輕躁而國家紛紛之弊未已也嗚呼可不鑒哉古今源流至論前集卷八
