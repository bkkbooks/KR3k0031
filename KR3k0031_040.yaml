  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_040-1a, image: WYG0942/WYG0942-0634c.png}
body:
  text: 古今源流至論别集卷十宋黄履翁撰方鎮論方鎮叛服之由藩鎮之為唐患也尚矣其根萌於武德十道之置使其勢成於至德九節度之分封其禍見於乾元平盧主帥之自立此廢置叛服之由也方太宗平定之後既分天下為十道地里志太宗因山川形便分天下為十道一曰關内二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劔南十曰嶺南而於軍鎮城戍之兵為十二道而置使處之總之以都督者同上武德初始置軍府以驃騎車騎両將軍府領之分天下為十二道云云此其為方鎮已成之兆特待時而張耳且河北隴右此皆極邊之地天下之府六百餘所而在河北者不過三十在隴右者不過二十九而又皆𨽻於衛將軍矣此何足以係廢興大致觀其總軍而置使河北一道則析而為二曰平盧曰范陽隴右一道則析而為四曰隴右曰安西曰北庭曰河西而其曰軍曰守捉曰城曰鎮焉者大者二十餘小者亦不下十餘以天下之極邊為天下之重鎮而撫之以都督其品略與十六衛將軍同乃在尚書之上而其左右僕射為一流所謂五大不在邊者果若是乎漁陽鞞鼓掃境而來亦其勢之必至者此府衛之法壊而方鎮之根形矣嗚呼易封建而為郡縣論者知其無叛國桞文改刺史而置州牧識者料其郡牧之爭政靈帝紀中平五年改刺史新置牧後董卓袁紹爭起太宗何不鑑其覆轍耶故曰其根萌於武德十道之置使者是也方肅宗即位之初安史父子相挺為禍尚頼諸鎮勤王之師共起誅戮而九節度之號立焉大難既平蓬孛軒豁是時也正當申朝廷之紀綱明節鎮之形分君臣幸安茍且歳月河北瓜分方鎮碁布大者連州十餘小者毋慮三四成肱髀難削之形效輔車相依之勢使人視之若羗戎然此節度之名立而方鎮之勢成矣唐兵志肅宗起靈武而諸鎮之兵共起討賊其後安史父子繼起中國大敝肅宗命李光弼等討之號九節度乆之大盗既成而武夫戰卒以功起行陣列為侯王皆除節度使由是方鎮相望於内地嗚呼割梁以封越所以啓叛者之九起舉吳以予濞而變狀不待異日見之漢傳肅宗乃不思及此耶故曰其勢成於至德九節度之分封者是也乾元初侯希逸帥平盧軍士實為之此一機也尤强弱安危之分也夫天子所恃以鼓舞天下者以爵禄廢置在上不在下焉耳命將帥統藩維事之最大者而遣一介之使徇行伍之情此而可為夫孰有不可為哉士卒得以陵偏禆偏禆得以陵將帥則將帥之慢朝廷自然之勢也此自立之弊生而唱亂之禍起矣嗚呼賞罰不出於天子而春秋諸侯得以抗衡守相不置於漢庭而七國侯王得以僭上又何不是之思耶故曰其禍見於乾元平盧之自立者是也乾元元年平盧節度使王元志薨上遣中使往撫慰將士且就察軍中所欲立者授以旌節髙麗人李懐玉為禆將殺元志子擁侯希逸為平盧軍副節度使由軍士廢立自此始自是以來茍安之念生姑息之政成且承嗣一黠虜耳重歛虐民亦何能為而代宗惟恐少拂其意自置官吏弗之問也私入賦税弗之詰也兼宰相則就加平章増以鴈門之封重以天雄之號州為督府子尚公主其寵之不已過乎頔亦一黠虜耳黷貨滛刑果何能為而德宗惟恐少咈其意愛惡予奪惟意是徇既奏元洪流端州矣而復請輕之改為長史既奏薛正倫貶峽州矣而復自悔之留為判官其縱之不已過乎諸州相視徃徃以匹夫而要朝廷以卒伍而抗天子由代德姑息之過也大抵芽蘖之未萌則片言折之而有餘間隙之已開則干戈取之而不足可不深慮而早計乎並本傳至憲宗之削平諸藩方有太阿出匣之狀然軍士有犯上之罪以天子之命殛之何所不可而乃紿之以賞實之以刑繼自今以徃誰敢以信必待朝廷者通鑑元和十四年沂海交宻觀察使王遂最酷後卒王弁斬之自稱留後八月朝廷乃除弁開州刺史遣中使紿之曰開州已有迎候道路留後宜速發弁當日發近州六月腰斬東市武宗之宣慰河北方有江漢朝宗之意然郭誼就降縱不舉賞流之逺方可也而乃戮之以刑繼自今以徃誰敢以信義望朝廷者昭義節度使劉從謙卒其子稹不發䘮請為留後李德裕曰澤潞事體與河朔三鎮不同若遣重臣往諭王元逵何𢎞敬兩鎮聼命則稹成擒矣上喜决意討稹遣李回宣慰河北三鎮無不奉詔後郭誼斬稹歸朝上曰郭誼如何處之德裕曰劉稹騃孺子耳阻兵拒命皆誼為之謀主及勢孤力屈又賣稹以求賞宜併誼等誅之遂斬之温公曰董重質之在淮西郭誼之在昭義吳元濟劉稹如木偶人在技兒之手耳彼二人者始則勸人為亂終則賣主規利其死固有餘罪然憲宗用之於前武宗誅之於後臣以為皆失之何則賞姦非義也殺降非信也失義與信何以為國如誼等免死流之逺方没齒不還可矣殺之非也大抵韓信之叛心不生於假王之時而生於雲夣之偽遊竇融之内附不畏漢兵之强而畏河西之璽書惟義可以起人之敬畏惟信可以使人之悦服失義與信何以立國此藩鎮與唐三百年相為終始也五代紛紛其敝尤甚噫有由也上聖龍興群雄䑕伏惟正月乙巳以詔諭諸鎮越翼日戊午又别以詔賜諸鎮王言如綸其出如綍誰敢有異心者長編建隆元年正月甲辰太祖即位乙巳遣中使乗傳齎詔諭諸節度使戊午又别以詔賜焉鎮安之韓令坤自北還聼命鎮寧之慕容延釗自真定聼命同上先是鎮安節度韓令坤鎮兵廵北邊太祖征契丹鎮寧節度慕容延釗帥前軍至真定上既受禪遣使諭延釗令坤各以便宜從事兩人皆聼命彦卿之在天雄則表請而名稱天雄節度魏王符彦卿表請呼名詔不允王景之在雄武則治裝而入朝長編二年雄武節度王景每朝廷遣使雖卑位亦送迎自是來朝建雄之廷璋驛詔朝馳單車夕至矣通畧十月建州軍節度王廷璋㑹詔赴闕即日单車就道成德之郭崇朝發信使夕無違命矣元年初成德節度郭崇聞上受禪遣使偵之崇聞使至即命吏郊迎已而崇請入朝袁彦之兇率以潘美諭之而至自保義承信之渉嫌以魏丕直之而安於䕶國同上元年保義節度袁彦性兇率聞禪代日夜繕甲兵使潘美監其軍美单騎入城諭令朝覲彦遂治装上道上喜曰潘美不殺袁彦成我志耳忠正節度使承信為䕶國節度承信至河中或言其謀反上遣魏丕賜承信生辰禮物因察之還言承信無反狀承信因是獲沒于家一旦以息兵為問趙公普以方鎮太重對片言之發適當帝心聚天下之精兵收天下之財榖皆入京師隱然有虎豹在山之勢而又支郡長吏得自奏事而長吏得以舉其權鎮將職属悉委之縣而縣官得以行其職轉運既以扼其私别乗又以制其專强藩巨鎮皆顚倒於掌股之上吾觀開寳之二年守劇鎮者各罷而歸環衛杯酒易置如制嬰兒自非規模宏逺何以至是嗚呼我藝祖一舉而去數百年之患仁矣哉吏胥論漢唐吏胥得失文中子曰古者士登乎仕吏執乎役吏初登仕非古也其秦之餘酷乎文中子然蘇老泉又論漢有天下平津侯樂安侯軰皆號為儒宗而卒不能為漢立不世大功而其卓絶俊偉震耀四海者廼其賢人出於胥吏中者耳老泉文是何王氏深加排擯而老蘇若是喜談耶愚嘗䆒其由矣盖六王未畢之初而人才出於諸侯之客秦削封建之後而人才隱於郡縣之吏漢興以來科目未興徃徃有由郡縣吏至二千石將相者射䇿為掌故廼為廷尉視蓄之官兒寛傳甲科為官廼為抱關擊柝之吏何武馬宫趙廣漢河間之郡吏也尹翁歸河東之獄吏也張敞太史之卒史王尊涿郡之書佐也鮑宣縣之郷嗇夫丙吉魯之獄吏也並夲傳是皆雄俊明博外可以將而内可以相者此老泉稱其俊傑卓絶能立大功是也自朱博以吏才陵轢掾史而諸生始有為吏之恥夲傳自世祖以名節厲世俗於是有不肯為令史所居之郎沿歷隋唐以吏為辱而明俊竒異者大抵進身於科目之間所謂執役為吏者特姦猾亡恥之流耳間有積勞登仕厠迹朝著而搢紳亦羞之不曰名器不可假也則曰流品所當别也故唐之周興自尚書吏而遷秋官侍郎酷吏傳周興世習法律遷秋官侍郎屢决刑獄鍾紹京夲胥吏而後為中書令夲傳牛仙客由縣小吏至大丞相仙客初為縣小吏李明甫稱其才後以工部尚書同知門下事若此曹者小而習律令長而習獄訟奸謀詭計甚為清流之玷夫唐以書史縣胥之流而得居卿相之地其視漢之趙尹張王之先後履歷亦同此意也然漢不以為嫌而唐以為怪者盖漢所用皆竒士而唐所進皆俗軰此王通所以深嘆後世吏仕之非古也雖然漢代人才多出吏胥而超越後代者又不無所夲也盖武帝世公孫宏奏請俾廣行卒吏太守卒吏皆通一藝自是以來公卿大夫士吏彬彬多文學之士儒林傳夫公孫宏一言於孝武之時而人才鼎盛於宣元之世然則漢代人才多自吏胥者皆從事於文學禮義之中非若後世區區之法律獄訟之習所能及耳國朝之所謂吏者固不如漢之有材亦不至如唐之輕任故堂後之官參用士人懲其弊也太祖命堂後官參以士人用之二司之胥必汰老疾澄其源也景祐中詔揀汰三司吏之老疾者三司後行朱正等聚衆諠譁詣於丞相衍第投瓦肆言魯宗道之判銓悉書科條揭於廡下防吏奸也仁宗初判銓魯宗道知吏奸狀悉書科條揭於廡下人便之杜祁公之典曹悉自予奪俾無升堂革吏欺也景祐二年杜衍判銓先是長吏多為奸敕更取銓法問曰盡乎曰盡矣乃閲得其夲末明日曉諸吏無得升堂各坐曹名行文書吏不能為奸夫我朝之防閑禁制使之不得肆其情者盖生長於法律之中出入於簿書之間前比後例任意據援甲令乙科隨手髙下非明足以燭其姦力足以抑其强鮮有不貽其害也然又論之第書紙尾一聼吏手固非善於處吏者而典法自守不肯徇私亦未可輕絶也昔冦萊公議擢指揮使吏以例簿進公曰用一衙官尚須檢例安用我軰此固不肯徇吏之請章聖嘗謂兩府擇一人為馬歩指揮使吏以例簿進公叱曰朝廷用一衙官尚須檢例安用我軰哉王安石欲書除許將太常博士吏以手約筆具陳祖宗舊制當遷右正言安石不得任私即從其請是堂吏能執祖宗之法又安可遽棄之官制熈寧三年許將以磨勘當遷宰相王安石方欲抑三人進取遂特與太常博士初下筆方成大字堂後官以手約筆具陳祖宗舊制當遷右正言安石乃改大字就作右字因知前軰堂吏猶能執祖宗之法噫孰謂我朝之吏果不能及漢之足法哉田制論歷代田制異同井田之成於周乎曰畫於黄帝而大備於周也井田之壊於秦乎曰廢於戰國而極變於秦也盖井田之議維持甚周纎悉畢備其成非一日其壊亦非一日也方其田制之始創也經土設井立歩制畆通典黄帝始經土設井以塞爭端立歩制畆以防不足使八家為井井道四通而分八宅鑿井為井其成豈一日耶至周公因上世帝王之規立一代太平之制自五家為比積而為郷周禮大司徒自五家為鄰積而為遂禮遂人相友於烹葵剥棗之業自得於衣帛食肉之樂此所以大備於周及其田制之始變也貢助莫聞其詳孟子井地姑舉大略同上其壊亦豈一日耶至商鞅乘經界不正之餘為阡陌决裂之制富則跨邑貧亡立錐逐逐於爭奪之場汲汲於兼并之利此所以大壊於秦自秦變周之後其田制又不知其幾變曰代田曰限田曰均田曰永業之制曰司均之官曰口分世業之法自今觀之代田之制起於趙過一畆三甽歳代其處善田者令學養苖之狀亡牛者教以人耕之法命卒於官而教民於邊郡此代田之制漢武行之也漢食貨志武帝未備征伐之事下詔曰方今之務在力農以趙過為搜粟都尉過能為代田一畆三甽歳代處故曰代田古法也使教田太常三老大農置工巧好與從事為作田器二千石遣令長三老力田及里老善田者受田器學耕種養田状是後邊城河東大農三老太常民皆便代田用力少而得粟多限田之議出於石苞謂王公以國為家宜不復有田宅今可限之自國王公侯以至於丁男丁女皆有降差此限田之制晉武行之也通典均田之法男子四十畆婦人二十畆戸絶者以為公田刺史十五頃縣令以上六頃其田則更代相付此李安仁之議而行於後魏孝文之時也通典後魏孝文太和元年三月詔曰一夫制田四十畆中田二十畆無令人有餘力地有遺利時李安仁上䟽曰今雖桑井難復宜更均量審其經制令公藝有凖力業相為細人獲資生之利豪右靡餘地之盈又所爭之田宜限年㫁事乆實明帝深納之均田之制起於此矣永業之制男子十五皆有田畆婦人十五皆有營業又令男子十八而受田六十而免役此北齊孝成之制而行之於河清之時也通典北齊武皇帝河清二年詔令男子十八受田輸租條二十充兵六十免役力六十六退田免租調京師四面諸方之外二十里内為公田受公田者三縣改遷户役事官一品以上逮于羽林武賁各有差其外畿郡縣人官第一品以下羽林武賁以上各有差職業及百姓請墾田者各為永業田後周伯政之初置司均之官掌田里之丁者止百畆是之謂司均通典後周文帝伯政之初創置大宫司均掌田里之政令凡人口十以上宅五畆口七以上宅四畆口五以下宅三畆有室者田百四十畆無者百畆歷貞觀之始度田以歩畆百為頃男年十八以上受田一頃八十畆為口分二十畆為世業貧無以𦵏得鬻世業自狹郷徙寛郷者併鬻口分已鬻者不復受夫是之謂口分世業唐食貨志制度田以歩其闊一歩其長二百四十歩為一畆百畆為頃度田之制丁男年十八以上者人一頃其八千畆為口分二十畆為永業老及篤疾癈疾者人四十畆寡妻妾一十畆當户者増二十畆皆以二十畆為永業其餘為口分凡庶人徙郷及貧無以𦵏者得賣世業田自狹郷而徙寛郷者得并賣口分田已賣者不復授死者收之以授無田者凡收授皆以歳十月授田先貧永徽中買賣世業口分田其後豪富兼併貧者失業於是詔賣者還地罰之愚觀歷代所立之制封疆非不正也貧富非不等也然徃徃奪富與貧民不相安改舊從新勢或不便者多矣且以漢唐論之漢得天下之初民亡名數逃保山澤是時土曠人稀可以行古人授田居民之制其理甚適其事甚順世儒皆有是言也不知其勢有不得行者盖古者萬夫之地三十二里有半而其間為川為路者一為澮為道者九為洫為塗者百為溝為畛者千為遂為徑者萬此數者非塞溪壁平澗谷夷邱陵壊廬舍徙城邑不可為也縱使能盡得平曠之地行之亦當驅天下之人竭天下之糧窮數百年專力於此而後可望天下之地盡為井田盡為溝洫已而又為屋廬於其中以安其居而後可豈不迂哉此漢初雖有可為之機而無可為之地也愚之所惜者仲舒限民名田之説不行於時至使紅陽侯占墾草田至數百頃漢孫寳傳帝舅紅陽侯立使客因南郡太守李尚占墾草田數百頃立王立也師古曰占隱度而取之也草田荆田也占之瞻􅋀張禹買田皆極膏腴夲傳禹為人内殖貨財家以田為業及富貴多買田至四百頃皆涇渭灌溉極膏腴上賈賈讀曰價匡衡為丞相多取縣田以為封邑夲傳哀帝私寵宦官之田多至二千頃哀帝紀而貧富始相逺矣方太宗平天下之後為口分為世業毎年十月里正造簿縣令應給脱户者有禁言之則可聼書之則可觀世儒皆以為善也唐食貨志不知其勢亦有不可行者盖三代之世天子所以自治者甚狹而其所以治之者甚親而甚專王城之外二百里為鄉遂鄉遂之外為都鄙則已付之都鄙之長都鄙之外為邦國則五等諸侯分治之而天子所自治者鄉遂之民耳數之生耗皆可以歳比田之升降皆可以家數今唐為授田之制盡使合古而其衆寡生耗進退之數不能不責成於官吏鄉升之縣縣升之州州升之朝不能不取信於簿籍而内外官吏更易之不常逺近之相隔新故之相襲豈無隱欺之患哉古人行之於二百里之間唐人欲行之於萬里之逺其弊也皆以空文上之豈不惑哉唐食貨志歳終其民之年與地之闊狹為鄉帳鄉成於縣縣成於州州成於户部又有計帳具來歳課役以報度支此唐初雖有能為之力而無能為之術也愚之所甚恨者太宗貞觀末年伐遼之舉正田制既定之日以田二十頃賜征遼之功元仁基是太宗初年已自敗其制况口分世業之法不合於古乎至使公主田園或徧畿甸太平公主宦官名田㡬半京畿睿宗於劉幽求賜之田千畆夲傳睿宗立􅕥幽求侍中下詔曰國家之復幽求是頼宜加賜實封千畆云云武宗於鄭光賜之鄠雩陽二縣良田夲傳而兼并抑又甚矣噫漢唐之盛一處於勢而不可為一泥於法而不善為况魏晉紛紛之時耶然則不用井田之制而享井田之利者其惟國朝乎建隆初嘗行均田之法均田之大名不實者有罰括田於鄭州殘暴者有貶政要建隆初命常參官徃諸道均田大名府舘陶縣民郭贇詣闕訴括田不均詔令他縣官審視所隱頃畆皆實太祖怒夲縣令程廸决杖徒流海島括田使給事中冦鄭削兩任免又度支判官刑部員外郎崔遜坐括田於鄭州殘暴苛急所按失實為民所訴貶伊陽令是時也百姓無不均之患官吏無或隱之欺而田制定矣紹興初又嘗行經界之法群議紛紛令下之初吾民便於法成之後是時也版圖無不革之弊税役無不均之法而田制又定矣紹興年間嘗行經界之法令下之初羣議紛然法成之後民盛便之詭名挾佃皆無所逃其奸兹誠萬世之利也然所在州縣有可行者有不可行者此為未均焉滿軒筆録今日畫田之制固不可行而浙右經界獨不可廣推乎井田之制固不可曉而荆襄閒田獨不可誘耕乎老蘇田制之論潁濵民政之説正愚有望於今日者敢以此為獻水利古者不與水爭利論古今水利之制莫善於周莫不善於漢夫水利之在天下猶人之血氣然一息之不通則四體非復吾有大而江河川澤㣲而溝洫畎澮其小大雖不同而其䟽通導逹不可使一日之壅閼則一也成周之盡力於溝洫西漢之用功於河渠不貪小利以害大謀不急近功以遺逺害田畆有灌溉之益川澤無壅塞之憂此周禮述溝洫遷史書河渠之利歟且成周匠人之職方井之廣四尺者謂之溝十里之成廣八尺者謂之洫百里之同廣二尋者謂之澮夫自四尺之溝積而至於二尋之澮一同之間其捐膏腴之地以為溝洫之制者凡幾畆也禮冬官匠人為溝洫九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仭謂之澮小司徒之經土地而井牧其田野説者論田税之所出則百井之地出田税者六十有四而三十六井則治洫也萬井之地出田税者四千九十有六井而三千有竒則治溝與澮也夫自一成之地積而至於一同萬夫之衆其捐賦税之入以治溝洫之利者凡㡬人也地官小司徒注成周之君豈不愛膏腴之地賦歛之入而棄以為無用之溝洫哉誠以所棄者小而所利者大所捐於公上者不能毫髪而所以福斯民而澤天下者無窮已也自經界不明而先王溝洫之治漫無可考以九河之地猶失其八支而莫得其迹東坡辨九河云以漢許商之言考之徒駭最北鬲津最南盖徒駭是河之夲道東出分為八齊小白塞之為今河間弓髙以東至平原鬲津徃往有其遺處盖其八支併歸徒駭也則細而溝洫之属可知矣天下所謂有才之士始出而以私智經營雖其利澤不博未及古人徧利天下之意不猶愈於後世與水爭地貪尺寸之利而遺無窮之害哉自春秋戰國浚其源西漢導其流而河渠之水利詳矣孫叔敖起芍陂楚受其惠文翁穿腴口蜀以富饒史記鑿漳水於魏者鄴旁有稻梁之詠魏襄王時史起為鄴令日魏氏行田以百畆鄴獨二百畆是田惡也漳水在其旁西門豹為鄴令不知用於是引漳水灌田鄴以富民歌之曰鄴有賢令兮為史公决漳水兮灌鄴旁終古瀉滷兮生稻梁導涇水於秦者谷口有禾黍之謡班固西都賦又前溝洫志自秦用鄭國鑿涇水為渠號鄭國渠至武帝中大夫白公復奏穿引涇水一起谷口以灌池陽名曰白渠民歌之曰鄭國在前白公在後云云且灌且溉長我禾黍此見於春秋戰國之時也自漢以來講明尤備内而京師外而列郡又逺而邊地源流𣲖分原隰碁布歷歷可見漢武帝時嚴熊言臨晋民欲穿洛以溉重泉於是發萬人穿渠穿得龍骨故曰龍首泉渠兒寛穿六輔渠於左内史之制武帝元鼎間兒寛為左内史奏請穿六輔渠白公引涇水於池陽之區見上决渠降雨荷臿成雲衣食京師億萬之口豈非京師之利乎西都賦其他渠縣泰山則引汶東海則引鉅定海南九江則引淮朔方西河酒泉諸郡則皆引河及川谷以溉田溝洫志用事者爭言水利朔方西河河西酒泉皆引河及山谷以溉田而關中靈救成國障渠引諸川汝南九江引淮東海引鉅定泰山不引汶水皆穿渠溉田各萬餘頃他小渠及陂山通道者不可勝言也陂山通道在在相望豈非諸郡之利乎輪臺以東有渠溉田五千頃桑𢎞羊奏故輪臺以東坡渠黎皆故國地廣饒水草有溉田五千頃以上温和田美可益通溝渠種五糓而鮮水左右亦有橋七十所趙充國屯田奏云願留邊二千人屯要害處繕鄉亭浚溝渠治陸陿以西道橋七十所令鮮水左右是雖極邊之地水道源流無不加意又豈非邊地之利乎西漢之君不計地利之廣狹不論費役之多寡不一勞者不永逸不暫費者不永寧此漢人得享溉灌之利也然周漢之所以得水利者治之者非一官領之者非一人得以盡心於溝洫河渠之間是故周官營溝行水之制則職之匠人俾任浚導之功也匠人為溝洫凡溝必因水勢防必因地勢止水蓄水之令則領之稻人俾專儲蓄之利也地官稻人以儲蓄水以防止水以溝瀦水以遂均水以蕩舍水以澮㵼水夫惟浚之於其始積之於其終又安有旱澇之患哉漢之京師則少府總禁池之事其属則有池監百官表少府掌山海陂澤之税其属有上林卜池監有都水長丞有都水見上水衡掌林苑之事其属則有水司空百官表水衡都尉水司空長丞属焉有都司前百官表奉常注如淳曰都水治渠隄水門又按太常少府水衡皆有都水長丞三輔以行京師之職太常以領巴陵之渠並百官表郡國則九江有陂湖官南海則有淮浦官南郡江夏則有雲夣官夫惟既任於其内又分於其外又安有壅閼之憂哉地里志九江郡有陂官湖官南海郡中有淮浦官南郡江夏郡有雲夣官國朝惠養元元留心水利三司則有都水監夲朝官制都水監属三司貟無常職興役則差諸路則有提舉淳熙七年臣僚乞委提舉常平築陂塘脩堰門瀦水為備州有倅貳邑有丞佐淳熙七年又臣僚劄子乞委諸路常平司籍定所𨽻郡縣公私陂塘川澤之教專責縣丞因民暇日勸率䟽道聖㫖依令專一督責縣丞於農隙日浚治䟽導廣行儲蓄而又郡有守邑有令皆得以行其浚導瀦蓄之利故修蕭何之故堰則若許景山而廢壊之地復蒙大利真宗朝知興元府許景山嘗脩漢蕭何所為故堰頋其属曰鄼侯方佐天下乃暇為此以灌農田今吾豈憚一時之勞而廢萬世之利於是因其壊堰大脩之正鄭公在前白公起後之意也見上修召信臣之舊渠則若趙尚寛而荒瘠之場變為沃壤仁宗朝有唐州太守趙尚寛者修復召信臣渠與境内陂堰向為荒瘠之地變為沃壤三司使包拯上其事上嘉其能命留再任且有雄擢之諭正前有召父後有杜母之遺也後漢杜詩復脩召信臣南陽渠人歌之曰前有召父後有杜母築海堤以衛田而民享其利則如范文正范仲淹監西溪倉建白於朝請築海堤於通泰海州之境長數百里以衛民田以文正為興化令專掌役事發通泰楚海四州民夫治之既成民享其利興化以范為姓興水利有功而治累得聲則如劉彛安定胡先生有治事齋如治兵水利之類嘗言劉彛善治水後累為政皆興水利得人如是則其利可勝既耶今日聞有論水利之事矣而不蒙其利聞有任水利之官矣而不行其勞夫湖藪陂澤水之所瀦而河渠畎遂水之所泄豪民墾之以獲豐殖之資官司仰之以享租輸之入及其日増歳衍而水利之故地皆為創置之良田曩之仰其水利以耕者今不勝旱溢之害是固不可以悉舉也姑以越之鑑湖言之自漢永和中始開其廣三百餘里而灌溉之利及於民者為田八千餘頃及熙寧中盗耕其中者九百頃至近歳又甚矣至取其田以歸之公上此未害也而不知所剩者僅數百畆而利之所入復未必盡歸之官所害者凡數千頃而駸駸不已則越三郡將受其弊矣儻今日公上不利絲毫之賦守令不恤豪右之民毋惑於紛紛之議毋付於悠悠之事則何患乎利不興害不除而使周漢專其利哉雖然水利固當舉也亦非易輕舉也才不辨者不足任心不盡者不足任茍且順從者不足任上糜帑庫下奪農田隄防一開水失故道則有指鄰國以為壑説禹貢而行河者益以滋其繆耳不然閑送苕溪入太湖東坡何託此以諷熈寧興水利者哉東坡詩議王安石興水利古今源流至論别集卷十
