body:
  text: 古今源流至論後集卷一宋林駉撰道學道學之說帝王以前無有也立我蒸民莫匪爾極不識不知順帝之則斯時也吾道隱然於危微授受之間而道學之說不立遵王之義無偏無陂遵王之路無反無側斯時也吾道渾然於彛倫攸叙之際而道學之說不聞故在上者惟知有道統之傳在下者惟知有道化之盛人極以之立元化以之運世道以之清殆猶元氣淪渾未散初莫知吾道為何物也自周轍不西皇極之主弗作而吾道之脉已微天生素王出力興起繼以亞聖相為扶持懼賊亂以簡嚴一字之春秋塞楊墨以明白七篇之仁義君臣父子之道復立禮義忠信之教復興天地之運已息而復繼人物之倫幾亂而復叙此孔孟有皇極之德無皇極之位所以有道學之名也嗚呼天日常明宇宙常清天下而常有帝王正學而常有孔孟則符契若合閲百聖而如一人統緒相承歷萬世而如一日奈一壞於秦人之刑名而道之正學湮微再壞於漢人之黃老而道之正學分裂大壞於梁陳隋唐寂滅之教而道之正學幾無餘澤噫可歎也嘗謂天下不可一日無儒學之功也故其逹於朝廷之上施諸典章措諸政化則天下顯然享斯道之福及其隱於師友之間形諸問答見諸著述則天下猶隂被斯道之澤至上無宗主下無扶持而波蕩於異端之流則生民之禍始興矣韓昌黎謂軻之後不得其傳信夫此伊川先生亦以為至論也歟韓文原道篇云道之大原出乎天堯以是傳之舜云云軻之後不得其傳焉又伊川云退之晚年為文所得甚多如軻之後不得其傳之語非蹈襲空虗而得之雖然文不喪天道未墜地百世而下必有我師至於本朝濂溪浚其源伊洛導其流橫渠助其瀾揖堯舜於夢寐之間授孔孟於講論之頃景星鳯凰天下快覩太山北斗學者依歸故性理言其二氣五行動靜言其四時萬物誠論其元亨利貞道論其中正仁義則發於通書之數篇通書性理命篇曰二氣五行化生萬物五殊二實二本則一是萬為一一實萬分萬一各正小大有定又動靜篇水隂根陽火陽根隂五行隂陽隂陽太極四時運行萬物終始混兮闢兮其無窮兮又誠篇曰誠者聖人之本大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也元亨誠之通利貞誠之復大哉易也性命之源乎利又道篇曰聖人之道仁義中正而已矣守之貴行之廓之配天地豈不易簡豈為難知不守不行不廓耳無極而太極太極而兩儀兩儀而五氣五氣而四時則見於太極之一圖太極圗曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉玉淵金井志慮髙潔趙閲道贈周茂叔詩心似氷輪浸玉淵節如金井冽寒泉光風霽月胸次灑落黃庭堅濂溪傳序周茂叔人品甚髙胸中灑落如光風霽月好讀書䊒意林壑初不為人窘束此濂溪之學本乎易之太極然也張敬夫作周濂溪祠堂記本乎易之太極中庸之誠論性别其所禀本然之殊伊川曰性相近此言所禀之性非言性之本若言其本豈可言相近孟子言性善性之本也性之本則無不善所禀之性有善有不善論心辨其曰虛曰實之異伊川訓門人謂心有所主則虛明道告與叔謂心有所主則實排異端必正其枯槁恣肆之弊明道謂異端之教滯固者入於枯槁疏通者歸於恣肆自致知至於知止誠意至於平天下灑掃應對至於窮理盡性伊川撰明道行狀先生之言平易易知賢愚皆獲其益如羣飲於河各充其量先生教人自致知至於知止誠意至於平天下灑掃應對至於窮理盡性循循有序以誠敬為入門踐履為實地暗室屋漏為謹獨之所河南語録托興吟風充然有得明道語録詩可以興某自再見周茂叔後吟風弄月以歸有吾與㸃也之意瞑目立雪望之凜然遊定夫楊中立見伊川坐而瞑目二子立不敢去退則門外雪深尺餘矣其嚴厲也如此此伊洛之學本乎中庸之誠然也伊川行狀訂頑砭愚有亞聖性善養氣之論橫渠學堂右書訂頑左書砭愚伊川曰是起爭端改訂頑曰西銘砭愚曰東銘明道曰訂頑之言極淳正無雜楊中立曰西銘言體不及用恐流於兼愛伊川曰橫渠立言誠有過處乃在正蒙西銘推理存義擴前聖所未發與孟子性善養氣說同正蒙理窟發前聖所未言之藴橫渠有理窟一集論經又正蒙一書正容謹節凜若神明窮理盡性瑩如氷雪此橫渠之學又自禮法而入也橫渠語録然嘗觀劉立之之言曰程氏從汝南周茂叔問學窮性命之理則知程氏之學出於濂溪也信矣河間劉立之曰明道從汝南周茂叔問學窮性命之理率性㑹道體道成德出處孔孟從容不勉又哲宗微宗實録伊川年十四五與明道同受業於㫪陵周茂叔先生又觀游定夫之言曰張子厚少好言邉既而得聞程氏論議乃盡棄所學從事於道虛心求益懇懇不及則知張氏之學得於伊洛也信矣建安游酢曰明道先生生而有妙質聞道甚早年逾冠明誠交資張子厚友而師之子厚少時自居其才謂提騎卒數萬可橫行丐奴視叛羌為易與耳故從之游者各能道邊事既而得聞明道先生論議乃謝其徒盡弃其舊學以從事於道其視先生雖外兄弟之子而虛心求益懇懇如不及後子厚學成德尊識者謂與孟子比龜山跋橫渠與伊川簡橫渠之學出於程氏而關中諸生尊其師欲自為一家故豫録此簡以示學者愚竊論之道學猶元氣也周流今古罔有間斷風雨有晦冥日月有薄蝕而此道不泯也世變有汙隆治道有興衰而此道終存也且涪陵之謫學禁甚嚴黨人至有五鬼之號吾道嘗一蝕矣紹聖間以黨論放歸田里四年十一月送涪州編管又崇寧初元祐學有禁孔文仲奏伊川歷致議諫騰口間亂以償恩讎故市井目為五鬼之魁而至髙宗中興召用門弟巋然如靈光之獨立士夫不能無歆羡之嘆而正學幾晦而復彰夫奚害胡安國墓志及中興本末云建炎初故崇政殿說書河南程頥以道學為天下倡其門人髙弟有故監察御史建陽游酢與今微猷閣待制將樂揚時是也以時為工部侍郎年七十九矣及入對有言聖賢之君未有不以典學為務者以君德在是故也尋詔時兼侍講是時如右丞許景衡右文殿修撰胡安國左司郎中吳給殿中左侍御史馬伸皆號得頥之學安國崇安人給項城人也濠梁之役趙公求去或者有髙視闊步之譏吾道嘗再蝕矣紹興張魏公敗劉猊於濠州上曰却賊之功盡出右相之力於是趙鼎惶懼乞去時鼎既出補外董朱繼出時譏其髙視闊步以為行而趙公再相汲引善類藹然於縉紳之間而正學幾微而復盛夫奚病趙鼎後再相復汲引胡董劉朱諸賢當時其黨復盛秦黨不便於趙而劉大中之徒復相繼而去吾道又嘗再蝕矣秦檜主和議不便趙鼎之黨劉大中之徒於是求出而慶元初年大儒設教摳衣雲集屈致講帷吾教有光焉而正學幾墜而復振夫奚損慶元初召用朱文公為侍講文公祖伊洛之學故也自是而後或廢或興不知幾變未易盡言而伊洛源流至今流衍益盛也噫以道傳學在士大夫固為有功而以道名學在士大夫不能無過節義盛於漢而衰於漢清流盛於唐而衰於唐道學之實隱然於冥冥之中是乃吾道之幸而道學之名矯矯然表暴於世者非士君子之福何者正學與邪學不兩立正人與邪人不兩用一消一長之間道學所由顯晦之機也前日僞學之事可鍳矣吁可畏哉元城了翁曰願士大夫立此名節不願士大夫立此門户愚亦曰願士大夫傳道學之實不願士大夫唱道學之名格物之學人皆學解牛吾獨得養生莊子人皆學舞劒吾獨得草書張旭此格物之功用也至誠之未盡則鳶魚之不察機心之一露則鷗鳥之不下此格物之本原也夫天地之間皆物也至粗者物之迹至精者物之理角者吾知其為牛鬛者吾知其為馬非迹乎橋梓之父子鴻鴈之兄弟非理乎當因其迹而求其理不當忘其理而泥其迹也是學也必意誠心正而後可以明是理而私僞梏亡者不可以明是理必知周見徹而後可以明是理而人欲蔽塞者不可以明是理中庸言格物之妙本於誠意七篇所論備物者亦以反身而誠者先之獨不觀聖門之學乎顔子感常山之鳥知東野之馬悟也家語而不知是理得於心齊坐忘之頃曾子造舍瑟之趣托浴沂之樂妙也論語蓋詠歌而歸天真默悟非可以迹求之粵自杏壇迹熄槐市響絶後之所謂格者不纍於物則離於物寥寥千載能續曾顔之學者惟我朝關洛諸公有得焉嘗考諸君子之學有知者固格之而無知者亦格也有形者固造之而無形者亦造也探其原遡其藴蓋自誠敬得之伊洛之學尸居而龍見淵默而雷聲以誠敬為入門以踐履為實地關中之學下學而上逹文章而天性以正容謹節為本以窮理盡性為用之君子者燭理既融見理已到一性澄徹萬善昭融以之格物何物非我以之明理何理非天蠢而鳥獸塊而金石幽而造化悉歸吾性分之中自今觀之見鳥集而知機心之不生非妄也即傷弓飛鳥見曲髙舉之意也伊川指庭下羣雀曰地上之有物則羣雀集而食之故與之則不即來食須久乃集蓋人有意在爾若負粟者過適遺下則便集而食矣云云聞驢鳴而知己意之自若非誕也即鼓琴得趣六馬仰秣之㫖耳周茂叔窗前草不除問之云與自家意思一般子厚聞驢鳴亦謂如此中孚一感可及豚魚信乎狗有吠屠之靈伊川曰犬吠屠人世𫝊有物隨之非也此正如海鷗爾又易中孚卦春燕秋鴻各隨寒暑信乎雉為盛陽之物伊川曰雉尾長故極陽兔尾短故極隂此有知之物固易知也若夫有生而無知有形而不動者亦明之吳江楓葉秋古人固以物而知時而今觀梅枝而知乾坤者信矣早梅冬至以前發方一陽未生然則發生何也其榮其枯此萬物一箇隂陽升降之節也然逐枝自有榮枯分限不齊各有一乾坤也伊川語録寒城菊自花前賢詠其物之有操而今謂草木之有恕心者信矣有問明道曰如何謂之恕心曰充廣得去為恕心如何是充廣得去曰天地變化草木繁充廣不去如何曰天地閉賢人隱又杜詩此有形之物亦易知也至於無形之可觀無迹之可驗運於茫昧者亦知之一氣升降未易管蠡今觀石壇之潤而探天地升降之妙若迂矣然礎石之迹一潤而在天之雨必至非為迂也程先生遊西湖在石壇上坐少頃腳踏處濕舉起曰便見天地升降道理慘舒迭運周流穹壤今以一瓶之粗而指隂陽消長之義若怪矣然豐山之鍾方鳴而霜降之候已應非為怪也程先生見火邊湯瓶指之曰此便見隂陽消長之義格物至是信無一物之不格也噫論關洛格物之學不先求其正心誠意窮理盡性之妙而謂今日格一物明日格一物以為所格在是亦不足語大學之道或問伊川格物須是物物格之還只格一物而萬理皆知曰今日格一物明日格一物積習既久然後曉然自有貫通處師道愚嘗退而靜思士君子以身立天地間其不可負不可慢者三曰君曰父而師與焉夫生而為人業而為士戴天履地而靈於萬物不至於斫喪磨滅擯棄雕落是誰之力歟富貴安佚我者君也鞠育覆護我者父也而誘掖訓導啓迪成就我者師也人能忠而君孝而父此固職分之常茍棄所學倍其師將何自立於俯仰間乎昔者孔子以布衣匹夫而衣冠禮樂足以師表一世其門人弟子不逺數千里而從之雖飢寒流落擯於死而不去寧從陳蔡之厄而不忍棄絃歌之誨寧處匡人之圍而不敢叛聖門之教論語寧有漢兵之圍魯共王之難而詩書金石之聲不敢忘也漢兵項羽傳及魯共王序噫此其有補於世教豈淺淺哉木鐸響絶杏壇迹蕪師道之不絶也如線授子夏之學者虛無其說田子方傳荀卿之業者刑名其家李斯操戈入室幾百年于兹矣蓋可嘆也漢之諸儒爭開户牖往往有自棄之心唐之諸儒吠噬狂走亦有厭薄之見方漢家蠧簡有所師承守榖梁者不敢從左氏劉歆諸人習左氏不從公榖習韓詩者不敢尚齊魯儒林傳非不守師教也然劉歆受學方進矛盾户庭其視左氏春秋之學謂何本傳林吉從師周堪失身匪人其視夏侯尚書之學安在儒林傳嗚呼習羿之藝彎弓反射漢儒何忍哉方唐家崇尚儒術願承模楷從武公之教者升堂而游抱琴而歌韓文上巳日燕太學聼彈琴詩序薰陽城之德者詣闕而留抗疏而請唐書陽城傳非不尊師道也然昌黎一代山斗百川東之且不能保籍湜之不叛韓文與孟簡書子厚衡湘以南皆師之至答韋中立一書恐恐然群怪聚罵之譏栁文答韋中立論師道書今之世不聞有師有輒譁笑之以為狂人獨韓愈奮不顧流俗犯笑侮收召後學作師說因抗顔為師世果羣怪聚罵指伺牽引而操與為言詞愈以是得狂名居長安炊不暇熟又挈之而東如是者數矣黨性聞庸蜀之南常雨少日日出則犬吠云云嗚呼見雪而走望日而吠唐儒何怪哉見上甚矣師道不可一日不存也為天地立心為生民立極者師也為前聖繼絶學為天下開太平者師也不然河汾王氏師友講習而能開三百載之唐者師亦何負於人耶一時從遊謀如房斷如杜直如魏智如李方布衣窮悴之時直期以公輔之器異時以論諫稱以征伐顯以輔贊彌縫著稽其夙志無不酬然文中子孔孟而下而能得師友淵源者河汾一人而已此師道不可一日不存也得洙泗之源流接河汾之支𣲖吾於先正諸公有望焉安定之在湖以體用學也家孰記安定先生胡瑗慶歷中教學蘇湖間束修弟子以數千計時方尚詞賦獨湖學以經義及時務學中故有經義齊治事齊康節之在洛以象數學也康節傳李挺之象數之學明復之在泰山以經學也墓志孫復字明復後居太山學春秋著尊王發微十二篇自周而程自程而張又以性理之學也張敬夫祠堂記周敦頥字茂叔起於逺方超然自得本乎易之太極中庸之誠以極天地萬物之變化其教人使之志伊尹之志學顔子之學推之於治禮樂刑政可舉而行於是二程兄弟推明皇極之學楊龜山跋橫渠與伊川簡橫渠之學出於程氏而關中諸生尊其師欲自為一家故豫録此簡以示學者安定先生其體仁義禮樂其文詩書史傳其用則潤澤生民歸於皇極凡從而學者其醇厚和易之氣望之可知熙寧十年劉彛召對上問從學何人曰少從安定臣聞聖人之道有體有用有文君臣父子仁義禮樂體也詩書史傳子集文也舉而措之天下用也纍朝取士不以體用為本而尚浮華之詞是以風俗偷薄瑗當寶元明道間明體用之學授諸生始自蘇湖終於太學出其門者無慮二千餘人學者明體用以為政教之本臣師之力也上曰門人在朝為誰曰錢藻之淵篤孫覺之純明范純仁之直溫錢公輔之簡諒其在外明體適用數十輩其餘政事文學不可勝數又聞見録安定教人有法伊川曰凡從安定先生學者其醇厚和易之氣望之可知也道德賢材侈為歌詠歐陽修詩曰吳興先生富道德詵詵弟子皆賢材棟梁桷榱極口稱美王荆公詩曰先取先生作棟梁以次收拾桷與榱錢藻之淵篤孫覺之純明純仁之直溫見上藹然為一代之盛此東南諸生皆能明體適用無愧於安定之門也康節先生先天易數以發乾坤之藴康節傳李挺之先天易皇極經世以續彛倫之傳陳瓘曰先天之學心法也其學在心或於心外欲觀休咎故以皇極為名數之書其得之李挺之穆伯長之源流蓋非一日陳摶學易以數學授穆修伯長修授李之才挺之才授康節先生衛之學者捨學而學門人張岫撰行狀大名王豫天性瑰瑋博逹之士也精於易聞先生之篤志愛而欲授之既與之語三日得所未聞始大驚服卒捨其學而學焉衛人乃知先生之為有道也洛之士夫薰德而化明道先生撰墓志在洛幾三十年講學於家未嘗强以語人而就問者日衆鄉里化之逺近尊之云云其與人言必依於忠信仁義樂道人之善而未嘗攻其惡故賢者恱其德不賢者服其化章子厚欲傳其學而不之許章子厚從先生遊欲傳數學先生曰須十年不仕乃可蓋不之許也邢和叔欲傳其學而亦不之許邢和叔從康節學援引古今康節曰先天學未有許多言語且當虛心潜慮上蔡語録邢恕要學堯夫不肯曰徒長奸雄此先生不輕於授人而人亦不忍負於先生也太山先生不惑傳注不為曲說自著尊王發微之書道德髙邁而李丞相孔給事皆尊事之歐公撰墓志先生少舉進士不中退居太山之陽著春秋注尊王發微魯之學者其尤賢而有道者石介自介而下皆以弟子事之李丞相迪以其弟之女妻之孔給事道輔為人剛直嚴重不妄與人聞先生之風就見之介執杖屨侍左右先生坐則立升降拜起則扶之及其往謝也亦然一時學者如石守道張洞蓋魯人之所尚北面授經講問不怠親執杖屨從容左右於是學者知有師弟子之禮澠水燕談孫明復先生居太山之陽道純德備深於春秋守道率張洞北面而師之訪問講解日夕不怠明復行則從升降拜起則執杖屨以從於是學者始知師弟之禮此太山之道愈尊而師友之分愈嚴也至若濂溪太極一圗洞窺祕奧通書數篇萬世所宗志伊尹之志學顔子之學超然自得本乎易之道中庸之誠而遊濂溪之門者則有二程諸君子焉見上程氏春風和氣使人愛慕門外立雪氣象森嚴侯仲良云朱公掞見明道歸語人曰光庭在春風中坐了一月游定夫楊中立見伊川坐而瞑目二子不敢去退則門外雪深尺餘矣其嚴厲如此使天下知有師道之可慕可敬而逰程氏之門者則有如游如楊如張如馬焉游定夫楊中立張思叔馬時中皆出程氏之門橫渠訂頑砭愚其言醇正正䝉一書學者指南橫渠學堂雙牖右書訂頑左書砭愚伊川曰是起爭端改訂頑曰西銘砭愚曰東銘明道曰訂頑之言醇正無雜楊中立曰西銘言體不及用恐流於兼愛關中學者躬行之多至與洛並而遊橫渠之門者則有吕與叔蘇季明焉張子厚學成德尊與孟子比然猶祕其學明道曰今之時當隨其資教之雖識有明暗亦各有得焉子厚用其言故關中學者躬行之多與洛人並吕與叔作橫渠行狀蘇季明胡氏云季明從橫渠甚多嗚呼此未足見師教淑人之深也不觀宋衛之辱無以知孔門從道之堅不觀齊梁之沮無以知孟氏諸弟尊師之篤不觀黨禍之慘無以知伊川門人薰德之久方黨事之起也根連株繫禍發如矢而張繹屹然砥柱甘心溝壑而不變張繹字思叔伊川歸自涪陵思叔始見先生因讀孟子志士不忘在溝壑勇士不忘喪其元始有自得處後更窮理造微方學禁之嚴也逺遁深逝不敢親承而馬時中嵗寒不改至執贄十反而不已馬伸字時中崇寧初元祐學有禁伸鋭然為親依之計先生以非其時恐貽公纍公執贄凡十反且曰使伸得聞道雖死何憾况不至死乎吾道可守而夷狄之法不可徇伊川自涪歸學者雕落多從佛教獨龜山與謝顯道不變因言學者皆荒於夷狄矣時吕原明游定夫皆重佛教則謝顯道其人也見上進士可棄而元祐之學不可議則尹焞其人也尹焞師事伊川應進士舉䇿問議誅元祐黨人焞曰尚可以干祿乎哉不對而出告於程夫子曰吾不復應進士舉矣嗚呼風雨如晦雞鳴不已諸君子有焉吾道幾墜而復續性學已晦而復明至今談伊川之學者斂袵起敬誦伊川之誨者書紳自守是雖先生善淑之教亦諸君子固守之誠也若夫王安石從師濂溪而新經等作與向時所學大戾王荆公從學濂溪後行新法大戾濂溪之教郭忠孝授經伊川黨事叛去至死不相往來崇寧初元祐學有禁奸人用事出其黨為諸路學使專紏其事程先生之門雖素從游者以趍利叛去郭忠孝自黨事起不與先生相往來及卒亦不致奠噫長者絶子乎子絶長者也此在聖門鳴鼓而攻之不暇尚足與語此哉友義觀昌黎志子厚之碑則知朋友相處之義不容變韓文桞子厚墓志銘云云中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將具疏願以桞易播雖重得罪死不悔遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕恱酒食遊戲相徴逐云一旦臨小利害僅如毛髮反眼若不相識觀丙吉貽弱翁之書又知朋友相規之義不茍同漢史本傳噫伐木須友以成民德至於歸厚谷風朋友之道絶天下至於俗薄以世道升降觀之則朋友之義亦大矣夫所謂相處之義非結綬彈冠相慶也非平居笑語詡詡也利害不移貧富不變生死禍福不敢易其志程嬰杵臼全趙孤於辛苦之中左傳張儉李篤脫黨禍於危疑之頃者是矣東漢黨錮傳張儉傳不然杯酒論交傾倒肺腑少臨利害若不相識屨滿於炙手可熱之時羅設於一貧一賤之日酈生賣友耳餘交兵本傳此市井賤丈夫之所為其視朋友相處之義果謂何耶夫所謂相規之義非恕已而攻人也非植黨而激變也學雖同而不可不切磋情雖孚而不容不各盡所見勃朴平智不害為交歡之約漢周勃傳巡戰逺守不失為相戮力之親者是矣唐書本傳不然舉坐稱善徒示貌親同聲贊美惟恐拂情有擠井相害之私無推車協濟之意東都黨錮東漢黨錮𫝊唐人分朋唐牛僧孺等傳秪為昵昵相狎之情其視朋友相規之義果謂何耶大抵握手論心道義相許不盡其所以共患難同甘苦之變此固不足為先施之信茍為國辦事捨公從私以附麗雷同者相勉豈情之真愛之篤哉亦嘗觀先正數君子矣張寇布衣交也冦公雖貴而忠定面折略不少恕此不以富貴易其心談藪張冦布衣交也萊公兄事之忠定常面折不少恕雖貴不改也萊公在岐忠定在蜀還不留既别顧萊公曰曽讀霍光傳否曰未也萊公歸讀其傳至不學無術笑曰張公謂我矣韓李莫逆交也韓公既仕而李公相從不忍少離此不以窮達變其節韓億李若谷少嘗同途赴試共有一被一氊每出入則互為僕從後韓先登第李嘗從之其後並為參政仲淹去國正黨論方熾之秋士夫畏禍少有送者而王質載酒祖餞留語數夕禍福果足動乎仲淹貶士夫畏夷簡少肯送者李紘王質皆載酒往餞質又留語數夕或誚質質曰希文賢者得為朋黨幸矣大年補外正人言下石之隙士夫首竄無有辨者而王曽面排謗議賡詠詩什危疑果足纍乎楊文公因母病有陽翟之行王文正公恐人害之白上遣使䁑醫院而言事者彈劾不已卒以亞卿分司上嘗語輔臣曰楊億好謗時政王公曰楊億文人叨荷國恩若諧謔過當則恐有之至於謗訕臣保其不為也王公器重文公至深頗思其歸乃因中書齊宿覽文公近詩而與趙文定諸時賢繼和上知之乃諭公召文公為祕書監鄒浩言事而去也田畫毅然切責願無以此舉自滿其贈之厚矣言行録鄒浩傳梅聖俞既歿而貧也劉敞未嘗為人書銘特書碑以助其乏其愛之至矣言行録劉敞傳雖然此未足為待之之深也平居相處則稱美之不暇為國論事則廷爭而無私長編慶厯五年歐陽修言杜衍為人清審而謹守規矩仲淹則恢宏自信而不疑韓琦則純正而質直富弼則明敏而果鋭四人為性各不同雖皆歸於盡忠而所見各異故杜衍欲深罪滕宗諒仲淹力爭而寬之仲淹謂契丹必攻河東請急修邊備富弼言契丹必不來至於尹洙亦號仲淹之黨及爭水洛城事韓琦則是尹洙而非劉滬仲淹則是劉滬而非尹洙四人者可謂公正之賢也平日閒居則相稱美之不暇為國論事則公言廷爭而無私杜衍真得忠臣有不和之節而讒為朋黨誣矣上前爭事各持異議以自騁下殿相善不失和氣而如故此則可重也魏泰别録韓忠獻公言慶厯中與希文彥國同在西府上前爭事議論各别下殿各不失和氣如未嘗爭也當時相善三人正如推車子蓋其心主於車可行而已不為已也是故君實景仁異姓兄弟耳鍾律一事終身相非范景仁墓志君實嘗語人曰吾與景仁兄弟也但姓不同耳至於鍾律則反復相非終身不能相一君子是以知二公非茍同者韓公杜公世指為朋黨耳舉兵一事彼此異見杜衍墓志邊將欲大舉擊夏人韓公以為可舉杜公以為不可然兵後果不得出契丹與夏人大戰河外范文正安撫河東欲以兵從公以為契丹必不來兵不可妄也後契丹卒不來二人皆世俗指以為朋黨者其議論之異蓋如此水洛之城議及尹洙洙孫甫所善也甫非咈洙正愛洙也孫甫墓志邊將劉滬城水洛于渭州部署尹洙以滬違節度將誅之大臣稍主洙議公以城水洛通秦渭於國家利滬不可罪由是罷洙洙公平生所善也差役之害言咈溫公東坡溫公所契也東坡非戾溫公正厚溫公也蘇軾謂司馬公曰差役免役各有利害免役之害顧掊民財十室九空差役之害民常在官不得專力於農而貪吏猾胥得緣為奸又曰今欲驟罷免役而行差役蓋未易也光不然之欲宥宗諒仲淹曰可杜公曰不可不曰杜公仲淹之所愛南豐雜識孫甫嘗家居石介過之曰富公言滕宗諒守慶州用公使錢坐罪杜公則欲致宗諒重法不然則衍不能在此范公則欲薄其罪曰不然則仲淹請去此二人世指為朋黨也欲宥仲約仲淹曰可富公曰不可不曰仲淹富公之所黨龍川志髙郵知軍朝仲約迎勞劫盜張海富弼在樞府欲誅仲約以正法范公在政府欲宥之云云餘見上其相處也如昵其論事也如爭諸公豈為面朋哉夫何荆公處友不端也陳升之荆公推轂矣既登揆席忍為操戈之計長編陳升之善傅㑹以取富貴安石用事務變更設制置條例司引升之共事凡所欲為自條例司直奏行安石深德之故推升之先使為相既登相後於條例司遂不復關預安石大怒於是二人始判吕惠卿荆公愛友矣既入參職遂肆彎弓之巧長編始安石薦惠卿代已惠卿既得勢恐安石復入凡可以害安石者無不用其智此小人之棄節背義得罪於荆公固多矣然荆公所以失相處之義以其無相規之理故也何者人莫患乎好人同己也同己之心一勝則勢利之友日親而禮義之交日踈規正之論不聞而諛侫之言愈密反覆之禍諸賢已先知之司馬光對賔客輒指言之曰覆王氏者必惠卿也後六年惠卿叛安石茍可以覆王氏者靡所不為程明道與荆公同學於濂溪也以不樂新法而絶程明道與王介甫同學於濂溪周茂叔後介甫用事明道力攻新法之害不聼乞補外韓維與荆公同受薦於文潞公也以不合新法而踈溫公瑣語皇祐中文潞公為宰相薦安石及張瓌曽公亮韓維四人恬退乞不次進用又韓維行狀安石用事維極論新法不便不報乞補外鄭俠師事於荆公鄭俠從荆公學極論新法神宗為罷青苗免役錢景諶素交與荆公聞見録錢景諶與王荆公善後荆公用事論新法不合遂相絶終身為外官一論新法終身相棄司馬君實素厚於荆公司馬君實與荆公素厚及荆公用事行新法君實與荆公書介甫從政期年天下惡介甫者詆毁無所不至某獨知其不然云云劉道原雅善於荆公十國紀年序王介甫與道原有舊深愛其才熙寧中介甫參大政欲引道原修三司條例道原固辭以不習金榖之事及吕獻可得罪知鄧州道原往見介甫曰公所以致人言蓋亦有所未思因為條陳所更法令介甫大怒遂與之絶一議新法屏迹不容荆公之茍同如此安得不蹈小人之計耶晚年謂其姪防曰吾昔好交游甚多皆以國事相絶欲下筆作書相問長嘆而止意若有所愧噫荆公之悔亦晚矣聞見録田畫承君云荆公嘗謂其姪防曰吾昔好交游甚多皆以公事相絶公居間復欲作書相問防欣然為設紙筆案上公屢欲下筆作書輒長歎而止意若有所愧也尚論處友之道知相處不容變之心又知相規不茍同之理庶無愧於前修云評文屈原之離騷有長鯨蒼虬不得伸之態讀之令人激切生忠憤心竒體也或者至有露才揚已之譏蔣之翰稱騷經若驚瀾奔湍欎閉而不流若長鯨蒼虬偃滯而不得伸若溫金璞玉泥沙掩匿而不得用若明星皎月雲霧蔽䝉而不得出又班固謂屈原作騷露才揚已靖節之歸去來有間鷗立海之狀讀之令人清灑忘名利心佳製也或者有以賦為辭之議前輩謂陶淵明如野鶴任風間鷗立海又曰歸去來以賦為辭嗚呼為文之難如此而况於論文者乎夫自六經不作之後騷人墨客雄才健筆馳價於翰墨之場者不知其幾固難以一二數姑即文選文粹之所去取者而評議之信矣夫論文之難也且擷華掇菁而為選蕭統之用工多矣然西漢之文不取仲舒之三䇿而取揚雄之美新何見也見漢史董仲舒傳又文選去疵取醇而為粹姚鉉之著意勞矣然李唐之文不取昌黎之碑而取假文昌之碑何識也唐舊史云韓昌黎淮西碑多載裴度事時先入蔡李訴功第一訴不平之詔令磨愈文命翰林學士假文昌撰故李義山詩曰帝曰汝度功第一汝從事愈宜為辭意竒語重喻者少讒之天子言其私又東坡嘗於邸壁間見一詩云淮西功德冠皇唐吏部文章日月光干載斷碑人膾炙不知世有假文昌又姚鉉文粹只載假文昌淮西碑噫選粹之失豈止於此耶編司馬長卿賦上林而不知謬言盧橘夏熟編揚子雲賦甘泉而不知妄用玉樹青葱羽獵托諷之詞子虛奏雅之篇而反雜於長門䙝慢之語選果足信乎左太冲三都賦序云相如賦上林而稱盧橘夏熟揚雄賦甘泉而陳玉植青葱班固賦西都而嘆出比目魚張衡賦西京而述遊海若其言無證又見司馬相如揚雄賦述王摩詰老將行而不辨指天幸不敗為衛青之誤述李長吉鴈門行而不指黑雲壓城續以甲光向日之失道士吳筠之著游仙釋子蘭之作長城窟而亦溷李杜元白之集粹果可取乎並文粹噫三代之文至漢復起西漢之文至唐復振一去一取且無定見况江左諸子紛紛之筆歟嗚呼有頴士之髙識庶能知李華吊古戰場文唐李華傳無歐陽公之巨眼而昌黎文集終為頽壁敝篋之物歐陽公韓文後州南有大姓李氏者其子堯輔頗好學余為兒童時多遊其家見有弊篋貯故書在壁間發而視之得唐昌黎先生文集六卷因乞以歸之見其文深厚而雄博信矣夫論文之難也天開我宋巨工彬彬一洗萬古日月爭光故有為三百年來文不振直從韓桞到孫丁之詩者孫何與丁謂齊名王禹稱有詩曰三百年來文不振直從韓桞到孫丁于今便合教修史二子文章似六經有為曽子文章衆無有水之江漢星之斗之詠者王荆公贈曽子固之詩云山川旺氣化入文章噫盛哉有如王黃州之恪孫泰山之義石徂徠之厲尹河南之簡歐廬陵之醇蘇文安之逺李旴江之鋭宋常山之峻司馬涑水之端曽南豐之毅王臨川之整蘇東坡之浩蘇潁濵之通李淇水之宏陳後山之濬黃豫章之理秦淮海之煥朝濟北之舒張譙國之婉張石室之俊筆勢駸駸與周漢軋是豈區區模倣者之所能及哉然考其評議觀其取豫往往有佩劔相笑之見夫歐陽永叔醉翁亭記平生最得意者而秦少游以為用賦體東坡云永叔作醉翁亭記其辭玩易蓋戲云爾又不自以為竒特也而妄庸者亦作永叔語曰平生為此文最得意又云吾不能為退之書記退之又不能為吾醉翁亭記此又大妄也陳後山云退之作記記其事爾今之記乃論也秦少游謂醉翁亭記亦用賦體范文正嶽陽樓記世稱曰佳作者而尹師魯以為傳竒體後山詩話云范文正為嶽陽樓記用對語說時纍世以為竒尹師魯讀之曰傳竒體耳傳竒唐制硎所著小說也曽子固之記六經閣張伯玉終不愜意曽子固初為太平州司户參軍張伯玉前輩人也歐陽公王荆公諸名士共稱子固文章伯玉殊不顧間語子固吾方作六經閣其為之記子固凡謄槀六七終不愜伯玉之意則謂子固曰吾自為之其書於紙曰六經閣者諸子百家皆在焉不書尊經也云云子固大畏服聞見後録陳鐸之批答魯仲明謂非詔語魯仲明論陳鐸批答乃表語非詔語王荆公以東坡醉白堂記為韓白優劣論蘇公以王金陵處州學記為學校䇿並文集注噫稱贊之意不足而正救之辭有餘諸公非相短也正所以相切磋也不然桞子厚素稱韓之文若捕龍蛇摶虎豹急與之角而不暇至論韓碑議其有帽子之習諸公之見非韓桞之見歟桞文集讀韓愈所著毛穎傳後題云有來南者言韓愈為毛穎傳云云索而讀之若捕龍蛇摶虎豹急與之角而力不敢暇指韓子之怪於文也何又劉夢得曰桞八駮韓十八平淮西碑云左饘右粥如我平淮西碑云仰父俯子桞云韓碑議有帽子使我為之便說用兵伐叛樂天之詩沈存中喜其識趣可尚章子厚譏其識趣最淺詩史云沈存中謂樂天詩不必皆好然識趣可尚章子厚謂不然樂天識趣最淺陋謂詩中言甘露事處幾如幸災雖私讐可快然朝廷當此不幸臣子不當形歌詠也如當公白首同歸日是我青山獨往時之類之又百斛明珠云樂天為王涯所誣謫江州司馬甘露禍樂天在洛適遊香山寺有詩曰當君白首同歸日是我青山獨往時不知者以樂天為幸之樂天豈幸人之過者蓋悲之也杜陵之詩黃魯直稱其靈丹一粒楊大年薄其為村夫子黃魯直稱杜子美詩如靈丹一粒㸃鐵成金以又詩史楊大年不喜杜子美詩謂之村夫子有鄉人子美詩强大年不服因曰公試為我續江漢思歸客一句大年以為屬對鄉人曰乾坤一腐儒大年似少屈昌黎之文歐公平日推重以家藏萬卷惟韓文為舊物萬世所尊而蘇潁濵乃譏之歐公書韓文後云云余家藏書萬卷獨昌黎先生集為舊物也嗚呼韓氏之文之道萬世所共尊天下所共傳而有也又蘇子由謂元和聖德詩李斯頌秦所不肯言愚溪之文蘇東坡晚年最愛以碑文妙絶今古而歐公乃薄之蘇東坡晚年最喜桞子厚稱其詩在淵明下韋蘇州上至讀曹溪南嶽諸碑妙絶今古歐公謂子厚叔文之事韓門罪人噫去取之見不同而優劣之論亦異諸公非相反也正所以相詰難也不然老泉嘗稱遷之史其與善隱而彰其懲惡直而寬至其子頴濵作古史以紏其失諸公之見非蘇氏父子之見歟老泉文遷史其與善也隱而彰其懲惡也直而寬其賤夷狄也簡而明又子由作古史論史遷之失雖然文人相輕從古固然然學不逮先輩文不逮先輩亦效先輩雌黃之口皆其氣習不渾厚而輕躁者之為乎讀詩未有劉長卿一句己呼阮籍為老兵筆語未有駱賔王一字己罵宋玉為罪人則吾豈敢韓文昔歐公之跋昌黎文集也曰豫少得韓文於頽壁敝篋間閲之可愛方舉進士未暇進力後官洛陽與尹師魯出所藏而補綴之而韓文遂行於世噫歐公用力也久矣歐公書韓文後曰余少家漢東州南有李輔兒頗好學余為兒時多遊其家見有敝篋貯故書在壁間發而視之得昌黎先生文集六卷脫落顛倒無次序因乞李氏歸讀之見其言深厚而雄博然余猶少未能悉究其義徒見其浩然無涯若可愛余方舉進士以禮部詩賦為事年十有七試於州為有司所黜因取所藏韓氏之文復閲之則喟然嘆曰學者當至於是而止耳後七年舉進士及第官於洛陽而尹師魯之徒皆在遂相與作為古文因出所藏昌黎集而補綴之求人家所有舊本而校之其後天下學者亦漸趍於古而韓文遂行於世故革華傳舊所不傳而歐公録之洪興祖注曰下邳革華傳舊來無此傳歐公始録之召大顛書舊所不載而歐公辨之慶厯丁亥江西袁涉世弼得此書疑因之滁州謁歐陽永叔質之曰實退之語它意不及也此書唐元和十四年刻在朝陽靈山寺東坡又云世妄撰之作詩得寬韻則波瀾橫溢泛入傍韻得窄韻則不復旁出因難見巧舊所未論而歐公始評之歐公云退之工於用韻得寬韻則波瀾橫溢泛入旁韻如此日足可惜之類是也得窄韻則不復旁出因難見巧如病中贈張十八之類是也故作文者非韓不學學韓者非歐不師蘇公謂歐陽今之韓愈信夫蘇軾序歐陽之文曰韓文之後三百餘年而得歐陽子天下尊之曰歐陽子今之韓愈也嗚呼昌黎之文龍翔鳯躍日光玉潔出入周孔凌駕卿雲千態萬狀道德仁義之言炳如也然毛頴一傳舊史譏之則公之文在唐而未著漢唐書云愈作毛頴傳譏其不近人情此文章之甚謬者矣洪興祖曰舊史所見如此罕有識者伯長所鬻經年不售則公之文在國初而未顯穆伯長有韓桞集鏤板鬻於京師經年無售者不有歐陽氏其孰為古文之倡歟其孰繼昌黎之躅歟自是而後如蘇如曽如王如宋諸君子繼唱迭和追逐前修盛矣哉愚嘗觀公之文矣讀聖德詩而知其文辭雅正與周雅爭光讀城南聨句而知其辭氣豪放雖纍十百千而不困故東坡謂寄盤谷子二章不减杜子美東坡曰退之尋常詩自謂不及李杜若盧郎中雲夫寄示送盤谷子詩二章獨不减杜子美魯直謂南溪始泛三首有詩人句律之深意魯直於退之最愛南溪始泛三首以為有詩人句律之深意蓋退之絶筆於此則公之詩可知也讀平淮西碑氣象宏富得相如體讀曹成王碑語句簡古得子雲體洪興祖曰嘗見一士人云曹成王碑造語法子雲也南山詩平淮西碑氣象宏富法相如也進學解師說之類精純入道理法劉向也凡為文字字有法法左氏司馬遷也故孫覺謂淮西碑其叙如書銘如詩後山詩話云龍圗孫學士覺喜論文謂退之淮西碑叙如書銘如詩臨川謂退之善為銘如王適張徹二銘尤竒王荆公云退之善為銘如王適張徹尤竒也則公之碑若銘可見也原道一篇扶持名教與軻書相表裏進學解師說等作精粹入道理不下劉向及質之前輩伊川謂如軻之後不得其傳之語非蹈襲空虛而得之伊川云退之晚年為文所得甚多如軻之後不得其傳之語非蹈襲空虛而得之小宋謂送窮文進學解皆古人意思未到則公之雜文皆周情孔思也小宋云退之送窮文進學解毛頴等傳皆古人意思未到可以名家矣然送窮與楊子雲逐貧賦大意相類蓋古人作文皆有所祖述如司馬相如大人賦全用屈原逺逰中語老杜云遞相祖述復先誰長卿子長皆剽竊前人意耶至若序若傳愈出愈竒送李願歸盤谷序東坡以唐無文章惟此一篇而已東坡云歐陽公言晉無文章惟陶淵明歸去來一篇而已余亦謂唐無文章惟送李願歸盤谷序一篇而已毛頴等傳前輩以其說出於莊周寓言荆林東齊洪興祖宣和間人嘗謂毛頴傳桞子厚以為怪豫以為子虛烏有之比其說出於莊周寓言嗚呼斯文也振八代之衰濟天下之溺回狂瀾以挽異端之趍吹死灰以彰六經之學蓋名教中一砥柱固非後學測其涯矣姑即先正之所評論之所嘉嘆以叙其一二焉耳然孔孟經學不行於春秋戰國而行於後世昌黎文集不顯於李唐而顯於我朝噫有以夫然嘗論之韓公得歐公而唱得諸公而和固為斯文之幸然淺學者見卑識陋輕議妄改好事者託名亂真求售其文斯文又何不幸耶聽頴師彈琴一詩蓋竒作也或者妄託文忠公以此為聽琵琶之詩既議韓公又誣歐公洪興祖曰歐公以聽頴師彈琴詩為聽琵琶詩東坡嘗作聽琴詩恨文忠公不及見二公之論似未必然祭桞子厚文蓋精語也或者妄以表表愈偉之句改為表奏洪興祖曰退之文章多為流俗庸人妄改如祭桞子厚文云表表愈偉嘗見一本改作表奏嗟夫胸中無國子監不可讀杜甫詩况公之文淺學者豈可輕議乎前輩論云直諫表論顧威狀言不成文事非指實已不免前輩之論荆林東齊曰直諫表論顧威狀舊本無之好事者編入别集觀其文法非退之作公在穆宗朝不聞有直諫事設或有之史官豈得不傳蓋後人妄託公名以售其文才識庸淺尚不堪為退之作故也直諫表云忝位聖唐見賢如齊賢逹之士所痛心怪駭而已枵然無圗等語皆不成文理又論顧威狀云今臣獨陳一力胡能止百官之諛說煩救顧威此一詩季同不可謂百官之諛又云臣當寸草之命骨肉謝於陛下矣議刑常事安用此等語詩之序議三器論命意措辭絶無長處又别出一人之手凡此數篇皆編外集或論韓文直諫表顧威狀正出一手詩之序議三器論又出一人之手論意措辭絶無長處徒務怪句云云嗟夫李華弔古戰場文且不逃頴士之所識况公之文好事者其可託名乎唐書李華傳雖然外集所録固雜矣至明水賦送俱文珍僧令縱答劉秀才論史與夫上賈滑州書薦薛公達書通解擇言鄠人對等篇深粹典麗非他人所能及而李漢公之門人最厚者收拾遺文無所失墜而此作反不在四十卷之列何耶我知之矣蓋論史之作人禍天刑數語特出於有激而云答劉秀才論史書云夫為史者不有人禍必有天刑豈可不畏懼而輕為之哉唐有天下二百年矣聖君賢相相踵其餘文武之士不可勝數豈一人卒能紀而傳之耶明水賦雖工乃舉子聲律之語外集省試明水賦文珍閹寺識者羞稱外集送汴州監軍俱文珍序并傳令縱浮屠名教所斥又送浮屠令縱西遊序乃公意自不欲存於世者故漢集中不收之李漢文集序門人李漢辱知最厚且親遂收拾遺文無所失墜捴七百二十六合為四十一卷又有注論語十卷順宗實録五卷不在集中至其他所作又有可言者蓋少年識見一昌黎也潮州貶還又一昌黎也黃山谷嘗曰公之文自潮州還有不待繩削而自合者則公之老作為自然也韓公年譜云魯直云退之自潮州還朝後文不煩繩削而自合伊川亦曰退之晚年為文所得甚多則以公之晚作為有所見也見上彼上賈滑州書方年二十二韓公年譜上賈滑州耽書云愈年二十二讀書學文十五年自七嵗讀書至此首尾十六年一本作二十三誤矣而薦薛公達書殆又始冠之嵗年譜正元四年戊辰張建封為滁泗濠節度公薦薛公逹於建封云河東薛公達年二十有六按公達墓志云元和四年年四十七卒自元和己丑逆數之至今二十六嵗公時年二十二始有文章見集中通解擇言解鄠人對三篇亦皆少時所作洪興祖云通解擇言解鄠人對或云皆少時所作齒少氣弱誠非足以垂永久者也噫張燕公謪嶽州而詩益悽惋人以為江山之助張說傳說為文屬思精壯長於碑志世所不逮既謫嶽州而詩益悽惋人謂得江山助云杜工部自䕫州後所著篇什皆不待斧斤而自合杜甫詩後因關輔飢輒弃官去客秦州流落劔南夔峽間酒酣慷慨懷古餘見杜詩集桞子厚南遷後作曹溪南嶽諸碑妙絶古今東坡稱嘆不能自已者栁宗元年譜東坡居士云桞子厚南遷作曹溪南嶽諸碑妙絶古今然則論韓公之文安敢以少年所作為公之纍耶古今源流至論後集卷一
