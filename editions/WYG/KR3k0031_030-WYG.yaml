body:
  text: 古今源流至論續集卷十宋林駉撰國學古者學校養其心不養其身後之學校養其身不養其心又其後也養心之教既泯養身之政復闕此君子所以觀古今之别也嘗考成周一書纎悉備具而學校養士之職獨闕而不載有如仕未受田者必有稍食王朝之環衛則宫正均其稍食王宫之人民則内宰均其稍食外焉守溝池之士庶則均其稍食者有掌固焉内焉治文書之府史則掌供其食者有犒人焉並同禮本官獨不聞有所謂養士之官不知當時肄業於成均者何以為養耶雖宫伯月終則均秩周人之待國子者其出於此矣又不知當時士庶者何以為養耶噫周人之所以養士者非區區犧廪之末也有樂舞以和平其血氣有詩書以培植其見聞有干戈射御以閑其禮儀其所以長育成就者盖在此而不在彼古人非不欲設官以専其事豐廪以養其體誠不敢以百司庶府待學校舉餼廪之微以是凂天下之賢者而當時賢士亦不待有所慕而為有所利而進潤澤如沚長養如陵厚德如朝陽令儀如梧桐盖靈龜朶頥輕重有别而自養之學深矣漢承秦滅學之後學校未遑武帝從仲舒之言遂建太學仲舒對䇿順興太學又武帝賛興太學然按晋灼所言乃謂西京無太學晋灼言西京無太學曲臺行射禮若爾則漢未甞有矣及按三輔黄圖謂西京太學在長安西北七里若爾則漢未甞無矣三輔黄圖西京太學在長安西北七里有獄有市嘗以二說叅之盖黄圖所載皆武帝制度是指武帝之時而言也晋灼盖論漢初之制也方武帝建學之初為諸生學長安者或至困厄而不自激厲由郡國選詣愽士者或貧無資用時行賃作兒寛以郡國選詣博士受業孔安國貧無資用嘗為弟子都飬時行賃作帶經而鋤廪犧猶未具也至元帝好儒設員用度充足至是始備焉元帝好儒以用度充足設員千人始武帝弟子之員僅至五十儒林傳始帝選弟子五十員至昭帝所増之數亦止百人養員未盛也昭帝舉賢良文學増愽士弟子員滿百人及成帝太學弟子増至三千至是始盛焉成帝末或言孔子布衣養徒三千人今太學弟子少於是増員三千人嵗餘復如故然特養其身而已愽士徒取儀状果能如周人德行道藝之選乎武帝擇民年十八以上儀状端正者補愽士弟子太常雖與受業果能如周人成均司樂之教乎漢以弟子詣太常得受業如弟子此養心之教猶闕也至光武中興四方學士雲㑹京師立五經博士之員修太學籩豆之典光武中興好儒術四方學士抱墳典雲㑹京師建武五年乃起太學稽式古典籩豆干戚之容迨明帝復加潤色制度一新乃流辟雍辟雍湯湯何輪奐也抑抑皇儀孝友光明何尊顯也尊飬更老其意勤也縉紳億萬其文盛也明帝即位親行其禮袒割辟雍之上尊養三老五更享射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳千人圜橋門而觀聽者盖億萬計又班固辟雍詩乃流辟雍辟雍湯湯聖皇涖止造舟為梁抑抑皇儀孝友光明於赫太上服我漢行然亦特養其身而已執經問難果如周人春夏詩書之學乎親行射禮果能如周人射御之習乎見上注此養心之教亦未聞也雖然王咸舉幡㑹者千餘非西都興學之功歟王咸舉幡以救司𨽻鮑宣㑹者千餘林宗唱義從者三萬非東都設學之效歟黨錮傳郭林宗為唱時太學三萬人從之時公卿皆為貶議異時腐夫刑人瀆亂國典太學名教扶持公議烈日爭嚴視死如歸黨錮傳噫吾儒之有益於人國家也如此鳴呼以兩漢僅能脩飭制度文為之末猶足以起人激厲之志使如成周之所以養士者養士則鳶飛魚躍之下果何如耶唐有二館七學二館曰𢎞文館置於門下省曰崇文館置於東宫皆以宰相領之其生徒以皇屬國戚及大臣子孫為之選舉志凡館二門下省有𢎞文館生徒三十人東宫有崇文館生徒二十人以皇緦麻以上親皇太后皇后大功以上親宰相及散官一品功臣身食實封者京官職事從三品中書黄門侍郎之子為之七學曰國子學曰大學亦以大臣子孫為之同上凡學六皆𨽻國子監國子學生三品人以文武三品以上子孫者從三品以下曽孫及勲官二品縣公京官四品帶三品勲封之子為之太學生五百人以五品以上子職百官五品舊親若三品曽孫及勲官三品以上有封之子為之曰廣文館曰四門館以朝臣之子孫與庶人之俊秀者為之此唐初之制按百官志注天寳九載始置廣文館有學生六十人束都十人選舉志四門學生千三百人共五百人以勲官三品以上無封四品有封臣文武七品以上子為之八百人以庶人之俊異者為之曰律學曰書學曰筭學皆以習其業者為之選舉志曰律學生五十人書學生三十人筭學生三十人以八品以下子及庶人之通其學者為之凡二千二百一十員皆尚書省補授見前注太宗之時亦盛矣未㡬再傳掃地殆盡韋嗣立嘗䟽言國家自永淳以來國學廢散論堂之庭盡墾為圃二館之門復如論堂學制果如是乎舒元輿作國庠記云云予嘗至下論堂庭堂數畆盡墾為圃又至于二館其門其庭其堂皆如論堂終朝之雨流潦不停既夕之天列宿上羅學制果如是乎李觀脩太學書曰終朝之雨流潦不停既夕之天列宿上羅至有愽士助教犁鋤其中此固學校之壞也至國子􅀶士不免啼飢進學觧廣文先生猶嘆無氈杜甫詩嘗贈鄭䖍詩曰才名四十年坐客嘆無氈遷祭酒者謂散冗之地權徳輿謂劉秩為祭酒置之散地為助教者躬犁鋤之事見上注以師儒之職猶爾則養貟之意可以黙諭矣豈非養心之教既泯而養身之政復闕乎夫學校教化之本原自唐虞三代春秋兩漢以來未嘗一日廢六朝之擾攘南北之戰争其視學校疑若敝屣然猶修飭制度躬禮師儒且得已而不已亦以天理人心之本在是爾以三百年之唐反不若僻陋攘亂之邦舉古人所以維持風化之要者廢壊無餘噫可嘆也盖唐以科目取進士以進士之科為貴則學校獨廢至此然獨不觀朱泚之變世道已極而太學何蕃毅然壁立首唱大義六館震驚而唐頼以不亡者未必非兹人之力何蕃傳然則吾道亦何負於國家而唐壊之至此耶君子所厭言也我藝祖立極之初未遑他務首幸監學士風丕振親賛孔顔吾道有光此與武王下車訪箕子陳洪範者同一意也長編太祖既受禪初詔有司增修祠宇自賛孔顔三時臨幸焉建隆元年正月幸國子監二月又幸四年四月又幸盖國家自建隆以來已有國子監釋奠行禮而太學未有也至慶厯從王拱辰之請始假錫慶院為之仁宗慶厯中王拱辰田况王洙余靖等言首善當自京師今取才養士之法盛矣而國子監才二百楹制度狹小不足以容學者請以錫慶院為太學葺講殿備臨幸從之然慶厯以後生徒日廢所居猶狹時太學實未營也至熈寕從鄧綰之請始賜錫慶院以創之熙寕四年侍御史鄧綰言國家治平百年雖有國子監粗容春秋釋奠齋庖之室其中不足以容一生員至於太學即未嘗營建上假錫慶院西北隅廊屋數十間逼窄湫漏生員才滿三百人即無容足之地欲乞賜錫慶院為之仍修武成廟以為右學從之由是若廊若廡若堂若齋制度壮觀規模鼎新而建學之制備矣始太學惟有内舍給食之員僅至二百外舍未立爾熈寕元年逺方待次盖百餘人於是從數以立外舍之員盖從諫官之請也熈寕元年正月詔太學増置外舍生百員初太學置内舍生二百員為給食至是貟足逺方之士待次而入者盖百餘人諌官滕甫劉庠並以為言故有是詔見長編然來遊之士愈多内舍外舍近至三百時上舍猶未立爾未㡬四年遂置上舍百員内舍倍之而外舍則不限焉盖從中書之請也四年十月中書言近増廣太學益置生員為外舍不限員以初入學生員為外舍不限員自外舍升内舍内舍升上舍上舍以百員内舍以二百員為限從之由是冠帶濟濟絃誦洋洋藹然虞庠夏校之風而養士之員盛矣然祖宗養士之意不止是也雅樂歌詩養其耳也胡安定判國子監合諸生于首善堂雅樂歌詩乙夜乃散講經問難淑其心也太祖幸國子監講書淳化幸國子監講堯典說命齋有選考之簿月有選考之目文已中程而選考不預則不聽選選已書籍而程式不預則不許試又兼攷其行藝也養心之道又何如哉然而今日習熟見聞之久視為故常月書季攷第課工拙無預乎行齋堂規罰徒寘屋壁無預乎行舍選所以論行也當其年不犯重罰而已罰不必盡舉也舉者十一營者十五罰不必盡行也間有毅然不恤衆議以師道自任以規矩力行衆謗蝟興則又退縮矣抑又有法可行而不行者才為衆所知越次陞舍法也今不行也行藝為衆所服不雜選者罰法也今不行也愽士月一詣齋教導今可行乎諸生外有顯過亦許糾治今可行乎祖宗所以維持人心者若為文具噫得一程伊川置禮賢等齋以訓諸生不患不知性理之學伊川先生在太學欲以月試為課於講堂側置吏師禮賢等齋得一胡安定置治事等齋以訓後進不患不知體用之學胡安定設治事等齋以訓諸生又劉彛言安定有體用之學此又師儒責也若夫風雨如晦鷄鳴不已中流滔天砥柱屹立此又豪傑之士不待文王而興者未可謂學校中無之州縣學夫思樂泮水薄采其芹是詩也君子知魯之所以興泮水詩青青子衿在城闕兮是詩也君子知鄭之所以微子衿詩盖古之所謂學大抵於黨庠遂序之中國學之設不過公卿大夫之子弟非養天下之士以為公卿大夫任於王朝其子弟從父兄則不得不為之置學于京師其所以養成人材皆少長於黨遂之間而習熟乎庠序之教培植㴠養殆非一日有州長以㑹其禮射有郷大夫以察其行藝齒序之正既有黨正孝弟之書又有族師並周禮本官鳴呼古人重黨遂之學盖如此其至君子於此所以卜魯鄭之興衰也是故蜀有文翁則儒化以成前漢文翁𫝊文翁為蜀郡守修起學官由是蜀好文雅閩有常衮則貢士與内州等唐常衮𫝊衮為福建觀察使始閩人未知學衮為設鄊校親加講導由是風俗一變貢士與内州等閩蜀一僻陬耳一為之興起文教而人材至今為東南之盛鳶飛魚躍亦何所不至哉國朝之初有四書院曰白鹿洞曰嵩陽曰岳麓曰應天府外又有茅山書院猶未建州學也太平興國二年知江州周述言廬山白鹿洞學徒常數千百人望賜九經詔從其請又至道二年賜嵩陽書院額及印本九經咸平四年衡州守臣李允則奏岳麓書院修廣舎宇有書生六十餘人聽講乞下國子監降韓文等書從之祥符二年應天府新建書院詔以曺誠為助教并賜書院額此四書院之外又有茅山書院㑹要乾興初孫奭守兖州建學舍聚生徒請太學助教為講書乾興元年十一月判國子監孫奭言知兖州日於文宣王廟建立學舎以延生徒雖以俸錢贍之而不足伏見宻州馬耆山講書仍給田十頃以為學糧從之助教楊光輔充講書長編而餘鎮未置學也景祐中詔藩鎮皆立學矣㑹要景祐四年詔藩鎮始立學他州勿聽也而他州則勿聽寳元元年因蔡齊之請置潁州學大郡始立學矣寳元元年穎州守臣蔡齊請立學時大郡始有學自明道景祐間累詔州郡立學賜田給書學校相繼而興近制惟藩鎮立學穎為右郡齊以為言亦詔許之而小郡則未置至於慶厯之四年范仲淹言學校本行實宋祁言莫若使土著而教之學校則學者修飭於是詔諸路州軍各令立學學者二百人許置縣學於是州郡之不置學者鮮矣職源餘見後而教授之置亦於是乎始其初委之漕司於幕職州縣中舉之或用兼官或用士人皆漕司主之而未𨽻朝廷也熈寧中詔諸路學官並委中書門下選差至是始屬於朝廷矣㑹要慶厯三年又置教授以三年為一任以經術行義訓導諸生掌其課試之事而糾正不如規者委運司及長吏於幕職州縣官内薦教授或本處舉人舉有徳藝者充當時雖置教授或用兼官或用士人委於漕司而未𨽻朝廷也熈寕六年詔諸路學官並委中書門下選差至是教授始屬於朝廷矣元豐中州府學官共五十三員惟大郡有之餘未盡有也元祐初詔齊廬宿常等州各置自是列郡多置教官矣續㑹要元豐元年州府學官共五十三員諸路惟大郡有之軍監盖未盡有也元祐元年詔齊廬宿常等州各置教授一員自是以後列郡多有教官矣然自置教官之後選擇正人無日不申明之辦舉職事以副責任則政和之請也政和五年臣僚言見任教授不得為人撰書啓簡牘樂語庶得本舉職事以副責任師儒之意教官之職切宜遴選則紹興之命也紹興十三年朱宙奏乞盡復教官上曰若教官非人使人心術之壊再整頓費力切宜遴選也不撰樂語不兼他職其任專也紹興三十六年詔諸州教授並不許兼他職餘見上設科以試通經而任其選重也元豐五年立法試學官上等為􅀶士下等為正錄願授教授者充元符元年詔學者嵗一試紹興十五年詔試諸州教授自來春始又紹興十三年上語朱宙曰十二年已有指揮仍須擇通經正心術者任之祖宗之所以作成士類亦至矣而今之州郡之學學者之視郡庠猶視傳舍學官之視學者殆若浮萍佩焉悠悠口焉囂囂春秋有試更出迭入僅縻一時之廪犧而已吁何輕耶愚嘗咨之耆老曰盖舍法行而郡縣之學有實政舍法廢而郡縣之學皆文具何者今之郡縣有學即古者黨庠遂序之遺意古人謂今之育材成徳而異日之升於司徒升於學升於司馬者皆若而人也則教養之政安得而不嚴自後世郡縣之學所養所取判然兩塗毋怪乎其為文具矣鳴呼烏知舍法為一代之良制歟思昔舍法之行也士之𨽻於學月書季攷優登于籍於是貢之京師而入于天子之學凡有玷於罰者不預焉是以郡縣生徒更相淬厲以為今之所以教我養我者凡皆以成就我也而我固不可不重也而師儒之官亦以為上之人所以進用人材凡皆權輿於此也而教養之職我實任之時則訓誨教養與之相期於無過之地而人知謹飭亦皆相率聽命以求無忝於有司自舍法之既廢今之太學僅存其迹而郡縣之學已非前日且今太學之法猶舍法也每季有試非無益之試也而他日兩優釋褐自此始也名書于罰非罰金之比也而他日銓注有所沮格自此始也而又三嵗大比升於春官由太學而進者居多士之逰太學盖無一而非進身之階也今郡縣之學則不然登名於大比雖足迹不歴於學皆可以預計偕師友相聚泛泛焉不相知名而無有席間函丈之誨果能如范公夜課諸生皆立時刻乎晏丞相殊守南京范文正公仲淹方遭母憂晏公請掌府學范公常宿學中訓督學者皆有法度夜課諸生讀書寝食皆立時刻果能如安定雅樂歌詩乙夜乃散乎胡安定在學時合雅樂歌詩乙夜乃散聲徹乎外宜乎俊民良子弟皆褁糧千里為上庠之逰而青衿之子相與挑逹城闕之逰爾何者養士有學而進身無階其名存其實輕如之何而不為文具愚以是知舍法之為良法也或者乃曰是法也行之於蔡氏安得為良法崇寕三年罷科舉五年嵗貢法成三舍天下教養之士一十一萬餘員為屋九萬一十餘楹費錢三百四十萬餘緡米五十五萬餘石嗚呼此非蔡氏法也王宋諸公之遺制也在昔慶厯中宋祁王拱辰軰請士皆土著而教之以學校然後州縣察其履行而薦選之於是詔天下皆立學所謂舍法盖萌芽於此慶厯四年宋祁王拱辰張方平歐陽脩梅摯曽公亮王洙孫甫劉湜等奏曰參考衆說取其便扵今者莫若使士皆土著而教之以學校然後州縣察其履行則學者修飭矣故為設立學校遣使者以属部官為教授三年而代須在學事業三百日乃聽私試至於元祐王公巖叟乃謂科舉之外不當别開進取之名於是乞罷三舍之法開師弟不相見之禁元祐元年王巖叟奏庠序者所以萃羣才而樂育之不必科舉之外别開進取之名乞罷三舍法開先生弟子不相見之禁若夫科舉罷於熈寕之三年貢法成於崇寕之五年是取慶歴遺法而行之也特蔡氏不當以私意為去取焉耳於法乎何議借曰蔡氏立之其法茍善猶不可以人廢法况是法立於慶厯諸君子乎今誠能行王宋之議申慶厯之法則家家稷契人人臯夔又安有文具之說哉學官解經不窮戴侍中此漢人之法也為􅀶士之官者例如此後學開啓當何如戴慿習京氏易年十六召試􅀶士拜郎時慿對曰􅀶士說經皆不如臣帝即召上殿講說帝善之拜為侍中京師語曰觧經不窮戴侍中學行可師賀徳基此唐人之語也為祭酒之官例如此諸儒尊仰又何如唐賀徳仁與從兄徳基俱為國子祭酒時人語曰學行可師賀徳基文質彬彬賀徳仁夫學校教化之本師儒學校之責諸生蓍龜後來綿蕞其可輕也哉皮日休移成均􅀶士書曰足下出文圃為諸生之蓍龜作後來之綿蕞愚甞推其學官建置之由矣祭酒立於漢通典漢置􅀶士至東京凡十四人而聰明有威重者一人為祭酒謂之博士祭酒司業監丞立於隋隋大業三年於國子監初置司業一人監丞二人監簿正錄立於北齊通典北齊國子寺有正録員置主簿隋各一人至愽士之官西漢已有武帝初置五經博士而國子博士則始於晋也晋咸寕四年初置國子􅀶士一人皆取履行清淳通明典義者為之太學博士則始於梁也梁置太學愽士八人武學博士則始於我朝慶厯也慶厯三年置武學始以阮逸為之未㡬省國朝國子監有判其資淺者為同知即祭酒司業之任有直講八員即博士之任仁宗雖有武學博士未㡬省元豐官制既行國子監有祭酒司業丞簿太學有博士正録並為學官黄元禮官制此古今沿革之大略也然自古迄今其所以崇重風化選用師儒常如一日爾自古觀之刻石傳經儒林訂正戴逵為儒林祭酒刻石傳經華山有賦士林傳布楊㳟之為祭酒作華山賦示韓愈愈稱之士林傳布徳仁文質時人歌之賀徳仁為祭酒人歌曰文質彬彬賀徳仁盧誕儒宗天子稱之盧誕有名於時時天子以誕儒宗學府拜為祭酒昌黎入國子而生徒相賀李翶作韓公行状云公遷祭酒奏儒生為學官日使㑹講生徒多奔走聽聞皆喜曰國子監不寂寞矣楊汪講國學而通經莫屈隋楊汪為祭酒帝令百僚就學與汪講論通經碩學多舉焉論難莫屈此祭酒之有人也進退作則動言是傚陽城有之楊宗元為司業陽城遺愛碣曰帝來師儒式我成均進退作則動言是傚嚴以得禮扶善遏過竇公有之韓愈為司業竇公墓誌云云手書九經張參為國子司業年老常手寫九經曰讀書不如寫書口誦鹿鳴山揮景祐中為國子司業誦鹿鳴蟋蟀篇未畢中書令李蟜以近規諷止之帝嘉其直下詔褒之非通經歟燕堂鼓琴退之聽琴序云司業武公少儀摠學者三十有六人列飲燕祭酒堂有一書生抱琴歌有虞之遺風闕下唱義陽城言不許延齡相下遷司業城言事得罪為道州刺史太學生何蕃頓首闕下請留非感徳歟此司業之有人也廣文先生才過屈宋杜甫贈廣文館􅀶士鄭䖍詩先生有道出羲皇先生有才過屈宋國子先生上規姚姒韓愈為國子愽士作進學觧曰國子先生云云上規姚姒渾渾無涯論易折角朱雲為博士講易人歌曰五鹿岳岳朱雲折其角講經重席戴馮講書帝令羣臣說經不通者奪其席以益通者慿遂重坐五十席何淹貫也覽筆即下房昭逺考定國子生通經者覧筆即下初無疑滯看書不寐王元威轉四門博士時年老猶燭下看書通宵不寐何敏勤也此非愽士之有人乎我朝以來尤加崇重圓冠方袂肩摩踵接而學校師儒之任皆世偉望人才作成流為數年不窮之用者皆學官之力也傅澥自學正至祭酒官以儒名者且三十餘年其任之也専四朝國史注傅澥自布衣錄天子學至為正為司業祭酒迄于司成官以儒名者三十年時人推之鄭穆以待制兼祭酒一旦請老而諸生願留者至三千餘人其慕之也深四朝國史鄭穆傳元祐中以寳文閣待制常兼祭酒每諸生請益無問寒暑雖童子必朝服延接以禮送迎皆専其經術而服其教訓六年請老提舉洞霄宫敕過門下給事中范祖禹言穆雖年出七十精力尚强古者大夫七十而致仕有不得謝賜之几杖祭酒居師資之地正宜處老成願毋輕聽其去不聽報太學之士數千人以状論司業又詣宰相請留程顥學問淵源洛中師表而召判武學何其幸也名臣事實陳瑩中學術醇正元祐名臣而擢為博士又何其慰學者之望也同上名儒宿德項背相望未易枚數當代仰之後人思之尚想乎螟蛉之誨噫盛哉然嘗論之學者固諸人之望祭酒又為學官之唱且匪曰蘭芷疇變入室不自朱藍何遷素絲非王儉辭祭酒之表乎齊王融為王儉辭祭酒表云云寳劒未砥猶全切玉美箭闕羽尚無衝石非王延明辭祭酒之表乎魏温子升為安豐王延明辭祭酒表曰寳劍未砥猶全切玉之功美箭闕羽尚無衝石之勢盖祭酒之職非他官比志行必粹道義必尊庶無慊於教成之任二子所以力辭而不敢者亦自知分爾茍國師有人則下是典教有不難舉吕公著一為祭酒命駕親謁程頥請為學正而學者皆知性理之學名臣事實吕公著𫝊王陶方任祭酒亦遣愽士詣孟醇擢為學士而諸生始知有聘士之禮同上此又挈裘提領之論矣雖然兹皆漢唐以來學官之任而考之成周則未聞焉且周典六官治官掌治禮官掌禮曰刑曰兵曰事考其官屬亦各稱其職掌之當然獨至於地官謂之教典而其設官殊不可曉盖自鄉老至比長皆六鄉之官自封人至充人皆疆埸之師自載師至均人皆財賦之官其他不過整齊田學推考征歛而所謂教官者師氏保氏司諫數人而已而非専掌乎學校者也及詳考而熟觀之如司樂則掌成均之法樂師則掌國學之政然周人徃徃以學校之職而屬於典樂之官果何意哉並周禮本官盖樂者所以調和其血氣涵養其心術優游漸漬鼓舞動盪其入人也深此先王作成人材之深㫖是故舜之胄子教於后夔書命夔典樂教胄子啇之學政屬於瞽宗殷制太學為瞽宗皆此意也漢人去古未逺猶知博士弟子受業太常漢以愽士弟子員受業太常太常屬官有大司業使知禮樂之本自東都以後學校自學校太常自太常而此意失矣至我朝安定胡先生之判國子監也教育有法深有古意雅樂歌詩乙夜乃散至奏鼓琴瑟之聲洋洋乎外伊川所謂凡從安定先生學者其醇厚和易之氣望之可知豈非平日動盪涵養之效歟異時淵篤純明直温簡諒色色有之吕氏家塾記曰安定為賦講䇿判舉事每公私試罷掌儀率諸學子弟㑹于首善堂合雅樂歌詩乙夜乃散諸齋歌詩奏琴瑟之聲徹于外聞見録曰伊川曰凡從安定先生學者其醇厚和易之氣望之可知也李廌書言劉彛對神宗曰安定明體用之學上曰其門人今在朝為誰對曰若錢藻之淵篤孫覺之純明范純仁之直溫錢公輔之簡諒歐公詩曰呉興先生富道徳詵詵弟子皆賢才荆公詩曰先收先生作梁棟以次收拾桷與榱愚請頌此為今日師儒勉吕氏家塾記科舉進士之選其自隋始乎曰非隋也周也王制謂大樂正論造士之秀以告于王而升之司馬曰進士此其始也特設科較藝始於隋爾噫進士之選在古者何其重在後世何其輕耶周人賢書之貢必加拜受拜云者想其恭敬而不敢慢也三物之教必曰賔興賔云者想其禮待而不敢忽也此周人之貴有由矣由漢以來固不能如拜受賔興之禮然猶州長身勸為之駕雖以當時號為謟䛕公孫𢎞者猶出於鄊人之勸勉未嘗有自進之風公孫𢎞傳至唐楊綰投牒自進而士始甚輕唐選舉志盖古者上有求於下其後也上下交相求又其後也下始急於求上此古今輕重之别也然自漢設科以後科目紛紛不知其㡬大抵自漢至隋以前惟行孝亷秀才之科自隋唐至本朝惟行進士明經之科至熈寧後王荆公以經義試進士於是明經始廢而進士獨行耳此其大略也進士之科唐與我朝行之然在唐為輕在我朝為重何以知之三十老明經五十少進士此唐人之謡也以此知進士為劣而明經為優矣唐摭言進士盛於唐貞觀永徽之際不由此選終不為美其艱難則曰三十老明經五十少進士焚香禮進士撤幕待經生此國朝之詩也以此知經生為輕而進士為貴矣編年仁宗謹於選士皇祐五年廷試焚香祝之曰願得忠孝状元及唱名乃鄭澥也又華談禮部進士設香案與舉人對拜坐設供帳甚盛冇司具茶湯飲漿至試學究則撒幕亦無茶湯盖防私傳經義歐公有詩曰焚香禮進士撤慕待經生故唐之進士得第者百一二明經者十二三通典武徳以來明經惟有丁第進士惟乙科而已其進士千人得第者百一二明經者倍之得第者十二三本朝之乾德進士二十六人如五經開元三禮三傳學究合九十三人其額至寛也而得人之盛反不若進士長編太祖朝盖待之既厚則卓犖非常之士皆願為進士得之既易則庸庸記誦者丼為明經耳此前軰稱國朝進士為將相科其有由矣王唐曰進士一科乃将相科是固然也盍亦推原進士一科興置之制可乎春官之試始未有也自元宗以考功望輕移試禮部於是有定所焉元宗開元二十四年員外郎李昻為貢人詆訶帝以員外郎望輕遂貢舉於禮部以侍郎主之禮部試士自此始殿前之試始未有也自武后以對䇿為緩親試殿前於是為常制焉武后元年䇿問貢士於洛陽殿數唱方了遂引試殿前殿前試自此始設衛棘圍始未有也自唐楊浚始開三行試於是為故事焉唐選舉志元宗天寳十一載禮部侍郎楊浚始開為三行試又曰試兵衛薦棘圍之進士大抵千人得第者百一明經倍之進士試以詩賦䇿論自唐始也我朝因之至熈寧復加經義之制見詩賦經義門臨軒試以詩賦亦自唐始也我朝興國加試以論至熈寧始定策試之制同上糊名之制行於淳化淳化二年先是胡旦等以所試先成擢上第由是士爭習浮華尚敏速陳靖請糊名考校以革其弊於是始令糊名而諸州之糊名則自明道始明道二年詔諸州試舉並封彌卷首易書之制立於祥符祥符八年置謄録院令封彌官封印試卷付之積書吏録本命京官校正而諸州之易書則自景祐始景祐四年詔開封及國子監及别頭試封彌謄録如禮部從韓琦之請也傳義有禁昉於雍熈雍熈二年詔曰今有以文字往復與吏為奸者寘之于法以經義相教者斥出科塲匿服有禁昉於天禧天禧三年舉人郭稹冐緦麻䘮殿三舉同保殿一舉有司欲脫王洙問洙曰果保稹否不然可易也洙曰保之不願易也乃與稹俱罷慶厯則有冐貢之禁慶厯四年所禁有七曰隱憂匿服曰假户冐名祥符則有挾書之禁祥符五年上謂宰相曰聞貢院舉人觧衣閱視慮挾藏書冊有失士體宜令止之是嵗諸科以挾書扶出十八人封印卷首因温仲舒之言而行真宗咸平二年命禮部尚書温仲舒知貢舉董龜正黄渉同考試及封印卷首仍當日入院禮部貢院封印卷首自此始嚴禁秉燭因戚綸之言而行寳訓真宗因戚綸之言而嚴秉燭之禁用周起之言而謹糊名之法舊未有避親别頭也而祥符張士遜請行之時是監察御史張士遜為貢院監門官時貢舉初用糊名之法士遜曰主司有親戚在進士中明日當引試願出以避嫌主司不聽士遜乃自言引去上是之記名於御屏遂詔自今舉人與試官有親嫌者皆移試别頭舊未有隨侍别頭也而景祐賈昌朝請行之景祐四年二月先是崇政殿說書賈昌朝言舉人有合避親及隨侍逺地宜令運司類試而學士丁度謂舊制五月起請差遣甲寅乃詔用三月一日於是諸路始冇别頭試廷試取士或取之多咸平三年舉人集都下者萬四千五百六十二命吏部知貢舉恕所取士甚多以王曽為首及是糊名考校曽復得甲科時議稱之或取之少祥符八年上御殿覆試多所黜落疑所抺者未當命宰相閱之上曰考官固為艱難公在其中矣而與廷試者不黜則始自嘉祐之二年嘉祐二年進士張衡等及第是嵗進士與殿試者始皆不落記聞云是春以進士辱歐陽之故殿試及第皆不落一人舉士嵗數或一嵗一舉建隆以來皆一嵗一舉禮或間嵗一舉或四嵗一舉或累嵗不舉嘉祐二年上封者言四年一貢舉四方士子待試者六七千人往往廢舉遂至困窮宜間嵗一舉詔自今間嵗貢舉天聖二年上謂王欽若曰乆罷貢舉慮遺天下賢士宜令禮部精加校試而三嵗一舉則始自治平之四年治平四年進士二百五十八分四等自此三嵗一舉士自梁顥等唱名於是有唱名及第之典雍熙二年御試得梁顥等並唱名及第唱名自此始自王世則等錫宴於是有錫宴瓊林之禮長編興國八年上御講武殿覆試禮部貢舉人擢進士長沙王世則而下錫宴瓊林苑其後遂為定制噫國朝之所以待進士者何其嚴而重耶夫待之既嚴禮之既重則薦於鄉試於有司䇿於天子之廷者其忍負之哉自今觀之懐州觧發素已銓次天聖明道中有進士十人游謝希深歐陽永叔之門王復王尚恭為稱首時科舉法寛秋試府園醮㕔希深監試永叔聖俞為試官王復欲往請懐州觧永叔曰王尚恭作觧元矣王復不行則曰觧元非王復不可盖諸生文賦平日已次第之矣其公如此大名舉子自相推先太平興國四年張詠與寇凖同赴大名舉議将首薦詠詠以同郡張覃素有文行即率冦公請以覃為冠則薦於鄉者皆平時推譽於州里也李廸有聲禮部不黜景徳二年廸與賈邉皆有名塲屋禮部奏名皆不與取其文觀之廸落韻邉論當仁不遜於師以師為衆特令就御試王旦議落韻失於不詳審捨注疏者不可取遂取廸王曽首薦復冠春官王曽鄉薦春官廷試皆第一時陳恕典貢舉擢為首則試於有司者亦皆素知名於場屋也夫外郡既考履行有司復考文藝若無愧矣而猶嚴於臨軒之選此與周人升於鄉升於司徒司馬者同一意也是故齊賢受知先朝擢自下第太祖幸西都張齊賢献十䇿還語太宗曰我幸西京惟得張齊賢耳不欲官之汝異時收以自輔也興國二年齊賢舉進士有司第其名在數十人後上不悦一榜盡與通判齊賢不十年至相蔡齊偉有儀状擢居首選祥符八年蔡齊儀状偉秀舉止端重上意屬之擢第一韓琦唱名太史奏瑞天聖五年仁宗初臨軒試進士韓琦名在第二時唱名第一甲太史奏日下五色雲見從官皆賀楊寘賜第公卿皆賀慶厯二年賜楊寘等及第寘初試國子監禮部皆第一及是帝見姓名喜曰楊寘也公卿賀得人不特此耳状元及第不在温飽王沂公状元及第或曰状元一生喫著不盡公曰曽平生不在温飽禮部第一不肯自陳寳元元年范鎮禮部奏名第一故事省試第一人未有第二甲者雖近下而升之吴育歐陽公唱二人亦抗聲自陳鎮乃黙然至七十九人乃出升衆賢之禮部第一人在第二甲自鎮始此其著節立身又有出於科舉之外盖祖宗不専取以文墨而試賢亦惟以行藝所以正人相望出為明時用也然愚又嘗論之科舉之禁不可以不嚴亦不可以過嚴不嚴則無以杜僥倖之心過嚴則復以隔天下之士且糊名易書似也然東坡反遺李廌李廌以文見知東坡東坡元祐三年知貢舉意得廌以冠多士及考章程文大喜以為魁既拆號廌不得第乃作詩曰與君相從非一日筆勢翩翩疑可識平生謾説古戰塲過眼終迷日五色歐公誤取劉輝筆談嘉祐中士人劉㡬驟為險怪之辭歐陽惡之㑹公主文有一舉人論曰天地軋萬物茁聖人發公曰此必劉㡬也榜之既而果㡬也後數年公為御試考官而㡬在廷公曰除惡務本有一論曰主上收精藏明於冕旒之下公曰吾得劉㡬矣既黜乃蕭稷也時堯舜性仁賦曰静可延年獨髙五帝之壽動而有勇形為四㓙之誅公大稱賞及唱名乃劉輝人曰此劉㡬易名公愕然糊名易書之法果可用乎冐貫匿服有禁似也然余公靖易名他州以取觧余靖韶州人本名希古犯臀罪易名靖取他州觧王公洙願保匿服而不易見上匿服之禁注冐貫匿服之法果可繩乎此王文正公所以舉科場條貫投地而不取也陳彭年為翰林學士詣王文正公旦呈科場條貫公投之於地曰内翰做官㡬日待隔截天下士陳懼而退考校古者以徳行考士而士心正後世以文藝考士而士習壊世儒皆有是言矣嗟夫舉孝亷者濁如泥舉隱逸者索髙價徳行果可得士乎愚嘗推原其故盖古今人才一也成周人才出於學戰國人才出於客漢之人才出於吏唐之人才出於科舉時用里選則人才由里選而出時用科舉則人才由科舉而至以後世科目之後而欲用成周里選之法是猶結繩於書契鄉飲於軍市君子謂之不知務噫何代不生才何才不資世特恐考者非賢賢者不考耳且進士之科莫盛於唐而考士之法亦莫病於唐夫以張九齡之峭直剛方吸嘘雲雨顔平原之忠肝義膽對越神明陸宣公之論諫仁義裴晉公之明哲保身並本傳此進士誠莫盛於唐也然昌黎名儒三至禮部何蕃義士終身不第此猶可也齊皥以貴而不得舉韓愈送齊皥序云王參元以富而不得舉栁子厚與王參元書云是畏嫌而自私也錢徽典舉而私擢李宗閔之親李宗閔傳初錢徽典貢舉宗閔託所親於徽李德裕疏之達奚珣典舉而陰取楊國忠之子楊國忠以其子暄舉明經不中怒典舉者達奚珣珣聞之大驚遂寘之髙第俄與珣同列是徇情而自私也此考士之法莫病於唐也夫選之不精擇之不審往往歸咎於文藝是罪嵗爾國朝考士之法何如哉宋白典春官而蘇王中選宋白三掌貢舉所取蘇易簡王禹偁輩皆知名而黜罷者衆因致謗議程羽掌貢舉而張冦聨名張詠嘗謂人曰吾榜中得人最多謹重有雅望如李文靖深沈有德如王公面折廷爭如冦公當方面則詠不敢辭是歲興國五年程羽知貢舉至使人才流為數世之用誰之力與方平司文賦尚典要哲宗時臣僚言往時舉人路授倡為長賦幾千言但為浮辭不求典要得方平擯而正之歐公持衡文變渾雅同上嘉祐劉幾喜為怪僻句後歐陽革去其風復雅至使文章以通經學古為髙者又誰之功歟大抵人物之消長文章之髙下皆任文衡者之責可輕乎哉不然王介甫以私學取天下士至有以雅為鴉之弊惠卿以己意取䇿問而當時皆訕前朝阿當世見詩賦論䇿門注文章人物為之一變向非元祐諸公出而正之則黄茅白葦之習殆何如耶東坡謂王介甫欲以天下為黄茅白葦然嘗論之考校之術不可過於任法亦不可過於任情任法矯也任情私也過眼終迷日五色非主司自嘆之詩乎東坡遺李廌詩見科舉門注落却親情賣至公非主司被嘲之詩乎陳彭年有親戚為所黜遂批其詩曰取他權勢要明主落却親情賣至公此任法之弊也主司冬烘錯認顔標有主司取卷以顔標為顔魯公之後取之後非是遂為舉子賦詩曰主司頭腦太冬烘錯認顔標作魯公典舉徇情私擢濟川開寳五年扈䝉知貢舉奏進士安守亮等上以進士武濟川材質最陋絀去濟川乃學士李昉鄉人昉知貢舉上不恱㑹徐士兼訴昉遂覆試此任情之弊也曰法無寛嚴精考得矣情無公私得人足矣若李廸落韻本有聲也雖黜廸而取廸景徳二年鄉試得李廸以下先是廸與賈邉皆有名場屋禮部奏名皆不與取其文觀之廸賦落韻邉論當仁不遜於師以師為衆時令就御試王旦議落韻者失於不詳審捨注䟽而立異論不可取遂取廸而黜邉當時朝論大率如此如是而廢法何惡乎王復能賦素知名也遂私復而取復王復王尚恭遊謝希深歐陽永叔之門時科舉法寛秋試府園醮㕔希深監試永叔聖俞為試官王復欲請懐州觧永叔曰王尚恭作觧元矣王復不行則又曰觧元非王復不可盖諸生文賦平日已次第之矣其公如此如是而狥情可厭乎噫是故然爾業患不能精無患有司之不明行患不能成無患有司之不公為進士者又當自勉也或曰彩霓之韻未誤而黜范景文用彩霓字主文不知作平聲盖不審沈約之論而黜人勸景文辨之景文不肯刑賞之論見疑而降東坡作刑賞忠厚之至論歐陽得之甚喜欲寘第一疑門生曽南豐遂降第二此非行業之不精君子則曰寧求諸已不求諸人也或又曰火山軍之名得之夢寐主司或夢火山軍得名後歐公所取卷乃劉輝也王俊民之謡已播城市王荆公與一主文相角識一卷正未相允間有一主文曰前城市間已說王俊民作状元矣拆號果王俊民此又物理之素定君子則曰寕求諸我不求諸天也不然尚崑體以逐時好天聖以來穆修尹洙歐陽唱為古文變西崑體學者從之其有習劉體者人戯之曰莫太崑否時學者皆尚崑體阿新法以取髙第見經義詞賦門注不惟有司恥之愚亦恥之雖然國家以文藝取士固也亦不専以文藝也宋祁甲科兄郊次之以文而取也然進郊而退祁盖弟不可先兄天聖二年宋郊與其弟祁俱以辭賦得名禮部奏祁名第一太后不欲弟先兄乃推郊第一而寘祁第二沈文通第一馮京次之以文而校也然升馮京而降文通盖貴胄不可先寒畯皇祐初有官沈文通中第一仁宗曰朕不欲以貴胄先天下寒畯遂以馮京為第一文通第二上之人未嘗定以文藝也大名鄉薦欲首選張公詠也公辭之而推張覃太平興國四年張詠與寇凖同赴大名舉議将首薦詠詠以同郡張覃素有文行即率凖請以覃為冠萊州觧發欲首薦蔡公齊也公辭之而推史防蔡齊萊州人州舉進士第一以書薦其里人史防而已居其次下之人亦未嘗校以文藝也夫以文墨考士而不以文墨拘以科目進身而不為科目累藹然有成周徳行道藝之風噫盛哉唐人進士何足語此古今源流至論續集卷十
