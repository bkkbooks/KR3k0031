body:
  text: 古今源流至論前集卷三宋林駉撰策試窮居憂天下之事布衣言當世之政此正試士以策之意也古人敷納以言之意逺矣其所以謀及庶人咨爾有衆者惟設科之策耳然策所以陳時務也問以時政之得失咨以生民之利病欲其有禆國議也名之以敢言稱之以極諫欲其無有隠情也士而無志於世則已茍有志焉則條對洋洋皆正大剛直之言持論鯁鯁盡激厲奮發之氣孰肯以得失計較恐其見黜不肯極言時政以貽先輩之議哉劉器之云殿試用詩賦策問固無優劣人但見䇿中侃侃似乎有用不知祖宗立法自有深意且士人得失計較為重豈欲極言時政闕失自取黜落是士人初入仕上之人已教之謟也或有沽激慷慨之士未必有益僧孺宗閔對䇿極詆時政遂成牛李黨且漢之以策對者始於晁錯漢文帝初年求賢良晁錯對䇿第一自錯而下如董如宏如欽永皆以䇿舉也並本傳唐以䇿著者始於裴垍自垍而下如牛如元白如劉蕡皆以䇿顯也其間筆勢翩翩言論灑灑鏗鏘於漢唐之間亦皆足取也然君子求其有關於天下之大計有禆國家之大議期無愧於切時之論則仲舒劉蕡上策也而宏欽永裴元白之流特下䇿耳方武帝即位之初其時務莫切於正始也今觀三篇之對議論淵源理義醖藉勉強行道之論正心正官之論其有禆帝之初政也不少彼公孫欽永何為哉且武帝中年元成末代之際其䇿賢良之意正為災異權臣而發也宏則誣水旱以獻䛕其與仲舒天心仁愛之意為孰切欽則援申伯以附鳯其視仲舒正朝廷之意為孰優永則托後宮以市直其與仲舒論初政之意為孰明並本傳嗚呼捨心腹之疾而論皮膚之患君子謂之不知務方文宗即位之初其時務亦莫切於謹始也今觀方正一篇勁氣直節凜凜逼人力攻藩鎮之強痛斥閹寺之橫其有益於唐之初政也不誣彼僧孺元白何為哉且憲宗元和之時其䇿制科之意正為強藩強閹而發也僧孺之言法令詔令其與蕡之攻藩臣者為如何稹之論通經設科其與蕡之排閹寺者為如何白之條正觀開元禮樂其與蕡之談謹始者又如何並本傳嗚呼棄豺狼而問狐狸君子尤謂之不知務嗟夫士君子之平居暇日擊節伊周高談孔孟議論動人灑然可聽去取念重卷舌自黙此所謂修於家而壊於天子之庭也尚安有所學哉國朝之策試有二曰制科曰進士國初以詩賦取士盖循唐制之舊所謂策試者特施之制科耳太平興國三年上御講武殿試禮部合格人加論一首自是以一題為凖又國朝制科廷試策一道熈寧三年以策取士盖因呂公著之請所謂制科者已罷策試耳熈寧三年先是呂公著密奏言天子臨軒䇿士而用詩賦非舉賢求治意己亥上御集英時進士初就席有司權給禮部韻及題出乃策也上曰對策亦可以盡人才愈於用詩賦遂賜陸佃葉祖洽以下及第時蘇軾為考官以舉子希合爭言祖宗法制乃擬答以對韓維呂惠卿初考阿附者皆在高等言直者在下等葉祖洽言祖宗多因循茍且之政陛下革而新之陸佃初第五以和新法升第二范鉞直詆時政皆在下至於熙寧四年安石請更貢舉條制於是除聲律專意經義罷明經及諸科立新制殿試第一道限一千字以上分五等其又七年詔進士卷罷詞賦所試與制舉無異賢良方正等科乞並停罷從之此其沿革之由也然觀其名公碩望輩出科目議論表表洋乎董劉之對盖非欽永元白望其下風張方平平戎十䇿傑然於賢良之科張方平以茂才異等權校書郎又以賢良方正中選試平戎十䇿吕夷簡曰六科得人矣又召對賜五品服蘇子由直言君相拔出於方正之對嘉祐六年試賢良方正軾第三等轍第四等轍語切直司馬光考入第三等范鎮難之欲降其等蔡襄曰吾愧之而不敢怨惟胡宿請黜之上曰求直言以直言去之天下其謂我何乃收入第四等知制誥王安石疑轍右宰相專攻人主比之谷永不肯為辭韓琦曰彼䇿謂宰相不足用欲得婁師徳郝處俊而用之尚以谷永疑之乎此制科之得人也范鉞當熙寧之初直詆時政而不恤大臣之怒見上張九成當紹興之時公言百執而不憚天子之嫌紹興二年御試上曰試舉人以鯁直為上諛佞者降之遂賜張九成以下及第上曰九成策上自朕躬下及百執言之無所避擢為首選其誰曰不然此進士之得人也上以直言求之下以直言應之雖古君臣規戒之意亦不過是也雖然司馬君實之司文衡則東坡之䇿以直對見上吕惠卿之任考校毋怪葉祖洽之不奉新法也見上此先輩所謂對者之是非在考官之去取誠至論歟元祐中呂公著曰天子臨軒發䇿豈非近古良法耶至於對者之是非邪正則在考官去取耳書法昔東坡嘗言詩至杜子美書至顔魯公及題唐書後又曰顔魯公書雄秀獨出如杜子美詩格力天縱夫坡公之稱顔書而必及杜詩者果何見哉盖顔之筆態有天縱自然之妙即杜詩之自為一家也顔之精神形於以死赴國之時即杜公之憂國愛君也噫不得於心而泥於古人之陳迹不適於用而工於紙上之妙墨安足與語古今之書哉東坡嘗曰詩至於杜子美畫至於呉道子書至於顔魯公且虞世南之所稱五絶而書翰居其一世南之書固可喜也而所學者禪氏之遺耳唐書虞世南傳薛稷之書雖稱筆態遒麗時人無及然拘拘於世南遂良之舊蹟唐書薛稷傳歐陽尺牘所傳人以為法書亦可貴也而所倣者羲之之書至其子通雖曰不擇紙筆皆得如意然又切切於其父之遺法同上依傍繩墨摹放規矩得則得矣而無胷中之活法君子固得以議之若乃唐之栁公權其有聲於一時者人固推重觀其與君論筆法之妙不求於筆而求於心盖有得於虛精靜思之間則栁之書雖未工而亦工盖以其自得於心也穆宗問栁公權筆法對曰心正則筆正筆正乃可法矣穆宗知其以筆諫也且霧捲霞收狀若踈而復密鍾繇鳯翥龍蟠勢如斜而反直王逸少病其疲則有若隆冬之折木患其拘則有若嚴家之餓𨽻此筆法之雄健也王獻之字勢踈疲如隆冬之折木雖枯朽而無屈伸筆蹤拘束若嚴家之餓𨽻雖覊贏而不放縱行行若縈春蚓字字如綰秋蛇此筆體之和緩也蕭子雲釵頭屈玉鼎足垂金何雅麗也李斯行間玉潤字裏金生何俊拔也禇遂良有風流閒媚號伯喈中興者韓擇木有八分精妙法衛家傳者蔡有隣奥通墨妙曲盡筆精善則善矣而區區於無用之工巧君子固得以議之若乃漢之蔡中郎其筆法傳於當時者不知其幾觀其西京太學之石經開晤後學訂正聖經使無魚魯之失則蔡之書雖未工而猶工何者以其有濟於用也蔡邕書六經刻之石立於太學天下學者爭觀之吾觀司馬温公𨽻書家人中庸二篇皆修身齊家之道至起高宗嘉嘆之㫖此温公之書有禆於君也如此豈但公權之意哉繫年録紹興六年上曰司馬光𨽻書甚似漢人所書家人及中庸皆脩身齊家之道不特玩其字而已蘇文忠所書無非正論亦起高宗稱賞之音此蘇公之書有關於世也如此豈特蔡中郎石經之字哉聖政建炎四年張守奏昨聞聖訓蘇軾書無非正論言皆有益不獨取其字畫之工而已行將鐫石鼓之文勒燕然之碑請執筆以徃方言揚子雲作方言識者怍之揚雄作方言劉子元欲作方言志而未果當世以為恨史通乆矣哉四方言語之不可不知也雖然不易知也撑犂孤塗陸機猶莫之知况下於機者乎漢書撑犂孤塗單于撑犂天也孤塗子也單于言大天子也陸機讀史不識撑犂二字何哉魏冒踰糟使無田恭則朱輔其何録東漢作都夷傳朱輔上疏王唐散等慕化歸義作詩三章述夷之語辭意難正有田恭與之習狎頗曉其言逺夷樂德歌詩曰提宮隗里魏冒踰糟提宮隗里言大漢是治也魏冒踰糟言與天合意也云云愚嘗採方言之所以異矣夫陳湯傳既曰母鼓西域傳又曰母寡是一字而二音也母鼔出陳湯傳母寡出前西域傳班史既曰龜兹而為邱慈范史又曰龜兹而為屈沮是一字而三音也龜兹二字西漢音邱慈東漢音屈沮此猶可曰是夷習之未定也然楚自克庸其文物有可觀者而曰馮曰羌何陋也楚詞憑不厭乎求索羌内恕以及人皆楚人語也蜀自文翁之化其儒學盖彬彬然而以一為蜀何訛也揚子方言曰一蜀也郭璞注蜀與獨同此猶可曰是舊染之未洗也若夫南方都之音豬宋人來之音離此中國衣冠之所萃禮樂之自出而乃如是耶禮記汙其宮而豬焉注南方以都為豬又宋人歌曰于思于思弃甲復來音離鼎又匡衡傳毋説詩匡來亦音離居之為姬但之為地在魯有焉檀弓何居注音姬齊魯之間語助丙吉魯人吉曰西曹地忍之注地但也邾曰邾婁得來曰登來在齊有焉公羊齊人稱邾皆曰邾婁得又禮記亦謂邾婁又公羊云登來音來此齊人語也此文學之天性聖賢之舊居而亦如是耶至吾聖人亦有以而為如者吾孟子有所謂施云者抑聖賢不能自拔於流俗歟春秋莊七年星隕如雨注如雨如而也星隕而雨也語亦云宗廟之事如㑹同方六七十如五六十皆訓而字又孟子云孟施舍注孟姓也舍名也施發音也盖五方殊性從古固然水土異宜習俗難變如呉楚輕淺燕趙重濁秦隴則去聲多入梁益則平聲似去江東取類與河北復殊莊嶽齊音雖衆楚莫之變焉可以是律之天下哉是故中土且莫之一况外俗乎聖人且不能免况他人乎且陳勝傳謂多為夥楚元王傳謂空為丘陳勝傳以多為夥又楚元王傳謂空為丘王式傳謂丘為區是以意而釋也儒林王式傳以丘為區子又荀以案為語辭見於蘭陵三十二篇荀子多有案字為語辭也以頤為楚語之助見於史記陳渉世家史記陳渉世家以頤為語助以那為去聲而亦為語助見於韓伯林傳是以字而助也漢書韓伯林傳云汝是韓伯林那注語助不特此耳指襟紐為衣舡杜詩有之天子呼來不上舡之證也杜甫八仙歌指簟為桃笙栁詩有之蒲扇桃笙安可帶之證也栁文詩類他如稱浦為歩韓碑言之韓文碑有歩有新舡盖指歩為浦安移於齊戰國䇿有之戰國䇿云安移也齊安移於梁一憐字而為愛為哀揚子雲方言撫者憐愛也又云撫矜憐者憐哀也一惄字而為憂為思子雲方言有之是又隨俗變通與時稱謂其不一也如此方言云濟聽惄慈栢憂也又鬰悠惄惟慮頥念靖慎乃思也嗚呼達書名於四方通言語於重譯此亦士君子之責無蹈陸機朱輔之失鄉評甚哉鄉黨公論所自出也盖人之行義能掩於人之所不知而不能迯乎衆議能修於其家而不能隱乎有司昔者周之鄉里選舉也閭胥既書其孝悌族師又書其任恤黨正又書其道蓺而所書者非一人月吉既攷之族師歳終又攷之閭胥三年大比又攷之鄉大夫而所攷非一日並周禮則由鄉而之學由學而之司馬無非平日所素稱之賢然所以至是者有教化之官以訓之有學校之地以養之此選舉所以為良法歟周轍不西上無善教一變而為諸侯之客再變而為州縣之吏漢興以來此意猶古鄉置三老而人猶知教化也漢百官表上三老秦置掌教化又漢高紀漢元年置鄉三老時董公以三老能遮説科立孝㢘而人尚知德行也惠帝即位立孝亷力田之科其人果賢耶則公議終不揜其善其人果不賢耶則終身不齒鄉閭之論故武帝求賢良國人共推公孫宏以充賦公孫宏傳萬石君以孝謹聞郡國特以其子為郎中令本傳一推兒寛則曰知之乆矣本傳一言蕭望之則曰此東海蕭生耶本傳一薦龔勝則曰固已聞其名本傳是其人之賢有不可揜也如此至酈生家貧落魄縣中謂之狂生韓信家貧無行不得推擇為吏陳湯無節不得與諸儒州里之論並本傳其人之不肖亦豈欺人之不知哉推原其由意漢初置三老設孝亷有教化作成之功歟自後或采於閥閲或取於科舉而鄉里之公是非泯矣國朝雖無閭胥族師之官而選舉猶有周人忠厚之意雖無黨庠遂序之名而學校猶有周人教養之實昔范仲淹嘗謂省試封彌解試不封彌良以解發考其行履南省考其蓺業則選舉之意猶周也范仲淹言外出發解本鄉舉里選之意又先考其履行然後取以蓺業今乃不求履行惟以詞藻問之加用封彌不見名字大非里選之本意也臣請定外郡解發湏是履行無惡蓺業及等者方得解薦不封彌試卷南省考試之人已經本鄉詢考履行湏却封彌試卷精考蓺業定奪高下宋祁王拱辰嘗謂士皆土著而教之以學校然後州縣察其履行而薦選之於是詔天下皆立學則教養之意猶周也慶歴四年宋祁王拱辰張方平歐陽修梅摯曾公亮王洙孫甫等皆曰參考衆説取其便於今者莫若使士皆土著而教之以學校然後州縣察其履行則學者修飭矣故為設立學舍保任薦送之法於是分州縣皆立學本道使者以属部官為教授三年而代士湏在學習業三百日乃聽秋試故栁仲塗之有聲於場屋先獻文軸遂居首選是以終身之學業决有司之選舉也長編天聖三年詔自今不試所業古制先於所薦選試下考試所業方聴取解故栁仲塗以文軸投主司張景惟䄂一書簾前取之王復之素聞於西京有司稱賞預先解發是以平時之銓次為此日之定論也天聖明道中錢文僖公留守西都謝希深為通判歐陽永叔為推官尹師魯為掌書記梅聖俞為主簿有知名進士十人遊希深永叔之門王復王尚恭為稱首時科舉法寛秋試府中師魯希深監試永叔聖俞為試官王復欲往請作州解永叔曰王尚恭作解元矣王復不行則又曰解元非王復不可盖諸生文賦平時已次第之矣其公如此張公詠之試大名也將以張公首薦而公推張覃為第一太平興國四年張詠與冦凖同舉大名府議將首薦詠詠以同郡張覃素有文行即與㓂公請以覃為冠士論多之蔡公齊之䇿萊州也將以蔡公首薦而公推史防為第一蔡齊萊州人州舉進士第一以書薦其里人史防而已居其後嗚呼令聞令望不惟衆論多之而有司亦採之不惟有司採之而同列亦推之此其公道在天下公論在人心何其昭昭如是耶我思古人實獲我心吾於國朝三嘆三詠云慶厯人材衆賢之進如茅斯㧞此徂徠之頌也石介作聖德詩曰於維慶厯一年三月云云維明道初天地嘉吉云云衆賢之進如茅斯抜大奸之去如距斯脫新除諌官朝野相歡此蔡襄之詩也慶厯初除歐公王素余靖為諫官蔡襄有詩御筆新除三諫官紛然朝野盡相歡上聞之亦除蔡襄為諫官嗟夫於維慶厯君子道泰天降時雨山川出雲深矣哉仁宗善養之仁也盖自五閏彫陋人物骫髀草茅岩穴韜光晦迹此正六隂之極我宋龍興士類奮起科目網羅縉紳推輓此正一陽之萌三聖相承日加培植至於仁廟項背相望乃六陽之盛也然乾興之初私論猶勝丁謂之魄已息而欽若之脉猶存乾興初丁謂移逐時王欽若為相馮拯之蕕方去而利用之蔓復滋乾興初罷馮拯時曹利用尚薦張遜為相是時也人才雖進而未伸天聖之間黨論方熾伏閣之爭此雖公論如夷簡之斥逐何明道二年郭皇后見踈范諷言后無子當廢呂夷簡賛其言仲淹孔道輔孫祖徳蔣堂郭勸馬絳段少連劉渙詣垂拱殿門伏奏夷簡奏臺諫伏閣非美事乃逐道輔等貽書之責此雖盛事如若訥之不肖何是時也人才雖伸而未盛司諫高若訥言仲淹貶職臣不敢妄有營救今歐陽修貽書責臣不能辨仲淹非辜恐中外聞之天子以意遷逐賢人所損不細貶修為夷陵縣令西京留守推官蔡襄作四賢一不肖詩四賢指仲淹靖洙修不肖斥若訥也迨天地嘉吉善類吐氣誦石介之詩詠蔡襄之句而後知人材之川涌雲集矣自今觀之可属大事重厚如勃非溢美也受遺輔政有始有卒與韓公恊力者有曽公焉石介詩予早識琦琦有竒骨可屬大事重厚如勃政又曽公亮謹畏周宻内外無間言受遺輔有始有卒可方張安世億萬維生公手撫摩非誇詞也中庭拜麻相慶相賀與富公齊名者有潞公焉蘇公頌富鄭公曰北至燕然南至于河億萬維生公手撫摩又長編文彦博與富弼同拜麻是日士夫以得人相賀天下謂之文富上曰吾得二相賢于夢卜矣此宰相之德望也契丹入使稱嘆得人則徳用其人仁宗朝王徳用再入樞府為使是時富弼偕契丹使來徳用伴射使者曰天子以公典樞府而用富公為相可謂得人矣元昊納欵士夫交賀則仲淹其人慶歴初元昊納欵遂詔韓琦范仲淹為樞宻副使天下聞之而士夫酌酒相賀曰上用韓范非惟社稷之幸乃天下生民之幸忠純可紀玉音稱賞非薛奎乎事畧忠鯁自任戚畹側目非宗道乎此參樞之節槩也拾遺録魯宗道為參政忠鯁自任時人謂魚頭公貴戚皆側目叩鐶大呼不曰忤㫖孔道輔范仲淹等伏奏垂拱殿門叩銅鐶大呼叩榻論事不曰沽名慶歴聖德詩惟脩惟靖立朝讞讞言論磥砢忠誠時達素相之後含忠履㓗昔為御史幾叩于榻臺諫之風采可想也椒房之冊翰林不進宋祁入翰林當張貴妃制初行冊禮而祁乃以誥進妃怒扺于地曰何學士敢輕人遂落職知許州招提之記學士不草翰苑之節操可敬也翰林學士蔡齊知河南府羅崇勲趣上脩崇德寺記曰參知政事可得也齊遲其記不上崇勲怒讒于太后命齊出守魯宗道固留之不能得太后諭宰相取記齊始上之敇出唐介何剡封還家塾記嘉祐五年唐介知荆州敕過門下知封駁事何剡封還之言介為諫官有補朝廷不當出詔介復知諫院如故敇除懷敏胡宿繳駁給舍之清忠鯁論又何其凜凜也楊懷敏除副都知知制誥胡宿不草制封還以聞上疑宿職不當言謂宰相曰前代有此故事否彦􅀶曰近來富弼亦封還詞頭上意解以言其邊帥則黑王相公見者驚心王德用狀貌魁偉而靣色正黒邊夷君長皆知其名識與不識稱之曰黒王相公北方常呼其名以驚小兒小范老子聞之破膽范仲淹帥陜西軍中有謡云軍中有一范西賊聞之驚破膽以言其郡守則一琴自隨成都清節趙抃守蜀惟以一琴一鶴自隨一硯不持端溪美政色拯守端州舊守縁歳貢數倍奉權貴拯貢數足不持一硯以言其縣令則宦寺索牛以理拒之呉育知襄城縣宗室宦官上冡或夜索牛駕車公曰牛不可得也衛士縱馬以法杖之范純仁知襄邑縣民有訴衛士縱馬食田者公捕而杖之著之於國史班班可紀噫盛哉雖然生聖明之世負君子之名砥節礪行分所當然猶未見其盛也若夫陳執中本俗吏也首薦呉育代居揆席君子賢之况不為執中乎蘇公曰陳執中本俗吏能薦呉育自代孔宗旦本酷吏也叱罵蠻儂甘死如飴識者稱之况不為宗旦乎仁宗時儂智高執孔宗旦欲任以事宗旦叱賊乃大罵遂被害宗旦始官京東與李道徐尚同等四人為監司目曰四瞪人多惡之而能立節乃爾猗歟休哉士君子而為此未足為人材之盛鄙夫庸人而若此深足為慶也噫豐芑之仁數世用之慶厯人材不特用於一時而復見於異日嗚呼逺矣哉治平之初主少國疑之時矣當時天下悸惘呼吸之間有雷有風有存有亡而韓魏公屹然中立親扶曰轂垂紳搢笏神閑氣定而天下不敢言不敢議韓公本慶厯之碩輔也言行録熙豐之際陽消隂長之時矣新法之行趍者瀾倒同己者進異議者斥而蘇公諸人首立赤幟臺府論列至為一空而小人終知公論之不可磨蘇公本嘉祐之名賢也蘇軾嘉祐中登第至熙寧間王安石行新法蘇公力攻其非時文彦博韓琦司馬公呂公著諸賢交口論列皆斥去臺府至為一空元祐之初改絃易轍之時矣程范二公慮有朋黨章呂小人窺伺間隙而温公奮然任怨不暇他恤拯溺救焚而天下知太平之有日温公本嘉祐之諌官也書曰罔俾阿衡專美有商愚甚拳拳於今之士君子元祐人材觀古靈之薦藁而後知元祐人材之賢長編熙寧九年哲宗初即位古靈陳襄薦司馬公而下三十三人章藁司馬光韓維呂公著乞詔還詞苑或居經幄蘇頌宜居編修孫覺李常范純仁可充侍從蘇軾曾鞏可備文翰孫洙進擢脩注王存顧臨可属危難林希可以編撰李師中可當邊帥傅堯俞有諌諍之風胡宗愈文醇行修劉摯置之文舘虞太熙可充臺閣程顥可備風憲劉載薛昌朝當置臺閣張載學行脩明蘇轍學與文稱軾靜厚過之孔文仲性醇行粹呉育端良質實呉恕器識深純林英有才與行孫奕士行林旦力行鄒何操履唐坰才翰鄭俠敢言觀文徳之黨碑而後知元祐人才之盛紹聖間元祐黨籍自司馬而下百餘人逐州立碑又劉元城曰元祐黨止七十四人餘皆非是噫貽厥孫謀以燕翼子祖宗之培植也深矣盖自太宗設三館而已示作成之意紹興十一年上謂宰執曰人才須素養太宗置三館養天下之士至仁廟人才畢出為國名臣仁宗設六科而遂有飛躍之效子由龍川志曰自設六科以來士之翹俊者爭論國政長短天地􅉼育雨露洗濯碩德名公霧滃雲集流而為數世之仁者此也然新法一唱正人繼逐而人材沮於貶竄間新法一行士心日變而人材壞於胎卵中世道荆棘天下茅葦嶺隅海表落落如晨星之相望所幸碩果不食隂剥陽復而士之元氣復春矣元祐天子磨洗舊習二三大臣極力推轂駸駸乎慶歴之盛噫偉哉方元豐之八年也召吕公著於揚元豐八年揚州召呂公著乗傳赴闕召司馬光於陳元豐八年樞宻院司馬光為門下侍郎自陳州召還言脩身治心之要二老來歸衆正相慶孫覺之方正李常清之有守劉摯之資性端厚王巖叟之素有才氣則呂公所薦也元豐八年呂公著薦孫覺方正有學識可充諌議大夫或給事中范純仁勁氣可充諫官或户部侍郎使議青苗等法李常清有守可備御史中丞劉摯資性端厚可充侍御史蘇轍王巖叟並有才氣可充諫官或言事御史趙彦若之博學唐淑問之難進自餘如韓宗道晏安止范純禮或以行義或以文學則司馬公所薦也元豐八年司馬光言竊見劉摯公忠剛直始終不變趙彦若博學有父風内行脩飭𫝊堯俞清介安貧滯淹歳乆范純仁臨事明敏不畏強禦唐淑問行已有恥難進易退范祖禹温良端厚修身無缺此六人節操㓗正雖不敢遽言大任若使之或處臺諫或侍講讀必有禆益自餘如呂大防王存李常孫覺胡宗愈韓宗道梁燾趙君錫王巖叟晏安止范純禮蘇軾蘇轍朱光庭或以行義或以文學伏望紀其姓名各隨器能任使至元祐之元年也詔文公彦博則有副我虛宁之語元祐元年詔文彦博曰卿踐更二府弼亮三朝名聞四夷功在天下注想元老渇見儀刑宜疾其驅副我虛宁詔書到日可肩與赴闕時授太師平章軍國事詔范公鎮則有為我強起之詞元祐元年賜范鎮詔曰朕虛懷前席以致諸老非敢以事諉也茍得黄髪之叟皤然在位則朝廷尊嚴姦宄消伏卿雖篤老乃心王室毋憚數命之勞以副中外之望又降詔曰西伯善養二老來歸漢室卑詞四人入侍為我強起毋或憚勞鮮于侁梁燾則任左右諫議元祐元年鮮于侁為右諫議大夫梁燾為左諫議大夫朱光庭王覿則任左右司諫元祐元年朱光庭為左司諫王覿為右司諫諫垣之有人也張舜民黄庭堅則擢校理張耒晁補之則擢正字館職之有人也元祐元年十一月畢仲游趙挺之並為集賢校理孫復梅顥張舜民並為秘閣校理張耒晁補之劉安世李昭玘張察並為正字畢仲游等十二人並以學士院召試充選也李常之拜户部則天下知朝廷不忍於征利元祐元年吏部侍郎李常為户部尚書用文士掌邦計則天下知朝廷非急於征利蘇軾之除翰學則出於先朝之眷愛元祐元年蘇軾為翰林學士初宣仁謂軾曰先帝嘗謂卿竒材今日所以擢卿范祖禹之為侍講則為講官之第一元祐元年傅堯俞為侍讀而用著作郎范祖禹兼侍講時祖禹在經筵色和氣柔為講官第一程伊川之性學高明則任校書元祐元年程頤以布衣為校書蘇轍之操守端方則任起居見上庶職皆有人也明年則丁隲以不附新法而擢正言元祐元年丁隲為右正言自行新法即不肯為知縣折資監當幾二十年人各稱之陳師道以名公交薦而擢掌教元祐二年徐州布衣陳師道為亳州司户充徐州教授先是蘇軾傅堯俞孫覺言師道文詞高古度越流輩安貧守道若將終身故有是命彭汝礪亦以衆賢爭稱而擢舍人見下又明年則吕大防范純仁為僕射元祐三年四月吕公著為司空吕大防為左僕射范純仁為右僕射豐稷趙屼為臺諌時豐稷為左司諫論荆王頵奢侈監察御史趙屼與稷同對退謂稷曰聞君言使屼浹背劉安世為言路時劉安世為諫官論胡宗愈凡二十次論列至四年則安世力薦傅堯俞素有德行得大臣體時宣仁后令梁燾劉安世具可用臣僚姓名進入於是燾安世共奏傅堯俞素有徳行得大臣體蘇頌學問該博練達典故蘇頌學問該博有聲先朝至五年則范祖禹屢薦韓維可居經筵趙君錫孝行鄭穆純正鄭雍端㓗時范祖禹四劄薦韓維可居經筵蘇頌可任經莚蘇軾可居尚書趙君錫孝行書于英宗實録士夫所共知鄭穆館閣老儒操履純正鄭雍謹靜端㓗言行不妄宜署左右六年則楊康國賈易姚勔列居風憲而言路愈振六年楊康國為左司諫賈易為侍御史安世為監察御史姚勔為右正言七年則顧臨孔武仲吕希哲吕大臨錯列朝著而朝綱日正七年顧臨為侍讀讀寶訓論鈔法之便四月范祖禹言孔武仲學問該博吕希哲呂公著之子公著言此子不欺暗室可備勸講吕大臨是大防之弟脩身好學如古人吕純仁自為布衣以行誼稱於士大夫兹數年間朝廷清明居廟堂者屹然泰山之具瞻任言職者凜若秋霜之在望也氣和色柔君德日長無愧於翠幄之任論駁封還小人氷晛無歉於青𤨏之寄六部繩聨而無事之不舉庶府星布而無弊之不革外而州縣之小吏微而管庫之末任皆師師然有羔羊之風豈不盛歟然君子所惜者諸賢彈冠之秋熈豐小人投閑置散其乗問俟隙有日矣元祐諸公操戈太甚反起異日朋黨之禍戲薄之語亦小忿也主正叔者攻子瞻主子瞻者攻正叔吕陶言明堂賀赦訖兩省官欲弔司馬光程正叔曰子於是日哭則不歌或曰子言哭則不歌不言歌則不哭子瞻戲正叔曰此乃枉死市叔孫通所制禮也衆大笑結寃之端自此始也吏額之爭初無他意也而主微仲者攻莘老主莘老者攻微仲劉摯字莘老為中書侍郎初以吏額房事與僕射吕大防微仲議不合己而摯門下侍郎及臺諫共攻大防語他人曰使上意曉然不疑如門下之力居多然士大夫趍利者交搆其間謂大防與摯有隙造為朋黨之論摯語大防曰吾曹心知無他然外論如此非朝廷所宜有願引避大防曰行有請矣摯乞出外大防辭位不許及摯遷右僕射與大防同列未滿歳言者爭擊之摯尋罷朋黨之論遂不可破其本自吏額始不知今日之相攻正為攻我者之資鷸蚌相持漁者之利諸君子獨不念及此耶噫元祐而為紹聖君子方惜其天意之剥紹聖而為建紹君子又喜其天意之復古今源流至論前集卷三
