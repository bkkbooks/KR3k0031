  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_031-1a, image: WYG0942/WYG0942-0509a.png}
body:
  text: 古今源流至論别集卷一宋黃履翁撰治鑑綱目文公褒貶之意治鑑目録司馬公晩筆也而其書太簡不足以備歴代之顚末通鑑綱目序先正溫國司馬公受詔編集資治通鑑旣成又撮其精要之語别爲目録三十卷并上之晩病本書太詳目録太簡更著舉要歴八十卷以適厥中而未成也治鑑補遺胡文定續書也而其事固備不足以示後來之監戒同上紹興初故侍讀南陽胡文定公始復因公遺藁修成舉要補遺若干卷則其文愈約而事愈備矣然徃者得於其家而伏讀之猶竊自痛記識之弗強不能有以領其要而及其詳也然則成先正未成之志發遺書未發之蘊此文公綱目之作其有益於治鑑也不少愚嘗莊誦公之書而知用功深而持論嚴矣夫歲年有乆近詳書甲子以紀之則歲周於上而天道明矣序云表歲以首年注逐年之上行外書某甲子遇甲子子字則朱書以别之雖無事依舉要亦備歲年國統有離合特書正統以别之則統正於下而人道定矣同上因年以著統注凡正統之年歳下大書非正統者兩行分注有始終興廢灾祥沿革之正例者有善可爲法惡可爲戒之變例者皆大書以提要則大綱槩舉而監戒昭矣同上大書以提要注凡大書有正例有變例正例如始終興廢灾祥沿革及號令征伐殺生除拜之大者變例如不在此例而善可爲法惡可爲戒者特書之有追原其始遂言其終者有詳陳其事備載其言者皆分注以備述則衆目畢張而㡬微著矣同上分注以備言注凡分注有追原其始者有遂言其終者有詳陳其事者有備載其言者有因始終而見者有因拜罷而見者有因事類而見者有因家世而見者昔溫公嘗謂吾作此書惟王勝之嘗閲之終篇自餘君子讀未終紙思睡矣是其編次太詳也今大綱舉而衆目張其得詳畧之中乎張芸叟答孫子發書多論通鑑其畧云溫公嘗曰吾作此書惟王勝之嘗閲之終篇自餘君子求見欲觀讀未終紙已欠伸思睡矣溫公又謂臣今所述止叙國家之興衰著生民之休戚使觀之者自擇其善惡得失以爲勸戒是其勸戒未著也今監戒昭而㡬微著其得褒貶之法乎溫公作魏紀曰臣今所述止欲叙國家之興衰著生民之休戚使觀之者自擇其善惡得失以爲勸戒非若春秋立褒貶之法撥亂世反諸正也昔人有言杜征南顔秘書乃左丘孟堅之忠臣特其所謂將順者而小司馬蘇潁濱乃太史公正救之忠臣其功尤多然則晦翁所編不惟爲溫公將順之忠臣抑亦溫公正救之忠臣也自今觀之戰國之時秦楚韓魏之僭王則别之使天下知僭僞之不得其正亦春秋誅呉楚之法通鑑綱目周赧王五十九年王入秦盡獻其地歸而卒是年不書正統年紀遂分注秦昭襄王五十二年楚孝烈王八年燕孝王三年云云南北之際宋齊梁陳之分治則卑之使天下知傳授之不得其統亦春秋黜五伯之意通鑑綱目自晉恭皇帝元熙二年宋王劉裕稱皇帝廢帝爲零陵王至次年不書宋年爲正但分注宋永初二年魏泰常六年至齊梁陳皆依此例削曹魏之竊位明昭烈之正統非異溫公也所以示天下之大分按通鑑作魏紀書世祖文皇帝黃初元年綱目不書魏年號大書昭烈皇帝章武元年分注魏黃初年呉黃武年魏曰魏主呉曰呉主以蜀爲正統稱皇帝去則天之僞號存中宗之紀年非拂溫公也所以正天下之公論按通鑑作武后紀書嗣聖元年廢中宗爲廬陵王後改垂拱元年又改天授元年長壽元年至綱目皆不書之但始終書中宗嗣聖年號揚雄本仕於漢也而曰莽大夫揚雄葢雄之姦心佞舌曲筆美新名之曰莽者正以誅諛臣之心通鑑綱目莽元鳳五年莽大夫揚雄死注云雄所作法言卒章盛稱莽功德可比伊周後又作劇秦羙新之文以頌莽君子病焉陶潛本没於宋也而曰晉處士陶潛卒葢潛之清風高節恥身後代稱之曰晉者正以表忠臣之節通鑑綱目宋元嘉四年書晉徵士陶潛卒注云潛自以先世爲晉輔恥復屈身後代自宋高祖王業漸隆不復肯仕是歲將復徴之㑹卒世號靖節先生漢史曰幸太學今不曰幸而曰視尊師道也光武紀初起太學車駕還宮幸太學綱目云光武初起太學帝還視之唐史曰尚公主今不曰尚而曰適明人倫也按唐史例曰某人尚公主按通鑑綱目例曰公主適某人如景龍元年冬十一月安樂公主適武延秀之類書孟軻之去齊傷吾道之不行也綱目周赧王元年書孟軻去齊注是時天下方務於合從連衡以攻伐爲賢而處士楊朱之言盈天下孟子乃述唐虞三代之徳推明孔子之道以正人心息邪説爲己任是以所如皆不合遂致爲臣於齊而歸云云貶仁傑以係周惡臣道之不立也按綱目中宗嗣聖八年周武后如意元年九月周以狄仁傑同平章事又嗣聖十五年周武氏聖厯元年秋八月周以狄仁傑兼納言元狩六年特述殺大農令顔異者嘆公卿自後取容矣綱目武帝元狩六年書殺大農令顔異注自是之後有腹誹之法比而公卿大夫多謟諛取容矣元鼎三年大書令入財補郎者嘆郎選自後益衰矣綱目武帝元鼎二年書令株送徒入財補郎注所忠言世家子弟常大亂齊民乃召諸犯令相引數千人名曰株送徒入財者得補郎郎選衰矣大抵一事之疑若决蓍龜一字之簡凜乎釡鉞發潛德之幽光誅姦雄於已死者此書也别正閏之異號辨冠屨之殊分者此書也嗚呼公之書豈私見臆説而自爲哉採故老之異聞拾諸儒之緒論質諸人心而無疑參諸衆論而無愧也是故其書衛鞅之受禍則取胡氏之論綱目周顯王三十一年秦人誅衛鞅滅其家注胡氏曰鞅至是雖有變計亦無所施矣何則百姓者其仇也六國者其敵也惠文王之憾不可平公子䖍之刑不可補商於蕞爾之地不足以自蔽也欲圖善後之策亦無所爲而可矣嗚呼刑名之學刻薄之徒亦可以少戒哉其書秦割地以和韓魏則取蘇氏之説綱目周赧王十七年齊韓魏伐秦敗其軍於凾谷關河渭絶一日秦割河東三城以和三國乃退注蘇氏曰使田文能奮其威則是役也齊可以伯惜其聽蘇代之計臨凾谷關而無攻以求楚東國而出師之名索然以盡東國旣不可得而懷王卒死於秦其述秦趙㑹於澠池則楊龜山之議也綱目周赧王三十六年秦趙㑹於澠池注楊氏曰古之智者以小事大有以皮幣犬馬珠玉而不得免者至乃棄國而逃之况一璧乎雖與之可也相如計不出此而欲以身死之可謂未義而傷勇矣及其全璧而歸於趙亦何益哉其述張良誤中副車則程子之辨也綱目癸未秦二十九年帝東遊至陽武韓人張良狙擊誤中副車令天下大索十日不得遂登之罘刻石而還注或曰張良之計不亦踈乎程子曰欲報君仇之急何暇自爲謀哉夫惟旁搜博採非一書也左諏右訪非一説也則是書之作非一己之私見乃天下之公論矣昔晦翁嘗語門人曰某作通鑑綱目後之君子必有取焉嗚呼使晦翁非眞見此書無歉必不肯發此語也語録先生語門人曰如三國南北五代皆天下分裂不能冇君臣此時便無正統某嘗作通鑑綱目有無統之論此書今方成後之君子必有取焉厥今秘閣珍藏壁星相映翠幄進講遺編有光而公之言驗矣周子通書誠爲此書之樞紐昔張南軒記濓溪之學曰本乎易之太極中庸之誠是知太極與誠乃自得之蘊也張敬夫濓溪祠堂記先生之學本乎易之太極中庸之誠朱晦翁釋濓溪之書曰聖人之誠即所謂太極是知誠與太極乃無間之妙也誠上篇誠者聖人之本注聖人之所以聖者無他焉以其獨能全此而已此書與圖相表裏誠即所謂太極也愚嘗歛衽危坐澄心端思究通書之微言遡先儒之緒論竊知先生之言其高極乎無極太極之奥而其實不離乎日用之間其幽探乎隂陽五行之賾而其實不離乎仁義禮智剛柔善惡之際其體用之同源顯微之無間秦漢而下誠未有臻斯理者不外乎大易中庸之所傳也晦庵濓溪祠堂記大抵書之要㫖不外乎誠之全體而誠之全體不外乎圖之太極明乎此則四十篇之㫖思過半矣夫誠者實理之謂也是書首章一則曰誠二則曰誠通書誠第一誠第二正以發全書之㫖趣示後學之根源而其所謂誠則有二焉自然而實者天也必期於實者人而天也正中庸所謂自誠而明自明而誠之㫖此又所當熟究焉者是故曰誠者聖人之本也誠上篇誠者聖人之本也曰聖誠而已矣誠下篇聖誠而已矣曰誠無爲也無妄也誠㡬德篇誠無爲㡬善惡又家人睽復無妄篇妄復則無妄矣無妄則誠矣曰誠動於此也寂然不動也思第九篇㡬動於彼誠動於此又聖第四篇寂然不動者誠也此誠者天之道性焉安焉之謂也曰君子乾乾不息於誠也乾損益動篇君子乾乾不息於誠然必懲忿窒慾遷善改過曰至誠則動擬議以成其變化也擬議第三十二篇此誠之者人之道復焉執焉之謂也其論舜之心誠家人睽復無妄篇推堯所以釐降二女於潙汭舜可禪乎吾兹試矣云云身端心誠之謂也孔子之道德孔子篇道德高厚其誠者之道歟其論顔子之發聖蘊聖蘊篇發聖人之蘊敎萬世無窮者顔子也仲由之喜聞過過二十六篇仲由喜聞過其誠之之道歟其論聖之希天志學篇聖希天賢希聖聖之明通聖學第二十篇是亦誠者之道也其論士之志學見上君子之務實務實第十四故君子進德脩業孳孳不息務寔勝也是亦誠之之道也言其師友者欲人聚辯此實理耳師友上第二十四師友下第二十五言其童䝉者欲人求明此實理耳䝉艮第四十童䝉求我我正果行如筮焉患人以辭章决科而昧此實理則曰文辭爲藝而道德爲實文辭第二十八篇文辭藝也道徳實也患人以富貴肥家而喪此實理則曰銖視軒冕塵視金玉富貴第二十三銖視軒冕塵視金玉是書也無非推明乎誠之一字耳然人見其文之質而不知其義之精人見其言之淡而不知其味之長胡氏論通書曰人見其書之約而不知其道之大也云云何者形而上者固此理也形而下者亦此理也散於造化者固此理也㑹於人心者亦此理也是理也寓之於圖則曰太極筆之於書則曰誠太極具則二氣五行之運行實理全則五常百行之發見又安有異理哉故誠之源則陽之動誠斯立則隂之静也誠上篇大哉乾元萬物資始誠之源也注即圖之陽動也又曰乾道變化各正性命誠斯立焉注即圖之隂静也㡬之善則陽之屬也㡬之惡則隂之屬也誠㡬德篇誠無爲㡬善惡注㡬者動之微善惡之所由分也葢動於人心之微則天理固當發見而人欲亦已萌乎其間矣此隂陽之象也仁義禮智信即五行之性也同上德愛曰仁宜曰義理曰禮通曰智守曰信注道之得於身者謂之德其别則有五者之用而因以名其體焉即五行之性也孝悌忠順之百行即萬物之象也誠下篇誠五常之本百行之源也注五常仁義禮智信五行之性也百行孝悌忠順之屬萬物之象也不特此爾若五行隂陽隂陽太極動静篇若五殊二實二本則一理性命篇又發明乎物物各具實理非自微而之顯乎若禮理樂和禮樂篇禮理也樂和也注禮隂也樂陽也若剛柔善惡師第七曰性者剛柔善惡中而已矣注剛柔固隂陽之大分而其中又各有隂陽以爲善惡之分焉又發明乎事事皆隂陽非自顯而之微乎又不特此爾聖學一篇言一之無欲而極明通公溥之境然學者深味之則知無極之眞兩儀四象之本皆不外乎此心矣聖學篇一者無欲也無欲則静虛動直静虛則明明則通動直則公公則溥明通公溥庻矣乎注此章學者能深玩而力行之則有以知無極之真兩儀四象之本皆不外乎此心而日用間自無别用力處矣孔子一篇言夫子道德敎化而合天地四時之妙然學者詳思之則知孔子本太極而有隂陽五行之用矣孔子下篇道徳高厚敎化無窮實與天地參而四時同其惟孔子乎注道高如天者陽也德厚如地者隂也敎化無窮如四時者五行也孔子其太極乎嗚呼通書筆絶庭草迹蕪世無諸老相與講論以發其所未言之㫖則後之學者又安知其㫖要哉愚故曰味西銘之書當知仁孝之至理程明道曰西銘之書仁孝之理備乎此究通書之㫖當知至誠之實體而好爲議者曰周子之言復以利貞爲言非大易之説也晦庵語録門人問濓溪説復字就歸處説伊川就云動處説先生曰然濓溪就坤上説就回來處説如利貞誠之復也誠心復其不善之動而已矣皆是就歸來處説伊川則止就動處説如元亨利貞濓溪就利貞上説復字伊川就元字頭説復字然濓溪伊川之説道理只一様非有所異只是所指地頭不同以復卦言之下靣一畫便是動處王弼之説與濓溪同周子之言中以和爲訓非中庸意也師第七惟中者和也中節也天下之達道也聖人之事也注此以得性之正而言也然以和爲中與中庸不合葢就已發無過不及者而言之如書所謂允執厥中者也夫周子之學源流於易中庸之書而議論若是相戾何哉曰知周子以坤卦言則利貞亦可以爲復見上知周子以時中言則達道亦可以爲中或問子思之言中和如此而周子則曰中者和也中節也天下之達道也乃舉中而合之和何以爲天下大本耶曰子思所謂中以未發言也周子所謂中以時中言也學者涵泳而别識之見其並行而不相悖可也噫書不盡言圖不盡意學者當求諸胷中之眞見而毋泥紙上之陳迹云文公四書論四書心學之要四書之學世儒論之詳矣雖然聖經浩博千岐萬轍吾道高深如天如淵葢未易涉其流而窺其涯也粤自魯鄒敎息蟬噪蛙鳴吾道之所寄不越乎言語文字之間諸儒之所論不外乎章句訓詁之末是故説語孟者溺於卑近則得其言而不得其所以言騖於高逺則自謂得其所以言乃并與其言而失之晦庵語孟精義序論孟之書學者所以求道之至要古今爲之説者葢已百有餘家然自秦漢以來儒者類皆不足以與聞斯道之傳其溺於卑近者旣得其言而不得其意其騖於高逺者則又支離踳駁或乃并其言而失之學者益以病焉談中庸者雜於異端而有近理亂眞之禍晦翁中庸章句序自是而又再傳以得孟氏爲能推明是書以承先聖之統及其没而遂失其傳焉云云佛老之徒出則彌近理而大亂眞矣講大學者知其正心誠意而不及致知格物之原晦翁大學章句或問漢魏以來諸儒之論未嘗有及之者至唐韓子乃能援以爲説而見於原道之篇則庻㡬其有聞矣然其言極於正心誠意而無曰致知格物云者則是不探其端而驟語其次亦未免於擇焉不精語焉不詳之病馳心曲學議論崢嶸腐唇析句識趣卑陋噫可歎也碩果不食我宋復興星聚奎而文風振起水泝洛而道統流傳周子奮於九江之下程子鳴於河洛之間得有所考以續千載不傳之緒得有所據以斥異端似是之非其後也武夷大儒塤箎唱和錯簡淆亂者則支分節解而脉絡貫通殘編簡斷者則正訛補闕而㫖趣歸㑹於是有章句之作大學章句云右傳之五章葢釋格物致知之義而今亡矣間嘗竊取程子之意以補之曰所謂致知在格物者言欲致吾之知在即物而窮其理也云云前乎伊洛一言之有據吾取之後乎伊洛一義之有考吾取之理有未安雖學正學者必去言有不可去雖不與吾好者必録於是有集註之作雖然左氏之傳必託之君子而後褒貶之義明法言一書設爲問答必託之或人而後顯今也合衆派而㑹流參殊塗而同歸故説之有所取必明其所以取之意説之有所去必辨其所以去之由此或問之作又得以曲暢旁通而無遺論也然文公之意正將繼絶學傳正統豈但鑚研訓釋而已哉葢論語之言無所不包其要在於心之操存㴠養七篇之指無所不究其要在於心之體驗擴充論孟精義序抑嘗論之論語之言無所不包而其所以示人者莫非操存㴠養之要七篇之指無所不究而其所以示人者類多體驗擴充之端云云中庸其言雖多而其樞紐不出乎心之誠中庸或問葢此篇大抵專以發明實性之本然欲人之實此理而無妄故其言雖多而其樞紐不越乎誠之一言也嗚呼深哉大學其論雖博而其始終不出乎心之敬大學或問葢吾聞之敬之一字聖學所以成始而成終者也爲小學者不由乎此固無以㴠養本原而謹夫灑掃應對進退之節與夫六藝之敎爲大學者不由乎此亦無以開發聰明進德脩業而致夫明德新民之功也是以程子發明格物之道而必以是爲説焉無非昭揭此心法啟鑰此心學也嗚呼此非先生之學之至其孰能明之哉大抵心學難傳也出入無時非得於操存則其失也縱旦晝牿亡非得於涵養則其失也蕩脉絡難明界分難别非體驗之則其失也蔽善端方萌正性方覺非擴充之則其失也固尸居龍見淵黙雷聲虛室生白吉祥至止則心在乎誠否則流於妄矣出門如賓承事如祭守口如缻防意如城則心在乎敬否則流於肆矣吾觀洙泗之所講明文公之所解釋則聖賢之分量理義之精微莫不昭然於方册間矣且學莫切於操存也夫以曾子之魯一日三省忠於人而信於友傳於師而習於己故釋之曰此專用心於内也論語集注謝氏曰諸子之學皆出於聖人其後愈逺而愈失其眞獨曾子之學專用心於内故傳之無弊以顔子之愚終食不違造次於是顚沛於是故釋之曰此存養之功密也同上言君子爲仁自富貴貧賤取舎之間以至於終食造次顚沛之頃無時無處而不用其力也然取舎之分明然後存養之功密存養之功密則其取舎之分益明矣學莫深於涵養也暮春沂泗舞雩詠歸氣象從容胷次灑落然未知所言何意而大儒則曰無舍己爲人之意天地同流自見言外是言也誰其知之同上曾㸃之學葢有以見夫人慾盡處天理流行随處充滿無少欠缺故其動静從容如此而其言志則又不過即其所居之位樂其日用之常初無舍己爲人之意而其胷次直與天地萬物上下同流各得其所之妙隱然自見於言外視三子之規規於事爲之末者氣象不侔矣夫子歎息而深許之而門人記其本末獨加詳矣葢亦有以識此矣簞食瓢飲頽然陋巷内性優游外物脱落然未知所樂何事而大儒則曰從事於博文約禮以至於旣竭吾才而後有得是樂也誰其㑹之同上程子曰昔受學於周茂叔每令尋仲尼顔子樂處所樂何事愚按程子之言引而不發葢欲學者深思而自得之今亦不敢妄爲之説學者但當從事於博文約禮之誨以至於欲罷不能而竭其才則庻乎有以得之矣此精義之序所謂論語之言莫非操存涵養之要者是也然亦非訓釋之功何以知其味哉學莫難於體驗也先利後義之辨其非爲善爲利之言其間所以驗天理人慾之分也然毫髮千里之説以利爲義之説又廣其所未言孟子集注梁惠王上循天理則不求利而自無不利徇人慾則求利未得而害己随之所謂毫釐之差千里之謬此孟子之書所以造端托始之深意學者所宜精察而明辨也云云又同上楊氏曰舜蹠之相去逺矣而其分乃在利善之間而已是豈可以不謹然講之不熟見之不明未有不以利爲義者又學者所當深察也或問雞鳴而起若未接物如何爲善云云鄉原之德賊告子之義外所以驗似是而非之説然求媚於世之戒不得其正之戒又發其所已言同上盡心下孟子言此深自閉藏以求媚於當世是郷原之行也又告子上告子之辨義外而屢變其説以求勝卒不聞其能自反而有所疑也此正其所謂不得於言勿求於心者所以卒於鹵莽而不得其正也學莫先於擴充也自可欲之善極而至於聖而不可知之神自徐行後長之事極而至於堯舜之道此敎人以希聖之學然上下一理之訓日用不知之訓又從而紬繹之同上尹氏曰可欲之善至於聖而不可知之神上下一理擴充之至於神則不可得而名矣疾又楊氏曰堯舜之道大矣而所以爲之乃在夫行止徐之間非有甚高難行之事也百姓葢日用而不知爾充赤子入井之心而仁足以保四海充無欲穿窬之心而義至於不勝用此敎人以善推之學然不能自己之説推不爲達所爲之説又從而反覆之同上公孫丑上皆即此推廣而充滿其本然之量則其日新又新將有不能自己者矣能由此而遂充之則四海雖逺亦吾度内無難保者不能充之則雖事之至近而不能矣又盡心下能推其所不爲以達於所爲則能滿其無穿窬之心而無不義矣此精義之序所謂孟子之言莫非體驗擴充之要者是也然非訓釋之功又何以明其㫖哉夫誠者心學之極致始乎天命謂性者言實理之原也終乎無聲無臭者又極天命之性而言也謹獨云者所以實乎此理之實也中和云者所以狀此實理之體用也中庸則言實理之有常過不及則不知實理之妄行曰費曰隱者言實理之用廣體微鳶飛魚躍者言實理之流行充滿誠明以下累章之言者反復乎此耳大抵誠之爲道在天爲實理在人爲實心以天理言之則冲漠無涯眞實無妄萬理兼該一體無雜故天理得誠之名若所謂天之道鬼神之德是也以聖人之心言之氣質清純表裏洞徹人慾盡泯天理渾然故聖人得誠之名若所謂不勉而中不思而得者是也此或問一書講明發揮以言誠爲中庸之樞紐者詎不信歟中庸或問曰何以言誠爲此篇之樞紐也自誠者實而已矣天命云者實理之原也性其在物之實體道其當然之實用而敎也者又因其體用之實而品節之也不可離者此理之實也隱之見微之顯實之存亡而不可揜者也戒謹恐懼而謹其獨焉所以實乎此理之實也中和云者所以狀此實理之體用也天地位萬物育則所以極此實理之功效也中庸云者實理之適可而平常者也過與不及不見實理而妄行者也費而隱者言實理之用廣而體微也鳶飛魚躍流動充滿夫豈無實而有是哉夫敬者心學之大原一篇之指其目凡八八事之要其條凡三葢脩身以上者明明德之事以求知至善之所在也齊家以下者新民之事以求得至善之所止也然究其端緒明其本末又皆不外乎敬之一字葢敬心旣立而由是格物致知以明事物之理則所謂尊德性而道問學由是誠意正心以脩其身則所謂先立其大者而小者不能奪由是齊家治國以及乎天下則所謂修己以安百姓篤恭而天下平是皆未始一日而離乎敬也夫敬之爲道一心之主宰萬事之根本爲小學者固將以涵養本原以成其始爲大學者固將以開發聰明以成其終此或問一書議論問答以言敬爲聖學之始終者詎不信歟大學或問葢吾聞之敬之一字聖學所以成始而成終者也爲小學者不由乎此固無以涵養本原而謹夫灑掃應對進退之節與夫六藝之敎爲大學者不由乎此亦無以開發聰明進德脩業而致夫明德新民之功也是以程子發明格物之道而必以是爲説焉然嘗論之脱略言語㑹悟理義者心胷之學也研窮章句遺棄本根者口耳之學也文公之釋四書者正欲示天下性命之原開人心誠敬之天學者而求語孟之書當思吾夫子之所以至於聖人者何如孟子之成於聖人者何如集注篇首讀論孟法程子曰學者須以論語孟子爲本云云聖人之所以至於聖人而吾之所以未至者所以未得者句句而求之晝誦而味中夜而思之平其心易其氣闕其疑則聖人之意可見矣其問也猶吾之問也其善也猶吾之善也同上夫子之所以明快孟子之所以雄辨伊川語録孔子儘是明快人顔子儘豈弟孟子儘雄辨夫子之所以涵養孟子之所以光耀集注孟子篇首程子曰孟子有些英氣纔有英氣便有圭角英氣甚害事如顔子便渾厚不同顔子去聖人只毫髮間孟子大賢亞聖之次也或曰英氣見於甚處曰但以孔子之言比之可見且如冰與水精非不光比之玉自是有温潤含蓄氣象無許多光耀也晝誦而味夜思而求反復於靜一之中浹洽於精研之後端拜秋陽之皜皜緬想太山之岩岩氣質自是而成焉事功自是而審焉則不在於講説之間而在於涵泳之頃學者而求中庸大學之書當思在天之對越鬼神之格思對妻子如對賓客對童稚如對大人造化之深理鬼神之能事聖人之極功皆造端乎一念之誠弗貳以二弗參以三巨細相涵表裏交養整齊於執事之時端莊於若思之際心性之實德事物之妙理國家之極治皆黙㑹乎一念之敬則是書不在於訓釋之粗而在於存養之妙昔尹和靖門人稱尹公於經書不爲講解而耳順心得如誦已言噫心領神㑹乃文公之本意而筆舌譊譊非文公之得已也雖然不先乎大學無以提挈綱領而盡論孟之精微不參之論孟無以融貫㑹通而極中庸之歸趣此又後先之序也噫伊洛我師也文公豈欺我哉誠論天道人道之誠誠之道大矣哉具於太極之渾淪而極於天地之變化始於夫婦之隱微而著於鳶魚之飛躍存於盛服之齋明而格於鬼神之左右洋洋是故眞實無妄純粹無僞徹上徹下皆實理之所爲者誠也而一有所雜則妄矣悠乆不息周流不已自始至終皆實心之所爲者誠也而一有所間則息矣雖然難言也竊嘗泝魯鄒之淵源沿伊洛之流派逹紫陽之舟楫而聞其略矣且以自然之理言之天地之間惟天爲至實而無妄冲漠無朕而萬物兼該剛健常行而一體弗雜是以一元之氣無古今無寒暑無風雨晦明萬古常運而未嘗有一息之停詩曰維天之命於穆不已此之謂也天下之物無洪纎無巨細無飛潜動植萬古常生而未嘗有一物之差易曰乾道變化各正性命此之謂也中庸或問誠之爲義其詳可得而聞乎曰難言也姑以其名義言之則眞實無妄之云也若事理之得此名亦随其所指之大小而皆有取乎眞實無妄之意耳葢以自然之理言之則天地之間惟天理爲至實而無妄故天理得誠之名若所謂天之道鬼神之德是也以德言之則有生之類惟聖人之心爲至實而無妄故聖人得誠之名若所謂不勉而中不思而得者是也至於隨事而言則一念之實亦誠也一言之實亦誠也一行之實亦誠也是其大小雖有不同然其義之所歸則未始不在於實也曰然則天理聖人之所以若是其實者何也曰一則純二則雜純則誠雜則妄此萬物之大情也夫天之所以爲天也冲漠無朕而萬物兼該無所不具然其爲體則一而已矣未始有物以雜也是理也在天爲實理在人爲實心自然而實者天也必期於實者人而天也注見後夫所謂自然而實者聖人極致之功也葢聖人氣稟清純赤子不失一眞渾融萬境洞徹渾然元氣之未鑿湛然太虛之無累動容皆禮不勉而中從容皆道不思而得仁則表裏皆仁而未有一毫之不仁義則表裏皆義而未有一毫之不義正大舜天德出寧之境文王純亦不已之天夫子從心不踰矩之年也夫所謂必期於實者賢人自明之敎也葢賢人性命雖正而梏於形體道心雖具而局於氣質掃其塵而鑑自明澄其滓而水自清慾盡理還人泯天定謹獨於暗室不覩之地存心於雷聲淵黙之時當其惻隱之發而不雜於忮害則所以爲仁者無不實矣當其羞惡之發而不雜於貪昩則所以爲義者無不實矣正顔子克己復禮之學曾子一日三省之功孟子誠身明善之道也嗟夫性焉安焉者聖也復焉執焉者賢也聖則希天賢則希聖其分量之小大氣質之清濁才品之高下固有不可强而同者然生知學知其歸一致安行勉行其終同功恐懼不聞此誠之固執者而言也而能極天地位萬物育之功曲致有誠此誠之未至者而言也而能造至誠能化之誠並中庸擬言議動之學而至於變化通書擬議第三十五至誠則動動則變變則化故曰擬之而後言議之而後動擬議以成其變化晦庵注曰中庸易大傳所指不同今合而言之未詳其義慾無誠立之驗而極於明通通書後録予謂養心不止於寡而存耳葢寡焉以至於無旡則誠立明通誠立賢也明通聖也云云此造化之實理鬼神之盛德聖神之極功又孰爲有餘孰爲不足哉噫誠則明矣明則誠矣自明之敎學者不可一息間斷也嘗觀中庸一書其論理也詳矣要其本㫖不過發明乎誠之實理所謂天之道人之道是已天命云者實理之原也性其在我之實體道其當然之實用而敎也者又因體用之實而品節之也曰大本達道所以言實理之體用曰天地位萬物育所以極是理之效驗中庸云者其知實理之可常者乎過與不及云者其不知實理妄行者乎注見後以舜明知以回明仁以子路明勇謂誠者亦實此三德而已爾中庸章句此篇大㫖以知仁勇三達德爲入道之門故於篇首即以大舜顔淵子路之事明之舜知也顔淵仁也子路勇也三者廢其一則無以造道而成德矣又云達道雖人所共由無是三德則無以行之達德雖人所同得然一有不誠則人欲間之而德非其德矣程子曰所謂誠者止是誠實此三者三者之外别無誠實理之爲用也廣故曰費實用之爲體也微故曰隱近而夫婦逺而聖人天地皆費也而是理之所以然則隱而莫之見焉道不逺人者夫婦所能丘未能一者聖人所不能皆費也而推其所以然則有至隱存焉中庸章句費用之廣也隱體之微也君子之道近自夫婦居室之間逺而至於聖人天地之所不能盡其大無外其小無内可謂費矣然其理之所以然則隱而莫之見也又第十三章道不逺人者夫婦所能丘未能一者聖人所不能皆費也而其所以然者則至隱存焉其述自邇自卑則言乎費其述不見不聞則言乎隱而帝王之事夫子之言則又合體用兼費隱而並言之矣信矣夫誠爲中庸之樞紐也中庸或問曰何以言誠爲此篇之樞紐也曰誠者實而已矣天命云者實理之原也性其在我之實體道其當然之實用而敎也者又因其體用之實而品節之也不可離者此理之實也隱之見微之顯實之存亡而不可揜者也戒謹恐懼而謹其獨焉所以實乎此理之實也中和云者所以狀此實理之體用也天地位萬物育則所以極此實理之功効也中庸云者實理之適可而平常者也過與不及不見實理而妄行者也費而隱者言實理之用廣而體人微也鳶飛魚躍流動充滿夫豈無實而有是哉道不逺以下至於大舜文武周公之事孔子之言皆實理應用之當然而鬼神之不可揜則又其發見之所以然也聖人於此固以其無一毫之不實而至於如此之盛其示人也亦欲其必以其實而無一毫之僞也葢自然而實者天也必期於實者人而天也誠明以下累章之意者所以反復乎此而語其所以至於正大經而立大本參天地而贊化育則亦眞實無妄之極功也卒章尚絅之云又本其務實之初心而言也内省者謹獨克己之功不愧屋漏者戒謹恐懼而無已可克之事皆所以實乎此之序也時靡有爭變也百辟刑之化也無聲無臭又極乎天命之性實理之原而言也葢此篇大指專以發明實理之本然欲人之實此理而無妄故其言雖多而其樞紐不越乎誠之一字也嗚呼深哉是理也伊洛諸公葢得之故通書之言誠也旣曰聖之性又曰賢之復通書誠㡬德第三誠無爲㡬善惡德愛曰仁宜曰義理曰禮通曰智守曰信性焉安焉之謂聖復焉執焉之謂賢發微不可見充周不可窮之謂神易傳之言誠也旣曰無妄又曰不欺近思録易傳旡妄之謂誠不欺其次矣一本云李邦直云不欺之謂誠但以不欺爲誠徐仲車不息之謂誠中庸言至誠無息非以無息解誠也或以問先生先生曰云云夫曰性曰無妄者所以發中庸誠者之㫖曰復曰不欺者所以明中庸誠之者之義然周程二公豈但空言而已哉君子當於踐履中求之志伊尹之所志學顔子之所學通書以存養爲實功以踐履爲實地致知格物爲誠意之驗持敬主一爲成德之本遺書冰輪金井而念慮之澄徹趙閲道贈周茂叔詩光風霽月而胷次之灑落黃庭堅濓溪詩序玉質金聲渾乎内外之無瑕晦庵作明道贊規圓矩方截乎言動之無缺晦庵作伊川贊非茍知之亦允蹈之粹哉伊洛之學也然而論者則曰擬議論誠之篇周子謂成其變化而晦翁疑之注見上自誠之明之章程子謂誠即明也而晦翁又疑之或問誠明之説曰程子諸説皆學者所傳録其以内外道行爲誠明似不親切云云程子之辨雖已得之然未究其立言本意之所以失也其曰誠即明也恐亦不能無誤晦翁深於理學也而操戈若此然則周程果非中庸之㫖歟曰義理之學難言性命之蘊難究疑之者乃所以信之也君子之學寧過於疑毋寧過於信過於疑必有所見焉過於信則口耳乎學非心胷學矣故晦翁之注釋通書曰至誠者實理之自然擬議者所以誠之之事非惑周子也信周子也晦翁注通書擬議章云或曰至誠者實理之自然擬議者所以誠之之事也釋中庸曰誠則無不明明則可以至於誠非異伊川也佐伊川也中庸章句注誠則無不明矣明則可以至於誠矣學者誠能佩中庸味通書步武周程張朱之言則可以造聖賢之閫奥㑹德義之淵源矣噫立則參前輿則倚衡出門如賓使民如祭此魯論之心學孔氏之家法也故曰孟子不言易而深於易論語不言誠而極於誠復論善惡動静之復一陽初動處萬物未生時淵哉康節之言也康節詩語又晦翁録或問一陽初動處萬物未生時以人心觀之便是善惡之端感物而動處曰此是欲動未動之間如怵惕惻隱於赤子入井之初方怵惕惻隱而未成怵惕惻隱之時故上云冬至子之半是康節常要就中間説子之半則未成子方離於亥而爲子方四五分是他要如此説常要説隂陽之間動靜之間昔者聖人作易以擬隂陽之變於陽之消而息於下也聖人乃以復名卦其説則取旣徃而來反之義其爻則有一剛五柔之畫其象則雷在地中以明將奮之意其㫖則碩果不食以取復生之理此見天地生物之心循環之無窮也晦翁答晦叔書但以易傳觀之則可見矣葢天地以生物爲心而此卦之下一陽爻即天地所以生物之心至於復之得名則以此陽之復生而已天地以生物爲心此句自無病昨與南軒論之亦已云無疑矣夫大德敦化而川流不息豈假夫旣消之氣以爲方息之資也亦見其絶於彼而生於此而因以著徃來之象爾是雖氣有開闔物有虛盈而天地之心亘古窮今未始毫釐間斷君子但觀一陽之初動萬物之未生其生意闖然具此全美則所謂天地生物之心者豈不可見乎晦庵答張敬夫論復曰復見天地之心某則以爲天地以生物爲心者也雖氣有開闔物有盈虛而天地之心則亘古窮今未始有毫髮之間斷故陽極於外而復生於内聖人以爲於此可以見天地之心焉葢其復者氣也其所以復者則有理而已而非天地之心生生不息則陽之極也一絶而不復續矣尚何以復生於内而爲闔闢之無窮乎此則所謂動之端者乃一陽之所以動非徒指夫一陽之已動者而言也夜氣固未可謂之天地心然是氣之復處茍求其故則亦可以見天地之心矣伊川曰一陽動之端乃天地生物之心也伊川易傳一陽復於下乃天地生物之心也先儒皆以靜爲見天地之心葢不知動之端乃天地之心也非知道者孰能知之云云晦庵曰陽極復生此可以見天地之心也見上其與康節之言葢相表裏鳴呼微矣哉是理也在造化則爲隂消陽動之機也在人心則爲慾盡理明之初也葢人之爲人太和保合善端無窮所謂復者非曰追夫已放之心而還之録夫已棄之善而屬之亦曰不逐逐於外不汩汩於物則吾心之體即此而存同然之善自有不能已耳方人心之始復也有茁其萌有惻其隱夜氣存於不梏之初善心動於有感之際元之始長而生生無窮春之始露而盎盎莫遏歛於方寸隱於眇綿葢有不可得而限量之妙晦翁復齋銘萬物職職其生不窮孰與尸之造化爲工隂闢陽開於穆無疆全體妙用奚獨始於斯潛陽壯隂而曰昭哉此天地心葢翕無餘斯闢之生意闖矣具此全羙其在於人曰性之仁歛藏方寸包括無垠有茁其萌有惻其隱於以充之四海其準曰惟兹今𣺌綿之間是用齋戒揜身閉關仰主羲圗稽經協𫝊敢贊一辭以詔無倦及其人心之已復也四端充廣萬善呈露誠復而妄除天存而人泯雲行雨施吾之德也鳶飛魚躍吾之誠也天高地下吾仁之流行也於以充之四海其凖而實不出乎一念之間正顔子復禮歸仁之功孟子惻隱擴充之善濓溪誠通誠復之天也噫聖人於復之卦所以贊其可見天地之心而又以爲德之本者其不以此歟嘗謂復者反也言反其本然之善也小人迷復衆人有復聖人無復何者天地之氣所以有復者以其有隂衆人之心所以有復者以其有惡若聖人之心造化爲一赤子不失天理渾然初無間斷孰得以窺其心之起滅耶雖然聖人亦未嘗無也復之理有二有善惡之復有動靜之復旦晝梏亡膠膠擾擾而惻隱羞惡之心躍然於一悟之頃是善惡爲隂陽也若寂然至靜之中而有一念之動是動靜爲隂陽也聖人固不可以善惡言而靜極而動之復豈能無之此又所當熟究而洞識也晦翁文集天地有隂則有復衆人有惡則有復惟聖人則無復若靜而復動則有之但不可以善惡名也又語録或問寂然至靜在此若一念之動此便是復否曰恁地説不盡復有兩様有善惡之復有動靜之復兩様復自不同須要各㸔得分曉然嘗究大易之精㫖考先儒之緒綸又不能無疑焉通書所謂利貞誠之復周子葢以靜而言也周子通書故曰一隂一陽之謂道繼之者善也誠之者性也元亨誠之通利貞誠之復大哉易也性命之源乎云云易傳所謂一陽復於下程子又以動而言也見上夫周程乃師友淵源之學其立説若是異同何耶葢以靜而言者於坤爻指其所歸之地以動而言者於復爻指其所動之處所歸之地利貞之德所動之處又元之德也其言異其意同或者烏可妄疑哉此晦翁以濓溪伊川之説非有所異但所指之地不同其言可爲依據矣晦翁語録或問濓溪説復字就歸處説伊川就動處説所以不同曰然濓溪就坤上説就囬來處説如云利貞者誠之復也誠心復其不善之動而已矣皆是就歸來處説伊川却正就動處説如元亨利貞濓溪就利貞説復字伊川就元字頭説復字以周易卦爻之義推之則伊川之説爲正然濓溪伊川之説道理只一様非有所異只是所指地頭不同嗚呼不有周程無以明大易之㫖不有晦翁無以明周程之論古今源流至論别集卷一
