body:
  text: 古今源流至論别集卷八宋黄履翁撰將權禁衛共權不可專古者典兵之職分為將者無吝權後世典兵之職專為將者多貪權夫有攻取之將有守衞之將攻取之將出入於行伍之間奔走於矢石之下兵無常聚將無常職固無徘徊吝權之意守衞之將從容於殿陛之際循徼於朝夕之頃兵有常守將有專權昜有負固要上之心古之聖人所以防微杜漸之意甚微矣是故兵非不聚也而不得以調其兵權非不專也而隂有以制其權此成周盛時周廬清肅王宫尊嚴而無意外之虞者有由也夫何漢唐之慮不及此耶嘗觀周之兵制無事則散之田畝有役則召以縣師而宿衛常養之兵則有虎賁之士八百人至六軍之徒一軍百人大司馬之屬徒三百有二十八又在虎賁之外然不常有而虎賁之禄比下士足以代耕蓋庶人在官者也夫宿衛有常兵虎賁有常守似若漢唐禁衛之制然攷之書稱太保命仲桓南宫毛俾齊侯吕伋以二干戈虎賁百人逆子釗是齊侯有握兵之重而不敢發兵太保有發兵之權而不得握兵事權相維彼此相制初何害其宿衛之有常守哉嗚呼二兵至末也百士至少也而二三大臣參互職掌是以兵之與將居然若無其為謀也審矣至漢以南北軍為重唐以北禁軍為重故國命實係之平居無事之時初未見其為利害倉卒患難之際一舉手伸縮則輕重隨之此無他握兵發兵之權皆歸一人則職之專者驕之府勢之窮者厲之階此其理之必至也周勃之平諸吕必藉南北軍以誅之乃令人告衛尉毋納吕産蓋懼兵權之相敵是漢之所恃以弭亂者惟南北軍為重耳周勃傳文帝之承大統亦藉南北軍以鎮之是夜即令代邸舊人宋昌為衛將軍兼領其權是漢之所恃以服衆者亦惟南北軍為重耳文帝元年初即大位是夜拜宋昌為衛將軍領南北軍嗚呼南北軍之在漢也如此夫何一移於權臣再移於外戚而漢事去矣霍氏内領尚書外領軍馬而又使其子為奉車都尉領胡越兵其壻為東西衛尉領宿衛卒啓異日之邪謀特以將兵之權足恃矣霍光傳自昭帝時光子禹及兄孫雲皆中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宫衛尉後光薨宣帝更以禹為大司馬冠小冠亡印綬罷右將軍兵屯於是始有邪謀王氏兄弟根據世掌兵柄陽阿侯譚成都侯商紅陽侯立以特進領城門兵成帝世平阿侯譚成都侯商紅陽侯立俱以特進領城門兵莽則始以右將軍兼衛尉後以大司馬領軍事百官表莽以右將軍兼衛尉後拜大司馬卒移漢家之鼎璽亦以將兵之權得專矣此漢典兵之職專而將得以召變也武后時武攸宜歴左右羽林將軍總禁兵十年后之意蓋有在也張柬之將誅張昜之等於是以彦範敬暉為左右羽林故能集事使禁兵尚在諸武之手則柬之無所措其謀張柬之將誅張昜之等引與定䇿以彦範敬暉為左右羽林將軍屬以禁兵與李諶李多祚等討賊就宫中迎中宗至元武門斬昜之等中宗復位韋后欲圖不軌以從子從弟分領左右羽林亦武后用武攸宜之意也元宗時為臨淄王引軍夜起乗其不意斬韋播等羽林之軍相率而應之故能以有功使播等尚得以抗衡則臨淄王安得定其難通鑑嗚呼此禁軍之在唐也如此夫何一變於宦官再變於方鎮而唐業微矣魚朝恩專神䇿之兵代宗吐蕃之難魚朝恩以神䇿兵屯苑中劉國珍任大帥之權宦者吐突承璀傳詔内常侍劉國珍馬朝宗分領昜定幽滄等州李􅅠白居昜等對延英謂古無中人任大帥恐為四方所笑兵要政機勿使參預蕭復言之而不見聽蕭復言艱難以來始用宦者監軍權望太重是曹止可委宫掖兵要政機勿使參預不聽神䇿禁兵乞付大臣柳伉及之而不能用程元振傳栁伉上䟽曰乞斬程元振馳告天下悉出内使𨽻諸州持神䇿兵付大臣帝聞公議不與乃下詔削官爵西頭之勢乃重南衙髙元裕言之而不能行敬宗宦官恣放大臣不得進見髙元裕等諫曰今西頭勢乃重南衙樞宻權過宰相帝不能檢制終唐之世北衙事權一出閹宦予奪廢置自如其意及崔昌遐召朱全忠之兵以制之而唐亦亡韓全晦傳全晦監鳳翔軍劉季述之誅崔昌遐等曰自中人典兵王室愈亂以全晦為左神䇿中尉全晦知崔必除己因諷李茂貞自選士四千宿衛崔亦諷朱全忠内兵三千居南司全忠誅第五可範等八百餘人此唐典兵之職專而將得以稔禍也夫總熊羆矯矯之衆據虎豹岩岩之闗其志昜至於縱肆其權昜至於震慄非分其權奪其志黙制於㝠㝠之中又安能入吾鞭笞駕馭之術哉漢之南北軍唐之北禁軍即周人虎賁宿衛之意周人分其職於調發之時漢唐專其職於出入之頃此漢唐禍亂相繼不及周之遺意也逺矣方漢之用周勃宋昌唐之用柬之臨淄王權宜濟事已非漢唐之獲已况時變事昜漢之所典者權臣外戚唐之所典者宦官小人無怪其事勢之迭變也噫復成周之美意革漢唐之陋政未嘗不嘆我藝祖之逺謀然嘗攷二司之顛末遡三衙之源委而熟知其故矣侍衛司始於梁其名昜世而後定而都指揮則方鎮之軍校號也五代史康義誠等論唐末方鎮之兵多矣凡一軍有指揮使一人而合一州諸軍又有馬歩軍都指揮使一人蓋其卒伍之長也自梁以宣武軍建國因其舊制有在京馬歩軍都指揮使後唐因之至明宗時始更親軍馬歩軍都指揮使時天子自有六軍諸衛之職六軍有統軍諸將有將軍而又以大臣宗室一人判六軍諸衛此朝廷大將天子國兵之舊制也而侍衛親軍者天子自將之私兵也推其名號可知矣天子自為將則都指揮使乃卒伍之都長矣然漢周以來其職益重漢有侍衛司獄凡朝廷大事皆决侍衛獄時史宏肇為都指揮使與宰相樞宻並執國政而宏肇尤專任以至於亡語曰㳙㳙不絶流為江河熒熒不滅炎炎柰何可不戒哉親軍之號始於明宗其後又有殿前都指揮使亦親軍也皆不見其更置之始今天下之兵分屬兩司矣殿前軍始於周簡天下猛士為之而都㸃檢則實位指揮使之上也通畧五代禁旅無復舊制梁太祖始置侍衛馬歩軍周世宗置殿前軍時募天下猛士上為都虞侯受詔簡其技藝精絶者為殿前諸班上受禪悉因其制衙注引石林燕語曰殿前司與侍衛司馬軍歩軍為三其實二司而侍衛司又分置馬歩軍指揮使爾殿前司亦參馬歩軍總於都指揮使故殿前司與馬歩軍兩司三衙分天下兵而領之此祖宗制兵之要也都指揮使本方鎮軍校名自梁起宣武乃以鎮兵因舊號置在京馬歩軍都指揮使而自將之至後唐明宗改為侍衛親軍其後遂不廢殿前軍起於周世宗時太祖為殿前都虞侯詔天下選壯士送京師命太祖擇武藝精髙者為殿前諸班而都㸃檢位都指揮使上太祖實由此受禪歐陽修五代史號精詳乃云不知所始蓋考之未詳也自有兩司而六軍諸衛漸廢今兩司不特為親軍而已天下之兵柄皆在焉其權雖重而軍政號令則在樞宻與漢周間史宏肇之徒為之異者矣漢周以來職位隆重史宏肇之領宿衛也内與鈞樞迭相抗衡見上外領節鎮陵虐官吏史宏肇傳宏肇遷侍衛親軍馬歩軍都指揮使務行殺戮罪無大小皆死宏肇領歸徳其副使月率私錢干緡為獻潁州麴場官麴温與軍將何拯爭官務訟之三司三司直温拯訴之宏肇宏肇已謂潁已屬州而温不先自白乃追温殺之連坐數十人李重進之領宿衛也隂懐異心自相猜忌異日勢窮猶敢䟦扈長編淮南李重進周太祖之甥也始與上俱事世宗分掌内外兵權而重進以上英武心常憚焉恭帝即位出鎮楊州領宿衛如故及上受禪命韓令坤代重進為馬歩軍都指揮使重進不自安招集亡命増城浚隍隂為背叛之計九月己未重進反命石守信王審琦討之十月上親征重進盡室赴火死噫五季失圖國威不振獷然自肆可也大明當天魑魅群伏蓋我藝祖籌之久矣其建隆二年也韓令坤平重進而歸表解軍職延釗賀長春而來又表解軍職而㸃檢之職臣下避不敢居於是天子之朝綱振矣熊克通畧曰建隆二年侍衛都指揮使韓令坤從上親討李重進還又殿前都㸃檢慕容延釗以長春節自澶州來朝並表解軍職閏月以令坤為成徳軍節度使延釗為山南東道節度使自是殿前都㸃檢不復除矣開國謀臣一言悟主杯酒從容轉移間耳曩之侍衛指揮去而之天平曩之侍衛虞侯去而之鎮寧曩之殿前㸃檢曩之殿前指揮又去而之歸徳之忠正間雖遥帶軍職而兵權實不在焉非心邪念氷釋雲散而如石如髙如魏歸鎮幾二十年功名保全老死牖下此豈無所自來哉通畧建隆二年時侍衛副都指揮使石守信殿前都副㸃檢高懐徳殿前都指揮使王審琦侍衛都虞侯張令鐸猶分典禁兵趙普屢以為言請授以他任上不得已乃召守信等與宴道舊相樂因曰朕與卿等昔嘗比肩義同骨肉豈有他哉而言者不已莫若自擇善地各守外藩優㳺卒嵗不亦樂乎守信等謝七月遷守信為侍衛都指揮使領天平節度懐徳為歸德軍節度審琦為忠正軍節度令坤為鎮寧軍節度使並出鎮獨守信尚遥帶軍職注云時諸帥猶典衛兵一旦出之外鎮結以厚渥使以欣然釋去故終獲保全由是石髙魏之族俱蒙選尚尋各歸鎮幾二十年貴重赫奕始終如一光武保全功臣不是過也李長編上既誅李筠及重進一日問趙普曰天下自唐以來凡昜數姓戰闘不息何也普曰此非他故方鎮太重君弱臣強而已今治之無他伩焉惟稍奪其權天下安矣時石守信王審琦等典禁衛但請授以他職上乃召守信等飲謂曰我非爾曹之力不至此然為天子亦大艱難殊不若為節度之樂吾終夕未嘗敢安枕而卧也守信曰今天命已定誰敢有異心曰汝曹雖無異心如麾下之人欲富貴者何一旦黄袍加汝之身汝雖欲不為其可得乎爾曹何不釋去兵權出守大藩多置歌兒舞女日飲酒相歡以終其天年我且與爾曹為婚姻不亦善乎皆拜謝明日咸稱疾詔罷注及太祖與趙普意但不欲守信等典禁軍且豈不令守信等各居方鎮耶太祖云為天子不若為節度使樂是欲守信等為節度也及開寳三年乃罷王彦超等節度蓋司馬記聞誤并三事為一耳自時厥後軍政一新兵之符籍雖在三衙兵之號令實在樞宻其在三衙也即周命齊侯之意其在樞宻也即周命太保之制分司散主體統聯屬使漢唐以來二千餘年間紛紛之變一旦盡去嗚呼藝祖之規模逺矣哉范祖禹奏議伏見樞宻副都承㫖曹誦權馬軍司祖宗兵法天下京兵本於樞宻有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權彼此相維不得專制此所以百三十年無兵禍也自唐李以及五代樞宻之權偏重動為國患由手握禁旅又得興發今副都承㫖為樞宻屬官權任管軍是本兵之地又得握兵合而為一非祖宗制兵本意將才論有事當知用將國家無事邊塵不飛是時也可以言蓄將國家多事羽檄交馳是時也可以言用將當用將之秋而彷徨求蓄將之術君子謂之不知務何者將才未昜得也觀其才於暇豫之際養其氣於舒徐之餘投之以險觀其智嘗之以難觀其决或蓄之以宿衛如漢人羽林之選趙充國甘延夀皆以六郡良家子善騎射補羽林郎或擢之於科目如唐人武舉之制郭子儀由武舉為大帥或求儒將於詩書禮樂之家左傳或取世將於山西六郡之地地里志未戰而知其能否未用而知其短長此無事之規模也若乃奔鯨觸網封豕荐食事起倉卒呼吸風雨茍拘拘然恃蓄將之說毋乃激西江而救涸轍哉雖然天下未用兵常有無將之慮而兵之既用則亦未嘗無將亦在吾用之之道何如耳夫人無勇怯有道使之則怯可為勇士無利鈍有道使之則鈍可為利智可使也愚亦可使也㢘可使也貪亦可使也功可使也過亦可使也詩書元帥固可任而奴虜行伍亦未可棄閥閱名家固可委而山林藪澤亦未可輕精神以感召之氣類以招徠之擢頗牧於禁中走孫吴於堂下亦何至有拊髀之嘆昔漢髙帝奮劒豐沛將未嘗素蓄也然齋壇一拜可以收無雙之信踞洗一見可以控爪牙之布歩將騎將各隨所長則可盡曹灌之材能用將則將未嘗無也光武起自南陽將未嘗預蓄也然岸幘一迎可以屈善兵之援澠池一褒可以激巾車之異歩戰水戰各分所能則可以盡岑異之材能使將則將未嘗無也豈必蓄之而後得哉不然危機告急局面方新且欲擇而試之試而蓄之吾恐授鉞之命未下而赤白嚢之警已趣矣嘗觀康定慶厯初西事煩興劉平既衂康定元年李士彬被元昊將所擒抵延州之下劉元石元孫合軍救延州至三川口遇賊諸軍爭奮殺賊以輕兵薄戰官軍却黄徳和驂馬遁與元孫皆被執圍延州凡七日㑹大雪解去任福復敗慶厯元年諜言元昊謀寇渭州韓琦移鎮戎軍出其兵使任福擊賊桑澤為先鋒朱觀武英繼之琦面受方畧勢未可戰則據險設伏待其歸然後擊之福屯好水以朱觀武英屯洛川邏者傳賊兵少故福等輕之路益逺蒭糧不繼福力戰身被十餘鎗而死王珪望見福麾幟尚在進戰為飛矢中其目死平時所謂將者皆不足恃矣而用兵之久則武㐮㧞於部伍狄青本鄜延黥卒為廵檢司指使寳元二年西賊冦保安青擊走之為右班殿直世衡擢於下僚种世衡放之兄子也以放䕃為將作主簿後僉判鄜州建築城青澗開營田二千頃又課民射人人皆精賊不敢近韓范二公奮於儒生卒能屈西賊之膝韓琦范仲淹分帥陜西軍中有謡曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽建炎南渡初王師屢挫杜充降敵王爕憤軍當時所謂將者不足恃矣用兵之久則如師道出於名家顯忠起於軍陣張劉大將振於偏禆卒能裭强敵之氣天生將材豈嗇於前而豐於後哉則亦祖宗將將之道至此有以使然也昔裴度論憲宗平河西曰豈朝廷威令能制其命哉直以處置得宜能服其心耳此用將之道也以劉澭激之則髙崇文不敢不盡力以李光顔愧之則韓宏不敢不聽其命豈非裴度所謂能服其心者哉嗟夫委兵柄於人手使之盡其死力以拒敵此非朝廷大有以服其心不可也不有以服之則其心輕朝廷之勢慢朝廷之令雖有克敵之功而他日猶有不可測之患肆我藝祖立極猛將疊出豈天降時雨山川出雲之應哉用將之道我藝祖蓋得之矣郭進之在西山軍校越訴則執以賜進此感之以誠也政要郭進在西山有軍校詣闕訟進不法事太祖曰進御下嚴此人有過懼而誣之使送與進令殺之進表謝㑹并人入冦因曰汝有膽氣今捨汝罪令汝掩殺并冦如勝即薦汝其人踴躍果致克㨗進即乞遷職曹彬之請使相官恐大隆則寧賜以錢此勉之以權也曹彬伐江南上始許以使相及還上曰今方隅尚有未服者汝為使相品位極隆肯復力戰耶更候我取太原因賜錢五十萬王全斌伐蜀則脫裘㡌以衣之此結之以恩也王全斌伐蜀冬大雪太祖謂左右曰我被服如此尚寒西征將帥衝犯霜雪遂解裘㡌賜全斌漢瓊等伐江南則出匣劒以警之此懼之以法也長編開寳四年討荆南以匣劒授曹彬曰副帥而下不用命者斬之潘美等皆失色是以感者奮勉者銳戴恩者思報憚法者知誅東征西討所向必克今日欲求用將之術願以藝祖為法將帥恊和將帥相恊則成功將帥以公心相處則以之成事功而有餘將帥以私心自用則以之圖事功而不足嗟夫疆埸之事甚重兵戎之寄至艱局面不常事機沓至呼吸之頃有雷有風進退之間有存有亡所恃以摧敵人張吾軍者將臣閫帥相與戮力也豫之一卦雷出地奮而隠然有和豫之意聖人以是為建侯行師之利則師不可不和也明矣大抵將帥以公心相處則恊力於推車之日合謀於濟舟之頃攻守有殊勢必審訂其可而後行進退有異機必參酌其宜而後决或對壘以攻其腹或間道以擊其背是故㢘藺惟能先公家而後私讎所以安趙於九鼎㢘頗藺相如李郭能以忠義相許涕泣自誓所以濟唐之中興李光弼郭子儀等故曰以之成事功而有餘將帥以私心自用則無率然相應之形為軀蛩自蔽之計此欲主和而彼欲主戰此欲進擊而彼欲退守以節制自居者而不知傾心以相與以兵權自任者而未免角立以相異故崔浩桓温之不恊則連年北伐而無功通鑑鄧艾鍾㑹之相惡則西師雖勝而無益同上故曰以之圖事功而不足噫戰勝攻取非獨智之所能為必有賴於恊謀之力摧堅挫銳非獨力之所能舉必有資於犄角之助此一公一私之間國家之安危兵師之勝負未嘗不相闗也安可以睚眦之私嫌纎芥之小隙而敗乃公事哉嘗觀春秋之時鞌之戰振旅入國士爕後歸不敢掠主帥之名䇿勲勞將郤克先遜不敢掩諸將之功師克在和安得不勝左傳邲之戰師方及河荀林父欲還先縠欲進鄭如晉師彘子欲從欒武子欲不許師既不和安得不敗左傳嗚呼君子觀春秋成敗之迹則膺制閫任總戎者可不謹哉國朝南征之師曹彬以所造之舟成浮梁我師其渡長編王師趨池州守將郭彦走彬入池州先是郝守濬集丁匠自荆南以大舡載竹筏并下朗下黄黒龍船為浮梁或謂江闊古未有浮梁而濟者乃先試於石碑口彬敗江南二萬衆於采石磯詔移石碑鎮浮梁於采石磯繫䌫三日作成不差尺寸王師過之如履平地潘美以所部之衆獲浮梁我師其渡初决秦淮江南兵皆背城而陣時舟楫未具潘美下令曰美提驍騎數萬豈限此一衣帶水而不徑渡乎率所部先濟王師隨之江南兵大敗江南兵將泝流奪采石浮梁美旋擊破之擒鄭賔等七人此曹潘相助之功豈謂議論素不相合而自異耶曹彬潘美二人議論素不相合西伐之役劉光義泝峽流而上以攻其東長編劉光義入峽路連破寨殺其將袁徳宏奪戰艦二百餘艘初蜀於䕫州鏁江為浮梁上設敵棚光義等行上出地圖指其處曰泝流至此勿以舟師爭勝當先遣歩騎潛擊之乃以戰棹夾攻光義未至鏁江二十里捨舟前遶浮梁復引舟而上遂屯兵白帝廟光義發夔州方施開通等州刺史皆迎降王全斌修閣道而入以攻其西同上王全斌以斷棧大軍不得進議取羅川路入蜀康延澤曰羅川路險衆難並濟不如分兵修棧約㑹於深渡可也彦進白全斌許之不數日閣道成遂進擊金山寨又破小漫天寨而全斌亦由羅川至深渡與彦進㑹分三道擊大破之此劉王相恊之力豈謂入蜀有先後而自疑耶長編遂州降光義入城盡以府庫錢帛給軍士諸將欲屠城曹彬禁之乃止先是王全斌既入成都後數日光義始至昶遺餽如初詔書頒賞亦無差降兩路將士始有相疾澶淵之㨗回鑾賞功保吉謂指揮方略皆出繼隆謂宣力用心不及保吉此契丹有請和之舉其與李愬訟裴度之功異矣同上又李愬傳西事之興分閫制敵范仲淹則版築自守仲淹帥延州遣子純佑與趙明先掠其地引兵隨其後至柔逺始號令版築旬日城成賜名大順環慶自是冦益少韓琦則出兵與戰此軍中有膽破之謡事畧范仲淹韓琦經畧西邊俱有威名軍中語曰軍中有一韓西賊聞之骨膽寒軍中有一范西賊聞之驚破膽其與辛武賢沮趙充國之謀逺矣趙充國傳中興諸將間有不睦一念國事釋憾結歡方江上之師未發也二大將失和其心不相恊矣世忠一聞結友之事即欲負荆以謝光世小歴紹興四年劉光世屯建康韓世忠屯鎮江以私隙未平上諭世忠曰大將國家利害所係漢賈復冦恂以私憤幾欲交兵光武一言分之即結友而去卿與光世不謀議者謂失駕馭之術朕甚愧之世忠曰敢不奉詔他日見光世當負荆以謝及江上之師既發也三大將體敵其心若不相下矣光世一聞滅怨之說遂先致書以約韓張同上光世軍在馬家渡張浚軍在采石遂詔光世以兵援世忠且令復移軍建康三大將權相敵兼時私隙莫肯恊心上詔魏矼諭光世曰賊衆我寡合力猶懼不支况軍自為心將何以戰為諸公計當滅怨隙不獨可以報國身亦有利矼勸光世貽書二帥以示無他使為犄角已而二帥皆復書交致其情渡淮之役韓世忠欲借兵而張俊拒之趙鼎既責俊而又遣楊沂中以往然後可以集事六年初俊在淮上謀渡淮北而韓世忠辭以兵少欲摘張俊之將趙宻為助俊拒之謂世忠有見吞之意浚奏乞降聖㫖而俊亦禀於朝趙鼎白上曰浚以宰相督軍號令不行何以舉事乃責俊當禀行命浚奏俊終不肯分軍鼎曰世忠所欲者趙宻耳今楊沂中不減於宻而所統乃御軍誰敢覬覦當令沂中助世忠却發宻入衛浚曰此上䇿也保淮之舉韓世忠業已進兵而劉光世乃欲棄去張浚既責光世又令楊沂中以往然後卒以殄冦同上劉豫兵渡淮入冦先令劉麟等偽胡服於河南千百為群人皆以金為合兵劉光世奏廬州難守且干趙鼎欲還太平州張浚奏敵數少奔命决不復来此必皆豫兵張俊劉光世皆請益兵衆懼欲退合肥之衆浚以書戒俊及光世曰今日之事有進擊無退保韓世忠統兵過渡遇敵力戰既而亦還楚州浚奏若諸將渡江則無淮南而長江之險與敵共賊得淮南江南其可保乎今淮西之冦正當合兵一有退意大事去矣上手書報浚覽所奏甚明劉光世已捨廬州而退浚星馳至采石遣人諭光世之衆曰若有一渡江即斬以徇且督光世復還廬州光世不得已遣王徳進至金前正遇麟游兵敗之浚遣楊沂中至泗州與俊合沂中悉衆以出至李家灣大破其衆猊逃去麟亦望風而遁大抵兵重事也其謀事則貴乎和其存心則主乎公以之用師何向不克以之禦敵有動斯得矣然又論之恊同心力奔走事功此人臣之功也駕馭英豪役使勇智此人君之權也昔者憲宗淮西之役兵在韓洪是洪未嘗與裴度同心也裴欲破賊而洪則倚賊為重一時之事可謂難矣惟憲宗之意向一定故度得以奮然而勇往觀其賊在則歸闕無日之言而淮西已定矣所謂韓洪之謀豈不卒游於廟筭之内哉武宗澤潞之役兵在何洪敬是洪敬亦不足以知徳裕也諸將欲戰而洪敬猶未動他人處之豈不為之失措惟武宗之意向一定故徳裕得以竭力而從事觀其威斷貴定之言而澤潞不足平矣所謂洪敬之謀豈不卒歸於鞭笞駕御之下哉然則國朝平僭偽破勁敵諸將所以同心効力於驅馳之間者固制閫將臣之忠亦祖宗鞭䇿籠絡之有其計歟邊將待邊將寧過乎寛善將將者莫如漢髙帝不善將將者亦莫如漢高帝方劉項相持之時勇將謀臣雲合輻湊毛髪絲粟皆歸帝駕馭之下故登壇以拜推食以賜感其心也韓信傳踞洗以見供帳以待折其氣也黥布傳捐金不問讒言不疑示其誠也陳平傳或擢於降虜之亡卒韓信或㧞於販繒之匹夫灌嬰或取於吹簫之覊民周勃顛倒掌股不知其術昔孫綽所謂髙祖馭虎光武馭龍石勒嘆曰若遇漢髙祖當北面事之則帝將將之術亦高矣然天下已定之後環視四顧無一足恃慨然有感於安得猛士之歌信亡於胡布亦通於胡韓王信欒布傳各圖飛揚難施籠絡是何得其用於前而乏其用於後耶蓋帝知御將之道而不知御邊將之道也夫所謂御邊將者寛繩尺假事權俾之展布四體毋為雲中差級之守馮唐傳論魏尚布誠心去讒言俾之得效死力毋為河南代任之將祖逖守河南因為讒言所間命戴若思代之久其嵗月軍民素孚如㐮陽峴山之愛則絶南顧之憂羊祜守㐮陽予其軍租士卒效力如鴈門幕府之利則免北冦之虞李牧自予自奪而無掣肘之患或進或退而無中制之嫌有兵足以自固有財足以自用士卒感其恩吏民愛其徳敵國畏其威不然御之如束濕待之如詐狙此信布所以有通胡之志者亦髙帝之術太嚴矣譬如養鷹本以搏擊也慮有凌霄往往繩束太甚彼固帖然不敢髙舉亦安能從禽哉大抵守將之權與攻將異寧過乎寛毋寧過乎嚴寧用乎恩毋寧用乎法則操縱闔闢之權妙矣吾觀髙帝之術窮於御將未嘗不三嘆我藝祖神謀妙筭之髙也方僭偽砥平蓬孛雲豁樽酒片言兵權盡釋帝之所用御將之術固嚴矣至待邊將又何其闊畧寛厚耶且平蜀之將掠人子女政要乾徳中責授節度使王全斌崔彦進為留後左衛上將王仁贍為右衛大將軍制授内客省使曹彬宣徽南院使侍衛都指揮使劉義允節度使皆收蜀將帥也初孟昶降全斌等不能正身率下爭取珠玉及取人婦女太祖聞蜀復亂及全斌歸闕太祖召王仁贍詰之仁贍徧指諸將過失求欲自解太祖曰納李廷珪妓女開徳豐庫取珠貝亦全斌等耶富弼釋曰賞罰人主之權衡用其權無他賞當功罰當罪而已全斌雖有平蜀之功貪恣不法復致蜀亂故不可不貶降曹彬有功無過故當顯用也賞罰如是之明宜乎將相盡力守闗南之將亦掠人子女事畧李漢超在闗南人有訟漢超強取其女為妾及貨而不償者太祖問曰汝女可適何人曰農家也漢超未至闗南如何曰嵗苦侵暴太祖曰漢超朕之貴臣為其妾不猶愈於農婦乎使漢超不守闗南能保汝家之所有乎責而遣之宻使喻漢超曰亟還其女并貨勿復為也而漢超感泣誓以死報平蜀之將掠人財物見上守闗南之將亦掠人財物見上所犯同也所罰亦同可也今也責全斌而不責漢超我太祖何意也曰明其約束正其典憲待攻將之法也寛其法制略其細故待守將之法也嗚呼豈特待李漢超之恕哉有訟郭進者則反付郭進政要郭進在西山有軍校指訟進不法事太祖曰進御下嚴此人有過懼而誣之使送與進令殺之進表謝㑹并人入冦因曰汝有膽氣今捨汝罪令汝掩殺并冦如勝即薦汝其人踴躍果致克㨗即乞遷職有間劉進者則反賚劉進政要隰州招討將劉進勇力絶人以少擊衆并人患之為臘書間進晉師得之以聞太祖令械進送闕下刺史李謙溥上言聞進為并人所惡此乃間也帝悟釋之賜以禁軍都校戎帳服具或二十年或八九年何任之之專也長編慶厯八年張方平上言祖宗任李漢超賀惟忠李謙溥姚内斌董遵誨等或二十年或猶八九年假其事權畧其細故不為問言移昜又不與髙官使其志未滿不怠於為善也或予以租賦或聽其貿昜何予之之厚也寳訓太祖留心諸帥命漢超等以禦北虜郭進等以禦太原趙賛等以備西戎筦𣙜之利悉以予之聴其貿昜凡軍中事許便宜二十年間無西北之憂或閫外之事一以付之咸平四年楊億奏疏太祖命姚内斌領慶州董遵誨領環州二人所統之兵才五六千人而已閫外之事一以付之軍市之租不從中復用能士卒致命羗戎畏服或軍中之事許以便宜寳訓見上何待之之寛也用能士卒致死羗戎懾氣二十年間無西北之憂者有由矣詩曰不愆不忘率由舊章今三邊鼎立諸閫碁布正事機沓至之秋欲講明御將之術請以藝祖為法講武論古今講武之制昔成周盛時越裳底貢肅慎來朝天下若無事矣而周禮一書講明武備若不能以一日安嗚呼聖人之為國慮也逺矣哉嘗觀周制其在春夏也有振旅茇舍之制食貨志春振旅以蒐夏茇舍以苖秋治兵以獮冬大閱以狩皆於農隙以講武焉其在秋冬也有治兵大閱之制見上是四時皆教也其辨名號也有縣鄙家鄉官野之異禮夏官其辨旗物也有諸侯軍吏鄙野之異同上是内外皆教也四時皆閱其𨽻之也精内外逓教其用之也利此成周所以得持守之道歟自秦以講武為角觝之戱𨽻兵之法間見秋冬而四時之制遂廢前刑法志春秋之後强吞弱小並為戰國魯講武之禮以為戯樂用相誇視而秦更名角觝先王之禮設於滛樂中矣田又月令孟秋乃命將帥選士厲兵季秋天子乃命獵以習五戎至孟冬乃命將相講武習射自秦銷鋒以為罷武之計𨽻兵之法僅行中都而内外之教又廢秦銷鋒鏑鑄為金人十二漢興鑒秦其當時教兵之法畧備焉内有乗輿之制外有都試之法然乗之以孟秋而志魏禮曰十月後禮儀志立秋之日自郊禮始畢乃掦我威斬牲薦陵廟還宫齋束帛以賜武官皆𨽻兵法習戰陣之儀斬牲之禮名曰貙劉兵官皆𨽻孫吴六十四陣名曰乗之劉昭補注曰月令天子講武習射御角力盧植曰角力有如漢家乗之引蹶蹋踘之屬也餘見下注都試以八月而傳翟義曰九月前漢延夀傳及都試講武設斧鉞旌旗注郡守八月都試餘見翟方進子義傳云雖秋冬行禮非有古人四時之制然内外𨽻兵其法猶有遺意其在孟秋則乗輿御戎路執弩射牲齎束帛賜武官俾𨽻孫吴之法習戰陣之儀其儀甚設也後禮儀志立秋之日其儀乗輿御戎路白馬朱鬛射執弩射牲以鹿麛太宰令謁者各一人載獲車馳驅送陵廟還宫餘見上其在十月則車駕幸長安水南門㑹五營之士為八陣之法其事甚重也魏書曰建安二十一年其儀雖異其說雖别然皆以乗輿為名此漢京師講武之制然爾其在諸郡則毎嵗八月有郡守都尉課都試之功凡車騎材官樓船各習焉故漢光禄挈令諸當試者不㑹都所免之是已髙帝紀十一年七月上發上郡北地隴西車騎巴蜀材官及中尉卒三萬人又應劭注曰材官有材力者又張晏曰材官騎士習射御馳驅戰陣常以八月太守都尉令丞長㑹都試課殿最水處則習樓船邊郡將萬騎行陣塞林又前漢燕王旦傳將軍都郎羽林張晏曰都試郎羽也師古曰都大也謂大㑹試之漢光禄挈令諸當試者不㑹都折免之其在王國則講武之秋有内史中尉行都試之事凡平時皆不擅發焉故武帝賜燕王旦書曰非教士不得召是已前燕王旦傳賜䇿曰毋乃廢備也非教士不得從召顔師古曰凡邉之備不可廢張晏曰言不素習不得應召此漢郡國講武之制然爾光武起自兵間久厭武事由是罷尉侯之職無都試之役廢車騎材官樓船之士惟京師𨽻兵而外之武備盡弛矣光武紀建武三年罷郡國都尉官後百官志建武六年省諸郡都尉惟邊尉往往置都尉及屬國都尉又建武七年令國有衆軍並多精勇且罷輕車騎士材官樓船士及軍假吏令還復民伍又建武二十二年詔罷諸邊亭侯吏卒云云推原其由蓋自西都之季都試或以為患韓延夀以試士僭擬不道誅本傳御史按延夀在東都試騎士治飾兵車畫龍虎朱雀延夀衣黄赭方領駕四馬𫝊棇建幢棨植係羽戴車歌軍功曹引軍皆駕四馬戴棨㦸分騎為伍分左右部軍假司馬千人持幢旁轂歌者兊居射室望見延夀車噭咷楚歌延夀坐射室騎吏持㦸夾陛列立騎士從者帶弓􅀈羅后令騎士兵車四兩营陣被甲鞮鞪居馬上抱弩頁蘭又使騎士戯車走馬盗驂望之劾奏延夀上僭不道坐棄市噭音呌咷他釣切鞮丁溪切鞪莫侯切而翟義之討王莽王莽傳東郡太守翟義都試勒車騎因發莽命立嚴鄉侯劉信為天子移檄郡國言莽毒殺平帝攝天子位欲絶漢室今共行天罰誅莽共讀曰恭李通之勸光武李通𫝊光武避事在宛通聞之即遣弟軼迎光武因備言其計乃遂相約結定謀議以材官都試騎士日欲劫前隊大夫及屬正因以號令大衆乃使光武與軼歸春陵舉兵以相應皆因秋試之日因動軍旅誅守長號令起軍旅光武懲之遂罷其事又自以國有衆軍並多精勇見上可無假於外郡兵也遂一切罷之專以國軍為用其後國軍疲於奔命殆不可繼又於邊郡置義從諸兵叚紀明𫝊成帝延禧四年冬上郡沈氏隴西牢姐烏娱諸種羗兵冦并凉二州紀明將湟中義從討之凉州刺史郭閎貪其有功稽固紀明軍使不得進義從從夕鳴鄉皆反叛閎歸罪於紀明朝廷知為閎所誣詔問其狀復拜議郎遷并州刺史時須郡等諸種羗五六千人冦武威張掖酒泉燒人廬舍六年冦勢轉盛凉州幾亡復以紀明為護羗都尉明年春羗封繆良多郡律等酋豪三百五十五人率二千落詣紀明降當煎勒姐種猶自屯結冬紀明將萬餘人擊破之斬其酋豪首虜四千餘人八年春紀明復擊姐勒種斬首四百餘級降者二千餘人夏進擊當煎種於湟中大破之首虜數千人兄破西羗斬首二萬三千級虜生口數萬人馬牛羊八十萬頭降者萬餘落永康元年當煎諸種復反紀明復追擊於鸞鳥大破之殺其渠帥斬首三千餘級西羗於此弭定而東羗先零等數冦擾二州建寧元年春紀明將兵萬餘人與先零諸種戰於逢義山虜衆大潰斬首八千餘級驢牛馬羊等二十八萬頭東羗盡定外兵既重則内伍太弱是以京師有變則邊郡長驅而至何進傳進素知中官天下所疾袁紹亦素有謀遂與紹定籌䇿以其計白太后不聽後進為尚方監渠詐以太后詔斬進進部曲將吴康張瑋聞進被害袁紹乃引兵屯朱雀闕下勒兵捕宦者二千餘人董卓遂廢帝雖漢之亡因於宦戚爭政使邊兵不熾漢之亡不若是之速善乎應劭之論曰天生五材誰能去兵自郡國罷車騎材官之後官無警捕實啓戎心一方有難三面救之取辦黔首不及講其射御驅之以即强敵是以毎戰常負不教而戰是謂棄之迹其禍敗光武豈能逃其責哉百官志注應劭漢官曰蓋天生五材民並用之廢一不可誰能去兵兵之設尚矣昜稱弦木為弧剡木為矢弧矢之利以威天下春秋三時務農一時講武詩美公劉匪居匪康入耕出載乃還既粮干戈戚揚四方莫當自郡國罷材官騎士之後官無警備實啓冦心一方有難三面救之發興雷震煙蒸電散一切取辦黔首囂然不及講其射御用其戒警一旦驅之以即強敵尢鳩鵲擁鷹鸇豚羊弋狼虎是以毎嵗良負王旅不振張角攘挾以為遐近揺蕩八州並發煙炎逢天牧守裊裂流血成川爾乃逺召三邊殊俗之兵非我族類忿鶩縱横多僵善良以為已功則貨糞土哀夫民切流遷之咎見出在兹不教而戰是謂棄之迹其禍敗豈虚也哉我太祖加意軍政其講之有常練之有法四時講武之儀著之開寳通禮可覆也仁宗天聖中李俶儀閱武曰開寳通禮有四時講武儀初彊侯未平多親閱武試按駁角射或大閱西郊建隆三年閲武西郊上曰晉邊衛兵數十萬然可用者寡朕親校其擊刺騎射之藝悉為精銳云云或習戰朱明池乾徳元年鑿池朱明門外選卒號龍虎軍習戰池中或閱兵講武殿乾徳三年上御講武殿閱諸道兵得萬餘人屬侍衛司擊刺騎射悉為精銳而見用老弱怯懦安於剰員而不辭建隆二年令殿前侍衛及非兵騎勇者一其籍老弱怯懦者處之剰員百萬貔貅一可當百東征西討飄乎振蕩吁有由矣太宗真宗承之軍容愈肅興國間築楊村䑓大閱同上太平興國間築䑓楊村備大閱之禮咸平初幸飛山教場訓練同上咸平初闢場東武原發卒㑹村其后幸飛山教場躬親訓練故千乗萬騎周旋如一太平興國二年崔翰分布士伍建五色旗以號令士卒毎教旗指授則萬乗千騎周旋如一甲兵之盛近代無比上悅乃以令嚴賜翰殿庭進退容止中節至道元年上閱武便殿衛士有挽弓及一石五斗者矢二十發綽有餘力又令騎兵歩兵東西列陣觀其進退容止中節上曰此殿庭間数百人爾猶有兵威可觀况堂堂之陣數萬成列者哉近京補禁衛皆為精兵咸平四年募近京強士補禁衛詔髙峻教閱行伍整肅上曰昨日村民皆為精兵矣祖宗之不忘武備也如此雖然此京師閱武之制也然州郡所存率皆疲弱循習已久外備不修大郡給十人小郡給五人以充常從名曰長吏實同於人滁州守禦代以白直淮陽重鎮與滁無異去滁而黄復不及滁即三郡推之他可知矣三年王禹偁言太祖之初十分天下有其七太宗嗣戴天下一家義者乃合江淮諸郡毀城隍弛武備者三十餘年書生領州大郡給十人小郡給五人以充常從號曰長吏實同於人名為郡城蕩若平地臣比在滁州值發兵漕闗中城無人守禦乃以白直代主闗閉及從淮陽稱為重鎮乃與滁州無異今黄州城池器甲復不及滁陽萬一竊發何以支吾望令江淮郡許置全城守禦軍士二三百人嗚呼祖宗之意有在也蓋太祖鑒前代之弊收藩鎮之權天下精兵悉萃京師况定都陳留四無扞蔽其勢必為居重馭輕之道張方平言京師古之陳留郡四通八達之地都城四面而無險阻之固藩籬之限太祖始制藩鎮之權屯兵於内選諸道驍勇者稱禁旅乾徳三年令天下官吏擇本道籍其名選都下以補禁旅之闕取禁直伉健者𨽻親軍太平興國三年後苑親閱禁軍取伉健者𨽻親軍罷軟老弱悉分配外州故在内而强在外而弱在内而勇在外而怯也自王元之一言於咸平三年之間見上稍稍修置外兵増氣陜西之保毅選中者得升則置於咸平之四年四年詔陜西民五家出一人號保毅軍給資糧與正兵分戌吴倩與運使主其事凡得六萬八千餘人其沿邊先選中者亦升為禁軍號保㨗云云沿邊之振武簡集者得補則置於景徳之元年元年陜西運使言西南沿邊諸州於保毅之軍内簡金成振武軍四十指揮自立北軍邊聲頗振戌不敢冦河北之禁軍由廂兵而教習者得預則置於祥符之九年又上封者言諸路廂軍無使征役祥符九年詔河北金城揀料本城廂兵五百人置營教習升為禁軍然猶未盛也慶厯初西戎阻命始黥民兵以補軍籍陞諸州廂軍以充禁旅既増保㨗又置宣毅比及三年又置保毅内外通置禁軍四十餘萬通三朝共八九十萬而鄉軍廂軍不與焉而後兵大備矣張方平言康定之末慶厯之初議刺民兵極論其害今曰果然太祖朝兵不及十五萬太宗朝不過四十萬祥符已後稍稍消伏向因西戎阻命始籍民兵俄黔配補軍籍升諸州廂軍以充禁旅陜西河北京東京西増置保㨗一百八十五指揮武衛七十四指揮宣毅一百六十四指揮慶厯三年因王倫張海等賊於江淮荆浙福建諸路又添保毅等二十四指揮凡内外増置禁軍約四十二餘萬人通三朝兵八十萬其廂軍鄉軍軍議軍不與此數云云大抵人無勇怯有道以作之則怯者亦勇人無強弱有道以教之則弱者亦强愚觀慶厯以後士氣益伸邊威愈壯外而蛇豕甘心請命内而狗鼠迸迹不存者無非教閱之有時訓練之有法耳今之兵容何如哉夫近而三衙本拱扈宫城以為根本之地也逺而諸軍本屏翰州郡以為爪牙之計也今試觀之以戈矛器刃自淬者幾人以弓弩箭鏃自厲者幾人以心膽膂力自奮者幾人殿歩諸司皆市井浮浪之徒諸路禁旅盡田中脆弱之夫果能驍勇過人如武雄之軍乎乾徳中籍諸道驍勇兵送闕下太祖團結為武雄軍果能分教戰勝如陜西之軍乎寳元間元昊叛命屢戰不利范仲淹隨部分而教之朝廷推其法於諸路與夏人戰敗之聖政宣借差借占留者甚衆虛額虛名差破者甚濫三司雖有旬教月教春秋大教然反以是為官吏賞賜軍將燕犒之目何有於較藝諸郡春秋二教雖差按教之官然反以是為路分鈐轄弄權搔擾州縣之資何有於按閱乾徳嘗自閱侍衛一司矣見上至道嘗親閱衛士矣見上熙寧中嘗禁私役禁軍矣熙寧中私筏禁軍雖經郊敘復求不與親民差遣淳熙初嘗責守臣教閲矣聖政淳熙二年上曰諸路某軍士軍弓手須常教閱禁在守臣遣戻坐罪今誠能舉是制而行之則治兵蒐卒其庶乎古今源流至論别集卷八
