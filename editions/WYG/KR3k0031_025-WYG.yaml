body:
  text: 古今源流至論續集卷五宋林駉撰鬻爵王者代天爵人尤宜謹之豈非王嘉之言乎嘉何以言之感時而言也夫人主擅威福之柄命爵詔禄所得専也曰崇徳記文王世子宗廟之中以爵為位崇徳也曰以賢禮地官大司徒因民之常施十有二敎十有一曰以賢制爵截乎不敢以輕畀曰不瀆記緇衣爵不瀆而民作愿曰不踰左成十八年爵不踰徳凜乎不敢以過予是何其謹重若此哉盖位天位也禄天禄也孟子云五服之章天所以命有徳書臯陶非一人所得私也經曰論定然後官之任官然後爵之記𫝊曰惟名與器不可假人左傳誠以一爵之差天威不違顔咫尺凜乎其可畏也以是知爵禄之柄雖人主之所擅而非人主之所可私私之不可鬻之可乎嘗攷鬻爵之制實始於漢王嘉漢人也代天之言得不為漢發哉觀漢高當草昧之初将欲收拾人材以開一代之治而曰有能從吾遊者吾能尊顯之本紀至於天下既定第蕭何之次以服衆議張良𫝊先雍齒之侯以息偶語同上是亦一已之私然而未甚失也夫何文帝從晁錯備邉之言令民納粟以拜爵晁錯傳景帝之世上郡之旱而復脩賣爵之令至裁其價以招人通典及食貨志云孝景時上郡以西旱復脩賣爵令而裁其價以招人徒役作得輸粟於縣官以除罪則稍非孝文之制矣其後武帝以撃胡之費又創立武功爵令人得以入貲而補吏元朔元年國用空竭有司議令人得賣爵及贖罪請置賞官名曰武功爵云故卜式首以家財輸邉乃至超拜中郎賜爵左庶長告天下以風百姓元鼎初豪富皆争匿財不助縣官惟卜式數求入財天子乃超拜式為中郎賜爵左庶長田十頃告天下以風百姓則吏道雜而多端矣雖然亦可以得人也有以貲拜郎為廷尉而天下無寃民者張釋之有入錢補謁者守潁川而治行第一者黄霸嗚呼作法於凉其弊尤貪左𫝊云况孝文作俑於先景武循襲於後是宜東都之季其弊尤甚有吏人入榖而得闗内侯者後漢永安二年天下水旱用度不足三公奏請令吏人入榖得闗内侯有銅臭入錢以買三公者靈帝開賣官之路廷尉崔烈入錢五百萬以買司徒其子鈞曰大人不當為三公論者嫌其銅臭馴而至於晉武帝之時賣官得錢入私門晉武帝太康三年劉毅曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之乃不如也唐至徳之後納錢百千則賜明經唐至徳三年鄭叔請奏伏敕納錢百千文與明經出身不識文字者加三十千品秩耗弊選舉冗濫至是極矣國朝諸科並建數路得人無非奉若天道書至於鬻爵雖間舉行皆為權宜之制故入粟六百石與補上造之請非備邉不許也咸平末河北轉運使劉綜上言令民入粟備邉六百石補上造萬二千石為大庶長事存典故利入公家上慮爵賞之濫重惜其事宰相言故事具存行之無損行之出粟五千餘石賜第班行之請非補之則不許也天禧二年學究鄭可状本州民闕食願出粟五千六百石賑濟望賜第選班行本㫖不行晁逈李維上言臣等商度損餘補乏為利亦大望令宰臣定議特從其請俟豐稔即止或以賑水旱太宗時州郡水旱有艱食者許富民入粟賑貸等第補官或以備糴本熈寧七年賜敕誥補貼賑貸涇原環慶路饑民及為永興常平糴本無非為權宜之制誠以鬻爵之法雖所以濟人事之不及非所以體天道之至公故隨舉隨罷終不以為經久之䇿淳熈之君曰理財有道均節出入足矣安用輕官爵以益貨財淳熈三年詔鬻爵非古制也理財有道均節出入足矣安用輕官爵以益貨財朕甚不取自今除歉嵗民愿入粟賑饑有裕於衆聽取㫖補官其餘一切住罷則其不得已之意為可知矣元祐之臣曰納粟不如資䕃資䕃不如進士元祐元年上官均言百司胥吏主行文書積年寡過例該禄仕及豪右之家以賞受官其才品庸下素不知義又外䑓郡守奨薦之所不及彼自分其卑賤豈復有奮勵之意其視䕃子弟聞父兄之教少壮就官有鄉進之心宜有間矣由此觀之納粟胥吏不如補䕃補䕃不如進士理之必然也又以為四者之冗有可罷者納粟得官也則其輕重之意從可知矣今日邉備未徹國計未豐舉行鬻爵之制是亦祖宗權宜之術然必得其所以處之之道可以俯仰無愧焉處之何如與之服飾如康定之制可也康定元年尹洙上䟽請鬻爵為士軍號營房其鬻爵之法凡入粟五百斛為上爵許以珠金為婦女服飾得與本部七品官接坐犯罪聽贖入粟百斛為下爵許蓄女使以銀為飲器與之免役如嘉祐之制可也嘉祐六年詔凡入貲為郎至升朝官户役皆免之京官不得免衙前自餘免其身而已與之監臨物務而不與之叅軍判官如慶厯之制亦可也慶七年詔流内銓應納粟授官人不除司理司法叅軍自上州判官止令監臨物務從李東之請也雖鬻何病焉鬻僧三代而上王政脩明民有常業而不知為僧三代而下王政廢闕民無常業始起而為僧韓子曰古之為民者四今之為民者六原道歐陽子曰井田廢而兼并游惰之姦起本論盖傷之也惟其傷之是以闢之故著書立言直欲人其人火其書明先王之道以道之原道脩仁義之本以勝之本論觗排攘斥不使之賊吾良民也有王者作補王政之闕脩王教之廢以正人之惑可也顧可鬻之以開其端歟吾嘗攷其源流佛之為教古無有也東漢以來始入中國漢明帝時浮屠之教入中國然未度僧也至唐元宗聽楊國忠之言始納錢以度僧時安樂山反楊國忠以為正庫物不可以給乃遣侍御史崔衆至太原納錢度僧尼道士旬日得百萬緡然則鬻度之法創於此歟嗚呼四民有常業古之道也彼其不蠶而衣不耕而食滅君臣廢父子悖理傷化甚矣一人為僧一夫失業故妄度姦人使壊正法姚崇為元宗言之唐紀若不鈐制當失六十萬丁李徳裕為穆宗言之唐紀夫何自唐以來逓相祖襲至于今而不廢歟噫我知之矣不過借是以為豐財之術也抑豈知此端既開趍者瀾倒天下之民失業者衆財果可豐歟國朝熈寧以前日就裁損天子曰經業精熟方許籍記雍熈二年詔自今經業精熟方許籍記否則曰四千未度當降約束至道元年帝覽泉州一嵗未度者四千餘人聳然曰一夫耕三人食尚有餒者近世一夫耕迨至十人食天下黎民安得不重困當降約束大臣曰所度皆惰農游手不可天聖四年宰臣王曾言剃度太多皆惰農游手之人無益政化張知白曰臣任樞宻日嘗斷劫盗一火皆是僧行上曰自今懲革勿使太濫否則曰所度皆亡頼姦人不可嘉祐三年賈昌朝奏京師僧寺多招納亡頼游民為弟子或藏匿亡命姦人自今皆取鄉貫保任方聽收納詔從之其在當時或五十而度一人至和初陳執中執政因乾元節聽僧五十度一人既而言者以為不可復百人度一人或百人而度一人至和元年詔乾元節度僧限百人度一人至熈寧以後則冗濫矣河東修城則以僧牒熈寧七年給度牒五百道付河東運使修城陜西糴榖則以僧牒熈寜三年賜五百道度牒付陜西宣撫司易見錢糴榖永興糴本則以僧牒熈寧七年賜度牒二千五百道賑涇原環慶路饑民及永興路常平糴本其在當時價至百九十千百九十千未止也又至三百千三百千未止也元豐七年以下言度牒已著令每道為錢百三十千檢㑹䕫州路每道三百千以次减為百九十千價高處别取㫖從之盖熈寜以前重本抑末不以鬻牒為利熈寧以後務末亡本必以鬻牒為利惟熈寧以前無所利乎此也故自嘉祐至治平凡七萬八千通十三年計之嵗之所度止於六千也惟熈寧以後有所利乎此也故自熈寜之初至八年凡八萬六千通八年計之嵗之所鬻不啻一萬也熈寜八年上批勘㑹賣度牒數呈有司言自嘉祐至治平總十三年給七萬八千餘道熈寜至今八年給八萬九千餘道然我朝諸君子嘗有言焉熈寧以前王公曾言其多宋公祁言其冗熈寧以後程公顥言不鬻錢曾公輔乞並裁損並長編此皆切時救弊之言然亦非知本之論也我高宗嘗曰一人為僧則一夫不耕其所失豈止一度牒之利紹興七年獻言之人有欲多賣度牒者朕以為不然一度牒所得不過一二百千一人為僧則一夫不耕其所失豈止一度牒之利又曰一夫受田百畆一夫為僧即百畆之田不耕矣二十七年上曰今田萊多荒若更賣度牒是驅農為僧且一夫受田百畆一夫為僧即百畆之田不耕矣朕所以不給度牒者正恐僧徒多則不耕者衆矣噫聖謨洋洋嘉言孔彰三代而下知本者其惟高宗乎三公以太師太傅太保為三公者周也以丞相大司馬御史大夫為三公者漢也以太尉司徒司空為三公者後漢至唐大抵然也國朝始取隋唐之制命太尉司徒司空為之後復成周之名以太師太傅太保為之此三公沿革之本末爾按成王作周官曰立太師太傅太保兹惟三公論道經邦爕理隂陽書周官全文則太師太𫝊太保周之三公也然三公之位實兼六卿之職所謂鄉老二鄉則公一人初無司存通典注周禮王畿有六鄉每二鄉則公一人盖一公領二鄉也非必親治二鄉盖與王坐而論道者也成王時周公以公兼冡宰召公以公兼宗伯蘇忿生以公兼司㓂康王即位召太保奭芮伯彤伯畢公衛侯毛公則是六卿之中召公畢公毛公亦皆兼三公之職尚書顧命又通典按顧命太保領冡宰畢公領司馬毛公領司空則有芮伯為司徒彤伯為宗伯衛侯為司㓂則周時三公兼一卿之職云云故𫝊云司徒公司馬公司空公是也尚書杜佑通典以司馬主天司徒主人司空主土是為三公豈非以公兼卿職而言乎通典或說司馬主天司徒主人司空主土是為三公注云韓詩外𫝊隂陽不和責之司馬君臣不正責之司徒山陵崩弛責之司空按丙吉為丞相自謂三公典調和隂陽本𫝊王尊劾丞相衡御史大夫譚位三公負下㒺上本𫝊王根為大司馬杜鄴言根前為三公比周杜鄴𫝊則丞相太尉御史大夫漢之三公也然太尉本主兵之職漢百官表上太尉金印紫綬掌武事御史大夫特副丞相之官同上御史大夫銀印青綬掌副丞相乃與丞相並列已失古誼况得稱為公乎夫以大司馬之官得為三公者盖自武帝寵假大司馬之權而冠以大将軍之號終漢之世大司馬専主國柄尤重於相權爾漢武紀元狩四年初置大司馬以冠将軍之號按漢武帝初命霍光為大司馬外領軍馬内典尚書其後董賢王鳯王莽為之以御史大夫之官亦得列為三公者盖自成帝從何武之請以御史大夫為大司空自是遂與丞相鈞禮爾成帝綏和元年更御史大夫為大司空表上又何武𫝊云云杜佑通典以漢丞相大司馬御史大夫為三公者豈非以權重而稱公乎通典注哀帝時議以漢舊無司徒故定三公之名曰大司馬大司徒大司空史記曰公孫宏以春秋布衣為天子三公漢初因秦置丞相而宏為之則丞相為三公矣又云大司馬大司徒大司空為三公按後漢志曰太尉公主天司徒公主人司空公主地則太尉司徒司空東漢之三公也後漢志太尉公主天部太常衛尉光禄勲司徒公主人部太僕鴻臚廷尉司空主地部宗正少府司農然多以九卿為之通典盖多以九卿為之且周以三公而兼六官後漢以三公而部九卿似有古意然三公之外復以太傅為上公果何議耶通典後漢惟有太傅一人謂之上公若三公災異冊免則始於徐防後漢日蝕星流及大雨雹等災異者惟免太尉自徐防為太尉始凡天地災變三公皆免三公在外冊拜則始於張溫靈帝臨朝始遣使者就長安拜張溫為太尉三公在外自溫始三公封為列侯則始於崔林初封司空崔林為安陽亭侯三公皆封列侯自林始也自是而後相仍不改魏則拜太尉司徒司空之外而增置太保黄初二年又分三公户邑封子弟各一人為列侯末年增置太保晉則加太宰太傅太保司馬将軍之官而為八公晉武帝即位之初以安平王孚為太宰鄭仲為太傅王祥為太保義陽王子初為太尉何曾為司徒荀顗為司空石苞為大司馬陳騫為大将軍凡八公同時並置惟無丞相焉時拜八公同辰攀雲附翼者也遂以太傅太保為上公宋則仍八公之官而不名言為八公宋皆有八公之官而不言為八公也並通典齊之三公唯有太傅通典齊時三公唯有太傅梁之三公復置七貟梁有丞相太宰太傅太保大司馬大将軍太尉司徒司空開府儀同三司等官陳之三公並為贈官陳以丞相太宰太傅太保大司馬大将軍並為贈官由魏而齊由隋而唐無所更革皆以太尉司徒司空為三矣後魏以太師太傅太保謂之三師上公也大司馬大将軍謂之二大太尉司徒司空謂之三公北齊皆有三師二大三公之官並置府隋置三師不置僚属不主事惟置太尉司徒司空以為三公叅議國之三事唐復置三師以師範億人儀刑四海置三公以論道經邦爕理隂陽無其人則闕至于國朝其制又有可論者國初以來以太師太傅太保為三師太尉司徒司空為三公仍唐之制也政和更制詔三師為三公三公為三少傚周之制也宣和之末以三公只為階官不復總領三省復祖宗之制也國初官制大抵沿唐三師三公號為宰相使相之官皆無所職掌王溥以昭文舘大學士兼司空元輔表太宗太平興國八年十月溥以昭文舘大學士侍中同中書門下平章事進司空范質亦以昭文舘大學士進司徒太祖建隆元年二月門下侍郎同中書門下平章事昭文舘大學士范質侍中左僕射門下侍郎同中書門下平章事進官司徒此以宰相兼之符彦卿為太師高保融自守太保為太傅職源太祖符彦卿為太師高保融自守太保為太傅此以使相兼之然自國朝以來曠世不除皆元老宿望者始任其選趙韓王開國舊勲一代柱石其勲孰高焉文潞公三朝元老聖世蓍龜其年孰尊焉於是以太師除之蔡官制三公之官尤重太師趙韓王以勲文潞公以年方得之此曠世不除仍自司空五遷方至太師又按元輔表趙普以太平興國八年十月以檢校太師兼侍中文彦愽至和三年六月以檢校太師同平章事河陽三城節度使王文正公旦自景徳三年相至祥符十年免凡十餘年元輔表王旦真宗景徳三年正月以尚書右丞參知政事遷工部尚書同中書門下平章事至大中祥符十年二月旦為太尉魏國公呂文靖公夷簡天聖七年相至寳元三年再相凡十五年天聖七年八月夷簡以吏部侍郎昭文舘大學士兼修國史元祐四年出知許州康定元年五月夷簡許州再入以右僕射門下侍郎同平章事昭文舘大學士監修國史至二年九月以太尉許國公致仕於是以太尉拜之蔡官制王文正公旦與文靖公夷簡皆為相二十年以太尉致仕此國朝盛時寵任三公之意若是其嚴也而先正諸公任三公之職亦皆有功於國家也政和之間以太師太傅太保皆古三公之官為宰相之任遂詔依三代易師為公若復古矣政和二年詔曰太師太傅太保此古三公之官為宰相之任今為三師然古無三師之稱合依三代為三公官不必備惟其人為宰相之任若除三公即為宰相然除三公者即總三省號為公相之任故蔡京以太師總三省而使宰相居其下不敢與之抗復且丐免書門下省不欲任樞宻之兵柄是制也政和小人以私意為之矣蔡繇國史補政和廢尚書令侍中中書令改為左輔右弼未始除授左右僕射改為太宰少宰京為太師總三省事號公相京丐免門下省盖以樞宻事皆過門下不欲任兵柄故也宣和之末以三公論道之任而總理省務使宰輔備貟殊失紹述憲章之意遂詔為階官不領三省若復舊矣宣和七年詔令居三公論道之位而總理三省衆務使宰相備貟殊失紹述憲章之意可於尚書復置令虛而不除三公止係階官更不總領三省然故事親王近属皇帝子姪官至三公而止盖有嫌於任師傅之官自宣和後皇子官率至太傅殊非設官之㫖是制也宣和小人復以私意為之矣蔡官制故事親王近属皇弟子姪官至三公而止盖有嫌師傅之任也自宣和後皇子官率至太傅甚非設官之㫖所以不置用之公孤也夫三師而為三公以復古制非不善也改三公為階官以復家法亦非不當也然私意一形典章變易一以専師傅之權一以輕師傅之任輕其任者其害小専其權者其害大何者紹興權臣以太師而固位於是壊中興恢復之謀開禧權臣以太師而竊政於是開南北用兵之釁君子推原其故皆蔡京小人作俑之尤也其害豈不慘歟噫可不鑒哉可不戒哉宰相上論歴代相職當否自黄帝首命六相管子黄帝得六相而天地治通典黄帝得蚩尤而明天道得太常而察地理得蒼龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相舜之舉相十六通典舉八凱使治后土舉八元使布五教謂之十六相八凱即棄益禹臯陶之倫而相之名始立自湯之左右用伊虺宋百官志成湯以伊尹為右相仲虺為左相周之左右任周召通典周時召公為保周公為師相成王為左右亦其任也而相之貟始定切嘗逺稽歴代近觀聖朝國勢重輕治道汙隆未嘗不闗相業之脩否也大抵周人以宿衛財用閹宦嬪御之属統于冢宰故相權専而君心正至秦始分属諸卿爾漢初不以御史太尉九卿加官之属侵丞相故相權重而職業脩至武帝始奪其權耳魏晉以來以丞相為尊官廢置不常類以監令管機要之任李唐之興以省長為丞相品高不除類以他官掌政事之要國初以昭文修史集賢為相所用皆端士元豐以左右僕射為相所用非正人元祐雖仍元豐而相職舉紹聖雖仍元祐而相權偏政和以來更革不常至中興而後易平章之號定丞相之名始為千萬世不刋之典此古今用相之本末也試詳言之嘗觀周人冢宰之尊其所統六十官之属往往皆士夫所不屑為之務似若䙝矣噫孰知正所以為論道經邦之職歟夫内朝宿衛之士天官宗伯掌貴遊子弟外庭徒役之人宮正掌宮中徒役職之卑者也而冢宰得以統攝之異時侍御僕從所以皆正人者非出於此歟太府受藏之務司㑹稽考之任並天官事之末者也而冢宰得以均節之異時用度有節所以無奢用濫賜之弊者又非出於此歟奴僕熏腐之流閹人宮闈嬪御之職官人内宰供奉飲膳之役酒人漿人貟之至冗物之至微者也而冢宰皆得以主之異時家齊身脩心和氣平所以無女寵閹宦之習者豈無故而然耶格心事業於此見之夫何秦人焚烈周官将古人所以體統維持之具分散四出宮伯宮正則分入郎中令漢百官表郎中令秦官掌宮殿掖門戸属官有郎皆秦官郎守門戸出充車騎衛尉同上衛尉秦官掌宮門衛屯兵属官有衛士旅賁令丞而宿衛之意失司㑹太府則盡入治粟内史同上治粟内史秦官掌榖貨而出納之意壊善人醫師則盡入少府同上少府秦官掌山海池澤之税以給供養属官有太醫易官導官永巷宦官之属云宮人内府則盡入大長秋同上秦官私府水巷宦官皆属焉而供奉飲膳使令之意至是盡泯衆職既分大臣莫統而人主宴私玩狎之際心術轉移性質浸漬無所不至此周人任相之意而壊於秦者此也漢自高文之時委任大臣責重權尊御史大夫掌副丞相如詔下諸侯王則御史以其制書詣於丞相同署乃行是相得預制詔高紀高帝詔召賢良御史大夫下相國相國下諸侯王表掌副丞相太尉職属丞相如匃奴入㓂太尉官罷改丞相将兵撃之是相得兼武事文帝三年罷太尉官属黄霸曰太尉官置乆矣丞相兼之文帝三年匃奴入冦灌嬰為丞相将兵撃之二千石之重丞相罷裁之而列卿無紊權之弊通典曰漢相得戮二千石申屠嘉欲斬内史晁錯是也閹宦之寵丞相請誅之而近習無預政之患申屠嘉𫝊加官未置而内庭外庭相得通主之百官表曰侍中左右曹諸吏散騎中常侍皆加官所加或列侯将軍卿大夫将都尉尚書太府太官令至郎中亡貟按表兩府不得加官孟康曰大司馬左右前後将軍侍中常侍散騎諸史為中朝丞相以下至六百石為外朝掾史行部而州郡民事相得盡知之文帝十三年以御史不奉法乃遣丞相史出刺并督察御史高皇帝蕭相國之規模逺矣夫何武帝以來過懲田蚡權専之弊而深抑大臣之職田蚡𫝊故自張湯以舞文為御史大夫也奏事日旰天子忘食而李嚴緘黙但取充位青翟庸繆見知得罪而御史之權日重初年張湯為御史大夫言事日旰天子忘食議皮幣白金事時李嚴等丞相取充位之又張湯以見知罪致疾青翟自霍光以受遺為大司馬也後改太尉為司馬内領尚書外領軍馬本𫝊光為大司馬大将軍領尚書而塩鐵之議千秋括囊田千秋傳昌邑之事楊敞不預楊敞傳而大司馬之權日横自丞相不敢擅召二千石田千秋傳而相不得統列卿也至使宏羊㩁利溫舒峻法九卿更進用事而事不闗於丞相矣按元鼎五年丞相趙周坐不省酎金死石慶為丞相征伐封禪公家用少桑宏羊等致利王溫舒之属峻法兒寛等推文學九卿更進用事事不闗决於丞相慶而慶但醇謹而已自游宴後庭而宦者典尚書章奏通典曰武帝游宴後庭始用宦者主中書以司馬遷為之而相不得問内庭也至使石顯弄權董賢竊政並本𫝊中宦益恣而事權過於丞相矣諸吏居中舉法應卲曰諸吏得授職如御史中丞侍中論誣大臣武帝𫝊侍中出入禁闥辨論數誣大臣如嚴助之徒加官權重宰相踈逺是中朝之血脉不闗於丞相府矣刺史得自奏事武帝置部刺史百官表云綉衣専遣出使暴勝之𫝊府掾在内不聞利害是外郡之血脉不闗於丞相府矣五十四年之間凡易相者十有三人亟辭亟罷不得展布雖至宣帝重丞相之權丙魏伸丞相之職然外而御史之抗禮蕭望之内而宦者之用事石顯宏恭又焉用彼相哉甚而東都以太傅當冢宰之任後百官志武帝初即位輙置太傅録尚書事胡庭注曰猶古冡宰總已意也二百年間僅除十一人而已自卓茂至金日磾止十一人大抵事權盡歸䑓閣相亦末如之何也已矣推原其故武帝安得不執其咎此漢初任相之制而壊於武帝者此也自魏晉以來相國丞相或為贈官或則不置間有置者自為尊崇之位多非人臣之職其真為宰相者往往以他官叅掌機宻之事通典曰按自魏晉以來宰相但以他官叅掌機宻或委知政事者則是矣無有常官其相國丞相或為贈官或則不置自為尊崇之位多非大臣之職其真為宰相者不必居此官是故魏以劉放孫資為中書監令而掌機宻通典曰魏文帝以劉放孫資為中書監令並掌機宻晉以張華荀朂為侍中而居阿衡同上張華為中書令侍中劉卞謂華曰公居阿衡之地荀朂為中書監侍中毘賛朝政東晉以謝安庾亮庾氷之徒並為中書監而皆稱賢相東晉庾亮庾氷相次為中書監先是王導輔政以寛和得衆庾亮以法裁物至氷經綸時務朝野注心咸曰賢相宋以江湛王僧綽殷景仁王華之徒並以侍中衛将軍而或任機宻或居門下宋文帝初徐慶之為司空録尚書事後以江湛王僧綽俱為侍中任以機宻後又以殷景仁為侍中左衛将軍王曇首侍中劉湛四人俱居門下皆以風力局幹冠冕一時同時稱之齊有六貴為宰相則如顧命之江祐領軍之坦之齊王檢為侍中尚書令嘗謂人曰江左風流宰相唯有謝安盖自况也明帝顧命江祐兄弟及始安王遥光尚書令徐孝嗣領軍蕭坦之更曰理物時呼為六貴皆宰相也梁以叅機事為宰相則如尚書令之何敬容僕射之徐勉梁何敬容初為吏部尚書侍中時徐勉為僕射叅掌機事並為宰相北齊謂登台鉉稱宰相者則如司座之韓軌北齊韓軌為中書令専授司座自以勲歴登台鉉侍中之趙彦琛北齊趙彦琛為宰相兼侍中並通典按此則或掌機宻或管朝政或為侍中或給事中或受顧命皆為宰相也通典云然自晉宋數朝以風流相尚以元虛為宗覩白署空稱為清貴同上省牒按簿鄙為流俗何敬容獨勤庻務為世所􅅓鄙卞壺以䑓閣之務頗欲綜理阮孚曰不亦勞乎東山勝遊蘭亭名㑹事肥遯也龍章鳳姿壁立千仞飾儀榘也雌黄陽秋崇辭致也玉麈蒲葵尚放曠也棄禮法如土梗視義理如桎梏朝綱廢弛衆職隳弊卒致夷狄亂華之禍豈非清談廢事之咎歟此魏晉而下任相然也自隋始以尚書令僕射中書令侍中為宰相亦有他官叅與焉如楊素為僕射掌朝政桞述為兵部叅機事之類通典云唐因隋制初以三省長官議國政而為宰相其後以太宗嘗為尚書令臣下避不敢居由是僕射為尚書省之長與侍中中書令號為真相品位既崇不欲輕授故常以他官居職無有定貟但加同中書門下三品及平章事知政事叅知機務叅與政事及平章軍國重事之名者並為宰相亦漢行丞相之例通典大唐侍中中書令是真宰相其餘以他官叅掌者無定貟但加同中書門下三品及平章事知政事叅知機宻叅與政事及平章軍國重事之名者並為宰相亦漢初行丞相事之例也韓安國為御史大夫行丞相事餘並百官志貞觀間李勣以太子詹事同門下三品而同三品之名立李靖以疾辭位詔三両日一至中書門下平章事而平章之名立同上杜淹以吏部尚書叅預朝政魏徴以秘書監叅預朝政岑文本為秘書郎兼直中書省専主機要張亮為刑部尚書亦叅朝政而知政事叅機務之名始衆此他官上兼宰相職也至宰相又復下行有司之事如杜如晦本為侍中既攝吏部又監東宮兵馬房𤣥齡本為僕射既監國史又領學官並本𫝊終唐之世相無常職亦無常貟乃至守本官為之而有守如故判如故之目坐政事堂而分決本司之事或至數十人同時為之甚至出為帥臣亦為外宰相之稱同上故三為宰相皆兼兵部前後出鎮三佩相印且不寧惟是時方用兵則為節度使時或崇儒則為大學士時急財用則為塩鐵使同上其不足取法初非一端此非貽謀之未善歟雖然貞觀開元盛時名稱雖煩而事業無廢職位若異而機務不隳有如英衛智勇房杜謀斷王魏規諫姚宋正變亦何愧於爰立之命自後用者非賢賢者不用禍變迭興不可枚數唐之相業始不足取張曲江峭直剛方嘘吸雲雨惜也相位不留而李林甫之姦䛕用焉是以有范陽之變崔群𫝊世謂祿山反為治亂分時臣謂罷張九齡相林甫則治亂固已分矣陸宣公論諫仁義言之藥石惜也杜門却掃而盧杞之邪謀進焉唐是以有涇卒之亂唐舊史曰雖知非竟遂於楊炎而受佞不忘於盧杞取延齡之妬謀罷陸贄之相位貞元之辰吾道窮矣唐賛徳宗猜忌刻薄用盧杞趙賛則至於敗亂而不悔注徳宗用盧杞以趙賛判度支及涇卒亂始曰不稅間架裴晉公身係安危朝廷柱石惜也讒言一入裴度為緑野堂而鎛异之小人信焉唐以是有閹宦之禍唐賛憲宗晩節信用非人不終其業而身罹不測之禍尤甚於順宗注信用程异皇甫鎛數暴怒恚憤左右繼踵問罪而不自安故中人王守澄陳宏志等由是弑帝於中和殿可勝嘆哉此唐之任相然也又接下篇宰相下論本朝相職得人先論因革後論人材國朝制雖沿唐而實異於人盖三省為空官而以平章為宰相惟其真加侍中則不除平章職源國朝沿唐舊制凡命相必曰同中書門下平章事即真拜侍中者不復言平章事然國初止除范質趙普亦未嘗除人累朝因仍三省長官尚書中書令侍中僕射不與政皆為空官特以寓禄秩品位而已至平章而分為三等𢃄昭文為長修史為次集賢又其次蔡官制云是制也自建隆以後用之三省各蒞職而以左右僕射為宰相左相必兼門下侍郎右相必兼中書侍郎然中書取㫖其權獨重至有右僕射除吏左僕射有不預聞而有當禀左相必送中書右相更不欲行是制也元豐小人以私意用之後因呂公著同舟共濟之請三省同得取㫖以革元豐之弊召潞公元老於二相之上以太師平章軍國重事而兼用祖宗之法是制也元祐大臣以公心用之夫何紹聖以來偏重左相事之合送中書者但自尚書徑上門下子厚用之而李清臣莫之勝蔡京效之而趙挺之莫之制盖竊元祐之制以行其私也呂大防欲用楊畏為諫議大夫范純仁不可大防素稱畏敢言宻約畏助已竟超遷畏元祐間畏言神宗更法以垂萬世即䟽章惇乞召為相又紹聖元年清臣首唱紹述曾布宻論趙挺之建議紹述曰吾當用能紹述者勝之遂召蔡京政和以來更左揆曰太宰右揆曰少宰而太師總領三省之事號為公相蔡京為太師領省務而權益盛王輔為太傅總省政而意益私亦竊元祐之制以専其政也厥後建炎盡革前弊始罷太宰少宰而復左右僕射乾道復罷左右僕射而改左右丞相政和問更左揆曰太宰右揆曰少宰而以三師三公是謂宰相靖康末詔依元豐故事復為僕射左右僕射必兼門下中書侍郎建炎三年呂頥浩言被㫖将元祐中司馬光建請併省奏召侍從叅詳宰相不兼兩省侍郎而復祖宗之舊為同中書門下平章事職畧中興㑹要乾道七年詔丞相總齊百揆賛襄治道事無不統而僕射之官名實未稱宜傚周漢之制明年改尚書左右僕射為左右丞相中興㑹要孝宗㑹要至是而相之職名一定而不易竊嘗因國朝之制而求大臣之事業矣昔藝祖之開基也前代之相揆席終留箕子其仁也范質王溥魏仁浦開國元勲金匱有書周公其忠也趙普以吏侍而拜門下者方重自居開寳六年九月吏部侍郎叅知政事薛居正門下侍郎同中書門下平章事居正為人方重不事苛察以樞宻而除集賢者清節自守同上沈倫為樞宻副使尚書戸部侍郎拜中書侍郎同中書門下平章事集賢殿大學士迨至太宗念舊臣而留沈薛開秘藏而召中令獻䇿而擢齊賢沈倫清介在相位自守而已薛居正為人方重不亊苛察太宗任沈倫薛居正六年太祖幸西京洛陽人張齊賢獻十䇿太祖召見齊賢以手畫地條陳太祖善其四䇿齊賢堅執皆善及還語上曰我幸西京惟得一張齊賢耳我不欲遂官爵之汝異時可牧以自輔也噫豊水有芑貽厥孫謀培植人材之功深矣以至歸囚一詠隂諷君徳李昉烹鮮一語有裨治道言行録淳化三年太宗謂宰相曰治國之道在乎寛猛得中呂蒙正曰老子稱治大國若烹小鮮夫魚擾之則亂近日求更制度者甚衆望陛下行清浄之化昉與蒙正之善於規諫進思賢從諫之對李琪無喜賞懼挫之心呂端琪與端之深得相體若乃盧多遜之貝錦今日譖趙忠獻太宗即位普為盧多遜所譖出守河陽上一旦發金匱得書大悟遂遣使急召之既至復為相而多遜遂貶朱崖言行録明日毁李文正盧多遜與李昉相善待之不疑多遜知政多毁昉后太宗語及遜亊昉為觧釋太宗曰多遜常毁卿一錢不值一斥嶺表終身不用讒者既去稂不傷稼此皆我太宗之明哲也真宗嗣位二呂一張復秉鈞軸真宗朝呂端為相五年呂蒙正為相三年張齊賢為相亦三年一時風采繼者益善水旱屢奏嘆曰聖相聞見録咸平景徳中李文靖沆在相位王文正旦知政亊時邉報日聞二公不皇文正嘆曰安得及見太平吾軰優㳺矣文靖曰外患足以無懼異日天下雖平上意浸滿後必朝陵展禮文正嘆曰文靖聖矣故當時謂文靖為聖相又龍川志云李沆為相王旦知政亊沆日取四方水旱盗賊奏之旦以為細事不煩聖聽沆曰人主當知艱難不然血氣方剛不留意聲色犬馬則土木甲兵禱祠之事作矣吾老不及見此此叅政他日之憂也及旦親見王欽若丁謂等所為乃嘆曰李文靖真聖人也風範端凝目曰貴人沆之賢也李沆常侍曲宴太宗目送之曰李沆風範端凝真貴人也江淮命使深戒竭民薛簡肅公天禧初為江淮發運使辭王文正公公無他語但曰江南民力竭矣薛退而謂人曰真宰相之言也江西遣漕亦懲㩁利旦之公也言行録張士遜出為江西轉運使辭王文正公於政事堂且求敎王文正曰朝廷㩁利至矣士遜起謝始除端揆厨絶飲宴上語李昌武曰敏中門下今日賀客必多卿往觀之昌武候丞相歸乃往見丞相方謝客門闌悄然昌武與同親徑入見之徐賀曰自上即位未嘗除端揆此非常之命公但唯唯既退復使人至庖厨中問今日有無親戚賔客飲宴者亦寂無一人明日入對上問昨日見敏中之意何如乃具以所見對上笑曰向敏中大耐官職累在衡軸門無私謁敏中之耐也言行録敏中𫝊公性端厚明辨累在衡軸門無私謁諸子不令釐務以相才力薦而駑朽自謙畢士安初知政亊入謝帝曰未也行且相卿公謝曰臣材駑朽不足以勝任惟冦凖兼資忠義此宰相材也帝曰然當藉郡宿徳以鎮之不閲月拜公平章亊冦公並命而以公監修國史位在上以名節自厲而險夷不易言行録畢士安傳公資端重偉儀觀少以名節自厲貫于險夷至長不易平生無一語過差畢士安君子人也帝謂冦公曰畢士安君子人也以幸汾為非天意李廸言陛下幸汾亳土木之役過往時幾百倍今旱蝗之變殆天意所以儆陛下也以内藏為備凶荒同上公曰祖宗初置内藏庫欲復西北故土及以備凶荒今邉無他廢陛下用此以便國用民不勞矣言行録李廸敬天愛民之誠也至如㓂萊公之忠節豈非數公之推轂納交者與澶淵之役親扶日轂尺箠笞之蘇内翰作寇公神道碑惟彼北戎闕節彼萊公尺箠笞之三十餘年絶無邉塵之警社稷之功寔加尚之夫何小人萋菲之言易入而萊公之迹屢辭屢罷釁鼓之言為國謀也澶淵之役唯萊公首次親征時陳堯叟請幸蜀王欽若乞幸江南上召萊公問之公曰不知誰為此謀者臣欲得獻䇿之人斬以釁鼔然後北伐耳王欽若不堪倡為投瓊之譖而公反出主北門之鑰矣公鎮大名州北使道由之謂公曰相公望重何以不在中書公曰皇上以朝廷無事北門鎖鑰非準不可捋鬚之責為公言也丁謂不平遽為下石之舉而公復渉雷陽之波矣馮拯小人依附邪黨絶無一言及之嗟夫一萊公也前數公之賢則薦之愛之後數子之姦則排之䧟之君子小人其枘鑿也如此所幸仁皇維持公論收拾善類為宼之朋者茹茅類進為丁之黨者莠稂盡除故丁謂馮拯王欽若之佞貶斥殆盡至張士遜以曹利用之進雖既用而亦罷王曾李廸之賢登用恐後至張知白以嘗不阿欽若亦亟擢而就用仁宗謀相王曾薦呂夷簡曹利用薦張士遜利用既得罪士遜亦罷李廸曰丁謂好邪利用馮拯亦相朋黨王曾言謂合雷允㳟擅移皇堂於絶地太后怒貶謂王欽若為相張知白叅政與議論多不合以疾辭位不特此也王隋陳堯佐以老病不和而去闕望者多别録云韓琦常言天下事不如人仁宗王隋陳堯佐為輔相皆老病而不和中書亊多而去韓闕不中立二人叅預又頗以私意害公皆請罷之呂夷簡以斥逐臺諫而去仁宗廢郭后夷簡飭有司無得受䑓諫章奏貶孔道輔范仲淹王曾斥夷簡嘗紀賂市恩罷相判許州至于慶厯隂消陽長帝賚良弼故光輔王室中外嬉逰溫公撰韓公琦祠堂記故能光輔三朝大濟艱難使中外之人餔啜嬉逰自若曾無驚親傾聽切語之警坐置天下於大寧公之力也而向所施行杜衍亦以時上之衍亦若人也是時仁宗以天下多事急於求治因詔輔相杜衍曰朕用韓琦范仲淹富弼皆中外人望有可施行宜以時上之麻拜中庭縉紳相賀而用賢堅信龎籍力請之籍亦若流也文彦博與富弼同拜宣麻之日士大夫以得人相慶天下謂之文富上曰吾得二相賢於夢卜矣長編公亮受遺責重節堅而亞勲定䇿之碑屹立焉曾公亮嘗與韓忠獻公力賛仁宗早建太子以為天下萬世之本至是感悟儲貳乃定配享英宗廟庭篆其碑首曰兩朝顧命定䇿亞勲之碑晏殊不求恩澤而天子勤渠之問有寵焉公為相務薦賢范仲淹孔道輔皆出其門未嘗為子弟求恩澤其在陳州上問宰相曰晏殊居外未嘗有所請其亦有所欲耶宰相告公公自為表問起居而已故及薨天子哀悼之昌朝學問得象謹重而聖徳一詩濃墨大書侈言而為盛事焉是時也左臯右䕫前伊後周不是過也至使執中之俗吏且以至公而結主知東坡志林云軾謂陳執中俗吏耳持以至公猶能取信於上宋庠之無所作為不失為雍雍有徳之君子塵史宋元憲雍雍然有徳之君子也既叅大政朝廷無事日閲文史後既登庸尤務清浄無所作為有為者病之公嘗自謂時賢多以不才誚我因為自詠詩曰我本無心士終非濟世才虛舟人莫怒疑虎石嘗開蚊負愁山重葵傾喜日來欲将嘲強觧真意轉悠哉梁適劉沆雖貪黷挾私而亦不得逞其慾馬遵劾梁適貪黷怙權罷相知鄭州劉沆在相疾言者屢加裁抑出范師道趙抃張昪言沆挾私出御史罷相知應天府四十二年之治諸公之力多矣自熈寧大臣收用新進韓富二公丼心觧職絳與升之引類彈冠此固不待議耳有如安石之得志也公亮為國家舊臣唯唯不言倒戈晩節及安石之罷相也吴充素排新法至主國事置而不議噫風俗移人趍者瀾倒而能砥柱中流者幾何人哉繼以柔懦之王珪剛詐之蔡確末年天子雖有革弊之念惜乎論道之非人矣哲宗初年罷蔡確去韓縝潞公司馬公著之舊望既相於前純仁大防劉摯蘇頌之諸賢復踵於後拯溺救焚改絃易轍天下凜凛慶厯嘉祐之治惜夫調停一唱玉石同區章子厚何人哉起自謫籍濫居左揆變亂溫公之典刑講明金陵之故事一暴未幾十寒已至元祐善政影響不存迨及建中曾布忠彦對持相衡忠彦不能制布之巧反引蔡京以勝之京也得志姦邪百出馴至中原之變有甚元豐紹聖小人之用心盖不勝誅也天意祚宋人材軰出中興以來風采一新莘夫渭老際㑹風雲立政立事毋愧國朝諸君子之事業噫必有如徂徠者賡慶厯之詩侈中興之盛愚何幸親見之樞府樞府之官何始乎曰自唐始也名肇於開元官設於永泰權重於五代而其制其意至我朝始詳且宻此其大畧也按唐開元間張說為相改政事堂號中書門下列五房于其後有樞宻房以主曹務本相臣以統之唐百官志開元中張說為相改政事堂號中書門下列五房于其後一曰吏房二曰樞宻房三曰兵房四曰戸房五曰刑禮房分曹以主衆務宰相無所不統未始付於他官僅有其名未有其官也自代宗永泰置内樞宻使以宦者董廷秀為之元和則命劉光琦長慶則命王守澄不置司局不立僚属惟承受表奏於内進呈永泰中宦官董廷秀叅掌樞宻事元和中劉光琦梁守謙為樞宻使長慶中王守澄知樞宻事舊左右軍容多入為樞宻廨署三間貯書櫃而已續通典餘見下注若人主有所處分則宣付中書門下施行而已僅有其官爾未重其權也以宦者為之初不置司局但有屋三楹貯文書而已其職掌惟承受表奏於内中進呈若人主有所處分則宣付中書門下施行而已呂原明家塾記迨至僖昭之間楊復㳟西門季元欲奪相權建置條目乃於堂状貼黄指揮公事此其分權之漸舊左右軍容多入為樞宻廨署三間貯書櫃而已亦無視事之㕔後僖昭時楊復㳟西門季元欲奪宰相權乃於堂署後貼黄指揮公事此其始也續通典後梁用士人而易閹宦改宻院而為崇政特命敬翔為使謀議中朝備問左右尚未専事於外至唐以後復名樞宻往往以宰臣兼之唐用郭崇韜晉用桑維翰周用范質王溥皆天子腹心之臣得議軍國大事其權與宰相等至是始重矣藝祖受命以東府掌文事叅政佐之西府掌武事副使佐之百司長官及監司長吏皆得専達或奏朝廷或申中書事大則進呈取㫖除敕宣命而小則批状直下本路本州故文書簡徑無滯有使有副使有簽書有同簽書有知院有同知院使副則始命魏仁浦趙普簽書同簽則始命石熈載郭逵知院同知則始命張遜溫仲舒國朝樞宻院與中書對符文武二相號為兩府建隆元年以魏仁浦吴建祚為樞宻使趙普為副使周末闕副使至是始置太平興國四年以石熈載為樞宻直學士以簽書院事簽書之名始此淳化三年以張遜知院事溫仲舒冦準同知院事同知院之名始此治平中以郭逵同簽書院事同簽書之名始此舊制樞宻院有使則置副使有知院則置同知院㑹要且不寧惟是有不𢃄正官充使如趙普為檢校太尉充樞宻使是也有樞宻𢃄節度如曹彬為檢校領忠武節度是也或以文官充使則始於石熈載為戸部充使也或儒臣以樞使兼使相則始於王欽若等守本官檢校太傅同平章事充使也五代置樞宻使國初因之建隆三年趙普為檢校太尉充樞宻使不𢃄正官充使自普始也開寳九年曹彬為樞宻使領忠武等節度使樞宻𢃄節度自彬始也太平興國六年石熈載為戸部尚書充樞宻使以文資正官充使自熈載始也祥符五年王欽若陳堯佐並守本官檢校太傅同中書門下平章事充樞宻使儒臣以樞宻使兼任相自欽若等始也聖朝職畧非制之詳耶然國家立極五代弊政掃除殆盡獨此不廢盖有慶厯議臣請併中書而仁宗不之併慶厯張方平言樞宻院起於後唐權宜之制請罷併其事於中書不報元豐議臣請廢宻院而神宗不之廢元豐改官制議者欲廢宻院歸兵部神宗曰祖宗不以兵柄歸有司故専命官統之互相維制不從續㑹要推原其故其美意有二盖宰相平章軍國兵事可知也而兵之籍則不與殿院兼總兵馬兵籍可掌也而兵之符則不在發兵大權盡歸宻府體統相維㒺有偏失噫車徒之數司馬所掌調發之權冢宰所主周人維持之意而我朝得之此其意一也邉事興則相與其職邉事寧則樞任其事西師之興以宰相呂夷簡章得象等兼樞宻未幾以兵休而罷渡江之初以宰相張浚等兼樞宻未幾以邉寧而罷噫蠻夷之事特専作士誓師之舉亦命宅揆虞廷文武相通之意而我朝得之此其意二也制雖漢唐意實傚古夫如是何嫌何疑而廢之耶是職也氣節清謹者任之而輕險奸回者不與也威望隆重者居之而浮薄淺陋者不與也是故風寒親幸決䇿江南杯酒從容藩臣觧職趙中令之為有功始平西蜀囊無寸錦終克金陵民皆安堵曹武恵之為稱職太祖所任樞臣者八人而趙曹為之冠曹彬趙普吴延祚李承矩王仁瞻李處耘楚昭輔魏仁浦罷綏州之役而時論所稱辨繼隆之奏而力争不已時有錢宣靖焉玉壺清話曰時言者請城綏州積兵禦黨項詔公自魏乗疾傳往按至則乞罷其役時論韙之記聞李繼隆與轉運使盧之翰有隙欲䧟之罪丞相呂端等皆不敢言權樞宻副使錢若水言之未命之初天子已有飛白之記既除之後復有邉政有望之喜時則有向文簡焉太宗飛白書張詠向敏中二人名付中書曰二人者名臣為朕記之向公自貟外郎為諫議知樞宻院止百餘日咸平四年除平章事出知永興駕御澶淵手賜宻詔令付西鄙得便益從事歸田録太宗所任樞臣者十六人而錢向為之首曹彬錢若水向文簡冦凖楚昭輔石熈載王欽若王沔張先張昌言楊守一張士遜溫仲舒劉昌言趙鎔李惟清契丹叛盟非細故也而萊公親扶上轂尺箠笞之萊公在淳化為同知在至道為參政又為樞宻使同平章亊契丹請盟若少安也而馬知節言邉論兵未嘗少置真宗之所任樞臣者二十九而冦馬又其卓卓者曹招陳堯叟曹利用宋湜薛魁㓂凖向敏中馮拯馬知節周起趙鎔曹珪王顯周瑩王惟美王繼英薛宗訓曹武穆李惟清任中正張著張士遜夏仕嶠楊礪韓宗訓張旻迨至慶厯名賢軰出天下兵數更為圗籍邉防屯戍必加全補憂邉𤨏也歐陽脩北伐虜㓂南平蠻獠料敵制勝名将莫加有武功也狄武㐮有契丹仰望而稱嘆得人者王徳用有士夫聞報而酌酒相賀者范仲淹有天下顒顒望致太平者田况以率履予以重集予勃以䕫契予弼魯人石介慶厯一詩濃墨大字若縱口而談古人噫盛哉自是而後治平則有文彦愽治平元年十月文彦愽樞宻使元豐則有呂公著元豐元年呂公著同知樞宻院三年遷為樞宻副使元祐則有范純仁元祐元年六月范純仁同知樞宻院事皆正人也皆有益於國家也噫天降時雨山川出雲氣類相感非偶然爾雖然有自來矣王顯之為使也學問寡陋天子特取軍戎三篇以賜之慮其不學問惰矣夏竦之除樞也衆議紛紛天子親書文行忠信四字以勉之慮其有黍厥職矣慶厯三年天㴠地育故應有此然此特上人之力也有若先正諸賢維持公論彦卿主兵趙中令以宣懐之太祖欲使符彦卿典兵宣已出趙韓王懐之請見出彦卿宣進之土曰宣何以復在卿所韓王曰臣托以處分之語末備復留之張耆為使晏殊以力争之晏殊𫝊天聖中太后以張耆為樞宻使殊言朝廷雖乏賢亦宜以中才處之如耆者但富貴之可也宋約為簽書王金陵謂與牛仙客無異熈寧初以宋約為簽書王安石云與明皇牛仙客無異郝質欲在西府韓公琦謂不可比狄青韓琦𫝊白麻未追言者十八夏竦簽書未惬䑓諫交章郭逵𫝊噫祖宗㴠育既如彼先正維持又如此則堂堂北樞孰非正人端士乎六部論古今六部分合周之分典其職有六唐之設官亦如其數然則唐之六部其源流於周歟通典注自宋齊以來分定為六曹稍似周禮至隋六部其制益明大唐武太后遂以吏部為天官戸部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官以承周六官之制盖尚書舊不分曹而分曹始於西漢尚書舊不以曹名為號而定號始於東都成帝建始四年置尚書五人一人為僕射而四人分四曹各有其任又置三公曹是為五曹尚書舊不分曹至是始分曹通典注光武親覧吏職改常侍曹為吏部曹主選舉齋祀事漢末改吏部為選部靈帝以侍中梁鵠為選部尚書舊尚書雖有曹名不以為號至是以曹名為號晉志魏晉而下或分而五或析而六未有定貟也魏有五曹晉置六曹渡江有五尚書宋齊梁各有六尚書陳置尚書五貟後周依周官置六卿隋改為六部尚書唐因隋制六典建官而六部之制始定唐因隋制六典建官國朝鑒藩鎮之弊乃以尚書郎曹出領外寄皆為定官特以寓禄秩序品位而已國朝太祖太宗鑒藩鎮之弊乃以尚書郎曹寺官出領外寄三嵗一易坐鎮外重分裂之務尚書侍郎郎中貟外郎與九寺五監皆為定官特以寓禄秩序品位而已省䑓寺監往往他官兼領神宗即位慨然欲更其制熈寧末始命舘閣校唐六典元豐二年以摹本賜羣臣乃置局中書命翰林學士張璪等詳定八月下詔肇新官制凡省䑓寺監領定官者一切罷去而易之以階五年詳定所上寄禄格而省䑓寺監之官各還所職矣中興㑹要神宗慨然舉六典之制而盡復之向之曹局各還所職時元豐五年也見上注而六部之名始復至侍郎之名漢已有之而今侍郎之任則自隋置也侍郎之名舊矣漢凡諸郎掌更直執㦸宿衛諸殿門以侍衛之故通謂之侍郎至隋煬帝六年尚書六曹各置侍郎一人今之侍郎其置自此始也六典及通典注郎中之名漢亦有之而今郎中之任則自唐置也漢三署郎有郎中之名主作文書唐置六部郎中通典注貟外之名古未有之而貟外之官則自隋置也通典隋開皇三年尚書二十四司各置貟外郎一人此六部分局設属之源流爾愚嘗推攷古今設官之意盖周之六卿統於大臣故若分而實合唐之六部紊於寺監故雖繁而實曠元豐以前名雖未正而事權歸一實有得於周元豐以後制雖盡復而冗貟未併未免類於唐然則循周之制復周之意其在今日乎夫周以冢宰征師於諸侯司徒以旗致萬民宗伯以軍禮同郡國司馬大合軍以從司㓂凡周人兵民之權若不歸於一也並見周禮本官注而不知實以三公兼之則其權未始分異時呂伋虎賁逆王之日盖太保命之而不見其危疑卒遽之事則是三公統之之由也書顧命邦布出入掌之外府金玉收藏掌之玉府九貢九賦之入掌之内府其他如幣帛之物租賦之用泉布之利散主於六官之属者若不一也而不知皆大臣得以均節㑹計之天官太宰則又曷嘗不一哉異時上之人無用度之私下之人無賜予之濫則是又其區處財用之有人也豈非周之六卿統於大臣故若分而實合歟唐一尚書之分為其属者有四是為二十四司矣二十四司之分佐其長者有三是為侍郎郎中貟外矣令僕率其属丞郎分其行郎中貟外判其曹則何所不包亦何所不任夫何六部之外又有九寺九寺之外又有四監戸部之財散於司農少府禮部之儀裂於太常鴻臚光禄勲與膳部之權衛尉掌庫部之事太僕侵駕部之職其餘四監又以兵禮二部之所掌者而紊之不亦幾於繁乎夫惟職掌太繁其勢必至於虛授是其繁也乃所以為曠也以上並百官志故杜佑言繁之弊有二垂二契二伯夷二伯益之說杜佑省官議昔臯陶作士正五刑今刑部尚書大理卿是二臯陶也垂作共工利器用今工部尚書将作監是二垂也契作司徒敷五教今司徒戸部尚書是二契也伯夷職宗禮今禮部尚書禮儀使是二伯夷也伯益作虞掌山澤今虞部郎中都水使者是二伯益也伯景太僕掌車馬今太僕駕部尚輦奉御閑廐使者是四伯冏也陸長源言其曠之弊則兵部無戎帳戸部無版圗虞水不管山川金倉不司錢榖之說陸長源曠官文兵部無戎帳戸部無版圗虞水不管山川金倉不司錢榖光禄不供酒衛尉不供幕秘書不校勘著作不脩撰官曹虛設禄俸不請亦知其繁乃所以為曠歟豈非唐之六部紊於寺監故雖繁而實曠乎國初吏部則審官流外三班主之户部則三司使判之職畧聖朝雖沿唐制設吏部然而名存實廢典選之職自分為四文選二曰審官院曰流内銓武選二曰審官西院曰三班院户部判院事一人以兩制以上充凡戸口田産金穀食貨之政今皆源流於三司上本曹但受天下之土貢充㑹陳庭而已禮儀之事歸之太常貢舉之政領之貢舉則禮部職也四方奏案歸之審刑在京獄訟委之糾察則刑部職也國朝禮部判部事二人以兩制臣𢃄職朝官以上充凡禮儀之使悉歸於太常禮院而貢舉之政領於知貢舉官本曹但掌制科舉人補奏太廟禮齋郎室長掌座都省集議等事刑部尚書侍郎郎中正為階官而刑部判部事二人以御史知雜以上或朝官充淳化二年以刑部復大辟案増置審刑院凡四方以其獄來上則讞於審刑院大中祥符二年置糾察在京刑獄司内兵部事歸樞府工部事歸三司國朝兵部判部事一人以兩制充凡天下兵籍武官選授及軍旅卒戍之政令悉歸於樞宻院工部判部事一人以兩制以上充凡城池二役皆𨽻三司修造案本曹無所掌故此二部不設主判多以别官兼之盖國朝樞宻主兵三司主財權重任隆往往與中書埓則合兵工之部而歸之矣以名而論之稱號未正體統不立若不及於唐爾然總戸部工部之務盡歸三司得以權其有無制其出入而無蠧耗之弊察官制三司主財計至造作軍器則胄案主之土木之工𨽻修造案河防之役𨽻河渠案且國家工役之費無出於此三事其所能為蠧耗之大者必命三司總之乃可節以制度也舉兵部三衙之籍盡歸樞府得以上下相維彼此相制而無有握兵之慮范祖禹言祖宗兵法本於樞宻有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權彼此相維不得専制此所以百三十年無兵變也此元豐以前名雖未正而事權歸一實有得於周者是也元豐以司封司勲之属歸吏部以度支倉部歸戸部之二部也事劇務繁則侍郎之貟二而郎中之貟四曰禮則祠部主客而下属焉曰兵則職方駕部而下皆属焉曰工則屯田虞部而下属焉之三部也曹閑局冷則侍郎之貟一而郎中之貟二尚書六部吏部一尚書二侍郎分掌四選吏部司封司勲考功属焉戸部一尚書二侍郎分左右曹而戸部度支金部倉部属焉禮部一尚書一侍郎禮部祠部主客膳部属焉兵部一尚書一侍郎兵部職方駕部庫部属焉刑部一尚書一侍郎刑部都官比部司門属焉工部一尚書一侍郎工部屯田虞部水部属焉每部郎官二貟知州以上資考及階官朝議大夫以上為郎官也餘貟外唯吏戸刑三部郎官各置四貟以其劇曹也至於刑之一部都官比部属之刑部司門属之其曹稍繁其事稍詳則侍郎之貟一而郎中之貟四而又糾以都司左右司郎官各二貟通糾六部號都司専佐宰相理省事謂之宰属察以六察元豐五年詳定官制所言朝廷以天下事分六曹以治之都省以聽之六察以察之六曹失職則都省在所糾都省失糾則六察在所彈上下相維如繩之貫如畫棊局井井乎有條也以制而言之小大有倫燦然可觀若有同乎周爾然寺監之貟未歸六曹不免有叢冗之弊元豐三年劉安世言先帝時寺監長貳多不並置今省曹所減止十餘貟寺監所増仍倍乎昔故望叅酌典故凡寺監事歸之六曹者宜盡省之三監之權未合戸部而不免有涣散不相通之患元祐四年蘇轍言愿詔都水軍器将作三監𨽻户部此元豐以後制雖盡復而冗職未併未免類於唐者此也今六部星分誠有周人六典之美然事權不一脉絡不通盍反而正之乎何者戸部之財不豐不責之戸部而流品之不澄軍功之不實工役之繁具者吏部兵部工部不得不任其責也刑部之刑不息不責之刑部而制作之未明教條之未至禮部誠不得不任其責也若此等類皆寓之以相聨相属之意則今之官非唐之官乃周之官矣夫復何議古今源流至論續集卷五
