body:
  text: 古今源流至論别集卷六宋黄履翁撰擬經論儒生擬經之僭華黍之補亡欲繼乎詩也君子不之予晉束晳補南陔白華華黍由庚崇丘由儀六詩而老杜一集本以五言為體山谷謂有三百篇之㫖山谷讀杜工部詩如靈丹一粒㸃鐵成金有三百篇之旨湯征之續闕欲續乎書也君子不之取白居易補湯征篇而孔明出師一表本以表而自名東坡嘆其與伊訓說命相表裏東坡云孔明出師一表與伊訓說命相表裏大抵得聖人之意則自然暗合於道泥聖人之言則徃徃反戾於經况國風雅頌渾厚醖藉誦之如奏黄鐘大吕商盤周誥幽深簡古讀之如登九折峻坂儒生學士無聖人萬分之一而欲效聖人之所為噫亦妄矣束晳補詩俳優之戱舜耳居易續書尫巫之歩禹耳此愚竊嘆夫後之擬經者皆侮聖人也且六經何為而作哉蓋夫子接三代之後有典謨訓誥之文有禮樂法度之善天地隂陽之蘊已露而未顯三綱五常之道幾墜而未振於是刪詩定書制禮作樂繫周易作春秋聖人蓋為天地立心為生民立極也彼王通何人哉既續詩矣而又續書既元經矣而又易讚既禮論矣而又樂論然曹劉沈謝之句安能合鹿鳴四牡大明關雎之㫖七制詔志䇿議之文安能合堯典舜典禹謨伊訓之義見下達者與幾守者存義果序卦雜卦之藴乎中說問易篇子賛易至序卦曰大哉時之相生也達者可與幾矣至雜卦曰旁行而不流守者可與存義矣皇始之帝晉宋之王果奨周室尊中國之筆乎同上子曰元經其正名乎皇始之帝證天以授之也晉宋之王近於王體於是乎未忘中國穆公之意也齊梁陳之德行之於四夷也以明中國之有代太和之力也經又魏相篇春秋抗王而尊魯其亦周之所存乎元抗帝而尊中國其亦天命之所歸乎禮之論樂之論果能推明先王政化之意乎魏相篇董常曰夫子以續詩續書為朝廷禮論樂論為政化贊易為司命元經為賞罰此夫子所以生也侈然以王氏六經自名此特效西子之顰耳通之意猶未也中說一書酷類魯論以董常比顔子以公卿大夫比顔曽門弟而其心則以夫子自尊通之意正如歐陽永叔自擬韓昌黎而以梅聖俞擬孟郊也嗚呼安得後人不以六經奴婢誚之哉晦翁語錄問王通病處如何曰這人於用處便曉得急欲見之於用故便要做周公底事業去上書要興太平及知時勢之不可為做周公底事業不得則急退而續詩書續元經又要做孔子底事業殊不知孔子之時接乎三代有許多典謨訓誥之文有許多禮樂法度名物度數聖人之典皆在於是取而讃述方做得這家具成王通之時有甚麽典謨訓誥有甚麽禮樂法度乃欲取漢魏之下者為之書則欲以七制命議之屬為續書詩則欲取曹劉沈謝者為續詩便續得這般詩書發明得箇甚麽道理自漢以來詔令之稍可觀者不過數箇如髙帝求賢詔雖好已為不純文帝勸農武帝薦賢䇿輪臺之悔只有此數詔畧好此外又無那一篇比得典謨訓誥便求一篇如君牙冏命秦誓也無曹劉沈謝之詩又那得一篇如鹿鳴四牡大明文王關雎鵲巢亦可學為四句古詩者但多稱頌之辭言皆過實不足取信樂又如何有雲英咸韶濩武之樂禮又如何有伯夷周公制作之禮他只是急要做箇孔子又無證佐故粧㸃幾箇人來做堯舜湯武皆經我刪定便顯得我是聖人如中說一書都是要學孔子論語說泰伯三以天下讓他便說陳思王善讓論語說殷有三仁他便說荀氏有二仁又捉這幾箇公卿大夫來相答問便比當時門人弟子正如梅聖俞說歐陽永叔他自要做韓退之却將我來比孟郊王通便是如此王通自要做箇孔夫子便胡亂把别人來為聖為賢然僭經之罪不特一王通也世無君子之論則蟬噪爭鳴蛙尊自居皆得侮聖言矣子雲之太元蓋準易之象數也易有彖元則有首易有爻元則有贊易之爻有象而元之贊則有測温公讀元易有彖元有首彖者卦辭也首者統論一首之義也易有爻元有贊易有象元有測測所以解易也易有文言元有元文解五德幷中首九贊文言之類也然易以道勝而元以數勝是雄蔽於名而作也此後世所以有吳楚僭王之譏焉嗚呼畫前元有易何俟雄之贅哉邵康節詩須信畫前元有易自從刪後更無詩雄且不能逃君子之議則京房之卦氣京房以卦氣用事候寒温風雨元嵩之元包後周衛元嵩作元包唐蘇源明為之傳李江為之注一行之大衍唐僧一行作大衍厯皆謬也屈平之騷經蓋傚詩之比興也以香草比君子以龍鳳比忠正美人以喻時君惡鳥以况小人王逸序楚詞章句以騷之文依詩取興引義譬喻以善鳥香草譬忠正以惡禽臭物比讒佞取美大人以譬於君宓妃佚安以譬賢臣蛟龍鸞鳯以託君子鴟鴞雲霓以為小人然詩之體尚忠厚騷之體類迫切是原蔽於怨而作也此或者所以有異經典之誚焉劉勰云嗚呼刪後更無詩何待原之傚哉見上原且不能逭後世之譏則王褒得賢之頌漢王褒作聖主得賢臣頌宗元平淮之雅柳宗元皆妄也吳越之春秋後漢趙曄為吳越春秋其屬辭皆不與春秋史記相似非史筆之正出隋志楚漢之春秋後漢班彪傳漢興定天下太中大夫陸賈記錄時功作楚漢春秋九篇非不求合於春秋也然游夏髙弟且不能措一辭况諸公乎三國之尚書史通云記注之尚書非不求合於書也然秦魯二篇聖人且不得已繫於帝王之後况後世乎世儒論後之學者僭擬聖經正如兒曹歛容危坐以效老成拜伏跪起以效賔主言氣象大不相類也雖然聖經之名固不可擬而所述之道獨不可學乎聖經之體固不可襲而所寓之意獨不可求乎述性命者存乎易讀易而得性命之理雖未必曰易謂之得於易可也詠性情者存乎詩作詩而得性情之㫖雖未必曰詩謂之得於詩可也示直筆者在春秋紀政事者在乎書作史而能成實錄備故事雖未必曰書曰春秋謂之得於書春秋亦可也石介之宋頌九篇衆謂猗那清廟之詩無以加石介著宋頌九篇衆論以猗那清廟之詩無以加此云云嗚呼劉禹錫三閣四章魯直且以黍離配之宋頌之無愧猗那也宜矣黄山谷謂劉禹錫三閣四章可以配黍離尹洙之皇雅十篇人謂堯典舜歌而下所未聞尹洙作皇雅十篇范文正公序其文堯典舜歌而下文章之作醇醨迭變抑末揚本去鄭復雅左右聖人之道者難之師魯從穆伯長遊力為古文而師魯深於春秋故其文謹嚴嗚呼韓退之淮西之碑孫覺且嘆其叙如書則皇雅之可軋舜歌也亦宜矣後山詩話龍圖孫學士覺論文謂退之淮西碑叙如書銘如詩康節先天之學邵康節明先天易其詩曰天地定位否泰反類山澤通氣咸損見義雷風相薄恒益起意水火相射旣濟未濟濓溪太極之圖濓溪作太極圖論無極而太極云云雖未嘗規規於方州部家之體而理數暗合於易噫孟子七篇之書不言易而君子謂其深於易者以其所載者性命也王元之之太祖實錄其事直書王禹偁修太祖實錄直言其事執政以禹偁輕重其間出知黄州曽子固之兩朝國史必主仁義曽鞏修兩朝國史所為文開合馳騁應用不窮然言近旨逺其歸必主於仁義雖未嘗屑屑於編年之法而褒貶實得於春秋噫子長易編年而為紀傳表書君子謂其合於春秋者以其所書者實錄也史記如不表吳者或謂春秋外夷狄之意世之議者且曰司馬所著潛虚之書毋乃蹈太元之轍乎曰此未必出公之手也吾觀傳公之行者不聞一語及於潛虚其意可見矣温公行状墓銘不載潛虚世之議者又曰朱氏所補大學致知格物之章毋乃效補詩之尤乎曰此亦知先生之已說者吾觀章句之序自謂以程氏之說輯之以俟後之君子其意亦不敢自專矣見太學章句序噫曽經聖人手議論安得到後之學者妄為僭經之舉盍以是自訟云明經唐本朝亦能得人三十老明經五十少進士此唐人之謡也唐人言進士盛於貞觀永徽之際不由此選終不為重則曰白衣公卿又曰二品白衫其艱難則曰三十老明經五十少進士焚香禮進士撤幕待經生此我朝之詩也編年仁宗謹於選士皇祐五年廷試焚香祝之曰愿得忠孝状元洎唱名則鄭獬也時有詩曰焚香禮進士撤幕待經生夫以詩謡觀之則明經之科亦輕於進士矣噫有由矣蓋唐之試明經者但取絶句楊綰奏有司帖試明經不知大義乃取年頭月尾孤經絶句我朝之試明經者專取記誦天聖八年晏殊言近明經並試試䇿問參其所習以校材識今專取記誦請試䇿後議以上夫惟取絶句專記誦所以起人厭薄之意使講明先王之義理紬繹諸儒之議論明於理體為郷所稱如唐人之詔髙祖詔諸州明於理性為郷里稱者縣考州覆歳隨方物入貢經學優深可以為師如國朝之科太宗國初有經學優深可以為師科亦何遜於進士哉雖然是科之設唐與國朝未嘗不重而得人亦未嘗不盛也唐之設科有五經有二經有學究一經有三禮有三傳唐選舉志明經之科有五經有三經有二經有學究一經有三禮有三史有史科此歳舉之常選也此選舉之條也國朝之設科有三禮薛顔字彦回少以三禮取第有三經太平興國四年詔曰明法於諸科之中功績最小學究併三經之業精習稍艱自詩書易只習一經仍併明法有二經雍熙三年書易併為一經明經亦復令兼置二經有名曰經學優深見上有名曰經明行修真宗祥符二年試服勤詞學經明行修張師德等又元年試舉人張觀以下及第此科舉之目也及考唐制誥三家傳儀禮出身者不任散官其崇尚之意甚隆矣唐選舉志楊綰云云因詔以三家傳儀禮出身者不任散官入觀國朝嘗試經明行修舉人以經義精奥至上煩御筆親選考官以授其義其選取之意尤厚矣真宗嘗試經明行修舉人召考試官諭以去歳所試義自多不便王旦曰蓋經義實取精奥注疏文字亦與廟諱同者故出義頗艱因出兩制三館官簿義釋考官親選以御筆記之夫待之不薄選之不輕而洪儒實學亦彬彬於是科之内是故顔孔之訓五經貞觀間孔頴達與顔師古撰五經義訓凡百餘篇詔改為正義云德明之著音義陸德明著六經釋音治易則康子元本傳議禮則元行冲本傳談春秋則蓋文達並本傳舉周禮刪定郊祀者禇無量也舉詩禮以對祈穀祀者王仲丘也並本傳他如狄仁傑許孟容徐有功皆挺然於明經之舉本傳狄仁傑舉明經許孟容擢進士第又第明經徐有功以學行舉明經則明經何負於唐哉崔頥正則以明經進士太宗時崔頥正與弟偓佺舉進士明經孔維則以九經及第事畧孔維字為則以九經及第國子周禮禮記博士聶崇義薛顔舉於三禮之選聶崇義少舉三禮明禮學通經旨又薛顔字彦回三禮及第為嘉州司户張師德張觀出於經明行修之科見上辨析經疑講明易卦則如馮原之擢五經馮原字伯宗崔頥正孫奭授以五經大義舉進士為江隂尉㑹詔擇明經補學官謝泌領餘諾之因問以疑義輙辨析遂以為國子監直講真宗講泰卦上恱除龍圖直閣先列注疏後斷已意則如劉道原之應大義皇祐初詔能講解經義者别奏名趙周翰問春秋禮記大義劉恕道原年十八所對最詳先具注疏次引諸儒異說末以已意斷之主司擢為第一則明經何慊於我朝哉愚之所憾者唐人外有尊經之名而不知尊聖人之道聖經雜於釋老故髙祖釋奠浮屠惠乗道士劉進喜乃得與徐文達陸德明同講髙祖已釋奠召博士徐文達浮屠惠乗道士劉進喜各講經德明隨方立義徧析其要帝大喜曰三人者誠辨然德明所舉輙蔽髙宗已數召李元植與方士浮屠講經本傳甚至明經一科且雜試以老子之學人主好尚如此則士之通經無怪其所學之不純矣祝欽明之五經掃地本傳欽明擢明經作八風舞盧藏用曰是舉五經掃地矣元㣲之之阿附匪人元稹字㣲之十五擢明經判入等後與中人交已相裴度所學安在耶若我朝以經學立民極以吾道扶世教或專於明經或合於進士雖沿革不常而尊重聖道之意千載一日也熙寧四年除聲律專意經義罷明經及諸科立意舉新制曰進士罷詩賦名占詩書易禮記周禮二經至元祐禮部言經義詩賦名試進士是以經學一唱靡然化之經義名齋學者雲集有如胡安定胡安定有經義齋有治事齋經術傳授學者數百有如蔡端明蔡襄知福州時閩士專詩賦應科舉公得周希孟以經術傳授學者至數百人云云孫明復唱於平陽太山先生孫明復乃晉州平陽人石守道振於兖州石介字守道兖州人濓溪講於㫪陵周茂叔濓溪先生九江人二程鳴於伊洛程明道先生伊川先生洛中學者皆尊之張子明於關中張載字子厚關中皆尊其學莫不以性命道德為依據以仁義禮樂為宗主至今學者皆知有正心誠意格物致知之學諸先生之力多矣豈非我朝作成崇重之效歟愚故併及之武舉論武舉設科之由自周人以射御賔興已有用武取士之意然未有其名爾大司徒至漢人以兵法召募遂有用武取士之名然未有其科爾成帝元延元年詔舉明兵法有大慮者及唐人又别立一科謂之武舉而進士武舉始為二焉唐武后長安二年始立武舉之科至睿宗則其法始行元宗増置嘗觀成周之時士之在庠序之間嘗從事於射矣有賔客之事則以射有祭祀之事則以射别士之行同從偶則以射平時以此為教養之術三歳以此為賔興之地大者居則為六卿之官出則為六卿之将次者入則為比閭族黨之師行則皆卒兩師旅之帥是時也㴠養於庠序之時選舉於郷閭之日特未嘗明言用武以取士也故曰未有其名爾漢至武帝以良家子而立選漢武帝選六郡良家子以為羽林士成帝以知名而召募成帝元延年詔北邉二十二郡舉猛勇知兵者各一人有詔舉明曉戰陣後漢安帝詔舉明曉軍法之士有詔舉武猛堪任安帝建元之間又有武猛堪任之舉有詔舉明戰陣之畧詣公車靈帝元和間又舉有戰陣之畧者詣公車有詔舉猛勇才略之人皆名聞西晉武帝詔曰吳㑹未平宜得猛士以濟武功其普告州郡有勇猛秀異才力傑出者皆名聞兖州馬隆材堪為良將帝以為司馬督涼州刺史楊傾失羌戎之和隆陳必敗俄而傾沒於敵河西斷絶以隆為武威太守隆募能引弓四鈞弩九石者得三千五百人終平秦涼是名二三人皆知之甘延壽伸威外國號為賢将趙充國坐困西羌輝映麟閣本傳甘趙本以良家子應選也馬隆偏廂制車深入力戰秦涼削平功名第一隆本以勇猛應募也是時也示之以威武之名作之以功名之心尚未聞設科以取士也故曰未聞其科耳唐自開國諸将老死殆盡邉陲宿衛空虚乏使遂更翹關負重之選而所得皆姦悍無賴之流故其弊也坐廟堂仕州縣者以執兵為恥守邉疆入宿衛者不識一丁字猶幸懲其前弊更立新制開元増置軍謀宏逺堪任將帥之科開元大備舊制每歳孟春如明經進士之法行郷飲酒之禮送于兵部其校試之職則掌射員外其試用之法則自凡上有馬射有馬鎗有歩射有穿禮有翹關有負重與大身材言語之選大抵手射之科惟所中多者為第天寶増置明孫吳法之科當時所取之士不為無補於國家故開元一舉而得裴端復天寶再舉而得郭子儀裴之事業固未多見而子儀當版蕩之秋禄山思明繼踵爲亂吐蕃回紇輕視中國唐祀幾絶而復續者皆子儀剪滅定撫之功是賴出本傳是時也進士則取文辭武舉則取勇智故曰進士武舉始兩立者是也五季之末諸將大抵多務鬭力強弓勁弩以徹堅中的為竒利刀長槊以回鋒挫銳為功而古今成敗隂謀竒計了莫識為何等事直姦悍之匹夫耳藝祖思移其習以収其效於是盡敕諸将讀書史閱義理而復設武舉之科申敕諸道解送此武科之始設也要覽太祖開寶元年太祖令諸道解武舉者命李昉扈蒙試問所習之業皆無乃罷之自後真宗有軍謀深逺武藝絶倫之科咸平制也咸平三年真宗北征趙安仁上言當今有至要者五其三求軍謀合武舉已議復行其軍謀深逺武藝絶倫伏望復唐室故事復開此選至景德初更詔兩制三館復詳定武舉條貫焉仁宗有歩射馬射策試之法天聖制也天聖七年置武舉應三班院使人文武子弟實有軍謀武藝許詣兵部投牒取應先投軍機䇿論三卷每卷三道召人保委先試歩射一石弓力馬射七斗弓力問䇿一道合格即引見召試至寶元間復詔兵部試武舉以䇿論定去留以弓馬定髙下焉聖政編年夫我真宗仁宗之留意是科者豈徒徇虚名亡實用哉蓋自當時太平全盛之後應制科者樂為賢良方正而恥為将帥邉寄之名天聖七年置制科其名曰賢良方正直言極諫科博通典墳明於教化科才識兼茂明於體用科詳明典吏可使從政科識洞韜畧運籌決勝科軍謀宏逺材堪邉寄科凡以得京朝官之被舉及應選者應武舉者徒知蹶張馳射而不知有智謀韜略之秘富弼獻閲将議於景祐曰今選将之道或列制科或設武舉其應制科者必樂為賢良方正恥為将帥而應武舉者蹶張馳射擠於卒伍所得皆妄庸鄙淺蓋今重文雅以輕武節也於是旣取武藝又取軍謀既考騎射又考䇿試而異人傑士徃徃間出於是科之下是故景德設科之初髙志寧出焉天聖改紀申命之後令狐挺出焉方元昊之未發也志寧請兵欲覆其巢穴謀不獲售元昊因以背逆何料敵之精耶韓琦謂志寧可比淮隂其美之深矣方智髙之梗化也挺教狄青以蕃落騎擣其虚青果取勝何知兵之熟耶畢仲游謂挺觀敵制變籌度萬里外猶矢破的當其稱之極矣二人雖未中選不盡其用然平日閑習是科非但區區於鞍馬弓矢之末也長編雖然今日有武學養之於未用之初有武舉擢之於將用之日其法誠善矣然復能意氣以感召之精神以招徠之或出於大臣之論薦或選於世家之傳習又出於是科之外可也昔蘇洵謂弓馬䇿試未盡可使兩制舉所聞方略弓馬勇而有謀者待以不次之任蘇老泉文請為新制以革其弊弓馬不過麄才䇿試亦為無用可使兩制舉所聞弓馬勇而有謀者待以不次之任范文正亦謂今可於忠孝之門挾智勇之器堪将材者宻授兵畧試邉任一朝用之不甚顛沛范文正公曰将門出将古有言焉今可於忠孝之門挾智勇之器堪将材者宻授兵畧試邉任其議山水之向背厯星霜之艱難宜用之不至顛沛今於有司程度之外復為一術以籠絡天下不羈之士則出是科者可以為郭子儀不出是科者亦不失為韓淮隂而天下無遺材矣宏詞唐本朝設科得人唐人嘗行是科矣而韓昌黎謂古之豪傑必慚是選韓答崔立之書僕聞禮部有以博學宏詞選者人尤謂之才退因取所試讀之乃類於俳優者之辭顔忸怩而心不寧者數月國朝亦行是科矣而楊龜山謂古人得已似不如此龜山云試宏詞乃是以文字自售古人得已似不如此嗟夫設科本得士而反以累士又果何取哉然自郷舉里選之法壞士之抱寸長挾一藝者其肯與草木俱腐不得不奮於科目之中况潤色皇猷黼黻王言非老於文墨者誰能任之此唐人因隋國朝因唐於科舉之外而設是科未可執二公之說以議詞學也愚請先論沿革之制而後及於得人之盛則亦無負於人國家矣夫宏詞之創於隋盛於唐見於志選舉之詳固不必論若我朝始於何時哉蓋國初有宏詞㧞萃科陳彭年言流内銓選人許應宏詞㧞萃科云云有服勤詞學科丁度程琳皆中服勤詞學科或者此其兆歟夫是科之復蓋起於紹聖罷詩賦之時也于時議臣建言採唐人宏麗秀異之目而謂詞賦旣罷求天下應用之文故特復此科焉神宗十三年髙冏白神宗以經術造士遂罷詩賦又慮不足以盡人才乃設詞學一科試以雜文又餘見長編紹聖三年其目有記序箴銘有表章露布有檄書戒頌每歳必試而所試特四題爾至於大觀四年則以紹聖為未備而改為詞學兼茂建中靖國元年應試中宏詞人不拘有無考任並除學官大觀間謂之詞學兼茂紹興初謂之博學宏詞紹興之二年則又以大觀為未備而改為博學宏詞其除去檄書而増入制誥者大觀之法也其再復檄書而演為六題者紹興之法也雖然此沿革之制也自唐以至今日其人材彬彬相望蓋為是科之榮爾且論諫仁義其篇數百搜次成敗其種五十規諫可尚也唐陸贄傳中博學宏詞又贊曰贄論諫數百篇譏陳時病皆本仁義李絳傳擢進士宏詞又云詔絳搜次君臣成敗五十種為列屏帳便坐帝乃閱視䇿勲淮蔡強藩屏氣收功兩河唐室中興事業可嘉也裴度傳以宏詞補校書郎又云時討蔡數不利度親身督戰縛元濟以歸賢杜黄裳傳中宏詞又云黄裳言王者之道在修己任而已帝納之由是平夏剪齊滅蔡復兩河自黄裳啓之文塲弄權深摧其鋒回紇恃功力沮其氣其志節髙矣鄭絪傳擢進士宏詞竇文場詩功隂諷宰相進擬如統軍比絪當作制奏罷統軍用麻廷蕭昕傳再中博學宏詞科大厯中持節使回紇恃功責昕昕曰云云回紇大慚因厚禮遣使者約和典司文衡無卑弱氣掌直制誥有典誥風其文學純矣髙錯傳連中進士宏詞科開成元年權知貢舉帝曰比年文章卑弱今所尚差勝於前鄭覃曰陛下矯革文弊以正頽俗而錯乃能為陛下得人風崔元翰傳舉宏詞知制誥其文粹温厚有典雅噫得人如唐之數子亦何有於昌黎必慚是選之說哉論事不及已之私則有丁度事畧丁度祥符四年中服勤詞學科侍從十五年數論天下事未嘗及其私事君不發人之私則有李熙靖長通鑑云云何正大也程琳則不屈於繼明祥符四年程琳登服勤詞學科持重不撓不屈於李繼明譚世勣則不附於蔡京事實何剛方也段少連伏閣於明道明道二年晁詠之上書於元符晁詠之少有異才蘇軾曰此奇才也後舉宏詞何鯁介也噫得人如我朝之諸公亦何有於龜山古人得已之論哉或者又曰王涯劉禹錫本博學宏詞也而阿附匪人君子羞之王涯劉禹錫應中博學宏詞科涯附李訓禹錫附王叔文秦檜本辭學兼茂也而姦謀誤國後世有憾焉宣和五年若是適為詞科之累而又何足尚者嗟夫舉秀才不知書舉孝亷濁如泥自古皆不免有此然不可以一髽而譏百冠也然嘗論之有宏詞之名者必其有宏詞之實夫穿貫古今網羅散失其學如此而後謂之博閎中肆外矢口成章其詞如此而後謂之宏上之艱其選者所以重其選也下之疑其薄者毋乃自處於薄乎學問無窮文章無盡科目不可以茍得爵禄不可以濫取是必思若湧泉如蘇頲蘇頲傳元宗平内難書命填委頲所占授輕重無少差李嶠曰舍人思若湧泉吾所不及氣備中和如許景先許景先傳辭旨豐美得中和之氣援準古誼如解事舍人齊幹傳論議及詔誥皆援準古誼號解事舍人文章顯名如燕許手筆蘇頲傳頲與張說以文章顯號望畧等故時號燕許大手筆然後可以展詔誥必敷奏機辯如新豐布衣馬周傳周入關舍新豐逆旅又曰周敷奏機辯通達國體如洛陽年少前漢賈誼贊通達國體又本傳洛陽之人年少初學以論議則郎顗之於災異郎顗傳順帝時災異屢見公車召顗乃詣闕拜章以薦賢則孔融之稱一鶚禰衡傳孔融上疏薦之曰鷙鳥累百不如一鶚然後可以為章表揚清激濁褒善貶惡莫大乎誥誡觀夫寧慰父老之心明諭天子之意則得體焉選司馬相如諭蜀父老文云云運幕府之機奏武功之捷者莫大乎露布觀夫馬上占辭敏若宿成則有法焉唐薛攸傳云云條陳利害警肅邇遐莫大乎檄書觀夫千里論事若對面語則中度焉房元齡傳居府出入十年軍符府檄駐馬即辦髙祖曰若人每謂吾兒陳事千里外猶對面語託當時之事實垂銘鏤以無窮者莫如銘必若華山之作髙標赫世半壁飛雨之辭可誦也補衮職之將闕防機微於未然莫如箴必若口戒之作室本無暗垣之有耳之言可佩也翼乎如鴻毛遇順風沛乎如巨魚縱大壑斯可以言頌襟三江而帶五湖控蠻荆而引甌越斯可以言記李商隱所謂皇王之道盡識聖賢之文盡知然後可以為博學宏詞堂除唐國朝沿革之由自銓曹之弊滋而堂除之法始立自叙遷之意拘而堂除之權始重又其後也堂闕稍正而堂除之事簡堂簿復創而堂除之事繁此先後沿革之由也嘗試考之蓋東漢權歸臺閣不任三公而尚書之選所由出仲長統傳光武恐權臣之竊命雖置三公事歸臺閣晉宋而下沿襲舊制晉以山濤為吏部尚書中外品員多所啓擬晉山濤為吏部尚書居選部十餘年每官闕輙啓擬中外品員多由之濤所奏甄别人物各為題號山公啓事宋以蔡擴為吏部尚書黄散以下悉以付之擴猶以為失職而不拜宋蔡廓為吏部尚書廓至謂左丞傅隆曰選皆出我乎隆言之執政徐羨之曰黄散以下專以相委過此則與衆參之廓聞之曰我不能為徐羨之書紙尾遂不就案黄紙錄事尚書與吏部尚書連名故云書紙尾則吏部之職上自卿大夫下自州縣之吏無所不總而宰相尚不肯於除吏至唐中葉吏部無所黜陟而後宰相得以任除用之責有敕受有旨受敕受者五品以上宰臣奏議而除拜之旨受者六品以下吏部得銓材授之開元初起居遺補及御史等官皆以旨受而列於選曹四年乃敕貟外郎御史并餘供奉官皆以敕受而不在吏部通鑑德宗記陸贄請令臺省長官各舉其屬署其名於詔書異日考其殿最并以升降舉者五日詔行贄議未幾或言於上曰諸司所舉皆有情故或受貨賄不得實才上宻喻贄自今改除卿宜自擇勿任諸司贄上奏其畧曰國朝五品以上制敕命之蓋宰相商議奏可者也六品以下則旨受蓋吏部銓材書職詔旨蓋聞而不可否者也開元中起居遺補御史等並列其選曹其後倖臣專朝舍僉議而重已權廢公舉而行私意宰相總其大而吏部任其小此堂除之法始立也五代之際文武諸臣考滿則遷叙遷之法遂為弊政我藝祖欲革其習故舉而委之大臣俾之進退百官總理衆職政要故事文武常參官名以事著於月限考滿則遷太祖籍名責實非有勞者未嘗遷秩自是歳滿叙遷之法頗不復常自卿監而下號寄禄官至中散大夫始由堂除而吏部不敢專自元士而下合從常調者悉歸銓綜而中書不可侵政和三年吕頥浩奏祖宗故事除監司知州及舊格堂除通判外如監司屬官鹽場坑冶錢監等闕一切撥還吏部自監察御史省郎以上及祕書省官書􅈰諌議編修官堂除外始寺監丞法寺官外路學官亦令吏部注擬士人旣有入仕之路則自知亷恥矣惟銓曹不得堂除之次故吏部之法嚴惟中書不可侵吏部之權故廟堂之權重吕端方拜平章而太宗勉以進賢為稱職寶訓至道元年四月吕端拜平章事太宗曰廟堂之上固無虚授但能進賢退不肖便為稱職卿宜勉之馮拯訟尚書除授不公而㓂萊公因而罷政事畧本傳天子嚴其法大臣嚴其選此堂除之權始重也元豐間肇新官制首欲革一時冗濫之弊乃詔有司俾造選格凡部闕之在堂者稍歸正于銓衡一時士論號為至公蘇頌行状神宗謂三代至漢未嘗有文武之制蘇頌言唐吏部有三銓之法分品秩掌選事今若文武一歸吏部莫若分左右曹以掌兩選從之於是吏部有四銓之法文臣之升朝者尚書左選掌之自初任幕職州縣官侍郎右選掌之武官之升朝者有尚書右選掌之自副尉至從義侍郎左選掌之元祐初年韓縝在政府復罷選格請取繁劇之地六十餘闕竟歸中書而御史王陶力詆其不可正所以止覬倖而尊廟堂當是時堂除之事稍簡矣長編崇觀間始創堂除之簿以籍其歲月注其考任述其初過立法以防之廟堂失論道之體而除授日冗士夫艱仕進之路而奔競日長政和三年吕頥浩言近世堂除多侵注擬士人失職望下吏部正所以養亷恥而尊廟堂當是時堂除之事益繁矣政和三年吕頥浩奏祖宗時内外差遣並付審官院流内銓堂窠窠闕不多士大夫自有調官之路故奔競風息近世堂除多侵注擬士人失職亷恥道喪望下吏部考矣雖然此法也蓋廟堂乃官人之源堂除非用法之地茍較量銖尺謹守程度自可付之有司則奚取於道揆故田蚡薦人起家至二千石田蚡傳薦人起家至二千石武帝曰君薦吏未吾亦欲除吏李吉甫㧞士引用凡三十人李吉甫始執政以情謂裴垍曰此日人物吾之不及知且宰相職當進賢任能君精鑒為我言之垍即簡求疏三十許人吉甫㝷以薦于朝天下稱得人未足多道而後世以為美談者以大臣職業所當然也太宗謂宰相曰中書職任進賢退不肖卿在中書何由盡知他人舉薦各以類進卿更審詳可否大哉帝王之言真知任輔相之體矣寶訓太宗謂宰相曰中書職任進賢退不肖但一郡一邑得良吏即民受其賜卿在中書何由盡知中外官吏賢否他人舉薦各以類進卿更審詳可否亦致理之道也㓂準為相每用人材有持例簿以進者準曰宰相用人是安有例懿哉先民之言真能得輔相之體矣章聖嘗謂兩府擇一人為馬歩指揮使吏以例簿進公叱曰朝廷用一牙官尚須檢例安用我輩哉且寅亮天工非賢罔乂坐居廟堂進退百官然終無意必則好惡正心無適莫則取舍公藏用貴宻而下情貴孚多門貴塞而公道貴廣惟清心以照羣動惟虚已以納萬類惟誠則維明定則應則以之官使庶工總理衆務如鑑之明水之清衆影畢陳而萬象俱見矣張師德以兩造王旦之門是以緩其遷王文正公旦傳張師德兩詣王旦相公門不得見公語向文簡曰師德名家子有士行不意兩及吾門状元及第榮進素定但當靜以待之若復奔競使無階而進者當何如也劉安世以不通温公之書是以驟其用温公薦劉安世充館職因謂曰知所以相薦乎安世曰獲與公遊舊矣曰非也光居閑足下時節問訊不絶位政府足下獨無書此所以薦也吕蒙正之薦夷簡而不以為私吕蒙正為相致仕真宗問諸子孰可用公曰臣子不足用有姪夷簡宰相材也夷簡之擢仲淹而不以為嫌吕夷簡景祐執政范仲淹屢攻之落職知饒州後夷簡復入相言於仁宗曰仲淹賢者豈可但除舊職仲淹謝曰向以公事忤相公不謂相公乃爾夷簡曰夷簡豈復以舊事為念耶抑揚升黜惟合公道此輔相之體也嗟夫堂除之說天子託大臣以選擇人材無資格之拘無關鍵之限所恃公心之取予耳薦賢自任力求報國對客來訪隨錄嚢中吕蒙正庶毋負大臣之責然而沓來踵至相禪於無窮寡亷鮮恥舉期於必得大言未必底績虚譽每多誤人䛕佞類忠鯁亮似激異論工於先入邪說易於抵㠊故陳篇獻記適以長奔競之風乗權藉勢無非為僥倖之舉宰邑無聞競圖院轄分教将終希望掌故中書之地不知崇嚴而一命以上皆得以納約於賔吏卑陬罄折語言周遭殊無愛君憂國之忠而動有干榮嗜進之請噫可嘆也雖然以先輩而處已以報國而存心旌恬退則躁求者知恥擢重厚則浮薄者自退才可用也而親讎之不問德可采也而資叙之不拘則東閣之開何患無董汲之賢哉吏部論古今任人選部之設尚矣尚書之有選部則始於漢後漢百官志成帝初置尚書有尚書侍曹主公卿事後漢改為吏曹主選舉祠祀後又為選部尚書而為吏部則始於魏通鑑魏改選部為吏部主選事云云吏部之有侍郎則始於隋同上隋吏部尚書一人正二品侍郎二人正三品此設官之由也縣令以上始赴尚書則漢吏部之職前漢張敞傳膠東吏追捕有功上名尚書調補縣令者數十人黄散以下悉委之選則宋吏部之職通鑑宋營陽王紀蔡廓為吏部尚書廓謂傅亮曰選事悉以見付亮以語尚書徐羨之羨之曰黄散以下悉以委之諫員臺屬皆以㫖敕則唐開元以前吏部之職同上德宗紀陸贄奏曰國朝五品以上制敕命之蓋宰相商議奏可否也六品以下則旨受蓋吏部銓材授職此除吏之由也然以厯代論之則銓綜之法莫宻於唐亦莫疎於唐蓋綱維所繫不過兩端一曰試法二曰集法試以訂其實集以限其來也已集而試察其書判旣集而銓察其身言此試法也唐選舉志選人之法有四一曰身體貌豐偉二曰言言辭辯正三曰書楷法遒美四曰判文理優長五品以上及臺省官皆三考餘四考五品以上始集而試觀其書判已試而銓察其身言期以十月畢以三月此集法也同上貞觀二年侍郎劉林甫言隋制以十一月為選始至春乃畢今選者衆請四時至十九年馬周以四時為勞乃復以十月為選至三月畢始者制度方新人情未玩觀德考行雖未見其平生諮事考言猶可見其梗槩及夫仕者既衆入流益蕃偽主符誥以為官接承他姓而應調旁坐而假手詭貫而冐名雖差逓選期繁設等級開紏告之令増譴犯之科較藝至用糊名命題時引僻事防禁雖具弊端益滋而試法壞矣同上始者兵革方休人不樂仕至符移以速其集續食以資其行留放以時注擬斯速故應選者暫集而遐邇無聚糧之費合退者歸而長安無索米之勞自後集法不常或四時擬注或三年一集真偽易於混淆文牘不可尋勘十年不入官員闕莫之補而集法壞矣同上乾元後天下兵興率三年一補吏員稽壅則案牘叢淆偽冐蒙真吏緣為奸廢置無綱至十年不被調者散員或累嵗不舉裴光庭作循資格以矯試法之弊陸宣公立計闕例以救集法之偏然而躡級限年賢愚一槩於是有四十而從仕六十而未離一尉者也方試法未壞尚可因是以求才及其壞也一切用資格矣裴光庭為吏部尚書始作循資格而賢愚一槩必與格合乃得銓授限年躡級不得踰越於是乆淹不收使之謂之聖書及光庭卒蕭嵩以為非求才之方奏罷之乃下詔曰凡人年三十而出身四十乃得而從事更造格以分寸為差若循新格則六十年未離一尉自今選人才業優異有操行及逺郡下僚名迹稍著者考吏部隨材甄擢之又見選舉志然唐人銓選不實則除名鄭善果除官不當則奪俸鄭絪詭冐資䕃則坐以流罪時選者盛集有詭冐資䕃冐牒取調者獄具戴胄以法當流典選納賂則終於斥去崔湜傳武德以來父子同為侍郎與鄭愔同典選納賂遺為御史劾奏云云上惟以法而責人下亦以人而任法其升黜進退尚有出於微文之外也是故有設榜引注悉有差次者裴行儉髙宗時為司列太常伯始設長名榜引銓引法復定州縣升降為八等具三品五府都䕶都督府悉有差次量官資授之有裁抑僥倖奏停斜封者李朝隠中宗時為吏部員外郎時政出權倖不關兩省而内授官但斜封其状付中書侍郎宣所司朝隠執罷千四百員怨誹喧騰朝隠脫然無避况又有如削李下之蹊李義睿宗時為吏部尚書仍知制誥請謁不行時人語曰李下無蹊徑賜金背之鏡而請託不得行乎髙季輔太宗時為吏部侍郎善銓序人物帝賜金背鏡一况其清鑑有姓厯銓厯裁綜無弊者李敬宣為少常伯委事於員外郎張仁偉仁偉又造姓厯改狀様銓厯等程式而銓總之法宻矣有偽牒詭功擿檢無遺者盧從愿睿宗時為吏部侍郎吏選自中宗後耗蕩愿精力於官偽牒詭功擿檢無所遺銓總六年以平允聞况又有如裴馬有聲於臺閣馬載為司列少常伯與裴行儉並掌選事言者皆稱裴馬盧宋俱髙於銓次而號稱平允者乎宋璟為吏部尚書先是崔湜鄭愔典選為歳近予奪至逆用二歳闕猶不能給更置冬選流品淆并璟與侍郎李義盧從愿澄革之由是銓總平允若是者無非所以救法意之不善而濟之以人者也國朝銓選之法不知幾變矣其始也文臣屬中書武臣屬樞宻三班屬宣徽院當是時大臣之權重而有司無與矣吕源云太宗末置審官三班其後也置審官院以分中書之權置審官東院以分樞宻之權以宣徽所掌而歸三班院以幕職州縣考課而歸流内銓當是時大臣之權分而有司參舉矣實錄太宗置磨勘京朝官院又實錄淳熙四年又其後官制之行也合東西審官之事而歸之左右尚書合流内三班之事而歸之左右侍郎當是時大臣之任輕而有司專職矣蘇頌行狀神宗謂三代至漢未嘗有文武之制蘇頌言唐吏部有三銓之法分品秩掌選事今欲文武一歸吏部莫如分左右曹以掌兩選從之於是吏部有四選之法文臣之升朝者尚書左選掌之自初任幕職州縣官侍郎右選掌之武官之升朝者尚書右選掌之自副尉至從義侍郎左選掌之然權在大臣之時磨勘未立叙遷不行而百官遷轉惟視功績之優劣權在有司之後磨勘旣立叙遷既舉而百官注擬惟拘拘於資格之一定然國朝盛時條例雖主於故常而黜陟則付之長吏寒士寡援者陳狀升擢太中祥符五年陳堯咨判流内銓士有孤寒不為人知者堯咨為陳其狀而升擢之匿事應舉者奪考奏罷長編晉州推官奎亢有私罪匿以白衣應舉及第積十餘歳匿磨勘自首其事賈黯以為罔冐奏罷之奪其勞考是吏部尚得專其去留也自熙寧以來循至今日其權一委吏部天子不之問大臣不之與以歳月乆近而遷轉以名字高下而注授資厯髙深盗跖而必予閥閱未應顔閔而不庸科目斯升而任子亦升恩免者獲進而雜流者亦進覃霈之所霑者既予而僥倖之所及者亦予吏胥為姦弊源鼠穴並緣循習之例不用出入之文毛舉細數而倍費符移摘拾小節而淹延歳月其末流弊極矣猶不思所以變而通之乎今宜重吏部之權專吏部之責法之所當行者則據法以選用不害其為守法否則如唐人欲任牛仙客至越資而不暇顧則法豈可棄哉張九齡傳法之所不必拘者則捨法以進退不害其為超法否則如唐人李元紘拘於法而不得行則法豈可泥哉是必選法不更輕重無欺如王質神道碑王質判流内之日選法備員如權銓選法未嘗更或問衡在執者不欺其輕重何必更法科條掲示奸弊莫容如魯宗道仁宗判銓魯宗道知吏奸狀悉書科條掲於廡下以便選人則善於守法也是必賢者許别論奏如㓂準選薦人錢若水等為朝官長編㓂準薦錢若水等十三人皆遷朝官為直館者不才者則如賈黯廢桑澤之不肖長編至和元年賈黯判流内銓有交通問黯益判推官桑澤在蜀三年不舉具言之於朝坐廢歸田里則善於超法也人與法而並行資與望而兼用尚何患選曹不清而賢否難辨哉古今源流至論别集卷六
