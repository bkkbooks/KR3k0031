body:
  text: 古今源流至論後集卷六宋林駉撰敬臣古之待臣也貌敬而心亦孚後之待臣也貌親而心實踈嗟夫君臣相處不可有一毫之偽也夫茍畜之如犬馬視之如土芥疾之如冦讎此固不足語接下思恭之道若外有出門見賔之禮而内懷疑忌之心陽為盥手納䟽之誠而隂有沮抑之意其視犬馬土芥冦讎之見相去一間耳豈其本心哉是故古者改容而見三公無矯情也下車而拜昌言無薄心也齋戒受諫登拜賢書又非區區笑貌也盖臣鄰賡歌温乎家人之唯諾詩書勸戒甚於師弟之告語平時㑹遇精神無間故於降接之際無徃非誠初非有所矯飾也所謂古之待臣貌敬而心孚者非歟自尊君卑臣之分嚴而情不通秦紀自騎項踞洗之意形而禮愈薄漢髙祖騎周昌項溺酈生冠間有温顔降體之施又非中心之誠然噫可嘆也劒履上殿非不誠也而械繫之辱且不能免蕭何朝禮益荘非不重也而詔獄之嫌至不能脱周勃長沙之謫已行而前席之問徒切賈誼淮陽之驛既遣而避帷之敬徒施汲黯麟閣不名大臣之禮厚矣胡為有赤族之慘霍光凌煙賦詩諫臣之寵至矣何為有仆碑之咎魏徵山南夜詔喜見顔色卒莫去其追仇盡言之恨陸贄曲江召宴愛形詩章終莫逭其信讒投閑之譴裴度所謂後之待臣貌親而心踈者非歟嗚呼尊事黄耇行葦有詩敬體臣下中庸有訓此三代聖人之家法秦漢而下泯矣不有聖世其誰嗣之乎我朝曹彬諸公終始眷禮垂絶之頃至親幸其第而不怠其視盟血未乾狗烹就戮者逺矣言行録曹侍中彬将至絶太宗親臨幸之問以後事對曰臣無事可言固問之對曰臣二子璨與瑋材器可取臣若内舉皆堪為将魏公定䇿兩朝略無疑隙至不容中丞之輕議其視顧命少主驂乗致疑者異矣見上士自一命以上不輕誅戮言者得罪且有遣使護送之禮其視縉紳有過髠鉗相望者不可同年語矣唐介為䑓諫論文潞公燈籠錦事謫居英州潞公亦判許州仁宗遣使護介至謫所趙中令開國勲舊鼎鐺有耳小臣萋斐則出之左遷曰不如是非所以尊國政也雷德驤劾奏普上叱之曰鼎鐺尚有耳汝不聞趙普吾之社稷臣乎遂黜德驤文潞公累朝德望三至中書廷臣輕毁則出之外郡曰不如是非所以重元臣也見上一疾之瘳則爵賞醫者建隆三年王溥范質相繼卧疾上命翰林醫官王襲宋瓊視之溥質皆愈上喜以襲為光禄丞瓊為都水監主簿一疾之療則親剪其鬚慶厯二年吕夷簡感風眩手詔曰古者鬚可療疾朕以賜卿以君見臣有定儀也而肅然拱揖敬之不亦至乎言行録吕端傳真宗初即位每見公肅然拱揖不以名呼常召見便殿訪軍國大事皆有條理上甚嘉納以臣拜君有常禮也而特命毋拜愛之不亦篤乎治平元年詔曰自今視事畢不進食即御經筵故事講讀畢拜而退上命勿拜後遂以為常呼學士而不名重經筵也丁度在經筵仁宗每呼學士而不名呼侍中而不名重宰臣也韓琦見上未嘗呼名只呼侍中半夜親幸示殊恩也開寳元年一夕大雪乆而聞叩門聲甚異亟出則上立雪中普皇恐拜迎上曰已約吾弟矣已而太宗至即普室設重裀地坐熾炭燒肉普妻行酒三日一朝示異禮也吕申公三日一朝噫君臣相處豈為是不切之虚文哉御宴賦詩脱略邉幅仁宗朝嘗賜侍臣宴或賦詩釣魚為樂講筵論經誠意交孚相與之無間則相待之愈厚内心之無疑則外貌之益敬與後世矯情飾容者萬萬不侔矣嗚呼盛哉抑又論之孟子曰君之視臣如手足則臣視君如腹心盖君臣報施之禮然也神宗以師臣待安石盖非常禮也毋使上知至形私書豈毫髪不敢欺之意耶王安石除相神宗常以師臣待之後吕惠卿反覆王氏以安石嘗有私書有毋令上知之語遂呈上上亦疑之髙宗以太師處秦氏亦非輕禮也和議誤國至今非之豈犬馬報君之忠耶秦檜自敵中歸敵以船載其家属後檜除相力主和議遂害岳劉之将敵使通好有毋昜首相之約中興本末噫若人也其不愧有君如此其忍負之之戒乎全功臣龍蛇一章君子所悲晉文公反國賞從亡者介之推不言祿祿亦弗及縣書宫門曰龍欲上天五蛇為輔龍已升天四蛇各入其宇一蛇獨怨終不見處狗兎數語識者憾焉韓信因縳雲夢曰狡兎死走狗烹甚矣功名之難全也噫有由矣盖君之視臣固不可有始敬終慢之心而臣之保身亦不可無急流勇退之節君臣相處未能兩盡其義此誅戮竄逐之禍相望於後世也夫當國歩多艱之秋為君者促席而問謀握手而畫䇿封以大都名城而不靳啖以厚禄豐爵而不吝迨夫禍亂既平遂起厭薄疑忌之心小則為介子推之不及禄見上大則為蕭相國之械繫本傳嗟夫天下無事名為功臣必至屠戮不幸有卒然之警緩急之際誰實頼之此為君不可無保全之仁也夫欲垂名於竹帛之時為臣者冒矢石而不辭處風波而自任瞿然君之不吾信戚然君之不吾用迨夫稍有微勞常有要朝廷之心輕則為光弼之不朝魚朝恩程元振用事日謀有中傷李光弼及來稹為元振䜛死光弼愈恐吐蕃犯京師代宗詔入陜光弼畏禍遷延不敢行及帝幸陜猶倚以為重数發問其毋以觧嫌疑重則為黥布之怨望本傳嗟夫立人本朝以功名自見乃臣子之職分其可㤑功矜能自貽伊慼耶此人臣不可無自全之智也嗚呼三代而下駢首就戮不得老牖下者此雖其君疑忌之過亦其臣之不能脱然自保也歟惜哉且勾踐卧薪嘗膽誓雪呉耻蠡種相與戮力盖同甘苦共患難也呉國既沼之後范蠡扁舟五湖蕭然逺遁不失為陶朱公之樂大夫種不能見幾與長頸鳥喙為終始卒至一死而後已雖勾踐固不足與同逸樂惟范蠡能免而大夫種不能者亦其明哲不足矣史記本傳漢髙祖百戰間關誅秦蹙項韓張比肩漢庭盖左右手之不容釋也南宫行封之後留侯尋盟黄石從遊赤松甘為辟榖之怪淮隂不能歛隠陳兵出入卒至偽遊之劫雖髙祖固少恩人然留侯無恙而韓信就擒者亦其自啓疑心矣西漢本傳大抵土龍芻狗重於方禱之初而賤於既禱之日為君者固以是而自戒養虎馳熊咆哮聲勢於指獵之時而削落爪牙於無事之頃為臣者其可不以是而自儆哉不然文帝能詔獄於木強之周勃而不能及於多智之陳平孝宣能赤族於驕蹇之霍氏而不能加於謹重之安世豈獨其君之失耶並本傳不觀國朝保全之義乎石守信斬艾蓬蒿芟夷根據盖平亂勲臣也我太祖陪宴京師眷留邸第老死無憾焉噫太祖之恩固厚矣而守信等乞觧兵權兩無猜嫌其自全亦智也本朝事實太祖召石守信王審琦等飲酒酒酣上曰汝曹何不釋去兵權擇便好田宅市之為子孫立永乆之計君臣之間兩無猜疑不亦善乎明日皆乞觧軍權以散官就第又蔡氏官制皇朝革方鎮之患召諸鎮于京師欵陪游宴各賜邸第以留之趙中令金匱藏書鼎鐺有耳盖開國勲舊也我太宗追念故績召居揆席始終無怠焉噫太宗之恩固厚矣而趙中令臺論斥劾略不敢肆其自畏亦甚也雷德驤劾奏普上叱之曰鼎鐺尚有耳汝不聞趙普吾社稷臣乎又昭憲太后敕太祖曰汝萬嵗後以次傳之二弟則并汝之子亦獲安矣太祖曰敢不如母教太后具召普於榻前為約誓書普書紙尾藏之金匱後太宗開金匱得書復召為相曹彬平江南之功偉矣寜賜數萬緡之鏹毋寜除使相之職抑之所以全之也彬亦謹畏自喜不敢過望終有二子将壇之登曹彬平江南太祖謂之曰朕欲以卿為使相然今敵尚多卿為使相安肯復為朕盡死力即賜錢二十萬緡而已後彬二子皆登将壇狄青破嶺南之績厚矣寜賜諸子之官毋寜任樞使之寵靳之所以愛之也青亦晩節喜書尤好節義終不為童謡之惑狄青平嶺南智儂還上欲以為樞使同平章事龎籍曰今青雖有功未若曹彬之大若賞以此官則富貴極矣異日復有冦盗青更立功将以何官賞之陛下若謂賞功未盡宜更官其諸子後青除樞使是時范蜀公為諫官人有相語童謡云漢似胡兒胡似漢改頭換面總一般只有汾河非子岸以青為汾河人面有刺字不肯滅去又姓狄為漢人此歌為是人作也為不疑矣欲予言之予應之曰此唐太宗殺李君羡事上安忍為適以啓君臣相疑耳史後范文正公以左氏春秋授武㐮武㐮晩節益喜書尤好節義不特此耳張魏公走烏珠平湖冦破劉豫渡江之所恃而無恐者異時和議一唱百計中傷而髙宗且曰朕待魏公有加終不為浮議所惑此言豈昜發耶然魏公今日上表而待罪明日奏䟽而乞骸未嘗貪心於功名也本傳韓忠武王殱苖劉鏖大儀拓東海中興䇿勲之為第一者異日權臣當國舉朝所憚而髙宗召讌禁苑情同家人嵗時賜予相踵不絶此禮豈昜得耶然韓王從燕於杖屨之樂放意於林泉之間若未嘗有權位也髙宗云韓王起西陲布衣杖劒從我不十數年功名與日月爭光平全蜀夷江西剪湖湘殱苖劉摧烏珠鏖大儀拓東海扞陽楚震淮揚所當無非勍敵而功益不可及秦檜用事舉朝惮檜權力皆附麗為自全計獨王於班列一揖之外不復與親馬又髙宗数召王同家人燕于苑中眷禮深篤数賜名寳劒其他賜予勞問相踵晚以王公奉朝請尤能以道卷舒絶口不言功名盖自罷政居都城髙卧十年杖屨幅巾放意林泉壺觴自樂若未嘗有權位者夫惟祖宗之所以待臣下者既無一毫厭薄之心勲舊之所以自待者復有退然不矜之意宜乎勒功鼎彛光映千古指誓山河延及後嗣三代以下所未見也詩云錫山川土田于周受命祖宗有焉又曰明哲君子以保其身先正有焉吏責􅄔不恤緯而憂王室野人食芹猶念至尊嗟夫士夫儋人之爵立人之本朝而不以國家為任不愧於古君子豈不愧於若人乎自夫人以任怨為嫌也栽培桃李不植荆棘而國家之事不樂為自夫人以嗜利為念也當愁醉醲當飢飽鮮而國家之事不肯為自夫人之畏事也仗馬緘黙轅車局促而國家之事不敢為三者日錮于中而愛君憂國之念薄矣嗚呼曷不觀伊周之存心乎桐宫之事天下所未見也而伊尹處大疑而不恤任重責而不顧攝政之舉當時所駭聞也而周公居流言而不嫌坐羣謗而不變異時衆論退聽上天震怒而伊周之心對越無愧盖天下之利害其怵迫乎吾前者何其多也而惟捐其身則足以當之而無懼天下之議論其動揺乎吾聽者何其不一也而惟守其心則足以居之而不疑伊周之所以任此者惟所捐者身所守者心而已縱使流俗未能知之有識之士其不知之乎天下未能諒之天地鬼神其不鍳臨之乎夫如是何憂何慮而不任其責哉伊周逺矣漢唐臣子其負人國家事者何多耶王氏染指漢鼎正臣子死事之日數千士夫爭獻符命無一人敢言其非而能抗虎狼之勢者惟劉宗老一二臣而已通鑑平帝紀王莽簒政士夫如劉歆之徤以宗室爭獻符命又劉向傳向嘗顯訟宗室譏刺王氏為王氏居官者所持不遷禄山唱亂漁陽正臣子赴難之秋二十四郡望風披靡無一義士敢抗其敵而能禦犬羊之醜者惟顔魯公一人而已曽謂國有人乎通鑑元宗紀時海内承平百姓累世不識兵革猝聞范陽兵起逺近震駭河北皆禄山統内所過州縣望風瓦觧或開門出迎或棄城竄匿或為所擒戮無敢拒之者初平原太守顔真卿知禄山且反因霖雨完城浚濠料丁壮實倉廩禄山以其書生昜之及禄山反牒真卿以平原􅀶平兵七千防河津真卿遣平原司兵李平間道奏之上始聞禄山反河北郡縣皆風靡嘆曰二十四郡無一義士耶及平至大喜曰朕不識顔真卿何状乃能如是此無他任怨嗜利畏事之念切是無怪乎視已為重視國為輕也我朝諸公處事何其有勇為而無退避耶澶淵之役中外震驚欽若堯叟輩第保身而不暇他計萊公親扶日轂屹然山立卒使遼人幾無匹馬隻輪之返萊公何勇哉契丹冦河北諸郡震動天子北巡至澶州敵騎已過魏府矣上不欲渡河駐南澶州陳堯叟勸之蜀王欽若勸之金陵冦凖勸上北渡髙瓊賛之既至澶州士氣百倍㑹有飛矢射其統軍殺之契丹遂請和和議成諸将請設伏邀擊可使敵匹馬不返萊公勸帝勿從縱敵歸國以保盟好至三十九年不敢窺邉蕭英之聘敵情叵測夷簡殊軰第畏首而不敢輕議富鄭公啣使北庭片言伐之而活南北億萬生靈之命鄭公何壮哉慶厯二年契丹聚兵境上遣蕭英劉六符來聘仁宗命擇報聘羣臣皆莫敢行乃命富鄭公報聘見遼主曰北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝勸用兵者皆其身謀非國計也遼主大悟令歸以誓書來富公再使以國書與口傳之詞不同還奏仁宗召夷簡問之曰恐是誤當令改定富公益辯論不平仁宗問晏殊殊曰夷簡决不肯為恐誤耳富公曰晏殊奸邪黨夷簡富公晏公之壻也其忠直如此蘇公頌之曰北至燕然南至于河億萬維生公手撫摩慶厯天子銳意太平范公陜西召還慨然以整飭紀綱為任寜薄任子之恩而不恤僥倖者之謗寜宻磨勘之法而不顧朋黨之論陜西用兵天子以仲淹人望所属㧞用護邉及夷簡召還頼以為治然規模閎大論者以為難行任子之恩薄磨勘之法宻僥倖者不悦於是毁謗浸甚而朋黨之論滋不可觧元祐天子變更新法司馬洛中召用奮然以拯溺捄焚為意寜逐熈豐之黨而不念異日之禍寜罷青苖之法而不忌小人之怨范鎮遺事元祐初范鎮語宇文邦彦曰事有太甚者恐他日為朋黨之禍予先語君實不吾信也舊又聞見録哲宗即位温公當國悉改熈豐舊事或曰臣如吕惠卿章子厚軰皆小人他日有以父子之義間上則朋黨之禍作矣光正色曰天若祚宋必無此事遂改之不疑君子謂光之勇孟軻不如若曰參用熈寜舊臣共變其法實光所不取也夫以冦公鄭公處國勢危疑之秋廷臣畏避之際力如此其艱也范公司馬當黨論方熾之時小人伺隙之日勢如此其逆也然四君子不忌不嫌以身當國初不知其艱且逆噫彼美人兮西方之人兮愚意諸賢其伊周之流歟又有甚於此者凡人之告老而歸也優㳺晩齡顧戀私計固無預乎時政之議而杜祁公雖謝事家居憂念世故見於顔色夜不能寐殆有甚於居朝之日言行録及東都事畧凡人之罹䜛而去也放意林泉陶情麴糵徃徃有抑欝不平之氣而劉莘老方竄逐中惟謂當途者能顧人國事絶不言人之擠排而已之困躓初無異於守官之初言行録凡人處生死之變也悲嗚躑躅未有不念身後者而吕獻公忍死謂平生故人以天下尚可為曽不念其身之病而子孫之貧也言行録嗚呼前軰或於休退或於竄逐或於生死之際而其積心措慮皆無頃刻而不念國家事况於居官任責得行其事乎今之君子嘗加意於此否也噫髙若訥不救仲淹之貶而歐陽脩終不貸若訥之過仲淹因論劉后事貶饒州歐陽脩移書責司諫髙若訥不救仲淹若訥言仲淹貶職臣不敢妄有營救今歐陽脩移書責臣不能辯仲淹非辜恐中外聞之謂天子以意遷逐賢人所損不少貶為夷陵令西京留守推官蔡㐮作四賢一不肖詩四賢指仲淹靖洙脩不肖斥若訥鄒浩未辯孟后之事而曽誕已不恕鄒浩之譏四朝國史曽誕與右正言鄒浩善友孟后之廢誕三與浩書勸使力請后浩不報及浩以諌立劉后南遷誕著玉山主人對客問一篇以譏之論者或以比韓愈諌官論然則士大夫不能以身任責其能逃天下之公議者寡矣可不勉哉諫諍甚矣諫之多端也犯顔逆鱗叩頭流血其名曰直宜也鄒浩極諫得罪世疑其賣直程氏遺書張粹曰鄒浩以極諫得罪世疑其賣直也伊川曰君子之於人當於有過中求無過不當於無過中求有過引裾折檻之人范公之所憂東軒筆録歐陽修余靖蔡㐮王素為諫官四人立引石介范公曰介性好異為諫官必以難行之事責人君少拂其意則引裾折檻叩頭流血主上無失德朝政亦自脩舉安用如此諫官也是直或議其激也和容愉色微言婉辭其名曰諷可也李文靖以宻啓為䜛佞深切惡之龜山語録真宗問李文靖曰人皆有宻啓而卿獨無何也對曰臣待罪宰相公事則公言之何用宻啓夫人臣有宻啓者非䜛則佞臣常惡之豈敢效尤心知其非而辭辯不及者雖趙公槩不免於譏長編范純仁遺荆公書曰參政鄙老誠為因循之人棄公論為流俗之語曽相公惟務雷同一切詭随趙參政心知其非而辭辨不及凡事不能力救此皆朝廷大臣所為安得政令之無失是諷又疑其佞也嗚呼直既不可諷又不可然則君子将安從哉曰臣子之存心貴乎忠進言貴乎誠吾其果忠且誠乎則直者必諒其披肝露膽之真諷者必鍳其遇巷納牖之道否則借忠自文托誠自效是二者皆不免或者之議昔龍逢比干之諫也有過必面折有失必力指不顧其剖心之誅以此為直夫奚疑傅說周公之諫也不直逹其隱不明指其事隱然於詩書規諷之㫖以此為諷夫奚譏噫有傅周龍干之志則可無傅周龍干之志則為激為佞也後之為臣者吾懼焉以直自許者斬錯之爭聞者毛竦或疑其為復讎之舉袁盎折絳之訐言者生氣又疑其不忘吕禄舊時舍人之恩袁盎越職抗議似慷慨也隂為黨王氏之謀谷永傳叩墀死爭若髙亢也第欲附逢吉之意劉栖楚嗚呼勸秦鑿渠意在利韓曽謂直言足信乎能如汲長孺面折廷爭者幾人哉本傳以諷自名者子虛之作鋪張景物適啓神仙之想司馬相如羽獵之賦偽言車騎反滋游樂之心楊雄通西南有書未必助君宣化而窮兵之念已動司馬相如得寳鼎有對未必規君修德而封禪之舉已萌吾丘壽王嗚呼曲終奏雅不免於勸曽謂諷諫可聽乎能如魏鄭公嫵媚規正者幾人哉本傳噫析圭儋爵立人本朝俯伏於冕旒之前愛敬泯於廟堂之上天地鬼神昭布森列不可誣也愚謂進諫之道不問其直不問其諷而一念之誠對越無愧可矣正容極口直而不激托辭寓意曲而不倨若人不昜得也我思古人實獲我心其惟國朝諸公乎伏閣奏事叩鐶呼聲非好名也明道二年郭皇后見廢司諫范仲淹孔道輔孫祖德蒋堂郭勸馬絳叚少連宋祁劉渙詣垂拱殿門伏奏門者闔扉道輔叩銅鐶大呼夷簡奏䑓諫伏閣非美事乃逐之挽衣苦諍叩榻抗論非褊心也記聞太宗時冦萊公為員外郎奏事忤上㫖上拂衣起公手引上衣令上復坐决其事然後退上由是嘉之嘗曰朕得冦凖如唐文皇得魏鄭公也特又石介聖德詩惟修惟靖立朝讞讞言論磥砢忠誠逹素相之後含忠履潔昔為御史幾叩于榻寜為英州之行而必奪寵臣之命名臣傳張堯佐以姪女有寵一日驟遷四使唐介引楊國忠為戒又與諫官論列卒奪兩使又言宰相文彦愽以燈籠錦媚貴妃而致位宰相仁宗大怒後謫英州寜為雪堂之游而力沮新法之行蘇軾論新法事與王荆公不恊出守黄州團練使作雴堂一竦未去凡十八䟽言之而不已夏竦受樞宻使凡十八䟽爭之奪其命代以杜衍一確未竄至十餘章詆之而愈厲言行録吴處厚上蔡確安州所為謗詩劉安世論奏曰確詩十篇多渉譏訕大不敬時彭汝礪及肇在中書為舍人亦皆救確劉公曰上自執政下至堂吏確之黨與殆居其半又與梁燾吳安闕詩同上䟽力爭䟽十餘上始竄確於新州風力愈勁者目為擊鶻王素居臺諫風力愈勁帝曰真御史也議者目公為獨擊鶻廷爭不回者稱為殿虎言行録劉安世正色立朝其面折廷爭至雷霆之怒赫然則執簡却立伺天威少霽復前極論一時奏對且前且却或至四五殿庭觀者皆汗泚竦聼公退則咨嗟嘆服目之曰殿上虎此其風采壁立雖鼎鑊不避也昜曰直方大不習無不利數君子有焉侍從規諫不爭口舌非循黙也寳訓歐陽脩為翰林學士仁宗一日見御閣春帖子讀之曰歐陽之辭也及悉取宫中帖子閲之舉筆不忘規諌真侍從之臣也經筵開陳色温氣和非容悦也元祐初伊川謂温公曰經筵得范淳夫來尤好頥自度乏温潤之氣淳夫色温而氣和可以開陳是非辨錫王勇智之語聞之為戒神宗御經筵吕公著講天乃錫王智勇上曰何以獨言勇智公曰仲虺稱湯能伐夏救民故以勇智言之然聖人之德當如昜所謂聰明睿智神武而不殺者時上富於春秋故公以好勇黷武為戒論酣酒嗜音之句聽之首肯此借經而諭也范祖禹講尚書内作色荒外作禽荒酣酒嗜音峻宇雕墻有一于此未或不亡講畢再誦此六句却立云願陛下留聽哲宗首肯再三論蘇秦約縱則曰無益於治熈寜元年光讀通鑑至蘇秦約縱事上曰蘇張掉三寸舌乃能如是乎光曰秦儀縱横無益於治臣存其事於書者欲見當時以辯説相髙所謂利口覆邦家也上曰卿每有幾諫論嗇夫利口則曰惡其覆邦三年讀張釋之論嗇夫利口光曰孔子稱利口之覆邦家夫利口何至覆邦盖人能以是為非以非為是則君從其言是則邦家之覆誠不難矣時惠卿在坐公専以此斥之此托史而箴也宫禁之帖特祓除祈祝之辭耳因詩章而含規諷何婉耶髙宗時綦崇禮言歐公立朝以諫諍為心若春日帖子盖宫禁門户祓除祈祝之辭異時作者不過頌德歌功而已至脩乃中含規諷嘗讀脩之辭有曰陽進升君子隂消退小人勸上以用威斷也云云告老之章特休退辭謝之意耳因身疾而喻朝政何誠耶吕獻可病自草章乞致仕曰臣無宿疾遇為醫者用術乖方率任情意差之精辨禍延四支非但於􅏓盩之苦又将虞心腹之疾雖然一身之微固未足恤其如九族之托良以為憂盖以一身之疾喻朝政之弊也此其旁入曲諭雖風雅不過也詩曰言之者無罪聞之者足以戒數君子有焉嗟夫先正之善諫固也然天子信其心當時服其誠天下後世知其忠所以與後世自文者異矣不然王金陵議事上前如朋黨爭辯不少降氣直矣司馬光與王介甫書介甫素剛直每議事於人主前如朋黨爭辨於私室不少降志氣吕惠卿進讀布法象魏以為變法之説婉也吕惠卿進讀正月始和布法象魏此先王之法有一年變者然私書欺君王介甫有毋令上知之書後惠卿以此呈上新法誤國其沽直貢䛕之詐識者以先知之噫有君如此其忍負之王吕豈能逃萬世之議哉隠逸古者逸民之行有三上焉者出處進退關係天下雖萬乗不得而臣其次髙舉逺遁不累利禄使天下常髙其風又其下托隠自媒詭禄求顯故始為人喜而終為人厭也嗟夫逸民一舉天下歸心不事王侯髙尚其志遯之時義大矣哉未可以一二而疑天下士矣故方埋光而隐英風清節可以激頑薄之習如西山薇蕨照映千古至春秋末造猶知有君臣之義桐江一絲扶漢九鼎雖姦雄終身垂涎不敢染指及脱迹而進碩德重望可以救衰微之俗如莘郊之耒方釋而雲霓之望已蘇渭水之釣方投而塗炭之苦已拯所謂出處進退關係天下者此也若適意江湖草芥功名陶情畎畆浮雲富貴詠詩扵霸陵之鄉東漢梁鴻與妻孟光共入霸陵山中以耕織為業詠詩書彈琴以自娛採藥於武安之山䑓脩隐於武安山採藥自給建初中州辟不就擲楯而嘆耻役亭長逢萌家貧給事縣為亭長既而擲楯嘆曰大丈夫安能為人役哉遂去之長安時王莽殺其子岸萌曰禍将及人即觧冠掛東都城門光武詔書召不起觧綬而歸羞為折腰陶淵明四明狂客雖貴宦而不顧賀知章棄官徒歩歸鄉里自號四明狂客少室山人至三詔而不起唐李渤三詔不起自號少室山人隐於一室掩耳世事雖不鉛刀一割不猶愈於朝扣秦關暮遊燕壁奔競於利禄之場者乎所謂髙舉逺遁不累利禄者此也至放利之徒以遁迹為假途以逃名為媒身足崖壑而志城闕迹泉石而心軒冕元纁方聘坐索髙價蒲輪既至浸渝初心故隐居終南者有㨗徑之言盧藏用號曰處士者有盗名之陋東漢此軻書所謂郷原唐史所謂假隐者寜不為夷齊之罪人乎唐隐逸傳序放利之徒假隐自名以詭禄仕肩相摩於道至號終南嵩少為仕途㨗徑高尚之節䘮焉故曰托隐自媒詭仕求顯者此也雖然舉秀才不知書舉孝㢘濁如泥自古誠不免有此然不可以此例薄之國朝以禮賢為家法束帛安車相望於巖穴之下而諸君子或出而濟世澤民或隐而􅗱德脩行清風凛凛萬世可敬王昭素若行怪之人也愛民一語銘書御屏開寳三年召處士王昭素見便殿訪以民事所言無隐又問治民飬身對曰莫若愛民寡慾上書之屏几陳希夷若幻惑之流也致治數言有禆君政雍熙元年召華山隐士陳摶入見上加禮重送至中書宋琪問曰先生脩飬之道可以化乎摶曰摶不知黄白之事吐納之理主上真有道之主正是君臣恊心同德興化致治之秋勤行修煉無出於此琪上其言上喜號希夷先生魏野逸行見於烹茶鶴避煙之詩章聖遣使詔魏野野聞使至留詩一聫于壁而遽去云洗硯魚吞墨烹茶鶴避煙使還以壁間詩對章聖曰野不來矣遂不召林逋髙節寓於曽無封禪書之句林逋居西湖二十年未嘗入城臨終賦詩有茂陵他日求遺藁尤喜曽無封禅書之句關於國體則种放之時議有奏宋唐之建儲有諷淳化三年召終南山种放景德四年復召祥符二年放歸上作詩賜放羣臣皆賦杜鎬誦北山移文譏之時有嘲之者曰不把一書禆萬乗只义兩手揖三公八年卒録其姓學究出身先是有譏放循黙上曰放言事甚衆但外庭不知耳因出所上時議十三篇又嘉祐元年草澤宋堂為助教堂雙流人性宕蕩擬陳子昻感遇詩諷上建儲事益於經學則孫復之春秋發微代淵之周易㫖要慶厯二年以孫復為國子直講復居泰山學春秋著尊王發微十二篇又皇祐四年以代淵為祠部員郎淵嘗進士甲科遂致仕著周易㫖要南山三友縉紳力薦髙澤從种放隐終南山與張堯許邵勃號南山三友冦萊公薦之辭不起白衣御史學校起敬慶厯中石介在太學召之州草澤何羣為學長羣與人言未嘗下意曲從同舍目為白衣御史益州逸士力舉故事之當行康定中益州隐士張俞上宰相吕夷簡書云閣下宜舉太祖太宗之故事開導天子之聰明云云吕夷簡謂俞所言郭元樞不如河南布衣屢有偽命而不應靖康初召河南布衣尹焞授和靖處士劉豫僣位招以厚禮焞逃去蜀髙宗召授崇政説書草澤之間緼袍之内清節榮耀至今猶起人歆慕之想嗚呼孰知尤有大可重者乎康節先生當世重望也皇極經世繼續彛倫先天昜圖啓鑰奥藴異日新法之行州縣騷然諸賢能寛一分之言門生故人皆行好事豈非學道愛人之術歟嘉祐中康節先生以遺逸命官辭之不從河南尹遣官就第送誥敕朝章康節服以謝即褐衣如初至熈寜初再命官三辭又不從先生嘗著皇極經世書先天昜圖傳於世至熈寜三年新法行天下騷然州縣殆不可為矣門生故舊仕宦四方者皆欲投劾而歸以書問康節康節答曰正賢者所當盡力之時能寛一分則民受一分之賜投劾而去何益伊川先生天民先覺也講筵之論君德日進經學之傳後進世守異日渡江之際國勢如綫門人如楊如尹發揮正傳復夀國脉巋然如靈光之獨立豈非講明道學之功歟之二公者退則有夷齊髙尚之節進則有伊吕格天之業豈可以晨門荷蕢者比耶元祐元年三月至京師除宣德郎又以通直郎除崇政殿説書先生因乞令講書以參六日上殿問起居因得從容納誨以輔上德性又明道語録初明道先生曰異日能使人尊嚴師道者吾弟也若接引後學随人才而成就之則予不得辭焉又靖康改元建炎髙宗即位召楊時尹焞二人皆先生之髙弟若夫常秩之未至也人期之既至也人鄙之新法之行秩與有力雖介甫亦心知其為人其有負側席之意多矣熈寜二年詔舉遺逸呉充祖無擇薦康節穎州薦常秩康節辭不起常秩以職官起時王介甫方行新法常秩賜對盛言新法之便乃除諫官至待制介甫亦心知之愚故曰康節伊川二先生之行上也魏野林逋諸君子之操次也而常秩則下焉耳文行德行一科首居文學卓行等傳特先文蓺唐史嗚呼文行之有别也尚矣盖自學術大明正論不欝比屋皆可封之人人人有君子之行凡發而話言詠而情性皆出於中心之誠故康衢之謡發於童子之口風雅之什出於閭巷之間則後世老師宿儒之所不及斯時也有德行而無文章吾道未墜叔世迭興東魯聖人為文主盟後之議論不本於孔氏則厭常喜異不足以垂後世之訓文章不祖於六經則夸多鬬靡不足以該天下之理故軻書七篇貴仁尚義蘭陵一書尊王黜伯莫不謹守其家之法度斯時也先德行而後文章迨一變於戰國縱横之學再變於焚熖之禍文氣煙欝學術淺陋間以能文鳴於世者用工靡麗無補踐履又君子所惡也且漢士登文章之籙者賈之賦鵩司馬之子虚公孫之奏大對揚雄之善詞章晁錯主父偃王褒枚乗以文詞顯劉歆谷永以經學著並漢本傳豈不横鶩逺駕為漢之翹楚由今觀之興悲湘水適䘮良心賈誼傳失節臨卭侵虧細行司馬相如脱粟濟姦何明經之足尚公孫宏投閣招辱何草元之自勞揚雄刑名晁錯縱横之學曷齒於儒流辭賦頌歌之作亡禆於諷諭王褒枚乗黨王鳯而名節蔑聞谷永附新莽而忠義掃地劉歆大節不謹他美莫贖焉唐士馳翰墨之場者辭章則栁河東劉中山酬奉則宋之問沈佺期制策則楊炎徳裕言詩則李白元稹豈不聲價增重為唐之巨擘唐文藝𫝊大歴貞元問羙才輩出扵是韓愈唱之桞宗元皇甫湜李翺等和之此其極也若侍從酬奉則李嶠宋之問沈佺期王維制策則常衮楊炎陸贄權徳輿王仲舒李徳裕言詩則李白杜甫元稹白居易劉禹錫譎怪則李賀杜牧李商隠皆卓然以所長為一世冠然嘗言之夫子之門以文學為之科何哉由今觀之叔文詀詀小人傾身納交蠅營狗苟卒至竄逐而後悔劉禹錫栁宗元易之怙寵憸夫甘心媚附奴顔婢膝必至取敗而後已宋之問沈佺期誘殺忠良朝野側目楊炎植立朋黨縉紳貽害李徳裕統御寡謀無絃鳴鴈落之能元稹孟浪不檢為挺身騎鯨之怪李白言不顧行文章奚工焉若漢之董仲舒唐之韓退之當扵古人求之敷陳三策切中帝心董仲舒佐佑六經有光帝範韓愈使夫人慕山斗之為髙遡淵源之自出則不專扵文而已嗚呼漢唐諸子猶不免後人之議則晉宋齊梁蛙鳴蟬噪尚何足論哉故嘗論之文弊扵戰國暴秦至漢董仲舒則繼道統扵垂綫文弊扵三國六朝至唐韓昌黎則囬狂瀾扵既倒文弊扵五代末習至國朝則諸公震春霆扵已蟄天之未䘮斯文也昭昭矣奎星開宋文風振古六十年来旺氣消文章化入山川手文人才士項背相望祥符間時則楊億劉筠二公為文宗主耳筆力宏壮天下仰慕翰染如飛門人𫝊録此文之始唱也祥符間劉筠與楊億齊名時謂之楊劉又石介祥符詔書記楊翰林少知古道筆力宏壮門楊大年每欲作文揮翰如飛文不加㸃每盈一幅則人𫝊録頃刻之際或數千言真一代之文豪也歸田録然因其言而觀其行册后之舉富貴可立俟也而楊億不奉詔真宗議册皇后上欲得楊億草制使丁謂諭㫖曰大年勉為此不憂不富貴億曰此富貴非所願也乃命他學士草之丁謂之留權要所當奉也而劉筠不奉詔天聖三年丁謂復相召學士劉筠草復相制筠不奉詔乃更召晏殊殊遇筠側面而過盖有所愧也氣節如此則其文宏壮也宜哉天聖間時則尹洙歐陽公為文宗主耳尹之文則簡而有法約千言為五百在六經惟春秋可當天聖眀道間錢文僖守西都起雙桂樓命永叔與師魯作記永叔先成近千餘言師魯曰洙只用五百字可記文成永叔服其簡古又聞見録歐陽修誌師魯墓論其文曰簡而有法自謂人曰在六經中惟春秋可當則歐扵師魯不傳歐之文得之自然非學所至其自負要似韓愈墓誌景祐初以古文相尚得之自然非學所至歐蘇公序歐陽之文曰韓愈之後三百餘年而得陽子天下尊之曰歐陽今之韓愈也然此文之方變也因所學而觀所養䖏窮達臨禍福無愧扵古君子則歐公能言之歐陽公曰尹洙天下之士識與不識皆稱曰師魯盖其名重當世而世之知師魯者或推其文學或髙其議論或多其材能至扵忠義之節䖏窮達臨禍福無愧扵古君子則天下稱師魯者未必盡知之以救時行道為賢以犯顔敢諫為忠則蘇公能言之天聖景祐歐陽子出天下爭自濯磨以通今學古為髙以救時行道為賢以犯顔敢諫為忠長育成就至嘉祐末號稱多士歐陽之功居多蘇軾序歐陽公之文集義槩如此則其文簡嚴也宜哉慶歴景祐間眉山之蘇南豐之曾間見層出為文宗主耳讀東坡之文如駕千里之駒而馭以王良造父雖豪縦奔逸不失疾徐進退之宜山谷稱東坡文云云讀南豐之文如三軍之鼓氣猛獸之抉江湖之波濤煙雲之姿状有慓鷙奔放雄渾瓌偉之氣王震序南豐文曰南豐先生以文章名天下久矣異時齒髪壮志氣鋭其文章之慓鷙奔放雄渾瓌偉若三軍之鼔氣猛獸之抉江湖之波濤煙雲之姿状一何竒也此文之益盛也然二公所謂踐履者始而金馬石渠不自知其東坡赤壁中而東坡赤壁不自知其朱崖儋耳扶海上風濤之壮氣益厲文益髙此東坡之所以為東坡蘇子瞻中進士第稱中制第優等除判官召試直史館通判杭州知宻徐湖三州未幾以黄州團練副使安置汝州中元祐初復朝奉郎召為禮部郎中起居舍人一年為書舍人翰林學士兼侍讀出知杭州讀又召為翰林承㫖出守穎復以兵部尚書召還兼侍尋遷禮部兼端眀殿翰林侍讀二學士紹聖元年以本官知闕州貶出恵州安置又貶瓊州别駕昌化軍安置從恵州再徙本州始而挺立朝廷逺迹權貴凛然有不可犯之色中而間關補外六州郡麾泰然無三愠之意晩而言事不合小人乗間晏然有不為之動之勇終身大節表裏無瑕此南豐之所以為南豐公自為小官至扵朝廷挺立無所附逺迹權貴由是愛公者皆為編校書籍積九年自求補外轉徙六州三十餘年人皆為公凛然而公䖏之自若也公扵是時就與任事者不合自小人乗問又欲擠之一時知名者徃徃坐譏刺語廢逐公扵慮患防㣲絶人逺甚政事張弛操縦雖出乎已而未嘗廢法自便以其故莫能中傷公亦不為之動也而區區文墨間豈足盡二公哉不然晉公之文盖自韓桞而後一見也孫柯與丁謂齊名王禹偁以為唐韓栁後三百年有孫丁也拂鬚之媚君子惡之丁謂為參政與冦丞相㑹食都堂􅃵染公鬚謂起拂之公正色曰身已為執政而親為宰相拂鬚耶臨川之文盖與三蘇二曾相伯仲也新法之害識者羞之王安石時與三蘇二曾相論文又神宗朝行新法人皆苦之嗚呼節義大閑文章末技聖賢立身行已誠千百世典刑而枝辭蔓説又特其説鈴者也後之君子宜加决擇焉氣節陳咸之父教其子以讇本𫝊陳咸父萬年嘗病召咸教戒扵牀下語至夜半咸睡頭觸屏風萬年怒欲杖之咸謝曰大要教咸讇也范滂之母教其子以義本𫝊建寧二年大誅黨人詔下急捕滂等滂白母曰仲博孝敬足以供養滂從龍舒君歸黄泉存亡各得其所惟大人割不可忍之恩勿増感戚母曰汝今得與李杜齊名死亦何恨既有令名復求夀考可兼得乎滂跪受教而别觀咸之父滂之母則兩漢風俗可知矣噫有由也周能貴士唱義尊周楊子周之士也貴秦之士也賤周之士也賢秦之士也荀文春秋末管仲列國大夫皆唱義尊周秦燔詩書䑕狗媚秦叔孫通𫝊上人之趨向其士習之權輿也歟嗚呼君者綱常之主君不能㴠養作成則無以副上天付託之意士者吾道之表士不能自愛自重則無以盡上天禀賦之厚然士有不待而興此固當然之責而君為天下國家計其可無崇奨之術耶嘗觀兩漢士氣伸屈之由矣昔高祖以孝行為無益陳平𫝊以儒者為可辱酈食其𫝊封項伯以啓亡節之臣項羽𫝊名鄭籍以沮盡忠之士鄭當時𫝊即此一意士氣掃地是無怪乎䛕佞成習也袁盎以諸侯王相不為卑賤矣而拜申屠嘉扵車下袁盎𫝊為魏其賔客自丞相而下皆在一見田蚡則趨席㐲地不敢仰視者田蚡𫝊至為衛青之揖客獨一汲黯黯之外皆拜也汲黯𫝊孔光身為帝師名位第一且屈膝扵閹人之董賢孔光傳異時厥角稽首甘獻符命劉歆傳劇秦羙新取媚權要掦雄傳而漢鼎為人所移者伊誰之咎嗟夫子卿仗節單于起敬汲黯在朝淮南寝謀並本𫝊士亦何負扵漢而漢徃徃沮抑卒使賣國以求媚漢亦何利哉若光武尊禮嚴光起救弊俗以羊裘見天子而不為慢以口書授三公而不為傲巖巖釣臺照映千古桐江一絲扶漢九鼎此風一唱爭持名檢是無怪乎節義相望也嚴光𫝊陳蕃竇武唱扵前李膺林昱和扵後並本𫝊張儉以南郡督郵舉劾中常侍本𫝊儉為東都督郵時中常侍侯覧殘累百姓儉舉劾覧及其母罪惡請誅之由是告儉為黨王允以太原郡吏捕殺小黄門趙津本傳皇甫規掾上計而上䟽討羌皇甫規雖在布衣見馬賢将諸郡兵擊羌不恤軍事乃上書言状郡将知規有兵畧乃命為功曹其後𦍑攻隴西規乃上䟽求乞自效周舉令平邱而上書奏事周舉順帝時舉賢良茂材為平丘令上書言當時得失辭甚切辨異時設席尊禮如待神眀清議所臨姦雄宿頸而漢鼎終不敢染指者伊誰之力嗟夫禍黨株連甘戮如飴東漢黨錮𫝊三國鼎沸唱義尊漢士之不負扵漢亦漢有尊尚名節之功豈非漢之福歟西漢所尚如此東漢所尚如彼咸父滂母亦其耳濡目染非自為之屈伸也是氣也東都以後沮扵晉人輕賤名檢之習汨扵梁人崇尚寂滅之風淪扵李唐相習佛老之教大壊極弊扵五代亂離之世吹死灰扵已冷回狂瀾扵既倒幸有國朝封植之恩祖宗張三綱以為綱立四維以為維洗磨故習砥礪士心釋北漢之衛融喜其不負劉氏而有臣得死所之言劉承鈞臣衛融被執至京師太祖問融承鈞所以助李筠反状融言不遜太祖命以鉄撾擊其首流血被面融呼曰臣得死所矣太祖顧左右曰此忠臣也釋之命以良藥傅其瘡遣融致書扵承鈞召前代之李昉喜其不朝而有惟知事周之語李昉在周初知開封府人望已歸太祖昉獨不附王師入京昉又獨不朝貶道州司馬徙延州別駕在延州三嵗當徙昉不願内徙後宰相薦其可大用召判兵部昉五辭行至長安移疾六十日中使促之行至洛陽又移疾三十日既至上勞之昉曰臣前日知事周而已今以事周之心事陛下上喜曰宰相不謬薦人陶穀之詞翰誠在所取而懐中之文太祖終薄之陶穀傳記羙詞翰太祖将受禪未有禪文穀在旁出諸懐中曰成矣太祖甚薄之范質之㢘節誠在所重而欠世宗一死太宗終惜之太祖為軍士擁逼叱之不退范質頗誚讓太祖且不肯拜王溥先拜質不得已從之太祖即位先命溥致仕盖薄其為人也又嘗稱質之賢曰惜也但欠世宗一死耳噫豪傑之士雖無文王猶興天下不可謂無若人而俯仰一世為人桔橰若此者亦不少人主之好惡天下仰望而終身焉身為貟外輙挽帝衣冦凖昔為御史幾扣予榻石介慶厯聖徳詩素相之後含忠履㓗昔為御史幾扣予榻石介布衣也濃墨大字直詆大臣之夏竦石介聖徳詩曰衆賢之進如茅斯拔大奸之去如距斯脱大臣斥夏竦也泰山先生曰子禍始扵此矣仲淹司諫也伏閣大呼敢論宰相之夷簡眀道二年郭皇后見疎吕夷簡以前罷相怨后范諷言后無子當廢夷簡賛其言先敕有司無得受臺誎章奏仲淹孔道輔孫祖徳蒋堂郭勸段少連宋祁劉渙詣垂拱殿門伏奏門者闔扉道輔扣銅鐶大呼夷簡奏臺諫伏呼閣非羙事乃逐道輔等此固平居暇豫之時然也有如呼吸之頃有雷有風進退之間有存有亡而能視死如歸者此則可重西夏之難劉平以冒賊死任福以身報國死敵之所以不敢踐環慶而窺秦鳯者二公之力居多焉元昊反康定元年劉平戰沒黄徳和誣奏平降賊富弼奏云平引兵赴援以奸臣不救故敗竟罵賊亟食而死又慶厯元年任福敗有小校劉進者勸福自免福曰吾為大将兵敗以死報國耳挺身决鬬鎗中左頬絶其喉死南儂之變趙師旦以叱賊死曹覲以不受羙官死賊之所以不敢沿欝江而蹂番禺者二公之力居多焉趙師旦守亷州儂智髙起陷城賊令拜叱曰恨不斬此賊以報國家豈有太守而助賊即遂害之又曹覲皇祐五年守封州儂智髙叛為賊所執賊知其名臣子屈令拜任以羙官覲慢罵不顧賊尚不敢殺復説曰我王番禺汝堪宰相覲叱曰狗彘死在旦夕尚敢狂誖語即遂害之此處祖宗全盛之時然也有如霜降水涸涯涘乃見疾風凛凛勁草自若而能挺身不變者此尤可敬伏覩建炎之詔曰河北億萬衆寧死鋒刃無一人負國以民庶觀之其士夫守節可知此雖吾國中否之世漢唐盛時豈有此耶精忠之節動揺山岳剛大之氣凌逼雲漢祖宗培植之功大矣哉清和自忠肅共懿之風息而清之名始形自宣慈惠和之徳泯而和之名始彰嗚呼清和之名立天下無全徳似也然觀夷之清惠之和出䖏進退莫窺其際不聞有一偏一曲之失而所以偏曲者後之效夷惠而不至者之過也夫以夷齊之不立扵惡人之朝不與惡人言其不屑就之風疑扵隘矣而夫子稱其不念舊惡其心量之廣大如此然則夷齊豈有清之弊哉以下惠之不羞汙君不卑小官其不屑去之風疑扵不恭矣而孟子稱其不以三公易其介其所守之不可奪如此然則下惠豈有和之弊哉甚矣後世制行之失也偏見詖説熟扵天下之耳目詭行曲學足以移人之氣習而清和之敗績也多矣自夫世之士以為傲睨世故可隆聞望軒挺物表可掠聲稱㓗脩不汙尚㢘隅也倜儻不羣崇氣槩也肥遯自守重道義也反乎此則㫖韋䠞踖其名為佞詭隨曲徑其名為偷委靡遷就其名為懦扵是矜嶄崖絶異之行而曰髙尚其志此大易之道也伯夷嘗行之矣自夫世之士以為皦皦之志久則難全皓皓之行終則易汙和光同塵為貟機也隨波逐流為通賢也雷同一談為達權也反乎此則骯髒殊好是之謂誕宏闊持論是之謂迂矯拂立情是之謂譎扵是事将順容與之行而曰凡民不協而受之者此皇極之道也下惠嘗行之矣嗚呼學歩邯鄲至失邯鄲學顰西子反失西子是則學夷惠而失夷惠者其弊必至扵此歟且西都之風非不尚和也然将相不能正誼盡瘁而臨難交歡猶相與求容悦扵五百金之態周勃陳平𫝊御史不能抗色立朝而垂沒教諂且形扵父子之間陳咸𫝊朔方良策難詰隨對如誤國何公孫宏傳留屯集議初是什三如昧事何趙充國𫝊甚至坐視漢鼎之移而目不加瞬者則在相位張禹𫝊甘心天禄之投而心不愧者則在臺閣揚雄𫝊若是者阿順而已果和之聖乎東都之俗非不尚清也然抗志扵攬轡之秋而忘戰國處士横議之戒范滂傳要譽扵龍門之登而忘智者偃息衡門之諭李膺𫝊名目相高重慕清裁屣履相先爭畏貶議黨錮𫝊甚至西州豪傑之不預至自訟以為髙生徒録牒之未破至自表以為㓗同上若是者驕亢而已果清之聖乎清不流扵隘和不流扵不恭有夷惠之髙行無兩都之流弊吾扵國朝諸公見之平居相稱若尚同也而議事則公言無私不害其為同長編慶厯五年歐陽脩言杜衍為人精審而謹守規矩仲淹則恢宏自信而不疑韓琦則純正而質直富弼則眀敏而果鋭四人為性各不同雖皆歸扵盡忠而所見各異云云四人者可謂公平之賢也平日閑居則相稱羙之不暇為國議事則公言廷爭而無私杜衍真得忠臣有不和之節而小人䜛為朋黨誣矣上前爭事若好異也而下殿則如未嘗爭不害其為異魏泰别録韓忠獻公言慶厯中與希文彦國同在西府上前爭事議論各别下殿各不失和氣如未嘗爭也當時相善三人正如推車子盖予心主扵車可行而已不為已也范公之與呂夷簡雖立異扵伏閣奏事之時而不能不相歡扵平賊之舉眀道二年郭皇后見疎吕夷簡以前罷相怨后范諷言后無子當廢夷簡賛其言先敕有司毋得受臺誎章疏范仲淹孔道輔等詣垂拱門㐲奏門者闔扉道輔扣銅鐶大呼夷簡奏臺誎伏閣非羙事乃逐道輔等又范仲淹神道碑自公坐吕公貶羣士大夫各持二公曲直吕公患之凢直公者皆指為朋黨或坐竄逐及吕公復相公亦再起被用扵是二公歡然相約戮力平賊天下之士皆多二公君實之扵景仁雖相得扵異姓兄弟之情而終不相下扵鍾律之事范景仁墓誌熈寧元豐間士大夫論下賢者必曰君實景仁二公盖相得歡甚曰吾與子生同志死當同傳而天下之人亦無敢優劣之者故君實嘗語人曰吾與景仁兄弟也但姓不同耳至扵論鍾律則反覆相非終身不能相一君子是以知二公非苟同者邵康節之自處則退遁山林不屑富貴至語門弟則寛民新法投劾何益又非髙亢也嘉祐中康節以遺逸命官辭之不從河南尹遣官就第迎告敕朝章康節服以謝即褐衣如初終居洛陽至熈寧再命官三辭又不從再服以謝且曰吾不復仕矣至熈寧三年朝廷初行新法所遣使者皆新進少年天下騷然康節閑居林下門生故舊仕宦四方者皆欲技劾而歸以書問康節康節答曰正賢者所當盡力之時新法固嚴能寛一分則民受一分之賜矣投劾而去何益程眀道之誨人若坐春風温厚可想至對執政則面排新法執論不撓又非容順也朱公掞見明道于汝州踰月而歸語人曰光庭在春風中坐了一箇月又熈寧間判武學新進者以先生言其新法之初首為異論罷復舊任又嘗被㫖赴都堂議事荆公方怒言者厲色待之先生曰天下非一家私議愿公平氣以聴荆公為之愧屈毁方瓦合人曰杜衍示門人之教然也而歐公乃以忠臣不和稱之杜公語録有門生為縣令公戒之日切當晦韜無露圭角毁方瓦合求合扵中可也門生曰公平生以直亮忠信取重天下今反誨某以此何也公曰予所以欲毁方瓦合求合扵中也又歐陽公稱公真得忠臣有不和之節見上勤謹和緩人曰劉安世得李若谷之教然也而蘇公乃以真鐡漢褒之吕氏雜録器之云安世初登第與二同年謁李若谷參政三人同起身請教李曰若谷自守官以来嘗持四者曰勤謹和緩其間一後生應聲曰勤謹和既聞命矣緩之一字某所未聞李正色作氣曰世間甚事不因忙後錯了則又言行録昔有與蘇子瞻論元祐人才者至劉安世曰器之真鐡漢不可及也萬馬能駐確不可奪王公存之不徇流俗固也然平居恂恂不為詭激之行王公墓誌公性寛厚儀状偉然平居恂恂不為詭激之行至有所守確不可奪議論平䖏無所向背司馬温公曰並馳萬馬中能駐足者其王存乎赤幟自立屹不可向温公之好持異論故也然不才自䖏常歉扵勇决之人丁未録熈寧三年初上有㫖用司馬光安石曰光雖好異論然其才豈能害政如光者異論之人倚光為重耳今陛下置光扵人上是為異論之人立赤幟也又温公行状公知永興軍到官上章曰臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程顥敢言不如蘇軾孔文仲勇决不如范鎮夫同流滔滔而立砥柱不移之操嚴霜凛凛而有和氣温厚之習以此制行亦何歉扵夷惠之聖哉抑又論之尚清之弊則流而為激為訐尚和之弊則流而為庸為佞二者胥失也然流之激訐弗顧身害不失為扶持名教之地流扵庸佞蠅營狗苟必至㢘恥掃地而後已噫可畏哉昔真宗嘗謂管仲之仁不如召忽之忠景徳四年上曰孔子言管仲如其仁豈非召忽以忠死管仲不能固其節耶為臣之道當如是乎仁宗嘗謂蘧伯玉之君子不若史魚之直家𫝊皇祐中楊安國講直哉史魚仁宗曰蘧伯玉信君子矣然不若史魚之直據孔子所言則史魚不若蘧伯玉仁宗之言人君之言也人君惟欲臣下切直故言蘧伯玉不若史魚也其為士夫者寧為其方毋為其圎寧為其清毋為其和可也不然熈豐大臣好人同已諸賢異論斥逐殆盡異時此風復熾胚胎不測之禍則亦可為尚和同者之戒王荆公𫝊昔人有言曰效伯高不得不失為謹飭士效季良不得則陷為天下輕薄子東漢馬援傳愚則曰學伯夷不得不失為名節學下惠不得必流為詭隨古今源流至論後集卷六
