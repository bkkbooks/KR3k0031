body:
  text: 古今源流至論前集卷九宋林駉撰録賢裔嘗觀漢人之表列侯也先叙爵邑後叙子孫則知漢人象賢之意漢列侯功臣表先姓名次諡號次爵邑又次子孫又觀唐人之表宰相也先列職名後列譜系則知唐人世祿之典唐宰相表上列職名次書譜系嗟夫喬木舊望見者興念甘棠遺愛去之見思則席勳業之舊著閥閲之英者可無悠長之念哉然嘗論之為國家宣力者固可重為生民立極者尤可敬為當時立勳者固可嘉為後世開太平者尤可尚此有國家者不可一日不續吾道之脉也何者以誠敬為入門以踐履為實地者此道也以正心格物為本原以治國平天下為功用者此道也風雨有晦冥而此道無變遷世變有汙隆而此道無轉移周公之迹陳矣魯之子孫崇尚文學雖列國紛紜而不變孔子之筆絶矣後世見禮不觀諸他而觀之子思然則續其統振其緒上之人安得不任其責哉故周公之後與姬室相為無窮而夫子之裔歷漢唐猶一日信矣夫不可一日不續吾道之脉也我國家崇尚文治維持道統念故家之餘澤起遺笏之舊愛上以接先賢之正傳下以發潛德之幽光故劉溫叟以清節著名太宗特録其子所以示天下之名節劉溫叟以清節自守溫叟沒太宗特録其子曰所以表其清節司馬公以誠實立身哲宗特召子康所以表名臣之行業司馬公元祐二年殁哲宗召其子康為崇政說書此象賢之意固隆矣至若道學宗𣲖後代山斗濂溪先生導其源伊洛橫渠浚其流楊游胡馬諸君子助其瀾自元祐至今日其間或興或廢不知其幾而人心天理不泯於頽靡之中國脉元氣終有賴於維持之力道學固無負於國家而國家亦無負於道學也自今觀之紹聖末年唱為黨禍名儒故老海隅嶺表而吾道之𣲖絶矣我髙宗雨露洗濯善類萌蘖龜山大儒靈光獨立胡氏父子相繼擢用而伊洛之傳始振此髙宗録賢之功也紹聖間以程伊川洛黨放歸田至四年十一月送涪州編管又崇寧初元祐學有禁又中興本末建炎初崇政殿說書程頤以道學為天下倡其門人高第有故監察御史游酢與今徽猷閣待制楊時是時以時為工部侍郎年七十九矣及入對有言聖賢之君未有不以講學為務者尋詔時兼侍講是時如右丞許景衡右文殿修撰胡安國左司郎中吳給殿中侍御史馬伸皆各得時之學又未幾召胡安國及其子寅俱在位秦氏當國忘讎忍恥高視闊步訕笑大儒而吾道之脉微矣我孝宗天涵地育諸儒生氣屈致文公講道翠幄其他苗裔收拾殆盡而伊洛之傳復振此孝宗録賢之功也秦檜主和趙鼎之黨劉大中之徒相繼求去又慶元初孝宗以朱熹安貧樂道召為侍講權臣用事倡為僞學排逐正人響息影滅而吾道之灰冷矣我寧宗改絃昜轍推明理學節惠有諡讀書有人閩中江右家傳人誦而伊洛之傳至今源源光盛此寧宗録賢之功也嘉定間諡橫渠節惠閣又詔陸氏子孫讀書祕嗚呼雖無老成人尚有典刑在祖宗固已尊顯矣豐水有芑武王豈不仕今日能無加培植歟主上初政未遑他務伊川道學之宗既録其後朱張道學之𣲖復顯其裔即此一意人心興起使天下知格物致知之學非迂闊道德性命之書非髙逺其所以立天地心繼前聖學也不淺又不但為泉壤之輝也雖然司馬公一相主盟吾道而伊洛之正學始明元祐初司馬公為相召河南布衣程伊川為說書一時門人朱光庭諸君子皆擢用趙忠簡求去正人勢孤而伊洛之門人復散紹興張魏公敗劉猊於濠州上曰却賊之功盡出右相之力於是趙鼎皇懼求去時鼎既去補外董朱繼去此愚又不能不拳拳於君相相與扶持之功云定策大臣召公之託聞顧命漢相之謀應大橫此非韓魏公之制乎華陽授韓魏公門下侍郎制曰惟召公之託嘗聞顧命之言惟漢相之謀終應大橫之兆蓋懷先見者識之邃決至慮者材之英天相不拔之基神贊非常之輔子孟之承先帝召公之保三朝此非曽魯公之制乎華陽授曽魯公授門下侍郎制曰大火基宋實開五聖之符六龍乘乾遂致中天之運又授君僕射制曰子孟之承先帝預定大謀召公之保三朝率躬一德甚矣大臣勳業莫重於定策也夫外懾強敵內伸國威獻凱奏勳以紓神人之共憤者勇略之臣也出入禁闥陪奉丹陛朝夕雍容格君心於無過之地者侍從之臣也正色立朝奮身抗議凜凜風采以破奸雄之膽者諫諍之臣也然乘鴈雙鳬無關多寡毛髮絲粟僅效微勞其於天下之大計社稷之重寄彼蓋未之知也方國論洶洶之秋人心危疑事勢倉卒呼吸之間有雷有風進退之間有存有亡斯時也曰勇略曰侍從曰諫諍舉不能以容其力此非大臣之責而誰責陳祖宗之訓於新嗣之初啓金縢之書於流言之日不動聲色措國泰山天地鑒其誠宗廟諒其心天下蒙其福此伊周事業鏗鏘於千百載之下者其惟定策之功歟不然吳起齊之名將也東征西討勳塞一時盛矣然當國疑主少之初扶持社稷遂不若田文之功通鑑魏置相田文吳起不悅謂田文曰請與子論功可乎田文曰可起曰將三軍敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰子皆出吾下而位居吾上何也文曰主少國疑大臣未附百姓未信方是之時屬之子乎屬之我乎起默然曰屬之子矣陳平漢之謀臣也誅秦戚項蓋出漢庭之右盛矣然當代邸奉立之時親握天子璽又不及周絳侯之勳周勃傳嗚呼尚論大臣之大節不觀諸國勢危二之秋則伊周之事業泯矣天開有宋偉人間生社稷元勳鼎彞弗泯是故開國勳舊宏濟艱難蓋以天下為己任金匱之藏首禆國論慈闈之訓仰決聖謨其弼亮之美可以對越乎穹壤記聞昭憲太后敕太祖曰若萬嵗後以次傳之二弟則并汝之子亦獲安矣太祖曰敢不如母教太后因召趙普於榻前為約誓書普書紙尾藏之金匱三朝元老乃心王室躬蹈不測之深淵伏奏懇切首唱大義扶翊日月使中外之人餔啜嬉遊而無驚視竊語之警韓琦定策亞傅責重節堅可以託六尺之孤謹畏周密內外無間言有始有卒可方安世其感動人主者實先孚於衆論長編曽公亮謹畏周密內外無間言受遺輔政有始有卒可方張安世此二三君子身佩安危忠扶宗社神間氣定垂紳搢笏而定國祚於泰山四維之地豐功茂績載在盟府嗚呼盛矣哉然又論之定一時之大策固難正異日之君心尤難方國本未定事勢殆矣而能談笑廟堂親決大議此固有賴弼亮之休至國本已定事勢安矣而君心方善而未固君德方進而未純其可無輔贊彌綸之力歟是周召訪洛之時作書誦詩警戒日聞而成王終為令主平勃於錢榖之間浹背莫對文帝之治幾疵焉前陳平傳此大臣拳拳不能自已之忠尤當見於異日也噫呂端本真宗之顧命大臣奏事雍容未嘗喜懼以輔咸平之治者端之力居多真宗初即位每見呂端必肅然拱揖不以名呼端再拜以請上曰公等顧命元老朕安敢上比先帝又趙普嘗曰吕公奏事每得嘉賞未嘗喜遇挫未嘗懼真台輔之器也韓公乃神宗之定策元老新法之疏懇切再三猶能寬一分之賜者韓公之功歟神宗初韓公奉英宗之遺命以立之至行新法韓公再三力疏後乞補外特授守司徒兼侍中鎮安武勝節度使判相州書曰罔俾阿衡專美有商愚深望於今之大臣功臣配享豫享先王爾祖與之此侑食之始制也書盤庚兹豫大享于先王爾祖其從與享之有功太常祭於大蒸此侑食之定制也周禮夏官司勳凡有功者銘書於王之太常祭於大蒸司勳詔之嗟夫甘棠微木見者興詠故笏細物中心惻然况覽竹帛之舊蹟觀鼎彞之遺銘其可無慨慕逺想之典歟此商周所以拳拳於清廟之享者見仁之至義之盡也商周逺矣其待臣之禮吾憾焉晉文公間關在外十有九年之推從亡日久蓋同甘苦共患難者比其反國乃不及祿左傳韓淮隂誅秦蹙項蓋漢庭之第一功盟血未乾狗烹弓藏終不能老死牖下韓信傳此固鍥薄少恩之人固不足與語君臣始終之義若夫漢之霍子孟唐之魏鄭公此千載魚水之㑹然能榮其身於前而不能全其名於後能俾厚秩於一時而不能播幽馨於異日此君子深為之浩歎方子孟未央之奏親握天子璽以授宣帝受遺託孤無負先朝蓋三代而下所未有麟閣崢嶸遺像凜然位次第一氏而不名若無負於子孟矣然霍氏之肉未寒而赤族之誅己及使光之元勳茂績不再傳而盡泯何刻哉本傳霍光與諸臣議立孝武曽孫未央列奏遂即帝位至甘露元年遂建麒麟閣光居其一特曰霍氏不書其名後光薨人告顯禹有變遂赤其族觀此則漢人祭功臣於庭之制特具文耳通典漢制祭功臣於庭生特燕於堂死則降於庭與士庶為列方魏公立朝之日引入臥內好同心腹諫行言聽措世太平亦三代而下所未有豐碑嵯峨大書深刻鋪陳功蹟若有光焉亦無負於鄭公矣然萋斐之言一入而仆碑之悔遽形使鑑逝之後反於墟墓有譴焉何薄哉魏徴傳太宗拜諫議大夫或引至臥內訪天下事徴亦以不世遇乃展盡底藴後薨帝嘆曰今魏徴卒一鑑亡矣後帝登凌煙閣觀畫像賦詩悼痛聞者媢之毁短百為帝不悅乃停叔玉昏仆所為碑顧其家衰矣觀此則唐人享功臣於禘祫之日特虛設耳通典唐貞觀十六年有司言禮祫享功臣配享於廟庭禘享則不配後令禘祫之日功臣並配享請集禮官學士等議噫論漢之君臣不若宣帝子孟之相得論唐之君臣不若太宗魏公之始終不替猶不能得事死如事生之禮况其餘乎我國朝以忠孝為家法以禮義為國維元勳碩德既保全於土龍既禱之餘縟儀盛典復追報於喬木見思之日然侑食之典庸可輕乎哉議集縉紳愜公論也册告宗廟無愧辭也蘇東坡劄子自祖宗以來釋擇元勳重望始終全德之臣以配食列聖蓋自天子所不敢專必命都省集議其人非天下之公議所屬不預此選奏議既上詔㫖恭依册告宗廟然後敢行愚嘗拜觀盛朝歷數舊勳凡侑於清廟祭於大蒸當時無異論後世無私說至今言之猶使人有起敬起愛之意我藝祖之開國也中令元勳宏濟艱難記聞太祖叱雷德驤曰鼎鐺尚有耳汝不聞趙普吾之社稷臣乎侍中重望削平僣僞是用侑享于藝祖澠水燕談曹彬征伐前後凡降四國王江南四川廣南湖南也我太宗之繼統也輔新政於太平之初則有居正薛居正太平興國初入相後配享太宗廟揚天靈於混一之日則有潘石潘美石熙載輔太祖太宗平定天下二人後並配享太宗廟庭是用侑享於太宗其在真宗時也文靖文正凝逺深沉李文靖沆風範凝逺又王文正旦張詠曰深沉有德鎮服天下無如王公李公威名天下知之李繼隆其在仁宗時也沂公大節險夷一致王曽有天下之大節申公持權見逺謀偉事略夷簡相仁宗美功立名主治喪之禮其見逺矣消監兵之策其意深矣請建都之議其謀偉矣斯善持宰相之權者歟在英廟則琦有竒骨重厚如勃徂徠慶厯聖德詩豫早識琦而有竒骨可屬大事重厚如勃曽公輔政可方安世長編曽公亮謹畏周密內外無間言受遺輔政有始有卒可方張安世在神廟則鄭公秉心端方直亮歷事四世計安宗社長編元祐三年禮部言神宗配享功臣合命尚書以下議孫永等議富弼秉心直亮歷事三世計安宗社以配享神廟廟庭實為宜稱蓋不特國初以來之禮也高宗中興是時也吕趙韓張俱有名績淳熙廷議侑食宜稱要括淳熙十六年宇文價議仰惟髙宗天錫勇智紹開中興一時將相名臣宜列侍太室序於大蒸伏見吕頤浩再登鼎司能斷大事主盟大舉取日虞淵厥功茂焉趙鼎智慮湛明學識純固北邉受警力贊親征國本未正建萬世之長策韓世忠身歷百戰義勇橫秋建炎勤王投袂奮發連營淮楚直視無前名聞羌夷至今膽落張俊贊翊霸府披棘以立朝廷禦侮蘄川靖寇江左而秉心忠勤終始一節四人皆有名績見稱於世俱宜配享聖㫖依孝光授受是時也文惠忠亮培養聖德葛公為揆效忠訪洛史文惠公輔孝宗潛邸后即位再入相遂配享廟庭又葛卿輔光宗初年亦配享其報稱之公取豫之當蓋質諸鬼神而無疑關諸百世而無憾者類苑趙普曹彬配享太祖薛居正潘美石熙載配享太宗李沆王旦李繼隆配享於真宗王曽吕夷簡配享仁宗韓琦配享英宗王安石富弼配享神宗蔡確配享哲宗韓忠彥配享徽宗又長編元豐元年曽公亮卒贈太師中書令配享英宗廟庭又淳熙十六年議吕頤浩趙鼎韓世忠張俊配享髙宗廟庭若神宗侍侑之人或行或罷紛紛不一君子不能無議也鮮于侁曰宜以富鄭公也鮮于侁曰勳德第一惟富弼耳本朝舊制雖有二人且如唐朝止用郭子儀故事只以弼一人配享議遂定曽布曰宜以王安石也長編紹聖元年詔王安石配享神宗三年詔罷富弼配享神宗初元祐富弼配食天下以為宜至是謂弼得罪先帝罷之翌日布對上問罷富弼配享如何布曰臣自元祐中聞之故已訝其不當先帝以王安石為相君臣相得近世所未有舍安石而用弼豈先帝之心哉但元祐中人持偏見不恤義理所安耳然王安石之變更家法終不若富弼之計安宗社見上曽布之曲持私說終不若鮮于侁之允愜衆論人心之公議千載終不泯也是故安石之享能倡於曽布而不能不罷於趙鼎言行録王安石𫝊紹聖初配享神宗崇寧三年詔配祀文宣王廟靖康初用楊時言停文宣王廟配享列于從祀建炎中用趙鼎言罷配享神宗曽布之議能行於紹聖而不能不沮於建炎君子幸其宗主公議有人矣雖然太室之禮腆矣侑食之人常矣然追崇一意而有出於大蒸之外傑閣像形頌臺鐫碑遺風舊蹟凛乎如存豐功茂績昭然不磨此愚三詠三嘆於今日見繪功臣條薦賢乾興初年仁宗即位之始也而王曽首薦吕夷簡之相長編仁宗謀相王曽薦吕夷簡熙寧九年哲宗即位之元也而陳襄首薦司馬光之用長編熙寧九年陳襄薦司馬溫公而下三十三人夫人主臨御之初興起事功寤寐人材毛髮絲粟寸能不遺為人臣者不念公家榱桷之用徒為私門桃李之計寧不負初政側席之意哉然嘗論之人臣以報國為念則所薦無非公人臣以植恩為念則所薦無非私夫親固可疑也茍有材之可舉則不以親而疑讎可嫌也茍有德之可擢則不以讎而嫌吾以公而薦賢而謝恩私門則無也吾以賢而後薦而以求後舉則無也此無他人臣以報國為念而他不暇顧矣夫茍公道不行於上而公論不明於下則短牘朝馳長箋暮進其舉曰覔親故交求彼此相薦其舉曰互綢繆託契夙有恩惠其舉曰私白晝大都與奸為市其舉曰鬻此無他人臣以植恩為念而國不暇恤矣吾觀國朝知人之明薦人之公為大臣者惟知薦賢報國為事為士夫者惟知行已律身為常上以公取下以公進蓋不特如王曽陳襄所薦也噫盛矣曹彬一代名將也教子登壇韜略世授卒以二子薦之記聞曹彬將薨太宗親問以後事對曰臣二子璨與瑋材器皆堪為將又問其優劣曰璨不如瑋吕蒙正一代賢相也衣鉢相傳勳業無愧卒以猶子夷簡薦之聞見録吕䝉正為相致仕真宗問諸子孰可用公曰臣子不足用有姪夷簡宰相材也是不以親為疑也廢后之事范仲淹嘗攻吕夷簡而夷簡復薦仲淹長編吕夷簡景祐執政因仁宗廢郭后事仲淹同孔道輔諸人扣門大呼攻夷簡落職知饒州夷簡入相言於仁宗曰仲淹賢者豈可但除舊職仲淹謝曰向以公事忤相公不意相公乃爾夷簡曰夷簡豈復以舊事為念哉燈籠錦之事唐介嘗劾文彥博而彥博復薦唐介是不以讎為疑也言行録文彥博為唐介燈籠錦所劾介出知潭州彥博亦罷相後彥博再入相首薦唐介復召用焉李文正之用賢以為大臣之職業而不市私恩言行録本傳王文正之拔賢未嘗顯拔一人而恐恩自已出魏公别録韓琦言王公曽當國未嘗顯拔一人曰范仲淹諷之曽曰恩自己出怨將誰歸仲淹嘆真宰相也蓋不敢樹恩私門也吕文靖之薦包孝肅以其同巷而不求見吕文靖與包拯同巷拯未嘗一見文靖以此薦之司馬公之薦劉元城取其無書抵政府蓋不待有求後舉也語録溫公薦劉安世充館職因謂白知所以相薦乎安世曰獲從公逰舊矣曰非也光居閒足下時節問訊不絶位政府足下獨無書此所以薦也論薦若此其視祁奚之於午祁奚請老晉侯問嗣焉曰午也可君子曰舉其子不為比解狐之於荆伯抑趙簡子問解狐孰可為上黨守曰荆伯抑王曰非子之讎乎曰舉賢不避仇讎婁師德之於狄仁傑狄仁傑為相婁師德實薦之仁傑不知數擠師德武后以告仁傑嘆曰婁公盛德我為所容亦何愧哉不然李師錫乃王德用之甥而薦者凡三十餘人政要增釋慶厯中流內銓引還人李師錫改京官其歷任薦者三十餘人上曰此誰之子弟左右對曰王德用外甥上曰薦之者多蓋以德用之故且與循資陳琪乃龎籍之壻而薦者至二十四人徒以權貴之故而薦也夫何取至和二年流內銓引對雍丘縣陳琪改京官上謂判銓賈黯曰琪雖無他過而歷三任皆因緣陳乞不由有司奏擬琪乃龎籍女壻今保薦者多至二十四人得非專欲諂附大臣故爾邪且與恭城縣知縣王安國本荆公之親弟也至託公以力薦之王安國荆公之弟荆公薦之於上吕惠卿本荆公之同已也至犯衆怒以力薦之吕惠卿巧憸附安石極論新法之便荆公薦之自代司馬公極口排之以為江充李訓之徒徒以親故之私而薦也夫何取嗟夫吕文穆謂我為相無能但有一能善用人吕文穆䝉正曰我為相無能但有一能善用人耳唐質肅言吾輔政何功惟薦二臺官無愧耳言行録前輩之薦賢報國以此為稱職之賢彼循權貴私親故者不亦恧乎雖然薦賢者固無負國家而被薦者亦不曽負舉主范仲淹之於晏殊蓋有知己之恩也稱壽一疏聞者縮頸而每以不稱為羞若此者可以受所薦長編天聖七年上率百官上皇太后壽乃受朝仲淹奏虧君體損國威初晏殊薦仲淹為館職聞之遂詰仲淹曰仲淹繆辱公舉每懼不稱為知己羞不意反以忠直獲罪殊愧謝荆公之於文潞公亦有知己之恩也新法一奏識者稱快而反以異已為嫌若此者適以負所薦仁宗朝文彥博薦韓維王安石張瓌等恬退後安石用事行新法文彥博極諫其非王安石不聽反斥彥博補外不然繆舉同坐之令不愧國家寧不愧所知乎昔前輩有詩曰先收先生作棟梁其次收拾桷與榱愚敢誦此於初政急賢之世以為二三大臣勉歐公贈胡安定詩舉廉虞朝設教曰簡而廉周典計吏曰弊以廉夫廉者百行之本也以此律身以此正家以此化風俗此士夫職分之常而非卓絶之行尚何待教之弊之而後為哉大抵回天下之勢者在機而不在力淑天下之心者在上而不在下蓋千駟弗視萬鍾何加足以厲天下之風俗者固有之矣醉醲飽鮮傾囷倒廪者豈盡無也四知自懼一物不載足以激天下之節義者固有之矣乞墦取媚登壟罔利者豈盡無也是必新采芑之田興孤竹之節者而後可以美士心嚴媢賄之誅警殉貨之刑而後可以回士心却羡餘之貢推金錢之賜而後可以服士心不然則士心轉移不以宫室之美妻妾之奉而為之則以人生之萍梗世運之汙隆而為之可不畏哉嘗怪文帝之舉廉而萬家之縣無有應令本紀武帝之舉廉而闔郡之廣不薦一人本紀是何廉吏之艱耶蓋簠簋不飭既不如賈誼廉恥四維之勸賈誼策而犬馬嬉遊至使魏其武安窮力而肆為之本傳則縣不應而郡不薦也亦宜矣國家以節儉化天下以廉恥勸風俗即此一意已見於藝祖立國之初則人人稷契家家夷齊有不煩人言者且平蜀東歸惟有圖書沈倫之清節可貴也於是有樞密之命太祖初立命王全斌等伐蜀沈倫為水陸轉運使諸將爭取金帛子女倫清潔一無所取東歸之日惟圖書數卷太祖知之擢為户部侍郎兼樞密使身平江南惟載圖籍曹彬之廉潔可尚也於是有玉音之嘆曹彬平江南倉廪府庫悉委轉運司收籍檢視彬一不問及歸舟中無他物惟圖籍衣被而已上嘆賞之惟其得勸廉之道則廉吏其不勉乎符彥卿之羡餘未昜革也而必出粟以愧其心太祖聞大名部民輸租節度使符彥卿加量收其羡餘詔命朝臣掌庾反出公粟賜彥卿以愧其心王晉卿之貪黷未昜化也而必還錦以愧其心乾德四年前陜州刺史王晉卿獻重錦十匹白金十兩上曰晉卿貪黷無厭此獻不可納亟還賜以愧之惟其得律貪之道則貪吏其不愧乎是故有官鼎鼐無地樓臺聞見録萊公居家儉素所臥青帷二十年不易或以公孫𢎞刺之公笑曰彼詐我誠尚何愧魏野贈公詩曰有官居鼎鼐無地起樓臺後遼使目公曰此無地相公耶或曰公頗奢縱非也蓋公多典藩於公㑹宴設則甚盛亦退之所謂甔石之儲常空於私室方丈之食每盛於賔筵何簡薄也田園貧相惟富詩書何冲淡也人有贈富鄭公詩曰田園貧宰相圖籍富詩書身為中丞不受遺錢無貪心也太宗在晉邸嘗以五百千錢遺中丞劉溫叟不敢辭貯於别室明年重午復以角黍遺之使人至見前所送錢扃鎖如故還白其事上曰我錢尚不受况他人乎身判棘寺不受賜錢無利心也向敏中判大理寺時沒入祖宗弼錢分賜法吏公引鍾離意委珠事獨不受云云嗟夫食前方丈侍妾數百為卿相者誰獨無是心哉而今也不貪不黷無愧於心其表厲之功多矣守杭之日愧市白集非矯俗也乾興九年三月以李及知杭州及性清介所治簡嚴惡錢塘風俗輕靡不事宴逰一日冒雪出郊衆謂當置酒召客乃獨造林逋清談至暮而歸居官數年未嘗市吳物比去惟市白樂天集至後深以為悔入蜀之時龜鶴自隨非强清也趙抃初在成都擕一龜一鶴以行其再任也屏去龜鶴止一蒼頭執事張公裕學士贈以詩云馬諳舊路行來滑龜放長江不再回出判端城不持一硯有善政也包拯知端州嵗貢硯前守緣貢數十倍以遺權貴拯命製者僅足貢數嵗滿不持一硯出帥南海不載一物有清節也余靖為廣西安撫戒當任官吏不得市南藥及公北歸不載南海一物嗟夫囊錦匱金笑與秩終為守令者誰獨無是心哉而今也以昜虐難欺而自畏其勸勉之道至矣嘗謂天下之廉吏有三曰自然之廉曰矯激之廉曰勉强之廉胡質之清惟恐人知自然之廉也時苗為令去官留犢矯激之廉也楊湛貪鄙聞薛宣之名而改節勉强之廉也噫矯激之廉君子不取自然之廉不可多得欲使天下之吏皆自勉於廉節蓋必有虞之九德周之六計以起其愧恥之心庶無歉於先正之髙風昔者隆興初年玉音有曰收召賢士可擢廉潔以律貪鄙夫以我朝嗣服之初必拳拳於舉廉之令者蓋新天下之習俗一乘其機則有頑廉懦立之風一失其機則有噬臍不及事之悔今日新政首舉廉吏其感動人心多矣細書一頒聞者興起精白一意以承休德詠布衾之銘司馬公歌無宅之詩冦萊公愚何幸親見之財計利權宜合不宜分利源宜公不宜私此國朝建置三司之美意也夫斂散及時出納由已此利權也若十羊九牧徒費事功則彼此不通矣視人猶已損上益下此利源也若丘夷淵實不知本末則上下俱困矣之二事者國朝講之也審矣夫夏官之胄案秋官之磨勘衙司冬官之修造河渠自唐五代以來而他官皆所不與我國朝悉屬三司故造作軍器屬之胄案土木之工屬之修造河防之設屬之河渠國家財用之出莫大於三者而三司皆得總焉蔡官制唐地官設度支金部倉部户部唐末省官分置使五代專以鹽鐵為理財之要分在三省之屬今之金部也度支主用度户部主版籍故次之其子司磨勘在比部衙司乃今部官皆𨽻秋官胄案乃今庫部屬夏官修造乃今工部河渠乃今水部歸正冬官地官不得統焉皇朝盡付三司者可見立功以實不以文也開折司兼管綱運衙司考所掌之財勘磨財用檢察憑由悉歸磨勘造作軍器則胄案主行土木之功則修造河渠之役則河渠行之國家之費無大於三事而諸員必三司案之外之諸道轉運內之私帑儲蓄自唐五代以來而地官未必盡焉我國朝悉歸三司故漕臣督集財賦必由三司勸沮內庫取索金帛必經三司出納國家財用之入無要於此三者三司皆得統焉故曰利權宜合不宜分者此也蔡官制本朝分路設漕運使副判官付以按核之權皆督集財賦集肄三司凡經費羡餘轉運官獻之三司盡輸都城積于左藏庫别有科名次貯內庫者皆三司所統之也自昔計臣未有不興利而富國者斂民房錢閹宦曰可而三司堯臣曰不可夫不以困民為念則國用宜乏今主計三年而償前後所貸內庫錢至數百萬而財用沛然有餘也慶厯三年四月王堯臣為户部郎中權三司使事堯臣始受命言於上曰今國與民皆弊矣在陛下任臣者如何因請自擇僚屬上納其言堯臣果以治辦聞五月入內都知張永和建議請收民房錢十之三以給軍費事下有司堯臣持不可因上言曰此衰世事唐德宗所以致朱泚之亂者鹽鐵副使林維畏永和勢助之甚力堯臣奏維維議乃定堯臣主計凡三年前後姚仲孫借內藏錢數百萬久不能償堯臣悉按籍償之而軍國之用猶沛然有餘蓋未嘗加賦於民也益梓夔三路轉運皆乞增鹽井課嵗可得錢十餘萬堯臣固不從上問其說曰西蜀僻逺恩澤鮮及而貢入常倍民力由此困朝廷既未有以恤之而又求益焉是重困也上善其說河北榷鹽廷臣曰可而三司張方平曰不可夫不以規利為重則國計難辦今再任未朞而京師有五年之蓄而公帑愈厚也慶厯六年十二月議榷河北鹽張方平見上問曰河北再榷鹽何也上曰始議立法非再也方平曰周世宗榷河北鹽犯輒處死世宗北伐父老遮道泣訴願以鹽課均之兩稅而弛其禁世宗許之今兩稅鹽錢是也豈非再榷乎上大悟曰卿語宰相罷之方平曰法雖未下民已知之當直以手詔罷之不可自有司也下詔河北父老相率拜迎于路及為佛老㑹七日以報上恩且刻詔書北京其後父老過其下必稽首流涕又嘉祐元年八月張方平為三司使始方平主計京師有三年糧而馬粟倍之至是馬粟僅足一嵗而糧亦減半其財用大不及舊方平遂畫漕運十四策宰相富弼讀方平奏上前上太息稱善弼曰此國計大本非常奏也悉如所啓施行其後未及朞年而京師有五年之蓄自昔計臣未有不重租而榷民者景德茶商所條三等使王涯處此未必不喜上等也三司宋太初取其公私之俱便而不取其榷利之太深異時公用足而民富者非公其誰與之長編景德二年茶商條三等茶租三司使宋太初不敢深取於民只從中等之說慶厯議臣欲合稅名為一使楊炎處此未必不厭其多名也三司程琳寧取其名件之繁碎而不肯鹽麯之併合異時不至沒舊名而增新額者非公其誰賴之故曰利源宜公不宜私者此也景祐元年程琳為三司使先是三司併合田賦公納諸名品為一物程琳謂借使牛皮倉鹽地錢合為一榖麥豆合為一昜於勾校可也然後世有興利之臣復有舊名增之是重困民無已時也噫利權合矣利源通矣然不重其職而口談元理者以財榖為迂手校鉛黃者以籌算為浼其肯盡職耶是以國朝吕申公之在禁掖必先除户部蔡文忠之參大政必先除三司使此古者冡宰理財之意也蔡官制祖宗舊制選除執政侍從必先歷錢榖蔡文忠公由進士第一亦嘗自三司度支副使權拜起居舍人知制誥乃至翰林學士仁宗方親決萬機即欲權參大政尚書除權三司使數月乃拜樞密副使元祐宰相吕申公在政和間任館閣禮官已有賢名嘉祐中朝廷欲置中禁從按其歷任未嘗經錢榖乃先除戶部判官居數月進修起居注不久其任則求遷仕途者以公宇為傳舍速化職任者以簿書為假途其肯究心耶是以國朝陳晉公之為三司使十有八年號真鹽鐡李士衡之任管計至二十年才智過人此古者倉庫為民之意也陳晉公恕為三司使十八年精於吏事晚年薦寇萊公自代真宗用萊公為三司使檢尋晉公前後事件類為方冊及所至榜示躬至其第請晉公判押自是計相無不循其舊貫長編李士衡前後管計之任至二十年才智過人夫如是國用安得不裕民力安得不豐哉今之任財計者有祖宗家法在荒政救荒之政尚矣言者腐聽者厭然君子審先後緩急之宜則以察時變為先以保民命為急以簿書期㑹之間為寬緩不急之故權度三者則荒政之論得矣夫隂陽之在天地間騰降而相推不能無所愆伏如人之一身有血氣不能無所凝滯水旱流行勢必代有故古者於三年之耕則餘一年之食是於三年之間慮一年之必歉也其斯謂之察時變以三十年之通而凶荒水旱民無菜色甚者不舉膳不祭肺馬不食粟馳道不除上下皇皇相與併力以救之惟恐一民之不有其生也其斯之謂保民命至於文務調度之日上下文具之觀則皆姑置之以俟時平無事然後可議其斯之謂知所緩急先後故天下之政非一而荒政獨以救言夫謂之救則其勢奚以異於焚溺之類也揖遜救焚無益於焚念慮不可緩也徐行救溺無補於溺講畫不可後也昔者嘗讀雲漢之詩蓋深悲宣王之遭時適變而亦深嘆宣王之能捍災禦患也切想其於兢兢業業如雷如霆之時此心隱然於流離轉徙之民不啻若已推之若夫朝廷上下盡瘁戮力曽不敢須㬰寧也其曰鞠哉庶士則庶官之長勤於事也其曰疚哉冡宰則大臣之尊勞於職也其曰趣馬師氏則趣馬不秣而師氏弛其兵也其曰膳夫左右則膳夫徹膳而左右置而不問也而又繼之曰靡人不周無不能止嗚呼盡之矣是無一人不周急於民也是無一不急之物不之去也夫如是上足以銷天變下足以保民生王化復行非偶然之故也若酒榷鹽鐵可罷於民所疾苦之時而兩府之士不以告至貽汝南次公之譏前霍光傳稅錢草粟可寬於關中飢旱之時而羣臣之間未嘗言至煩昌黎御史之奏韓文集嗚呼陋矣漢唐君臣也其視周人之政逺矣祖宗勤恤民隱周行於平時無事之暇而救災美意不能自己於天變上聞之日且常平之法行於淳化之二年淳化二年京師大穰分遣使臣於四門置場增價以糴名曰常平以常參官領之嵗飢即減價糶與貧民義倉之法行於乾德之元年乾德元年令州縣置義倉所收稅一石每輸一斗以備凶荒救荒之策似矣而祖宗猶未也上供者國用所自出也吾寧恤於江淮而無恤於國用祥符九年詔江淮運司留上供米五十萬而備飢年賑濟軍儲者邊備所需也吾寧恤於揚泗而無恤於邊儲沈倫使吳越奏揚泗飢饉中軍儲尚有百萬斛可貸於民即命發廪糶救荒之策至矣而祖宗猶未也諸道租稅悉從蠲免恐其有以困吾民乾德元年詔水旱作沴民俗流離委諸道長吏預告有災傷處並放今年租稅劒州群盜捕逐不置慮其有以擾吾民雍熙二年西劒州榖貴詔以官粟賑民仍命使捕賊上曰盜賊之起皆由飢饉可預為防備嗚呼此其仁之至義之盡歟此特上人之責耳而群公百辟其能無上體愛民之意乎其任運使也漕兩浙者則發廪減直以濟貧民祥符六年兩浙運使陳堯佐言杭閏等州米斗錢六十蓋江隂不稔行於販鬻致有增價宜勿禁以濟小民仍令發廪減其價糶之漕梓州者則出祿米以賑飢民扈稱為梓州路運使嵗飢出祿米以賑民貧富家大族皆以米輸官全活者數千人其秉州麾也活青州四十萬人則每自喜言之邵伯溫言富鄭公使遼功甚偉每不自以為功至知青州活飢民四十餘萬每自言之曰過於中書令二十四考矣活京東百萬口而人至今賴之蔡齊治京東租弛其鹽禁民得以賈昜人至今賴之皆曰使吾人百萬之口活而不飢者蔡公也詩曰靡人不周無不能止亦何慊於雲漢之章雖然觀祖宗之心於天變上聞之時不若觀祖宗之心於平時無事之日賜貧婦以茶綵賜耕者以茶綵是無念而不在民也政要仁宗駐駕觀道左耕者賜以茶綵天聖三年觀刈麥聞民舍有機杼聲召問之乃一貧婦因曰其勤如此賜以茶綵既觀農刈麥又觀農刈禾是無念而不在農也政要增釋開寶六年駕出觀民刈麥刈禾八年又觀種稻興國二年幸景風門外觀刈麥九月又出南薰門觀稼夫惟存於平居見於荒政閭閻疾苦上徹旒冕户庭洞達無間鰥寡此祖宗之心其堯湯之用心乎古今源流至論前集卷九
