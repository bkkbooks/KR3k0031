  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_039-1a, image: WYG0942/WYG0942-0620c.png}
body:
  text: 古今源流至論别集卷九宋黃履翁撰軍政論漢與祖宗之政甚矣軍政不可一日廢也夫聚天下不逞之人而授以兵家不仁之具其氣咆哮而難制其心頑獷而難服非法足以束其心恩足以效其死威足以制其生死之命則百萬熊羆錚錚佼佼安能入吾奔走之下哉嘗觀三代之下而能得制兵之道者惟漢可取其恤兵也寬其待兵也嚴其制兵也整肅其召兵也周密夫恤之以寬則人知自勉待之以嚴則下知自戒制之以整肅則無玩意召之以周密則無姦心是以終漢之世晏然無事諸吕七國變生倉卒而備禦素具北胡南越連兵數年而邦本不搖誠有以也吾觀從軍有勞得以復除髙帝紀三年關中卒從軍者復家一嵗亡士過多將軍有譴李廣傳漢下廣吏吏當廣亡失多為虜所得坐當斬贖為庶人金布著令尤恤死事金布令曰邊士卒從軍死者將為續傳歸所居給以衣棺云云羽林既死特録孤兒前百官表上太初元年初置建章營騎俊勇名曰羽林騎又取死事之子孫養羽林營號曰羽林孤兒羽林有令其恤兵也寬矣然力功增級者幕府已察馮唐傳雲中守魏尚坐上功首虜差六級下之吏削其爵亭徼不治者出警必罰食貨志上北出蕭關從數萬騎行獵新秦中以勸邊兵而歸新秦中或千里無停徼於是誅北地太守以下捕降為虜者詔書加詰楊僕傳南越反拜為樓船將軍有功封將梁侯東越反上欲使復將為其伐前勞以書敇責之曰將軍之功獨有先破石間尋愜復有斬將搴旗之實也烏足以驕人哉前破畨禺捕降者以為虜掘死人以為獲是一過也云云推此心以在江外江海之間可得信乎僕惶恐對曰願盡死贖罪逗撓者有誅韓安國傳楊敀坐逗撓誅後期者有誅張騫傳後二年騫為衛尉與李廣俱出右北平擊胸奴胸奴圍李將軍軍失亡多而騫後期當斬贖為庶人畏懦者有誅前功臣表張騫元朔二年坐以將軍擊胸奴畏懦當斬贖罪免楊僕元封四年坐為將軍擊朝鮮畏懦入竹二萬箇贖金為城旦其待兵也嚴矣以制兵之意言之則京師之兵僅萬人耳統於一官未為過多而二三卿士各分所領欲上下之相維也按後百官志光祿勳注宫衛士八十一人八又蔡質漢儀曰主虎賁千五百人又羽林郎百一十人羽林左騎八百人羽林右騎九百人而又前百官表云諸郎守門戶出充車騎多至千人總計之光祿勳有四千三百九十九人按後百官志衛尉卿一人注漢官儀曰衛士六十人南宫衛士令一人本注曰南宫衛士貟吏九十五人衛士五百三十七人北宫衛士令一人本注曰北宫衛士四百七十一人又右都僕左都侯衛士共百九十九人又宫掖門凡七各有司馬以領衛士南屯百二人蒼龍四十人元武三十八人北屯三十八人朱雀百二十四人東門百二十人朔平百二十人總而計之衛侯所有一千五百一十三人又北軍五校各領七百人長水領七百三十人又執金吾五百二十人總而計之有二千五十人以宫掖門所領者論之多者百八十人少者三十八人其十二人止領一校多不過千人合四者計之則京師之兵止餘萬人既有光祿勳又有衛尉又有五校執金吾等官都試之役太守都尉事爾縣之令長丞尉何預而必欲俱會欲上下之相察也前髙帝紀材官騎士習射御馳驅戰陳常以八月太守都尉令長丞尉會都試課殿最伍符素備以正什伍馮唐傳尺藉伍符注李竒曰尺藉所以書軍令伍符軍士伍二相保之符信也如淳曰漢軍法曰吏卒斬首以尺藉書下郡縣移郡令人故行不行奪勞二嵗伍符亦什伍之符要節度也遊徼亭長以防盜賊前百官表縣令長皆秦官皆有丞尉十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫遊徼三老掌教化嗇夫秩聽訟收賦稅遊徼徼循禁賊盜鄉亭亦如之皆秦制也其整肅何如哉以召兵之意言之始用羽檄以召天下之兵髙帝紀十年陳􅀈反趙代地皆􅀈有吾以羽檄召天下兵未有至者注師古曰檄者以木簡為書長尺二寸用召也其有急事以鳥羽插之示其速也魏武奏事云邊有警輒露檄插羽後用虎符以合郡國之信文帝紀膠西欲擅發兵而弓髙詰之自圗吳王濞傳漢將弓髙侯類遺膠西王卬書曰云云王肉袒叩頭漢軍壁謁曰臣卬奉法不謹驚駭百姓乃苦將軍逺道至於窮國敢請葅醢之罪侯執金鼓見言曰王苦軍事願聞王發兵軍王對曰朝錯變更髙帝法令天下七國發兵且誅錯聞錯已誅卭等謹以罷兵歸將軍曰王茍以誅錯為不善何不以聞及未有詔虎符擅發兵擊義國乃出詔書為王讀之曰王其自圖之王遂自殺嚴助以節發兵而郡守拒之不從本傳建元三年閩越舉兵圍東甌東甌告急於漢武帝以問太尉田蚡蚡曰云云上曰太尉不足與計吾新即位不欲出虎符發兵郡國乃遣助以節發兵會稽會稽大守欲拒法不為發助乃斬一司馬諭意指師古曰以法拒之為無符驗也其周密又何如哉蓋髙帝出入兵間熟究利病其為四百年之規模逺矣至我國家本以仁得天下未始倚兵為重也然承五代破碎之餘其紛紛謀亂皆無賴不逞之人藝祖平定天下聚以為兵其所以隄防制御之術不得不曲防周慮厚祿以畀之重罰以警之明法以節之分權以防之列聖相承緝熙燕謀其視漢家之法又逺過矣代蜀名帥超授醲賞行狀王仁贍歷詆諸將奢縱不法兾以自解止言謹畏廉恪惟曹彬一人耳太祖怒下全斌吏即授彬宣徽南院使彬曰收蜀將校皆得罪臣以無功獨蒙厚賞恐無以勸天下太祖曰卿有茂功加以不伐設有微纍仁贍肯惜言哉典兵舊臣皆蒙厚祿符彥卿等罷兵解職皆畀以厚祿以享富貴備邉諸將悉豫市租郭進李漢超賀惟忠姚內斌等備邊其管𣙜之科悉以豫之略其細故二十年間無西北之憂若寬矣然王仁贍之貪欲則下之吏議見上潘美之驕伐則警以匣劒聖政編年太祖征荆南以匣劒付曹彬曰自副將不用命有罪犯者得斬之潘美等皆為之失色又未嘗不嚴也此待將帥然爾御龍扈從特命增給太祖以御龍直從郊祀從命增給而川班殿直不得如例擊鼓上訴帝怒曰朕之所與即為恩澤烏有例哉命斬妄訴遂廢其班沿邊戌卒時賜絹襦興國八年詔河北河東沿邊戍卒人賜黃絹襦一京師內外諸軍人給米一石巾屨端布出自特旨緍錢薪炭或行泛恩增釋兵卒名額不一輕重不同故隨其等降為之月糧科錢衣賜不使過分祖宗時或賜巾屨紵衣或賜緍錢端布或賜草茶或賜鮮米或以霖雨賜蒸或以春寒賜薪炭其諸修城浚河守束綱運皆時賜緍錢襦袴之類悉出於非時特旨也若寬矣然武雄之肆掠則百卒竟誅乾德中藉諸道驍勇兵送闕下太祖團結為武雄軍凡百餘人白日掠人妻女於城下帝怒捕戮之川班之妄訴則全軍俱廢乾德中收蜀精兵置川班殿直廪給與御龍直等開寶四年太祖以御龍直宣從郊祀特命增給而川班殿直不得如例擊鼓上欣帝怒曰朕之所與即為恩澤烏有例哉命斬妄訴遂廢其班酒坊之兵士作過則罪及主將何剡言太祖酒坊火發本坊兵士因便作過太祖以本坊使田處岩等不能部轄並處極法又未嘗不嚴也此特士卒然爾不特此也軍士衣不得過膝蔥韭不得入營無侈心也出戍之日多在營之日少無非念也營在城西者糧在城東營在城東者糧在城西無怠志也其制兵之意可見其整肅矣張方平言太祖訓齊兵法甚嚴軍人不得衣皂但許衣褐其制不得過膝豈有紅紫之服蔥韭不得入營門豈知魚肉之味又置更戍之法逺妻弩外戍之日多人人少子而衣食昜足每月請糧營在城西者即於城東給營在城東者即於城西給不許雇車乘須令自負以勞役之故士卒足衣食無外慕安辛苦而昜使今則異矣衣服驕侈所授廪給一身不足妻子飢凍豈能不歸怨於上耶又不特此也三帥有握兵之重而無發兵之權樞密有發兵之權而無握兵之重其召兵之意可見其周密矣范祖禹言伏見樞密都承旨曹誦權馬軍司祖宗兵法本於樞密有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權彼此相維不得專制此所以百三十年無兵變自唐季以及五代樞密之權偏重動為國患由手握禁旅又得興廢今副都承旨為樞密屬官權在管軍是本兵之地又得握兵合而為一非祖宗制兵之意皇朝之制大臣平章先軍而後國羣臣出守先軍而後州庫曰軍資監曰軍器官曰參軍軍務曰贍軍其於軍事重矣故其恤之寬待之嚴制之以整肅召之以周密無不置其慮者宜也愚敢以祖宗之政望今日不但以漢之政望今日軍器言平時當備兵器昔胡安定之始在湖學也講明邊防必專置齋胡安定在湖學也治道有齋水利有齋邊防有齋門人皆傳其業及監作院也訪尋利器必精技能胡安定監某處作院夫安定道德之宗師也其於兵事為尤熟則儒者烏可以軍旅未學為辭而不之講哉夫徒手而遇盜雖賁育無如之何操箠而遇敵雖童子不知所避甚矣兵器之有切於國家也有備則氣勝無備則氣沮理也亦勢也昜之利於睽陳於萃聖人蓋思之審矣愚嘗究其本末在周則出於民在漢則出於官雖所在之制不同而所重之意則一也自今觀之周制其於鄉也鄉師既簡兵器矣地官鄉師簡其戎鐸旗物兵器族師又簡兵器族師合其卒伍簡其兵器縣師又備兵器縣師若有軍旅則會其車人之卒伍使皆備旗鼓兵器其於遂也遂人既簡兵器矣遂人簡其兵器里宰又比兵器里宰掌備其邑之衆寡與其六畜兵器稍人又帥輂輦稍人作其兵徒輂輦夫惟器械素備兵甲素精一旦有警用之無缺是時也釋耒而戰捨戈而耕良農皆兵卿士皆將此兵器之在農者是也漢制其在郡國也則有庫兵漢成帝紀元始元年立上郡庫如淳曰漢北邉郡庫官之兵器所藏燕王曰傳領庫兵掌漢官志注云處尉徼長亭長皆習設五兵或置工官潁北王翟有工官南陽苑秦長官鐵官濟南東平交有工官鐵官泰山東泰髙有工官嬴有鐵官見地里志庫兵以算賦為之髙帝紀初為算賦注賦錢人百二十為一算以治庫兵車馬而工官與鐡官同置於産鐡之郡見上其在京師也則有武庫掌於中尉百官表中尉武帝更名執金吾有武庫主兵器而天子又自有若盧考工室若盧以藏兵器考工室以主作器械一以少府主之官表少府屬官有若盧考工室如淳曰若盧藏兵器讚曰考工主工作器械夫惟外有庶官內有列卿工匠器械咸精其能是時也邊吏拒冦者得賜武庫兵毋將隆傳哀帝發武庫兵前後十餘輩送董賢及上乳母王阿舍隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢邊吏職在拒冦者得賜武庫兵邊兵不足者得發工官兵食貨志武帝時邊兵不足發武庫工官兵以補之此兵器之在官者是也周之在民以兵農為一之時漢之在官以兵農已分之後愚之所取者器械既備周果中興宣帝之威伸南北所恃器械之精耳其視秦之銷鏑唐之銷兵秦銷鋒鏑鑄以為金人十二唐穆宗朝蕭詵議銷兵何止天淵哉昔我祖宗之定天下而治不忘亂安不忘危其於武備尤切留意造兵器者十日一進課其功也曽子固文太祖平定四方命魏丕主作院每造兵器十日一進課之旬謂上親閲之作治之功盡矣典軍器者十餘年不昜專其業也太祖使魏丕典作坊十餘年器械精明床子弩止七百步丕增至千步或幸弓矢舍賜及作工太祖幸司弓署按循作工賜以布帛或幸軍器庫加賞主吏真宗幸軍器監加賞主吏勉其職也或作坊嵗造凡三萬或諸州嵗造凡六百餘萬豐其積也曽子固文太祖作坊嵗造甲鎧其裝鎗劒刀鋸器械箭箶籚皮笠弩撞床子弩凡三萬二千又弓弩院嵗造弓箭弦鐡凡千六百五十餘萬諸州嵗造弓箭剪劒甲兜鍪箭鏃等凡六百二十餘萬又别造佳器凡諸兵械置五庫貯之戎具精勤近古未有也甲鎧山積鋒鋩霜徑近古未有焉至於慶厯武備幾弛矣我仁宗一意作新工吏竦然既遣近臣分治軍器天聖六年天下州軍器械久不修繕遣近臣十六人分治之又遣朝臣揀試兵器嘉祐四年詔在京所造軍器多不精其選朝官使臣揀試之而兵械果精於敕勵之下獨轅之弩則得之郭咨皇祐四年郭咨所進獨轅弩詔弓弩院如樣制之既成夏安期具言使詔置獨轅弩軍寨腳之車則得之郭固寶訓知并州韓琦言邠州推官郭固約古制為車前方後鋭上制七槍以為前後二拒凡一車二十五人五人居上十四人推挽六人執器械臨陳可便以遏奔衝下營可以立寨腳可用於平川之地上召試殿推固為衛尉流星之弩拒馬之牌則得之米守信米守信知澧州遣李錫持新樣流星弩拒馬牌寨腳車山字鐡甲等八種來進上試於殿庭擢為三班差使及于熙寧兵政又新矣我神宗甚切加意內外修飭其在京師有監有庫熙寧六年置軍器監總內外軍器之政軍器舊領於三司判案三司事叢判案者以類昜始令置監而廢案焉又置內宫箭南庫又御前所製軍器别差官提舉云其在諸州又有作院而戎器有光于昔弓則曰神臂熙寧元年入內副都知進神臂弓初民李宏獻此上於玉津騎校射二百四十餘步穿榆木沒半簳詔依樣置造至是以進置鐡甲七十步若水自若連中撤札上稱之床子元豐六年范子竒言判軍器監進床子大弓強於神臂弓獨轅弩較之九牛弩尤為輕便弩則有九牛注見上八牛元豐四年涇原路經略言案武經有三弓八牛床子箭用二槍三劒箭乞下軍器監給弩箭赴本路依樣造箭則曰入陳熙寧六年詔造入陳弓箭其射視馬射弓箭自依舊制減指見上刀則名斬馬熙寧五年陳琰管勾作坊造斬馬刀初上匣刀樣示蔡挺言制作精巧便於操擊遂頒樣造數萬賜邊臣鞍則名邊樣熙寧六年詔軍器監以鞍轡樣計在京軍馬數造給初馬軍用大鞍不便野戰上始以邊樣皮鞍小鞍回旋摶射得盡馳馬之技甲則名偏挨元豐十年涇原路經略使言乞改造神臂素全甲為偏挨甲從之我祖宗備豫不虞之意深矣哉然嘗論之昔朝錯言丐奴中國之長技以徑弩長戟丐奴之弓弗能格則漢之所重者弩也本傳我髙宗因進呈王大智所造軍器因諭曰莫若且令多造弩則國朝之所重者亦弩也聖政紹興二年進呈王大智造軍器上曰莫若且令多造弩翟汝文曰強弩可以制敵人上曰朕謂不在此制敵在修文德若器械不可不備爾切嘗觀漢與國朝所以制敵人之命往往以是而取勝信矣夫中國長技不可一日弛也李廣之擊單于以大黃射其禆將本傳服虔注大黃肩弩也李陵之步戰亦以連弩射退單于本傳注如今之合陳或併兩弩共一弦之類假會宗入烏孫選精兵三十弩本傳注李竒曰三十人人持一弩陳湯圍郅支亦以戟弩為後本傳此漢用弩之明驗也澶淵之役契丹掃境而至張瓌守床子弩一矢飲羽敵將挫衄真宗親幸澶淵時李繼隆禦敵于澶州其契丹大酋撻懶躬出督戰張瓌守床子弩潛發撻懶中額死敵大挫衄退却不敢動遂請和此國朝用弩之成效也雖然漢之所修戎器所用長技固無慊於國朝然國朝藏之之制各異其處守之之官各分其任此其防微杜漸莫有姦心又非漢之所能及我高宗嘗言祖宗置庫有內外之異及弓弩弦箭亦各異職分官主之皆有深意其知之矣髙宗曰祖宗有內外軍器軍藏百間所藏弓弩器械不可勝計外器庫數亦如此原祖宗置庫有內外之異及弓弩弦箭亦名異藏分官主之皆有深意漢人郡國之庫兵京師之武庫不能禁守防間至啓或者之邪謀故申屠聖之反於潁川也殺長吏盜庫兵經歷九郡漢成帝紀陽朔三年潁川鐡官徒申屠聖百八十人殺長吏盜庫兵自稱將軍經歷九郡云云戾太子之反於京師也矯制赦囚徒發武庫兵劉屈氂傳太子遣使者矯制赦長安中都官囚徒發武庫兵何拙哉君子於此安得不三嘆三詠我祖宗之逺謀矣針銘針銘為防過之地古者以針銘為防過之本故其心常有所畏後世以針銘為文過之具故其心昜有所玩甚矣人君不可一日無畏心哉聲色嗜欲昜得以昏此心沉湎遊逸昜得以怠此心便嬖使令昜得以惑此心諛佞姦諂昜得以乘此心聖人知其然也存誠於出入起居之間寓戒於飲食沐浴之頃息養瞬存無念非敬左顧右瞻無往非禮天命可敬歟民心難保歟君子小人之或進或退歟天理人欲之或消或長歟皆舉而寓於針銘之間庶乎吾過亦寡矣夫湯之懋敬厥德若無假於銘也而盤之銘且曰茍日新日日新茍之為言進德之要領日之為言進德之功用此盤愈潔而此德愈新何湯之不能自己耶記大學武王之不役耳目亦無假於銘也而觴之銘且曰樂極則悲沉湎致非悲之為言戒樂心之無益非之為言戒私欲之為害此觴常存而此念愈謹何武之如是過慮耶太公隂謀武王衣之銘曰桑蠶苦力工難得新捐故後必寒鏡銘曰以鏡自照者見形容以人自照者見吉凶觴銘曰樂極則悲沉湎致非社稷安危且湯武聖人也非不知銘諸物而不若銘諸心也形於言不若形於行也而恐恐然不能自安者欲內外交養表裏俱進矣後世之所謂針銘規戒者吾惑焉長夜之屏成帝之美意也然後宫之寵荒淫亡度其視商紂特五十步矣序無逸之圖元宗之盛心也然山水之筆轉移不常其視成王不啻天淵矣宋璟等傳連屏五十種憲宗之念非不勤而晚節用人何如耶憲宗詔李絳搜次君臣成敗五十種為連屏張便座帝常閲視云云丹扆六針敬宗之志非不鋭而溺志邪説又何如耶唐敬宗朝李德裕獻丹扆六針一宵衣二正服三罷獻四納誨五辨邪六防微吾不意古人防過之本而為漢唐文過之具也夫不知有防過之言而陷於有過猶兾他日之能改知有防過之言而視之以為文過將無自新之日矣此漢唐所以有愧於商周也恭惟國朝列聖相承以警戒為龜鑑以晏安為鴆毒兢兢一念比迹湯武中庸有圖發揮九經真宗上晏餞邢昺於龍圖閣上挂禮記中庸篇圖指為天下國家有九經之語欹器有論講明至戒天禧二年作欹器論真宗盤杅之銘在是也無逸一篇列為講圖仁宗孫奭上無逸圖帝施於講讀閣前代遺迹寫為鑒圖仁宗命圖畫前代帝王美惡之迹可為規戒號曰觀文鑒古圖慶厯中出示輔臣仁宗几杖之戒在是也不獨此也書洪範之語於座屏是屏也示不忘三德御臣之意英宗召王廣淵書洪範於屏因訪廣淵先儒論洪範得失廣淵進張景論七篇上曰景所説過先儒逺矣以三德為御臣之柄尤為善論書孟子之言於屏障是屏也示不忘講究治道之語也髙宗建炎二年上曰近以孟子論治道處手寫於絹屏無逸之圖設於殿壁是燕息之地亦不替艱難之訓紹興五年范仲乞寫無逸圖設於講殿之壁趙鼎曰仰見從善汲汲之意敬天之圖列於經幄是出入之際常不愆敬畏之戒孝宗夫祖宗之敬天保治用人聽言已無愧於帝王之盛然猶採古人之成訓托前代之往事或施之屏障或寓之坐銘者是非為是過謹也蓋無過之可防不失為規警之意忘其所可戒安保異日之無過哉是以凜凛於太平無事之日業業於退朝燕居之時想帝王於夢寐之間監治亂於觀瞻之下其為慮逺矣夫今日寫無逸之圖成王之勤也述旨酒之針大禹之儉也日者聖心過謙復為針戒條列門分輝映丹扆又湯之盤銘武之觴銘也彼漢唐視此不亦恧乎藏書論古今聚散之由成周小史掌邦國之志外史掌三皇五帝之書則國之藏書也尚矣夫典籍之府上映奎壁圖書之文下泝河洛其所以振文風昭世教者在是立人極續聖傳者在是豈但充棟汗牛為太平之美觀哉愚嘗稽往古閲方來其斯文之或盛或衰或存或亡不知其幾變矣然文不喪天道未墜地幾散而復合幾斷而復續綿綿延延至今日尚亡恙也嗚呼天耶人耶自秦人焚烈之餘尺籍不收其所存者特博士之書耳至項氏咸陽三日火亦皆煨燼惠帝除挾書之律而書始出武帝建藏書之䇿而書始集藝文志孝武世書缺簡脫禮壞樂崩聖上喟然而嘆曰朕甚憫焉於是建藏書之䇿置寫書之官下及諸子傳説皆充祕府成帝復求遺書於天下輯羣書總之而為七略而漢之書始備矣外有太常博士之藏內有延閣廣內祕室之府劉向校經傳諸子詩賦任宏校兵書尹咸校術數李柱國校方技經傳則有昜詩書禮樂春秋論語孝經小學之九種諸子則有儒道隂陽法名墨縱橫雜農小説之十種詩賦其種有五兵書其種有四術數則曰天文厯譜五行蓍龜雜占刑法也方技則曰醫經經方房中神仙也同上詔光祿大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校術數特醫李柱國校方技其七略故有輯略有六藝略昜詩書禮樂春秋論語孝經小學九種一百三家三千三百二十三篇有諸子略儒道隂陽法名墨縱橫雜略小説十種百八十九家四千三百二十四篇有詩賦略五種百六家千三百一十八篇有兵書略權謀刑法隂陽技巧四種五十三家七百七十篇有術數略天文歷譜五行蓍龜雜占刑法二種百九十家二千五百二十八卷有方技略醫經經方房中神仙四種三十六家八百六十八卷光武中興復好典籍明章繼軌又加潤色石室蘭臺充積彌盛東觀仁夀纂集尤多而班固傅毅又依七略而為書部此秦之焚滅至漢始備也隋經籍志兩漢石室蘭臺彌以充積又於東觀及仁夀閣集新書班固傅毅等典掌焉並依七略而為書部董卓之亂獻帝西遷圖書縑帛軍人皆取而為惟囊自獻帝西遷之餘圗書縑帛皆為帷囊四百餘年所積之文棄置殆盡魏氏採掇遺逸藏在祕書分為四部總括群籍東晉之來雖幾散失元嘉諸人復克補亡同上魏氏採掇遺亡鄭默始置中經荀朂又因中經更著新簿分為四部總括羣書一曰甲部紀六藝及小學等書二曰乙部有古諸子家近世子家兵書兵家術數三曰丙部有史記舊事四曰丁部有詩賦圖譜及家書大凡四部合三萬九千九百四十五卷東晉之初李充以勉舊簿校之其見存者但有三千十四卷謝靈運有目録四部王儉又撰述七志一曰經典志以紀六藝史記二曰諸子志以紀今古諸子三曰文翰志以紀詩賦四曰軍書志以紀兵書曰隂陽曰術藝曰圖譜又紀圖緯方技圖書之書宋元嘉八年謝靈運造四部目録大凡六萬四千五百八十二卷元徽五年王儉又造目録大凡萬五千七百四卷又别撰七志一曰經典志紀六藝小學史記雜傳二曰諸子志紀今古諸子三曰文翰志紀詩賦四曰軍書志紀兵書五曰隂陽志紀隂陽圖緯六曰術藝志紀方技七曰圖譜志紀地域及圗書其書散見合九條齊任王亮梁用任昉相踵部集其為卷不下二萬三千餘爾齊永明中祕書丞王亮又造四部書目大凡一萬八千三十卷梁初任昉躬加部集大凡一萬三千一百六卷而釋氏不與焉此漢末之散逸至歷數代始備也自是而後一失於周師之入郢而江陵之典籍盡焚再失於爾朱之唱亂而洛陽之經史復散元帝克平侯景收文德之書及公私經籍歸于江陵大凡七萬餘卷周師入郢咸自焚之後魏都燕代南略中原租收經史孝文始都洛邑聚書於齊祕府暨爾朱之亂散落民間三失於唐初砥柱之覆溺而東都之卷帙盡亡唐藝文志初隋嘉則殿書三十七萬卷至武德初有書八萬卷王世充平得隋書八千餘卷太府卿宋遵貴監運東都浮舟近河西致京師經砥柱舟覆盡亡其書貞觀間命魏徴虞世南顔師古典祕監請求天下所藏其書開元間命馬懷素禇無量修圖書借録民間未見之文修書有院集書有院名儒實學出入校讎經史子集分為四部藏書之盛莫盛於開元唐藝文志唐分為四類曰經史子集其著録者五萬三千九百一十五卷而唐學者自為之書者又二萬八千四百六十九卷云至祿山之亂寸牘不藏而斯文復遺矣同上祿山之亂寸簡不藏元載為相奏以千錢求書一卷後苗發等使江淮發遺書又後鄭覃請祕閣採經籍四庫儲書至是復全分藏於十二庫之下至黃巢之亂存者已少昭宗遷洛而是書又蕩然無餘矣唐藝文志後命苗發等使江淮採訪至文宗鄭覃侍講進言經籍未備因語祕閣搜採於是四庫之書復令分藏于十二庫黃巢之亂存者益少昭宗徙洛陽蕩然無餘嗚呼斯文夫豈終厄耶天開我宋五星聚奎典籍山積籖軸鱗集方建隆之始其書卷僅萬一千耳乾德二年南征北伐稍稍間出史館充備然藝祖猶切留意也求書之詔每嵗下之乾德四年未幾王禮涉弼等獻千二百二十八卷江南李氏獻圖書二萬餘卷開寶中並會要太平則建三館矣見下端拱則建祕閣矣太平興國中始建三館東廊為昭文館書庫西廊為集賢館書庫南廊為少館書庫書籍正副端拱二年就院中堂建祕閣祥符詔求書得卷萬五千七百餘乾符三年火燔崇文院及祕閣下詔求書得萬五千七百四十卷嘉祐詔求書得卷五百者與官嘉祐五年詔曰今祕閣所藏比唐開元舊録尚多逸篇士庶家上所闕書及五百卷者與官並國朝會要祕閣崢嶸名山輝映繩繩乎星緯之聯絡也炳炳乎雲漢之昭回也上以闡吾道不傳之統下以夀斯文幾息之脈文風自是而振起焉經學自是而發揮焉猗歟盛哉竊嘗觀世道之盛衰慨聖文之興廢每於漢初有憾焉其他損益存亡皆未有關於世教之大者何者聖經功用與天地並非諸子百家雜記小説之比方祖龍焚天下之書而博士官所掌固自若也使髙帝入關之始舍館僅定而挈博士所掌之書悉歸灞上與秦府圖書並藏之正第一機會也此時一失遂蕩然於咸陽之火至孔壁壞伏生老方切切然求已脫之簡吁已晚矣此愚不究祖龍焚書之日而咎漢祖入關之始也雖然髙帝乃不事詩書之主蕭何又舊日刀筆之吏又安知聖經功用哉奉使使命係國勢強弱國勢之強弱使命之重輕係焉使命之重輕敵情之敬忽係焉何以言之方漢帝之初興也與項氏相持百戰間其事無難於歸太公者辨士如酈生隋何陸賈數子最號善口伐者帝嘗於數子中遣之使楚楚傲然不聼逮侯生朝往楚壁暮歸漢庭又何談之昜也謂三子不足用耶則下淮南下南越亦非拙於詞者謂侯生詞鋒説刃果異於人耶則史傳寂寞絶無可書者嗚呼此豈可以口舌爭哉蓋陸賈之使正劉項雌雄未決之時侯生之往乃楚弱漢強之日夫帷楚弱而漢強也則楚氣已索固將求媚於漢之不暇是固侯生之所可以拱揖恐喝而動也譬如千金之家幼奴弱婢人亦不敢昜其言至販夫販婦之徒雖得烏獲為之用告人以言人猶得以侮之此強弱之勢殊而敬忽之心變也吾觀春秋以來三軍暴骨罪在行人一言退師功在使命其倚重於説詞也重矣然晉韓起羊舌肸之使楚也楚視中華藐若無人欲宫韓子而刖叔向以張其長蛇封豕之威能使楚子裭氣專為之禮二子初無劫敵之論是孰使之然哉意晉國天下莫強而鄰國為之側席也不然薳啓疆對楚子之辭謂晉未昜侮侮將有悔則知非二子之力乃晉之勢也左傳鄭得燭之武弦髙子産禆諶之善言也今日掉三寸以退秦師燭之武弦髙明日仗一語以沮晉國子産鄭固賴以僅免而鄭之為國卒至削弱而不能自振是何無濟於事哉意鄭國居小則秦楚昜至於交侮不然前日之鄭乞盟逃盟豈無一言之足以中人心則知非數子之咎乃鄭之削也大抵國勢未張則竒辨無所施其巧國勢已立雖微多言下大敵如發蒙耳不特此耳蘇中郎一介行人耳衛律劫刺耳語不知其幾單于百計欵留亦不知其幾而中郎不懼不屈卒能寒氈裘之膽何也蓋武帝犁庭掃穴之威戎心素懾則中郎仗漢之威靈必有所恃而無恐單于豈能久屈哉出本傳鄭元璹特一辨士耳以孑然單車之身而往數百萬精騎之敵而唇辨如流終能造太原之師何也蓋太宗電掃霆擊之兵氣吞群雄則元璹賴唐之甲兵得以折其鋒而奪之氣突厥豈難服哉我國朝國勢如太阿之出匣人心如太山之四維人才如斗柄之橫漢其自為國也強矣是以皇華之車一出原隰布中國之威聲伐夷狄之姦計每每至於成功方景德北伐之時也曹利用一出果不敢違三十萬之約長編契丹冦河北州郡震動天子北巡至澶州敵騎已過魏州矣上不欲渡河駐南澶州陳堯叟勸之蜀王欽若勸之金陵冦凖勸上北渡髙瓊贊之既至澶州士氣百倍會有飛矢射其統軍殺之契丹遂請和云云慶厯全盛之日也提封萬里精兵萬騎將相一心法令素明富弼一語終不能加獻納之字長編慶厯二年契丹聚兵幽薊遣蕭英劉六符求關南十縣選可使敵者群臣皆􅀈行富弼曰主憂臣辱臣不敢愛其死弼為接伴英稱足疾不拜弼曰吾嘗使北病臥車中聞命輒拜今中使至而君不起此何禮也英起使人掖而拜弼與之日開懷盡言英密以主所欲告弼弼具以聞弼報聘見遼主曰北朝忘章聖之大德乎澶淵之役若從諸將之言北兵無得脫者且北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍今中國提封萬里所在精兵以萬計法令修明上下一心北朝能保其必勝乎曰不能曰就使其勝士馬羣臣當之歟抑人主當之歟遼主首肯者久之曰寡人所欲得者以其地爾弼曰北朝欲得十縣不過利其私賦今以金帛代之可以坐資國用遼主曰卿再至其以誓書來弼再往中使賫書授弼恐書詞異同密啓副封果如所料遂急奏上召吕夷簡問之夷簡曰此誤爾昜書而行遼主曰須於誓書加一獻字弼曰不可曰改為納字弼曰自古惟唐髙祖借兵突厥當時所遺或稱獻納不可知其後頡利為太宗所擒豈更有此理遼主默然於是留所許二十萬誓書加號自尊吳奎不賀彼自退聽非畏吳奎之善辭也畏朝廷之分義也吳奎墓志公使契丹遼加其主稱號謁公使入賀公自以為使事有職賀無預也不為往遼主畏其守義甚重之俳優侮聖道輔斥之悚然知愧非懼道輔之虛言也懼吾國之禮義也長編天聖四年孔道輔使契丹契丹燕使者優人以文宣為戲道輔正色曰中國與北朝通好以禮文相接今俳優之徒侮慢先聖而不之敬北朝之過也遼君臣默然酌大巵謝曰天寒飲此可致和氣道輔曰不和固無害嗟夫使之有職尚矣詩有皇華之章語有專對之責周禮有象胥行人之官或下詔而求才武帝紀或設科而取士武帝或應募而為使張騫其擇之甚精用之甚重也然吾之朝廷有可服之道吾之甲兵有可畏之實吾之將帥有可震之名雖無趙咨代魏之辭亦足以挫敵人之氣昔我太祖擇用武臣不識文字者待江南之辨使而卒臣江南富弼鍊金煆鐡言傾人聽而使契丹日無損於無厭之求終身恥道其事天下之事勢大略可覩矣雖然此言立國者所當自重耳若使於四方不辱君命為使者宜加勉焉律法諸家言律法同異世之論律法之善者莫如司馬遷而論律法之失者亦莫如司馬遷夫遷世為太史最精律法以律之一籥而推日分以律之九寸而得甲子此非善知律者不能也前津厯志遷言厯記廢壞乃語與方士唐都洛下閎等議造漢厯其法以律起日律容一籥積八十一分則一日之分也與律相終律長九寸百七十一分而終復之而復得甲子然考之律書其所議論其所推算而其失滋甚且遷之黃鍾九寸蓋以九分為寸以十分之寸約之得八寸十分一而乃謂之七分之其失一也史記律書遷之鍾分丑三之下有二其實位生之法而妄論餘分其失二也同上夫以遷之長於律學尚不免有異同之疑况紛紛諸子乎若記禮六十日皆用五音而京房用七音隋史乃謂房與康成同其數何疏耶隋律厯志梁武帝作鍾律緯論按京馬鄭蔡至㽔賔並上注遷之律至㽔賔重上生而固則以次下生晉史乃謂遷固同其律何繆耶史記應鍾上生㽔賔之候又上生為仲吕至前漢律厯志則不然應鍾上生之法云云下生仲吕又晉志云云至後世影響之論道聽塗説同聲是非又烏知其得失哉善乎沈存中之説曰漢志言數乃律吕長短立成法耳為史者見其數浩博乃曰隂陽合德化生萬物是猶得幣搗帛杵指為防鳳脛骨而立脛廟也嗚呼指為脛廟而尊敬之猶可言也妄為可否而置議焉豈若闕其所不知者乎求聲以律造律以黍此古今不昜之論者唐禮樂志而世之議者何其紛如也蓋有正聲有子聲有五聲有七聲如遷如固如房如沈重沈重依京房之法作三百六十律皆用正聲也前律厯志云云又本朝陳暘曰五聲十六律樂之正也如康成注禮記如鄭譯作八十四調百四十四律終於十八聲如孝孫皆兼用子聲也唐禮樂志祖孝孫等定樂云云遷之著書固之作志康成之釋禮皆用五聲焉史記并前志與周禮注云房之六十律重又廣之為三百六十律譯與孝孫之八十四調而廣之為百四十四律皆用七聲焉唐禮樂志鄭譯牛宏彥之之徒為三百六十律又祖孝孫考以古聲凡八十四調用七聲此聲之不同所以致辨也至於絫黍之法地有肥磽不同也年有豐耗不同也此黍之所以為難定也皇祐四年范鎮上書云云此秬黍為非是一也於是有更用粟者有用禾秒者有以蠶絲有以馬尾者而又有用人指者此絫黍之法既廢所以致辨也同上此律之為非是二也又見後國朝景祐中李照損鐘磬之十六而為十二馮元從而駁之元之議不勝於是正聲五聲用焉長編仁宗景祐二年李昭言鍾磬十六枚止資十二馮元等駁之元豐中劉幾合四清聲而為十六楊傑因而贊之幾之議得行於是子聲七聲復用焉同上元豐三年劉幾言十二律之外有四清聲也楊傑云云然昭之樂欲減和峴之制而鑄工私減不之知昭號為洞曉音律而其所製或雜鄭衛是其聲未始有定也同上厥後李昭參考和峴之徒則是和峴失之於清而李昭失之於濁其洞曉如此昭所學多李昭以縱黍胡安定以橫黍房庶以一稃二米之黍而阮逸又以量楊傑又以八升魏漢又以聖人三指甚至景仁君實莫逆之交也而鍾律之辨終其身莫之定是其法未始有定也編年皇祐三年房庶言云云范鎮與劉幾言曰李昭以縱黍胡瑗以橫黍房庶所用一稃二米之黍也又皇祐四年范鎮上書云云司馬光數與之論難然則如之何曰古今律術雖難辨而律本尚可言也嘗觀遷之序律書不言律而言兵不言兵之用而言兵之偃律書其論文帝事浩漫宏博若不相類者徐而考之則知文帝之時偃兵息民綏和通使而民氣歡洽隂陽洽和天地之氣亦隨以正此誠造律之本也同上因天地之正氣以定一代之正律律其有不定者乎古人謂天地之氣合以生風風氣正而十二律定正為此耳前律厯志歐陽公之論皇祐樂曰一代之制鼎新大備蓋由先和民心後正律吕而然也六一文嗚呼其知之矣古今源流至論别集卷九
