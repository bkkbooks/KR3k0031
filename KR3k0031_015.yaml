  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0031_WYG_015-1a, image: WYG0942/WYG0942-0225a.png}
body:
  text: 古今源流至論後集卷五宋林駉撰內朝內外之勢合則朝廷皆正人內外之勢分則國家無善治甚矣天下之政不可多門而宫中府中當為一體也何者體統聫屬事權通融外無間隔內無壅蔽則出入起居皆忠良端正之人左右前後無偏嬖側媚之習是意也周人蓋得之矣公卿踈外進見有時宫禁森嚴幾若天淵則政由中决而威福之柄移於下命從內出而機密之事不得聞於外是意也漢人蓋蹈之矣嘗觀周之盛時外朝之上槐棘森列臣民咸造固也而內庭之祕且統於冢宰之職治朝之上百司星環庶尹日侍宜也而燕朝之暇亦無非師保之官前有官人之職中士四人下士八人掌寢處沐浴之䙝而隱然厲其縱禮敗度之心後有典婦等職中士二人下士十有二人掌衣服冠屨之微而第欲防其奢用亂政之原並周禮凡此無非所以合內外之勢異時家齊身修心和氣平而無女寵之習閹宦之患奢侈之弊者豈無故而然耶秦人不古焚滅周典政權四出駮不容議漢氏初興猶識此意宰相監宫中王陵傳吕后以審食其為左右丞相監宫中如郎中令大臣劾閹宦申屠嘉傳鄧通方愛幸嘉入朝而通居上旁怠慢罷朝坐府中嘉為檄召通詣相府責曰小臣慢殿上不敬當斬上使使持節召通謝丞相外得以統內也三公之屬有御史中丞在內受公卿奏事漢百官表上御史大夫有兩丞曰御史中丞在殿中蘭臺掌圖籍祕書外督部刺史內領侍御史十五人受公卿奏事舉劾案章九卿之屬有少府尚書在內主吏民章報後百官志上曰尚書丞掌録文書朝㑹左丞主吏民章報及騶伯史右丞假署印綬餘見前漢百官表內復屬於外也于斯時也宫闈幽邃姬寵娛侍而廷臣奏事者或得致桀紂之諫周昌傳昌嘗燕入奏事髙帝方擁戚姬昌遂不奏帝乃騎昌項問之曰我何如主也昌曰陛下桀紂之主也上笑之禁省峻峙宦寺與居而排闥直前者且得躬獻其社禝之忠樊噲傳髙帝病惡見人卧禁中召戶者無得入羣臣絳灌等莫敢入十餘日噲乃排闥直入大臣隨之上獨枕一宦者卧噲等見上流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定何其憊也且陛下不見趙髙之事乎以士人皆任中常侍之官前百官表上中常侍五員得入禁中二人後漢朱穆疏曰案漢故事中常侍省尚書事參選士人建武以後悉用宦者以郎將得却內夫人之座袁盎傳文帝幸上林皇后慎夫人從其在禁中常同座及坐郎署長布席中郎將盎引却慎夫人座夫人怒不肯上亦怒起袁盎諌曰臣聞尊卑有序則上下和今陛下既已立后慎夫人乃妾妾豈可與同座哉凛凛然有周人之風自侍中為加官之親數詰三公而大臣唯唯退聽前百官表侍中左右曹諸吏散騎中常侍皆加官所加或列侯將軍大夫將都尉尚書太醫太官令至郎中亡貟多至數十人上又朱買臣傳武帝拜買臣為中大夫與嚴助俱侍中使買臣詰難丞相公孫𢎞築朔方事發十䇿𢎞不得一大司馬為內朝之寵典領尚書而丞相僅取充位向之以外統內安在哉前漢孟康注曰大司馬左右前後將軍侍中常侍散騎諸吏為中朝丞相以下至六百石為外朝又霍光為大司馬內領尚書外典兵馬又霍光謂丞相田千秋曰始與君侯受遺詔令光治內君侯治外諸吏居中執法而御史之中丞其權始分前百官表諸吏得執法中應邵曰諸吏得案劾如御史丞宦官典事尚書而少府之尚書其職盡廢向之以內屬外又安在哉元帝用石顯閹宦為尚書詳見本傳自是而後內朝事權一移於權臣再移於諸璫又再移於戚畹故方霍氏之秉權也鹽鐵之議光實主之丞相括囊不言田千秋傳昌邑之事光實專之丞相不得與議楊敞傳堂堂揆席大抵以庸繆易制者為之此移於權臣之弊恭顯之用事也孝元柔懦益不能制望之力爭終不復回蕭望之傳陳咸為中丞欲行總領部刺史奏事之職而為顯所排本傳京房行考課欲通籍殿中以防壅塞之弊而亦為顯所沮並奉傳進退大權盡出中書謁者之手兩府大臣不敢過而問焉此移於諸璫之失王氏之弄權也外總軍馬內領尚書入恃椒房出植邪黨王舜既任於前王莽復竊於後二三大臣屏息不言而漢禍始慘矣此移於戚畹之害本傳推原其由皆武帝親內朝踈外朝之過也東都以後流弊愈甚議郎不在宿直之中後百官志郎官皆主吏直執㦸宿衛諸殿門惟議郎不在直中郎省皆為黃門之廬通典明帝以後和熹太后稱制乃以閹人為常侍小黃門通命兩宫自此悉用閹人不調他士至後御史之權盡移於尚書尚書之權盡歸於宦官尚書宦官合為一黨而宰相踈隔於外御史緘默於內是以太尉楊秉奏侯覽而尚書召秉掾屬詰之曰設官分職各有司存三公統外御史察內當是時也御史豈真得以察內耶事權之失已久小人徒借察內之名以自便耳噫可嘆也後漢楊秉傳秉為太尉時中常侍侯覽弟參為益州刺史纍有贓罪秉劾奏參恐自殺舊典宦竪之徒本在給使省闥司晨守夜而今猥受過寵執政操權肆其凶忿宜急屏斥投畀豺虎非恩所宥書奏尚書召對秉掾屬曰公府外職而奏劾近官云云經典漢制有故事乎秉使對曰春秋趙鞅以晉陽之甲逐君側之惡鄧通解慢申屠嘉召對詰責文帝從而請之漢世三公無所不統尚書不能詰蓋嘗論之自宿衛之親人不領於大臣也而宫正宫伯之官遂去為光祿勳之任光祿勳之屬日益親而門下遂為省加官遂為司侍中遂為宰相矣自供奉之近習不領於大臣也而膳夫以下掌次而上遂去為少府太常之任比其極也門下太僕之司又省分為殿中為內諸司使矣大抵兼則治散則亂合則盛離則衰自三代而下治亂盛衰不知幾變懲其變而復周官以救之此為治之大原歟國家外朝內朝無異漢唐而脉絡貫通實得周意自今觀之韓琦為宰相得治都知奸邪之罪則宦官有過宰相得斥之聞見録英宗即位有疾光獻皇后垂簾同聽政有入內都知王守忠者奸邪反覆間諜兩宫司馬溫公吕諫議皆請誅之韓魏公一日出空頭敕一道參政趙公歐陽公皆已簽韓公坐政事堂以頭子勾守忠著立庭下數之曰汝罪當斬遂責蘄州團練副使蘄州安置傅堯俞奏樞密不治內侍求內降之罪則宦官有過樞府得治之內侍朱晦朱頴士以內降監汶口傅堯俞言樞密院不治頴士求內降罪後既罪頴士公又屢請治樞密院罪以戒欺罔數上章益切權幸憚焉此周冢宰統內庭之意也玉宸殿宴息之所爾或召近臣而觀書景德四年太清樓藏太宗御製及墨迹四部羣書上召輔臣對苑中因登樓閲視又至景福玊宸殿翔鵉儀鳳閣置酒賦詩玉宸殿乃上晏私之所中施御榻帷帳皆黃繒為之無文彩之飾殿東西聚書八千餘卷上曰此皆正經史屢經較定者小說他書不與焉小閣祕密之地爾且召學士而觀文歸田録楊大年在學士院忽夜召見於一小閣深在禁中既見賜茶從容顧問久之出文藁數卷以示大年此周人師氏居寢門之意也不特此耳釣魚賦詩錫宴後苑太宗嘗宴吕端後苑上作釣魚詩斷句云欲餌金鈎殊未逺磻溪須問釣魚人公和詩進曰愚臣鈎直難堪用宜作濠梁結網人置酒賦詩召入內閣真宗嘗召羣臣翔鸞儀鳳閣置酒賦詩中禁密勿或入夜而請對哲宗朝蘇軾為翰林學士入對禁中命坐賜茶曰內翰須盡心事官家報先帝之遇軾出執金蓮燭歸院便殿祕嚴或非時而召語吕端為參政太宗朝多獨對便殿語必移刻或詞臣至深宫忘岸幘之便學士竇儀草制至宫門見上岸幘跣足而坐因却立不肯進上遽索冠帶而後召入或士人為御藥院供奉之官此貂璫之夫統於兩府衣冠之流侍於內庭雖成周亦不是過噫王制既墜內外分裂更漢至唐上下千餘年間遺韻不嗣幸而我朝修復古制聖明胸中豁然表裏然則家法之善今日安可不守哉昔諸葛孔明之相蜀也興漢一念對越天地出師一表未及軍旅且拳拳於宫府一體之請嗚呼孔明其知中興之本歟愚敢援此以為請諸葛亮出師表宫中府中俱為一體陟罰臧否不宜異同云云親賢臣逺小人此先漢所以興隆也漢班序圗諸侯王相國太師太傅太保丞相大司馬御史大夫大將軍列將軍兼官特進列將軍列侯奉朝請太常光祿勳衛尉太僕廷尉宗正大司農大鴻臚少府長信少府中少府執金吾太子太傅水衡都尉京兆尹左馮翊右扶風典屬國將作少府就國侯潁川三河太守齊楚等相東海等太守髙密等相太子少傅太子詹事關內侯丞相司直與州郡叙則居刺史守相上司𨽻校尉與州郡序則居刺史守相上城門校尉八校尉搜粟校尉光祿大夫非中二千石者序在三輔都尉下御史中丞與刺史守相序則居其上丞相長史三輔都尉五官左右中郎將羽林中郎將護軍都尉奉車都尉秩光祿大夫者在關內侯下駙馬都尉騎都尉尚書令西域都尉太中大夫尚書僕射尚書諸侯太傅十二州刺史與守相序則居其上朔方刺史郡都尉關都尉虞都尉屬國都尉西域副校尉郎中車將郎中戶騎二將諸侯中尉諸侯內史諌大夫太子家令博士九卿列卿丞謁者僕射公車司馬令將軍長史廷尉正監長安令千石令黃門侍郎尚書丞郎議郎五官左右中郎從事中郎太史令廷尉平三輔丞六百石令五百石長郡司馬長史五官左右侍郎太守丞都尉丞三百石長侍御史太子門大夫五官左右中郎太子庶子中庶子太子舍人太子洗馬縣丞尉羽林郎右並劉敞漢官儀太師位在太傅上太保位次太傅太傅位在三公上漢百官表武帝以衛青為大將軍位在諸公上漢雜事諸侯功德優盛朝廷所敬異者賜位特進位在三公上亡秩漢興置大將軍驃騎將軍位次丞相舊列侯奉朝請者位次三公元夀二年賜大司馬位在司徒上御史大夫位上卿表前後左右將軍位上卿表詹事位在長秋上中太僕位在正卿太僕上給事中位次侍中中常侍表故事司𨽻校尉位在司直下其有所㑹居二千石前漢翟方進傳班序禹宅百揆虞廷師師旦統百官周朝蹌蹌相臣其官師之表歟夫玉帛之朝森列前後環佩之音鏘鳴左右槐棘之儀凛如也毳鷩之容溫如也然廟堂不重何以警官聨而正朝綱哉嘗以漢事論之奉常稱禮中丞執法謁者贊儀鴻臚賔唱列侯將軍軍吏而下則面于東丞相御史大夫而下則向于西人皆曰漢朝班次之定者此也叔孫通傳功臣列侯將軍軍吏陳西方東向文臣丞相以下陳東方西向餘見前百官表不知漢儀之所以定者相臣之職也蓋蕭何位居第一而諸將無爭次之議本傳申屠嘉檄折慢臣而群臣無敢慢之習本𫝊漢初大臣風采凛凛朝廷之上隱然有不可犯之色夫何相權一輕小臣詰辱而朝位紛矣嚴助傳擢助為中大夫令助與大臣辨論中外相應以義理之文大臣數詘御史大夫特佐丞相耳奏事差居相後漢法也自隂欲代位之意形望之見輕輒與抗禮而丞相之分始紊蕭望之傳丞相司直曰故事丞相病明日御史大夫輒問病朝奏事㑹廷中差居丞相後今丞相數病望之不問病㑹庭中與丞相鈞禮望之曰疾年寧能父我耶案大臣望之通經術居九卿之右本朝所仰望至不奉法自修踞慢不遜受所監闕二百五十以上請逮禁治上於是詔左遷望之為太子太傅又見通典大司馬特一有司耳位次退在相後漢法也自中朝之權貴董賢專權反居其上而丞相之位始失通典大將軍位次丞相散又孟康曰大司馬左右前後將軍侍中常侍騎諸吏為中朝丞相以下至六百石為外朝哀帝寵董賢為大司馬詔居大司徒上嗟夫丞相百官之長也輕辱慢棄一至於此尚何望官位有定次耶是故舊以御史大夫首於列將軍而未央名奏則先將軍而後御史大夫舊以太常首於太僕而未央名奏則先太僕而後太常表書執金吾居大鴻臚之後而未央名奏後書大鴻臚臣賢先書執金吾延夀表書長信少府居三輔之先而未央名奏先書三輔而後書長信少府推原其由蓋霍光專權相臣易制未央之奏國家大議丞相敞不得與聞一出於光之手是無怪乎班序之紛紛雖曰光以丞相而先司馬欲以自文然豈能掩其專政之弊哉噫未央一奏不出於外庭而出於內朝顛倒若此則尚論漢之朝位者安得不思初年大臣之制歟霍光與羣臣連名奏昌邑王曰丞相臣敞大司馬大將軍臣光車騎將軍臣安世度遼將軍臣明友前將軍臣增後將軍臣充國御史大夫臣誼宜春侯臣談當塗侯臣聖桃侯臣昌樂杜侯臣屠著堂太僕臣延年太常臣昌大司農臣延年宗正臣德少府臣樂成廷尉臣光執金吾臣延夀大鴻臚臣賢左馮翊臣廣明右扶風臣德長信少府臣嘉典屬國臣武京輔都尉臣廣漢司𨽻校尉臣辟兵諸吏文學光祿大夫臣遷太中大夫臣德餘見圗注革漢人之陋習復虞周之舊典吾於國朝見之樞臣曹利用爭為首班未易折也宰相王曽抗聲自言而利用不敢抗國朝故事叙班以宰相為首親王次之使相又次之初曹彬為樞密使兼侍中位在宰相李沆下及王曽拜平章事利用樞密使兼侍中乃令利用班曽上然中外皆以為失至是曽拜首相曽與利用告謝而利用爭班閣門屢請班首姓名曽抗聲曰但言宰相王曽以下告謝班始定而利用浸不悅樞密楊崇勳敢失朝禮未易擊也宰相王曽抗奏徑劾而崇勳不敢言本傳李昉守本官為直院位次學士例也天子雖詰之而宰相不易之必待真拜而後升李昉入直翰林先是盧多遜以任學士太祖見昉在多遜下問其故宰相曰昉以本官直學士院未即真拜遂真拜學士在多遜上王欽若罷參政為資政位次翰學例也欽若雖訴之而中書冦公不升之必特置大學士而後進歸田録云時寇公在中書定其班以王欽若罷參政為資政殿學士在翰林學士之下侍讀學士之上欽若不悅訴於上曰臣向自翰林學士拜參知政事今無罪而罷班反在下是貶也真宗特為置大學士處之夫以事權振於廟堂之上而班序肅於殿陛之間太山峻天望者毛竦斗柄橫漢觀之膽寒紀綱安得不整耶故夫班先宰相次以親王又次以使相國朝舊制也彥博宗臣一拜樞使亦願居丞相陳升之之下雖詔居其上而不敢神宗時陳升之為相文彥博樞密使詔以彥慱朝廷宗臣令升之位彥博下以稱遇賢意彥博曰國朝樞密使無在宰相上者獨曹利用嘗在王曽張知白上臣忝知禮義不效利用所為以紊朝著三衙叙班首以殿前次以馬司又次以步司國朝舊制也傅潜為馬步軍都虞候而在殿前都指揮使戴興之上者以潜兼任二司故進之而不嫌實録淳化元年𫝊潜自殿前副都指揮使遷侍衛馬步軍都虞候在殿前都指揮使遷侍衛上咸平二年王超自殿前都指揮使遷侍衛馬步軍都虞候侍讀侍講均曰經筵而熙寧則以講官而後讀官國朝㑹要熙寧元年龔鼎臣蘇頌劉攽等議不當坐講疏朝廷班制以侍講居侍讀之下權尚書試尚書均曰尚書而元祐則以試官而先權官四朝志元祐初置權尚書俸賜等侍郎班序在試尚書之下相權既尊官聫自定此提綱振領之說也雖然紏察百官大臣責也正救大臣臺諫職也韓琦三朝元老不押班細故也而中丞王陶抗章力爭而不少恕嗚呼大臣紏於上臺諌救於下祖宗之意深矣哉長編神宗即位王陶彈宰相不押常朝班朝廷以宰相日奏事垂拱退詣文德殿押常朝班或已過辰正則御史臺放班行之已數十年陶乃肆誣詆韓琦言先朝以前殿退晚及日有機事商議故不及押班為歲已久即非始自臣等均任朝廷內職指為登仙唐倪若水傳牧守重任視曰斥地張九齡傳此內重外輕之弊也承明直廬反厭其居漢嚴助傳刺史左遷恨降之晚李泌傳此內輕外重之弊也嗚呼古今論均任之說多矣言者腐聽者厭愚以謂皆無關於治本也愚之所謂慮者大臣一日去國而朝廷有信任之私衆賢不獲安身則姦邪肆傾害之巧此所深懼也漢制九卿出為守相如石慶太僕出為齊相之類守相入為丞相如劉屈氂以涿郡太守代石慶為相或選中二千石為御史大夫通典漢故事選郡國守相髙第入為中二千石選中二千石為御史大夫或選博士諌大夫補郡國守相如公孫宏以博士遷左內史董仲舒以博士遷江都相嚴助以中大夫守㑹稽汲黯以中大夫守東海之類其所以為內外制者未嘗不一故曹參特為齊相而得代蕭何相國之任曹參傳參以齊國相入為相國代何周勃巳為丞相且率列侯之國為吏漢制亦可見矣文帝紀三年詔曰前日詔遣周勃之國辭未行丞相朕之所重其為朕率列侯之國遂免丞相勃就國獨惜夫姦人害正隂傾巧計使賢者不得安於朝廷而人主不察也汲黯一代忠臣犯顔敢諌凛凛可敬一沮於宏湯之手出守淮陽雖有禁闥拾遺補闕之願而不克施汲黯傳始黯列九卿公孫宏張湯為小吏及宏湯稍貴與黯同位黯非毁宏湯數年召拜淮陽太守黯伏謝不受印綬詔數強豫然後奉詔召上殿黯泣曰云云今病力不能任郡事臣願為中郎出入禁闥拾遺補闕臣之願也上曰君薄淮陽耶吾今召君矣過李息曰黯弃逐居郡不得與朝廷議矣京房朝之正人考功課吏黜陟賢否一陷於五鹿充宗之計出守魏郡雖有通籍殿中以防壅塞之請而不得行京房傳上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史言考功法臣得通籍殿中為奏事以防壅塞石顯五鹿充宗皆疾房欲逺之建言宜試以郡遂出為齊郡太守蕭望之石渠名儒經明行修擢為諌官其有補於君德也不少石顯小人抵隙有日出補平原太守雖有雅意本朝之忠而不得遂蕭望之傳時選博士諫大夫通政事者補郡國守相以望之為平原太守望之雅意在本朝逺為郡守內不自得乃上疏曰陛下悉出諌官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無達士則不聞善願選明經術通於幾微謀慮之士以為內臣外郡不治豈足憂哉宏又本傳望之與石顯恭不協嗚呼君側無子思王所無居州重臣不得行其權辟賢不能安其身彼小人者知其意向之所在肆為讒毁擠人於陷穽而下石而謂國家行更迭之制人臣有决擇之私其亦君見之不明歟漢事已矣且以國朝觀之改秩者宰邑典郡者除郎寺監丞之既更必出守千里之地郎官卿監之已歷必分一道之節是故身在館閣出領外郡祥符五年龍圖閣待制張知白言唐李喬嘗云朝廷重內輕外每除牧伯皆避命致訴望於臺閣妙選賢良分典大州韋嗣立因而請行伏見江浙大郡方切擇人臣雖不肖願繼前修上曰知白援引故事請重刺史之官良可嘉也然以纍更外任不許官至正郎自請治縣增釋咸平中兵部郎中史館修撰韓綬自請治縣除祕書少監知河南府洛陽縣今之縉紳皆為論撰官至正郎肯自陳請治縣乎知天雄者參大政太宗朝知天雄軍趙昌言有能政帝善之召拜給事中參知政事倅河南者知宥院淳化四年前河南府通判劉昌言賜對言事稱㫖五月守衛尉少卿六月同知樞密院事不計出入之輕重不論祿秩之多寡君惟知賢能之可用臣惟知職業之當效非如漢唐諸人紛紛之論然愚嘗觀慶厯元祐之時正人方用而復去群枉方杜而復開未嘗不感於進退之機而更迭之制君子未暇論也何者方慶厯盛時蓋厭西兵日久而思欲整齊衆治也登輔臣以收人望擢端鯁以增諌員晏公殊居於台司晏殊慶厯三年三月同中書門下平章事兼樞密使集賢院大學士范公仲淹實周旋政府慶厯間元昊請和范仲淹自涇州召拜樞密副使乃除參知政事杜公衍擢在宥職而韓公琦富公弼蓋相與副之慶厯中杜衍以吏部侍郎同平章門下平章事兼樞密使初年宣撫河東拜樞密使時韓琦富弼為副歐陽公修首以端亮選在諫院曰素曰靖曰襄又相繼而除歐陽修余靖王素為諫官時蔡襄作詩曰御筆新除三諫官欣然朝野盡相歡三人以詩進呈尋以蔡襄同為諫官時謂之四諫數君子以社稷自任而上亦責治於朞月之間於是仲淹主西事弼主北事仲淹與弼又各上時務十餘條大抵欲退不肖止僥幸以振紀綱於內易監司汰部吏以明政化於外范仲淹為參政每進見上必以太平責之公嘆曰上之用我者至矣既而上再賜手詔趣使條天下事公退而條十數事上之其詔天下興學取士先德行不專文辭革磨勘例遷以别能否减任子之數而除濫官用農桑考課守宰等事見神道碑又遺事云范公為參政與韓富二樞並命鋭意天下之事患諸路監司不才更用杜杞張昷之輩又龍川志范公出按陜西富公出按河北范公因自乞守邉富公自河北還至國門不許入嘆曰范六丈聖人也然君子無常合之勢小人有難拔之根毁謗滋甚朋黨浸起自殊既以事罷晏殊為相益務進賢才當公居相府時范仲淹韓琦富弼皆進用至於臺閣多一時之賢天子既厭西兵閔天下困弊奮然有意數詔大臣條天下事方施行而小人權幸皆不便明年秋㑹公以事罷而仲淹等亦相次皆去事遂已神道碑元輔表殊以工部尚書知潁州免衍亦以權幸不平之憤而去陳執中在中書與杜衍異議孫甫乞出中書奏乞留甫上頷之衍出劄子令甫供職執中不肯署衍取劄子焚之因譛衍衍相才百二十日出知兖州免韓范富三人亦繼踵於外先是石介奏記於富弼責以行伊周之事夏竦怨介斥己乃使女奴習介書改伊周作伊霍上雖不信而仲淹弼不自安皆請出按西北邉餘見上襄以守泉修亦乞蔡而向之合者始睽矣時范富既罷諸賢盡去蔡襄知泉州歐陽修知蔡州慶厯君子翻然為均逸之舉者豈其本心哉元祐盛時蓋痛懲熙寧舊政而欲振起庶事也召元老於散地起正人於外藩司馬公吕公既登揆席元祐元年四月正議大夫門下侍郎司馬光左僕射金紫光祿大夫門下侍郎吕公著右僕射五月太師文潞公平章軍國事矣大防純仁又繼之元祐三年中大夫中書侍郎吕大防太中大夫左僕射中大夫同知樞密院事范純仁太中大夫右僕射劉摯王存既在政路元祐初劉摯除門下侍郎王存除尚書左丞蘇轍蘇頌又繼之元祐五年蘇轍拜尚書右丞遷門下侍郎蘇頌拜尚書左丞諫垣則劉公安世給舍則范淳甫講筵則程伊川元祐中劉安世除諫議大夫范祖禹除給事中程伊川除崇正殿說書諸賢彈冠相慶慨然以革弊為巳任免青苗保甲之患罷諸科誦數之學天下駸駸慶厯之治遺老傳蘇轍曰元祐以來裁損宗室恩止租免减朝廷無窮之費出賣坊場雇募衙前免民間破家之患罷黜諸科誦數之學訓練諸將傭惰之兵置寄祿之官復六曹之舊然君子方有坐席之溫小人隂有伺隙之計楊畏力引吕章李鄧之徒先是吕大防用楊畏為諫議大夫密約畏助己元祐六年畏言乞講求成繼述之道即疏吕惠卿章惇安燾鄧溫伯李清臣等行義乞召章惇為相上納之鄭雍深排蘇劉朱王之黨元祐鄭雍楊畏論劉摯蘇軾又具黨人之姓名始劉摯終吳立禮凡三十人朱光庭王岩叟孫升韓用等與焉詔罷摯蘇子由則守汝元祐末奏事不報再以劄子面論之上不悅李鄧從而媒孽之乃以本官出知汝州李遺老傳范淳甫則守陜劉摯則守鄆元祐末出范淳甫守陜劉摯則守鄆川黨洛黨朔黨諸賢皆海之隅嶺之表聞見録洛黨者以程正叔為領䄂朱光庭賈易等為羽翼川黨者蘇子瞻為領䄂吕陶為羽翼朔黨者以梁燾劉摯王岩叟劉安世為領䄂羽翼尤衆諸黨以相攻不已至紹聖初章子厚為相同以為元祐黨竄嶺海之外可哀也吕微仲秦人戅直無黨范淳夫蜀人師溫公不立黨亦不免竄逐以死尤可哀也而向之用者盡黜矣元祐君子不能安於朝廷之上者豈國家之福哉噫慶厯諸公既去而所用皆夏竦陳執中之流元祐諸君子既出而所信皆子厚蔡確之輩君子小人之機亦可畏也矣捨是不慮屑屑然品位之崇卑內外之輕重其亦放飯流啜而問無齒决君子謂之不知務易論治道之盛莫尚於泰衆賢彚進於初而九二之臣又廣包荒之量而用馮河之勇去朋黨之私而無遐逺之棄以此得尚于六五中行之君然聖人於卦之彖則斷之曰內君子而外小人蓋必君子進而小人退然後足以遂初九彚征之美成九二得尚于中興之功不如是而使小人制之則泰以為否矣易泰卦嗚呼萊公一出大名北使咨嗟有何以不在中書之問拾遺萊公鎮大名府北使道由之謂公曰相公望重何以不在中書公曰皇上以朝廷無事北門鎖鑰非凖不可中國既相司馬遼人相戒有毋生事開邉隙之語遼人敕邉吏曰中國相司馬矣謹毋生事開邉隙正人端士一進一退其有係於夷狄觀望也如此其可一日去之哉省官古者官冗乎後世官冗乎古者因事而命官因官以分職故若贅而實省也後世職散而無統屬多而虛授故若繁而實曠也且周天官凡卿大夫命士三百五十餘人地官除鄉遂虞衡山林司關司門不可考者尚四百餘人春夏秋冬四官凡五百餘人此六官中大略以春秋官為凖以多乘少皆以五百人為額則凡三千人之數土訓誦訓無他職事掌葛掌染僅以微物是周之官若冗矣然周公以公兼冢宰召公以公兼宗伯通典臣按顧命云太保領冢宰畢公領司馬毛公領司空别有芮伯為司徒彤伯為宗伯衛侯為司寇則是時三公各兼一卿之職此引安國注頴達疏云也太公以太師而兼司盟之職左傳僖公三十六年云載在盟府太師職之蘇公以三公而兼太史之官此命官兼攝也書立政太史司寇蘇公軍司馬輿司馬行司馬戎僕戎右有軍旅則用之並禮夏官甸祝田僕有田獵則用之春官甸祝掌四時之田夏官田僕掌取田路有喪紀則用喪祝春官喪祝掌大喪勸防之事有盟㑹則有詛祝春官詛祝掌盟詛此臨事權設也局分不必專設史胥不必别置所以若贅而實省歟漢自武帝意在理財則司農增均輸平凖郡國增鹽鐵等官百官表司農屬官有均輸平凖令丞時桑宏羊為大司農中丞稍稍置均輸志又平凖書宏羊請置平凖于京師又食貨志地里皆云郡國置鹽鐵官意在用兵則內有八校尉征伐有將軍又刑法志內增八校尉又武帝置驃騎將軍車騎將軍大將軍意在用刑則置中都官獄三十六所漢官何繁耶後百官志武帝以下置中都官獄三十六所光武中興省然則官雖多而無計㑹之司兵官雖增而無統𨽻之長刑官雖衆不屬廷尉而又事權之散主唐世六尚書之有二十四司之屬二十四司之有侍郎郎中員外之員夫何外是復有九寺四監之分大司農少府戶部職也太常宗正禮部職也光祿勳但供良醖禮部之膳部也衛尉掌軍兵儀仗帳幕兵部之庫部也唐官何贅耶唐百官志吏部其屬有四一曰吏部二曰司封三曰司勳四曰考功戶部其屬有四一曰戶部二曰度支三曰金部四曰倉部禮部其屬有四一曰禮部二曰祠部三曰膳部四曰主客兵部其屬有四一曰兵部二曰駕部三曰庫部四曰武部刑部其屬有四一曰刑部二曰都官三曰比部四曰司門工部其屬有四一曰工部二曰屯田三曰虞部四曰水部然兵部無戎帳戶部無版圖光祿不供酒衛尉不供幕官曹虛設俸祿枉請杜佑傳云云二咎繇二垂二契二伯夷之弊又陸長源詩曰兵部無戎帳戶部無版圖虞水不管山川金倉不司錢穀光祿不供酒衛尉不供幕祕書不校勘著作不修撰漢官職散而無統唐官屬多而虛授所以若繁而實曠歟國朝設官固無漢唐濫員之弊而所可論者其惟入仕之門乎嘗以國朝入仕之制考之真宗以前入流尚少仁宗以後入流始冗此不可不論也太平興國詔曰今封疆盡闢縣邑猥多動皆缺員歷年未補太宗太平興國詔云云咸平中詔曰如聞州縣闕多貟少可選朝官各舉所知真宗咸平詔曰如聞州縣闕多貟少可選朝官各舉所知以補貟闕夫入流如是其少何也謂其恩澤之吝而選舉之艱歟則當時郊祀行慶百僚不待考而遷官誕節推恩從官不候郊而任子並吕源增釋云諸科但量試墨義取士之數甚優國初科舉未備諸科但量試墨義張齊賢之賜第也通榜並與通判言行録云太祖幸西都張齊賢獻十䇿還語太宗曰我幸西京惟得張齊賢耳不欲官之汝異時收以自輔也興國二年齊賢舉進士有司第其名在數十人後上不悅一榜盡與通判齊賢不十年至相錢若水之到選也三人各遷朝官言行録錢若水傳夫寬恩如此而官不冗者有由矣仁宗慶歷中張方平上言謂在銓近萬人言行録張方平云云嘉祐中蘇軾進䇿謂一官而三人共之東坡云近歲以來吏多而闕少率一官而三人共之居者一人去者一人而伺之者又一人是一官而有三人無事而食也夫入流如是其冗何也謂其恩澤之泛而選舉之濫歟則當時罷從官每嵗任子之法仁宗詔自今從官每嵗不得例任子削諸科間歲取士之數嘉祐二年上封者言四年一貢舉四方士子待試者六七千人往往廢學遂至困窮以磨勘則增保舉之員舊制知縣幕職皆得薦舉後遂監司郡守得保舉乂增員數以䕃補則嚴銓選之限熙寧中罷身言書判立銓試出官之法官無大小付之格法羔鴈不至巖谷峻加夫裁抑如此而官冗者有由矣蓋嘗觀上官均論祖宗入流之多也在特奏胥吏資䕃之濫則知仁宗以後所以致冗者其三者入流弊歟元祐元年上官均言今之自文職入流者凡四進士補䕃與夫納粟得官百司胥吏也自武職入流者凡三武舉補䕃與百司胥吏也四者之冗其可罷者納粟也有可裁抑者特奏資䕃胥吏也且特奏之法真宗以前未設也嘉祐始數十人治平三百人熙寧五百人而况於後乎上官均云嘉祐四年以後特奏才數十人治平至熙寧三年三百餘人熙寧三年每次推恩不减四五百人欲乞四等以上限以人數可革特奏之弊嗚呼龍鍾榆景一該恩免求田問舍欲免韲鹽所入若此安得而不濫乎胥吏之任真宗以前尚嚴也景祐中遂有三司諸吏老疾不汰之冗廟堂揀斥投瓦自肆甚者或以减年而出官或以坐理資任而典郡而况於後乎景祐中詔揀汰三司吏之老疾者三司優幸朱正等聚衆喧訴詣中丞杜衍第投瓦礫肆醜言又上官均云百司胥吏積勤纍日大率及二十餘年方得出仕惟三省人吏尤為優幸每以㸃撿文書酬奬减年出官最速其不願出官者坐理資任至為郡宜加裁抑則可以損雜流之弊嗚呼騖鴈老吏寡亷鮮恥玩弄文法不易故態所入若此安得而不濫乎若夫資䕃之恩其弊滋甚建隆初禮部補齊郎才十五人兵部補洗馬才十二人太平興國初文武朝臣班簿才二百人咸平初才四百人而朝臣又非皆得以任子至于慶厯則有任學士二十年而一家兄弟子孫入京官者二十人矣上官均曰建隆之時禮部補齊郎時十五人耳兵部補洗馬才十二人云云慶厯三年范仲淹言每歲奏薦積成冗官有任學士以上官才及二十年則一家兄弟子孫出京官者二十人仍次第升朝此濫進之極也况國初無致仕之制後有易簀而請者有停服而請者致仕之恩何濫也吕源云興國六年給事劉載致仕賜其子宗古同學究出身天禧元年知制誥胡旦致仕以其子戣試校書郎三丞以上為太廟齊郎夫給事中者今之通議大夫也知制誥今之中書舍人也皆曰侍從員外郎三丞郎今之朝奉奉議郎推恩至此可謂廣矣崇寧以前新受致仕乃推恩因疾篤而請者非有恬退之志不足賞也其後有司計地里逺近為事府之制遂有停喪待命改日移時之弊國初無遺表之制後有妻族外生悉皆沾恩門生僕𨽻亦蒙甄録遺表之恩何濫也同上開寶七年相州節度韓重贇卒子崇訓為西京作房副使淳化二年左諫議大夫劉蟠卒子錯為大理評事祖宗時無遺表之制如韓重贇劉璠皆一時特恩也真宗以後臣寮遺表旁及妻弟外生門客奴𨽻皆望沾恩也嗚呼未離襁褓已列縉紳不限賢愚槩居祿仕安得不動先賢之念三冗未去欲清庶職何異决水於不流之澤哉然則論省官之䇿於今日者當清其所入之流不當汰其所置之職何者在內之官自宰執而下三省院宥官十有七玉牒聖政講筵所官十有五不必皆專其官也學士院三人諫垣六人臺職十一人不必備其貟也尚書六部自長二郎官當五十人今長二尚有闕者大理一寺自卿至主簿當二十四人祕書一省自監至正字當二十人今卿監尚有不除者其餘館閣學校倉場庫局人各有官官各有守皆所當設也在外之官漕司昔有使副今有使而無副矣憲司昔有文武今有文而無武矣州縣有添差今罷之矣逺郡有辟差今嚴之矣有守則有倅州之小者則無倅矣有令則有丞縣之小者則無丞矣無簿則兼之以尉矣其餘幕職州曹倉場庫務人各有官官各有守此所當備也雖曰外有一官之缺居者一人去者一人而伺之者又一人然居者一人而已雖有官而未祿也內有一官之缺延頸望遷者衆廟堂之所進擬者半之侍從臺諫之所論薦者半之人主之所欲親自召擢者又必有一二人焉然得之者止於一人而已是數人者雖有欲得之心而無可得之地也此今日有周人兼攝之意無漢唐虛設之弊何得以議其冗故不必汰其職也然入仕之源若特恩之多胥吏之衆資䕃之濫在今日不可不清也幕府奏辟謹簡乃僚書有明訓遙聞辟召傳為美談此蓋周以鄉舉取士而府史惟長所辟之制噫辟召之法尚矣漢制公府之掾佐郡邑之屬吏諸侯王國之內史以下皆得辟於其長故曹參為相國擇郡國吏召除為丞相史前曹參傳匡衡為丞相署陸賜集曹掾匡衡傳此相府所辟也何武以大司空辟鮑宣為西曹掾鮑宣傳史髙以大司馬辟匡衡為議曹史匡衡傳此大司空大司馬府所辟也屬吏之辟於郡縣則如周景以刺史而辟陳蕃為别駕後陳蕃傳王渙以考城令而辟仇香為主簿是也仇香傳內史以下之辟於諸侯王國則如趙王張敖以田叔為郎中田叔傳齊王襄以魏勃為將軍是也齊王襄傳是必素履先飭於家庭聞望藹聞於桑梓而後辟書交至幣禮爭馳下之從上必明去就之誼上之求下必盡尊禮之誠東都盛時此風愈髙有奉書一歲而後至者後任延傳吳有龍邱萇者隱居太末志不降辱掾吏自請召之延曰龍邱先生躬德履義召之不可遣功曹奉謁修書積一歲萇乃詣府門郡中賢大夫皆往觀焉有公府九辟而不就者後鍾皓傳皓前後九辟公府召為廷尉正博士林慮長皆不就時皓及荀淑並為士夫所歸慕有政事不問投劾而去者崔實傳太原閔仲叔者世稱節士雖周黨之潔清自以弗及建武中應司徒侯霸之辟既至霸不及政事徒勞苦而已仲叔恨曰以仲叔為不足問邪不當辟也辟而不問是失人也遂辭出投劾而去有諌爭不合投傳而往者陳蕃傳刺史周景辟别駕從事以諫諍不合投傳而去特設一榻敬為上賔徐稚盛陳厚禮如待神明諸賢髙標照映千古此漢人辟置一付公議未嘗有妄求茍進之心噫是特公府郡國所辟也若疆埸之事甚重兵戎之寄至難尤當聚天下之英材以共圖閫外之大計料敵制勝參畫貴詳呼吸應酬講求必熟其可以為私門桃李之地乎唐之節度方面行軍用師肇開幕府爭辟名流贊畫奏功歷歷可考子儀之置府朔方也主留則杜黃裳判官則張鎰所辟六十餘人後皆為將相顯官削平盜賊平復兩京寧非杜張諸賢之功歟杜黃裳傳郭子儀辟杜黃裳佐朔方府子儀入朝使主留事諸將驕蹇難制者黃裳皆以子儀令易置衆不敢亂十又張鎰傳子儀表鎰為判官又子儀傳子儀幕府六餘人後皆為將相顯官其取士得材類如此馬燧之出使三城也張建封為幕佐事多諏訪齊映為判官練達軍情大破靈曜威震北方豈非張齊二人之功歟張建封傳馬燧伐李靈曜時為三城鎮遏使雅知張建封表為判官軍中事多諏訪又齊映傳馬燧辟齊映為判官映練達軍情論奏稱意裴度之節度淮蔡也韓愈為參謀皇甫湜為判官元濟就縛蔡城悉平又非若人贊戎之謀歟韓愈傳度平淮蔡奏辟愈為參謀又皇甫湜傳度辟湜為判官不特此也李石所辟四鎮凡有征伐必為留後李石傳李石辟李聽幕府從歷四鎮有才略為吏精明聽每征伐必留石主後事太和中為司馬聽以兵北渡河令石入奏占對華敏假秀實凡佐三府募士益馬皆知威名本傳秀實佐嗣業荔并元禮白孝德三府益知名募士市馬以助軍光弼僚屬如李抱玊田神功韓遊瓌輩皆章章可稱列者李光弼傳光弼僚佐如李抱玉哥舒曜田神功韓遊瓌等皆章章可稱者建封幕賔如許孟容韓愈李藩皆人傑以風流談笑折衝張建封傳贊又李藩傳武元衡節度劒南而開府極一時之選武元衡傳史筆書之侈為盛事嗚呼唐之戎幕得人故也然帥府之所招致名公之所參佐彼此不聞有輕召屑就之意是故石洪間居東都重嗣懼不肯來敬具書幣邀辟是上之所召不輕也石洪傳溫造雖從建封招禮但與咨謀不敢縻以執事是下之所就不屑也溫造傳昌黎作序極談二公之髙致韓文送石洪處士序一去一就惟義之適宜乎隨所幕府藹然有聲歟本朝西事之興韓范二公出鎮陜府亦許自辟其屬韓之幕則皆尹洙之流尹師魯墓志元昊反陜西用兵大將葛懷敏奏起為經略判官師魯雖用懷敏辭而尤為經略使韓公所深知其後諸將敗於好水韓公降知秦州師魯亦從通判濠州久之韓公奏得通判秦州范之佐則皆狄青之儔韓公范公為帥狄青𨽻其麾下咸竒之曰此國器也文公嘗以左氏春秋授青西賊知懼送欵請和至有骨寒膽破之謡雖韓范之功亦尹洙狄青之助也南征智儂武襄總帥矣凡所辟置素有人望皆平日所與以為可用者於是成破賊之績智髙叛命孫沔招撫沔大受請託所與行者朱從道鄭續歐陽乾曜之徒皆險薄無賴於有所避免邀求沔引之自從逺近莫不嗟異狄公青所辟取者皆青之素所與以為可用者人望固已歸矣西鎮陜蜀張魏公出帥矣尤以總攬豪傑為務劉子羽善謀吳玠善戰趙開善理財一時名士皆集麾下於是成中興之業張魏公西行任陜蜀之計辟劉子羽參議軍事尤以搜攬豪傑為先務一時奮勇義氣之士皆集麾下吳玠為統制弟璘領帳前親兵趙開為轉運善理財治茶鹽酒法而民不加賦今之三邉正急材之秋也諸豪鷹附正勞鎮撫遺黎蟻慕方切安集運籌畫䇿非已見之所能制敵禦戎豈獨力之所任唐諸鎮召賢之禮本朝帥閫辟屬之書今日用之宜也然巧於營進者指謂捷徑志在速化者因生妄心扳援肺腑未免委曲之私勢要夤緣至歷經營之計剡削未足姑從寄徑考任既滿復生他圖未施贊畫之勞復以宛轉而去嗟夫邉陲地重非應酬之物軍國務劇豈致曲之階必也增重厥選謹擇其材庶無負朝廷責望之意若昔狄武襄有因貴近而從行也青則曰從能擊賊不敢不請往而不能則軍中法重青不敢私聞者遂沮初朝廷命狄青平廣南始受命有因貴近求從青行青曰從青之士能擊賊有功者往不能擊賊則軍事法重不敢私也聞者大駭范文正辟歐陽公於幕下也修則曰吾嘗論救范公豈為已利遂竟不往言行録歐陽修傳今之總戎佐幕均以二公為念則奏辟公矣仲連飛書燕將自殺陳琳草檄魏祖愈風必有若人者出矣白氏六帖流品漢科目未立流品無别似雜矣而任用未嘗不嚴也唐科目既詳流品已分似清矣而任用未嘗不混也漢制子弟能自修則以為舞人周禮大胥注漢大樂律曰除吏二千石至六百石及關內侯到五大夫子先取嫡子七尺以上年十二到年二十二顔色和順身體修理者以為舞人郡國好文學則以為博士弟子公孫宏建議為博士官置弟子五十人令郡國縣官有好文學敬長上肅政教順鄉里出入不悖二千石謹察可者當與計偕詣太常受業如弟子一歲皆輒課補掌故或以孝悌力田賢良方正髙后元年初置孝悌力田二千石者一人文帝置賢良科自朝錯始或以資算得官入粟拜爵如張釋之以資為騎郎卜式輸財封侯之類或以父兄保任公卿薦舉如汲黯以任為太子洗馬又田蚡薦人起家至二千石之類其他注曹縣吏趙廣漢尹翁歸皆以郡吏獄吏紹事幕府如蔡義任霍光幕府之類上書公車者皆足為進取之計東方朔嚴助皆上書待詔蓋是時不為科目故流品所以無别也然入仕之始亦自有品節存乎其間嚴助朱買臣疏廣以明經文學進則除博士大夫侍中嚴助傳郡舉賢良對䇿百餘人武帝嘉助權為中大夫朱買臣傳召見說春秋言楚辭甚說之拜為中大夫與嚴助俱侍中傳疏廣傳少好學明春秋召為博士太中大夫平當當明經為學士夏侯嬰公孫賀衛綰以材武勇猛進則除太僕中郎驂乘夏侯嬰傳以縣令史為髙祖使為太僕嘗奉車太公孫賀傳少以騎士從軍數有功武帝即位遷至僕文衛綰傳以戲車為郎事帝功次遷中郎將云云張湯以法律進身則先以法官處之故湯為內史丞相掾薦補侍御史復為廷尉皆法官也本傳先使書獄後為長安吏給事內史為寧城掾武安侯田蚡為丞相召湯為史薦補侍御史後為廷尉云云黃霸入粟補官則先以財賦處之故霸始以卒史領郡穀錢計簿正察補河東均輸長皆掌財也本傳武帝末以待詔入錢賞官補侍郎謁者坐同産有罪劾免後復入穀沈黎郡補左馮翊五百石卒右馮翊以霸入財為官不書右職使領郡錢穀計簿以亷稱察補河東均輸長此任用未嘗不嚴者也唐制由學館者曰生徒由州縣者曰鄉貢由天子自詔者曰制舉唐選舉志唐制取士之科其大要有三由學館者曰生徒由州縣者曰鄉貢皆升於有司而進退之禮歲舉之常選也其天子自詔曰制舉所以待非常之才焉他如子儀除左衛長史則自武舉異等進本傳李朝隱擢大理則自明法中第本傳裴耀卿遷祕書則自童子中選本傳蓋當時皆由科目故流品若清也然任用之際無所區别調馬賤工鳴玉於縉紳之間馬周傳士長通白明達本樂工韋槃提斛斯政本無他材獨解調馬今超受髙賞與外庭朝㑹鳴玉曵履臣切恥之伎藝雜術濫進於翰苑之所唐翰林院有碁工畫工皆待詔普思方士玷名祕監桓彥範傳云俄墨敇以方士鄭普思為祕書監葉靜能為國子祭酒彥範言不從朝恩蠶室濫職國子魚朝恩傳朝恩中人為國子祭酒王毛仲特牧𨽻耳至為開府本傳毛仲善牧馬後為開府儀同三司王叔文本棊工耳得入戶侍本傳叔文善棊待詔後得寵為戶部侍郎此任用未嘗不混也甚矣流品不可不嚴也國朝閹宦不預機務之職雜流不厠貂蟬之列世賞不任儒科之選其視漢唐何如哉漢能嚴於終不嚴於初唐能别於初不别於終此所以不及國朝逺矣是故衛得仁不與授上佐曰彼伶官也不可處士人資望也開寶八年教坊使衛得仁求領郡上曰伶人為刺史乃莊宗失政止授大樂令陳舜封不與授殿直曰彼倡優也不可任清望官也淳化五年大理評事陳舜封為殿直舜封父為伶官舜封舉進士及第佐望江主簿轉運使言其通法律宰相以補廷尉屬因奏事言辭捷給舉止類倡優上問誰之子舜封言其父上曰此其雜類豈可任清望官宰相不為國家澄汰流品之所致也遂改殿直唐之樂工曵履得無愧乎見上寧置宣政而不豫宣徽曰吾不寵內侍也昭宣使王繼恩平蜀賊有功議為宣徽使上曰宣徽執政之漸别立宣政使序位在昭宣使之上以授之寧置崇班侍禁而不豫供奉殿直曰吾不私近臣也淳化三年詔置內殿崇班在供奉之上左右侍禁在殿直之上以供奉殿直有四十年不遷者故特置崇班侍禁之目以授之漢之宦官典中書不亦恧乎漢宣帝置中令僕命宦官為之時恭顯任職劉明恕走吏也雖為望郎不與升階言行録云堂吏劉明恕宰相以其服勤歲久官為望郎引樞密使都承㫖例將異其禮王旦以政府表則之地不宜隳舊典且諸羣吏晨謁之際獨俾不升復援恩例改二品服公皆以為不可趙自化醫工也雖為醫長不與遙郡景德初雍王元份洎晉國公主並上言趙自化藥餌有功請領遙郡真宗以自化為尚食使居太醫之長不當復請令樞密裁之伎術無得佩魚别士類也天聖二年翰林待詔王元度纂勒真宗御書得紫服求佩魚上曰先朝伎術官無得佩魚所以别士類也後又乞正官出職曰伎術人若除正官則紊流品伎術官有止法别清流也嘉祐三年詔嘗為中書樞密諸司吏人及伎術官出職者無得任提刑及知州軍軍班出身至正任方得知邉要軍州噫此固雜流之别耳若進士第一人遷司諌三人及第并制科遷祠部進士出身遷屯田世賞遷虞部夫司諫祠部屯田虞部特今之一朝奉郎也而甄别若此何嚴耶官制舊典云舊制狀元初為將作監丞一任遷右司諫起居舍人兵部員外郎三人及第併制科一任同自太常博士遷祠部度支司封員外郎進士出身自太常博士由都官職方員外郎世賞自國子博士轉虞部駕部員外郎又左右司諫侍御史工部祠部主客屯田虞部水部員外郎後為朝奉郎六曹侍郎其遷不等侍從臣寮自禮部遷戶部戶部遷吏部常調臣寮自工部遷刑部刑部遷兵部夫六曹侍郎特今之一正議大夫也而甄别若此何嚴耶王隲言正議大夫舊六部侍郎是也官制未行以前侍從臣寮自禮部遷戶部戶部遷吏部常調臣寮自工部遷刑部刑部遷兵部三遷凡十二年今日通議大夫一遷即為正議大夫噫祖宗立法固嚴矣其亦大臣維持之功歟堂吏除貟郎赴慶節之㑹此細事耳而王公旦以為不可天禧元年詔金部員外郎提㸃中書制敕五房劉明恕自今遇大禮慶節許依樞院都承㫖例上夀仍赴宴㑹如更舊制注云祥符六年王旦言不可閹宦帶遙郡預殿上之宴此末節耳而何剡以為不可何剡上仁宗曰聞閣門進紫宸殿宴坐圖入內都知王守忠在任景宗下預坐閣門儀制惟正刺史遇宴㑹許列殿上今以守忠帶兩使留後便依正官例預宴自今凡帶遙郡皆合殿上預坐僣壞莫甚嗚呼一進退出處之末等級品節凛然難犯况於名器假人乎漢唐陋政視此有愧古今源流至論後集卷五
