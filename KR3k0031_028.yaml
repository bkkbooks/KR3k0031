body:
  text: 古今源流至論續集卷八宋林駉撰宦官上周以冢宰統閹寺漢初以丞相監宫中於是無近習之弊東漢用佞幸與政唐命中人典兵於是有內庭之變此本末源流之論君子不可不究也嗟夫為閹而稱士周禮閹人上士四人注閹稱士者異其賢為巷伯而疾惡巷伯詩勃貂管蘇有功於晉楚勃貂即寺人披也左傳曰吕郤畏逼將焚公宫弒晉文公披見公以難告遂殺吕郤新唐曰楚恭王告諸大夫管蘇範我以文逹我以禮景監繆賢著庸於秦趙商君入秦因秦孝公寵臣景監以求見又繆賢曰臣舍人䉮相如可使也著庸謂薦鞅及相如也兹皆有益於人之國君子必欲絶之去之而後已何耶蓋熏腐之徒無所愛惜退而視其室則無妻妾之情俯而顧其後則無子孫之親所以為妻妾子孫者聚則成一室散則行道之人耳侯元叔小臣論古之閹寺非若後世之熏腐童稚而養畜也蓋因刑餘之人而擇其可任者使之給役於宫寢之內其待之猶輿臺爾刑餘之人何所顧藉退而觀其室則無妻妾之情俯而顧其後則無子孫之親其所以為妻妾子孫者聚則成一家而散則皆行道之人爾如此而欲進德修業不亦難哉是以依勢怙寵竊柄弄權為勃貂管蘇者百不一二為竪刁伊戾者十已七八故君子患之左傳恆公卒易牙入與寺人刁殺羣吏而立公子無虧又客聘晉過宋太子請享之寺人伊戾請從之至刑牲加書偕坎之騁告公曰太子將為亂公使視之言有之太子死公聞無罪烹伊戾雖然在周漢盛時不聞有蠧政害事之漸而在漢唐末世往往有之者豈盡歸閹宦之罪哉亦不能善處閹寺者之失也考之成周閹人守中門之禁天官閹人掌守王宫中門之禁寺人掌女宫之戒寺人掌女宫之戒令內小臣四人王之正內五人天官內小臣閹人上士四人寺人主之正內五人一以冢宰領之夫以論道經邦之臣而下統微賤卑褻之職似非大臣之體爾然周人格心之學大抵源流於此何者便僻側媚之習易以移君德讒譖諛佞之言易以惑君聽自非統於大臣鮮有不至恣肆使人主以外庭之屬不得以私意眤內臣以冢宰之尊不敢以非道干此其預防之意豈不深矣哉漢初猶有古意以宰相得監宫中如郎中令禁闕之內皆其所屬王陵傳吕后以審食其為左右丞相監宫中如郎中令至文帝時宦官猶知宰相為可畏鄧通之幸其寵已極小有怠慢丞相嘉檄召詣府折辱垂死而不敢言申屠嘉傳鄧通方愛幸嘉入朝而通居上旁怠慢罷朝坐府中嘉為檄召通詣相府責曰小臣慢殿上不敬當斬上使使持節召通謝丞相自武帝踈逺朝士宰相不得加官內朝若有間矣然以少府統中書表少府屬官中書令謁者中黃門宰相統少府其脈絡猶得相屬况以司馬遷儒者為中書令司馬遷以腐刑為中書令亦不無正救之益既而石顯用事康衡甄談猶得條奏言其舊惡康衡傳元帝時中書令石顯用事自前相韋賢及衡皆畏顯不敢失其意至成帝即位衡乃與御史大夫甄談共奏顯舊惡則宰相雖無曩日之權而宰制之意猶在也此周漢盛時所以無近習之弊者寧非大臣統治之功歟自東都至唐寵任宦者其禍始慘然宦官寵任雖同而所以任之亦異東都以宦官専領其事光武以宫中私用守之外有司章和後别立監領於閹人是政權歸之矣唐以宦官専典禁衛是兵權歸之矣政權歸之則賢否混淆而其亂在朝廷兵權歸之則變生肘腋而其亂在宫禁夫政權必有所假其寵固然後其權専向使人主一旦省悟則反亂為治亦易之耳若夫兵權在其掌握能使人主覺悟欲謀去而不可得蓋至於長吁飲恨而後已文宗井露之變此典兵尤慘於與政也然要之以無所愛惜之人而得以與政典兵以為心腹之患皆非國家之福爾且西漢之制侍郎皆用明經如楊雄位執戟新安日掌御唾盂之類常侍參用士人表少府中常侍注參用士人人主朝夕宴逰之頃不但刑腐之流而已誠美意也夫何章和以後議郎不在宿直之中後百官志郎官皆主吏直執戟宿衛諸殿郎惟議郎不在直中郎省皆為黃門之廬通典明帝以後和熹太后稱制乃以閹人為常侍小黃門通命兩宫自此悉用閹人不調他士别自立監専以閹人領之自是閹人不領於外朝耳見上注夫惟外無所統內無所制手握王爵口含天憲非復閨牖房闥之任東漢宦官傳序竇后以女主臨朝而萬機殷庶且逺朝臣不得不委用刑人寄之國命手握王爵口含天憲非復閨牖房闥之任也曹節王甫無所顧忌陳蕃謂竇武曰中常侍曹節王甫自先帝時操弄國柄濁亂海內武乃白太后曰故事黃門常侍但當給事省中今乃使與政事而任權重子孫布列肆為貪暴宜誅以清朝廷後事寢宋瑀劫太后奪璽書令中謁者守南宫門使鄭侃特節及御史謁者捕收武等武不受詔殺使者王甫將千餘人與武對陳後武軍歸甫兵降悉收武親姻誅之竇武傳竇武陳蕃誅伐之謀一泄自殞其身何進袁紹不勝其忿舉義兵以除之漢於是危矣何進傳袁紹與進素有志誅宦官後張讓等率常侍成圭畢嵐數十人持兵斬進于嘉德殿前紹乃引兵屯朱雀闕下捕得趙忠等斬之進素有仁恩士卒皆流涕願致死吳康遂引兵與董卓殺弟苗棄其尸於苑中紹遂閍北宫勒兵捕宦者無少長皆殺之苖何進弟也唐初之制內侍省不至三品官黃衣廪食守門傳命而已誠良法也唐宦官傳序太宗詔內侍省不置三品官以內侍為之長階卑而不任以事惟周廬守禦庭內掃除廩食而已夫何肅代以後或命魚朝恩管神䇿兵祿山反伯玉與朝恩赴難至永泰元年吐蕃復入冦朝恩又以神䇿屯苑中自是復盛或使承璀為招討使白居易傳會王承宗叛帝詔吐突承璀率師出討居易諫曰唐家制度每征伐専委將帥比年始以中人為都監韓全義討淮賈良國監之髙崇文討蜀劉正亮監之且興天下兵未有以中人専統領者神䇿既不置行營節度即承璀為制將又統諸軍招討處置使是實都統恐四方聞之必輕朝廷帝不聽韓全義討淮賈良國監其軍髙崇文討蜀劉正亮監其軍見上注西頭之勢過於南衙樞密之權甚於宰相髙元裕傳敬宗決事禁中宦官恣放大臣不得進見元裕諫曰今西頭勢乃重南衙樞密之權過宰相帝悟而不能制人皆危之蕭復嘗為德宗言之而不見聽本傳復言艱難以來始用宦者監軍權望太重是曹止可委宫掖事兵要政機毋使參決帝不聽柳伉因疏程元振及之而不能用程元振傳柳伉上疏曰天下乃恨陛下逺賢良任宦寺必欲存宗社計斬元振首馳告天下悉出內史𨽻諸州持神䇿兵付大臣疏聞帝顧公議不與下詔盡削元振官爵髙元裕言其勢重南衙白居易言不當位大帥見上注然天子雖知之而不能制之亦徒為是喋喋之論其禍豈不慘於東都歟王叔文等欲奪其權終不可得兵志順宗王叔文用事欲取神䇿兵柄以奪宦者權而不克始藉朱全忠以族之朱全忠起兵殺神䇿兵唐於是不嗣矣推原其故東漢三公擁虛位以在上無復向時總領九卿之職唐以北衙尤重南衙無復周人以尊統卑之意所以稔成厲階爾此漢唐末世而有內庭之變者寧非典兵預政之失歟宦官下國朝懲五季閹宦橫肆之弊不典兵不預政見下注子孫守之永為家法舊制內臣將命于外不預公事此不使之預政也長編祥符六年詔內臣將命于外干預州縣公事及所在官吏不即以聞並置于罪凡內臣出使責知委狀敢妄奏他事者當伏軍令祖宗舊制也舊制宦官専任本職不得典衛此不使之典兵也蔡官制舊典皇朝懲唐五代宦官橫驕之弊不使典衛總兵干預政事但専任本職而已噫何嚴耶是故史崇真言縣令貪亷可信也乃命監司以審察景德四年內侍史崇真使嘉州還言平􅀢知縣王昭度亷幹犍為知縣王固貪濁真宗曰內臣將命乃察善惡固亦可奬然須轉運審察楊繼凝奏苑卒自溺可從也乃付外司以鞫劾侯元臣小臣論嘗聞史崇真自嘉州還言二縣貪亷不同乃命監司審察楊繼凝奏苑卒自溺付外鞫劾此不輕信也彼安得而與政乎黃德和之為監軍少牽西帥用吕文靖之謀而永罷監軍洓水記聞景祐中西鄙用兵大將劉平死之議者以朝廷委宦者監軍主帥節制有不得専者詔誅監軍黃德和或請罷帥監軍仁宗以問宰相吕文靖公公曰不必罷但擇謹厚者為之仁宗委公擇之對曰臣待罪宰相不當與中貴私交何由知其賢否詔都知押班保舉有不稱職者與同罪仁宗從之翌日都知叩頭乞罷監軍宦官士大夫嘉公之有謀王守忠之為鈐轄恐循唐弊從富公之言而永罷鈐轄王守忠為陜西都鈐轄富公弼言用守忠鈐轄乃與唐中官監軍無異且黃德和覆車之轍可復蹈乎詔罷守忠鈐轄彼安得而典兵乎不特此也張守忠本近侍爾以役夫斃於木下而抵極法王繼恩有大功爾以交結中外而謫筠州是又不輕免其罪也侯賢良論張守忠以役夫斃於木下而抵極法王繼恩以交結中外謫筠州又真宗大中祥符中杖殺入內髙品張守恩守恩雖近侍上不貸以法論者以謂朝廷至治行罰不私又繼恩有平蜀大功內侍押班雖曰遷官然年未滿五十者不許之長編祖宗舊制內臣年未五十不得為內侍省押班長編內侍磨勘雖曰當得然仕未三十年者不與之長編初沙苑缺馬內侍李繼和領職不數月得馬十數梁適薦之詔減磨勘三年舊制內侍入仕三十年始得磨勘是又不輕進其官也蓋罪不輕免則彼無縱肆之念官不輕進則彼無驕佚之心不肆不縱不驕不佚此所以不敢萌與政典兵之職矣噫亦有由也周以冢宰統閹寺而侍御皆正人漢初以丞相監宫中而宦孺無非習國家所以統屬宦官者蓋樞府任其權夫尊以臨卑則卑有所攝外以屬內則內無所隱此防微杜漸之深旨我祖宗其得之觀傅堯俞奏樞密不治內侍求內降之罪則宦官有過樞密得治之矣內侍朱晦朱穎士以內降監汶口傅堯俞言樞密院不治頴士求內降罪後既罷穎士公又屢請治樞院罪以戒欺罔章數上每上益切權幸憚焉觀髙若訥為樞使不除內侍留後之官則宦官進職樞密得専之矣至和元年王守忠罷延福宫使為武信留後使毌得援例故事未冇真為留後者守忠蓋東官舊恩數求之上亦欲與之先是髙若訥為樞密使持不可故止及是守忠病復求節度使宰相梁適曰宦官無除真刺史况真節度乎上曰朕蓋嘗許守忠矣適曰臣今日備位宰相明日除一內臣為節度使臣雖死有餘責御史中丞孫抃亦諫乃罷不除夫有過則治有勞則遷或賞或罰一聽大臣宜乎謹願抑畏而不敢肆也噫樞密固職分之當爾有如都知之罪韓公竄之邵氏聞見録英宗即位有疾光獻皇后垂簾同聽政有入內都知王守忠者姦邪反復間諜兩宫司馬溫公知諫院吕諫議為侍御史凡十數章請誅之韓魏公一日出空頭敕一道參政歐陽公已簽書矣參政趙公槩難之問歐公曰何如歐公曰第書之韓公必自冇説魏公坐政事堂以頭子勾守忠著立庭下數之曰汝罪當死責蘄州團練副使蘄州安置取空頭敕填之差使臣即日押行其意以為少緩則中變矣節度之求梁適沮之見上注是宰相復得治也兼判二省韓絳力言長編仁宗皇祐五年王守忠為入內內侍省都知諫官韓絳言宦寺兼判二省國朝所未有也御史俞希孟乞自今更不除前後省都都知奏可妄圖押班吕誨極辨長編嘉祐六年皇城使果州團練使張茂則為內侍省押班司馬光吕誨言祖宗舊制年未五十不得為內侍省押班茂則年方四十八恐茂則一開此例內臣攀例者多是臺諫復得言也全彬誥詞劉敞不撰至和元年石全彬為入內副都知知制誥劉敞封還詞頭奏全彬三月不得換職從之後三月全彬卒為入內副都知惟簡誥詞蘇轍封還元祐元年詔內侍押班梁惟簡有勤績今可特與帶遙郡刺史中書舍人蘇轍封還言惟簡旬月之間三加超擢所有誥詞臣未敢撰是給舍復得駁也嗟夫以區區薰腐之流既受察於樞密復受察於丞相又復受察於臺諫給舍祖宗深思曲慮之意周矣夫何元豐大臣不遵典章河東總兵非無帥也而乃使王中正領之熙河用事非無人也乃使李憲専之大而將帥皆聽節制次而官吏悉由廢置募兵用師敕於其口威福柄令出於其手而祖宗不許預政典兵之法安在哉范祖禹論熙寧元豐間內臣之中李憲王中正宋周臣三人者最為魁傑憲總兵熙河兼領三路中正總兵河東兼領四路其權勢震動內外口敕募兵州郡不敢違此三人者雖加誅戮未足以謝萬姓唯憲已死中正周臣猶存又除押班乞追罷餘見下注鄧潤甫周尹言之蔡承禧彭汝礪又言之通略熙寧九年上遣內使李憲措置邉事諸將聽憲節制卒丑中丞鄧潤甫御史周尹蔡承禧彭汝礪言自詩書以降上下數千載不聞以中人為帥者司馬公劉莘老又極言之司馬公言近聞王中正往陜西黜陟守鈐中正弄權已有其驗劉摯上哲宗曰李憲於熙河貪功生事威福柄令持於其手廢置用舍出于其口至使押班李舜舉亦曰四郊多壘此卿大夫之辱不宜內臣掌將帥之任長編元豐五年李憲奏駐兵討賊朝廷悉力應副近李舜舉奏財糧未備人夫難行朝廷以舜舉所言忠實遂聽信舜舉退謂執政王圭迎勞之曰朝廷以邉事屬押班及李憲可忘西顧之憂矣舜舉曰四郊多壘此卿大夫之辱也相公當國而以邉事屬二內臣可乎內臣止宜供後庭灑掃之職豈可當將帥之任耶聞者代圭發慙長編噫舜舉本閹人也時亦任邉事也且能責王圭以內臣不當任將帥之事圭也不自知愧迎勞問之至使聞者為之發慙豈不有忝厥職乎鳴呼以堂堂揆度之任反不若一閹人之謀又焉用彼相哉異時童貫握兵權於外以典兵為常梁師成擅文柄於內以預政為例陶鑄將相垂二十年君子推其末流之禍固蔡京王黼為之之罪亦元豐大臣作俑之失也楊時上欽宗云自古閹人用事未有無禍者比年以來此曹尤盛皆由蔡京王黼首為亂階童貫握兵權於外梁師成擅文柄於內陶鑄將相垂二十年原其禍根皆蔡京王黼為之也中興以來盡掃宿弊率由舊章內侍之官不許兼職恐失於檢察也聖政録髙宗建炎罷內寺官一員兼鈐轄教坊且曰朕近録內侍官更代失於檢察仍帶前領兼官更不差置都知之親非時不見恐眤於近習也會要上因論大金內侍有用事者曰朕今在宫中都知押班御藥院素號最親密者非時未嘗見亦未嘗不正秦檜等曰有以仰鑒聖見髙逺不眤於近習防微杜漸如此此社稷之福生靈之幸祖宗成憲愚幸於中興以來見之祿秩上漢官秩漢表祿秩之數與諸家之所載大抵異同今參考之三代而上官至周而備三代而下秩至漢而詳然漢表祿秩之數與諸家所載大抵異同今參訂之緯而為圖萬石東萊曰按史記燕王噲遜國於子之噲收印自三百石以上而效之以石計祿始見於此太師太傅丞相太尉孝武定令驃騎將軍祿秩與大將軍同御史大夫前後左右將軍考異按漢制三公號稱萬石今考賈誼新書曰漢丞相之尊亡秩又考茂陵中書曰御史大夫秩中二千石未知孰是中二千石太常光祿勳衛尉太僕廷尉大鴻臚宗正大司農少府執金吾已上並表京兆尹左馮翊右扶風已上如淳注漢表謂二千石誤漢官録曰王尊為京兆尹御史大夫奏尊不宜備位九卿如淳曰三輔皆中二千石號為卿然孟堅表自太子太傅至右扶風總云皆二千石則三輔非中二千石如淳之言何所據歟及考後漢志乃曰京兆尹左馮翊右扶風三人漢初都長安皆秩中二千石謂之三輔中興都洛陽以河南為尹以三輔陵廟所在不改其號但減其秩按通典又稱減秩與太守同然則如淳不為無據而孟堅之論蓋習見東都以後事故云耳非西都之制也真二千石表不載此秩詹事茂陵中書秩真二千石荀恱漢紀秩比二千石諸侯王相初真二千石後吳楚反減為二千石係汲黯傳如淳注徐氏曰按外戚傳傛華秩視真二千石在中二千石之下二千石之上師古曰真二千石月得百五十斛一嵗凡得千八百石又按如淳注汲黯傳亦曰諸侯相秩真二千石月得百五十斛臣瓉注詹事引茂陵書秩真二千石而百官表乃亡此秩至東京則有此秩通典以為真二千石即郡二千石皆所未諭也丞相司直護軍都尉光祿大夫亡印綬增秩者為中二千石五官中郎將左右中郎將虎賁中郎將監羽林中郎將西域都護奉車都尉駙馬都尉騎都尉郡都尉以上並表關都尉農都尉護羌校尉以上漢官儀諸侯內史護烏桓校尉後烏桓傳侍中後漢比二千石漢官秩云千石屬國都尉千石丞相長史大司馬長史御史丞長史將軍長史九卿丞六典注又曰衛尉丞比千石中尉丞本表云自太常至執金吾皆千石漢官秩云中尉丞六百石當考按後志本注又曰執金吾七千石萬户縣令侯國相以上並表太子衛率長漢儀注太子率更長後志令千石內者令丁孚漢官中書謁者令漢舊儀比千石太中大夫郎中車户騎三將謁者僕射期門僕射以上並表九百石荀恱漢紀充依良人秩視九百石謹按史漢並亡此秩八百石成帝陽朔二年除吏八百石秩李竒曰除八百就六百太子家令茂陵中書太史令元鳯中太史令夀王非太初厯有司劾壽王史八百石古之大夫云考異議論見六百石條比八百石諫大夫貢禹傳諫大夫比八百石表比八百石顔注俸月九千二百六百石將作少府監詹事丞水衡都尉丞廷尉左右平三輔丞三輔都尉郡長史州刺史郡太守丞郡都尉丞萬户縣令侯國相以上並表太子門大夫朔方刺史太子庶子以上表注公車司馬令漢官儀大廄令後志本注舊有大廄皆六百石未央令家馬令車府令路軡令騎馬令式道左右中候後志注廪犧令漢舊儀秩六百石外史閭師以上孝平紀黃門侍郎六典御史大夫史公主家令武騎常侍司馬相如傳顔注曰秩六百石太史令漢儀注六百石考異漢儀注曰太史令屬太常秩六百石司馬遷云僕嘗厠下大夫之列臣瓉因謂太史令千石故比下大夫至元鳯中太史令張壽王非太初厯有司劾壽王吏八百石古之大夫作妖言亂制度三者之説皆不同以事理考之當以六百石為正何者九卿之屬凡以令稱者皆六百石太史不應獨異就使其秩加於諸令漢表豈應軼而不録又宣帝黃龍詔曰吏六百石位大夫有罪先請秩祿上通何武翟方進曰刺史位下大夫刺史亦六百石耳以此推之太史所以稱下大夫者豈非以六百石之故歟奚必千石八百石而後可稱也補志亦云太史令一人六百石如此則知漢儀之言不妄耳太常掌故朝錯以文學為太常掌故應邵曰掌故六百石史本傳考異漢書注引應劭之言以為六百石唐張守節史記正義引應劭之言乃云百石二説不同按朝錯以掌故遷太子舍人太子舍人才二百石豈有自六百石而為二百石猶謂之遷乎當以正義百石為正漢書六字蓋衍文也下大夫考異朱博曰刺史位下大夫謹按刺史秩六百石而以比下大夫者六百石尊爵也叔孫通朝儀吏六百石以上入賀邴曼容仕不肯過六百石宣帝詔曰吏六百石秩祿上通則比周之下大夫不為過矣又按孝惠詔曰爵五大夫吏六百石則又以比五大夫者蓋爵自公士至五大夫凡九級吏自百石至六百石亦九等爵秩尊卑適相等也王莽倣周制建官乃以千石為下大夫六百石為元士不相協矣比六百石博士議郎五官中郎左右中郎謁者戊巳校尉以上表太子洗馬長注丞相召事漢儀注五百石成帝陽朔二年除吏五百石秩李竒曰除五百就四百縣長侯國相成帝綏和元年長相皆墨綬哀帝建平二年復黃綬四百石丞相史太尉史大將軍史丞相少史太子中允以上漢儀注符節令漢官縣丞縣尉以上表長安左右部尉六典比四百石五官侍郎左右侍郎以上表丞相東曹掾西曹掾漢官儀注云或曰後為百石三百石縣長侯國相表比三百石五官郎左右郎中以上表丞相掾舊漢儀志中黃門後志比百石注曰後增比二千石二百石廷尉史太子舍人以上漢官左右馮翊卒史黃霸傳縣丞縣尉以上表比二百石丞相屬漢舊儀注百石丞相屬丞相令史以上漢舊儀注御史屬匡衡傳左右內史卒史郡國王經卒史廣行卒史以上儒林傳部從事治事别駕以上漢官儀廷尉文學卒史兒寬傳長安遊徼長安獄吏以上趙廣漢傳太常掌故見六百石條注計食佐史及諸府屬祿秩下論古人制祿之意有三優外官一也優小吏二也優故老三也夫外官加優則勉於治民而無侵漁之患小吏加優則亷於處已而無喪節之恥故老加優則來者知勸而勉於事功矣古制內諸侯則畀之以祿而不以世嗣外諸侯則得以世嗣而不止於世祿其為優外秩可知也王制天子之縣內諸侯祿外諸侯嗣也又孔穎逹正議云云方五百里者其半入於天子則方百里者亦如之今其所食者極於七十里是入於天子者將四之一而已其為優小吏可知也同上自卿已下必有圭田五十畝而使𨽻農治之則特免其征稅之入是又優老重賢之恩也孟子噫古人之意何其仁之至義之盡耶是意也漢人蓋得之矣夫上自三公下至百石吏載見於百官表之注者固莫不有差等萬石中二千石月俸百八十斛二千石百一十斛比二千石百斛千石八十斛六百石七十斛四百石五十斛比四百石四十五斛三百石四十斛比三百石三十七斛二百石三十斛比二百石二十七斛百石十六斛自四百石至二百石為長吏百石以下有計食佐史之秩是為小吏師古注及通典云按漢表不載真二千石師古注又真二千石月得一百五十斛一嵗凡得千八百石又按如淳注汲黯傳亦云諸侯相秩真二千石月得百五十斛臣瓉注詹事引茂陵書秩真二千石而百官表不載此秩所未諭也至東京百官志則有此秩爾其分秩之名有四如二千石之秩有中二千石有真二千石有二千石有比二千石曰比者嵗得千二百石曰真者嵗得千八百石曰中者嵗得二千一百六十石至其直謂之二千石者嵗得千四百石而已凡言中滿也比言不及數也其餘則不滿二千石並漢官表顔師古注中言滿也比言不及數也夫漢人所以為是四等之别者蓋漢三輔事浩繁皆秩中二千石選用二千石髙第入守滿嵗稱職乃得為真者所以勉之也按王成為膠東相秩真二千石後以流民多自古增秩為中二千石其他趙廣漢尹翁歸皆然此曰中者比四者之名然爾其制秩之權有三或升秩以答一時之勳勞或加秩以示一時之恩意或貶秩以責後日之功效蘇武為典屬國能守出使之節乘馬延為將作大匠能董土木之役皆升中二千石按前表載典屬國本二千石後志載將作大匠亦本二千石武帝時乘馬延又秩中二千石以帝多興土木故增之宣帝時蘇武留胸奴十九年亦升中二千石蓋升秩之例霍光增符璽郎秩二等霍光就符璽郎取璽郎不肯光遂加秩二等元帝加司𨽻諸葛豐秩光祿大夫本傳蓋加秩之例黃霸為京兆尹遂貶秩還潁川太守官以八百石居京兆尹趙廣漢賊殺不辜會赦貶秩一等蓋貶秩之例並本傳此或升或貶之權然爾噫孰知漢人制祿又有得古人之遺歟漢制侯相真二千石郡守二千石汲黯傳如淳注諸侯相秩真二千石漢官表郡守二千石太中大夫中大夫諫大夫博士特千石八百石比六百石而已官表太中大夫比千石貢禹傳諫大夫秩八百石官表又云比八百石漢表博士比六百石然公孫𢎞董仲舒本博士秩爾至遷左內史則為中二千石補江都相則為真二千石公孫𢎞以博士為左內史董仲舒以博士為江都相並本傳嚴助主父偃本中大夫秩爾至出守會稽則為二千石補齊相則為真二千石嚴助為中大夫守會稽主父偃為中大夫補齊相本傳蓋漢人以內秩之卑而當外秩之崇所以使之樂於治郡而無輕外之心此優外秩何如也漢以中二千石而至於百石所以祿守令者如此然號二千石者月得俸百二十斛計之一年止於千餘號百石者月俸十六斛計之一年幾於二百內而鄉令丞亦如之足見大吏之數虧而小吏之數優見上故部刺史秩六百石而縣令至秩千石中郎侍郎不過三百四百石而五官三將車户騎乃秩比二千石或比千石者皆漢人以養小吏亷潔之操表刺史六百石萬户縣令千石五官侍郎左右侍郎比四百石五官郎中左右郎中比三百石五官中郎將左右中郎將虎賁中郎將監羽林中郎將比二千石郎中車户騎三將皆比千石不然宣帝之益吏俸何以自百石以下光武又何以六百石而下乃增於西京舊制乎此優小吏何如也宣紀益天下吏百石以下俸十五後光武紀建武二十六年增百官俸其百石以上減於西京舊制六百石以下增於舊制至於公卿辭祿歸老於家往往亦賜之祿者有如石奮自諸侯相以下大夫祿歸老周仁自郎中令以二千石祿歸老張歐自御史大夫以上大夫祿歸老貢禹為諫大夫秩止八百石以光祿大夫養病乃享二千石之厚秩並本傳亦見致任條夫歸老于家至過其祿以與之其為優老重賢之意又何如也唐之制祿奈何其不然乎太宗減冗汰煩約為中制官之省至七百三十史臣以為不濫而易祿若可取爾百官志今以制觀之其有愧於古多矣漢之縣令千石而唐一品乃七百石漢𥘉刺史六百石而唐從一品亦六百石唐二品者五百石而漢之博士乃比六百石唐從二品者四百六十石而漢之縣長乃五百石通典京官正一品七百石從一品六百石正二品五百石從二品四百二十石正三品四百石從三品三百六十石正四品三百石從四品二百六十石正五品二百石從五品一百六十石正六品一百石從六品九十石正七品八十石從七品七十石正八品六十七石從八品六十二石正九品五十七石從九品五十二石漢志見上然則以此為唐人之失歟曰非也此固失爾而猶未甚也職分之田尋遷貧户稅𤱔給粟其制隨紊公𪠘之田寺監關鎮各有頃數其費太冗唐自王公以下各有職田貞觀十一年以職田侵漁百姓詔給還貧户視職田多少每𤱔給粟二斗謂之地豫又凡京諸司各有公𪠘田內而自司農寺二十六頃至率更府各二頃亦各有差外而自大都督府四十頃至中戍下戍各有差云云各前人自耕未種後人酬其功直已自種者準租分發公𪠘之錢任居市肆恣其回易其法甚悖禇遂良上疏近許諸司命史捉公𪠘本錢諸司取此色人號為投錢令史不簡性識但令身能慣販即依輔擬大率入捉五十貫以下四十貫以上任居市肆恣其販易每月納利四千一年凡輸五萬云云然則以此為唐人之失歟曰非也此固失爾而亦未至甚也國子博士啼飢託諷進學解國子先生晨入太學云云冬暖而兒號寒年登而妻啼飢廣文先生無氈賦詩杜甫嘗贈鄭虔詩曰才名四十年坐客寒無氈唐之待小吏太薄非漢人之制矣州郡刺史月俸千緡藩鎮帥臣動加十倍唐自中興以後方鎮益恣州刺史月俸千緡而大鎮十倍京官祿甚薄唐之待外太重又非漢人所以待外之意矣雖致仕半祿見於建中職官分紀建中三年敕致仕官所請半俸及賜物歸老半料見於貞元唐德宗正元五年蕭昕以工部尚書致仕仍給半料初致仕官只給半祿無料上加之以待老臣然間見於元老舊臣又非若漢人之有常制此所以有愧於漢也國家制祿之法周漢同意前代俸給未有實數也雍熙則給之雍熙四年詔俸給之數宜從優厚應百官俸錢給他物以八分為十者自今給其實數前代俸給未有實錢也祥符則給之祥符五年詔加文武職官月俸初後唐以軍儲不充百官月俸折支非實請減半數而支實數後所去半實俸復虛折三年復給實錢皇朝之制有一分實錢三分折支景德之後俸始全給前代俸給未有職田也至咸平則給之真宗咸平二年給內外京官職田不惟此爾省冗員之費而益職官之俸則開寶制也開寶三年詔吏員冗多而求其治者難也俸祿鮮薄而責以亷者無謂也與具冗員而重費不若省官而益俸諸道宜差減其員舊俸外增給五十省宫掖之費而優官吏之祿則寶元制也寶元元年詔比省浮費自乘輿服御及宫掖所須務從儉約若吏兵俸賜母得裁減時欲捐吏兵俸帝曰祿廪有定制無變更云云抑不惟此爾曰外秩曰小吏曰故老此三者尤祖宗之所加意其為士大夫慮至矣自今觀之外官供給按月而支紹興二年上語及戢贓吏不可不禁然州縣官合得請給宜按月支與使之食足然後可以養亷上曰然外官職田隨地而均慶厯二年詔兩府同議外官職田有不均者均之有不給者給之何優也蓋厯嵗彌月於訟牒之勞負星戴月於巡警之役坐受餽遺不若中都之官非時賜豫不若近侍之臣祖宗所以優之者此也噫出鎮太原念其領外尚加總管以增給况小郡蕞邑乎真宗遣溫仲舒鎮太原仲舒曰藩方重鎮非敢有辭晚有兒息年皆幼稚若得改官端揆許携家而往賜都總管添給敢不承命選人之職增以祿米熙寧四年中書言選人俸薄不足以勵亷今欲月增俸米麥從之巡尉之官給以全俸寶訓仁宗慶厯中詔巡檢縣尉捕盜巡警其職至勞以全俸給之何厚也蓋間居俟闕於數年之久扶老携幼於千里之宦朝虀暮鹽之願未償仰事俯育之計曰迫祖宗所以厚之者此也噫職為制誥憫其居貧猶特賜錢以償逋况小吏薄秩乎李文靖公沆知制誥太宗知其負人息錢曰沆為制詰俸入幾何家貧不給豈暇償逋耶特賜錢一百三十萬淳化致仕俸半本官職源淳化中致仕官給半俸以示敬賢隆老之意景祐致仕俸同分司景祐三年詔致仕官舊皆給半俸而仕未顯有或貧不能自給非所以優髙年養亷恥詔自今兩省大臣監司以上致仕給俸如分司官又何其賞之醲也蓋脫簮公府有不忘畎畝之懷歸伏私第而尚馳魏闕之念此養老優賢之念所以不能自己噫挂冠鄉閭猶赴公宴况區區俸給乎政和中孫鄰言諸州致仕官居鄉者乞降令赴貢士宴擇其年彌髙者而敬事之使長幼有序獻酬有禮人知里選之法孝弟之義從之此愚三咏三嘆祖宗之盛典也雖然俸祿鮮薄責亷無謂此開寶天子之語是語也天子言之可也見上衣食不足安肯理事此元祐大臣之語是語也大臣言之亦可也高宗讀寶訓至司馬光為相每詢士大夫私計足否人怪而問光光曰倘衣食不足安肯為朝廷理事服聖訓曰今之俸祿不按月支非養亷隅為士夫而介之於此得無不可乎出任之初不念溫飽王公曽未嘗以祿秩為意王公曽初為狀元或曰狀元一生喫著不盡曽曰曽平生不在溫飽梓州之俸推濟窮民扈稱未嘗以外請為念扈稱為梓州運使嵗飢出祿米以賑民歸第之日納還俸劵富鄭公亦未嘗容心於祠祿富弼辭疾歸第以其俸劵還府天下夫豈無若人哉風雨如晦雞鳴不已此蓋豪傑之士有非區區爵祿所能易其節耳愚故曰養亷之禮在朝廷不可不厚自養之學在士大夫不可不勉兼官禹為司空兼宅百揆羲和四人兼任四時然則兼官行事其唐虞之制歟書夫兼而行之則有餘專而行之則不足以有限之官難以處無窮之事此官不必備亦惟其人官事不攝未為知禮也成周設官實法唐虞成王之時周公以三公兼冢宰召公以三公兼宗伯蘇公以三公兼司寇畢公毛公以三公兼司馬司空至成王季年芮伯彤伯衛侯實専領司徒宗伯司馬之職其餘大抵皆兼官也書蔡仲之命周公位冢宰正百官餘並見立政周官顧命通典注按顧命太保領冢宰畢公領司馬毛公領司空别有芮伯為司徒彤伯為宗伯衛侯為司寇則同時三公各兼一卿之職此引安國注穎逹疏云也詳見顧命注夫百官之中六卿為重而皆得兼之况於羣有司乎嘗以周禮考之二鄉則公一人是六卿兼鄉大夫也同上卿大夫每鄉卿一人不惟此也太史下大夫爾蘇公以三公兼之太史司冦蘇公是也周禮太史下大夫二人立政太史司寇蘇公司盟命士爾太公亦以三公兼之載在盟府太師職之是也左傳僖二十六年抑不惟此也軍司馬輿司馬行司馬戎僕戎右有軍旅則用之並夏官甸祝田僕有田獵則用之春官甸祝掌四時之田夏官田僕掌御田輅有喪紀則用夏采喪紀天官夏采掌大喪之冕服復于太祖春官喪祝掌大喪勸防之事有盟祝則用詛祝春官詛祝掌盟記是皆有事則兼無事則闕矣故夫六官之中以春夏秋冬率以多少相乘除大約一官凡五百人則六官凡三千人而兼攝者意其必相半焉雖然官雖兼領而人未有不稱職雖並行而事未有不當三公為卿道揆法守皆舉也見上六卿出將軍政民事皆通也司馬凡制軍軍將皆命卿古人設官豈不簡而盡歟漢唐以來官非不攝也然闕者未必當兼兼者未必皆當所以有歉於唐虞成周之治漢制以本官而任它職者固謂之兼以髙官而攝卑職者又謂之領王尊轉守槐里兼行美陽之令本傳王尊為虢令轉守槐里兼行美陽令事常惠以右將軍兼典屬國本傳此兼職也桑𢎞羊以治粟內史領大司農漢百官表下劉向以光祿大夫領校書劉向傳以光祿大夫領校祕書天祿閣子劉歆亦領校書此領職也夫兼縣令兼屬國領司農領校書亦常制爾有如車騎將軍張安世度遼將軍范明友而兼光祿勳後將軍趙充國右將軍王莽而兼衛尉或以左將軍兼太僕上官桀以上並漢表下或以後將軍兼少府趙充國為後軍兼衛尉水衡少府見本傳且將軍中朝也光祿勳衛尉太僕少府外朝也孟康曰大司馬左右前後將軍侍中常侍散騎諸吏為中朝丞相以下至八百石為外朝舉外朝之職悉并於中朝至使公卿亡所職掌而事權皆屬於諸將軍之手此皆武宣以後踈逺外庭而隂奪其職也漢之兼官其果周意乎霍光為大司馬大將軍領尚書自是而後霍光傳武帝以光為大司馬大將軍內領尚書張安世以車騎將軍領蕭望之以前將軍領師丹以左將軍領異時王鳯諸人皆以將軍領之並本傳內領尚書外領兵馬軍國之制専於一人所以基漢家之禍者蓋在此漢之領官其果周意乎唐制有所謂攝如侍中之攝吏部杜如晦職檢校侍中攝吏部尚書總監東宫兵馬進位尚書右僕射有所謂領如平章之領度支肅宗寶應元年元載同平章事領度支轉運使如故廣德元年劉晏同平章事領度支等使如故有所謂兼如宰相之兼兵部通鑑姚崇三為宰相皆兼兵部尚書然以宰相下行有司之事有司上侵宰相之權未免有紛紛變更之弊夫宰相兼有司而有司攝宰相周人亦未嘗不然爾然周公之統六官不過持其大要未有如房杜之徒日閲訟牒之煩且勞也元齡傳帝曰公為僕射當助朕廣耳目比聞閲訟牒日數百豈暇求人哉周公之兼冢宰蓋以三公兼之又豈有如岑文本之徒以侍郎微賤得専機要哉魏徴以祕書監恭預朝政岑文本以侍郎専典機要張亮以刑部尚書恭預朝政此猶可也在外之官大攝小重攝輕郡守之職總於諸侯帥郡佐之職移於部從事白居易江州司馬壁記自武德以來庶官以便宜從事大攝小重攝輕郡守之職總於諸侯帥郡佐之職移於部從事故自立五大都督府至於上中下郡司馬之事盡去惟員與俸在甚至諸道帥臣兼觀察之使江南觀察使即宣帥兼之荆南觀察使即潭帥鄂帥兼之元城先生曰唐制諸道帥臣兼觀察使之權故藩鎮無有紏舉是以江南觀察使即宣帥為之荆湖觀察使即潭帥鄂帥為之其餘諸州亦復如此兵衆地廣無有糾其非者卒為唐家三百年之患止由兼權太重耳嗟夫漢以將軍兼九卿領尚書而有外戚之禍唐以帥臣總郡守兼察使而致藩鎮之變後之為國者可不鑒哉國朝兼官之制何如也中書主民樞密主兵若不相屬爾然慶厯興師章得象以宰相兼樞密院元輔表慶厯二年七月夷簡得象并兼判樞密院又慶歷二年二邉用兵富公言邉事繫國安危不當専委樞密國初范質王漙宰相兼知樞密院事今兵興宜使宰相以故事兼領仁宗遂以夷簡判樞密院章得象兼樞密使又紹興七年宰臣張浚兼樞密使趙鼎秦檜亦以左僕射兼紹興用兵張浚亦以宰相兼樞密使見上即畢公領司馬也宰臣論道史官修史若不相關爾然咸平李沆以平章兼修國史元輔表咸平元年十月李沆同中書門下平章事兼修國史紹興吕頥浩以僕射兼修國史中興會要紹興二年詔左僕射吕頥浩兼提舉修史即蘇公兼太史也宰執兼太子師傅其格心至矣官制舊典仁宗建儲置三少各一人丁謂兼少師馮拯兼少傅是時實為東宫官餘多以為宰相致仕官諫官兼修起居注其奏事便矣熙寧四年同修起居注同知諫院張琥言今後起居注當令諫官一員兼領所貴左右史之職不廢詔諫官兼修起居注者後殿侍立亦許奏事更不栘牒閣門長編此國朝兼職之善也然可兼則兼不可則否有如樞密承旨兼馬軍司均為兵職也然范祖禹力言之何者蓋樞密有發兵之權而無握兵之重三衙有握兵之重而無發兵之權彼此相維不可専制今樞密而任管軍發兵握兵合而為一故不兼之矣范祖禹言伏見樞密副都承旨曹誦權馬軍司祖宗兵法本於樞密有發兵之權而無握兵之重京師之兵總於三帥有握兵之重而無發兵之權今副都承旨為樞密屬官權任管軍是本軍之地又得握兵合而為一非祖宗制兵之意中舍而兼給事均為駁職也然曾鞏深言之何者蓋中書則有舍人主行門下則有給事主讀以舍人預封駁不失為正救以舍人兼主讀不過為將順今主讀一事給事任之中舍復兼之不幾太過歟曽鞏言中書則有舍人主行門下則有給事主讀尚書則有左右丞郎受付各有分守不相侵踰故自來舍人不兼給事近給事封駁中書録黃三省進呈却令舍人書讀行下臣恐有隳官制又舍人雖主行詞命封還詞頭者蓋鮮康定間富弼當制封還遂國夫人之命後胡宿歐陽修皆援弼例封還遂以為常曽鞏聞見録至此而後見國朝設官之旨逺矣哉夫何元豐大臣為右相而兼中書侍郎中書取旨其權獨重凡所除吏門下皆不預聞此蔡確以私意廢祖宗法也元豐改官制確先説王圭曰公久居相位必拜中書令故圭不疑一日確密言三省長官位髙不預設只以左僕射兼門下侍郎右僕射兼中書侍郎各主兩省事上以為然確獨専政柄凡除吏圭不與聞初輔臣有言曰中書獨取旨事體太重上曰不當公此亂體統也崇寧姦臣為太師而領三省事號為公相使宰執居其下不敢與抗朝廷大柄在其掌握此蔡京以私意廢祖宗法也蔡絛國史補蔡京為太師兼領三省事號公相京子免門下省蓋以樞密使皆過門下不欲在兵柄故也噫君子以公兼之而事舉小人以私竊之而法隳則知在人不在官在事不在職爾今日欲行兼官之制昔有周典今有家法愚不敢贅言試守權行論試守之法莫善於漢論權行之法莫不善於漢漢制官卑而職重者試守官闕而卑攝者權行至權之者即漢人之所謂假也愚嘗考其本末而論之凡守官皆序舊階不食全俸百官表宣帝元康元年書守京兆彭城太守遺五鳯元年書守左馮翊渤海太守信守官皆序舊階是也漢表平帝令二百石以上一切滿職如真食者謂諸官吏初除皆試守一嵗乃為真食全俸平帝初即位故令為真守者不食全俸是也平帝紀凡守官滿嵗稱職者為真不稱者遣歸故官東都太守韓延壽守左馮翊滿嵗稱職為真潁川太守趙廣漢守京兆尹右輔都尉王欣守右扶風皆稱職為真以是知守官滿嵗稱職為真然也並本傳潁川太守黃霸守京兆尹坐事連貶秩數月詔歸潁川太守官以是知不稱職者歸故官然也本傳蓋漢守官之制大抵若此故有以六百石秩試守御史大夫者朱雲傳有以泰山太守入守大鴻臚者表蕭育令丞可知也則如御史臣光守尚書令史記三王世家胡建守軍正丞本傳府史可守也則如邉通之守丞相長史張湯傳路溫舒之守廷史本傳至若宰相罷免亦有復為九卿列大夫者表下是不特三輔為然也愚觀漢儀有云武帝置十三州刺史刺史舉茂才移名丞相考召取三科明經一科明律令一科能治劇一科皆試守滿嵗為真則是制也其殆起于武帝乎漢官儀云武帝置十三州刺史刺史舉民有茂材移名丞相考召取三科明經一科明律令一科能治劇一科詔選諫大夫議郎博士諸侯王傅太僕郎中令取明經選廷尉正監平案章取明律令選長安三輔令取治劇皆試守滿嵗為真意者武帝鋭意事功欲驟用文學材智之壬故特置守官用以處資淺之人耳一時奮志勵職立事興功無有隳墮廢弛之態寧非試守之法莫善於漢歟夫行者如太僕賀典敬容平陽侯曹窟皆行御史大夫都尉王尊宗正劉德皆行京兆尹大中大夫劉歆則行太常少府樂成則行大鴻臚此行職之例也已下並漢百官表下然御史可行也九卿可行也若張湯為御史大夫行丞相事表不求副丞相而有覬覦代位之心觀其以見知之罪致莊青翟其用意可見爾本傳杜佑謂漢御史大夫其心冀幸丞相物故乃隂私相毁害欲代之通典漢凡為御史大夫而丞相次也其心兾幸丞相物故或乃隂私相毁欲代之注見史記又曰鄭𢎞為大夫守之數年不得匡衡居之未滿嵗而丞相馳即代之其知之矣此行丞相之失也夫假者燕倉為假田使者趙充國為假司馬本傳趙充國為假司馬從二師將軍杜勳以軍侯為假丞陳湯傳此假職之例也然使者可假也司馬可假也丞皆可假也若曹參為假左丞相以屯關中本傳徒以古人論道經邦之任而用借為將者之威重輕相職而重戰功豈古人之意邪故班固官表載漢初丞相特録蕭何而曹參則削之其知之矣按漢百官表下漢初丞相但言蕭相國不言曹參又按通典渭漢二年拜曹參為假左丞相即漢初丞相當有左右今漢表特言一丞相疑誤緣漢初丞相以征伐而借名未嘗居位如韓信以左丞相擊魏樊噲以定韓王信而遷左丞相酈商以破臧荼遷右丞相則非特曹參而止漢表獨載蕭何餘則不載正此意也通典因參之名而疑漢表之誤非也此假丞相之失也嗟夫丞相大臣也朝廷百執之望也今御史行之以奪其權為將假之以竊其名而以漢人行假之法果善乎唐制以職事髙者為守以職事卑者為行未為正命者為試行守之法君子未暇論之今觀其試法未嘗不嘆其非也自則天舉人不問賢否咸加擢拜大置試官以處之試官蓋起於此當時授遺補者六十一人授侍御著作者各二十四人授校書衛佐者二十二人噫何濫耶補闕連車載拾遺平斗量此唐人之謡所以譏試官之失也通典天授二年凡舉人無賢不肖咸加擢拜大置試官以處之試官蓋起於此也注試者未為正命凡止官皆稱行守其階髙而官卑者稱行階卑而官髙者稱守階官同者並無行守字太后務收物情十道使舉人并州縣令王山耀等六十一人並授拾遺補闕懷州録事參軍崔獻可等二十四人並授侍御史并州録事參軍徐所等二十四人並授著作郎魏州內黃縣尉崔宣道等二十二人並授衛佐校書郎御史等故當時諺曰補闕連車載拾遺平斗量把推侍御史甌脫校書郎試官自此始也國朝改官制之後遂立行試守之法髙一品為行下一品為守下二等為試品同則否元豐四年詔自今職事官寄祿髙一品者為行下一品者為守下二品者為試品同者不用行守試如舊光祿大夫視左右丞正議大夫視六曹侍郎通議大夫視給事太中大夫視諫議今之六曹侍郎自光祿大夫除是髙一品以行書之自通議大夫除是下一品以守書之自太中大夫除是下二品以試書之若除以正議大夫則品同不書矣元祐以來復置權尚書權侍郎權尚書依守侍郎而權侍郎則以未歷給舍及待制以上者加之所以待資淺之官元祐置權尚書俸賜依守侍郎班序在正尚書之下崇寧罷紹興八年復置權尚書元祐置權侍郎未歷給事中中書舍人及待制以上者並帶權字祿比諫議大夫崇寧罷建炎四年置此行守試權之法至是始備矣然階尊官卑曰行可也階卑官尊曰守可也官與階等不用可也此三者足以該之矣而自守之下復加以試贅爾此蔣之竒謂通議以下除侍郎不必云試者非以試為贅耶紹聖四年蔣之竒言且如正議大夫視六曹侍郎光祿大夫視左右丞通議大夫視給事中今六曹侍郎自正議大夫除則官與階等不守不行可也自光祿大夫已上除則階尊官卑謂之可行也自通議大夫以下除則階卑官尊謂之守可也何必云試哉自試之下復加以權煩爾此翟思謂尚書侍郎不宜去行守試而加權者非以權為煩耶紹聖四年翟思言神宗官制元祐浸以變亂如尚書侍郎宜去行守試而加權者學士待制校理有兼尚書侍郎者詔有司釐正雖然此特官名之紛紛耳今日四者並用未易輕變也惟選官以法任官以人循漢人之試守懲漢人之行假則亦成周之六典矣不然漢用試法而法舉唐立試官而官濫豈非推而行之存乎人乎古今源流至論續集卷八
